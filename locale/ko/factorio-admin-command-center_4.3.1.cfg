high_infinite_research_levels=모든 무한 연구 기술을 레벨 100으로 설정합니다.
instant-blueprint-building=배치된 객체와 타일 고스트를 즉시 활성화시킵니다.\n일반 캐릭터(에디터 상태 아님)와도 호환되며 아이템을 소모하지 않습니다.
instant-deconstruction=객체가 해체 대상으로 표시되면 즉시 제거합니다.\n우선 채광을 시도한 뒤, 채광이 불가능하면 객체를 삭제합니다.
instant-upgrading=표시된 업그레이드를 즉시 적용합니다.
instant-rail-planner=즉석 설계도면 설정이 꺼져 있을 경우, 레일 계획기로 배치한 레일 고스트 객체만을 즉시 활성화시킵니다.
ghost-mode=충돌 없는 캐릭터를 활성화하여 객체를 통과할 수 있게 합니다. 다시 전환하면 원래 상태로 돌아갑니다.
invincible-player=캐릭터가 모든 피해를 무시하도록 합니다.\n[color=orange]캐릭터에 몸체가 필요하므로, 신 모드, 에디터 모드나 부활하지 않은 상태에서는 사용할 수 없습니다.[/color]
instant-request=활성화하면, 개인 물류 요청에 정의된 최소 수준의 재고를 유지합니다.
instant-trash=폐기 슬롯에 있는 물건을 즉시 삭제합니다. 로봇이 필요하지 않습니다. 인벤토리가 가득 찼을 때 유용합니다.
indestructible-builds_permanent=모든 표면에 현재 존재하는 구조물을 파괴 불가능하게 만듭니다. (영구적 적용)
non-minable-permanent=모든 표면에 현재 존재하는 구조물을 채굴할 수 없게 만듭니다. (영구적 적용)
add_infinite_research_levels=누를 때마다 현재 사용 가능한 모든 무한 기술에 100레벨을 추가합니다.
artillery-range-boost=슬라이더 값에 따라 현재 진영의 대포 사거리 보너스를 조정합니다.
beacon-distribution-bonus=슬라이더 값에 따라 현재 진영의 신호기 분배 보너스를 조정합니다.
belt-stack-size-bonus=슬라이더 값에 따라 현재 진영의 벨트 잔적크기 보너스를 조정합니다.
build-distance=슬라이더 값에 따라 현재 진영의 건설 범위 보너스를 조정합니다.
bulk-inserter-capacity-bonus=슬라이더 값에 따라 현재 진영의 대용량 투입기 운반량 보너스를 조정합니다.\n[color=orange]API 제한: 0 ~ 254[/color]
character-health-bonus=슬라이더 값에 따라 현재 진영의 캐릭터 체력 보너스를 조정합니다.
character-trash-slot-bonus=슬라이더 값에 따라 현재 진영의 폐기 슬롯 보너스를 조정합니다.
create-full-spidertron=사전 설정된 장비가 투입된 스파이더트론을 생성합니다.\n[color=orange]품질 모드가 활성화되어있을 경우, 지원되는 아이템과 모듈이 전설 품질로 생성됩니다.[/color]
create-full-tank=사전 설정된 장비가 투입된 탱크를 생성합니다.\n[color=orange]품질 모드가 활성화되어있을 경우, 지원되는 아이템과 모듈이 전설 품질로 생성됩니다.[/color]
fill-thrusters=현재 우주 플랫폼의 모든 추진기에 연료와 산화제를 가득 채웁니다.\n[color=orange][font=default-bold]우주 시대[/font] DLC가 설치 및 활성화된 상태여야 작동합니다.[/color]
following-robot-lifetime-bonus=슬라이더 값에 따라 현재 진영의 전투 로봇 지속시간 보너스를 조정합니다.
gun-speed-boost=슬라이더 값에 따라 현재 진영의 사격 속도 보너스를 조정합니다.
inserter-stack-size-bonus=슬라이더 값에 따라 현재 진영의 투입기 운반량 보너스를 조정합니다.
item-drop-distance=슬라이더 값에 따라 현재 진영의 아이템 놓는 거리 보너스를 조정합니다.
item-pickup-distance=슬라이더 값에 따라 현재 진영의 아이템 잡는 거리 보너스를 조정합니다.
laboratory-productivity-bonus=슬라이더 값에 따라 현재 진영의 연구소 생산성 보너스를 조정합니다.
laboratory-speed-bonus=슬라이더 값에 따라 현재 진영의 연구소 속도 보너스를 조정합니다.
loot-pickup-distance=슬라이더 값에 따라 현재 진영의 전리품 습득 거리 보너스를 조정합니다.
maximum-following-robot-count=슬라이더 값에 따라 현재 진영의 전투 로봇 한도 보너스를 조정합니다.
mining-drill-productivity-bonus=슬라이더 값에 따라 현재 진영의 채광 드릴 생산성 보너스를 조정합니다.
reach-distance=슬라이더 값에 따라 현재 진영의 도달 거리 보너스를 조정합니다.
repair-mined-item=회수한 객체를 아이템화하기 직전에 최대 HP로 복구합니다.
resource-reach-distance=슬라이더 값에 따라 현재 진영의 자원 도달 거리 보너스를 조정합니다.
robot-battery-bonus=슬라이더 값에 따라 현재 진영의 작업 로봇 전력량 보너스를 조정합니다.
robot-storage-bonus=슬라이더 값에 따라 현재 진영의 작업 로봇 운반량 보너스를 조정합니다.
set-inventory-slots-bonus=슬라이더 값에 따라 현재 진영의 캐릭터 인벤토리 보너스를 조정합니다.\n[color=orange]최소값: 0, ([font=default-bold]도구 허리띠[/font] 연구 이후 10)[/color]
surface-daytime=슬라이더를 조정한 뒤 적용 버튼 눌러 현재 표면 시간을 0.00에서 1.00 사이 값에서 설정할 수 있습니다.
surface-daytime-midday=현재 표면 시간을 낮(0.50)으로 빠르게 설정합니다.
surface-daytime-midnight=현재 표면 시간을 밤(0.00)으로 빠르게 설정합니다.
surface-freeze-daytime=현재 표면의 시간 주기를 현재 시간 값으로 고정합니다.
surface-gravity=현재 표면의 중력 속성값을 설정합니다.\n[color=orange][font=default-bold]우주 시대[/font] DLC가 설치 및 활성화되어 있어야 합니다.[/color]
surface-magnetic-field=현재 표면의 자기장 속성값을 설정합니다.\n[color=orange][font=default-bold]우주 시대[/font] DLC가 설치 및 활성화되어 있어야 합니다.[/color]
surface-no-enemies=현재 표면에서 추가적인 적 생성을 비활성화합니다.
surface-peaceful-mode=현재 표면에서 평화 모드를 활성화합니다.
surface-pressure=현재 표면의 압력속성값을 설정합니다.\n[color=orange][font=default-bold]우주 시대[/font] DLC가 설치 및 활성화되어 있어야 합니다.[/color]
surface-solar-power-multiplier=현재 표면의 태양광 속성값을 설정합니다.\n[color=orange]사용 가능한 값: 0 ~ 20[/color]
teleport-to-planet=선택한 행성으로 순간이동합니다.\n표면이 아직 존재하지 않을 경우, 자동으로 생성됩니다.\n[color=orange][font=default-bold]우주 시대[/font] DLC가 설치 및 활성화되어 있어야 합니다.[/color]
tp-open=수동으로 저장한 지점과 진영 지도 태그를 합칠 수 있는, 빠른 텔레포트 설정창을 엽니다.\n저장된 지점은 목록에 표시되지만, (예: 이름(X,Y)) 편집하면 설정한 이름만 유지됩니다.
train-braking-force-bonus=슬라이더 값에 따라 현재 진영의 기차 제동력 보너스를 조정합니다.

