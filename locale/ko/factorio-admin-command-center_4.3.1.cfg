[mod-setting-description]
facc-show-cheat-tab=제작 메뉴의 치트 도구 제작 탭을 활성화합니다.
facc-internal-names=각 프로토타입의 지역화된 이름을 내부 식별자와 세부 정보로 덮어씁니다.
facc-enable-achievement-overrides=활성화되면 내장된 업적 제한을 우회할 수 있습니다.
facc-enable-auto-resource-regeneration=활성화하면 무한 자원 설정을 전환(활성화한 뒤 비활성화)할 때 무한 자원을 자동으로 재생성합니다. 관리 GUI의 ‘자원 재생성’ 버튼을 통한 수동 재생성은 이 옵션과 무관하게 사용할 수 있습니다.\n[color=green]지도 설정: 게임 재시작 없이 적용됨[/color]\n[color=red][font=default-bold]경고:[/font][/color]\n[color=orange]이 설정을 무한 자원 설정와 동시에 활성화하지 않는 것을 권장합니다.[/color]\n[color=red]최상의 결과를 얻으려면 둘 중 하나만 사용하고 전부 활성화하지 마세요.[/color]\n[color=green]둘 다 비활성화한 상태 역시 안전합니다.[/color]
facc-infinite-resources=이 옵션을 활성화하면 모든 자원이 Satisfactory와 마찬가지로 무제한으로 변환되며, 항상 일반적인 양으로 생성됩니다.\n\n[font=default-bold][color=red]경고:[/color]\n[color=orange]이 옵션을 활성화하거나 비활성화하면 맵상의 모든 자원이 로드된 뒤 재조정됩니다.[/color]\n[color=red]지도 크기가 클수록 이 설정을 변경한 후 불러올 때 몇 분 이상이 소요될 수 있습니다. 잠시 기다려 주세요 — 게임은 정상적으로 재개됩니다. 반복된 긴 로드를 피하려면 이 옵션을 활성화하거나 비활성화한 파일을 불러온 다음, 바로 게임을 저장하세요.[/color][/font]
facc-infinite-resources-multiplier-solid=비유체 카테고리(예: 기본 광석, 단단한 광석, 비유체 유형)에 있는 무한 자원의 자원 배율을 결정합니다. 풍부도와 자원량에 영향을 미칩니다.\n1× = 100%\n2× = 200%\n5× = 500%\n10× = 1000%\n20× = 2000%\n50× = 5000%
facc-infinite-resources-multiplier-fluid=유체 카테고리(예: 기본 유체 및 모드 유체 카테고리)에 있는 무한 자원의 자원 배율을 결정합니다. 풍부도와 자원량에 영향을 미칩니다. 카테고리 이름에 “fluid”가 포함되거나 자원이 유체를 생성하는 경우 해당 카테고리를 유체로 취급됩니다.\n1× = 100%\n2× = 200%\n5× = 500%\n10× = 1000%\n20× = 2000%\n50× = 5000%
facc-disable-auto-resource-regeneration=활성화하면 무한 자원 설정을 전환할 때 유한 자원의 자동 재생성을 방지합니다. 관리자 GUI의 “자원 재생성” 버튼을 통한 수동 재생성은 계속 사용할 수 있습니다.\n[color=red][font=default-bold]경고:[/font][/color]\n[color=orange]이 설정을 무한 자원 설정와 동시에 활성화하지 않는 것을 권장합니다.[/color]\n[color=red]최상의 결과를 얻으려면 둘 중 하나만 사용하고 전부 활성화하지 마세요.[/color]\n[color=green]둘 다 비활성화한 상태 역시 안전합니다.[/color]
facc-infinite-resources-multiplier=무한 자원의 배율을 결정합니다:\n1× = 100%\n2× = 200%\n5× = 500%\n10× = 1000%\n20× = 2000%\n50× = 5000%
facc-instant-crafting-machines=제작 속도를 증폭시켜 기계 제작법이 즉시 완료되도록 합니다.
facc-instant-mining-drills=모든 채광 드릴의 채광 속도를 엄청나게 증가시킵니다.
facc-enable-background-optimization=[font=default-bold]기본값:[/font] 비활성화\n[color=green]Map setting: no game restart required.[/color]\n\n[color=green][font=default-bold]활성화 (처리 최적화):[/font][/color]\n대용량 저장 파일에서의 멈춤 현상을 방지하기 위해 백그라운드 스레드에서 무거운 작업을 처리하도록 합니다.\n[color=green]장점:[/color] 거대한 공장에서도 부드러운 게임 플레이가 보장됩니다.\n[color=yellow]단점:[/color] 작업 완료에 시간이 걸릴 수 있습니다 longer.\n\n[color=orange][font=default-bold]비활성화 (즉시 처리):[/font][/color]\n모든 동작을 한번에 실행하려 시도합니다.\n[color=green]장점:[/color] 작은 저장 파일에서 제일 빠르게 완료됩니다.\n[color=red]단점:[/color] 대규모 저장 파일일 경우 멈춤/렉 현상이 발생할 수 있습니다.
facc-ignore-recipe-inputs=모든 제작법의 재료 요구사항을 제거하여 재료 소비 없이 출력품을 제작할 수 있도록 합니다.\n[color=yellow]시작 설정: 게임 재시작 이후 적용됩니다[/color]\n[color=orange]When enabled, recipe quality cannot be selected.[/color]\n[color=red]다른 모드에서 추가한 것을 포함한, 모든 제작법에 적용됩니다.[/color]
facc-remove-electricity-usage=지원되는 전력 객체의 동력 유형을 void로 변경하여 전력망 연결 없이도 작동하도록 합니다.\n[color=yellow]시작 설정: 게임 재시작 이후 적용됩니다[/color]\n[color=orange]API에서 void 동력 사용이 허용되는 프로토타입 유형에만 적용됩니다.[/color]
facc-remove-fuel-usage=지원되는 화력/유체 객체의 동력 유형을 void로 변경하여 연료 없이도 작동하도록 합니다.\n[color=yellow]시작 설정: 게임 재시작 이후 적용됩니다[/color]\n[color=orangeAPI에서 void 동력 사용이 허용되는 프로토타입 유형에만 적용됩니다.[/color]
facc-stats-hud-adjust-for-clock=게임 내 Clock 모드가 활성화되어 있을 때 HUD를 정렬하기 위해 상단 간격을 추가합니다.
facc-stats-hud-adjust-for-fps-ups=FPS/UPS 표시와 HUD를 정렬할 수 있도록 간격을 추가합니다.
facc-stats-hud-distance-origin-x=거리 센서에서 사용할 X 기준점 좌표입니다.
facc-stats-hud-distance-origin-y=거리 센서에서 사용할 Y 기준점 좌표입니다.
facc-stats-hud-enabled=실시간 게임플레이 통계를 표시하는 경량 HUD를 추가합니다.
facc-stats-hud-offset-preset-one-info=오른쪽 상단 게임 정보이 1개 줄이 표시되는 상황에서의, 세로 오프셋 값의 사전 설정값을 정의합니다 (오프셋 22 사용)
facc-stats-hud-offset-preset-three-infos=오른쪽 상단 게임 정보에서 3개 줄이 표시되는 상황에서의, 세로 오프셋 값의 사전 설정값을 정의합니다 (오프셋 60 사용)
facc-stats-hud-offset-preset-two-infos=오른쪽 상단 게임 정보에서 2개 줄이 표시되는 상황에서의, 세로 오프셋 값의 사전 설정값을 정의합니다 (오프셋 39 사용)
facc-stats-hud-show-coordinates=현재 플레이어의 X, Y 좌표를 표시합니다.
facc-stats-hud-show-daytime=현재 표면의 시간과 경과한 게임 일 수를 표시합니다.
facc-stats-hud-show-distance-from-point=아래에 설정한 기준점 좌표로부터의 거리를 표시합니다.
facc-stats-hud-show-evolution=현재 표면의 적 진화 요인을 표시합니다.
facc-stats-hud-show-handcraft-timer=수동 제작 대기열의 남은 시간을 표시합니다.
facc-stats-hud-show-movement-speed=이동 속도를 표시합니다. (엔지니어 또는 차량)
facc-stats-hud-show-player-max-speed=엔지니어의 도보 이동시, 계산된 플레이어 최대 속도를 추가로 표시합니다.
facc-stats-hud-show-playtime=현재 저장 파일의 총 플레이 시간을 표시합니다.
facc-stats-hud-show-playtime-days=활성화하면 플레이 시간이 일 + 시간 방식으로 표시됩니다.
facc-stats-hud-show-pollution=현재 위치의 공해 수치를 표시합니다.
facc-stats-hud-show-research-eta=현재 진영의 예상 남은 연구 시간을 표시합니다.
facc-stats-hud-show-vehicle-fuel=차량 및 플랫폼에 남은 연료/에너지량을 표시합니다. (사용 가능한 경우)
facc-stats-hud-show-vehicle-max-speed=차량에 있을 때 계산된 차량 최대 속도를 추가로 표시됩니다.
facc-stats-hud-single-line=활성화되어 감지된 모든 HUD 요소를 가로줄 하나에 표시하도록 합니다. 수직으로 여러 줄로 표시하는 것을 원할 경우 비활성화하세요.