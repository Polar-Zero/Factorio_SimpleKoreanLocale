[technology-description]
foliax-arcane-turret=폴리악스의 신비한 에너지를 거대한 바위나 적대 생명체에 전달합니다.
foliax-arcane-turret-infinite=연구소에 '액화된 폭력'을 공급하여 외계 위협을 더 치명적이고 빠르게 파괴할 수 있는 방법을 알아보세요.
foliax-bar-to-plate=폴리악스 주괴를 눌러, 사용 가능한 판 형태로 만드는 데 사용됩니다.
foliax-bars-productivity=3단계(바이오 챔버) 주괴 제작법 생산량이 증가합니다.
foliax-circuit-productivity=폴리악스 회로 제작법의 생산량을 증가시킵니다.
foliax-colored-bricks=검은 화산암 콘크리트와 폴리악스 늪지 콘크리트를 발견해보세요.
foliax-cryo=화학 공장을 더 열심히 운영할 수 있는 지식을 발견해보세요.
foliax-drill=땅속 깊이 파헤친 다음 아무 성과도 없이 떠나는 것을 좋아하시나요?
foliax-exodus=이제 짐을 싸고 농장을 떠날 시간입니다. 탐험할 은하계가 아직 가득합니다!
foliax-fertilizer=다른 세계에 폴리악스 나무를 심는 방법을 알아보세요.
foliax-lumberjack=나무를 아주 세고, 빠르게 베어보세요.
foliax-omega=무한한 잠재력을 가진 전원 공급 장치를 만들기 위한 지식을 발견해보세요!
foliax-perpectual-motor=아케인의 힘을 이용해 영원히 회전하는 모터를 만들어보세요.
foliax-promethium-five=6단계: 마지막으로, 프로메튬 소행성 덩어리의 에너지를 방출하면 됩니다.
foliax-promethium-four=5단계: 우주에서 온 소행성과 프로메튬 주머니를 모아 압축하세요.
foliax-promethium-one=1단계: 주괴를 분말 형태로 분쇄합니다.
foliax-promethium-three=3단계: 액체와 유기 성분을 혼합하여 씨앗을 만듭니다.
foliax-promethium-two=2단계: 분말과 용암, 가스를 결합합니다.
foliax-scrap-productivity=폴리악스 고철 제작법 생산량이 증가합니다.
foliax-solar-panel-equipment=크기와 출력 모두에서 더 큰 개인용 태양 전지판 장비를 발견해보세요.
foliax-spawner=식물로 생물을 만드는 지식을 발견해보세요!
foliax-steel-axe=나무를 아주 세고, 빠르게 베어보세요.
foliax-worker-robots-storage=로봇의 운반 능력을 높여보세요.
planet-discovery-foliax=채광 가능한 광맥과 적이 없어 매우 평화롭지만, 풍부한 식물학적 잠재력을 갖추고 있기도 한 행성입니다.
foliax-military-upgrades-one=바이오 연구소에 전투 연구를 계속 공급해, 외계인을 저지할 더 빠르고 확실한 방법을 찾아보세요.
foliax-military-upgrades-three=바이오 연구소에 전투 연구를 계속 공급해, 외계인을 저지할 더 빠르고 확실한 방법을 찾아보세요.
foliax-military-upgrades-two=바이오 연구소에 전투 연구를 계속 공급해, 외계인을 저지할 더 빠르고 확실한 방법을 찾아보세요.
foliax-poison-laser-turret=저항은 이제 무의미합니다.
foliax-poison-laser-turret-infinite=더 많은 지식만 있다면, 소행성조차도 포탑의 위력을 두려워할 것입니다.
foliax-research-violence-three=바이오 연구소에 전투 연구를 계속 공급해, 외계인과 싸울 더 나은 방법을 찾아보세요.
foliax-research-violence-two=바이오 연구소에 전투 연구를 계속 공급해, 외계인과 싸울 더 나은 방법을 찾아보세요.
pelagos-rum=해적들이 가장 좋아하는 영문자는 무엇일까요? 'R'이라고 생각할 수도 있지만 해적의 첫사랑은 언제나 'C'일 것입니다.
foliax-military-defense-one=이제 아무도 지나갈 수 없을 겁니다. 외계 생명체가 모두 똑같은 크기라면 말이죠.
foliax-military-defense-three=외계 생명체가 무리지어 공격해올수도 있으니, 거기 대한 대비책도 필요합니다.
foliax-military-defense-two=다시 생각해보니, 엔지니어와 그 창조물은 통과할 수 있어야 했습니다.
foliax-military-turret-one=외계인의 위협으로부터 자동화된 자유를 만끽하세요.
foliax-military-turret-three=빛으로 외계 생명체를 정화하세요.
foliax-military-turret-two=액체 같은 자유를 쏟아부어, 외계 생명체에게 어디까지 가능한지 알려줍니다.
foliax-military-weapons-one=외계 생명체로부터 스스로를 방어할 수 있도록 하는 기본적인 무기입니다.
foliax-military-weapons-three=잔디밭에 들어온 외계 생명체에 선제 공격을 가하세요.
foliax-military-weapons-two=외계 생명체가 잔디밭에 들어오지 못하게 하세요.
foliax-military-turret-eight=적의 영혼을 꿰뚫습니다, 그 고통이 조상들에게 전해질 만큼.
foliax-military-turret-five=외계 우물을 멀리서 포격한다면, 이제 누가 우리와 대적할 수 있을까요?
foliax-military-turret-four=로켓은 항상 침입한 외계인의 머리를 노립니다.
foliax-military-turret-nine=빛의 군주의 힘으로 이단 외계인과 성대한 전투를 벌이니라, 밤은 어둡고 공포로 가득하니.
foliax-military-weapons-eight=방사능의 의도로 가득 찬 탄약을 발사합니다.
foliax-military-weapons-five=외계 우물의 존재 그 자체를 지워버릴 시간입니다.
foliax-military-weapons-four=원거리에서 외계 우물을 흙으로 되돌립니다.
foliax-military-weapons-seven=나는 이제 죽음이요, 영광스럽도다.
foliax-military-weapons-six=빛을 휘둘러 자신의 것으로 만드리라.
foliax-military-turret-seven=충격적인 과학적 발견의 산물, 연쇄 번개의 힘을 느껴보세요!
foliax-military-turret-six=로켓은 도발을 무시하고, 거리에 상관없이 침입한 외계인의 머리를 노립니다.

