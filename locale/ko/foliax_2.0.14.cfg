[recipe-description]
bauxite-plant-biomass=주머니를 알루미나로 효율적으로 변환해보세요.
bauxite-plant-biomass-advanced=주머니를 알루미나로 고급 기술을 활용한 매우 효율적인 방식으로 변환해보세요.
bauxite-plant-biomass-basic=주머니를 알루미나로 변환할 수 있습니다. (비효율적)
bitumen-plant-biomass=주머니를 역청 주괴로 효율적으로 변환해보세요.
bitumen-plant-biomass-advanced=주머니를 역청 주괴로 고급 기술을 활용한 매우 효율적인 방식으로 변환해보세요.
bitumen-plant-biomass-basic=주머니를 역청 막대로 변환할 수 있습니다. (비효율적)
brass-from-copper-bacteria=젤리에서 발견되는 아연을 구리 박테리아와 혼합하여 황동 전구체를 생성해보세요.
brass-from-lava-and-molten-copper=용암을 사용하여 아연을 생산한 다음 이를 녹은 구리와 혼합하여 판 형태로 만들어보세요.
calcite-plant-biomass=주머니를 방해석 주괴로 효율적으로 변환해보세요.
calcite-plant-biomass-advanced=주머니를 방해석 주괴로 고급 기술을 활용한 매우 효율적인 방식으로 변환해보세요.
calcite-plant-biomass-basic=주머니를 방해석 주괴로 변환할 수 있습니다. (비효율적)
copper-plant-biomass=주머니를 구리 주괴로 효율적으로 변환해보세요.
copper-plant-biomass-advanced=주머니를 구리 주괴로 고급 기술을 활용한 매우 효율적인 방식으로 변환해보세요.
copper-plant-biomass-basic=주머니를 구리 주괴로 변환할 수 있습니다. (비효율적)
find-brass-in-ammoniacal-solution=황동 전구체를 찾기 위해 광활한 암모니아 바다를 선별해보세요.
fluorite-plant-biomass=주머니를 형석 주괴로 효율적으로 변환해보세요.
fluorite-plant-biomass-advanced=주머니를 형석 주괴로 고급 기술을 활용한 매우 효율적인 방식으로 변환해보세요.
fluorite-plant-biomass-basic=주머니를 형석 주괴로 변환할 수 있습니다. (비효율적)
