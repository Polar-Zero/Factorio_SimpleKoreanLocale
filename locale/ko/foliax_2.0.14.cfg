foliax=적과 채광 가능한 자원이 존재하지 않는, 매우 평화로운 행성, 식물로부터 자원을 추출해야 합니다. 식물학과 신비한 마법을 결합해 왠지 낯익은 소재를 만들어보세요. 강력한 기계를 제작하거나, 끝없는 갈증을 품고있는 바이오 연구소를 발견하는 것 역시 가능합니다.\n\n번역: SimpleKoreanLocale(PolarZero)

