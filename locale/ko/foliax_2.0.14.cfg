[mod-name]
foliax=○ 폴리악스(Foliax)
foliax-two=○ 폴리악스 - 리소스(Foliax 2)

[mod-description]
foliax=폴리악스 행성! 이곳에는 채광 가능한 자원이 존재하지 않으며, 식물로부터 자원을 추출해야 합니다. 식물학과 신비한 마법을 결합해 왠지 낯익은 소재를 만들어보세요. 강력한 기계를 제작하거나, 끝없는 갈증을 품고있는 바이오 연구소를 발견하는 것 역시 가능합니다.\n\n번역: SimpleKoreanLocale(PolarZero)
foliax-two=폴리악스 행성을 위한 그래픽을 포함합니다.\n\n번역: SimpleKoreanLocale(PolarZero)


[achievement-name]
foliax-plant-based=식물 기반 전자

[achievement-description]
foliax-plant-based=철 도금 전자 회로 제작법을 잠금 해제하지 않은 상태에서 프로메튬 과학 팩을 이용한 연구를 완료하세요.

