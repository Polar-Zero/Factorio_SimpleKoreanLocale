[mod-setting-description]
foliax-armor=발전기, 로보포트, 외골격이 장착된 메카 슈트와 함께 게임을 시작하세요.
foliax-biolab-quality=활성화하면, 폴리악스 바이오 연구소의 품질이 과학 팩 소모량에 영향을 주도록 허용합니다.
foliax-bots=로봇 기본 속도를 6배로 증가시킵니다.
foliax-debug-tab=현재 폴리액스 제작법이 없는 아이템에 폴리액스 전용 제작법을 생성하도록 합니다. 공식 폴리악스 제작법이 필요할 수 있는 아이템을 찾는 데 사용됩니다.
foliax-decoration=콘크리트 배치시 주변 지면의 장식을 제거합니다.
foliax-evoreset=나우비스 행성에 첫 방문 시, 나우비스 진화 요인을 0으로 초기화하고 존재하는 적과 산란장을 제거합니다. 나우비스가 아닌 다른 행성에서 게임을 시작할 경우 활성화하는 것을 권장합니다.
foliax-research-multiplier=이 설정값은 폴리악스 기술 트리에 대한 연구 비용만 곱합니다.
foliax-stack=모든 아이템의 묶음 크기를 조정할 수 있습니다.
foliax-stack-value=묶음 크기 배율, '묶음 크기 조정' 옵션이 활성화된 경우에만 적용됩니다.
foliax-enemies=비활성화하면, 폴리악스 행성에 적을 생성하지 않습니다.
foliax-research=비활성화하면, Foliax 0.4.8 업데이트 이전에 사용했던, 구식 연구 아이템 제작법을 사용합니다.
foliax-start-planet=활성화하면, 새로운 게임을 폴리악스 행성에서 시작합니다 (기본값: 비활성화)
foliax-tab=활성화: 폴리악스 제작법 탭이 제일 먼저 표시됩니다.\n비활성화: Foliax 탭의 제작법이 자식 테이블로 이동된다는 안내가 표시됩니다.
foliax-winter=연말 분위기를 만끽해보세요!
foliax-fog=폴리악스 습지 타일의 안개 효과를 조정할 수 있습니다.
foliax-k2-cards=Krastorio2 Spaced Out 모드가 활성화되어 있을 때, 이 모드가 테크 카드를 대신 사용하도록 할 수 있습니다.
foliax-rain=폴리악스에 적용되는 비 날씨효과를 활성화할 수 있습니다.
foliax-edge-route=폴리악스와 태양계 가장자리 사이의 우주 연결 경로를 추가합니다.
foliax-fulgora-route=폴리악스와 풀고라 사이의 우주 연결 경로를 추가합니다.
foliax-promethium=폴리악스 자원과 소행성을 대부분 활용한, 프로메튬 처리 기술 및 제작 공정을 게임에 추가합니다.