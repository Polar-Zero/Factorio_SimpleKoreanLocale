[fluid-description]
brimfruit-paste=매콤하고 두꺼운 페이스트, 아마 위장이 가장 튼튼한 사람만이 먹을 수 있을 것입니다.
foliax-energy-fluid=에너지 응용 분야의 기본 구성 요소입니다.
foliax-foundation-fluid=기본 애플리케이션의 기본 구성 요소입니다.
foliax-research-catalyst=바이오 연구소에 사용할 수 있는 형태로 만드는 데 도움을 주는, 에너지 촉매제입니다.

