[mod-name]
dart=소행성 위험요소 레이더 추적(Dangerous Asteroids Radar Tracking)

[mod-description]
dart=더 정밀한 소행성 목표 지정을 통해 탄약을 절약해보세요.\n\n번역: SimpleKoreanLocale(PolarZero)


