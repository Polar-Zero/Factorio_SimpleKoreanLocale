[mod-setting-description]
dart-logLevel=D.A.R.T. 모드의 로그 수준을 조정합니다.
dart-mark-targets=D.A.R.T.의 결정에 따라 목표 색상을 강조 표시합니다.
dart-show-defended-area=D.A.R.T.가 방어 중인 지역을 강조 표시합니다.
dart-show-detection-area=D.A.R.T.가 감시하는 지역을 강조 표시합니다.
dart-msgLevel=콘솔에 표시되는 메시지 유형을 조정합니다.
dart-low-ammo-warning=D.A.R.T.에서 플랫폼의 탄약 재고를 (허브 내부) 지속적으로 확인하고, 임계값보다 적을 경우 알리도록 합니다.
dart-low-ammo-warning-threshold-default=탄약 부족 안내를 표시할 기본 임계값, 플랫폼과 탄약 유형별로 정의할 수 있습니다.
dart-update-stock-period=허브 탄약 재고를 업데이트할 간격 (초)
dart-auto-increment-detection-range=__ENTITY__dart-radar__의 감시 범위 개선 연구가 완료될 때, 감시 영역을 자동으로 확장합니다.
dart-release-control=D.A.R.T.에서 너무 많은 소행성이 접근할 경우 포탑 제어권을 포기하도록 합니다.
dart-release-control-threshold-default=사격 제어 컴퓨터가 포탑 제어권을 포기하는 기본 임계값을 조정합니다. (컴퓨터 UI에서 재정의할 수 있습니다).
dart-asteroid-warning-threshold=경보로 알리기 전에 초과된 최소 소행성 개수를 조정합니다.