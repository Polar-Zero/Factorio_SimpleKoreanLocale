[mod-name]
cybersyn2=사이버신 2(Cybersyn 2)

[mod-description]
cybersyn2=사이버네틱 조합기와 회로 네트워크로 제어할 수 있는, 다양한 기능으로 기차 물류망을 개선해보세요. 팩토리오 2.0에 맞게 재설계된 프로젝트 Cybersyn의 후속작입니다.\n\n번역: SimpleKoreanLocale(PolarZero)


[cybersyn2-alerts]
no-station=기차 정류장에 연결된 조합기가 없습니다.
too-many-allowlist=기차 정류장에 허용 목록 조합기가 너무 많습니다.
too-many-station=기차 정류장에 연결된 조합기가 너무 많습니다.
train-stop-limit-zero=기차 한도가 0으로 설정되어 있어, Cybersyn의 경로 지정이 중단되었습니다.
deprecated-combs=이 정류장에는 더 이상 사용되지 않는 모드가 있는 조합기가 포함되어 있으며, 수정 또는 제거되기 전까지 비활성화됩니다. 자세한 내용은 모드 포탈 등 문서를 참조하세요.

[cybersyn2-combinator-mode-allow]
add-custom-layout=사용자 지정 레이아웃 추가:
add-existing-layout=기존 레이아웃 추가:
allowed-layouts=허용된 레이아웃:
custom-layout-tooltip=허용할 기차 레이아웃을 나타내는 서식 텍스트 문자열을 입력하세요. 예를 들어 [item=locomotive][item=fluid-wagon] [item=cargo-wagon]은 기관차 - 유체 화물차 - 화물차 기차를 나타냅니다. 다른 모드 화물차를 포함한, 화물차를 나타내는 아이템을 사용할 수 있습니다.
desc=[font=default-bold]허용 목록[/font]을 통해 이 역에 도착할 수 있는 기차 유형을 조정합니다. 이 조합기 모드를 사용하여 허용 목록을 직접 만들고 관리할 수 있습니다.\n\n기차의 레이아웃은 기차의 객차를 앞뒤로 나타내는 팩토리오 서식 텍스트 문자열로 설정할 수 있습니다.
existing-layout-tooltip=알려진 Cybersyn 2 기차 레이아웃 중 선택하여 해당 레이아웃을 허용 목록에 바로 추가합니다.
invalid-layout-string=[color=red]레이아웃 문자열이 잘못되었습니다.[/color]
manual-allow-list=수동 허용 목록
no-layouts=허용된 레이아웃이 없습니다. 입력 상자 또는 선택기를 사용하여 허용 목록에 레이아웃을 추가하세요.
remove-selected=선택한 레이아웃 제거

[cybersyn2-combinator-mode-deliveries]
desc=이 기차역에서 공급/요청되어 이동하는 [font=default-bold]모든 배송[/font] 합계를 아이템/유체 신호 형태로 출력합니다.
include-inbound=요청 포함
include-inbound-tooltip=이 옵션을 선택하면 이 기차역으로 들어오는 모든 출고 배송 합계가 출력에 포함됩니다.
include-outbound=공급 포함
include-outbound-tooltip=이 옵션을 선택하면 이 기차역에 들어오는 모든 입고 배송 합계가 출력에 포함됩니다.
output-signals=배송 화물 및 수량 합계입니다. [font=default-bold]+[/font]값은 배송해야 할 아이템을, [font=default-bold]-[/font]값은 적재해야 할 아이템을 나타냅니다.

[cybersyn2-combinator-mode-delivery-size]
all-fluids=이 기차역의 모든 유체에 대한 적재량을 설정합니다.
all-items=이 기차역의 모든 아이템에 대한 적재량을 설정합니다.\n[font=default-bold]참고:[/font] 이 값은 묶음 설정에 관계없이 항상 묶음 단위로 측정됩니다!
cargo-inputs=이 기차역의 각 화물에 대한 적재량을 설정합니다. 각 화물의 배송 크기가 수신된 신호 값으로 설정됩니다.
desc=기차역에서 배송하려면 [font=default-bold]적재량[/font] 이상의 아이템이 필요합니다. 적재량은 각 아이템에 개별적으로 적용됩니다.
stacks=묶음 단위
stacks-tooltip=비유체 화물 입력에 대해, 묶음 단위로 입력량을 계산합니다.

[cybersyn2-combinator-mode-deprecated]
desc=이 조합기 모드는 더 이상 사용되지 않습니다. 대체 사용법 등에 대한 자세한 내용은 모드 포탈 등 문서를 참조하세요.

[cybersyn2-combinator-mode-inventory]
all-fluids-signal=음수 값일 경우, 사용 가능한 모든 유체를 요청합니다. 신호값은 이 기차역에 저장해야 할 유체량으로 해석됩니다.
all-items-signal=음수 값일 경우, 사용 가능한 모든 아이템을 요청합니다. 신호값은 이 기차역에 저장해야 할 아이템 슬롯 수로 해석됩니다.
desc=기차역의 인벤토리에 대한 추가 입력을 공급합니다. [font=default-bold][color=red]빨간색[/color][/font]/[font=default-bold][color=green]초록색[/color][/font] 전선은 두 개의 독립적인 인벤토리 배송 주문으로 취급됩니다.
network-signals=이 주문에 대한 아이템 네트워크를 설정합니다. 아이템은 0이 아닌 가상 신호 값에 해당하는 아이템 네트워크에 배치됩니다.
priority-signal=이 주문의 우선순위를 설정합니다. 값이 클수록 우선적으로 처리됩니다.

[cybersyn2-combinator-mode-manifest]
desc=정차된 기차의 [font=default-bold]적재/하역 목록[/font]을 아이템과 유체 신호 형태로 출력합니다. 적재/하역 목록 기차에서 희망하는 갯수를 반영하므로, 실제 수량과 다를 수 있습니다.
output-signals=이 기차의 적재/하역 목록 아이템 유형과 수량.+[/font]은 기차가 하역하는 아이템을, [font=default-bold]+[/font]값은 기차가 적재하는 아이템을 나타냅니다.
signal-dropoff=신호: 하역
signal-pickup=신호: 적재
tooltip-dropoff=정차된 기차가 화물을 하역하는 중일 경우 1 값을 출력합니다.
tooltip-pickup=정차된 기차가 화물을 적재하는 중일 경우 1 값을 출력합니다.

[cybersyn2-combinator-mode-station]
auto-mds=최소 배송량 (%)
auto-mds-percent-tooltip=최소 배송 크기로 사용할 요청량 배율 (1~100)
auto-mds-tooltip=이 옵션을 선택하면 이 기차역은 요청량의 특정 비율로 요청 배송량을 자동으로 계산합니다.
cargo=화물
cargo-inbound-only=요청 전용
cargo-outbound-only=공급 전용
cargo-tooltip=공급, 요청 또는 모든 배송을 허용할지 여부를 조정합니다. 스위치를 가운데에 놓으면 모든 유형의 배송이 가능합니다.
default-item-network=기본 아이템 네트워크
green=초록색
network=기본 아이템 네트워크
network-tooltip=이 기차역이 사용할 기본 아이템 네트워크입니다. 특정 요청 또는 공급에 의해 재정의되지 않는 한 모든 요청 및 공급이 해당 네트워크에서만 이루어집니다.
order-signals=화물 요청/공급량을 설정합니다. [font=default-bold]-[/font]값은 요청된 화물을, [font=default-bold]+[/font]값은 공급된 화물을 나타냅니다.
primary-input-wire=기본 입력 전선
priority-signal=이 기차역의 모든 주문에 대한 기본 우선순위를 설정합니다.
provide-all=모든 아이템을 자동으로 공급
provide-all-tooltip=활성화하면, 이 기차역은 공급 모드에 있을 때 전체 인벤토리를 공급합니다. 선택하지 않으면 공급할 화물을 명시적으로 입력해야 합니다.
red=빨간색
topology=토폴로지
topology-tooltip=이 가상 신호를 통해 이 기차역을 특정 토폴로지에 수동으로 할당하도록 할 수 있습니다. 비워두면 기차역 표면상 기본 토폴로지에 기차역이 할당됩니다.
true-inventory-signals=기차역의 실제 인벤토리를 설정합니다. 실제 인벤토리는 이 기차역에 있는 모든 화물의 + 수량입니다. [font=default-bold]기본적인 동작에 필요함[/font]

[cybersyn2-combinator-mode-surface]
desc=조합기가 있는 표면에서 사용 가능한 [font=default-bold]인벤토리 합계[/font]를 출력합니다.
output-mode=출력 모드
output-signals=선택한 인벤토리 유형에 대해 전체 표면에서 사용 가능한 화물 유형 및 수량 합계.
provided=공급됨
pulled=하역됨
pushed=적재됨
sunk=매몰됨

[cybersyn2-combinator-mode-wagon-contents]
desc=연결된 [font=default-bold]화물차의 인벤토리를 실시간으로 읽어옵니다[/font]. 이는 프록시 인벤토리를 사용한, UPS 효율적인 방식으로 수행됩니다.\n\n연결된 화물차는 이 조합기가 연결된 선로에 정차해 있는 차량을 의미합니다.
output-signals=연결된 화물차의 현재 화물 인벤토리

[cybersyn2-combinator-mode-wagon-split]
desc=공급역: 적재/하역해야 하는 화물을 각 화물차에 대해 균등하게 분배한 뒤 목록을 생성, 출력합니다.\n\n요청역: 각 화물차가 도착한 시점의 실제 화물량을 출력합니다.\n\n이 데이터에 접근하려면 각 화물차 옆에 분할 화물 조합기를 설치하세요. 각 조합기는 가장 가까운 화물차의 데이터를 아이템 및 유체 신호 형태로 출력합니다.
output-signals=이 화물차의 적재/하역 목록에 포함된 화물 및 수량. [font=default-bold]+[/font] 신호는 화물차에서 하역할 아이템을, [font=default-bold]-[/font] 신호는 화물차에 적재될 아이템을 나타냅니다.

[cybersyn2-combinator-mode-wagon]
desc=가장 가까운 화물차의 [font=default-bold]적재/하역 목록[/font]을 아이템과 유체 신호 형태로 출력합니다. 적재/하역 목록은 화물차에서 원하는 화물 유형 및 수량을 의미하므로, 실제 화물량과 다를 수 있습니다.
live-wagon-inventory=실시간 화물차 인벤토리
live-wagon-inventory-tooltip=체크하면 가장 가까운 화물차 인벤토리를 실시간으로 읽고 조합기에서 출력합니다.
output-signals=이 화물차의 적재/하역 목록에 적재된 화물과 수량입니다. [font=default-bold]+[/font]값은 하역하는 아이템을, [font=default-bold]-[/font]값은 적재할 아이템을 나타냅니다.
per-wagon-manifest=화물차별 적재/하역 목록
per-wagon-manifest-tooltip=체크하면 공급역의 화물 적재/하역 목록이 화물차 사이에 분할해서 계산되고, 이 조합기에서 가장 가까운 화물차에 대한 적재/하역 목록이 출력됩니다. 요청역일 경우 화물차의 인벤토리 스냅샷이 출력됩니다. 이 옵션을 선택하지 않으면 화물 분할이 수행되지 않고, 적재/하역 목록도 출력되지 않습니다.

