[mod-setting-description]
cybersyn2-setting-debug-level=표시 및 기록할 디버그 정보 수준을 설정합니다.\n\n"NONE"은 로깅을 비활성화합니다.\n"INFO"는 디버그 오버레이를 표시하고 더 많은 정보를 기록합니다.\n"TRACE"은 문제 진단에 유용한 자세한 단계별 정보를 추가로 기록합니다.\n\n주: 이 설정(특히 TRACE)은 성능에 부정적인 영향을 미칩니다. 주의해서 사용하세요.
cybersyn2-setting-default-auto-threshold-percent=경로 요청의 임계값으로 사용할 총 요청량의 기본 비율입니다.
cybersyn2-setting-default-netmask=신호가 정의되지 않은 상황에서 사용할 기본 네트워크 마스크입니다.
cybersyn2-setting-default-train-fullness-percent=기차가 미해결 요청을 배송하기 전에 적재해야 하는 총 기차 화물량의 비율을 조정합니다.
cybersyn2-setting-enable-logistics=전역적으로 믈류 기능을 활성화 또는 비활성화합니다. 비활성화하면 새로운 배송이 예약되지 않습니다.
cybersyn2-setting-excess-delivery-limit=전세계에서 한 역으로 보낼 수 있는 기차 한도를 초과한 배송 요청 지정 가능량을 조정합니다.\n\n이 값은 특정 역을 목적지로 하는 모든 배송에 전세계적으로 적용된다는 점에서 대기열 제한과 다릅니다.\n\n대규모 네트워크일 경우 이 수치를 높여 루프당 더 많은 기차를 사용할 수 있습니다.\n\n이 값을 너무 높게 설정하면 과생산 상황에서 기차 대기열이 과도하게 발생할 수 있습니다.
cybersyn2-setting-queue-limit=정해진 기차 한도를 초과하여 역에 대기할 수 있는 기차의 수입니다. 대기열에 있는 기차는 운행이 가능할 때까지 차고지로 이동될 것입니다. 대규모 네트워크에서 이 수치를 높이면 기차를 배차 루프 외부로 경로를 지정하여, 응답 속도를 향상시킬 수 있습니다.
cybersyn2-setting-train-requester-prod-interval=요청역에서 대기 중인 기차에 'prod' 이벤트가 전송되는 간격입니다. 0으로 설정하면 해당 이벤트를 전송하지 않습니다.\n\n참고: "prod"는 외부 모드와 플러그인에서 기차 멈춤 문제를 해결하기 위해 사용할 수 있는, 사용자 지정 팩토리오 이벤트입니다. Cybersyn 자체는 이 이벤트를 처리하지 않습니다.
cybersyn2-setting-train-stuck-time=기차가 대기열에서 대기 중이 아닌, 배달 중이고 이 시간 동안 움직이지 않으면 기차가 멈춘 것으로 간주됩니다. (연료를 보급하거나 차량기지로 이동 중인 기차에는 적용되지 않습니다.)
cybersyn2-setting-vehicle-warmup-time=차량이 제작 후 배송을 시작할 때까지 대기하는 시간(초)입니다. 이는 봇이 배송을 시작하기 전에 기차 제작 및 연료 공급을 완료할 시간을 주기 위한 것입니다.
cybersyn2-setting-warmup-time=기차역이 건설된 후 배송을 받을 수 있게 되기까지 기다릴 시간을 조정합니다 (초 단위). 이는 배송을 시도하기 전에 로봇이 기차역을 완전히 건설하도록 할 수 있도록 하기 위한 것입니다.
cybersyn2-setting-work-factor=Cybersyn의 백그라운드 작업에서 각 주기마다 수행할 작업량을 조정합니다.\n\n이 숫자는 주기당 작업량에 대한 일반적인 배율 역할을 하며, 1은 기본값, 2는 두 배의 작업을, 0.5는 절반의 작업을 처리함을 의미합니다.\n\n끊김 현상이 있는 경우 숫자를 낮추면 성능이 향상될 수 있습니다. 숫자가 클수록 대용량 기지에서 응답 속도가 향상될 수 있습니다.
cybersyn2-setting-shared-inventory-prefer-parallel=활성화하면, 고급 공유 인벤토리 기능을 사용하는 정류장이 업데이트 주기당 한 번의 배송만 받도록 하여, 기차가 단일 역에서 대기하는 대신 모든 공유 정류장을 거쳐 병렬로 운행하도록 합니다.\n\n매우 큰 기지의 경우, 이 설정을 비활성화하면 배송 주기당 더 많은 배송을 지정할 수 있어 처리량을 향상시킬 수 있지만, 기차가 단일 역에서만 대기하는 경향이 생길 수 있습니다.\n\n메가베이스를 운영 중이거나 이로 인해 발생하는 병목 현상을 구체적으로 확인한 경우가 아닐경우, 이 설정을 활성화된 상태로 유지하는 것을 권장합니다.