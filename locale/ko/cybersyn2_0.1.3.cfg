[cybersyn2-combinator-orders]
flags=플래그
item-network=아이템 네트워크
item-network-tooltip=이 배송 주문에 대한 아이템 네트워크입니다. '각' 가상 신호로 설정하면 모든 입력 가상 신호가 아이템 네트워크로 취급되고 해당 값이 넷마스크로 사용됩니다.
mitigate-starvation=아이템 요청에 대한 굶주림 완화
mitigate-starvation-tooltip=이 옵션을 선택하면 이 주문에 대한 요청이 굶주림 현상 방지를 위한 특별 처리를 받게 됩니다. 매몰 또는 폐기 주문과 같은, 해당 현상 영향을 받지 않는 배송 주문일 경우 비활성화하세요.
network-matching-mode=네트워크 일치 모드
network-matching-mode-tooltip=이 주문에 대한 네트워크 일치를 확인할 방법을 정의합니다.\n\n[font=default-bold]OR[/font]: 요청 주문에 공급 주문과 동일한 네트워크가 지정된 상태일 경우 일치하는 것으로 간주합니다.\n\n[font=default-bold]AND[/font]: 요청 주문이 공급 주문과 네트워크를 전부 공유해야 일치로 간주됩니다.\n\n요청 주문이 항상 네트워크 일치 모드를 결정합니다.
order-settings=배송 설정
round-to-stacks=묶음 수량 반올림
round-to-stacks-tooltip=이 옵션을 선택하면 이 주문에 대한 배송량은 가장 가까운 전체 묶음 단위로 반올림됩니다. 참고: 이는 1묶음 미만의 배송이 처리되지 않음을 의미합니다.
stacked-requests=묶음 단위 요청
stacked-requests-tooltip=이 옵션을 선택하면 모든 요청량이 아이템 개수가 아닌 아이템 묶음 단위로 해석됩니다.

[cybersyn2-commands]
debugger-command-help=Cybersyn 디버거 창 열기
log-all-command-help=모든 Cybersyn 상태 메시지를 콘솔에 기록합니다. 많은 양의 출력이 생성되므로 일반적인 상황일 경우 권장되지 않습니다.
restart-command-help=Cybersyn 2 종료 후 재시작
shutdown-command-help=Cybersyn 2를 종료합니다. 권장하지 않지만, 강제 종료를 진행하기 위해 `/cs2-shutdown force`를 사용할 수도 있습니다. [color=yellow]사용하기 전에 게임을 저장하고 백업하세요![/color]

[cybersyn2-gui]
allow-bidi-tooltip=전진 및 후진 기관차가 모두 있는 기차만 허용합니다.
allow-bidi-description=양방향 기차만
allow-list=허용 목록
allow-mode=허용 모드
allow-mode-all=모든 기차
allow-mode-auto=자동
allow-mode-group=그룹
allow-mode-layout=레이아웃
allow-strict-tooltip=역 적재 설비와 맞는 충분한 차량이 있는 기차만 허용합니다.
allow-strict-description=엄격한 허용 목록
