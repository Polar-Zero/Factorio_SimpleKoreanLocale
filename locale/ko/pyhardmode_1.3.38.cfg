[pywiki-descriptions]
beacon=[entity=beacon-AM1-FM1]과 [entity=diet-beacon-AM1-FM1]은 무선 신호를 이용해, 자신의 모듈 효과를 근처의 조립 기계로 전송합니다. 각 신호기에는 전송 범위, 전송 효율 및 전력 사용량을 결정하는 AM 및 FM 주파수가 모두 포함합니다.\nAM 및 FM 주파수 슬라이더 범위는 1~5 사이에서 변경할 수 있습니다.\n\n[entity=diet-beacon-AM1-FM1]\n전송 범위:\n - AM1: 32\n - AM2: 24\n - AM3: 16\n - AM4: 8\n - AM5: 2\n전송 효율: 0.1 * AM * FM\n전력 소비량: AM * (FM ^ 3) / 2 MW\n\n[entity=beacon-AM1-FM1]\n전송 범위:\n - AM1: 64\n - AM2: 48\n - AM3: 32\n - AM4: 16\n - AM5: 2\n전송 효율: 0.2 * AM * FM\n전력 소비량: AM * (FM ^ 3) MW\n기본 1AM 1FM 신호기를 이용하면 넓은 범위에 효율적으로 전송할 수 있습니다.\n두 신호기의 AM:FM 주파수가 동일한 경우 신호가 간섭하여 서로 상쇄됩니다.\n또한 신호기에 [item=productivity-module-3]과 같은 생산 모듈을 투입할 수 없습니다.
heat=확장된 열역학은 pY 고난이도 모드의 주요 조정 사항입니다. 여러 건물이 작동하려면 이제 열이 필요합니다. 건물마다 필요한 온도가 다르며 [entity=incubator-mk01]와 [entity=simik-den-mk01]을 제외한 건물은, 티어가 높아질수록 필요한 최소 온도가 증가합니다.\n\n또한 다음 건물이 이제 열을 필요로 합니다:\n[entity=incubator-mk01]: 200°C\n[entity=advanced-foundry-mk01]: 450°C\n[entity=rhe]: 350°C\n[entity=simik-den-mk01]: 4500°C\n[entity=heavy-oil-refinery-mk01]: 750°C\n[entity=cracker-mk01]: 750°C\n\n열을 발생시키려면 [entity=py-burner]부터 시작합니다. 이전에는 폐기물을 재로 변환하는 장치였지만, 500°C를 낼 수 있는 식물 연료 열 발전기로 용도가 변경되어 [entity=incubator-mk01]와 [entity=advanced-foundry-mk01]에 전력을 공급하는 데 사용할 수 있습니다.\n다음으로는 용융염 대신 열을 출력하도록 재작업된 [entity=py-coal-powerplant-mk01]로 진행합니다. MK 01은 1000°C에 도달하여 [entity=cracker-mk01]와 [entity=heavy-oil-refinery-mk01]을 구동할 수 있습니다.\n다른 열원으로는 최소 1000°C가 필요한 [entity=nuclear-reactor], [entity=simik-den-mk01]에 사용할 수 있는, 5000°C까지 지원하는 [entity=py-rtg]이 있습니다.\n몇 가지 팁:\n- 열 파이프 사용 시 먼 거리를 운송하게 되면 온도가 급격히 떨어집니다.\n- 열 생산기가 충분한 열을 생산하지 못하거나 거리에 따라 너무 많은 열이 손실되면 제작 속도가 감소됩니다.
wyrmhole=당신은 매우 빠르면서도 유순한 거대 땅벌레 종을 만들었습니다. 이 땅벌레는 다른 [entity=wyrmhole] 건물 사이에 아이템을 즉시 옮길 수 있으며, 해당 건물이 같은 땅벌레의 식별자와 맞춰져 있다면 가능합니다.\n\n체크박스의 고리를 이용해 특정 식별자를 선택하여, 체크박스의 체크 및 체크 해제 패턴에 따라 다른 땅벌레와 연결시킬 수 있습니다. 또한 땅벌레가 해당 땅벌레와 맞춰져 있지 않은 경우 해당 땅벌레에 다시 맞춰서 아이템을 가져올 수 있습니다.\n\n[entity=wyrmhole] 200MW의 전력이 지속적으로 필요합니다.

