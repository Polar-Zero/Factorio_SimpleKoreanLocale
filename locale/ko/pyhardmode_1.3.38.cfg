pyhm-replace-sinkhole-with-outfall=4}를 __ENTITY__pyhm-outfall__로 변경합니다. __ENTITY__pyhm-outfall__는 물 위에만 배치할 수 있습니다.
pyhm-resource-rocks-disallow-building-over=활성화하면 [entity=iron-rock]__ENTITY__iron-rock__와 같은 자원 암석 위에 드릴 이외의 구조물을 지을 수 없습니다.\n\n"바위 위에 벨트나 철도라니요?"