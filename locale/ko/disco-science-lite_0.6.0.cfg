[mod-name]
disco-science-lite=간소화된 디스코 연구소(Disco Science Lite)

[mod-description]
disco-science-lite=과학 연구소가 항상 파란색이 아닌 소비 중인 과학 팩에 맞는 조명 색상을 사용하도록 합니다.\n\nA Daniel Brauer의 원본 Disco Science 모드의 변형으로, UPS 성능 개선을 위한 알고리즘 최적화, 바이오 연구소를 포함한 우주 시대 DLC를 지원하도록 수정되었습니다.\n\n번역: SimpleKoreanLocale(PolarZero)


[string-mod-setting-description]
mks-dsl-color-update-preset-balanced=품질과 성능 사이의 균형을 맞춥니다. 대부분의 상황에 권장됩니다.
mks-dsl-color-update-preset-performance=UPS 우선 순위. 대규모 기지에 대해 연구소 갱신 간격을 적극적으로 줄입니다.
mks-dsl-color-update-preset-smooth=최고의 시각적 품질. 더 자주 업데이트되지만 많은 연구소가 있을 경우 UPS 성능에 영향을 줄 수 있습니다.

[string-mod-setting]
mks-dsl-color-update-preset-balanced=균형
mks-dsl-color-update-preset-performance=성능
mks-dsl-color-update-preset-smooth=품질

[mod-setting-name]
mks-dsl-color-brightness=밝기 (%)
mks-dsl-color-pattern-duration=패턴 지속시간 (틱)
mks-dsl-color-saturation=채도 (%)
mks-dsl-color-update-preset=애니메이션 품질
mks-dsl-fallback-overlay-enabled=지원되지 않는 연구소에 자동 색상 사용
mks-dsl-is-development=개발 모드 활성화
mks-dsl-lab-blinking-disabled=연구소 깜박임 비활성화
mks-dsl-rainbow-mode=무지개 색상 사용

[mod-setting-description]
mks-dsl-color-brightness=연구소 조명이 얼마나 밝게 표시되는지 조정합니다.\n값이 낮을수록 더 어두워집니다.__ITEM__skl-txtra0__100%__ITEM__skl-txtre__
mks-dsl-color-pattern-duration=색상 패턴이 다음  패턴으로 전환되기 전에 지속할 시간(게임 틱)\n많은 연구소가 함께 그룹화될 때 색상 패턴이 가장 잘 보입니다.__ITEM__skl-txtra0__180틱 (3초)__ITEM__skl-txtre__
mks-dsl-color-saturation=연구소 조명이 얼마나 선명하도록 할지 조정합니다.\n값이 낮을수록 색상이 회색에 가까워집니다.__ITEM__skl-txtra0__100%__ITEM__skl-txtre__
mks-dsl-color-update-preset=연구소 애니메이션의 업데이트 빈도를 조정합니다.\n업데이트 빈도는 화면에 표시되는 연구소 갯수에 따라 자동으로 조정됩니다.__ITEM__skl-txtra0__균형__ITEM__skl-txtre__
mks-dsl-fallback-overlay-enabled=활성화하면 공식적으로 지원되지 않는, 모드에서 추가한 연구소에 일반 글로우 효과를 이용한 색상을 지정합니다.\n연구소의 원본 이미지를 유지하려면 비활성화하세요.
mks-dsl-is-development=개발 모드 활성화 여부를 전환합니다.
mks-dsl-lab-blinking-disabled=이 옵션을 활성화하면, 기본 게임 팩토리오 연구소의 깜박임 애니메이션을 없앱니다.\n깜박임이 산만하다고 생각된다면 활성화하세요.
mks-dsl-rainbow-mode=활성화하면 소모되는 과학 팩과 무관하게 무지개색 이미지를 연구소에 사용합니다.