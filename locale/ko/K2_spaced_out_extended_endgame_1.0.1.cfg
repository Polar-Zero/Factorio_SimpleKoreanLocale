kee-initial-need-singularity-research=은하간 송수신기를 활성화할 때마다 필요한 자원은 이 기준값에서 2배씩 복리로 증가합니다.__ITEM__skl-txtra0__1000, 10회 활성화 시 1,024,000까지 증가__ITEM__skl-txtre__
kee-initial-need-space-research=은하간 송수신기를 활성화할 때마다 필요한 자원은 이 기준값에서 2배씩 복리로 증가합니다.__ITEM__skl-txtra0__250, 10회 활성화 시 256,000까지 증가__ITEM__skl-txtre__