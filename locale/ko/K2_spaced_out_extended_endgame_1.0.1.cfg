[mod-description]
K2_spaced_out_extended_endgame=크라스토리오2의 은하간 송수신기로 안정적인 특이점을 만드는 시점의, 많은 연구와 에너지를 투자해야 하는 게임의 마지막 단계를 연장합니다.\n\n번역: SimpleKoreanLocale(PolarZero)


