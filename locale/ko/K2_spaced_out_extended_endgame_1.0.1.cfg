[entity-description]
kee-intergalactic-transceiver-loading=다음 활성화 시도에 사용할 과학 데이터를 투입하세요. [color=red]주의:[/color] 활성화되면 초과 투입된 자원이나 아이템은 모두 소멸합니다.
kee-intergalactic-transceiver-test-fire=현재 특이점 생성 이론과 봉쇄장의 무결성을 검증하기 위해 시험 발사를 진행합니다.


[item-name]
kee-intergalactic-transceiver-loading=은하간 송수신기
kr-intergalactic-transceiver=은하간 송수신기

[item-description]
kee-intergalactic-transceiver-loading=이 건물은 은하 간 송수신에 사용할 수 있는, 제어된 특이점을 생성합니다. 이는 이 은하에서 구조될 수 있는 유일한 방법이지만, 안정적이고 통제된 특이점을 만드는 과정은 위험하며 엄청난 연구와 에너지가 필요할 것입니다.

[technology-description]
soe-kr-intergalactic-transceiver=은하간 송수신기를 잠금 해제합니다. 먼 은하와 송수신할 수 있는 특이점을 생성하고 게임에서 승리하세요.

