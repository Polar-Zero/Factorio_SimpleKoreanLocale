[mod-setting-description]
kee-activations=은하간 송수신기가 활성화되어 게임에서 승리하기까지 몇 번의 시험이 필요한지 정의합니다. 활성화할 때마다 더 많은 에너지가 필요하며 필요 자원 역시 2배씩 복리로 늘어납니다. (권장값: 10)
kee-initial-need-advanced-research=은하간 송수신기를 활성화할 때마다 필요한 자원은 이 기준값에서 2배씩 복리로 증가합니다.__ITEM__skl-txtra0__1000, 10회 활성화 시 1,024,000까지 증가__ITEM__skl-txtre__
