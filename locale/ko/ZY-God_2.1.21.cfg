[mod-name]
ZY-God=ZY 신 모드(ZY-God)

[mod-description]
ZY-God=마우스 오른쪽 버튼: 플레이어(순간이동)\n마우스 왼쪽 버튼: 20x20 범위 피해 (번개)\nALT+1: 텔레포트 배열 활성화/비활성화\nALT+2: 번개 활성화/비활성화 ALT+3: 화면 확대 x0.25. 플레이어가 마우스 오른쪽 버튼을 눌러 순간이동하거나, 마우스 왼쪽 버튼을 눌러 번개를 난사할 수 있도록 합니다. 원격 보기에서도 번개를 방출하여 적을 죽일 수 있으며, 2.0 우주 시대를 지원합니다.\n\n번역: SimpleKoreanLocale(PolarZero)