[tips-and-tricks-item-description]
hyarion-briefing=[planet=hyarion]은 수정과 용암으로 이루어진 행성으로, 빛의 굴절 현상으로 인해 하늘에서 만들어진 광선이 지표면을 폭격합니다.\n[tile=lava]에 직접 아이템을 투입하여 남는 부산물 아이템을 제거하는 것이 가능합니다.\n하리온에서는 자체적인 로켓 격납고와 로켓 부품 제작법을 이용해야 합니다.
hyarion-refraction=[planet=hyarion]에서는 독특한 전력 발전 방식이 사용됩니다.\n1. [entity=planetaris-big-refraction-ray-collector]로 [fluid=planetaris-refraction-light]를 수집한 뒤, [entity=planetaris-fiber-optics-cable]로 운송합니다.\n2. [entity=planetaris-refraction-plant]로 운송한 [item=planetaris-fluorite]와 [fluid=planetaris-refraction-light]를 혼합하여 [fluid=planetaris-pure-light]를 제작한 뒤, [entity=planetaris-refraction-generator]에 투입하세요.\n[item=planetaris-charged-fluorite]를 제작하여 배럴과 비슷한 방식으로 생산된 굴절 에너지를 원하는 곳으로 이동시키는 것도 가능합니다.
hyarion-unstable-gem=[item=planetaris-unstable-gem]는 [item=cliff-explosives]의 개선된 버전으로, 더 넓은 범위와 추가적인 파괴력을 가졌습니다.

