[entity-description]
hyarion-geode-mining-drill=정동에서 보석 원석을 추출하는 데 사용되는 특수목적 채광 드릴입니다.
planetaris-beryllium-coating=더 튼튼한 소행성 방어벽
planetaris-big-refraction-ray-collector=굴절 광선을 끌여들이고, 들어온 광선 단위마다 8 단위의 [fluid=planetaris-refraction-light]을 저장합니다
planetaris-particle-manipulator=입자를 재배열하여 다양한 재료를 생성합니다.
planetaris-polisher=보석 원석을 연마합니다.
planetaris-refraction-plant=빛을 보석으로 가공합니다.
planetaris-refraction-ray-collector=굴절 광선을 유도합니다.
planetaris-space-manufacturer=저중력 환경을 활용한 특별한 아이템을 제작합니다. 주변에 넓은 우주 플랫폼 공간이 필요함.
planetaris-electromagnetic-radar=전자기장을 이용하여 더 빠르고 더 먼 영역을 탐색할 수 있는 레이더입니다.
planetaris-ruby-laser-turret=더 효율적으로 더 많은 피해를 주는 레이저 포탑이지만, 가까운 거리를 공격할 수 없습니다.
planetaris-zero-grav-accumulator=무중력 환경에서 더 많은 전력을 저장할 수 있는 개선된 축전지입니다.
hidden-big-refraction-ray-collector-tank=[fluid=planetaris-refraction-light]를 저장합니다, 참고: 빛은 광섬유 케이블을 이용해 추출할 수 있습니다.
planetaris-fiber-optics-cable=[fluid=planetaris-refraction-light], [fluid=planetaris-pure-light]을 운송합니다.
planetaris-refraction-generator=[fluid=planetaris-pure-light]을 커다란 형석 수정 내에서 굴절시켜 전력을 생산합니다.

