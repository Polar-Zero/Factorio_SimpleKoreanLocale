[technology-description]
planet-discovery-hyarion=수정과 용암으로 이루어진 행성으로, 빛의 굴절 현상으로 인해 하늘에서 만들어진 광선이 지표면을 폭격합니다. (경고: 이 행성에 대한 화물 투하는 추후 연구를 완료할 때까지 잠겨 있습니다.)
planetaris-advanced-raw-quartz=보다 효율적인 원시 석영 제작법을 배워보세요.
planetaris-automation-4=더 빠른 조립 기계 사용이 가능합니다
planetaris-beryllium-processing=베릴륨을 생산할 수 있습니다.
planetaris-big-refraction-ray-collector=대형 굴절광선 집광기를 발견합니다.
planetaris-diamond-polishing=다이아몬드를 연마할 수 있습니다.
planetaris-geode-mining-drill=정동으로부터 보석을 추출할 수 있는 드릴을 제작할 수 있습니다.
planetaris-geode-processing=루비, 사파이어를 연마할 수 있습니다.
planetaris-Logistics-4=더 빠른 벨트 사용이 가능합니다.
planetaris-metallic-ore-processing=금속 광석을 채광하고 처리할 수 있게 됩니다.
planetaris-nanoscale-lens=나노스케일 렌즈를 제작할 수 있습니다.
planetaris-particle-manipulation=입자 조작와 관련된 메커니즘을 배워보세요.
planetaris-polishing=연마제를 사용하여 원석을 광택이 나는 보석으로 바꿔보세요.
planetaris-polishing-science-pack=연마에 대해 더 자세히 알아보세요. 하리온 로켓 격납고와 관련 부품 제작법 사용이 가능합니다.
planetaris-quartz-furnace=석영 용광로를 제작할 수 있게 됩니다.
planetaris-refraction-science-pack=굴절에 대해 더 자세히 연구할 수 있도록 합니다.
planetaris-ruby-laser=루비 레이저를 제작할 수 있게 됩니다.
planetaris-simulating-unit=시뮬레이션 유닛을 제작할 수 있습니다.
planetaris-space-facilities=우주선을 확장하여 멀고 위험한 곳까지 도달해보세요.
planetaris-bismuth-processing=비스무트 소행성을 분쇄하고 연마할 수 있게 됩니다.
planetaris-refraction-plant=빛을 보석으로 가공하고, 빛을 걸러내거나 이를 통한 전력 발전이 가능합니다.
planetaris-unstable-gems=불안정한 보석이 지닌 위험성을 알아보세요.

