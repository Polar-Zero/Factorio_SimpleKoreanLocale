[entity-description]
biterSupressor1-rampant=일시적으로 떠난 행성의 위협을 줄이기 위해 설계됨[color=green]\nRampant 인공지능의 공격 빈도를 3배 감소시킵니다. 방어선이 돌파될 경우 대규모 공격을 방지합니다[/color]\n디몰리셔, 공해로 인한 공격, 산란장 파괴로 인한 반응에 영향을 주지 않습니다.[color=red]\n플레이어가 물리적으로 해당 행성에 존재하는 상태일 경우 긍정적인 효과가 적용되지 않으며,\n2개 이상 설치해도 긍정적인 효과는 중첩되지 않습니다[/color]
biterSupressor2-rampant=일시적으로 떠난 행성의 위협을 줄이기 위해 설계됨\n이전 버전의 기능을 포함하며, 추가로:[color=green]\n디몰리셔 공격 사이의 간격을 1.5배 증가시킵니다. 먹이 효과에도 적용됩니다\nRampant 인공지능이 제어하는 공격 부대의 최대 규모를 절반으로 줄입니다.[/color]
biterSupressor3-rampant=일시적으로 떠난 행성의 위협을 줄이기 위해 설계됨\n이전 버전의 기능을 포함하며, 추가로:[color=green]\n전력이 지속적으로 100% 공급될 경우, 해당 행성의 진화 요인이 증가하지 않습니다.[/color]
lootStone_Combat5-rampantFixed=전리품이 가득 담긴 돌\n채광 또는 파괴하세요
regenerationCrystal-rampantFixed=[color=green]채굴 가능\n활성화하면 아군 플레이어에 재생 효과를 부여합니다\n진화가 50%+, 70%+일 때 효과가 3배로 증가합니다[/color][color=red]\n버프 활성화시 파손될 수 있음[/color]

