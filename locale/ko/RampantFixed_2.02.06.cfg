[mod-description]
RampantFixed=Rampant 1.1.1을 기반으로 해 수정한 모드입니다.(새로운 AI와 적 추가) \n 1. 더 먼 거리에서 공격할 수 있습니다. 또한 방어 건물이 있는 상황에서의 경로 탐색을 개선합니다. 기본적으로 전체 지도까지 탐색하지는 않습니다 \n 2. 기존 산란장이 이제 변형될 수 있습니다. 다른 적군 산란장과 조합될 수 있습니다. 이는 글레바와 불카누스에서 작동합니다.\n\n번역: SimpleKoreanLocale(PolarZero) [번역 진행중]
RampantFixedRemote=원격 인터페이스 테스트에 사용할 수 있는 몇 가지 명령어를 추가합니다.\n\n번역: SimpleKoreanLocale(PolarZero)


