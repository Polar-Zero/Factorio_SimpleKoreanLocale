[item-description]
biterSupressor1-rampant=일시적으로 떠난 행성의 위협을 줄이기 위해 설계됨[color=green]\nRampant 인공지능의 공격 빈도를 3배 감소시킵니다. 방어선이 돌파될 경우 대규모 공격을 방지합니다[/color]\n디몰리셔, 공해로 인한 공격, 산란장 파괴로 인한 반응에 영향을 주지 않습니다.[color=red]\n플레이어가 물리적으로 해당 행성에 존재하는 상태일 경우 긍정적인 효과가 적용되지 않으며,\n2개 이상 설치해도 긍정적인 효과는 중첩되지 않습니다[/color]
biterSupressor2-rampant=일시적으로 떠난 행성의 위협을 줄이기 위해 설계됨\n이전 버전의 기능을 포함하며, 추가로:[color=green]\n디몰리셔 공격 사이의 간격을 1.5배 증가시킵니다. 먹이 효과에도 적용됩니다\nRampant 인공지능이 제어하는 공격 부대의 최대 규모를 절반으로 줄입니다.[/color]
biterSupressor3-rampant=일시적으로 떠난 행성의 위협을 줄이기 위해 설계됨\n이전 버전의 기능을 포함하며, 추가로:[color=green]\n전력이 지속적으로 100% 공급될 경우, 해당 행성의 진화 요인이 증가하지 않습니다.[/color]
demolisher-food-rocket-rampant=공격 중인 파괴자를 향해 발사하면, 최소 2시간 동안 다시 돌아오지 않게 됩니다. 대형 디몰리셔의 경우 더 많이 먹어야 할 수 았습니다.
powerup-Combat5min-Capsule-rampantFixed=플레이어가 직접 Rampant 산란장을 파괴할 때 드물게 획득 가능\n근접해서 파괴할수록 확률이 등장 확률이 증가됩니다. (90<70<40<20<15)[color=green]\n사용시 플레이어에게 5분 동안 강화 효과 부여: \n - 무한 탄창(2개 이상일 경우) \n - 바이터 일격 처치 (물리 및 폭발 피해에만 해당) \n - 체력 4,000 이상의 바이터에게는 즉사 대신 피해만 증가[/color][color=red]\n메인 인벤토리에 탄약이 있을 경우, 해당 탄약이 대신 소모[/color]
regenerationCrystal-rampantFixed=플레이어가 Rampant 산란장을 20 거리보다 가까이에서 에서 파괴할 때 드물게 획득 가능 \n작은 레이더처럼 작동하지만 전력이 필요하지 않음[color=green]\n5초마다 한 번, 주변 플레이어에게 재생 효과 1분을 부여\n버프를 처음 적용한 이후 무적 상태가 됩니다[/color][color=red]\n버프 적용 이후 1% 확률로 파괴됩될 수 있음 (대상 수와 무관)[/color]
unstable-feeding-reactor-rampant=설치 시 폭발한 다음 다량의 미사일을 방출합니다. 디몰리셔들은 8시간 동안 접근하지 않게 됩니다. "매우 위험함"

