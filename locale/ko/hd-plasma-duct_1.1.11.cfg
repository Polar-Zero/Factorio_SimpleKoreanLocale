[mod-name]
hd-plasma-duct=HD 플라즈마 배관(HD Plasma Duct)

[mod-description]
hd-plasma-duct=플라즈마 배관, 더 유연한 융합 설정과 융합된 플라즈마를 사용하는 모드를 위한 플라즈마 배관을 이제 HD 고화질로 만나보세요!\n\n번역: SimpleKoreanLocale(PolarZero)


[entity-name]
plasma-duct=플라즈마 배관

[entity-description]
plasma-duct=기계 사이로 플라즈마 운송이 가능한 배관입니다.

[hd-plasma-ducts]
hd-mod=HD-plasma-ducts와 구형 plasma-ducts 모드를 둘 다 활성화한 상태인 것 같습니다! 오래된 플라즈마 배관 모드는 더이상 사용되지 않으며 다른 모드와 호환성 문제를 일으킬 수 있으므로 비활성화하는 것을 권장합니다.

