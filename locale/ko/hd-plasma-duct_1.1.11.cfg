[technology-description]
plasma-duct=이 연구를 완료하면, 기계 간에 [fluid=fusion-plasma]을 운송하는 플라즈마 배관을 제작 및 사용할 수 있습니다.

[mod-setting-name]
duct-extend=플라즈마 배관 최대 확장 범위
fusion-unlock=핵융합 연구와 잠금 해제
pink-plasma=플라즈마 파이프 표시 색상 변경
super-cheap=매우 저렴한 제작 모드

[mod-setting-description]
duct-extend=Factorio 2.0 이후 파이프망을 일정 크기 이상으로 늘리면 펌프가 필요하도록 지정되어 있습니다. 이 설정은 플라즈마 배관에 대한 크기 최대값을 조정합니다. 기본 게임 파이프에 대한 기본값: 320. 기본값: 32
fusion-unlock=핵융합 연구가 완료되는 시점에 플라즈마 배관을 사용할 수 있도록 합니다. "plasma duct tweak"에서 가져왔습니다. 프로메튬을 좋아하지 않는다면 활성화하세요.
pink-plasma=일반적으로 파이프 내부의 플라즈마는 추진기 산화제와 매우 유사한 진한 파란색으로 표시되며, 이는 플라즈마의 분홍색 아이콘과 충돌합니다. 이 설정을 활성화하면 분홍색으로 표시됩니다.
super-cheap=플라즈마 배관 제작이 매우 저렴하도록 합니다: 텅스텐 5개, 초전도체 5개 -> 플라즈마 배관 10개. "plasma duct tweak"에서 가져왔습니다. 비활성화하는 것을 권장합니다.