warptorio-reactor=Research, construct and repair the components neccessary to rebuild the 워프 반응로 and perfect its functionality to return home. Each level adds 10 minutes to the Auto-Warp Timer, Warp Pre-Charge ticks 1 sec faster, and may have other effects.
warptorio-reactor-6=Research, construct and repair the components neccessary to rebuild the 워프 반응로 and perfect its functionality to return home. Each level adds 10 minutes to the Auto-Warp Timer, Warp Pre-Charge ticks 1 sec faster, and may have other effects. This level spawns the physical 워프 반응로 and disables the Autowarp Timer.
