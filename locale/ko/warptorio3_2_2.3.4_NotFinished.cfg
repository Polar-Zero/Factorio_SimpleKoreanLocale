warptorio-accumulator=These accumulators balance power between the warp platform and ALL warp accumulators, allowing increased energy throughput between the platform floors.
warptorio-alt-combinator=This adds static combinators to the Harvester platforms that automatically connect when harvesters are recalled. Useful for advanced automation.
warptorio-armor=Perfection of the defensive applications of the 워프 반응로 and its technologies.
