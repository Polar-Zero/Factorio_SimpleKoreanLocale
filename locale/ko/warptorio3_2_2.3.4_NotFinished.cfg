[entity-description]
warptorio-carebear-chest=혼자 가는 건 위험하니, 이걸 가져가세요.
warptorio-heatpipe=모든 워프 열 파이프와 워프 반응로 사이의 열 균형을 유지합니다
warptorio-reactor=워프 반응로는 실패한 실험입니다. 출력도 약한데다, 차원 간 균열에서 끌어오는 에너지보다 더 많은 에너지를 빼앗기는 것 같습니다. 게다가 매우 불안정하여 관리하지 않으면 행성 전체를 파괴할 것입니다. 서둘러 로켓을 발사해 이곳을 탈출하세요!
warptorio-warploader=필터에 따라 다른 모든 워프 적재기에 아이템을 분배합니다.
warptorio-warponium-fuel-cell=워프 반응로에 사용할 수 있는 유일한 연료 유형입니다.

