[planet-description]
average=평범한 자원, 안정적인 날씨. 작업하기에 적합합니다.
barren=물이 거의 없으며 땅 역시 매마릅니다. 비록 가혹한 환경이지만 돌은 좀 남아있는 것 같습니다.
biter=뭔가 무리지어 있습니다. 바이터 군단이 당신보다 먼저 도착한 것 같습니다.
coal=두터운 석탄층. 발전과 제련 단지 조성에 적합합니다.
copper=구리 광맥이 지평선 너머까지 감싸고 있습니다. 사방이 회로로군요.
dwarf=뚜렷한 경계가 있는 초소형 세계. 말 그대로 절벽 너머에 땅이 없습니다.
iron=철로 이루어진 산. 강철 수급은 더 이상 문제가 아니군요.
jungle=우거진 나무와 무성한 숲. 시야 확보는 사치입니다.
midnight=영원한 황혼. 바이터들이 특히 좋아합니다.
normal=익숙한 나우비스와 같은 지형입니다. 특별해보이는 것은 없습니다. - 아직
ocean=얕은 바다와 약간의 섬. 매립을 준비하세요.
oil=끈적끈적한 기름 바다와 원유 더미. 발밑을 조심하세요.
polluted=스모그, 오염된 물, 독극물. 지저분하지만 공장 건설이 불가능하진 않습니다.
rich=자원 광맥들이 모여있는 곳. 운이 좋은 발견을 할 수 있습니다.
rogue=찢어진 지형과 불규칙한 시작 지점. 포탑을 늘 가까이 하는 것을 권장합니다.
stone=끝없는 바위와 잔해. 채취할 수만 있다면, 콘크리트 도배 역시 가능합니다.
uncharted=불안정한 워프 상태로 인해; 스캐너로는 거의 식별할 수 없는 지역입니다.
uranium=뜨거운 바위와 녹색 빛. 조심하십시오.

