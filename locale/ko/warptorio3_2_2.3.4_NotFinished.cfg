[mod-setting-tooltip]
warptorio_ability_cooldown=Base cooldown between ability uses. Default 5 minutes.
warptorio_ability_drain=While an ability is active, it drains this fraction of platform energy each tick (60 ticks = 1 second). Default 0.00001 ≈ 0.06% per second.
warptorio_ability_timegain=Each ability use adds this many minutes to the next cooldown. Default 2.5. Discourages spamming.
warptorio_ability_warp=Cooldown before reactor abilities (Stabilizer, Accelerator, Scanner) can be used after warping. Default 2 minutes.
warptorio_autowarp_time=Base time before auto-warp triggers. Each warptorio-reactor research level adds 10 minutes. Default 20.
warptorio_biter_expansion=Higher = biter bases expand faster over time. Default 1.009 (mild). Max 2 = aggressive.
warptorio_biter_max=Initial expansion timer; speeds up via the expansion-rate setting. Default 15 minutes.
warptorio_biter_min=Hard floor on how often biters can expand. Default 5 minutes.
warptorio_biter_redux=How much the expansion timer can be reduced over the game's duration. Default 1 minute.
warptorio_biter_wavemax=Initial chance (1 in X per second) right after a warp. Bigger X = rarer. Reduces toward `wavemin` over time. Default 7000.
warptorio_biter_wavemin=Floor on chance (1 in X per second). Smaller X = MORE frequent attacks. Wave chance reduces toward this floor over time. Default 700 (= 1-in-700-per-second is the max attack rate).
warptorio_biter_waverng=How fast the wave chance ramps up toward `wavemin` per minute. Higher = waves get intense faster. Default 10.
warptorio_biter_wavesize=Wave packs grow by this many biters per minute on a planet. Default 1 (slow scaling), set 5 for fast escalation.
warptorio_biter_wavesizemax=Cap on wave-pack size. 0 = no cap. Default 500.
warptorio_biter_wavestart=Free time after warping before any wave attacks can spawn. Default 5 minutes.
warptorio_carebear=Drops a chest at game start with stone, plates, gears, gun, ammo, and basic factory pieces. For new players or beginner runs.
warptorio_lootchest_chance=Higher number = rarer. 50 = common, 150 (default) = standard, 1000 = very rare.
warptorio_lootchest_distance=Loot chests won't spawn closer to your platform than this many tiles. Default 196.
warptorio_pollution_exponent=Higher = pollution grows faster as your factory grows. Default 0.225. Formula: pollution += pollution ^ X.
warptorio_pollution_multiplier=Multiplies the pollution-growth result. Lower = milder, higher = brutal. Default 0.75.
warptorio_pollution_tickrate=The pollution-growth formula runs every X seconds. Default 3.
warptorio_solar_multiplier=Multiplier for solar panels placed on underground platform floors. 0 = useless, 0.5 = half power (default), 1 = full sunlight.
warptorio_votewarp_multi=0 = any one player can warp. 0.51 (default) = simple majority. 1 = unanimous. Anything in between = fraction of connected players required.
warptorio_warp_charge_factor=Bigger platforms take longer to charge. Every X entities on the platform = +1 minute charge time. Default 70.
warptorio_warpchance=When you set a warp target via the dropdown, this % chance decides if you actually land there (otherwise random). Default 30%.
warptorio_warpcharge_max=Hard cap on warp charge time. Default 15 minutes.
warptorio_warpcharge_multi=Flat extra seconds added per warp zone. Default 0.5.
warptorio_warpcharge_zone=By this warp zone, the linear "more zones = longer charge" curve hits its cap. Default 70.
warptorio_warpcharge_zonegain=Maximum extra charge time the zone-progression component can add. Default 8 minutes.
warptorio_water=Auto-researches the boiler-floor water tech at game start, so you have water on the boiler floor immediately.