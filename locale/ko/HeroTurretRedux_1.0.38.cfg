[mod-setting-description]
heroturrets-allow-artillery-turrets=대포 유형 포탑에 대한 계급 시스템을 활성화합니다. 완벽하게 비활성화하려면 모든 진급한 대포 포탑을 회수한 다음 재설치해주세요.
heroturrets-allow-damage=포탑이 입힌 피해량에 따라 진급할 수 있도록 허용합니다.
heroturrets-allow-ghost-rank=파괴될 때 진급한 포탑에 대응하는 고스트 객체가 표시되도록 합니다, 비활성화된 상태라면 기본 객체 고스트가 배치됩니다.
heroturrets-csv-attack-speed-buff=계급에 따른 사용자 정의 공격 속도 버프 비율(%)을 설정할 수 있습니다. 이 값은 공격 및 공격 준비 애니메이션이 얼마나 빨리 수행되는지에 영향을 줍니다.\n쉼표(,)로 구분된 100 숫자 형식이여야 하며, 숫자에 구분 기호나 퍼센트(%) 기호가 있어서는 안됩니다.\n현재 등급 수와 입력된 값 갯수가 다를 경우, 마지막 값이 모든 등급에 걸쳐 사용될 것입니다.\n\n(값이 80을(%) 넘지 않도록 하는 것을 권장합니다. 너무 높은 값은 게임 난이도를 너무 낮추거나, 포탑 기능을 망가뜨리거나, 최악의 경우 게임 충돌을 야기할 수 있습니다... 원하는 대로 설정하는 것도 물론 가능하지만 전 경고했습니다.\n(최대값: 999)
heroturrets-csv-buff=계급에 따른 사용자 정의 버프 비율(%)을 설정할 수 있습니다.\n쉼표(,)로 구분된 100 숫자 형식이여야 하며, 숫자에 구분 기호나 퍼센트(%) 기호가 있어서는 안됩니다.\n현재 등급 수와 입력된 값 갯수가 다를 경우, 마지막 값이 모든 등급에 걸쳐 사용될 것입니다.\n\n(값이 80을(%) 넘지 않도록 하는 것을 권장합니다. 너무 높은 값은 게임 난이도를 너무 낮추거나, 포탑 기능을 망가뜨리거나, 최악의 경우 게임 충돌을 야기할 수 있습니다... 원하는 대로 설정하는 것도 물론 가능하지만 전 경고했습니다.\n(최대값: 999)
heroturrets-csv-damage=피해량에 따른 진급 필요 처치수를 사용자 정의할 수 있습니다. "피해량에 따른 진급 설정이 활성화되어있어야 작동합니다.\n쉼표(,)로 구분된 10000 숫자 형식이여야 하며, 숫자에 구분 기호가 있어서는 안됩니다.\n현재 등급 수와 입력된 값 갯수는 같아야 합니다. 기본값은 아이템 6개이지만 사용자 정의 계급을 사용할 경우 그 갯수와 일치해야 합니다. 만약 다를 경우, 첫 값과 마지막 값에 비례한 수치가 모든 등급에 걸쳐 사용될 것입니다.
heroturrets-csv-firerate-buff=계급에 따른 사격 속도 사용자 정의 비율을 설정할 수 있습니다.\n쉼표(,)로 구분된 100 숫자 형식이여야 하며, 숫자에 구분 기호나 퍼센트(%) 기호가 있어서는 안됩니다.\n현재 등급 수와 입력된 값 갯수가 다를 경우, 마지막 값이 모든 등급에 걸쳐 사용될 것입니다.\n\n(값이 80을(%) 넘지 않도록 하는 것을 권장합니다. 너무 높은 값은 게임 난이도를 너무 낮추거나, 포탑 기능을 망가뜨리거나, 최악의 경우 게임 충돌을 야기할 수 있습니다... 원하는 대로 설정하는 것도 물론 가능하지만 전 경고했습니다.\n(최대값: 999)
heroturrets-csv-health-buff=계급에 따른 최대 체력 사용자 정의 비율을 설정할 수 있습니다.\n쉼표(,)로 구분된 100 숫자 형식이여야 하며, 숫자에 구분 기호나 퍼센트(%) 기호가 있어서는 안됩니다.\n현재 등급 수와 입력된 값 갯수가 같아야 하며, 만약 다를 경우, 첫 값과 마지막 값에 비례한 수치가 모든 등급에 걸쳐 사용될 것입니다.
heroturrets-csv-kill=진급에 필요한 사용자 정의 처치 필요수를 설정할 수 있습니다.\n쉼표(,)로 구분된 10000 숫자 형식이여야 하며, 숫자에 구분 기호가 있어서는 안됩니다.\n현재 등급 수와 입력된 값 갯수가 같아야 합니다. 기본값은 아이템 6개이지만 사용자 정의 계급을 사용할 경우 그 갯수와 일치해야 합니다. 만약 다를 경우, 첫 값과 마지막 값에 비례한 수치가 모든 등급에 걸쳐 사용될 것입니다.\n\n(기본값: 6 / 최대값: 4 000 000)
heroturrets-csv-names=사용자 정의 계급 이름을 정의할 수 있습니다.\n항목은 쉼표(,)로 구분되어야 하며, 사용 가능한 계급 갯수에 따라 버프 효과가 분산됩니다. 게임을 시작한 뒤엔 변경하지 않는 것이 권장합니다. 최대 12개 항목을 각 25자(영문 기준)까지 설정 가능.
heroturrets-csv-range-buff=계급에 따른 사거리 사용자 정의 비율을 설정할 수 있습니다.\n쉼표(,)로 구분된 100 숫자 형식이여야 하며, 숫자에 구분 기호나 퍼센트(%) 기호가 있어서는 안됩니다.\n현재 등급 수와 입력된 값 갯수가 같아야 하며, 만약 다를 경우, 첫 값과 마지막 값에 비례한 수치가 모든 등급에 걸쳐 사용될 것입니다.\n\n(값이 80을(%) 넘지 않도록 하는 것을 권장합니다. 너무 높은 값은 게임 난이도를 너무 낮추거나, 포탑 기능을 망가뜨리거나, 최악의 경우 게임 충돌을 야기할 수 있습니다... 원하는 대로 설정하는 것도 물론 가능하지만 전 경고했습니다.\n(최대값: 999)
heroturrets-csv-turret-rotation-buff=계급에 따른 포탑 회전 속도 사용자 정의 비율을 설정할 수 있습니다. 이 값은 포탑이 공격하기 전에 새로운 대상을 향해 얼마나 빨리 회전할 수 있는지에 영향을 줍니다.\n쉼표(,)로 구분된 100 숫자 형식이여야 하며, 숫자에 구분 기호나 퍼센트(%) 기호가 있어서는 안됩니다.\n현재 등급 수와 입력된 값 갯수가 같아야 하며, 만약 다를 경우, 첫 값과 마지막 값에 비례한 수치가 모든 등급에 걸쳐 사용될 것입니다.\n\n(값이 80을(%) 넘지 않도록 하는 것을 권장합니다. 너무 높은 값은 게임 난이도를 너무 낮추거나, 포탑 기능을 망가뜨리거나, 최악의 경우 게임 충돌을 야기할 수 있습니다... 원하는 대로 설정하는 것도 물론 가능하지만 전 경고했습니다.\n(최대값: 999)
heroturrets-damage-counter=데미지 통계를 유지합니다. 처치수 카운터가 '정확하게'로 설정된 경우에만 작동합니다.
heroturrets-kill-counter=포탑 해체 시 포탑 처리 방식에 영향을 줍니다. Purge : 포탑을 획득할 때 이후 진급에 필요한 처치수를 계속 계산합니다. | 정확하게 : 포탑을 획득할 때 정확한 처치 수를 기록합니다. 정확을 선택하면 포탑에 태그가 생성되므로, 각 묶음마다 처치 수가 다른 포탑이 저장되어 인벤토리에 많은 1개 묶음 아이템이 쌓일 것입니다. | 비활성화: 포탑을 회수하면 처치수가 "0"으로 초기화되며 이는 계급 초기화로 연결됩니다. (기본 포탑으로 되돌아감)
heroturrets-max-health-on-rank=진급 시 최대 체력까지 포탑을 회복(수리)합니다.
heroturrets-setting-ammo-turret-kill-multiplier="탄창 기반" 포탑 진급에 필요한 처치/피해량 배율 값을 설정합니다. 다음 공식에 의해 계산: (#필요량 변수는 "계급 버프 수정자" 옵션의 공식에서 가져옴): #총 필요량 = #필요량 * 수정자. (사용 가능한 값: 1 ~ 20)
