[mod-name]
HeroTurretRedux=영웅 포탑 - Redux(HeroTurrets_Redux)

[mod-description]
HeroTurretRedux=포탑이 이제 우주선에서 회수한 자가학습 AI 기술을 이용한 훈련을 통해 더욱 강력한 형태로 진화할 수 있게 됩니다. 처치 수에 기반한 계급 시스템을 통해 포탑의 성능을 확장해보세요. 기본 게임 포탑에 국한되지 않으며, 포탑은 중첩된 계급 휘장으로 식별할 수 있습니다. 계급은 각 포탑에 버프를 부여합니다.\n\n번역: SimpleKoreanLocale(PolarZero)


