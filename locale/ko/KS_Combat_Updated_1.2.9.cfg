[mod-name]
KS_Combat_Updated=KS 전투 - 개선판(KS Combat_Updated)

[mod-description]
KS_Combat_Updated=기본 게임의 전투 기능을 개선하는 모드입니다. 2.0에 맞춰 업데이트되었습니다\n\n번역: SimpleKoreanLocale(PolarZero)

[mod-setting-name]
ksc-default-magazine-size=기본 권총/기관단총 탄창 크기
ksc-default-shotgun-magazine-size=기본 산탄총 탄창 크기
ksc-homing=유도성 로켓
ksc-hitscan=탄환 히트스캔 활성화
ksc-sspread=가변적인 산탄총 확산
ksc-default-inaccuracy=모든 무기에 대한 기본 부정확도
ksc-gun-autoaim=자동 조준 활성화: 플레이어 무기 (산탄총 제외)
ksc-shotgun-autoaim=자동 조준 활성화: 플레이어 산탄총 무기 
ksc-walls-block-spitters=벽이 스피터 공격을 방어
ksc-shotgun-spread=가변적인 산탄총 확산

[mod-setting-description]
ksc-walls-block-spitters=활성화하면 스피터의 원거리 공격이 벽을 넘지 못하도록 수정됩니다. Helicopter Revival나 다른 모드, 스피터 동작과 호환성 문제가 발생한다면 비활성화하세요.
ksc-default-inaccuracy=높을수록 사격이 빗나가기 쉬워집니다. 최대값: 1
ksc-default-magazine-size=이 값을 증가시키면, 포탑의 빗나간 사격으로 인해 낭비되는 탄약을 상쇄할 수 있습니다
ksc-default-shotgun-magazine-size=기본값은 기본 게임의 값으로 되어있으나, 필요할 경우 늘릴 수 있습니다.
ksc-gun-autoaim=활성화하면, 산탄총이 아닌 무기가 적을 자동으로 조준하고, 사격 중 Shift를 눌러, 적이 아닌 대상을 조준할 수 있습니다. (플레이어만 적용)
ksc-hitscan=무기를 물리적 발사체가 없는 기본 게임 동작으로 복원합니다. 호환성 문제가 발생한다면 활성화하세요.
ksc-homing=활성화하면, 기본 게임처럼 로켓이 유도됩니다.
ksc-shotgun-autoaim=활성화하면, 산탄총 무기가 적을 자동으로 조준하고, 사격 중 Shift를 눌러, 적이 아닌 대상을 조준할 수 있습니다. (플레이어만 적용)
ksc-shotgun-spread=비활성화하면, 산탄총의 확산 범위가 고정되며, 적과의 거리 조절을 통해 제어할 수 없게 됩니다.