angelsbioprocessing=생물학적 수단을 통해 폐기물을 재활용 및 처리하고, 생물학적 공정과 농업을 활용하는 방법을 게임에 추가합니다.\n\n번역: SimpleKoreanLocale(PolarZero)
angelsbioprocessinggraphics=생물학적 수단을 통해 폐기물을 재활용 및 처리하고, 생물학적 공정과 농업을 활용하는 방법을 게임에 추가합니다.\n\n번역: SimpleKoreanLocale(PolarZero)


