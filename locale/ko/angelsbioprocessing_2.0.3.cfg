angels-bio-temperate-farm=온화한 기후 조건에 적합하게 설계된 농업 설비입니다.
angels-bio-temperate-farming=온화한 기후 조건에 특화된 작물을 재배하고 가공해보세요.
angels-bio-wood-processing=나무의 셀룰로오스의 다양한 처리 방법을 알아보세요.
angels-bio-yield-module=농업 관련 공정의 생산성을 높여주는 전문화된 모듈입니다.
angels-composting=잉여 유기 물질을 퇴비로 재활용해보세요.
angels-gardens=외계 행성에 자라는 정원으로부터 씨앗과 식물생체 표본을 추출할 수 있도록 합니다.

