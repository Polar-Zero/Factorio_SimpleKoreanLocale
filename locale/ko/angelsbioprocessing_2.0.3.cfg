[tips-and-tricks-sub]
angels-algae-blue=청조류는 [fluid=angels-water-yellow-waste]와 [fluid=angels-gas-carbon-dioxide]를 먹고 살아갑니다. 이들은 [fluid=angels-gas-ammonia]와 같은 질소 화합물을 자연적으로 생성합니다.\n
angels-algae-brown=갈조류는 [fluid=angels-water-saline]를 먹고, [item=angels-solid-sodium-carbonate]와 함께 [item=angels-solid-alginic-acid]를 생성합니다. 이를 [item=angels-cellulose-fiber]와 결합하면 [item=angels-solid-paper]를 생산할 수 있습니다.
angels-algae-green=녹조류는 [fluid=angels-water-mineralized]를 먹고, [item=angels-cellulose-fiber]를 생성합니다, 이는 [fluid=angels-gas-methanol]로 변환할 수 있습니다.
angels-algae-red=적조류는 [fluid=angels-thermal-water] 및 [fluid=angels-gas-ammonia]를 먹고, 이들은 [item=angels-solid-calcium-carbonate]와 같은 칼슘 화합물을 생성합니다.\n
angels-crops-special-products=\n최고급 작물([img=item/angels-swamp-5], [img=item/angels-temperate-5], [img=item/angels-desert-5])은 다음 중 하나를 의미합니다:
angels-farm-seeds-to-crops=\n이 작물들은 [img=item/angels-crop-farm] 기본 농장 또는 작물에 맞는 업그레이드된 농장([img=item/angels-swamp-farm] 늪지, [img=item/angels-temperate-farm] 온대, [img=item/angels-desert-farm] 사막)에 투입해 재배할 수 있습니다.\n[img=item/angels-bio-processor] 작물 체리기에서 작물을 가공할 수 있으며, 씨앗은 [img=item/angels-seed-extractor] 씨앗 추출기에서 추가 작물 재배가 가능한 형태로 복원하는 것도 가능합니다.\n\n
angels-fish-artifacts=그들이 먹었던 물을 처리하면 [img=fluid/angels-alien-spores] 외계 포자를 추출할 수 있습니다, 이는 추가 가공을 통해 [img=item/angels-alien-artifact] 외계 유물 제작에 사용할 수 있습니다.
angels-fish-artifacts-bob그들이 먹었던 물을 처리하면 [img=fluid/angels-alien-spores] 외계 포자를 추출할 수 있습니다, 이는 추가 가공을 통해 [img=item/bob-alien-artifact] 외계 유물 제작에 사용할 수 있습니다.
angels-trees-desert=사막 나무는 습도가 약 __1__% 정도인 "건조한" 지역(일반적으로 모래 또는 붉은 모래 지역)에서 발견됩니다.\n사막 나무는 목재 생산이나 [img=item/angels-bio-rubber] 고무 생산을 위한 초기 원료 생산에 사용됩니다.\n
angels-trees-swamp=늪지 나무는 습도가 약 __1__% 정도인 "습한" 지역(일반적으로 짙은 녹색 또는 푸른 풀 지역)에서 발견됩니다.\n늪지 나무는 목재 생산이나 [img=item/angels-bio-plastic] 플라스틱 생산을 위한 초기 원료 생산에 사용됩니다.\n\n
angels-trees-temperate=온대 나무는 습도가 약 __1__% 정도인 "온대" 지역(일반적으로 연한 녹색 풀 지역)에서 발견됩니다.\n온대 나무는 목재 생산이나 [img=item/angels-bio-resin] 수지 생산을 위한 초기 원료 생산에 사용됩니다.\n

[tips-and-tricks-description]
angels-animals-notes-biters=\n\n[font=default-bold]바이터[/font]: 복어들을 대상으로 실험을 진행해보거나, 길들여진 바이터들을 직접 번식시켜보세요. 이들을 연구하면 공장의 생산성이나 속도 향상에 사용할 수 있는 유용한 수정 아이템을 얻을 수 있습니다.\n여왕 바이터를 이용해 바이터를 번식시키는 것으로 바이터 크기에 따라 다른 세 가지 등급의 수정([img=item/angels-crystal-splinter-raw] 파편, [img=item/angels-crystal-shard-raw] 조각, [img=item/angels-crystal-full-raw] 수정)을 얻을 수 있습니다.\n[font=default-bold]참고:[/font] 바이터들은 상당한 양의 [img=item/angels-bio-alien-processed-meat] 외계 가공육을 섭취할 것입니다. 미리 [img=item/angels-bio-butchery] 도축된 복어와 물고기를 충분히 확보해 두는 것을 권장합니다.
angels-animals-notes-fish=\n[font=default-bold]물고기[/font]: 물고기 (4종류 [img=item/raw-fish] [img=item/angels-alien-fish-1-raw] [img=item/angels-alien-fish-2-raw] [img=item/angels-alien-fish-3-raw])를 잡아서 번식시켜 재사용 가능한 체력 회복 수단으로 이용해보세요. 추후 동물 번식에 필요한 [img=item/angels-bio-raw-meat] 식량으로도 활용할 수 있습니다. 물고기는 기름이나 [img=item/angels-fish-pulp] 펄프 형태로 가공해 농업 및 유사한 공정에 사용할 수도 있습니다. [img=fluid/angels-liquid-polluted-fish-atmosphere] 오염된 물고기 물은 가공하여 [img=item/angels-crystal-splinter-raw] 수정 파편 추출에 사용할 수 있습니다.
angels-animals-notes-puffers=\n\n[font=default-bold]외계복[/font]: 행성을 탐험하면 간혹 [img=entity/angels-puffer-nest] 외계복 둥지를 찾을 수 있습니다. 이를 회수하면 외계복 알을 발견할 수 있습니다. (야생 환경에서는 [img=item/angels-bio-puffer-1] 가스복만을 발견할 수 있으며, 지도 보기에서 [font=default-bold]노란색 사각형[/font]으로 표시됩니다) 이러한 가스복을 번식시키면 다양한 가스 처리 제작법을 연구할 수 있으며, 이 과정에서 알을 부화시켜 얻은 [img=item/angels-bio-puffer-egg-shell] 알 껍질을 분말화해 오염된 물고기 물과 함께 제작하면 다양한 등급의 [img=item/angels-crystal-shard-raw] 수정 조각을 제작하는 것이 가능합니다.\n[font=default-bold]참고:[/font] 외계복의 돌연변이 확률에 주의하세요.
angels-bioprocessing-animals=[font=default-bold]포획, 탐험, 알 관련 실험[/font]:\n\n이 모드의 대부분은 나우비스의 토착 생물 개선에 초점을 맞추고 있으며, 물고기 양식, 외계복 양식에서부터 로켓 연료, 모듈, 고급 무기 등에 사용되는 재료 아이템을 위한 바이터 사육까지 다양한 범위를 다룹니다.\n\nangels-bioprocessing-intro=외계 행성을 탐험하고, 다양한 식물군과 동물군을 발견한 뒤, 이를 유리하게 활용해보세요. 이 모드는 석유화학 공정의 대안을 제공하며 주변 지형 탐색을 장려합니다.
angels-bioprocessing-intro-animals=\n[font=default-bold]동물 처리[/font]:\n - [img=item/angels-bio-refugium-fish] 일부 토착 물고기는 영양 및 기름 관련에 매우 유용하게 사용할 수 있습니다.\n - [img=item/angels-bio-refugium-puffer] 일부 소형 토착 비행 생명체는 위험한 가스를 유용한 물질로 처리하는 작업에 매우 유용합니다.
angels-bioprocessing-intro-nauvis=[font=default-bold]나우비스 처리[/font]:\n - [img=item/angels-algae-farm] 조류 배양기 – 조류 배양을 활용한 초기 농업 방식\n - [img=item/angels-bio-arboretum-1] 나무 재배 – 토착 나무를 재배하여 목재, 수지, 플라스틱, 고무를 생산
angels-bioprocessing-intro-vegetables=\n[font=default-bold]식물 처리[/font]:\n - [img=item/angels-desert-garden] 일부 토착 식물은 유용한 작물이 되는 씨앗을 포함하고 있습니다.\n - [img=item/angels-crop-farm] 이러한 작물을 심고 재배하여 유용한 제품을 생산해보세요.
angels-bioprocessing-nauvis=탐험도 중요하지만, 빠른 성장 속도를 가진 다양한 조류의 배양은 이 모드의 초기 진행에 또다른 핵심 요소 중 하나입니다. 다양한 생물군계에서 특별한 나무를 발견하면, 이를 활용해 재생 가능한 방식으로 나무를 재배하는 방법을 찾아볼 수 있습니다. 조류 배양기에서는 많은 양의 물을 이용해 조류를 배양하고, 이를 다른 기계에서 셀룰로오스나 메탄올과 같은 유용한 자원으로 처리할 수 있도록 합니다.\n이 과정은 산업화 이전 단계에서 비식용 목적으로 식물을 활용하던 방식을 체험해볼 수 있습니다.\n\n이 부분은 폐기물과 물을 활용한 조류 및 나무 성장에 초점을 맞추고 있습니다.
angels-bioprocessing-vegetables=행성을 탐험하면 간혹 [img=item/angels-desert-garden][img=item/angels-swamp-garden][img=item/angels-temperate-garden] 정원을 발견할 수 있으며, 이로부터 씨앗을 추출할 수 있습니다. 추출한 씨앗을 농장에 투입해 식물을 직접 재배한 뒤, 이를 가공해 영양소나 연료, 기름 등을 얻어보세요. 정원은 또한 [img=item/angels-token-bio] 식물 표본으로도 가공할 수 있으며, 농장 업그레이드, 더 효율적인 목재 제작법, 고급 제작 공정 등과 같은 고급 농업 연구에 사용할 수 있습니다.\n\n정원은 지도 보기에서 [font=default-bold]연한 초록색 사각형[/font]으로 표시되며, 습기 수준에 따라 다양한 생물군계에서 발견할 수 있습니다.
angels-nauvis-algae=유용한 자원을 얻기 위해, 빠른 성장 속도를 가진 조류를 배양하고 이를 활용해보세요.
angels-nauvis-arbor=특별한 나무를 이용해 씨앗 추출용 수목원을 제작할 수 있습니다. 이러한 수목원에서는 쉽게 구할 수 있는 재료([item=angels-solid-mud], [item=angels-solid-soil], [item=angels-solid-sand])와 약간의 수문 ([img=fluid/water] 물, [img=fluid/angels-water-light-mud] 가벼운 흙탕물, [img=fluid/angels-water-saline] 염수)만으로 씨앗을 추출할 수 있게 됩니다.\n[img=item/angels-bio-arboretum-1] 수목원에서 재배된 씨앗은, [img=item/angels-solid-tree] 기본적으로 더 많은 나무를 생산하는 데 사용할 수 있으며, 수목원 제작에 사용한 특별한 나무 종류에 따라 다른 수액을 함께 생산하도록 할 수도 있습니다. (다른 팁과 가이드 참고)\nangels-nauvis-arbor-compost=\n\n[font=default-bold]참고[/font]: 수목원에 필요한 흙이나 비료를 제작하려면(일부 제작법 제외) 먼저 퇴비를 만들어야 합니다.\n - [img=item/angels-solid-compost] 퇴비는 대부분의 생물학적 재료를 (조류, 목재, 셀룰로오스, 씨앗, 작물) [img=item/angels-composter] 퇴비 변환기에 넣어 제작할 수 있습니다.\n퇴비로 만들 수 있는 전체 목록을 확인하려면 퇴비 변환기의 입력 슬롯을 확인하세요. 모든 재료가 1:1 비율로 변환되는 것은 아니며, 더 효율적인 재료가 있을 수 있습니다.\n고급 기술 연구로 특별한 나무를 복제하는 것이 가능하지만, 초반부에는 주변에서 직접 찾아야 할 것입니다.
angels-nauvis-notes-algae=\n[font=default-bold]참고[/font]: 조류 배양은 보통 아이템 생산에 일반적인 방법을 사용할 수 있기 전까지 사용해야 하는 복잡한 초기 제작법에 자주 활용됩니다. 이는 바이오 처리 방식의 느린 속도로 인해, 게임 후반부의 수요를 맞추기 위해 규모를 확장하는 것이 쉽지 않기 때문입니다.
angels-nauvis-notes-algae-brown=[font=default-bold]참고[/font]: 탄산 나트륨은 산업 혁명 이전에 해조류를 건조하고 태워 제작했습니다.\n알긴산은 식물의 세포벽에서 흔히 발견할 수 있으며, 식물성 고무에 특히 높은 농도로 존재합니다. 점성이 매우 강한 점을 활용해 종이 제작시 결합제 역할로 활용할 수 있습니다.
angels-nauvis-notes-algae-brown-lithia=- 갈조류는 [fluid=angels-thermal-water] 뿐만 아닌 [item=angels-solid-lithium] 형태로 가공하는 것도 가능합니다.
angels-nauvis-notes-algae-green=[font=default-bold]참고[/font]: 메탄올은 wood alcohol로도 불리며, 전통적으로 나무를 태우고 증기를 증류해 생산했습니다.
angels-nauvis-notes-trees=[font=default-bold]참고[/font]: 특별한 나무의 생성 위치는 특정 생물군계가 아니라 지형 습기 수준에 따라 결정되므로 Alien Biomes 같은 모드가 나무 생성을 막지 않습니다. 다만 생성 확률에 큰 영향을 미칠 가능성이 존재합니다.
angels-nauvis-trees=행성을 탐험하면 기본 게임의 침엽수 외에도 다양한 활엽수를 발견할 수 있습니다.\n이러한 나무들에서 씨앗을 추출하여 재생 가능한 [item=wood] 나무를 직접 재배하세요. 더 발전된 기술 연구를 통해 수지, 플라스틱, 고무를 생산하는 것도 가능합니다.\n\n이 나무들은 지도 보기에서 [font=default-bold]연한 파란색 사각형[/font]으로 표시되며, 지형 습기 수준에 따라 다양한 생물군계에서 발견됩니다.
angels-vegetables-crops=[img=item/angels-bio-processor] 작물 처리기에서 작물을 가공하면 제작법에 따른 다양한 결과를 얻을 수 있습니다 (여러 가지 조합 가능):
angels-vegetables-farming=[img=item/angels-seed-extractor] 씨앗 추출기에서 정원을 처리하여 작물 씨앗을 얻었다면, 이제 식물을 심고 재배하여 유용한 제품으로 만드는 일만 남았습니다.
angels-vegetables-notes-crops=\n\n[font=default-bold]참고[/font]:\n오직 [img=item/angels-solid-corn] 옥수수와 [img=item/angels-solid-fruit] 과일만 [img=fluid/angels-liquid-fermentation-raw] 효소 가스로 변환한 뒤 [img=fluid/angels-gas-ethanol] 에탄올이나 [img=fluid/angels-liquid-acetic-acid] 아세트산으로 변환하는 것이 가능합니다.\n이러한 고급 제품이 아닌 일반적인 작물은 [img=fluid/angels-liquid-nutrient-pulp] 영양 펄프로 변환한 뒤 매우 유용한 [img=fluid/angels-gas-acetone] 아세톤이나 다양한 석유화학 제품으로 가공할 수 있습니다. 원유부터 합성가스까지)
angels-vegetables-notes-gardens=\n\n[font=default-bold]참고[/font]: 정원의 생성 위치는 나무와 마찬가지로 특정 생물군계가 아니라 지형 습기 수준에 따라 결정되므로 Alien Biomes 같은 모드가 정원 생성을 막지 않습니다. 다만 생성 확률은 꽤 낮습니다.

