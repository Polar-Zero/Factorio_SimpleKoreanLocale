[tips-and-tricks-item-description]
administratorio-admin-science=[font=default-bold]행정 과학은 관료 확장의 원동력 그 자체입니다.[/font]\n\n행정 연구를 진행하려면 [item=administrative-science-pack] 행정 과학 팩이 (회색) 필요합니다. 이 과학 팩은 대부분의 행정주의 기술에 병목 현상처럼 작동할 것입니다.\n\n[font=default-bold]생산:[/font]\n[entity=office-desk]에서 제작할 수 있습니다. 민원 작업대 출발지:\n- [item=blank-form] 빈 서식\n- [item=provisional-approval] 임시 승인\n- [item=basic-excuse] 핑계\n- [item=research-grant-approval] 연구 허가서\n\n[font=default-bold]사용:[/font]\n이 팩은 기본 게임의 연구에서 군사 과학을 대체하며, 사용자 지정 기술 트리 전체에서 사용됩니다. 서류 작업 공정이 멈추면 연구도 함께 멈출 것입니다.
administratorio-biter-complaints=[font=default-bold]민원 접수처는 전체 모드에서 접수처로 사용할 수 있습니다.[/font]\n\n일반적으로 공격하던 적 유닛은 대신 [entity=admin-station]가 있을 경우 대기하도록 경로가 변경됩니다. 등록된 바이터는 중립적으로 전환되며, 민원 접수처의 [font=default-bold]대기 슬롯 6개[/font] 중 하나를 차지하며 민원 접수처 인벤토리에 민원 관련 아이템을 생성합니다.\n\n[font=default-bold]기본 공정:[/font]\n1. [entity=admin-station]를 만들고 민원 아이템을 보관할 공간을 확보하세요.\n2. 바이터와 스피터가 중앙 대기 구역에 들어와 민원을 등록하도록 합니다.\n3. 작업대의 민원 티켓을 꺼내 [entity=resolution-office]해결 사무소를 통해 처리합니다\n4. 최종적으로 해결된 [item=resolved-landscape]건을 해당 시민을 응대하는 민원 접수처에 다시 투입하세요\n5. 시민이 자리를 떠나며 [item=taxpayer-money]세금을 지불합니다.\n\n[font=default-bold]민원 계열:[/font]\n- 물기: 경관 → 스모그 → 소음 → 실업\n- 뱉기: 쓰레기 → 유해 물질 → 배회 → 방랑\n더 큰 적일수록 더 높은 단계를 굴릴 수 있으며 진화하기 전에 게임에서 새로운 단계가 중요해지기 시작하면 경고가 표시됩니다.\n\n[font=default-bold]확대:[/font]\n각 민원 접수처는 접수된 민원 건수, 남은 대기 슬롯, 총 대기 중인 바이터에 대한 회로 신호 역시 출력하므로 시위가 시작되기 전에 기록을 모니터링하고 수용 인원을 추가할 수 있습니다.
administratorio-bullshit-economy=[font=default-bold]헛소리 광석은 인증서 및 핑계 공급 공정에 사용됩니다.[/font]\n\n광산에서 채광한 [item=bullshit-ore] 헛소리 광석:\n- [item=dubious-data] 수상한 데이터(광석에서 정제)\n- [item=basic-excuse] 핑계 → [item=good-excuse] 그럴듯한 핑계\n- [item=crappy-report] 엉터리 보고서 → [item=justification] 정당화 → [item=narrative] 이야기거리\n- [item=white-paper] 용지 → [item=policy] 정책 → [item=regulation] 규정\n\n[font=default-bold]잔해 더미 파생 아이템:[/font]\n[item=redundant-rubble] 잔해 더미은 세 가지 파생 아이템으로 처리됩니다:\n- [item=useless-documentation] [font=default-bold]쓸모없는 문서[/font] - 잔해 + 종이, 서식 27B-6, 국채에 사용됨\n- [item=compacted-rubble] [font=default-bold]압축된 잔해[/font] - 잔해 + 탄소 인증, 건물, 고티어 제작에 사용\n- [item=refined-nonsense] [font=default-bold]교양 있는 헛소리[/font] - 압축된 잔해 + 유체 허위사실, 인증, 이야기거리 및 상위 티어 제작에 사용\n\n[font=default-bold]공자금 공정:[/font]\n[item=taxpayer-money] 세금(민원 해결로 획득) → [item=treasury-bond] 국채 → [fluid=slush-fund] 비자금 → [item=taxpayer-money] 더 많은 세금\n\n세금은 병목 현상을 일으킬 수 있는 요소 중 하나입니다. 게임 후반에 [entity=meeting-room]에서 [font=default-bold]세무 감사[/font]를 진행할 수도 있습니다. 이사회 회의실에서 비자금, 기초 채권 서류, 데이터를 추가 자금으로 전환해보세요.\n\n[font=default-bold]다중 생산 공정:[/font]\n- [entity=office-desk] 사무실 작업대: 서식, 과학 팩, 데이터, 채권\n- [entity=corporate-breakroom] 탕비실: 커피, 뒷담화, 그럴듯한 핑계, 구두 결재 초안\n- [entity=union-headquarters] 노조 본부: 노조 승인, 정부 보조금, 이야기거리, 검증된 인증, OSHA 위반 처리\n- [entity=meeting-room] 이사회 회의실: 서면 승인, 용지, 정책, 연방 규정, 세무 감사\n- [entity=propaganda-distillery] 선전 증류소: 거짓말, 유체 허위사실, 인증, 비자금, 교양있는 헛소리
administratorio-complaint-chain=[font=default-bold]민원은 진화 요인에 따라 점진적으로 다양하게 발생합니다.[/font]\n\n모든 민원 처리는 [entity=resolution-office]에서 진행합니다. 초기 단계는 짧은 공정만으로 처리할 수 있지만, 이후 단계는 서류 작업 및 판결문 검토 등이 필요하게 됩니다.\n\n[font=default-bold]인적 민원:[/font]\n[item=ticket-landscape] 민원 → [item=filing-l] 접수 → 해결\n[item=ticket-smog] 민원 → [item=filing-s] 접수 → [item=case-s] 검증 → 해결\n[item=ticket-noise] 민원 → [item=filing-n] 접수 → [item=case-n] 검증 → [item=brief-n] 판결문 해석 → 해결\n[item=ticket-unemployment] 민원 → [item=filing-u] 파일링 → [item=case-u] 검증 → [item=brief-u] 례 해석 → 해결\n\n[font=default-bold]스파이터 민원:[/font]\n[item=ticket-littering] 민원 → [item=filing-lt] 접수 → 해결\n[item=ticket-hazmat] 티켓 → [item=filing-h] 접수 → [item=case-h] 검증 → 해결\n[item=ticket-loitering] 민원 → [item=filing-lo] 제출 → [item=case-lo] 검증 → [item=brief-lo] 례 해석 → 해결\n[item=ticket-vagrancy] 민원 → [item=filing-v] 접수 → [item=case-v] 검증 → [item=brief-v] 판결문 해석 → 해결\n\n[font=default-bold]게임 후반:[/font]\n인적 민원은 [technology=noise-ordinances] 및 [technology=constitutional-law]를 거쳐 완료할 수 있습니다. 스피터의 민원은 [technology=loitering-ordinances]과 [technology=vagrancy-ordinances]을 거쳐 완료할 수 있습니다. 공정이 완료되면 최종 해결된 아이템을 스피터를 담당하는 민원 접수처에 돌려보내세요.
administratorio-frustration=[font=default-bold]대기 중인 바이터에는 고유한 타이머가 부여됩니다.[/font]\n\n등록된 각 바이터는 민원을 제출한 뒤 기다리며 자신의 민원이 완료되는 것을 기다립니다. 바이터에게 마우스를 가져가면 현재 기분과 해결되지 않은 민원 목록을 확인할 수 있습니다.\n\n[font=default-bold]기분 단계 :[/font]\n- [color=green]0-25%[/color] - 평온\n- [color=yellow]25-50%[/color] - 짜증\n- [color=yellow]50-75%[/color] - 분노\n- [color=red]75-100%[/color] - 격노\n화가 [color=red]100%[/color]에 도달하면 바이터가 대기열에서 탈출해 시위하기 시작합니다. 대기 공간이 있는 작업대를 찾지 못한 바이터는 바로 시위에 돌입할 수도 있습니다.\n\n[font=default-bold]중요:[/font]\n민원 단계는 기분이나 적 물량이[color=red]아닌[/color] 적 유형과 기술 진척도, 진화 요인에 따라 결정됩니다. 기분은 건물 무력화에 얼마나 근접했는지에 따라 달라집니다.\n\n[font=default-bold]대비법:[/font]\n[entity=admin-station] 민원 접수처가 많을수록 대기열이 넘칠 가능성을 줄일 수 있습니다. 추가 [entity=resolution-office] 해결 사무소 및 서류 처리 공정 확장을 통해 해결 시간을 줄이세요. [item=eviction-notice]퇴거 통지서가 발급된 경우, 퇴거 대상자가 반쯤 화난 상태로 민원 접수처에 도착한다는 점을 기억하세요.
administratorio-nest-expropriation=[font=default-bold]퇴거 통지는 적 확장을 저지하기 위한 도구입니다.[/font]\n\n[technology=nest-expropriation] 산란장 수용 연구를 완료한 이후 [item=eviction-notice] 퇴거 통지를 제작하여. 적 영토에 던지면 사용된 지점에서 가장 가까운 적 산란장 (둥지)를 파괴합니다.\n\n[font=default-bold]참고:[/font]\n약 [font=default-bold]25 타일[/font] 안에 있는 근처의 적 유닛은 죽지 않고, [color=red]당신의 민원 시스템[/color]으로 곧장 달려갈 것입니다. 이 때 [font=default-bold]50%의 기분 패널티가 부여됩니다[/font]. 접수 여유 공간이 없는 경우, 쫓겨난 바이터들이 곧장 시위에 돌입할 수 있습니다.\n\n더 많은 땅이 필요할 때 퇴거를 사용하되, 관리 부하가 급증하는 것을 감안하세요. 작업대, 해결 사무소, 서류 작업 파이프라인이 쫓겨난 대기열을 흡수할 수 있을 경우에만 퇴거를 진행하세요.
administratorio-operating-paperwork=[font=default-bold]모든 기계 제작에 허가서가 필요한 것은 아닙니다.[/font]\n\n[font=default-bold]처음부터:[/font]\n- [item=carbon-offset-certificate-basic] 탄소 배출 인증서 - 용광로 및 제련\n\n[font=default-bold]1차 전문 허가서:[/font]\n- [item=petrochemical-operating-permit] 석유화학 운영 허가서 - 고체 연료, 플라스틱, 황, 황산 등 기본적인 화학 작업\n- [item=chemical-handling-work-order] 중화학 작업 허가서 - 화학 공장 및 정유 공장의 고급 석유 처리나 석탄 액화 등 고급 제작법\n- [item=radiological-work-order] 방사선 작업 허가서 - 원심분리기 및 원자력 제작법\n\n이러한 전문 허가서는 [item=safety-waiver]과 같은 일반적인 허가서를 기반으로 작성됩니다. [item=form-27b-6] 서식 27B-6, [item=environmental-impact-report] 환경 영향 보고서, [item=construction-permit] 건설 허가서 및 이후 서류는, 경영진 허가과 같은 추가적인 허가를 기반으로 합니다. 민원은 여전히 해결 공정 안에 남아 있습니다. 이러한 서식은 간접적으로 행정주의에 자금을 지원하고 더 많은 아이템의 잠금을 해제하지만 이와 같은 허가서에 필요하거나 소비되지는 않습니다.
administratorio-paperwork=[font=default-bold]종이는 모든 행정 공정의 기본입니다.[/font]\n\n[item=paper] 종이는 나무를 처리하여 얻으며, [item=ink] 잉크는 석탄에서 정제됩니다. [technology-administratorio-paperwork]를 연구한 후에는 [item=plastic-bar] 플라스틱, [item=sulfur] 유황, 물로 직접 종이를 합성하여, 조금 더 비싼 만큼 훨씬 더 빠르게 공급할 수도 있습니다.\n\n[font=default-bold]프린터:[/font]\n- [entity=mechanical-printer] [font=default-bold]기계식 프린터[/font] - 첫 번째 인쇄 서식에는 충돌 현장에 있는 프린터를 사용해야 합니다.\n- [entity=printer-t1] [font=default-bold]프린터 T1[/font] - 일상적인 서식 생산을 위한 전기 인쇄\n- [entity=printer-t2] [font=default-bold]프린터 T2[/font] - 더 빠른 인쇄와 [technology=industrial-printing]\n\n[font=default-bold]로 잠금 해제된 대량 복사 제작법 주요 서식:[/font]\n- [item=blank-form] 빈 서식 - 대부분의 행정 서류 작업의 기본\n- [item=blank-approval] 빈 승인서 - 면제, 허가 및 환승 서식의 구성품\n- [item=form-27b-6] 양식 27B-6 - 철도 및 각종 서류에 사용되는 표준화된 요청 서식\n- [item=carbon-offset-certificate-basic] 탄소 배출 인증서 - 일괄 제련에 필요함
administratorio-pneumatic-transport=[font=default-bold]마닐라색인 밀폐 공압 파이프를 통해 유체화된 서류를 운반할 수도 있습니다.[/font]\n\n액화기를 통해 종이 아이템을 파이프 기반 운송을 위한 유체로 변환할 수 있습니다.\n\n[font=default-bold]건물:[/font]\n- [entity=form-liquifier] [font=default-bold]서류 액화기[/font] - 서류 1개를 유체 10단위로 변환\n- [entity=form-solidifier] [font=default-bold]서류 고체화기[/font] - 유체 10단위를 다시 아이템 1개로 변환\n- [entity=pneumatic-pipe] [font=default-bold]공압 파이프[/font] - 마닐라색, 공압 건물에만 연결 가능\n- [entity=pneumatic-pipe-to-ground] [font=default-bold]공압 지하 파이프[/font] - 10칸 지하 연결 범위\n\n[font=default-bold]작동 방식:[/font]\n액화기와 고체화기에는 숨겨진 투입기가 있어 인접한 벨트나 상자의 아이템을 자동으로 변환할 수 있습니다. 옆에 벨트나 상자를 놓기만 하면 됩니다.\n\n공압 파이프는 별도의 연결 유형 카테고리를 사용하므로 일반적인 유체 파이프에 [color=red]연결할 수 없습니다.[/color] 각 서류 유형에 고유한 유체가 할당되며, 별도의 파이프망을 이용해 여러 문서 유형을 운송할 수 있습니다.\n\n[font=default-bold]인쇄 기술[/font] 및 [font=default-bold]물류 과학[/font] 연구 전제조건을 마친 뒤, [font=default-bold]공압 문서 운송[/font]연구까지 마쳐 사용하세요.
administratorio-propaganda-distillery=[font=default-bold]선전 증류소는 모든 행정 유체를 처리할 수 있습니다.[/font]\n\n[font=default-bold]산업 선전[/font] 연구 이후 사용할 수 있는 이 건물은 행정적 유체의 화학적 처리를 담당합니다.\n\n[font=default-bold]주요 제작법:[/font]\n- [fluid=politician-fluid] 정치인 유체 → [fluid=lie] 거짓말 (유체)\n- [fluid=lie] 거짓말 + [item=dubious-data] 수상한 데이터 → [fluid=misinformation] 허위사실 (유체)\n- [fluid=lie] 거짓말 + [item=dubious-data] 수상한 데이터 + [item=refined-nonsense] 정제된 헛소리 → [item=credentials] 공식 인증\n- [item=compacted-rubble] 압축된 잔해 + [fluid=misinformation] 유체 허위사실 → [item=refined-nonsense] 정제된 헛소리\n- [item=treasury-bond] 국채 + 거짓말 → [fluid=slush-fund] 비자금\n\n화학 공장과 정유소 공장 [color=red]이 아닌[/color] 선전 증류소에서 모든 거짓말, 유체 허위사실, 비자금 처리를 진행할 수 있습니다.
administratorio-protest-resolution=[font=default-bold]시위는 단순한 경고가 아니라 즉각적인 공정 방해로 이어집니다.[/font]\n\n적의 기분이 극도로 나빠지면, 도달 가능한 플레이어 건물을 선택해 그곳으로 이동한 후 [color=red]비활성화시킬 수 있습니다[/color]. 시위가 활성화되면 경고, 지도 표기, 경고음이 발생합니다. 초과 근무가 없다면 시위로 인한 건물 폐쇄가 발생할 수 있습니다.[color=red][/color].\n\n[font=default-bold]시위 진압:[/font]\n[item=promise] [font=default-bold]행정적 약속[/font]은 게임 초반부터 사용할수 있는 캡슐 아이템입니다. 건물이 아닌 [font=default-bold]시위하는 바이터[/font]에게 직접 던지면 적용됩니다.\n- 민원 슬롯이 비어 있으면 바이터는 즉시 가장 가까운 민원 접수처로 다시 돌아갑니다.\n- 민원 슬롯이 부족하더라도 바이터는 60초 동안 [font=default-bold]진정[/font]되지만, 이후에도 민원 슬롯이 없다면 시위를 재개합니다\n- 약속은 민원 완료나 민원 처리 상황을 초기화하지 않습니다\n\n[font=default-bold]영구적 해결책:[/font]\n약속은 시간을 벌 뿐입니다. 민원을 완료하고 해결된 민원 아이템을 민원 접수처에 반환해야 영구적으로 돌아갈 것입니다.
administratorio-regulation=[font=default-bold]조립 기계 제작 및 건설 제작법은 이제 티어 기반 서류 시스템에 통합됩니다.[/font]\n\n[font=default-bold]티어 시스템:[/font]\n- [color=green]T0[/color] [item=work-order] 작업 허가서 - 조립 기계 전용 기본 다용도 아이템\n- [color=green]T1[/color] [item=safety-waiver] 안전 책임 면책서 / [item=safety-work-order] 안전 작업서 - 조립 기계 3, 투입기, 레이더, 벽, 전신주, 보일러 등\n- [color=yellow]T2[/color] [item=construction-permit] 건축 작업 허가서 / 펌프 등[item=construction-work-order] 건축 작업 허가서 - 용광로, 광산 드릴, 파괴 작업, 중공업 건물 제작법 등\n- [color=yellow]T3[/color] [item=management-approval-verbal] 경영진 허가서 (구두) / [item=management-verbal-work-order] 경영진 작업 허가서 (구두) - 조립 기계 23, 철도, 로보포트, 태양 전지판, 축전지, 로봇 등\n- [color=red]T4[/color] [item=management-approval-written] 경영진 허가서 (서면) / [item=management-written-work-order] 경영진 작업 허가서 (서면) - 조립 기계 3, 신호기, 로켓 격납고 및 기타 메가 프로젝트nuclear support hardware, \n- [item=research-grant-approval] 연구 승인서 - 모든 과학 팩\n\n[font=default-bold]중요:[/font]\n[item=work-order] 작업 허가서와 그 티어 변형은 조립 기계 내 제작에만 사용됩니다. 용광로, 정제소, 화학, 원심분리기는 별도의 운영 허가서가 필요합니다.\n\n[font=default-bold]수제작:[/font]\n처음부터 사용 가능하거나 빨간색 과학 단계 기술로 잠금 해제된 제작법은 허가서 없이 직접 제작할 수 있지만, 이후 허가서가 필요한 규제 제작법은 플레이어가 직접 제작할 수 없으며, 반드시 자동화해야 합니다.
administratorio-transit-authorization=[font=default-bold]열차 정류장에 이제 서류 상자가 추가됩니다.[/font]\n\n정차하는 [entity=train-stop] 열차 정류장마다 이제 [item=transit-authorization] 환승 허가(서식 12-T) 서식이 있어야 합니다. \n\n[font=default-bold]작동 방식:[/font]\n1. 각 열차 정류장 건물 옆에 [entity=transit-permit-chest] 통합 환승 허가서 상자가 배치될 것입니다.\n2. 해당 상자에 [item=transit-authorization] 환승 허가서를 투입합니다.\n3. 열차가 역에 도착하여 대기를 시작할 때마다 [font=default-bold] 한 장씩 소모[/font]됩니다.\n4. 역에 허가서가 부족하면 열차 제한은 0으로 고정되며, 자동으로 비활성화될 것입니다.\n\n[font=default-bold]설정:[/font]\n- [font=default-bold]철도[/font] 기술와 함께 허가서 제작법 사용이 가능합니다.\n- [entity=office-desk] 관리소 작업대에서 제작할 수 있습니다.\n- 행정적 업무가 정체되지 않도록 벨트, 투입기 또는 물류망을 연결하는 것을 추천합니다.\n\n이 시스템을 통해 철도 물류는 이제 전투가 아닌 또 다른 행정적 문제로 연결될 것입니다.
administratorio-welcome=[font=default-bold]관공서토리오에 오신 것을 환영합니다![/font]\n\n팩토리오의 군사 분쟁을 행정적 요소로 대체하는 [font=default-bold]총체적 개편 모드[/font]입니다. 바이터는 더 이상 벽을 공격하지 않지만, 그들은 민원을 등록한 후 [entity=admin-station]의 [item=ticket-landscape] 기다릴 것입니다. 접수된 민원은 바이터 관리소에 보관됩니다.\n\n[font=default-bold]기본 게임과의 주요 차이점:[/font]\n- [color=red]군사 요소가 없습니다[/color] - 총, 포탑, 군사 과학이 제거됩니다\n- [color=green]기계, 제련, 유체 등 모든 제작[/color]은 이제 허가서가 필요하며, 심지어 연구 팩에도 서류가 필요합니다.[/color]민원이 적 공격을 대체합니다[/color] - 바이터는 이제 제거 대상이 아니라 해결해야 할 민원입니다[/color]- [color=green]행정적으로 처리할 수 있습니다[/color] - [item=promise] 약속은 시위대를 진정시킬 수 있으며, [item=eviction-notice] 퇴거 통지는 더 많은 서류 작업을 만들지만, 산란장 정리가 가능합니다. [color=green]근무 시간이 중요합니다[/color] - 초과 근무를 합법화하지 않으면 일부 건물이 밤에는 문을 닫게 됩니다\n\n목표는 이제 다음과 같습니다\n: 바이터 민원 처리법을 알아내기 [technology=constitutional-law]- [technology=constitutional-law] 헌법과 스피터 연구를 통해 [technology=vagrancy-ordinances] 방랑자 조례 등을 처리하여, 밀린 업무가 반란을 일으키지 않을 정도로 사무실의 기능을 유지해야 합니다.
administratorio-working-hours=[font=default-bold]일부 행정 건물이 이제 근무 시간을 준수합니다.[/font]\n\n[entity=office-desk] 사무실 작업대, [entity=corporate-breakroom] 회사 탕비실, [entity=union-headquarters] 노조 본부, [entity=meeting-room] 이사회 회의실은 [item=overtime-exemption] 초과 근무 모듈이 없을 경우 밤에는 문을 닫습니다.\n야간 초과 근무 작동 방식: [/font]\n- 모듈 잠금을 해제하려면 [technology=after-hours-operations]연구를 완료하세요.\n- 건물 모듈 인벤토리에 [font=default-bold]모듈[/font]을 설치하세요.\n- 근무 시간 모드 설정이 활성화되어있을 경우, 주간 처리 속도가 약간 증가하는 의도적 조정 사항이 적용되어 있어, 자동화된 건물이 24시간 내내 작동하지 않는 대신, 근무 시간에 집중되어 작동하도록 합니다.\n- 적 시위는 초과 근무 허가가 있더라도 이 건물들을 [color=red]여전히[/color] 비활성화시킬 수 있습니다\n\n[font=default-bold]선택 사항:[/font]\n이러한 근무 시간 옵션이 완전히 마음에 들지 않는다면 세이브 파일을 로드하기 전에 모드 설정 -> 지도에서 근무 시간을 비활성화하세요. 이 설정을 이용하면 관련 팁, 모듈, 연구 및 업무 종료가 모두 사라집니다. (주간 처리 속도도 복구됨)

