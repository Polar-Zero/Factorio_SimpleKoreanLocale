[recipe-description]
blank-approval-production=빈 허가서 서식을 인쇄합니다. 허가 및 승인에 사용할 수 있는 고품질 서식.
blank-directive-production=빈 제안서 서식을 인쇄합니다. 경영진 허가에 사용할 수 있는 프리미엄 삼중 잉크로 보안 처리된 견본.
blank-form-production=종이와 잉크를 사용하여 빈 서식을 인쇄합니다. 범용 행정 서류.
admin-station-production=문명화된 통치를 대표하는 사무실. 바이터들은 이곳에서 대기하거나, 불만을 제기하고, 충분한 작업을 마친 서류를 받고 만족한 채 떠납니다.
basic-excuse-production=허위사실 5개를 압축하여, 그럴듯 해보이는 핑계거리 하나로 만듭니다. 지역 분쟁 해결의 핵심 증추.
biter-logistics-formation=일반 작업자를 재교육하여 물류 임무를 수행하도록 합니다. 이후 바이터포트에 배치하여, 상자 간 아이템 운반을 지시하세요.
brief-loitering=배회 사건이 대법원 개입을 필요로 했던 짧은 기간의 유물. 이후 시스템의 간소화로 인해 없어졌지만, 기존 저장 파일과의 호환성을 위해 남겨졌습니다.
brief-noise=소음 사건이 대법원까지 올라가야 했던, 법이 더 단순했던 시대의 유물. 기존 저장 파일과의 호환성을 위해 남겨졌습니다 - 이후 법원은 절차를 간소화했습니다.
brief-unemployment=실업 문제가 단순히 두꺼운 서류철이 아닌 대법원 판결을 필요로 했던 시절의 유물입니다. 기존 저장 파일과의 호환성을 위해 남겨졌습니다.
brief-vagrancy=부랑자 문제에 국가 최고 사법 기관의 개입을 필요로 했던 시절의 대법원 상고장입니다. 기존 저장 파일과의 호환성을 위해 남겨졌습니다. - 행정제는 기억할 것입니다.
carbon-offset-certificate-basic=제련 인증서. 용광로마다 인증서 1장을 제출해야 환경 규제 당국의 간섭을 피할 수 있습니다.
carbon-offset-certificate-verified=적절히 검증된 환경 인증서. 강철 용광로 건설에 필수적으로 필요합니다.
case-hazmat=물리적인 증거와 제출 서류를 합쳐, 유해 물질 기소를 진행합니다. 잔해 표본은 결정적인 증거로 사용됩니다.
case-loitering=가만히 서 있는 것이 범죄가 될 수 있다는 법적 논리를 확립합니다. 입증하려면 자격 증명, 데이터, 그리고 설득력이 있을 정도로 교양있는 헛소리가 필요합니다.
case-noise=소음 민원을 기소 가능한 사건으로 격상시킵니다. 확실한 데이터와 환경 인증서가 필요합니다. 소문만으로는 법정에서 유죄를 다툴 수 없습니다.
case-smog=스모그 민원을 법정에서 다룰 수 있는 사건으로 격상시킵니다. 증거는 공기 중에 아직 떠 있지만, 서류로 남길 필요가 있습니다.
case-unemployment=소규모 사무실을 운영할 만큼의 서류 작업을 통해 체계적인 정책 실패를 입증합니다. 추가적인 공자금이 필요합니다.
case-vagrancy=정책에 근거한 강제 이주와 관련된 기소를 진행합니다. 가장 까다로운 스피터 관련 사건이기에, 사건을 개시하는 것도 지침이 필요합니다.
charcoal-production=목재를 생산하는 온실이 있다면, 석탄의 재생 가능 공급원으로 활용할 수 있습니다. 인증서가 탄소 배출량을 입증합니다.
chemical-handling-work-order-production=화학 공장 운영에 필수적인 허가서입니다. 안전, 환경, 물류 관련 허가서를 하나로 묶어 매우 두꺼운 허가서가 되었습니다.
chemical-operator-training=유해 화학 물질 취급을 위한 바이터 자격 인증. 예전에 산을 아무데나 마구잡이로 뱉어대던 생물치고 훈련 과정이 놀라울 정도로 엄격합니다.
coffee-plantation=원두를 심고, 물을 주고, 3배 더 많은 원두를 수확한다. 이건 공장에서 가장 중요한 공정 중 하나입니다.
coffee-refining=행정제의 생명수를 추출하고, 작업 지시서로 이 커피가 공식적으로 승인된 것임을 보장합니다.
compacted-rubble-production=행정 부산물을 표준화된 형태의 건설용 자재로 압축합니다. 인증서는 이 압축 과정이 환경 친화적으로 이루어졌음을 입증합니다.
construction-permit-draft=사무실 책상에서 허가 절차를 시작하세요. 이 초안은 아직 법적 구속력이 없으며, 프린터 도장이 필요합니다.
construction-permit-printing=잉크와 권한으로 건축 허가를 최종 확정합니다. 이 허가서 없이는 아무것도 지을 수 없습니다.
construction-work-order-printing=초안에서 바로 건설 작업 지시서를 출력합니다. 제작 당 2장씩 - 수작업으로 작성하는 것보다 훨씬 빠릅니다.
construction-work-order-production=중급 제작 허가서. 이 제작이 "아마도 안전할 것"에서 "공식적으로 허가됨"으로 승급했음을 의미합니다.
copper-plate-batch=허가된 구리 제련을 진행합니다. 배치당 인증서 한 장이 필요하며. 환경 영향은 신중하게 검토되지 않았습니다.
copy-blank-approval=인증서 1장을 투입하고, 6장을 출력받습니다. 원본과 사본을 구별할 수 없는데, 사실 그게 바로 핵심입니다.
copy-blank-directive=고급 보안이 적용된 제안서 서식을 대량 복사합니다. 본래 의도는 아닐지라도, 잉크를 세 번 도포한 방식은 충실히 재현할 수 있습니다.
copy-blank-form=산업적 규모로 서식의 대량 생산을 진행합니다. 효율성의 극치를 보여주는 이 제작법은, 폐지 발생 가능성을 극도로 줄였습니다.
copy-carbon-offset-certificate=산업용 프린터를 이용해 탄소 배출 인증서를 복사합니다. 그 비밀을 모르는 사람은 아무도 없습니다.
copy-chemical-handling-work-order=중화학 작업 허가서를 복사합니다. 안전은 숫자놀음이며, 당연하겠지만 6개가 1개보다 더 안전합니다.
copy-construction-work-order=건축 작업 허가서를 복사하여, 서명 누락 하나로 인해 확장 공사가 지체되는 일이 없도록 하세요.
copy-environmental-impact-report=누군가 너무 자세히 살펴보기 전에 환경 영향 평가서를 복사하세요. 동일한 피해에 대한 똑같은 평가서 6개.
copy-form-27b-6=번식하는 양식. 하나만 넣었는데 여섯 장이 나왔습니다. 카프카도 자랑스러워할 것입니다.
copy-management-verbal-work-order=경영진 구두 허가서를 6배로 복사합니다. 물론 복사본 역시 법적 구속력이 없습니다.
copy-management-written-work-order=서명된 경영진 서면 허가서을 6부로 복사합니다. 각 복사본의 공증은 완벽하며, 법적 구속력 역시 존재하므로 부인할 수 없습니다.
copy-radiological-work-order=원자력 관련 허가서를 산업적 속도로 복사해보세요. 각 사본은 원본과 동일한 법적 효력을 지닙니다.
copy-research-grant-work-order=연구 작업 허가서를 증식시켜 연구소가 절대 문을 닫지 않게 해보세요. 당연하겠지만, 연구비 심사 위원회에 알릴 필요는 없습니다.
copy-safety-work-order=산업적 규모의 안전 작업서. 현장의 모든 기계에 사용할 수 있을 정도로 충분한 안전 작업서를 인쇄해보세요.
copy-work-order=조립 기계에 허가서를 끊임없이 공급해보세요. 원본 1부, 허가서 6부.
corporate-breakroom-production=비록 사무실이더라도, 생산적이지 않은 공간 역시 필요합니다. 또한 왠지 모르게 필수적인 소문이 만들어지기도 합니다..
crappy-report-production=수상한 데이터 5개를 스테이플러로 묶고, 보고서라는 이름을 붙입니다. 모든 상위 문서의 토대입니다.
credentials-production=출처가 아무리 의심스럽더라도 권한을 증명해주는 것. 행정 절차는 내용을 검증하지 않고, 그저 도장만 확인합니다.
data-production=실제로도 쓸만한 정보 - 희귀한 아이템인 이것은 엉터리 보고서와 자격 증명을 교차 참조할 때 나타납니다.
dubious-data-batch=산업적인 규모로 헛소리를 정제합니다. 인증서 한 장만 있으면 정제 묶음 진행이 가능합니다 - 규제 당국은 개별 데이터를 계산하지 않습니다.
dubious-data-refining=원시적인 헛소리에서 정보처럼 보이는 것을 추출합니다. 신뢰할 수는 없지만, 기술적인 데이터로 인정됩니다.
admi-efficiency-module=에너지 비용을 조작합니다. 엉터리 보고서와 약간의 배선 작업은 전력 계량기가 적당한 거짓말을 하게 만들기에 충분합니다.
admi-efficiency-module-2=더 대담한 회계 사기. 앞서 언급된 네 가지 수법에 몇 가지 백서를 통해 훨씬 더 창의적인 장부 작성을 진행합니다.
admi-efficiency-module-3=에너지 회계를 이용한 완전한 폰지 사기. 앞서 언급된 여러 횡령 수법, 정책적인 보호, 그리고 자격 증명 - 감사관들은 절대 눈치채지 못할 겁니다.
environmental-impact-report=환경 피해에 대한 포괄적인 평가. (비록 대폭 수정되었지만) 화학 및 방사선 운영 허가에 필요합니다.
eviction-notice-production=바이터 구조물을 파괴할 수 있는 법적 권한을 던질 수 있도록 압축한 형태. 바이터들은 떠나지 않으며 - 단지 집을 잃을 뿐입니다.
filing-hazmat=제출된 서류 자체에 유해 물질 취급 절차가 필요할 수 있어, 처리하는 데 더 오래 걸릴 것으로 예상됩니다.
filing-landscape=당신이 경관을 망쳤음을 공식적으로 인정하는 것. 신경 쓰는 척하기 위한 첫 단계입니다.
filing-littering=산성 웅덩이 위치를 공식적으로 기록하고 정리합니다. 스피터 민원 해결의 시작점.
filing-loitering=잘못된 장소에 서 있는 것을 범죄로 규정합니다. 행정 절차의 극치. 광범위한 제한 구역 관련 서류가 필요합니다.
filing-noise=소음 민원을 문서화하는 과정은, 아이러니하게도 매우 시끄러운 소음이 발생합니다. 상당한 시간 역시 소요됩니다.
filing-smog=스모그 민원과 관련된 서류는 스모그 그 자체보다 더 두껍습니다. 처리에 생각보다 더 오랜 시간이 걸립니다.
filing-unemployment=아무도 일자리가 없다는 증거를 제출합니다. 아이러니하게도 이 서류를 제출하는 바이터는 일자리가 있습니다. '바이터' 관련 서류 중 가장 복잡합니다.
filing-vagrancy=부랑자를 발생시킨 바로 그 시스템으로 문제를 문서화합니다. 가장 복잡한 스피터 서류 작업.
form-27b-6=다른 모든 서류의 기초가 되는 양식. 아직 27B-6을 제출하지 않았습니다.
good-excuse-production=그럴듯한 결과로 보일 때까지 실제 데이터와 유체 형태의 거짓말을 혼합합니다. 고위급 승인이나 서사 구성에 필요합니다.
government-grant-production=국채를 많은 세금으로 전환합니다. 경영진 구두 허가서과 아무도 읽지 않는 보고서가 필요합니다.
greenhouse-discovery=커피 원두를 찾기 위해 젖은 퇴비를 뒤집니다. 제작당 10% 확률. 항상 나무 조각을 돌려받을 수 있지만, 투입한 수량보다는 적을 것입니다.
greenhouse-production=행정 제도의 두 기둥을 위한 기후 조절을 진행합니다: 종이에 사용되는 목재와 이를 검토하는 사람들을 위한 커피.
greenhouse-wood=재생 가능한 목재 생산을 진행합니다. 나무는 다시 자라지만, 서류철은 그렇지 않습니다.
hush-money-production=세금을 던질 수 있는 형태의 가방에 구겨넣은 다음, 공식적인 것처럼 보일 정도의 서류만 첨부한 형태. 3분 동안 바이터를 조용하게 만들 수 있습니다.
ink-production=석탄을 갈아 잉크 원료를 만듭니다. 수동 제작 가능. 글쓰기가 여기서 시작됩니다.
iron-plate-batch=허가된 철 제련을 진행합니다. 배치당 인증서 한 장만 필요한데, 규제 당국은 생산량이 아닌 횟수로 계산하기 때문입니다.
job-offer-production=구인 공고 초안을 작성합니다. 행정 책상 인벤토리에 넣어두면, 문제가 해결된 바이터가 떠나는 대신 가져가며, 이후 당신은 노동력을, 그들은 경력을 얻게 됩니다.
justification-production=허위사실, 자격 증명, 그리고 순수한 정치적 본질을 바탕으로 구축된 공식적인 법률 근거. OSHA 조사 회피 및 이야기거리 구성에 필요합니다.
landscape-final=가장 간단한 해결책을 제시합니다. 핑계거리 하나, 간단한 서류 하나, 만족한 바이터 한 마리. 모든 일이 이렇게 쉬웠다면 얼마나 좋을까요.
littering-final=산성 웅덩이는 이제 자연적인 풍경으로 재분류되었습니다. 가벼운 해결책 - 보고서 하나와 서류 제출로도 충분함.
loitering-final=가만히 서 있는 것이 더 이상 범죄가 아니라는 획기적인 판결 - 이 사건에 한해. 규정, 이야기거리, 자격 증명, 커피가 필요합니다.
management-verbal-draft=커피 기계 옆의 경영진을 붙잡고 무언가에 동의하게 만드세요. 누군가 이 동의 사실을 부정하기 전에 프린터로 최종적인 확정을 진행해야 합니다.
management-verbal-printing=경영진이 마음을 바꾸기 전에 구두 약속을 종이에 기록하세요. 이제 공식적인 구두 승인이 만들어졌습니다.
management-verbal-work-order-production=경영진이 괜찮다고 했습니다. 그걸로 충분하겠죠? 구두 허가로 뒷받침되는 3티어 조립 승인입니다.
management-written-1st-printing=대형 프린터를 한 번 돌려서 서면 제안서를 최종 확정합니다. 서명과 공증이 끝나, 부인할 수 없게 된 경영 허가서가 만들어졌습니다.
management-written-proposal=노조 본부에서 서면 제안서를 작성합니다. 경영진들의 서명은 공짜가 아니기에,  그럴듯한 핑계, 이야기거리, 국채가 필요합니다.
management-written-work-order-production=실제 경영진 서명이 담긴 최상위 조립 기계 허가서. 공장 설비에 필요한 가장 비싼 허가서.
mechanical-printer-production=전기 시대 이전에도 사용할 수 있는 수동형 프린터. 느리지만 서식 처리가 가능합니다.
misinformation-production=유체 규모로 거짓말을 무기화합니다. 정책 수립, 정당화, 그리고 정교한 헛소리의 핵심 재료로 사용됩니다.
narrative-production=노조 본부에서 짜낸 공식적인 이야기. 행정부에 대한 대중적인 인식을 통제합니다.
noise-final=소음 사건의 종결을 알리고 망치를 내리칩니다. 정책, 자격 증명, 이야기거리, 그리고 정말 터무니없이 많은 커피가 필요한 중대한 판결입니다.
nuclear-technician-training=방사선 안전 교육을 받은 ‘바이터’ 인력을 훈련합니다. 원자로와 원심분리기에 필요합니다. 농축된 우라늄 근처에 면허 없는 바이터가 있는 걸 원하지는 않을 테니까요.
office-desk-production=서류 제국의 핵심. 이 책상 위에 없다면 존재하지 않다는 것을 의미합니다.
office-drama-recycling=사내 갈등에 약간의 커피를 첨가한 다음 흔들어 보세요. 작업 지시서, 뒷담화, 변명 중 하나가 나옵니다. 사무실 문화의 핵심 3요소죠.
osha-scrubbing=말도 안 되는 헛소리와 노조 동의를 적절히 섞어 OSHA 위반 사항을 없애보세요. 정당화를 생성합니다.
osha-violation-recycling=OSHA 위반을 노조 기계에 다시 투입하고, 어떤 서류가 쏟아져 나오는지 확인해보세요. 지우는 것보단 훨씬 저렴하지만, 결과는 운에 맡겨야 합니다.
overtime-exemption=건물 하나를 해가 진 뒤에도 운영되도록 허가합니다. 이 모듈은 근로자의 작업량과 삶의 질을 신경쓰지 않습니다. 오직 커피 공급량만 중요하죠.
paper-production=나무를 종이로 변환합니다. 모든 행정 공급망의 첫 단계입니다.
pneumatic-pipe-production=공장 내 서류를 고속으로 운송하는 데 사용할 수 있는 밀폐된 튜브. 일반 파이프는 액체 운반용이며, 법률 서류를 운반하기 위한 용도가 아니니까요.
pneumatic-pipe-to-ground-production=건물과 컨베이어 벨트 아래로 공압 파이프를 매설합니다. 지하 범위: 16칸
policy-production=끝없는 회의의 결과, 이제 지침 서류 형태로. 규제 서류 공정이나 상위 단계 허가서에 사용됩니다.
politician-fluid-refining=원시적인 정치 유체를 순수한 기만으로 증류합니다. 선전 증류소는 판단하지 않으며, 그저 정제할 뿐입니다.
printer-t1-production=초기형 전기 프린터입니다. 느리지만 신뢰할 수 있으며, 실제로는 그렇지 않더라도 정신적으로는 영원한 종이 걸림 상태입니다.
printer-t2-production=복사 기능이 추가된 업그레이드된 인쇄용 프린터입니다. 문서 하나를 넣은 뒤, 여섯 장으로 복사할 수 있습니다. 참고: 제작 진행에 바이터 작업자 한 마리의 승인이 필요합니다.
admi-productivity-module=모든 생산에서 낭비되는 부분이 있는지 내부 감사를 진행합니다. 감사관들은 섬세하기에 그만큼 작업 속도를 늦춥니다.
admi-productivity-module-2=감사 범위를 넓힙니다. 실제 데이터로 뒷받침된 여러 예비 조사 결과를 통해 더 자세한 결과를 이끌어냅니다.
admi-productivity-module-3=연방 차원의 완전한 조사를 진행합니다. 전면적인 사전 감사, 정당성 입증, 자격 증명의 결합은 가장 생산적이면서도 가장 억압된 감사 체계를 구축합니다.
promise-production=시위하는 바이터들에게 던져줄 수 있는 모호한 약속 문서. 비록 법적 구속력이 없으며, 구체적이지도 않으며, 영구적인 것도 아니지만 시간을 벌어주는 것은 충분히 가능합니다.
propaganda-distillery-production=선전 증류소를 건설합니다. 정치 유체를 거짓말, 허위사실이나 다른 행정 부산물로 변환합니다.
provisional-approval-production=가장 기본적인 행정적 승인. 잔해 더미의 첫 사용처이자, 화력 인프라로 통하는 관문입니다.
radiological-work-order-production=최고 등급의 운영 허가. 경영진이 서면으로 승인했다는 전제 하에, 원심분리기에서 원자력 물질을 근로자가 취급할 수 있도록 허가합니다.
refined-nonsense-production=고급 행정 절차의 핵심. 물리적인 폐기물이 액체 허위사실과 마주친 다음. 서로 물러서지 않고 있을 때 만들어집니다.
regulation-production=정부 권위의 궁극적 표현. 초안 작성에만 터무니없이 많은 세금과 데이터가 필요합니다.
research-grant-approval-production=실행 가능한 최소 단위의 연구비 승인. Administratorio 모드의 과학 팩 제작에 필요합니다.
research-grant-work-order-production=과학 발전에는 세금이 필요합니다. 세금을 마련하려면 서류 작업이 필요하며, 서류 작업에는 과학 팩이 필요합니다. 이는 행정주의 순환 고리이며, 반복될 것입니다.
resolution-office-production=민원이 해결되거나, 재분류되는 곳. 행정 처리 절차의 핵심입니다
rideable-biter=바이터 작업자를 개인 이동 수단으로 고용합니다. 지속적인 세금 지원이 필요하며, 극히 제한된 화물 적재 용량을 가집니다. 한 번 설치한 뒤 회수할 수 없으며, 10분 동안 세금이 지원되지 않으면 일반적인 바이터로 돌아가 민원을 제기합니다.
safety-waiver-draft=기본적인 핑계거리 단 하나면, 행정부의 모든 책임을 지울 수 있습니다. 당연하겠지만 법적 효력을 발휘하기 전 프린터 최종 승인 진행이 필요함에는 유의하세요.
safety-waiver-printing=안전 책임 면책서에 도장을 찍은 다음 발효시킵니다. 1티어 건설 및 장비 운영 허가에 필수적입니다.
safety-work-order-printing=중간 단계를 건너뛰고 초안만으로 안전 작업 지시서를 인쇄합니다. 한 번에 두 장씩 - 나머지는 프린터가 해 줄 겁니다.
safety-work-order-production=조립 기계에서 약간 위험한 작업을 수행할 수 있도록 승인합니다. 현재 행정 체제의 대부분의 작업을 포함하며, 초보적인 조립 작업에 사용됩니다.
slush-fund-production=합법적인 정부 채권을 추적 불가능한 유동 자산으로 전환합니다. "완전히 합법적인 방법입니다. 질문은 삼가해 주세요."
smog-final=공기 오염 수준이 허용 범위 내라는 것을 공식적으로 선언하세요. 허위사실과 커피면 충분합니다. 이 선언의 거짓을 밝힌다고 해봐도 결코 쉬운일이 아니겠군요.
admi-speed-module=기계 생산 속도를 높일 수 있도록 할 법적 경고문을 작성해보세요. 에너지 비용을 정당화할 만큼 그럴듯한 핑계거리가 필요합니다.
admi-speed-module-2=경고문을 소환장으로 격상해보세요. 경고문 사본 4부와 그럴듯한 핑계, 더 설득력 있는 논리를 추가하면 됩니다.
admi-speed-module-3=이야기거리, 자격 증명, 그리고 사법부의 전적인 권위를 이용한 연방 소환장입니다. 행정적 속도의 정점입니다.
steel-plate-batch=강철 제련 허가서. 이 증서는 철보다 더 빨리 불타 없어지지만, 처리량을 보면 그만한 가치가 있다 여길 것입니다.
stone-brick-batch=벽돌 제련 허가서. 지금같은 상황에서는 이런 벽돌조차도 탄소 배출을 걱정해야 합니다.
synthetic-paper-production=고속 서류 처리에 필요한 원유 기반 종이. 나무 재배보다는 확실히 빠르지만, 화학 물질이 필요합니다.
tax-audit=세탁된 돈을 합법적인 수익으로 재분류합니다. 더러운 서류가 깨끗해져서 나오는데, 웬지모르게 세금도 같이 불어납니다.
transit-authorization-production=철도 물류에 필요한 공식 허가서. 기차 한 대가 도착할 때마다 서류 한 장이 필요됩니다. 이제 서류가 없으면 기차도 없습니다.
treasury-bond-production=공자금을 거래 가능한 금융 상품으로 포장합니다. 비록 쓸모없는 서류처럼 보이지만 법적으로 필수입니다.
tube-intake-production=공압 운송망 투입구. 서류를 투입하고 다른 출구 어디에서나 요청하세요.
tube-outtake-production=공압 운송망 배출구. 필터를 설정하여 필요한 특정 서류 유형을 요청하세요.
unemployment-final=엄청난 양의 서류 작업을 마치고, 실업 문제의 답을 찾아보세요: 일자리를 창출한 것이 아니라, 그렇게 보일 수 있을 만큼 충분한 서류를 만들었습니다.
union-approval-production=커피, 데이터, 공자금을 사용한 고대 의식을 통해 근로자 동의를 확보하세요. 노조 승인이 없으면 아무 것도 진행되지 않습니다.
union-delegate-training=공식 허가서, 법적인 딱딱한 문구, 그리고 정말 많은 커피 섭취가 필요한 혹독한 훈련 과정입니다. 이 과정을 완료한 대표가 있어야 노조 본부 제작이 가능합니다.

