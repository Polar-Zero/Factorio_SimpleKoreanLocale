[technology-description]
administrative-bureaucracy=통제된 환경 조건에서 목재를 재배합니다. 온실과 초기 목재 생산이 잠금 해제됩니다.
administrative-science-research=민원 해결 파이프라인을 재현 가능한 과학 형태로 공식화합니다. 회색 행정 과학 팩 잠금 해제 가능.
after-hours-operations=민원 접수처의 야간 근무를 법적으로 표준화합니다. [item=overtime-exemption] 초과 근무 모듈의 잠금을 해제합니다. 이를 투입하면 주요 사무실 건물을 밤에는도 사용할 수 있게 됩니다.
constitutional-law=바이터 민원 처리의 마지막 단계. 생산 과학 단계에서 실업 수당, 사례 관리, 보고서 작성, 최종적 해결 작업이 가능합니다.
corporate-hospitality=커피와 사내 갈등를 유용한 이야기거리로 바꿔보세요. 커피, 회사 탕비실, 커피 정제, 뒷담화, 사내 갈등 재활용을 사용할 수 있게 됩니다.
creative-accounting=비자금을 공식 수익으로 재분류하는 작업을 표준화하세요. 세무 감사가 가능해집니다.
discovery-bullshit=찾으셨군요. 이제 논리적으로 다듬기만 하면 됩니다. 수상한 데이터 제련, 기본적인 핑계 작성, 첫 번째 안전 면제 및 건설 허가서 작성, 기본적인 경관 문제 해결이 가능합니다.
discovery-redundant-rubble=지역 지질 구조을 건드리자마자, 엄청난 불필요한 요구 사항 더미가 쏟아져 들어옵니다. 임시 허가서, 민원 접수처, 행정적 약속, 해결 사무소, 초기 경관 신고, 화력 채광 드릴을 사용할 수 있게 됩니다.
eminent-domain-zoning=대규모 확장을 위한 정책 발판을 마련해보세요. 용지, 정책 지침, 비자금 잠금 해제 가능.
environmental-certification=기본적인 탄소 관련 서류를 감사된 형태의 환경 인증서로 업그레이드합니다. 검증된 탄소 배출 인증서를 사용할 수 있게 됩니다.
environmental-compliance=제대로 문서화된 환경영향 평가를 통해 석유화학 공정을 사용할 수 있도록 합니다. 석유화학 운영 허가서, 환경 영향 보고서, 화학 물질 취급 작업 지시서, 검증된 탄소 인증서 사용 가능.
environmental-reporting=표준적인 요청서를 규정 준수 보고서로 재작성합니다. 환경 영향 보고서 사용 가능.
executive-review=행정적 절차를 서명된 공식 서면 지침으로 격상, 개선해보세요. 가장 엄격한 규제가 필요한 작업을 위한 서면 업무 허가서 사용이 가능합니다.
federal-regulation=정책을 법적인 효력을 갖는 연방 법률로 전환하세요. 규정 초안 작성이 가능해집니다.
hazmat-response=모르는 건 문제가 되지 않습니다 - 방사성 물질이 아니라는 전제 하에 말이죠. 위험 물질 신고, 서류 작업 및 최종 해결까지 가능해집니다.
health-and-safety=노조의 영향력을 규제의 장으로 바꿔보세요. OSHA(직업안전보건청) 조사, 정당화, 이야기거리 제작이 가능해집니다.
industrial-printing=화학적인 인프라를 이용해 전기 프린터에 비해 확장된 서류 처리량을 이용하세요. 산업용 프린터와 함께 빈 서식, 빈 허가서, 빈 지시서, 탄소 배출 인증, 서식 27B-6, 환경 영향 보고서에 대한 대량 복사 제작법을 잠금 해제합니다.
industrial-propaganda=산업적 규모로 허위사실 무기화를 진행합니다. 선전 증류소, 압축된 잔해 생산, 정치적 유체 정제, 허위사실, 정제된 헛소리, 인증서를 잠금 해제합니다.
information-management=뒷담화와 인증서를 실질적인 문서 기록으로 바꿔보세요. 데이터 합성과 그럴듯한 핑계을 만들 수 있게 됩니다.
littering-resolution=불법 투기 신고 처리 절차를 공식화하세요. 수상한 데이터, 쓰레기 무단투기 신고 및 해결까지 진행할 수 있게 됩니다.
local-precedents=철도 및 규정 준수 서류의 법적 상용구를 표준화하세요. 쓸모없는 문서와 서식 27B-6의 잠금을 해제합니다.
loitering-ordinances=그저 서서 아무것도 하지 않는 행위가 이제 처벌 대상이 되었으며, 바이터들은 이제 행복하지 않습니다. 배회 신고, 서류 작업, 요약 및 최종적인 해결까지 진행할 수 있게 됩니다.
nest-expropriation=서류로 뒷받침되는 무력을 통해 영토를 차지하세요. 바이터 산란장 제거를 위한 퇴거 통지 잠금 해제.
noise-ordinances=침묵은 금이며, 소음 위반 입증에는 막대한 비용이 필요합니다. 소음 신고, 서류 작업, 요약 및 최종적인 해결까지 진행할 수 있게 됩니다.
office-agriculture=사무실 커피 공급을 단순하게 주워 모으는 수준을 넘은 산업화를 진행해보세요. 커피 농장을 잠금 해제합니다.
pneumatic-form-transport=공압 파이프를 통해 문서를 전송합니다. 문서 투입구, 문서 배출구, 공압 문서 파이프의 잠금을 해제합니다. 투입구는 유효한 서류 아이템만 받아들이며, 공압 파이프는 일반 유체 인프라와 연결되지 않습니다.
printing-technology=자동화된 문서 생산. 공정 검색이 모두 완료되면 기본적인 프린터를 사용할 수 있게 됩니다.
public-finance=재무부와 노조을 행정 채제로 끌여들여보세요. 국채, 노조 본부, 노조 승인 및 정부 보조금을 해금합니다.
radiological-compliance=서류 처리 작업을 원자력 영역으로 확대하세요. 원심분리기 및 우라늄 처리를 위한 방사선 작업 허가서를 사용할 수 있게 됩니다.
rubble-compaction=여분의 잔해를 표준화된 건축 자재로 압축하여 추후 인프라 구축에 사용할 수 있도록 합니다. 압축된 잔해 생산이 가능해집니다.
smog-abatement=누군가 측정하기 전까지 공기 오염도는 문제없는 수준이었다고 합니다. 스모그 신고, 서류 작업 및 최종적인 해결까지 진행할 수 있게 됩니다.
streamlined-work-orders=허가서 중간 단계를 생략하고 초안에서 바로 작업 허가서를 인쇄할 수 있게 됩니다. 전기 프린터에서 초안을 작업 허가서로 직접 인쇄할 수 있으며, 제작 과정 당 2개의 작업 허가서를 출력할 수 있습니다.
synthetic-stationery=석유에서 추출한 문구류 생산을 공식화하세요. 플라스틱, 유황, 물로 만든 합성 용지를 잠금 해제하여 많은 양의 서류를 공급할 수 있습니다.
vagrancy-ordinances=최종 스피터 민원 단계. 다용도 과학 단계에서 부랑자 신고, 서류 작업, 개요 및 최종적인 해결까지 가능해집니다.
verbal-approvals=경영진와의 구두 약속을 재사용 가능한 문서로 공식화하세요. 빈 허가서, 허가서 복사 및 경영진 구두 허가서 잠금이 해제됩니다.
work-order-duplication=완성된 작업 허가서의 산업적 복사 절차를 표준화합니다. 이를 통해 산업용 프린터에서 기본 허가서 서식부터 방사선 작업 허가서에 이르기까지 모든 작업 허가서 계열에 대한 대량 복사가 가능해집니다.
admin-station-capacity=각 대기소의 대기 공간을 1칸 확장합니다.
board-meetings=노동조합 본부를 이사회 회의실로 확장합니다. 별도의 전용 건물을 추가하지 않고도 서면 관리 제안과 승인이 가능해집니다.
charcoal-production=온실에서 생산한 목재로 규제된 재생 가능 석탄 생산을 공식화합니다. 목탄 생산이 가능합니다.
nest-pacification=적대적인 바이터에 대한 뇌물 제공을 재사용 가능한 행정 절차로 공식화합니다. 바이터 산란장의 적 생성을 3분 동안 일시 정지시킬 수 있는, 뇌물을 사용할 수 있게 됩니다.
pneumatic-capacity=각 공압 튜브망이 운송할 수 있는 서류 아이템 갯수를 증가시킵니다.
pneumatic-capacity-1=튜브 이음새를 강화하여 더 많은 서류를 한 번에 처리할 수 있게 합니다. 튜브 네트워크 용량: +10
pneumatic-capacity-2=고밀도 공압 배송을 위해 압력 조절기를 설치합니다. 튜브 네트워크 용량: +30
pneumatic-capacity-3=완전한 산업적 처리를 위한 공압 인프라를 구축합니다. 튜브 네트워크 용량: +50
admi-automobilism=국가적인 승인을 통해 기존의 자동차 운행을 다시 가능하도록 복원합니다. 기본적인 자동차는 다용도 과학 단계에서 사용할 수 있습니다.
biter-employment=민원을 해결한 바이터가 공식적으로 고용될 수 있도록 하는 프로그램을 수립합니다. 구인 공고, 사무실 책상, 그리고 해결사 사무소 사용이 가능합니다. 행정주의, 행정 과학 연구만 필요합니다.
biter-employment-office=산업 기계로 근로자를 파견할 수 있도록 하는, 바이터 고용 사무소를 개설할 수 있게 됩니다. 바이터 고용 사무소 건설이 가능합니다.
biter-labor-efficiency=파견된 바이터 근로자가 한 번 이동으로 승인할 수 있는 기계의 수량을 증가시킵니다.
biter-labor-efficiency-1=개선된 경로 설정을 통해, 파견된 각 바이터 근로자가 한번에 3대의 기계를 방문할 수 있도록 합니다. 방문한 각 기계는 다음 방문 전까지 한 번의 제작을 진행할 수 있습니다.
biter-labor-efficiency-2=고급 경로 설정을 통해, 파견된 각 바이터 근로자가 한번에 5대의 기계를 방문할 수 있도록 합니다.
biterport-logistics=바이터포트 설비를 잠금 해제합니다. 바이터 물류 작업자를 훈련시킬 수 있게 되며, 바이터가 운반할 수 있도록 아이템 하나를 넣을 수 있는 서류 상자도 해제됩니다.
biterport-transport-capacity=바이터포트의 각 바이터 물류 작업자가 한 번에  운반할 수 있는 아이템 수를 증가시킵니다.
biterport-transport-capacity-1=물류 적하 목록을 공식화합니다. 각 바이터 물류 작업자가 한 번 이동할 때마다 아이템 2개를 운반할 수 있습니다.
biterport-transport-capacity-2=바이터 안장 가방과 서류철을 업그레이드합니다. 각 바이터 물류 작업자가 한 번 이동할 때마다 아이템 5개를 운반할 수 있습니다.
biterport-transport-capacity-3=물류 처리 방식을 표준화합니다. 각 바이터 물류 작업자가 한 번 이동할 때마다 아이템 10개를 운반할 수 있습니다.
biterport-transport-capacity-4=대규모 운송을 위해 강화된 운반 장비를 지급합니다. 각 바이터 물류 작업자가 한 번 이동할 때마다 아이템 25개를 운반할 수 있습니다.
biterport-worker-speed=바이터포트에서 파견된 바이터 물류 작업자의 이동 속도를 증가시킵니다.
biterport-worker-speed-1=더 좋은 신발. 바이터 물류 작업자의 이동 속도가 35% 빨라집니다.
biterport-worker-speed-2=더욱 좋은 신발. 바이터 물류 작업자의 이동 속도가 70% 빨라집니다. 거의 조깅하는 수준입니다.
chemical-operator-training=바이터 작업자들이 화학 공장을 건설하고 화학 물질을 취급할 수 있도록 훈련한 뒤 자격을 부여합니다. 훈련 센터에서 화학 작업자 훈련을 사용할 수 있게 됩니다.
field-office-deployment=현장 사무소는 임시 승인, 약속, 그리고 행정 사무소 건설에 필요한 최소한의 지역 권한을 확립합니다.
filing-cabinet-logistics-1=이제 당신의 인벤토리에 작은 보관함이 생겼습니다. 안목 있는 관리자가 사용할 수 있도록, 요청 슬롯과 폐기 슬롯 인벤토리가 증가됩니다.
filing-cabinet-logistics-2=중간 관리직이 더 큰 서류 보관함을 갖게 됩니다. 개인 물류 인벤토리가 더욱 증가됩니다.
filing-cabinet-logistics-3=모든 것이 이제 분류, 상호 참조, 색상 정리되어 보관됩니다. 당신은 행정 제도의 화신이 되었습니다. 개인 물류 용량을 최대치까지 증가시킵니다.
formation-center=바이터 훈련에 사용할 수 있는 훈련 센터 건설이 가능해집니다. 바이터 전문화에 필수적으로 필요합니다. 훈련 센터 건설이 가능합니다.
hired-biter-fieldwork=바이터들의 자율적인 퇴거를 돕는, 현장 요원 시범 프로그램을 승인합니다. 적의 둥지를 스스로 찾아내 퇴거 통지서를 전달할 수 있는 완전한 법적 권한을 가진 거대한 베헤모스 바이터를 훈련시킬 수 있게 되지만, 훈련하는 데 매우 많은 비용이 필요합니다. 하지만 효과가 매우 뛰어날 것입니다.
nuclear-technician-training=바이터 근로자들을 훈련시키고, 원자로 운영 면허를 소지한 원자력 기술자 인증을 부여합니다. 훈련 센터에서 원자력 기술자 훈련을 이용할 수 있게 됩니다.
pneumatic-capacity-4=고위급 문서에 대한 압력 격리가 가능합니다. 튜브 네트워크 용량: +100
rideable-biter=바이터를 이용한 개인 이동수단을 승인합니다. 탑승 가능한 바이터 제작이 가능합니다.
union-delegate-training=바이터 근로자의 노조 대표 자격을 인증합니다. 훈련 센터에서 노조 대표 훈련이 가능합니다.

