[entity-description]
admin-station=5x5 바이터 민원 접수처. 민원 티켓과 해결 관련 아이템을 저장합니다. 도착한 바이터는 이곳에서 민원을 접수한 다음 해결을 기다릴 것입니다. 제작 기능 없음 - 보관소로만 작동합니다.
bullshit-ore=자연적으로 발생한, 많은 헛소리들이 매장되어 있습니다. 행정 처리에 사용할 헛소리 원석을 얻기 위해 채광할 수 있습니다.
corporate-breakroom=커피와 수상한 데이터를 이용하여 뒷담화를 생성합니다. 이는 관공서 의사 결정에 필수적입니다. [item=overtime-exemption]을 장착하지 않았다면 밤에 문을 닫습니다.
corporate-breakroom-no-working-hours=커피와 수상한 데이터를 이용하여 뒷담화를 생성합니다. 이는 관공서 의사 결정에 필수적입니다.
mechanical-printer=투박하지만 잘 작동하는 수동 프린터. 크랭크 핸들을 통해 작동하지만(0.5배속) 신뢰할 수 있는 게임 초반 주력 아이템입니다.
meeting-room=매우 느린 속도로 (0.5배속) 서면 결재, 정책 업무, 세무 감사 초안을 작성합니다. 7x7 공간이 필요하며, [item=overtime-exemption]을 장착하지 않았다면 밤에 문을 닫습니다.
meeting-room-no-working-hours=끔찍할 정도로 느린 속도로 (0.25배속) 서면 승인, 정책 업무, 세무 감사 초안을 작성합니다. 7x7 공간이 필요합니다.
office-desk=서류 정리, 비품, 기본 행정 업무를 위해 제작된 통합 작업실. [item=overtime-exemption]을 장착하지 않았다면 밤에 문을 닫습니다.
office-desk-no-working-hours=서류 정리, 비품, 기본 행정 업무를 위해 제작된 통합 작업실.
overtime-exemption=하나의 행정 건물이 합법적으로 야간 근무를 진행할 수 있도록 인증합니다. 모듈 하나로 밤에는 건물 한 채 전부에 적용되므로, 더 있더라도 그저 장식일 뿐입니다.
pneumatic-pipe=액화된 서류를 운반하는 데 사용할 수 있는 마닐라색 밀폐형 파이프. 일반 유체 파이프와 연결할 수 없습니다.
pneumatic-pipe-to-ground=지하 연결용 공압 파이프. 일반 유체 파이프와 연결할 수 없습니다.
politician-fluid=정치적 본질이 담겨 있는, 압추축된 지하 균열. 시추기로 추출하여 정치적 유체를 퍼올리세요.
printer-t1=느리지만 안정적인 전기 프린터. 잉크 카트리지로 문서를 출력합니다. (50kW 사용)
printer-t2=복사 모드가 있는 산업용 고속 프린터. 인쇄된 문서를 1:6 비율로 복제할 수 있습니다. (200kW 사용) 각 공정의 진행을 승인받으려면 주변 [entity=biter-station] 바이터 인력사무소의 [item=biter-worker] 바이터 근로자가 필요합니다.
propaganda-distillery=5x5 행정 유체 정제소. 정치적 유체를 거짓말로 정제하거나, 유체 허위사실을 합성하여 핑계과 비자금으로 만들어냅니다. 서쪽 유체 투입구 2개, 동쪽 유체 배출구 2개 지원.
redundant-rubble=많은 행정 잔해가 매장된 지질학적 퇴적층. 채굴하여 공문서 제본에 필요한 잔해를 확보하세요.
resolution-office=3x3 제작 설비. 유체 투입구 2개를 가졌으며, 이를 통해 접수, 사건 처리 및 최종 판결을 진행합니다.
admi-greenhouse=물에서 천천히 나무를 키우거나 희귀한 커피 원두를 재배합니다. 전력 구동.
admi-locomotive=환승 허가 상자가 각 기차 정류장에 자동으로 배치됩니다. [item=transit-authorization]이 도착한 기차마다 하나씩 필요합니다. 정류장의 기차 한도는 상자에 있는 서식의 수와 동일합니다.
form-liquifier=1x1 파이프 투입 시설. 인접한 벨트/상자의 서류 작업 아이템을 공압 파이프 운송을 위한 유체로 변환합니다. (20kW 사용)
form-solidifier=1x1 파이프 배출 시설. 들어온 공압 유체를 다시 일반적인 서류 작업 아이템으로 변환하여 인접한 벨트/상자에 투입합니다. (20kW 사용)
tube-intake=1x1 문서 입력 시설. 투입기로 유효한 서류 아이템을 튜브 네트워크로 직접 투입할 수 있습니다.
tube-outtake=1x1 문서 출력 시설. 문서 네트워크의 아이템이 출력되어 인벤토리에 나타납니다 - 자체 투입기나 물류 네트워크를 이용해 꺼낼 수 있습니다. 특정 아이템 유형을 요청하려면 인벤토리 슬롯 필터를 설정하세요.
union-headquarters=노동과 관련된 승인 협상을 진행하며 이제 게임 후반의 통합된 경영 업무를 담당합니다: 보조금, 서면 승인, 정책 초안 작성, 세무 감사. 첫 번째 사본은 국채와 구두 서류에서 시작됩니다. [item=overtime-exemption]이 장착되지 않으면 밤에 문을 닫습니다.
union-headquarters-no-working-hours=노동과 관련된 승인 협상을 진행하며 이제 게임 후반의 통합된 경영 업무를 담당합니다: 보조금, 서면 승인, 정책 초안 작성, 세무 감사. 첫 번째 사본은 국채와 구두 서류에서 시작됩니다.
biter-station=인근의 관리 대상 건물 작동에 필요한 인력 요소인, 바이터 작업자들을 주변에 파견합니다. 작업자가 도착한 기계는 한 번의 제작 작업을 수행한 뒤, 다음 작업자를 기다릴 것입니다. 참고: 야간에 파견 작업을 진행하려면 파이프를 통해 투입된 커피가 필요합니다.
biterport=최대 8마리의 바이터 물류 작업자와 세금을 보관합니다. 연결된 바이터포트는 기본 로보포트 크기와 동일한 크기의 건설/물류 구역을 제공함과 동시에, 동적인 건설/물류 네트워크를 추가로 생성합니다. 바이터포트 범위 내에서 바이터들이 고스트 객체를 건설하거나 요청 상자의 아이템을 이동하는 것이 가능하며, 일반적인 로봇 역시 여전히 기존 로보포트 구역을 사용할 수 있습니다. 복귀한 작업자는 다시 파견되기 전 30틱(0.5초)동안 휴식합니다. 참고: 야간에 파견 작업을 진행하려면 파이프를 통해 투입된 커피가 필요합니다.
field-office=200칸 내 산란장에서 바이터를 소환하여 작업당 1마리씩 근로자로 배치합니다. 바이터가 현장에 있어야 작동하며, 이 과정에서 공해는 발생하지 않습니다. [item=overtime-exemption]을 장착하지 않았다면 밤에 문을 닫습니다.
field-office-no-working-hours=200칸 내 산란장에서 바이터를 소환하여 작업당 1마리씩 근로자로 배치합니다. 바이터가 현장에 있어야 작동하며, 이 과정에서 공해는 발생하지 않습니다.
formation-center=5x5 크기의 바이터 훈련 시설입니다. 바이터 근로자를 소모하거나 훈련된 바이터 임무를 생산하는 제작법을 제작할 수 있는 유일한 기계입니다.
paperwork-provider-chest=바이터 물류 네트워크에 사용할 수 있는, 아이템 하나의 보관이 가능한 수동형 공급 상자. 로봇도 접근할 수 있습니다.
paperwork-requester-chest=바이터 물류 네트워크에 사용할 수 있는, 아이템 하나의 보관이 가능한 요청 상자.
