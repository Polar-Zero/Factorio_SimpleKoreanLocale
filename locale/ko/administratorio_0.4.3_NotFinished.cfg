[virtual-signal-description]
signal-available-slots=연결된 모든 사무소의 남은 대기 가능한 공간을 나타냅니다. 이 수치가 0이 되면 시위가 시작됩니다.
signal-complaint-h=유해 물질 관련 민원을 집계합니다. 수치가 증가한다는 것은 화학 인프라에 대한 관심이 높아지고 있다는 의미입니다.
signal-complaint-l=미해결 경관 관련 민원을 집계합니다. 가장 기본적인 민원인데, 이 수치가 증가하면 업무 처리가 밀리고 있다는 의미입니다.
signal-complaint-lo=배회 관련 민원을 집계합니다. 제한 구역 위반 사례가 쌓이고 있습니다.
signal-complaint-lt=스피터들에 대한 쓰레기 투기 민원을 집계합니다. 산성 웅덩이 주변 주민들이 우려하고 있습니다.
signal-complaint-n=소음 민원을 집계합니다. 산란장 근처에 건물을 너무 많이 설치하면 급증하는 경향이 있습니다.
signal-complaint-s=현재 진행 중인 스모그 민원을 집계합니다. 이 수치가 오르면 공해량도 함께 증가합니다.
signal-complaint-u=실업 관련 민원을 집계합니다. - 대형 바이터들만 이 민원을 접수하며, 수치가 증가한다는 것은 진화 증가 속도가 처리력을 앞지르고 있다는 것을 의미합니다.
signal-complaint-v=방랑자 관련 민원을 집계합니다 - 가장 심각한 스피터 민원으로, 이 수치가 변동한다면, 더 많은 해결 능력이 필요할 것입니다.
signal-total-waiting=현재 대기 중인 바이터의 수를 나타냅니다. 이 수치가 높아질수록, 더 힘든 시기가 다가오고 있음에 유의하세요.


[mod-setting-name]
administratorio-enable-working-hours=근무 시간 제한 활성화

[mod-setting-description]
administratorio-enable-working-hours=이 기능을 활성화하면 초과 근무 면제가 적용되지 않은 사무실 작업대, 탕비실, 노조 본부, 이사회 회의실이 밤에는 문을 닫게 됩니다. 바이터 대기소와 바이터포트의 야간 물류 작업에 액체 커피가 필요하게 됩니다. 비활성화할 경우 야간 종료, 초과 근무 모듈 모듈, 초과 근무 연구, 근무 시간 팁, [font=default-bold]주간 작업속도 향상 버프[/font]가 제거됩니다.