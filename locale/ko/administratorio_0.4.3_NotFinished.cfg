administratorio-biter-complaints=[font=default-bold]The admin desk replaces enemy attack waves with a queue.[/font]\n\nInstead of forming raids, biters and spitters walk to your [entity=admin-station] desks looking for an open slot. Each desk has 4 active service slots and a waiting zone holding up to 12 biters in total.\n\n[font=default-bold]How a citizen flows through:[/font]\n1. The biter takes a slot and drops one or more complaint tickets in the desk\n2. You pull the tickets out and process them at the [entity=resolution-office] into matching resolutions\n3. You insert each resolution back into the slot the biter is sitting in\n4. Once it has every resolution it was waiting for, the biter drops [item=taxpayer-money] and walks home to despawn\n\n[font=default-bold]Tiers and biter size:[/font]\nWhich complaints a biter files depends on its type. Biters file landscape, smog, noise, or unemployment complaints; spitters file littering, hazmat, loitering, or vagrancy complaints. As evolution rises, harder tiers appear and your resolution pipeline has to keep up. Bigger enemies file [font=default-bold]multiple complaints at once[/font] - a single behemoth can demand a whole stack of resolutions before it leaves.\n\n[font=default-bold]Evolution still works:[/font]\nNests absorb pollution and slowly raise evolution as in vanilla. Each step shifts what your desks demand, so the resolution chain has to grow with the factory.\n\n[item=taxpayer-money] funds capsules, dispatch buildings, and most expansion - the faster you clear complaints, the more money flows. Each desk also emits circuit signals for ticket counts, free slots, and total waiting biters; wire them up to scale capacity before the queue overflows.
administratorio-biter-employment=[font=default-bold]구인 공고s convert resolved biters into hireable workers.[/font]\n\nPlace a [item=job-offer] in any slot of an [entity=admin-station]. When the biter sitting in that slot has received [color=green]every[/color] resolution it was waiting for, it picks up the offer instead of leaving. The offer is consumed and a [item=biter-worker] item drops into the desk inventory. [color=red]No[/color] [item=taxpayer-money] is paid out for that biter - the hire replaces the cash.\n\n[font=default-bold]Yield by size:[/font]\nLarger enemies hire as more workers per offer:\n• Small → 1 • Medium → 2 • Big → 3 • Behemoth → 5\nSpitters follow the same scale.\n\nFrom there, the worker can be loaded into a [entity=biter-station] for direct dispatch, or sent to the [entity=formation-center] for specialist training. Each job offer is a tradeoff - you give up the immediate cash payout to grow the workforce that the late game cannot run without.
administratorio-biter-station=[font=default-bold]Required infrastructure: some buildings cannot run without one.[/font]\n\nThese managed buildings only craft when a biter walks up to authorize the cycle:\n• [entity=oil-refinery]\n• [entity=centrifuge]\n• [entity=printer-t2]\n• [entity=corporate-breakroom]\n• [entity=propaganda-distillery]\n\nWithout a [entity=biter-station] in range, those buildings sit idle no matter how much paperwork you've stockpiled. The [entity=union-headquarters] is not in this list - it already consumes a biter as a recipe ingredient.\n\n[font=default-bold]How dispatch works:[/font]\n• Load the station with [item=biter-worker] and [item=taxpayer-money]\n• It sends a worker to each managed building in its zone in rotation\n• Each visit authorizes one craft cycle; the worker then returns\n• A single building can be served by [color=green]multiple stations[/color] at once - overlapping zones mean more frequent visits and more throughput\n\nHover any managed building to see which station(s) are dispatching to it. Hover the station itself for live zone coverage and dispatch status.\n\n[font=default-bold]Labor Efficiency:[/font]\nBy default a worker authorizes 1 machine per trip; research raises this to 3, then 5 per trip.\n\n[font=default-bold]At night:[/font]\nEach dispatch additionally consumes [fluid=liquid-coffee] from the rear pipe input. No coffee, no night dispatches.\n\n[font=default-bold]Economy note:[/font]\nFewer trips means fewer paychecks. Labor Efficiency reduces [item=taxpayer-money] cost per unit of output, not just dispatch frequency.
administratorio-biter-workers=[font=default-bold]바이터 근로자s are stored items that authorize managed machines.[/font]\n\nA [item=biter-worker] sits in a [entity=biter-station] until the station dispatches it. The worker walks to a managed building, lets it run one craft cycle, and walks back. The whole assembler-style production tree runs on this loop.\n\n[font=default-bold]Training at the [entity=formation-center]:[/font]\nWorkers can be trained into specialist roles. Each specialist consumes one base worker plus paperwork, and is required to [color=red]construct[/color] specific buildings:\n• [item=union-delegate] - to construct the [entity=union-headquarters]\n• [item=chemical-operator] - to construct [entity=chemical-plant]\n• [item=nuclear-technician] - to construct [entity=centrifuge] and nuclear reactors\n• [item=biter-logistics-formation] - the unit that staffs [entity=biterport]\n• [item=rideable-biter] - converts a worker into a personal mount\n\nSpecialists are consumed at construction time, not during ongoing operation. Oil refineries are the exception: they use regulated assembler paperwork for construction and biter-station dispatch for operation. Plan specialist supply for build orders, not throughput.
administratorio-biterport=[font=default-bold]The Biterport is a walking-biter version of a roboport.[/font]\n\nLoad it with [item=biter-logistics-formation] (built at the [entity=formation-center]) and [item=taxpayer-money]. Workers walk out to ferry items between logistic chests and to build entity ghosts inside the coverage area.\n\n[font=default-bold]Coverage:[/font]\n• Logistics radius: [font=default-bold]25 tiles[/font]\n• Construction radius: [font=default-bold]55 tiles[/font]\n• Network range: ports within [font=default-bold]50 tiles[/font] of each other share their worker pool - they do not need to overlap to network\n\n[font=default-bold]Two upgrade tracks:[/font]\n• [font=default-bold]Transport capacity[/font] - items carried per trip go from 1 up to 25\n• [font=default-bold]Worker speed[/font] - formations move 35% then 70% faster\n\n[font=default-bold]At night:[/font]\nEach dispatch consumes [fluid=liquid-coffee] from the rear pipe input.\n\nHover any biterport for live network status, active workers, and connection count.
administratorio-complaint-chain=[font=default-bold]Complaint tickets are the bureaucracy's evolution curve.[/font]\n\nEnemy evolution still rises from pollution absorbed by nests. Instead of upgrading attacks, higher evolution changes which citizens arrive and which paperwork chains they demand. Your first desks mostly see simple tickets; later, the same queue must feed several specialized resolution chains at once.\n\n[font=default-bold]Biters file factory-impact complaints:[/font]\n• [item=ticket-landscape] Landscape complaints start the chain\n• [item=ticket-smog] Smog complaints appear as pollution pressure grows\n• [item=ticket-noise] Noise complaints follow heavier industry\n• [item=ticket-unemployment] Unemployment complaints are the late biter case\n\n[font=default-bold]Spitters file conduct and safety complaints:[/font]\n• [item=ticket-littering] Littering complaints are the early spitter case\n• [item=ticket-hazmat] Hazmat complaints arrive with more dangerous processing\n• [item=ticket-loitering] Loitering complaints add another mid-chain branch\n• [item=ticket-vagrancy] Vagrancy complaints are the late spitter case\n\n[font=default-bold]Size changes the batch size:[/font]\nSmall enemies usually need one resolution. Medium, big, and behemoth enemies can file multiple complaints at once, and they will not leave until [color=green]every[/color] requested resolution has been inserted into their desk slot. A single late-game citizen can therefore tie up one service slot while asking for several different finished resolutions.\n\nEach ticket family has its own recipe path through [entity=resolution-office] processing and later paperwork. Build buffers for every unlocked ticket type, watch desk circuit signals for the current mix, and expand before evolution unlocks the next case family.
administratorio-field-office=[font=default-bold]Free biter labor without hiring anyone.[/font]\n\nBuild a [entity=field-office] near an enemy nest (within roughly [font=default-bold]200 tiles[/font]). It calls a biter from the nearest nest to perform crafts on-site. After [font=default-bold]2 crafts[/font] the biter walks home and another one is summoned to replace it.\n\n[font=default-bold]Operating rules:[/font]\n• Only crafts while a biter is physically present\n• 1.0× speed and 0 pollution while working\n• Idle when no enemy nest is in range\n• At night, the biter goes home unless an [item=overtime-exemption] is installed in the building's module slot\n\n[font=default-bold]Why it exists:[/font]\nThe Field Office is the bridge between "no biter workforce" and "fully staffed [entity=biter-station]". It lets you produce a few critical items before the complaint resolution chain has hired you any permanent workers - at the cost of being tethered to a nearby nest.
administratorio-frustration=[font=default-bold]Frustration starts the moment a biter leaves its nest.[/font]\n\nThe timer keeps climbing until the biter has received [color=green]every[/color] resolution for [color=green]every[/color] complaint it filed. Hover any biter to see its current mood.\n\n[font=default-bold]Two ways a protest starts:[/font]\n• Frustration reaches 100% before the case is finished\n• A biter arrives at the queue and no desk has a free slot\n\nWhen either happens, the biter walks to a nearby player building and disables it until you intervene.\n\n[font=default-bold]Bureaucratic Promise:[/font]\nThrow a [item=promise] at a [color=red]protesting biter[/color] (not the building):\n• If a slot is open, the biter heads back to a desk at [font=default-bold]50% frustration[/font] and resumes its case\n• If no slot is open, the biter searches for [font=default-bold]one minute[/font] and then resumes protesting if nothing has freed up\n• The promise [color=red]does not[/color] erase the complaint or reset paperwork progress\n\nPromises buy time. The permanent fix is finishing the case so the biter leaves on its own - stay ahead by adding desks before the queue fills, and by scaling resolution throughput so cases finish faster than frustration accumulates.
administratorio-hired-biter=[font=default-bold]A controllable biter you command directly.[/font]\n\nThrow a [item=hired-biter-capsule] to deploy a biter you can give orders to. It carries up to [font=default-bold]20[/font] [item=eviction-notice] in its 4-slot inventory and patrols on its own, looking for spawners to evict.\n\n[font=default-bold]Commanding it[/font] (hold the [item=hired-biter-command-capsule]):\n• [font=default-bold]Left-click[/font] on ground - toggle selection of agents at cursor\n• [font=default-bold]Right-click[/font] on ground - set waypoint for selected agents\n• [font=default-bold]Shift+Right-click[/font] - append a waypoint (multi-stop route)\n• [font=default-bold]Shift+Left-click[/font] on a chest or supply entity - load [item=eviction-notice] from it\n\n[font=default-bold]Behavior when stocked:[/font]\nA loaded agent scans within [font=default-bold]60 tiles[/font] for enemy spawners. When it finds one, it walks over and consumes one [item=eviction-notice] to destroy it. A single agent on patrol can keep an area pacified as long as you keep restocking it from a chest along its route.\n\nAgent-delivered evictions still displace nearby biters into your complaint system, just like thrown notices. Plan desk capacity accordingly.
administratorio-hush-money=[font=default-bold]Hush Money temporarily stops a nest from spawning.[/font]\n\nThrow [item=hush-money] at an enemy nest. Spawners inside the effect radius go silent for a few minutes, then resume exactly where they were. While suppressed, no new biters leave that nest to file complaints.\n\nUse it when the queue is overloaded and you need to slow the inflow long enough to clear the backlog of pending complaints. It costs [item=taxpayer-money] per throw, so treat it as an emergency valve rather than a long-term plan.\n\nUnlike [item=eviction-notice], hush money does not destroy the nest and does not displace any biters into your queue - its only effect is pausing new arrivals.
administratorio-nest-expropriation=[font=default-bold]Eviction destroys a nest permanently - and shapes your evolution curve.[/font]\n\nThrow [item=eviction-notice] at enemy territory and the nearest spawner is destroyed for good. This is the only way to reclaim land in the mod.\n\n[font=default-bold]Evolution lever:[/font]\nDestroyed nests stop absorbing pollution, so eviction is also how you slow evolution. The catch: nests are also the source of biters, and biters are the source of [item=taxpayer-money]. Wiping out every nest will starve the factory of funding. Balance is the whole game - keep enough nests alive to fund operations, evict enough of them to keep evolution from outpacing your resolution pipeline.\n\n[font=default-bold]Displacement:[/font]\nBiters near the destroyed spawner are not killed. They are dumped straight into your complaint system at elevated frustration. Only evict when your desks and resolution chain can absorb the wave.\n\nFor a non-permanent slowdown that does not displace biters, use [item=hush-money] instead.
administratorio-rideable-biter=[font=default-bold]A personal vehicle that runs on Taxpayer Money.[/font]\n\nDeploy a [item=rideable-biter] to ride a worker as a mount. It burns [item=taxpayer-money] from its fuel slot to stay assigned and has only a tiny cargo pouch.\n\n[font=default-bold]Operating rules:[/font]\n• Once placed it [color=red]cannot be mined or deconstructed[/color] - it leaves on its own\n• When unattended, it may wander a short distance\n• If its fuel slot stays empty for [font=default-bold]10 minutes[/font], the contract lapses\n\n[font=default-bold]What happens when funding lapses:[/font]\nThe biter reverts to a wild [entity=medium-biter] and enters the complaint system. If a desk has free capacity it queues normally. If everything is full, it protests like any other unserved citizen - including, potentially, the building you parked it next to.\n\nKeep a few coins in the saddle.
administratorio-welcome=[font=default-bold]Welcome to Administratorio.[/font]\n\nThis mod replaces military conflict with bureaucracy. Biters and spitters do not form attack groups - they queue. They walk to your [entity=admin-station] desks, file complaints, and wait for you to resolve them. You survive by keeping the paperwork moving.\n\n[font=default-bold]The core loop:[/font]\n1. A biter takes a desk slot and drops complaint tickets\n2. You process the tickets through the [entity=resolution-office] into resolutions\n3. You insert the resolutions back into the slot the biter is sitting in\n4. Once it has every resolution it needs, the biter drops [item=taxpayer-money] and walks home to despawn\n\nIf the queue overflows or a biter waits too long, it protests and shuts down a nearby building. The rest of these tips explain the tools you use to keep that from happening.
administratorio-work-orders=[font=default-bold]Machines run on paperwork as a recipe ingredient.[/font]\n\nAdministrative documents are real inputs to recipes, just like iron or copper. If the right paperwork is missing, the machine idles even when every other ingredient is on the belt.\n\n[font=default-bold]Assembling machines run on Work Orders:[/font]\nEvery assembler recipe consumes a [item=work-order] or one of its transformed variants. Heavier recipes require higher-tier variants - examples include [item=safety-work-order], [item=construction-work-order], [item=management-verbal-work-order], and [item=management-written-work-order]. New recipes unlock alongside the variant they need, so paperwork tiers progress in lockstep with the tech tree.\n\n[font=default-bold]Other machine classes have their own paperwork:[/font]\n• Furnaces consume [item=carbon-offset-certificate-basic]\n• Chemical plants consume [item=chemical-handling-work-order]\n• Centrifuges consume [item=radiological-work-order]\n\nThese are independent supply chains - work orders do not substitute for them, and these documents are not interchangeable across machine classes.\n\n[font=default-bold]Exception - oil refineries:[/font]\nRefineries consume [color=red]no[/color] operating paperwork. They are already gated by biter-station dispatch (a biter has to walk up to authorize each cycle), so the bureaucracy considers that sufficient supervision.\n\nPlan paperwork lines the same way you plan iron and copper.
administratorio-working-hours=[font=default-bold]Buildings that depend on biters close at night.[/font]\n\nThe rule is thematic: if a building either has biters [font=default-bold]coming in to work[/font] (the [entity=office-desk], [entity=corporate-breakroom], [entity=union-headquarters], [entity=biter-station], [entity=biterport], [entity=field-office]) or has biters [font=default-bold]as a recipe ingredient[/font], its workforce goes home at sundown. Without intervention, the building idles until dawn.\n\nYou keep it open at night by giving it the right consumable:\n• [font=default-bold]Office-style buildings[/font] - install one [item=overtime-exemption] in the building's module slot. One copy is enough; extras do nothing.\n• [font=default-bold]Dispatch buildings[/font] - pipe [fluid=liquid-coffee] into the rear input. Each night dispatch consumes one unit.\n\nDay throughput is intentionally higher than night throughput. The mechanic exists to push you to surge during office hours rather than drip-feed paperwork 24/7. Protests still disable buildings even with overtime clearance - clearance buys you the night, not the queue.\n\nIf you dislike the mechanic entirely, disable Working Hours in startup settings before loading the mod.

[virtual-signal-name]
signal-available-slots=사용 가능한 대기 슬롯
signal-complaint-h=유해 물질 민원 신호
signal-complaint-l=경관 민원 신호
signal-complaint-lo=배회 민원 신호
signal-complaint-lt=쓰레기 무단투기 민원 신호
signal-complaint-n=소음 민원 신호
signal-complaint-s=스모그 민원 신호
signal-complaint-u=실업 민원 신호
signal-complaint-v=부랑자 민원 신호
