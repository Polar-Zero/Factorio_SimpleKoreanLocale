[item-description]
admin-station=바이터 민원 접수처. 대기 구역이 내장되어 있으며, 바이터들이 대기하는 위치를 정확히 보여줍니다, 해결된 사건 아이템을 이곳에 놓으면 바이터들이 만족하며 돌아갑니다. 보관만 가능 - 제작 불가.
administrative-science-pack=회색 과학 팩. 행정 연구에 활력을 불어넣습니다. 민원 작업대에서 제작 가능.
basic-excuse=수상한 데이터로 제작한 단순한 정당화. 경관 민원 해결이나 일반적인 행정 절차에 사용됩니다.
blank-approval=잉크를 이용한 공식적인 결재가 필요한 경우 사용되는, 사전 인쇄된 허가서 템플릿. 안전 면제, 건설 허가. 운송 승인에 필요합니다.
blank-directive=3중 잉크가 적용되어 보안성이 향상된 제안서 템플릿입니다. 경영진 수준의 승인에 필요합니다.
blank-form=용도를 기다리는 빈 행정 서식. 행정주의의 도화지. 거의 모든 서류 작업에 사용됩니다.
bullshit-ore=자연적으로 발생한, 많은 헛소리들이 모인 형태. 행정 경제의 핵심 토대이며. 채굴, 정제, 무기화 공정을 거칠 수 있습니다.
carbon-offset-certificate-basic=제한적인 산업적 제련을 허용하는 기본적인 인증서. 대부분의 용광로 제작법에 필요합니다.
carbon-offset-certificate-verified=공식 인증을 추가하여 업그레이드된 인증서. 사무실 민원 처리 과정을 통해 발급할 수 있으며, 강철 용광로 건설 및 고급 제련에 필요합니다.
coffee-bean=희귀하고 귀중한 아이템. 퇴비를 샅샅이 뒤져야 발견할 수 있지만, 모든 행정적 일처리의 생명과도 같습니다.
compacted-rubble=산업적으로 압축된 행정적 폐기물, 사용 인증을 받았습니다. 탄소 배출 인증을 갖춘 규제된 제련을 통해 잔해를 압축하여 제작할 수 있습니다.
construction-permit=표준 건축 허가서. 대부분의 기계 제작이나, 높은 단계의 허가서에 필수적으로 필요합니다.
construction-permit-draft=서류 검증 및 잉크 날인을 기다리는 미확정 건축 허가서.
construction-work-order=제작 규제 준수가 확인되었음을 증명하는 통합된 조립 기계 허가서입니다. 조립 기계 제작에만 사용되며. 제작 시 소비됩니다.
corporate-breakroom=커피와 함께 소문을 전파하는 사교의 장. 뒷담화, 그럴듯한 핑계, 구두 승인 초안 제작에 사용됩니다. [item=overtime-exemption]을 장착하지 않았다면 밤에 문을 닫습니다.
crappy-report=정확성이 모호한 급하게 작성된 보고서. 모든 상위 티어 문서의 기본 요소입니다.
credentials=거짓말, 수상한 데이터, 정제되지 않은 헛소리로 만들어진 공식적인 증명. 출처가 모호하지만 엄연히 증명에 사용할 수 있습니다.
data=엉터리 보고서와 인증서를 이용해 합성된 데이터. 실제로도 사용 가능하며, 민원 접수처에서 보기 드문 자원입니다.
dubious-data=헛소리 광석에서 정제한 정보. 신뢰할 수 없지만 기술적인 정보에 해당합니다. 핑계 경제의 중추.
environmental-impact-report=환경 피해에 대한 포괄적인 (심하게 검열된) 평가. 석유화학 및 방사능 관련 서류에 사용됩니다.
eviction-notice=바이터 산란장을 파괴시킬 수 있는, 퇴거 통지를 포함한 캡슐입니다. 매우 주의해서 사용하세요.
filing-h=정식 접수된 위험 물질 민원. 유해 물질 노출에 대한 스피터의 민원 기록이 담겼습니다.
filing-l=정식 접수된 경관 민원. 지역 경관에 대한 시민의 민원을 해결하기 위한 첫 번째 단계입니다.
filing-lo=정식 접수된 배회 민원. 제한 구역 위반에 대한 스피터의 이의가 공식 문서화된 형태입니다.
filing-lt=정식 접수된 쓰레기 투기 민원. 사방에 방치된 산성 웅덩이에 대한 스피터의 이의가 공식 문서화된 형태입니다.
filing-n=정식 접수된 소음 민원. 인프라에서 발생하는 소음에 대한 시민들의 민원 기록이 담겼습니다.
filing-s=정식 접수된 스모그 민원. 산업적 오염에 대한 시민들의 이의가 공식 문서화된 형태입니다.
filing-u=정식 접수된 실업 민원. 경제 정책 실패를 주장하고 있는, 가장 심각한 시민 민원 유형입니다.
filing-v=정식 접수된 부랑자 민원. 가장 심각한 스피터 민원 제기로, 노숙자 및 부랑자에 대한 내용이 포함됩니다.
form-27b-6=악명 높은 표준 요청 서식. 운송 서류 작업, 규정 준수 보고, 상위 티어 행정문서 제작에 사용됩니다.
form-liquifier=서류 아이템을 공압 운송을 위한 유체 형태로 변환합니다. 아이템을 인접하게 배치하면 숨겨진 투입기를 통해 자동으로 공급됩니다.
form-solidifier=유체 형태의 서류 작업을 다시 고체 형태의 아이템으로 변환합니다. 출력된 아이템은 숨겨진 투입기를 통해 인접한 인벤토리로 투입됩니다.
good-excuse=실제 데이터와 유체 형태의 거짓말을 혼합한, 잘 짜여진 핑계. 고급 허가서 및 이야기거리 구성에 사용됩니다.
government-grant=상당한 규모의 공자금이 배정된 형태. 정책 마무리 작업, 고급 민원 처리, 그리고 기타 고급 행정 업무에 사용됩니다.
ink=석탄에서 추출할 수 있는 기본적인 필기액. 서류 문서에 사용하거나 카트리지 형태로 정제할 수 있습니다.
justification=허위사실, 자격 증명, 정치적 유체를 이용하면 공식적으로 법적 정당성을 주장할 수 있습니다. OSHA 정당화에 필요합니다.
management-approval-verbal=경영진의 구두 동의는 기술적인 구속력이 있으나, 쉽게 거부할 수 있습니다. 약간의 커피가 필요하다는 점을 참고하세요.
management-approval-written=서명 및 공증된 경영진의 서약서. 훨씬 구하기 어렵지만 거부가 불가능합니다.
management-verbal-draft=탕비실 대화에서 가져온 구두 허가서 초안. 프린터로 마무리 작업을 진행할 수 있습니다.
management-verbal-work-order=경영진의 구두 약속을 근거로 해 제작된 통합 조립 기계 허가서. 조립 기계에만 사용되며, 사용 시 소모됩니다.
management-written-proposal=끝없는 회의 끝에 도출된 경영 제안서. 대형 프린터를 이용한 추가적인 마무리 작업이 필요합니다.
management-written-review=한 번 출력된 뒤 검토까지 마친 경영 제안서입니다. 한 차례의 프린터 마무리를 통해 작성을 완료하세요.
management-written-work-order=서명된 문서에 의해 증명된 통합된 조립 기계 권한입니다. 조립 기계에만 사용되며, 사용 시 소모됩니다.
mechanical-printer=크랭크식 수동 프린터. 전자적인 인쇄가 가능할 때까지 주력으로 사용됩니다.
meeting-room=서면 관리 제안, 정책 업무, 후반 감사에 사용할 수 있는 7x7 회의 시설입니다. [item=overtime-exemption]을 장착하지 않았다면 밤에 문을 닫습니다.
narrative=정당화, 그럴듯한 핑계, 정제된 헛소리로 짜여진 공식적인 이야기거리. 관공서와 관련된 대중의 인식을 통제합니다.
office-desk=서식, 과학 팩, 세금 지원서 작성, 일반 행정 업무를 위한 다용도 시설입니다. [item=overtime-exemption]을 장착하지 않았다면 밤에는 사용할 수 없습니다.
office-desk-no-working-hours=서식, 과학 팩, 세금 지원서 작성, 일반 행정 업무를 위한 다용도 시설입니다. 
office-drama=뒷담화가 들켜 발생한 인간관계 갈등. 충분한 커피만 있다면 휴게실에서 다양한 업무 지시, 이야기, 기본적인 핑계 등으로 재활용할 수 있습니다.
osha-violation=위험한 산업 공정에서 발생한 작업장 안전 위반. 노조을 통해 정당화 또는 재활용할 수 있습니다.
paper=표준적인 행정 아이템. 나무로 만들거나 플라스틱으로 합성할 수 있습니다. 빈 서식부터 사건 기록에 이르기까지 모든 용도로 사용됩니다.
petrochemical-operating-permit=정유 및 화학 공장에 대한 운영 허가서. 건설, 안전 및 환경 관련 서류를 이용해 작성할 수 있으며, 고체 연료, 플라스틱, 황, 황산 등 기본적인 석유 가공 제작법에 사용됩니다.
pneumatic-pipe=유체화된 서류를 운반할 수 있는 마닐라색 파이프입니다. 일반 유체 파이프와 연결할 수 없습니다.
pneumatic-pipe-to-ground=지하 연결용 공압 파이프. 일반 유체 파이프와 연결할 수 없습니다.
policy=끝없는 회의 끝에 작성된 정책 지침. 용지, 유체 허위사실, 데이터, 정부 보조금이 필요합니다.
printer-t1=기본적인 전기 프린터. 느리지만 안정적입니다. 잉크 카트리지로 문서를 출력합니다.
printer-t2=복사 기능을 사용할 수 있는 고속 산업용 프린터입니다. 원본 1장으로 사본 6장 생성 가능. 각 제작 승인에 주변 고용 사무소 바이터 담당자의 방문이 필요합니다.
promise=행정적 약속이 담긴 투척 가능한 캡슐입니다. 시위하는 바이터에 사용해 일시적으로 진정시키세요.
propaganda-distillery=행정과 관련된 유체를 처리할 수 있는 시설. 정치적 유체를 유체화된 거짓말로 정제하거나, 유체 허위사실을 합성하거나, 인증서를 제작할 수 있습니다.
provisional-approval=기본적인 행정적 허가서. 돌 용광로나 화력 시설에 필요합니다. 잔해 더미의 첫 사용처.
radiological-work-order=원심분리기 및 방사선 처리를 위한 높은 수준의 보안 운영 작업 허가서입니다. 화학 관련 서류와 서면 관리 허가서를 이용해 작성됩니다. 원심분리 제작법에 필요.
redundant-rubble=과도한 절차적 감시로 인해 발생한 광물화된 폐기물. 그 자체로는 전혀 쓸모가 없지만 구속력 있는 공식 법적 문서 제작에 다량 필요합니다.
refined-nonsense=순수하게 농축된 행정적 부조리. 선전 증류소에서 압축된 잔해와 유체 허위사실을 융합하여 만들 수 있습니다. 고위 행정 절차의 중추적 역할.
regulation=철저한 행정적 절차를 거쳐 작성된 연방 법률입니다. 정부 권위의 궁극적인 표현.
research-grant-approval=기본적인 연구 보조금 허가서. 모든 과학 팩 제작에 필요합니다. 간단하지만 핵심적인 요소입니다.
research-grant-work-order=과학 연구와 관련된 생산에 필요한 통합 조립 기계 인증. 조립 기계에서만 사용되며, 제작시 소비됩니다.
resolution-office=민원 처리에 특화된 사무실. 민원 접수, 서류 작업, 요약, 최종 해결까지 가능합니다.
resolved-hazmat=완전히 해결된 유해 물질 관련 민원. 압축된 잔해 증거, 유체 허위사실, 커피가 필요합니다.
resolved-landscape=완전히 해결된 경관 관련 민원. 시스템이 작동한다는 증거(가끔이지만)
resolved-littering=완전히 해결된 쓰레기 투기 민원. 산성 웅덩이는 이제 장식용 시설로 분류됩니다.
resolved-loitering=완전히 해결된 배회 관련 민원. 사건 기록, 연방 규정, 커피, 이야기거리, 인증서가 필요합니다.
resolved-noise=완전히 해결된 소음 민원. 사건 기록, 정책, 커피, 이야기거리, 인증서가 필요합니다.
resolved-smog=완전히 해결된 스모그 민원. 상당한 유체 허위사실과 커피가 필요합니다.
resolved-unemployment=완전히 해결된 실업 민원. 행정적 성취의 정점. 실업 문제는 이제 존재하지 않습니다.
resolved-vagrancy=완전히 해결된 부랑자 민원. 스피터에 대한 궁극의 행정주의적 성과. 노숙자 문제는 이제 없습니다.
safety-waiver=경영진의 모든 책임을 면제하는 문서입니다. 1티어 건물 제작이나 고급 운영 허가에 필요합니다.
safety-waiver-draft=프린터 확인 및 잉크 봉인을 기다리는 미확정된 안전 면제.
safety-work-order=안전 등급 규제가 적용되는 제작 작업을 허용하는 통합 제작 허가서. 조립 기계에만 사용되며, 사용시 소모됩니다.
taxpayer-money=악성 민원을 해결해 어렵게 번 세금. 행정 운영에 핵심적으로 사용됩니다.
ticket-hazmat=유해 물질 노출에 대한 스피터의 민원입니다. 중형+ 스피터에 의해 제기됨.
ticket-landscape=경관 파괴에 대한 시민 민원입니다. 민원 접수처에서 소형 바이터에 의해 제기됨.
ticket-littering=산성 웅덩이에 쓰레기를 무단 폐기한 스피터에 대한 민원입니다. 민원 접수처에서 소형 스피터에 의해 제기됨.
ticket-loitering=제한 구역 위반에 대한 스피터의 민원입니다. 대형 스피터에 의해 제기됨.
ticket-noise=소음 공해에 대한 시민 민원입니다. 대형+ 바이터에 의해 제기됨.
ticket-smog=대기 공해에 대한 시민 민원입니다. 중형+ 바이터에 의해 제기됨.
ticket-unemployment=실업에 대한 시민 민원입니다. 베헤모스 바이터에 의해 제기됨.
ticket-vagrancy=이재민과 노숙자에 대한 스피터의 민원입니다. 베헤모스 스피터에 의해 제기됨.
transit-authorization=공식 여행 허가서 (서식 12-T) 기차 정류장의 환승 허가서 상자에 넣으세요. 도착할 때마다 1개씩 사용되며, 역의 기차 한도는 상자에 있는 서식 수와 같아집니다.
transit-permit-chest=열차 정류장에 자동으로 배치되는 상자. 여기에 환승 허가서를 적재하세요. 열차가 도착할 때마다 하나씩 소모됩니다. 역의 열차 한도는 서식 수와 같으며, 투입기나 물류 로봇이 접근할 수 있습니다.
treasury-bond=정부가 지원하는 금융 상품. 세금과 쓸모없는 서류를 결합합니다. 고급 건설 및 정책에 사용 가능.
union-headquarters=인적 협상과 정책 업무의 마지막 단계를 진행하는 거대 복합 건물. 국채와 구두 허가서로 시작해 보조금, 서면 허가, 감사 및 정책 업무까지 처리합니다. [item=overtime-exemption]을 장착하지 않았다면 밤에 문을 닫습니다.
union-headquarters-no-working-hours=인적 협상을 진행하는 거대 복합 건물. 정부 보조금, 탄소 인증서 검증 및 OSHA 정당화를 처리합니다. 
useless-documentation=여러 겹의 종이로 조심스럽게 포장된 잔해. 쓸모없는 문서를 공식 문서화하거나. 표준화된 접수 과정 및 금융 상품에 사용합니다.
watercooler-gossip=정수기 근처에서 자연스럽게 오가는 비공식 정보. 기업 의사결정에 필수적입니다.
white-paper=데이터, 거짓말, 국고로 뒷받침된 헛소리가 뒤섞인 권위 있는 정책 문서. 정부 정책의 토대.
work-order=일반적인 제작을 허용하는, 기본 조립 기계 작업 권한입니다. 기계 제작이나 상위 티어의 조립 기계 서류 제작에만 사용됩니다.
admi-greenhouse=기후 제어식 재배 시설. 물로 나무를 천천히 재배하거나 적절한 아이템을 이용해 희귀한 커피 원두를 재배합니다.
hush-money=어렵게 벌은 돈 자루를 바이터 산란장에 던져, 잠시 동안 조용하게 만들 수 있습니다. 3분 동안 생성이 중단됩니다. 초록색 스모그가 무독성이라는 보장이 없음에 주의하세요.
tube-intake=1x1 문서 입력 시설. 투입기로 유효한 서류 아이템을 튜브 네트워크로 직접 투입할 수 있습니다.
tube-outtake=1x1 문서 출력 시설. 문서 네트워크의 아이템이 출력되어 인벤토리에 나타납니다 - 자체 투입기나 물류 네트워크를 이용해 꺼낼 수 있습니다. 특정 아이템 유형을 요청하려면 인벤토리 슬롯 필터를 설정하세요.
biter-logistics-formation=바이터포트 물류 네트워크의 건설 및 요청 작업을 위해 특별히 훈련된 바이터 근로자입니다.
biter-station=바이터 근로자와 세금을 보관한 뒤, 인근 관리 대상 건물 가동을 위해 파견합니다. 파견한 기계 1대당 한 번 작업을 진행할 수 있으며, 다음 근로자가 도착한 뒤 재개됩니다. 참고: 야간에 파견 작업을 진행하려면 파이프를 통해 투입된 커피가 필요합니다.
biter-worker=고용된 바이터 근로자. 행정 건물 건설에 필요합니다. 고용 제안을 수락한 바이터를 고용하여 만들 수 있습니다.
biterport=지상 작업에 사용할 수 있는 대체 로보포트. 최대 8명의 바이터 물류 근로자를, 세금을 통해 연결된 바이터포트 구역 내 건설 및 물류 작업에 파견할 수 있습니다. 참고: 야간에 파견 작업을 진행하려면 파이프를 통해 투입된 커피가 필요합니다.
brief-lo=배회 사건이 대법원 개입을 필요로 했던 짧은 기간의 유물. 이후 시스템의 간소화로 인해 없어졌지만, 기존 저장 파일과의 호환성을 위해 남겨졌습니다.
brief-n=소음 사건이 대법원까지 올라가야 했던, 법이 더 단순했던 시대의 유물. 저장 호환성을 위해 유지됨 - 기존 서류는 유예 적용을 받는다.
brief-u=실업 문제가 단순히 두꺼운 서류철이 아닌 대법원 판결을 필요로 했던 시절의 유물입니다. 기존 저장 파일과의 호환성을 위해 남겨졌습니다.
brief-v=부랑자 문제가 국가 최고 사법 기관의 개입을 필요로 했던 시절의 대법원 상고장입니다. 기존 저장 파일과의 호환성을 위해 남겨졌습니다. - 행정제는 기억할 것입니다.
case-h=문서 자체에 보호 조치가 필요할 정도로 철저하게 기록된 유해 물질 사건.
case-lo=잘못된 장소에 서 있는 것 자체가 기소 가능한 범죄라는 법적 주장을 담고 있는 기록. 선례는 비록 많지 않지만, 제출된 서류는 꼼꼼합니다.
case-n=선서한 데시벨 진술서로 뒷받침되는, 검증된 소음 사건 기록. 다만 그것보다도 시끄러운 건 서류 작성일 것입니다.
case-s=법정 제출 준비가 완료된 스모그 관련 서류. 증거는 말 그대로 공중에 떠 있지만, 3부씩 필요한 건 똑같습니다.
case-u=소규모 사무실 운영에 충분할 정도로 엄청난 양의 서류로 작성된, 체계적인 정책 실패의 증거. 그 아이러니는 구조적일 것입니다.
case-v=퇴거를 야기한 바로 그 절차에 의해 발생한 부랑자 사건. 하지만 행정 절차가 자각적이어야 한다고 말한 사람은 아무도 없습니다.
chemical-operator=유해 화학 물질을 취급할 수 있는 전문가. 화학 공장에 필수적인 인재입니다.
chemical-handling-work-order=고급 화학적 운영에 필요한 전문적인 운영 작업 허가서. 안전 허가서, 환경 관련 서류, 취급 관련 서류가 필요하며, 모든 화학 제작법에 필요됩니다.
admi-efficiency-module=에너지 비용을 장부 밖으로 빼돌리는 창의적인 회계 처리. 절약된 에너지가 어디로 갔는지 묻는 사람은 아무도 없었습니다. (-30% 에너지 소비량)
admi-efficiency-module-2=고급 횡령 기법. 회계 담당자들의 수법이 더욱 대담해졌습니다. (-40% 에너지 소비량)
admi-efficiency-module-3=에너지 회계를 이용한 완전한 폰지 사기. 기계가 절반의 전력으로 가동되고 있지만 감사관들은 아직도 눈치채지 못했습니다. (-50% 에너지 소비량)
field-office=임시 행정 전초기지. 200칸 이내의 둥지에서 바이터를 소환합니다 - 제작 주기당 근로자 1명. 바이터가 현장에 있어야 작동으며, 작동 중 공해가 발생하지 않습니다.
formation-center=바이터 근로자 배정, 물류 근로 훈련 및 전문 자격 인증을 위한 5x5 훈련소입니다.
hired-biter-capsule=모든 자격을 갖춘 거대한 베헤모스 바이터 현장 요원. 배치한 뒤, 제어 장치를 이용해 파견 명령을 내린 다음, 물류 시스템이 은닉된 퇴거 통지 장부를 채우도록 기다리세요.
hired-biter-command-capsule=현장 요원을 위한 원격 제어 장치입니다. 요원을 클릭하여 선택/선택 해제하고, 지도 위치를 우클릭하여 요원을 파견하세요. Shift+우클릭으로 경유지를 추가할 수 있습니다. 보급 상자를 우클릭하여, 파견된 요원이 보급품을 받도록 할 수도 있습니다.
nuclear-technician=원자력 관련 기계를 취급할 수 있는 전문가. 원자로나 원심분리기 작동에 필수적입니다.
paperwork-provider-chest=바이터 물류 네트워크에 사용할 수 있는, 아이템 하나의 보관이 가능한 수동형 공급 상자. 로봇도 접근할 수 있지만, 아무도 놀라워하지 않을 겁니다.
paperwork-requester-chest=바이터 물류 네트워크에 사용할 수 있는, 아이템 하나의 보관이 가능한 요청 상자.
paperwork-storage-chest=바이터 물류 네트워크에 사용할 수 있는, 아이템 하나의 보관이 가능한 저장 상자.
admi-productivity-module=모든 제작 작업에 감사를 진행하여 추가 생산을 가능하게 합니다. 감사관들의 임무로 인해 작업 효율이 저하되며, 속도 역시 감소됩니다. (+4% 생산성, -속도, +에너지, +공해)
admi-productivity-module-2=감사 범위에 포렌식 검사를 추가합니다. 더 많은 감사로 인해 작업 효율의 추가적인 저하, 더 많은 서류 작업이 발생합니다. (+6% 생산성, -속도, +에너지, +공해)
admi-productivity-module-3=연방 차원의 전면 조사를 진행합니다. 생산성은 극대화되지만 사기, 속도, 전력을 모두 희생해야 합니다. (+10% 생산성, -속도, +에너지, +공해)
rideable-biter=개인 이동 수단으로 재배정된 탑승 가능한 바이터. 이동 중 납세자의 세금을 낭비하며, 아주 작은 화물 주머니만 실을 수 있으며, 배치한 뒤 다시 회수할 수도 없습니다. 10분 동안 세금을 지원하지 않으면 일반적인 바이터로 되돌아가고, 불만을 제기할 것입니다.
admi-speed-module=조립 기계들에게 법적 위협을 가해, 생산 속도를 높이도록 만듭니다. 에너지 비용은 신경쓰지 않습니다. (+20% 속도, +50% 에너지 소비량)
admi-speed-module-2=집단 소송 소환장을 발부하여, 조립 기계들이 이에 맞추기 위해 미친 듯이 일하도록 합니다. (+30% 속도, +70% 에너지 소비량)
admi-speed-module-3=사법부의 전폭적인 지지를 받는 연방 소환장을 발부합니다. 기계들이 이토록 빠르고 힘들게 일한 것을 본 적은 없었습니다. (+50% 속도, +100% 에너지 소비량)
union-delegate=노조 대표로 훈련받은 바이터 근로자입니다. 노조 본부 설립에 필요합니다.
pre-040-save-warning=Administratorio 모드 경고: 이 세이브 파일은 0.4.0보다 오래된 Administratorio 버전 (__1__)을 사용했습니다. 버전 0.4.0에서 호환성을 제거하는 대규모 패치를 추가했으며, 이로 인해 기존 공장이 작동하지 않을 수 있습니다.
rideable-biter-unfunded=세금 지원 중단으로 인해 __1__가 시민 신분으로 복귀하여 불만을 제기하기 시작합니다.

[message]
eviction-served=평화적인 퇴거 절차가 진행되었습니다.
evolution-complaint-overdue=규정 미준수 사항 확인됨: 적 진화가 __1__%에 도달했습니다. __3__에 대한 접수 자격이 __2__% 이후 발효되었지만 아직 완료되지 않은 민원 __4__개가 존재하며, 즉각적인 행정적 개선이 필요합니다.
evolution-complaint-pair=__1__ & __2__
evolution-complaint-warning=규정 미준수 알림: 적 진화가 __1__%에 도달했습니다. __2__%에 도달하면 __3__에 대한 민원 신고가 가능해집니다. 추가 민원 제출이 의무화되기 전에 __4__를 완료하세요.
protest-alert=격렬한 시위 발생! __1__ __2__
regulatory-shutdown=경고: 밀려있는 민원이 감지되었습니다! 규제 감독에 의해 기계가 비활성화되었습니다!
runtime-debug-disabled=런타임 디버그 보기가 비활성화되었습니다.
runtime-debug-enabled=런타임 디버그 보기가 활성화되었습니다. 다음 단축키를 눌러 숨길 수 있습니다:
runtime-debug-export-unavailable=프로파일링에서 표본을 하나 이상 수집할 때까지 런타임 디버그 내보내기를 사용할 수 없습니다.
runtime-debug-exported=script-output/__1__로 런타임 디버그 데이터를 내보냈습니다.
working-hours-tip-unlocked=근무 시간 안내: 일부 관리 시설은 이제 밤에 문을 닫습니다. 팁과 가이드 항목을 참고하세요: __1__\n__2__ 연구를 완료하여 [item=overtime-exemption] 초과 근무를 허용하도록 할 수 있습니다.
hush-money-served=뇌물을 받은 산란장이 조용해졌습니다.

