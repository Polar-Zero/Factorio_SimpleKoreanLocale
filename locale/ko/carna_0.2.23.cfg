[space-location-description]
carna=매우 낮은 온도의 이 행성은 매우 활발한 전자기장으로 둘러싸여 있어 간혹 번개가 발생하며, 표면은 영원한 어둠으로 뒤덮여 있습니다. 차가운 대기는 대부분의 기계에 위험하며 최대 속도로 작동할 수 없게 합니다. 행성을 감싸고 있는 전자기장은 인위적으로 만들어진 것으로 보이며, 황량한 이 행성에도 한때 생명체가 존재했다는 결론을 이끌어냅니다. 스캔 결과, 표면에는 휴면 상태의 기계들이 산재해 있으며 이 행성의 핵이 인위적으로 대체된 것으로 보입니다.

