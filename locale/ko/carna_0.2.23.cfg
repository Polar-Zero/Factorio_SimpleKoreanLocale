[technology-description]
advanced-materialization=지식을 희생하고, 더 복잡한 자원을 물질화해보세요.
algite-assembler=작동에 카르나 플라즈마가 필요하지만, 매우 빠른 제작이 가능한 조립 기계입니다. 카르나 외부에서의 사용은 거의 불가능하지만, 더 좋은 기계를 찾을 수 있을지도 모릅니다.
algite-bio-dome=이 특별한 돔은 글레바 생태계를 인공적으로 재현할 수 있도록 하여, 유마코와 젤리넛과 같은 과일을 다른 행성에서 재배할 수 있도록 합니다. 돔을 한 번 배치하면 돔이 위치한 지역을 영구적으로 다른 지역 생물군계로 조정할 수 있도록 선택지가 제공됩니다. 환경 조성이 완료되면 이는 영구적이며 되돌릴 수 있는 방법은 없습니다.
algite-processing=알가이트는 카르나의 기계 내부에서 발견할 수 있는 특별한 광물로, 이 희귀 자원은 몰리브덴 코어를 이용하여 제작할 수 있는 몰리브덴 분말 선별기를 사용해야만 잔해 더미에서 분리할 수 있습니다. 이 자원은 우리가 사용할 수 있는 강력한 기계를 만드는 데 필수적으로 필요합니다.
artificial-global-gleba-soil=우리의 생존 캡슐은 카르나 표면에서만 작동하지만, 이 토양은 어디에나 배치할 수 있어, 카르나 기반 식물종을 원하는 행성 어디에서나 재배할 수 있도록 돕습니다. 이 기술을 잘 활용하면 원하는 장소 어디에서나 탄소 광산, 철 및 구리 광산, 광천수를 만들 수 있게 될 것입니다.
automation-feron=카르나 에너지를 연료로 사용하는, 믿기 힘들 정도로 빠르고 강력한 조립 기계입니다.
biochamber-mk2=영양소 아이템 대신 광천수 연료를 사용하는 업그레이드된 바이오챔버 버전입니다.
boompuff-carnabreed=카르나에는 석탄이 없지만, 이 식물을 활용하면 탄소로 가공할 수 있는 대체 아이템 이용이 가능합니다.
breeding-exoticia=엑조틱 물질을 생산하는 식물입니다.
carna-cache-equipment=저장소 내부 공간을 확장합니다.
carna-craft-equipment=제작 속도를 증가시킵니다.
carna-interm_1=플라즈마 덩어리를 활용하고 제작하는 기초적인 방법을 포함한, 표면 곳곳에 흩어져 있는 카르나 잔해를 활용하는 법을 알아보세요.
carna-reach-equipment=플레이어 도달 범위를 1칸 늘려줍니다.
carnal-energy-crystal=카르나 에너지를 물리적으로 변환한 형태로, 행성 외부로 대량 운송하기에 적합합니다. 이 형태의 에너지는 재배하는 것도 가능합니다.
carnal-oil2=카르나 에너지를 사용하여 원유를 얻는 발전된 방법을 연구합니다.
carnal-science-pack=과학 플라스크에 담긴 카르나 지식의 원천입니다.
carnalairprocessing=카르나의 표면에는 물이 존재하지 않지만, 대기 중에는 물의 원천 물질인 수소와 산소 등이 가득 차있습니다. 카르나에서 회수한 몰리브덴 코어를 이용한 몰리브덴 공기 펌프를 사용하면, 공기 중의 특정 입자를 분리한 뒤 바로 사용 가능한 가스 형태로 변환할 수 있습니다.
carnalseiver=이 건물은 우리에게 알려진 물질의 원자적 특성을 분리하고 재구성할 수 있습니다, 카르나에서 회수한 자원을 본질적으로 분리한 뒤 철, 구리, 심지어 몰리브덴으로 변환하는 등의 작업을 통해, 원자원에 대한 대규모 접근이 가능해질 때까지 우리의 여정을 도울 것입니다.
carnan-spire=공급된 전력을 표면 전역으로 전송할 수 있는 거대한 구조물입니다!  이 기계는 정말로 훌륭하며, 가용 에너지와 첨탑 에너지 코어만으로 모든 유형의 에너지를 효율적으로 분배할 수 있습니다. 이 기계는 행성에서의 전신주를 사용할 필요가 전혀 없도록 해줄 수 있지만, 기계에 첨탑 에너지 코어 공급이 중단되면 에너지 분배 역시 중단됩니다. 이러한 상황을 대비해 첨탑 가동에 필요한 핵심 기계는 지역 전력망에 연결해 두는 것을 권장합니다. 첨탑 작동에는 막대한 양의 에너지 역시 필요합니다.
chunk-processing=유체를 덩어리로 변환하는 것으로, 증기 생성 등 소수의 용도에 유용합니다.
feron-airpump=몰리브덴 공기 분리기의 고급 버전입니다. 이 뛰어난 기계는 여러 세계의 대기 중 원자를 분리하는 능력이 있어, 우리가 원하는 가스를 물질화할 수 있도록 합니다.
feron-processing=특별한 코어를 이용해 카르나 잔해 더미를 가공하면 매우 희귀한 광물인 페론 광석을 얻을 수 있습니다. 페론은 카르나 에너지를 확보하거나, 다른 행성에서 사용할 수 있는 첨단 기계를 제작하는 데 중요한 부품으로 사용됩니다.
forging-exotic-material=엑조틱 물질을 얻는 데 필요한 수수께끼의 식물인 엑조티시아를 배양하고 재배하는 복잡한 과정을 배웁니다. 씨앗을 엑조틱 씨앗으로 변환하려면 로켓을 대기권 상층부로 발사한 뒤, 카르나 행성의 전자기장에서 나오는 가스를 수집할 필요가 있습니다.
geyser-power=지면에서 간혹 기체 형태의 연기를 대기 중으로 분출하는 간헐천을 찾을 수 있는데, 이를 다양한 방식으로 활용해볼 수 있습니다, 증기로 변환하거나 몰리브덴 난방용 탑을 이용해 대기 중으로 연소시켜보세요. 난방용 탑으로 주변 지역을 가열하면 기계들이 최적의 속도로 작동할 수 있도록 할 수 있으며, 카르나의 가혹한 환경에 대처하는 효과적인 방법으로 활용할 수 있습니다.
molybdenum-processing=몰리브덴은 이 행성에서 채광할 수 있는 유일한 천연 자원입니다. 남아있었던 거의 모든 천연 자원이 이 물질로 변환 또는 전이된 것으로 추정되는데, 이는 몰리브덴이 정말 천연 자원이 맞는가 하는 의구심을 증폭시켰습니다. 이 자원을 대량으로 확보하는 것은 고급 기계 제작에 필요한 몰리브덴 코어의 생산량과 자동화 가능성에 직결되므로 매우 중요할 것입니다.
planet-discovery-carna=매우 낮은 온도의 이 행성은, 대부분의 기계가 최대 속도로 작동할 수 없게 합니다. 주변 대기를 가열시킬 방법이 필요할 것입니다.
slipstack-carnabreed=글레바 슬립스택의 카르나 품종입니다. 이 식물은 광천수 생산에 특화되어 있으며, 개선된 바이오챔버에 반영구적으로 연료를 공급하는 목적으로 사용하기에 매우 적합합니다. 또한 엑소티시아 재배에 필요합니다.
stingfrond-carnabreed=스팅프론드는 다른 카르나 기반 식물을 제작하는 데 필요합니다. 이 식물이 맺는 열매는 원유 성분이 풍부합니다.
stromatolite-carnabreed=글레바의 철 및 구리 스트로마톨라이트 품종을 재현한 것입니다. 이 매혹적인 금속 박테리아 주머니들을 대량 재배하면 다른 행성의 광맥들을 대체하는 것이 가능합니다. 농업용 탑이 필요할 것입니다. 이 품종의 스트로마톨라이트가 성장하려면 식물이 자랄 수 있는 토양이 필요하지만, 카르나는 사실상 생명이 전무한 세계입니다. 카르나 생존 캡슐이 그 해결책인데, 캡슐을 투척하면 구름이 생성되고, 그 주변 지역이 이러한 식물이 자랄 수 있는 환경으로 개선됩니다.

