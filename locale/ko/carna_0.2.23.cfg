[mod-description]
carna=카르나 행성을 우주 시대 DLC에 추가합니다. 표면 곳곳에 휴면 상태의 메카노이드가 흩어져 있는 눈으로 덮인 행성입니다.\n\n번역: SimpleKoreanLocale(PolarZero)
carna_assets_enemies=카르나 적군과 관련된 자산을 추가합니다. 기본적으로 카르나 행성 생성에 사용하도록 되어있지만, 다른 용도로 안전하게 설치하고 사용할 수 있도록 분리하였습니다. 이 모드는 그래픽 자산만 추가하며, 이 모드만으로 아이템, 객체 등이 추가되지 않습니다.
carna_assets=카르나 행성 작동에 필요한 그래픽 자산을 추가합니다.
carna_assets_2=카르나 행성 작동에 필요한 그래픽 자산을 추가합니다.
carna_assets_3=카르나 행성 작동에 필요한 그래픽 자산을 추가합니다.

