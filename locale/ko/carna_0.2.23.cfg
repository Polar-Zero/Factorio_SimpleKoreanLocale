[entity-description]
algite-assembler=카르나에서의 생산에 특화된 자동 제작 기계입니다.
algite-bio-dome=이 특별한 돔은 글레바 생태계를 인공적으로 재현할 수 있도록 합니다. 돔을 배치하면 3가지 옵션을 사용할 수 있으며, 그 중 2가지 옵션은 돔 내에 젤리넛/유마코 나무 재배에 특화된 인공 생물군계를 생성합니다. 일단 환경이 조성되면 이는 영구적이며, 이후 돔을 회수하거나 제거할 수 없게 됩니다.
algite-knowledge-chamber=원재료로부터 복잡한 물질이나 아이템을 생성하거나 변형합니다.
feron-airpump=행성 대기를 빨아들인 뒤 내부 구성요소를 분리하도록 특화된 고급 설비입니다.
feron-assembler=카르나에서의 생산에 특화된 자동 제작 기계입니다.
feron-biochamber=영양소 대신 광천수 연료를 사용하는 업그레이드된 바이오챔버입니다.
molybdenum-airpump=행성 대기를 빨아들인 뒤 내부 구성요소를 분리하도록 특화된 설비입니다.
molybdenum-heater=행성 대기로 많은 열을 방출시킵니다. 타버린 카르나 잔해 더미나 고압 플라즈마를 이용해 열을 발생시킬 수 있습니다.
molybdenum-miner=자원을 얻기 위해 광석 자원이나 저장소를 채광합니다.
molybdenum-seiver=크기, 무게, 구성에 따라 원료를 분리, 분류합니다. 효과적으로 작동하려면 유체가 필요합니다.

