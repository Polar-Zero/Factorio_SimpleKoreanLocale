[tips-and-tricks-item-description]
acid-immunity-list=[entity=metallic-lichen-colony]나 [entity=cotunnite-lichen-colony]을 수확하면 부식성 가스가 방출됩니다. 이러한 가스는 대부분의 기계에 손상을 입힙니다. 지도의 공해 오버레이에서 기계 설치 위험성이 존재하는 지역을 확인할 수 있습니다. 부식성 대기는 [entity=eschatotaxite]를 심고 수확하는 것으로 줄일 수 있습니다.\n[planet=muria]의 오염된 타일에 있는 대부분의 플레이어 제작 기계는 다음 일부 예외를 제외하고 부식성 산에 지속적으로 피해를 받습니다.\n예외:\n- [entity=fungicultural-tower]: 산의 주요 생산처이자 흡수 역할을 하므로, 매우 강한 저항력을 가집니다.\n- [entity=acidworking-plant], [entity=smelting-plant] (이 두 설비는 작동시 부식성 산이 발생하는 점 유의하세요)\n- [entity=biovat] (바이오 바트는 공기 중의 산을 일부 소비합니다)\n- 모든 전력 개체(전신주, 발전기, 축전지)\n- [entity=burner-inserter], [entity=inserter], [entity=long-handed-inserter], [entity=transport-belt], [entity=fast-transport-belt], [entity=underground-belt],  [entity=fast-underground-belt]. 이들은 산성 대기로 오염된 지역에서 사용할 수 있는 유일한 물류 설비입니다.\n- 로봇은 피해를 받지만 로보포트는 면역입니다.\n- 기차([entity=locomotive], [item=rail] 등)도 면역입니다.\n- [entity=rocket-silo], [entity=cargo-landing-pad], [entity=cargo-bay].\n- 모든 광산 채광 드릴\n- [entity=beacon]\n- 모든 파이프\n- 모든 상자
muria-briefing=[planet=muria]은 풍부한 생명체가 서식하는 강산 세계입니다. [tile=acidophile-lichen]와 [entity=eschatotaxite] 곰팡이가 행성의 건조한 부분을 덮고 있으며, 나머지 표면은 [fluid=muriatic-solution]의 호수로 이루어져 있습니다. [entity=chlorine-salt-deposit]과 [fluid=chlorine]의 나트륨 형태인 [item=cotunnite]는, 표면에서 다양한 방식으로 발견될 수 있습니다. 둘 다 [entity=fungicultural-tower]과 이끼를 이용해 광석 형태로 정제할 수 있습니다. 이끼가 방출하는 부식성 공기에 주의하세요. 에스카토택사이트는 공장을 이러한 손상으로부터 보호할 수 있습니다.

