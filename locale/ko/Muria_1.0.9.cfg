[item-description]
acidophile-lichen=생존을 위해 염화 나트륨을 소비하는 규소 기반 이끼 생명체.
acidthrower=유전자 변형 스피터가 들어있는 개조된 형태의 화염방사기.
artificial-lichen-colony=산성 이끼가 자랄 수 있는 토양입니다. [planet=muria]의 [tile=muriatic-solution]이나 [planet=fulgora]의 중유 바다에 배치할 수 있습니다.
chloric-fuel=산성 물질을 좋아하는 지의류 표본을 가둔 것. 이 생물의 독특한 에너지 합성 과정으로 방출된 에너지는 무리안 기계에 동력을 공급하는 데 사용할 수 있습니다.
chlorine-salts=철과 염화 구리의 혼합물. [planet=muria]에 배치할 수 있습니다.
cotunnite=염화 납 덩어리. [planet=muria]에 놓을 수 있습니다.
eschatotaxite-paste=탄소가 풍부한 천연 접착제. 숯 맛이 나지만 영양가가 높습니다.
eschatotaxite-sprout=갓 자란 에스카토택사이트 곰팡이. [planet=muria]의 모든 어두운 지형에 심을 수 있습니다.
holmium-chloride=인위적으로 염화 유도된 홀뮴 덩어리. [planet=fulgora]의 [tile=artificial-lichen-colony]에 배치할 수 있습니다.
leaded-fuel=많은 공해가 발생하지만, 그만큼 강력한 연료.

