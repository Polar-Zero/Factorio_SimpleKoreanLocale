acidophile-lichen-cultivation=산성 이끼가 인위적으로 번식하도록 유도합니다.
chlorane-from-biter-egg=스피터의 산 배출 동작을 유도해 염화 수소를 얻습니다.
chlorane-from-spoilage=부패 물질을 걸러내 염화 수소를 얻습니다.
