[entity-description]
acidthrower-turret=화염 방사 포탑과 달리 이 산성 전쟁 기계는 적을 녹여버릴 것입니다.
acidworking-plant=보다 발전된 형태의 산을 처리할 수 있습니다. 참고: 이 기계가 무리아에서 산성 물질을 생산하는 방식은, 주변의 취약 개체를 부식시킬 수 있습니다.
big-chloric-rock=많은 염화 나트륨과 돌을 포함합니다.
biovat=이 바이오챔버는 미성숙한 펜타포드 대신 에스카토택사이트를 이용한 제작이 가능하도록 설계되었습니다. 효율은 감소되지만, 무리안 현지 자원만으로 제작할 수 있습니다.
chlorine-salt-deposit=염화 나트륨 침전물.
cotunnite-lichen-colony=커터나이트에서 자란 산성 이끼 군집.
eschatotaxite=공기 중의 부식성 산을 섭취하는 거대한 곰팡이 군집.
fungicultural-tower=균류나 이끼 재배를 위해 특별히 설계된 농업용 탑.
holmium-lichen-colony=염화 홀뮴에서 자란 산성 이끼의 군집.
metallic-lichen-colony=염화 나트륨에서 자란 산성 이끼의 군집.
smelting-plant=주조소 + 용광로. 납을 가공할 수 있습니다. 참고: 이 기계가 무리아에서 산성 물질을 생산하는 방식은, 주변의 취약 개체를 부식시킬 수 있습니다.

