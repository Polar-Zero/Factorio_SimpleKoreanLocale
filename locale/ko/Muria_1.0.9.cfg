crude-oil-from-eschatotaxite-paste=에스카토택사이트 페이스트를 염소 처리하여 원유를 얻습니다.
eschatotaxite-carbon-fiber=탄소 섬유의 대체 제작법.
eschatotaxite-low-density-structure=저밀도 구조물의 대체 제작법.
hydrogenated-oil-processing=더욱 진보된 원유 처리법. 수소 촉매를 사용하여 생산량을 극대화합니다.
hydronium-destruction=불안정한 하이드로늄 분자의 구성 요소를 분리합니다.
kerolox-rocket-fuel=산소의 고유한 산화 특성을 활용해 로켓 연료를 제작합니다.
oxyhydrogen-combustion=산소와 수소를 연소시켜 고온 증기를 생성합니다.
