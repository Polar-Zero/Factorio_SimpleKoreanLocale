[technology-description]
acid-weaponization=첨단 화학 공장의 건설을 시작해보세요.
acidworking=부식성이 강한 재료를 취급할 수 있는 새로운 공장. [entity=acidworking-plant] 작동에는 [item=chloric-fuel]이 필요합니다.
advanced-lead-processing=[item=chloric-fuel]을 이용하면 [entity=smelting-plant] 내에서 [item=lead]에 대한 고급 처리 공정을 시작할 수 있습니다. 이와 함께 납 펠릿과 고중량 산탄총 포탄도 제작할 수 있습니다.
advanced-paste-applications=에스카토택사이트 페이스트의 다양한 특성을 이용하면, 다양한 공정에 사용되는 플라스틱과 으깬 유마코를 대체할 수 있습니다.
chlorane-explosives=[fluid=chlorane]의 특성을 활용한 [item=explosives]의 대체 제작법.
chlorane-lead-battery=[item=lead-plate]을 활용한 [item=battery]의 대체 제작법.
eschatotaxite-farming=자신의 부패된 부분을 섭취하는 키가 큰 곰팡이 군집. 탄소와 황이 매우 풍부합니다. 또한 [entity=metallic-lichen-colony]와 [entity=cotunnite-lichen-colony]에서 방출되는 부식성 산을 섭취하는 것으로 보입니다.
holmium-chloride=염화 나트륨에 대한 많은 연구를 통해, 이제 염화 홀뮴을 인공적으로 합성하고 홀뮴 처리 공정을 확장하여 풀고라에서 생산하는 홀뮴의 양을 개선시킬 수 있게 됩니다. 또한 풀고라의 석유 바다와 무리아의 산성 호수 깊은 곳에 인공 이끼 군집을 건설할 수 있게 됩니다.
hydronium-destruction-productivity=고급 [fluid=hydronium] 파괴 기술은 더 많은 [fluid=oxygen]와 [fluid=hydrogen] 분자 복구에 도움을 줄 수 있습니다.
lead-processing=[fluid=muriatic-solution]에서 추출한 [item=cotunnite]를 [tile=acidophile-lichen] 위에 올려놓으면, 내부의 [item=lead]을 분리하고 이 내식성 금속의 가공을 개시할 수 있습니다.
leaded-fuel=납 펠릿을 사용하면 속도 향상 효과가 뛰어나지만 상당한 공해를 발생시키는, 로켓 연료의 대용품을 제작할 수 있습니다.
lichen-cultivation=[item=acidophile-lichen]은 [fluid=chlorine]이 금속류에서 제거될 때 [item=chlorine-salts]가 방출하는 에너지를 섭취하는 것 같습니다. [tile=acidophile-lichen]에 소금을 배치하는 것으로 행성에서 금속을 안정적으로 얻을 수 있습니다. 참고: 이들의 서식지는 공기 중에 매우 많은 산성 물질을 방출하는 것으로 보이며, 이는 공장에 위험이 될 것입니다.
murian-oil-processing=에스카토택사이트 곰팡이의 황과 에스카토택사이트 페이스트를 다른 무리안 자원과 함께 처리하면 원유와 기타 석유 아이템을 쉽게 얻을 수 있습니다.
muriatic-science-pack=산성 및 독성 물질의 발전된 연구가 가능합니다.
offworld-chlorane-production=[planet=muria] 외부에서도 [fluid=chlorane]를 가져와 처리할 수 있게 됩니다.
oxygenated-bacteria-cultivation=박테리아 배양 공정에 산소를 추가하여 배양 효율을 높여보세요.
planet-discovery-muria=이 행성은 태양에서 멀리 떨어져있지만, [fluid=muriatic-solution] 호수에서 방출되는 강한 부식성의 가스가 일으키는 강력한 온실 효과로 인해 따뜻한 환경이 유지됩니다. 표면에 생명체가 존재하는 것으로 보입니다.
refined-acid-weaponry=황산 기반 무기의 공격력이 증가합니다.
shotgun-turret=강력한 산탄 공격이 가능한 개선된 포탑입니다.
shotgun-turret-damage=산탄총 포탑 피해량을 증가시킵니다.
toxic-rounds-magazine=산성 전하를 포함하도록 개선된 탄창입니다.

