[mod-name]
some-squeak-through=비집고 지나가기 - 수정 재배포(Squeak Through (fixed + re-published abandoned mod))

[mod-description]
some-squeak-through=막고 있는 태양 전지판, 파이프, 증기 기관, 채광 드릴, 상자 등 장애물 사이로 걸어 다닐 수 있도록 합니다. 기지를 돌아다닐 때 더 이상 돌아가지 마세요!\n\n번역: SimpleKoreanLocale(PolarZero)


[string-mod-setting]
squeakthrough-mod-compatibility-force=강제 (버그 제보 금지)
squeakthrough-mod-compatibility-opt-in=활성화
squeakthrough-mod-compatibility-opt-out=비활성화

[mod-setting-name]
squeakthrough-mod-compatibility=호환 모드

[mod-setting-description]
squeakthrough-mod-compatibility=다른 모드의 개체에 대해 비집고 지나가기 모드를 활성화할지 여부를 지정합니다. '강제'로 설정하면 모든 모드 객체에 강제로 설정하므로, 유체 네트워크가 손상되거나 다른 이상한 문제가 발생할 수 있습니다. 버그를 제보하지 마세요!