[mod-name]
redrawn-space-compat-fixes=우주 경로 재구성 - 호환 개선(Redrawn Space Compatibility)

[mod-description]
redrawn-space-compat-fixes=Redrawn Space Connections, Cosmic Social Distancing 모드와 다양한 행성 모드 사이의 비교적 사소한 호환성 패치를 진행합니다: Dyson Sphere, Dea Dia System, Asteroid Belt, Outer Rim 등.\n\n번역: SimpleKoreanLocale(PolarZero)

[recipe-name]
gibberish-data=오라틀 데이터 추출

[recipe-description]
void-pylon-tuned=오라틀의 데이터를 수신하도록 파일런을 조정합니다.

[technology-name]
black-hole-discovery=블랙홀 오라틀 발견

[mod-setting-name]
redrawn-connections-maraxsis=마락시스 우주상 위치 되돌리기
redrawn-connections-multiplier=우주 경로 길이 배율
redrawn-connections-toggle=거의 평행한 우주 경로 제거

[mod-setting-description]
redrawn-connections-maraxsis=마락시스를 소행성대로 이동하는 변동사항을 되돌리고, 행성을 원래 위치인 태양계 안쪽으로 위치시킵니다.
redrawn-connections-toggle=[실험적] AB -> BC가 AC와 거의 평행한 연결을 제거하려고 시도합니다. 향후 검사의 엄격성 또는 완화 정도를 정의하는 더 많은 옵션이 추가될 수 있습니다.\n자세한 내용은 Mod Portal FAQ를 참조하세요.
redrawn-connections-multiplier=[실험적] 태양과의 거리에 따른, 각 행성/우주 경로에 거리 배율을 적용합니다.\n이 배율은 나우비스 궤도(1배) -> 풀고라 궤도(1.25배) -> 태양계 가장자리 직전(2.5배)까지 선형적으로 확장됩니다(아퀼로-태양계 가장자리 거리 100,000km는 그대로 유지)\n태양계 가장자리와 연결된 경로는 4.85배의 배율이 적용됩니다 (이 배율은 기본적으로 유지됩니다)