ipl_threshold_help=다음보다 적을 경우 보충: 이 플랫폼이 해당 아이템을 추가로 요청하기 전에, 플랫폼에서 가지고 있는 아이템의 (요청량 - 임계값) 수량입니다. 현재 재고 여유분이 해당 값과 같거나 부족할 경우 플랫폼에서 아이템을 요청합니다.

