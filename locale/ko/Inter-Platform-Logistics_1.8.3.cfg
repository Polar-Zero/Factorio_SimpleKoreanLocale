ipl_reset_pods_tooltip=경고: 이 작업은 시스템 재정의를 진행되며, 요청 안테나의 메모리를 초기화시킬 것입니다. 현재 해당 안테나를 향해 이동 중인 모든 포드가 삭제됩니다. 이 기능은 버그로 인해 추적 기능에 오류가 발생하여, 실제로 존재하지 않는 포드가 여전히 이동 중으로 인식되는 경우에 유용할 수 있습니다. 이 작업은 취소할 수 없습니다!
