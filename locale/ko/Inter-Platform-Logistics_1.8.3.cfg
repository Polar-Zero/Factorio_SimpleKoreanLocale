[mod-name]
Inter-Platform-Logistics=IPL - 플랫폼간 물류(IPL - Inter Platform Logistics)

[mod-description]
Inter-Platform-Logistics=플랫폼 공급/요청 안테나를 게임에 추가해, 같은 우주 위치에 있는 플랫폼 사이에 아이템을 교환할 수 있도록 합니다. 아이템을 지상으로 보낼 필요 없이 회로와 안테나만으로 우주 플랫폼 사이로 직접 아이템을 전달해보세요!\n\n번역: SimpleKoreanLocale(PolarZero)


[desc]
ipl_provider_antenna=디스플레이 역할도 할 수 있습니다(모드 설정에서 디스플레이 활성화 필요). 우주 플랫폼에 배치하고 양수 아이템 신호를 연결하여, 배치된 플랫폼에서 해당 아이템에 대한 제공 임계값을 제공하도록 허용합니다. 자세한 내용은 팩토리오백과를 참고하세요.
ipl_requester_antenna=디스플레이 역할도 할 수 있습니다(모드 설정에서 디스플레이 활성화 필요). 우주 플랫폼에 배치하고 양수 아이템 신호를 연결하여, 배치된 플랫폼에서 해당 아이템을 요청하도록 합니다. 요청값은 우주 플랫폼에셔 원하는 아이템의 정확한 수량을 의미합니다. 임계값 안테나를 같이 사용하는 것을 매우 권장하며, 자세한 작동 방식은 팩토리오백과를 참고하세요.
ipl_tech=장거리 무선 전송 기능을 잠금 해제하여 플랫폼이 같은 공간에 주둔할 때 서로 통신하고 아이템을 교환할 수 있습니다.
ipl_threshold_antenna=디스플레이 역할도 할 수 있습니다(모드 설정에서 디스플레이 활성화 필요). 플랫폼 요청 안테나가 있는 우주 플랫폼에 배치하고, 양수 아이템 신호를 연결하여 요청 임계값을 설정하세요. 자세한 내용은 팩토리오백과를 참고하세요.
ipl_deep_space_sync=우주 행성 궤도가 아닌 우주상 위치에서 플랫폼이 아이템을 교환할 수 있도록 활성화합니다. (예: 태양계 가장자리)
ipl_starter_pack=IPL에서 제공하는 플랫폼간 물류 구성품이 포함된, 우주 플랫폼 토대를 설치하는 데 필요한 모든 것이 포함되어 있습니다. "platform construction reader" 모드가 활성화되어 있다면, 건설 조합기도 포함됩니다!
custom-tooltip-hardmode=[color=red]IPL 고난이도 모드[/color]
ipl_bay=[IPL 고난이도 모드] IPL 화물 포드를 발사할 수 있는 유일한 구역 유형입니다. 작동하려면 허브에 IPL 화물 포드 아이템이 있어야 합니다. 구역 품질과 일치하는 포드만 발사합니다.
ipl_cargo_pod=[IPL 고난이도 모드] IPL 시스템과 호환되는 화물 포드. 플랫폼간 물류 운송에 필요합니다. 품질에 따라 인벤토리 크기가 증가합니다.
ipl_hard_mode=더욱 균형 잡힌 IPL 경험. 이제 플랫폼간 물류에 화물 포드가 필요합니다. (제작 필요) 또한 각 화물 포드는 해당 품질과 일치하는 화물칸에서만 발사할 수 있습니다. 기본 화물 포드의 인벤토리 크기(일반)는 3칸이지만, 품질에 따라 증가합니다 (전설 품질은 13개) 또한 이제 로켓처럼 아이템 무게도 고려해야 할 것입니다. 즐겨보세요!

