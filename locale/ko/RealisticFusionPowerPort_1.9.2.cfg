[rfp]
antimatter-processor=격렬한 폭발 없이, 반물질[fluid=__1__][fluid=__2__][fluid=__3__]을 처리할 수 있습니다.
antimatter-theory=일반 입자[fluid=__3__][fluid=__4__]와 반대 전하를 가진 "반입자"[fluid=__1__][fluid=__2__]가 존재하며, 입자와 반입자가 접촉하면 소멸되어 질량의 100%를 사용 가능한 에너지로 방출합니다. 이 에너지는 D-헬륨3 핵융합 [recipe=rfp-d-he3-fusion-0]도 쓸모없게 만드는 전력 생산에 사용될 수 있습니다. 어떻게 되는지는 계속 충돌을 해봐야 알겠지만요.
bk-antimatter=반물질 파워 [개선중]
bk-antimatter-text=반물질을 얻으려면, 먼저 입자가속기에서 가속된 입자를 충돌시킨 다음 남은 반물질 입자를 감속시켜야 합니다. 에너지를 생산하려면 물질-반물질 연료 전지를 만들어 원자로에 넣으면 됩니다. 입자 가속기/감속기는 많은 에너지를 소비하며 이를 가동하려면 최소한 헬륨3-헬륨3 핵융합 발전소를 사용해야 합니다. 반물질 전력은 아직 작업 중이며 향후 개선될 예정입니다.
bk-d-cost-reduction=[color=#e7ce70]MJ/단위 감소 비율[/color]
bk-d-d-0=T+헬륨3 억제 D-D 전력 순생산
bk-d-d-1=T-억제 D-D 전력 순생산
bk-d-d-2=D-D 전력 순생산
bk-d-he3=D-헬륨3 전력 순생산
bk-d-hw-percentage=[color=#e7ce70]중수 비율[/color]
bk-d-mj-per-unit=[color=#e7ce70]MJ/중수소 생산량[/color]
bk-d-t=D-T 전력 순생산
bk-d-tech-cost=[color=#e7ce70]기술 비용[/color]
bk-deuterium-extraction=고급 중수소 추출
bk-deuterium-extraction-text=중수소와 일반적인 물을 분리하는 것은 많은 에너지가 필요한 작업입니다. 가장 쉬운(그리고 가장 비효율적인) 방법은 물을 정확히 100°C까지 끓이는 것입니다. 이렇게 하면 일반적인 물은 끓어 없어지지만, 중수(끓는점이 1° 높은 물)는 액체를 유지합니다. 더 어렵지만 더 효율적인 방법으로, 황화수소 촉매로 사용하여 물을 5%, 10% 또는 20%의 중수로 농축한 뒤 끓이는 것입니다. 중수를 얻은 후에는 전기분해를 통해 순수한 중수소와 산소로 만들 수 있습니다. 다음은 몇 가지 수치입니다:
bk-f-eff-0=[color=#e7ce70] 융합 효율 연구 없음 [/color]
bk-f-eff-1=[color=#e7ce70] 융합 효율 1 [/color]
bk-f-eff-2=[color=#e7ce70] 융합 효율 2 [/color]
bk-f-eff-3=[color=#e7ce70] 융합 효율 3 [/color]
bk-f-eff-4=[color=#e7ce70] 융합 효율 4 [/color]
bk-f-eff-5=[color=#e7ce70] 융합 효율 5 [/color]
bk-f-eff-6=[color=#e7ce70] 융합 효율 6 [/color]
bk-f-eff-7=[color=#e7ce70] 융합 효율 7 [/color]
bk-f-eff-8=[color=#e7ce70] 융합 효율 8 [/color]
bk-f-eff-9=[color=#e7ce70] 융합 효율 9 [/color]
bk-fusion=핵융합 발전
bk-fusion-text=먼저 융합할 연료를 플라즈마 상태가 될 때까지 가열해야 합니다. 그런 다음 원자로에 파이프를 연결하세요. 원자로를 핵융합 열교환기에 연결하여 열을 생산한 다음 열교환기+터빈을 통해 전기로 전환할 수 있습니다. 중성자 핵융합은 열 부분을 생략하고 직접적으로 전기를 생산할 수 있습니다. 가열은 많은 에너지를 소비하며, 생산된 에너지로 자립하려면 충분한 전력을 공급할 수 있는 일종의 발전소가 필요할 것입니다.\n다음은 중수소 추출을 고려하지 않은 전력 순생산/소비 표 스프레드시트입니다(- 값은 생산량보다 소비량이 많다는 의미, 0 이상이면 자립이 가능함):
bk-h-eff-0=[color=#e7ce70] 가열 효율 연구 없음 [/color]
bk-h-eff-1=[color=#e7ce70] 가열 효율 1 [/color]
bk-h-eff-2=[color=#e7ce70] 가열 효율 2 [/color]
bk-h-eff-3=[color=#e7ce70] 가열 효율 3 [/color]
bk-h-eff-4=[color=#e7ce70] 가열 효율 4 [/color]
bk-he3-he3=헬륨3-헬륨3 전력 순생산
bk-thread=현실적인 핵융합 발전
d-d-heating=핵융합을 진행하려면 수백만 ℃의 온도가 필요합니다. 어떻게든 그 온도까지 중수소[fluid=__1__]를 가열할 방법이 필요합니다.
d-t-heating=이제 D-T 혼합물[fluid=__1__]을 만들 수 있으므로 가열해야 합니다.
deuterium-extraction=중수소[fluid=__1__]는 핵융합에 적합한 연료로 보입니다.
deuterium-extractor=물에서 순수한 중수소[fluid=__1__]를 추출합니다."
discharge-pump=중수소가 열화 중수 [fluid=__1__]을 수역으로 배출하는 데 사용됩니다.
electric-boiler=전기 보일러
electric-boiler-k2=고급 전기 보일러
electric-boiler-description=중수[fluid=__1__]와 일반수[fluid=__2__]를 분리할 수 있습니다.
electrolyser=중수[fluid=__1__]를 순수한 중수소[fluid=__2__]와 산소__3__로 전기분해합니다.
gas-mixing=D-T 융합[recipe=rfp-d-t-fusion-0]을 달성하려면 중수소[fluid=__1__]와 삼중수소[fluid=__2__]를 혼합해야 합니다.
gs-process=전기 보일러에서 정화하기 전 중수[fluid=__1__]를 더욱 농축하면 에너지 효율을 더욱 높일 수 있습니다.
gs-process-name=거들러 황화 공정 [__1__% ~ __2__%]]
gs-process-description=황화수소[fluid=__1__]를 사용하여 중수[fluid=__2__]를 끓이기 전에 농축합니다. 물을 직접 끓이는 것보다 에너지 효율이 좋습니다[fluid=water][color=#008cff]참고: 황화수소[fluid=__1__]는 촉매로만 사용되므로, 영구적으로 공급할 필요가 없습니다[/color].
heating=가열로 인한 에너지 손실 감소 __1__[fluid=__2__]
heavy-water=__1__% 중수
heavy-water-purification=__1__% 중수 정화
helium-3-breeding=헬륨-3[fluid=__1__]는 중성자 핵융합에 매우 적합한 물질이며, D-D[recipe=rfp-d-d-fusion-0-0] 공정은 50/50 확률로 삼중수소[fluid=__2__] 또는 헬륨-3[fluid=__1__]를 생성합니다. 삼중수소[fluid=__2__]을 추출하는 방법은 이미 알고 있으니 이제 헬륨-3[fluid=__1__]도 추출할 차례입니다.
helium-3-heating=이제 헬륨-3[fluid=__1__]을 증식시킬 수 있게 되었지만, 20억℃라는 엄청난 온도로 가열하는 것은 또다른 문제입니다.
kr-portable-antimatter-reactor-description=물질-반물질 연료 전지 연료로 최대 1GW를 생산할 수 있는 소형 반물질 원자로[item=rfp-matter-antimatter-fuel-cell]입니다.
kr-portable-fusion-reactor-description=20MW를 생산할 수 있는 소형 중성자 융합로, 헬륨3-헬륨3 또는 D-헬륨3 플라즈마 전지[item=rfp-he3-he3-fuel-cell][item=rfp-d-he3-fuel-cell] 연료가 필요합니다.
particle-acceleration=아원자 입자[fluid=__1__][fluid=__2__]가 최대한 빠른 속도로 이동하여 충돌하면 어떤 일이 일어나는지 살펴보세요.
particle-deceleration=먼저 가속기[entity=rfp-particle-accelerator]에서 생성되는 고에너지 반입자[fluid=__1__][fluid=__2__]의 속도를 늦추는 방법을 알아내야 합니다.
portable-reactor-d-he3-fuel=휴대용 중성자 융합로에 사용할 수 있는 첨단 연료 전지[item=__1__]
portable-reactor-he3-he3-fuel=휴대용 중성자 융합로 사용할 수 있는 연료 전지[item=__1__]
setting-advanced-deuterium-extraction-name=고급 중수소[fluid=__1__] 추출 활성화
setting-advanced-deuterium-extraction-description=고급 중수소[fluid=__1__] 추출은 현실적이지만 더 복잡합니다.__ITEM__skl-txtd1__
setting-tritium-decay-name=삼중수소[fluid=__1__]의 헬륨-3[fluid=__2__] 붕괴 허용
setting-tritium-decay-description=이것은 주로 RFW에서 사용하기 위한 헬륨-3[fluid=__1__] 증식을 위한 것이지만, 다른 유형의 에너지 생산에도 사용할 수 있습니다.__ITEM__skl-txtd1__
tritium-breeding=D-D 융합[recipe=rfp-d-d-fusion-0-0]은 삼중수소[fluid=__1__]를 생산합니다. 50% 확률이지만 D-T 핵융합[recipe=rfp-d-t-fusion-0]은 D-D보다 전기 생산에 훨씬 더 효과적입니다. 삼중수소[fluid=__1__]를 추출할 방법을 찾아야 합니다.
tritium-decay=삼중수소[fluid=__1__]는 12.5년 반감기를 거치면 훨씬 더 유용한 헬륨-3[fluid=__2__]으로 붕괴될 수 있습니다. 하지만 이는 너무 길며, 이 과정을 가속시킬 방법을 찾아야 합니다.

