[entity-description]
rfp-aneutronic-reactor=이 버전의 핵융합로는 고에너지 중성자를 생성하지 않는 헬륨3-헬륨3[recipe=rfp-he3-he3-fusion-0] 또는 D-헬륨3[recipe=rfp-d-he3-fusion-0] 핵융합 반응을 사용합니다. 즉, 직접 변환[entity=rfp-direct-energy-converter]을 통해 핵융합으로 만들어진 에너지를 전기로 직접 변환할 수 있습니다.
rfp-antimatter-reactor=질량 에너지 효율이 100%에 달하는 물질-반물질 소멸을 통해 더 이상 필요하지 않을 정도로 많은 에너지를 생산합니다.\n비교: 핵융합의 발전량은 반물질 소멸의 0.37%, 핵분열은 0.1%를 간신히 넘습니다.
rfp-direct-energy-converter=중성자 핵융합 과정에서 생성된 에너지를 직접 전기로 변환합니다. [color=#ffd000][중성자 원자로 옆에 배치[entity=rfp-aneutronic-reactor]][/color]
rfp-gas-mixer=가스 유체를 혼합합니다.
rfp-hc-exchanger=초고출력 핵융합로[entity=rfp-reactor]와 사용하도록 설계된 열교환기입니다.
rfp-hc-turbine=초고출력 핵융합로[entity=rfp-reactor]와 사용하도록 설계된 증기 터빈입니다.
rfp-heat-exchanger=핵융합으로 생성된 에너지를 열로 변환합니다.\n[color=#ffd000][원자로[entity=rfp-reactor]][/color] 옆에 배치하세요.
rfp-heater=가스를 엄청난 온도로 가열하여 핵융합이 가능하도록 합니다.
rfp-particle-accelerator=과학을 위해 입자를 엄청난 속도로 가속한 다음 충돌시킵니다. 부작용: 반물질이 생성될 수 있음
rfp-particle-decelerator=가속기에서 생성되는 고에너지 반물질 입자의 속도를 늦춥니다[entity=rfp-particle-accelerator]
rfp-pipe=전자석을 이용하여 수백만 도의 고온 플라즈마를 운반할 수 있는 자기 파이프입니다.
rfp-pipe-elbow=전자석을 이용하여 수백만 도의 고온 플라즈마를 운반할 수 있는 자기 모서리 파이프입니다.
rfp-pipe-junction=전자석을 이용하여 수백만 도의 고온 플라즈마를 운반할 수 있는 자기 T-연결 파이프입니다.
rfp-pipe-straight=전자석을 이용하여 수백만 도의 고온 플라즈마를 운반할 수 있는 자기 직선 파이프입니다.
rfp-pipe-to-ground=전자석을 이용하여 수백만 도의 고온 플라즈마를 운반할 수 있는 자기 지하 파이프입니다.
rfp-pump=전자석을 이용하여 수백만 도의 고온 플라즈마를 운반할 수 있는 자기 펌프입니다.
