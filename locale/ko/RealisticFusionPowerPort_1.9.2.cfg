[technology-description]
rfp-aneutronic-fusion-theory=핵융합에 대한 2세대 접근법. 중성자가 대부분의 에너지를 운반하는 기존 방식과 다르게, 중성자 핵융합에서는 대부분의 에너지가 하전 입자에 의해 운반되며, 이는 중성자 핵융합에서 생성된 에너지를 직접 전기로 변환할 수 있도록 합니다.
rfp-aneutronic-reactor=중성자 핵융합에 필요한 훨씬 더 높은 온도와 압력을 처리할 수 있는 원자로.
rfp-antimatter-processing=반물질을 일반적인 화학 공장에서 사용 가능한 연료로 가공하는 어리석은 생각은, 화학 공장과 반경 50m 내의 모든 것이 증발하는 것으로 연결될 것입니다.
rfp-antimatter-reactor=이 원자로는 물질-반물질 소멸을 이용해 핵융합을 원시적인 기술로 보이게 할 만큼 엄청난 양의 에너지를 생산합니다.
rfp-d-d-fusion=현재 핵융합 발전 설비 가동에는 생산량보다 더 많은 에너지가 필요하지만, 곧 개선될 것입니다.
rfp-d-d-fusion-0-efficiency=T+헬륨3 억제 D-D 융합[recipe=rfp-d-d-fusion-0-0]으로 생성된 에너지를 열로 변환하는 과정에서의 에너지 손실을 줄여보세요.
rfp-d-d-fusion-1-efficiency=삼중수소 억제 D-D 융합[recipe=rfp-d-d-fusion-1-0]으로 생성된 에너지를 열로 변환하는 과정에서의 에너지 손실을 더 줄여보세요.
rfp-d-d-fusion-2-efficiency=D-D 융합[recipe=rfp-d-d-fusion-2-0]으로 생성된 에너지를 열로 변환하는 과정에서의 에너지 손실을 확실히 줄여보세요.
rfp-d-he3-fusion=D-헬륨3[recipe=rfp-d-he3-fusion-0]은 그 이전의 어떤 설비보다도 훨씬 더 많은 전력을 생산할 수 있습니다. 거의 모든 설비 작동에 충분할 정도.
rfp-d-he3-fusion-efficiency=D-헬륨3 핵융합[recipe=rfp-d-he3-fusion-0]으로 생성된 에너지를 전기로 변환하는 과정에서의 에너지 손실을 더 줄여보세요.
rfp-d-he3-mix=D-헬륨3 핵융합[recipe=rfp-d-he3-fusion-0]은 더 낮은 온도에서 발생시킬 수 있으며 헬륨3-헬륨3[recipe=rfp-he3-he3-fusion-0]보다 더 많은 에너지를 생성합니다. 이를 시작하는 첫 단계는 중수소와 헬륨-3을 혼합하고 가열하는 것입니다.
rfp-d-t-fusion=D-T 융합[recipe=rfp-d-t-fusion-0]은 D-D보다 훨씬 더 많은 에너지를 생산합니다. 하지만 아직 부족합니다.
rfp-d-t-fusion-efficiency=D-T 융합[recipe=rfp-d-t-fusion-0]으로 생성된 에너지를 열로 변환하는 과정에서의 에너지 손실을 더 줄여보세요.
rfp-direct-energy-conversion=중성자 핵융합 에너지를 열로 변환한 뒤, 증기화 없이도 전기로 변환할 수 있도록 합니다.
rfp-fusion-reactor=핵융합에 필요한 고온 플라즈마를 담을 수 있는 원자로가 필요합니다.
rfp-fusion-theory=분할한 원자들을 부수면 어떻게 될까요?
rfp-he3-he3-fusion=중성자 핵융합을 사용할 수 있게 됩니다. 지금은 간신히 가동되지만, 곧 개선될 것입니다.
rfp-he3-he3-fusion-efficiency=헬륨3-헬륨3 융합[recipe=rfp-he3-he3-fusion-0]으로 생성된 에너지를 전기로 변환하는 과정에서의 에너지 손실을 줄여보세요.
rfp-heat-exchanger=핵융합으로 생산된 에너지를 전력화하기 전에 열 형태로 변환해야 합니다.
rfp-hydrogen-ionization=정말 빠른 속도의 입자를 충돌하게 만들면 어떻게 되는지 궁금합니다. 먼저 충돌시킬 입자를 가져와야 합니다.\n\n[color=#ff0000][개발자 참고: 반물질 발전은 여전히 작업 중이며, 시작 모드 설정에서 비활성화할 수 있습니다][/color]
rfp-particle-acceleration-efficiency=입자 가속시의 에너지 손실을 줄여보세요.
rfp-particle-deceleration-efficiency=입자 감속시의 에너지 손실을 줄여보세요.
rfp-plasma-handling=수백만 도의 뜨거운 가스는 일부 철제 파이프에 담을 수 없으며, 존은 어려운 방법을 택해야 했습니다.
rfp-portable-reactor=장비 그리드에 많은 전력을 공급하지만, 작동하는 데 연료 전지가 필요합니다.

