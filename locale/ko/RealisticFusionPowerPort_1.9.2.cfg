rfp-replace-krastorio=크라스토리오 2 핵융합/반물질 발전(/RFW가 설치된 경우 무기도 포함) 대체
rfp-replace-se=우주 탐사 반물질 대체
rfp-science-multiplier=연구 비용 배율:
rfp-se-antimatter-ratio=이 모드 <-> SE 반물질 비율 [1:X]:
rfp-use-se-antimatter=반수소를 SE의 반물질 흐름으로 대체

[mod-setting-description]
rfp-aneutronic-composite=스크립트를 이용한 약간의 마법을 통해, 중성자 원자로와 직접 변환를 사실상 하나의 개체로 바꿉니다. 이는 직접 변환의 크기를 늘려 에너지 밀도를 낮추므로 Space Exploration 모드의 우주선에 사용할 때 유용합니다.__ITEM__skl-txtd0__
rfp-antimatter=물질-반물질 소멸을 이용해 전력을 생산할 수 있게 됩니다. 단 하나의 발전소만으로 앞으로의 전력 걱정을 모두 해결하세요! 초기 작동에 많은 전력이 필요합니다. [color=#ff0000]현재 개선 작업 진행 중, 앞으로 더 많은 연구/복잡성이 포함될 것입니다.[/color]__ITEM__skl-txtd1__
rfp-ddw-recycling=활성화하면 RFP 모드에서 물을 사용하는 모든 제작법(모든 종류의 물을 출력하는 제작법 제외)를 검토하고, 물 대신 열화 중수를 사용하는 복제본을 생성합니다. 게임 로드 시간에 영향을 줄 수 있으며, 고급 중수소 추출이 필요합니다.__ITEM__skl-txtd1__
rfp-gs-process-efficiency=거들러 황화 공정이 반환하는 황화수소 비율을 변경합니다. (0 = 0%, 1 = 100%)__ITEM__skl-txtra0__1__ITEM__skl-txtre__
rfp-hc-priority=Primary: HC 터빈[entity=rfp-hc-turbine]이 일반 터빈보다 우선시됨을 의미합니다. (여전히 태양광이 선호됨)\nsecondary: 터빈이 동일한 우선순위를 가짐을 의미합니다.__ITEM__skl-txtra0__secondary__ITEM__skl-txtre__
rfp-hc-stuff=단일 D-T 원자로는 효율 업그레이드에 따라 1.4GW에서 2GW를 생산할 수 있습니다. 기본 게임의 열교환기와 터빈을 사용할 수도 있지만, D-T 원자로가 훨씬 간단하며 UPS 효율적입니다.\n\n우주 탐사 에는 자체 "고온" 열교환기와 터빈이 포함되므로, 이 경우 유용하지는 않지만, 그래도 RFP 자체 D-T 연구보다 훨씬 빠르게 RFP 열 교환기와 터빈을 사용할 수 있게 되므로 활성화를 유지하는 것을 추천합니다.으므로 그대로 두는 것이 좋습니다.__ITEM__skl-txtd1__
rfp-krastorio-remove-tritium=크라스토리오의 고체 삼중수소를 만드는 제작법을 비활성화합니다. 제작법 중 크라스토리오 2의 삼중수소 유체를 사용하는 모드를 활성화한 경우에만 비활성화하세요.__ITEM__skl-txtd1__
rfp-operations-per-tick=값이 낮을수록 성능이 향상되지만 철 파이프를 사용하여 플라즈마를 운송하는 버그 현상이 발생할 가능성이 증가합니다. 비활성화하려면 0으로 설정하세요 (UPS의 10분의 1이 중요하거나 자기 감금 파이프[item=rfp-pipe]를 사용하기에 너무 게으른 경우에만 낮추는 것을 추천합니다, 파이프가 많이 배치된 경우에 높게 설정하는 것이 좋습니다. (기본값 16: 16*60 = 960개의 파이프 처리)).__ITEM__skl-txtra0__16__ITEM__skl-txtre__
rfp-replace-bobpower=Bob의 전력이 활성화된 경우에만 표시됩니다.
rfp-replace-krastorio=크라스토리오 2가 활성화된 경우에만 표시됩니다.__ITEM__skl-txtd1__
rfp-replace-se=이 기능을 사용할 때 과학 비용을 낮추는 것을 권장합니다. Space Exploration 모드가 활성화된 경우에만 표시됩니다.__ITEM__skl-txtd0__
rfp-science-multiplier=과학 비용을 조정합니다. 0.5는 기본 과학 연구 비용의 절반, 2는 과학 연구에 2배의 비용이 필요함을 의미합니다. RFW 과학 비용에도 영향을 줍니다.\n\n__ITEM__skl-txtra0__1__ITEM__skl-txtre__
rfp-se-antimatter-ratio=RFP 제작법에서 반물질이 곱해지는 수입니다. "우주 탐사의 반물질 대체" 및 "반수소를 SE의 반물질 스트림으로 대체" 설정이 모두 꺼져 있으면 아무 작업도 수행하지 않습니다.\n\n[color=#008cff]DEFAULT = 20[/color].
rfp-use-se-antimatter=우주 탐사와 RFP의 반물질을 별개로 취급하려면 비활성화하세요. Space Exploration 모드가 활성화된 경우에만 표시됩니다. "우주 탐사 반물질 대체"가 활성화된 상태일 경우 이 옵션은 효과가 없습니다.__ITEM__skl-txtd1__