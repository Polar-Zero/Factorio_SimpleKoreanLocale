Use-Mod-Color-for-heat-pipes=열 파이프가 지루한 기본 게임 팩토리오 색상 대신, 모드에 정의된 색상을 사용하도록 합니다.
Use-Mod-Color-for-pipes=파이프가 지루한 기본 게임 팩토리오 색상 대신, 모드에 정의된 색상을 사용하도록 합니다.
Use-Mod-Color-for-roboports=로보포트가 지루한 기본 게임 팩토리오 색상 대신, 모드에 정의된 색상을 사용하도록 합니다.
Use-Mod-Color-for-steam-generators=발전기가 지루한 기본 게임 팩토리오 색상 대신, 모드에 정의된 색상을 사용하도록 합니다.