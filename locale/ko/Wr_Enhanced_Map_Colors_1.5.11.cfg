[mod-name]
Wr_Enhanced_Map_Colors=향상된 지도 색상 2.0 - 재업로드(Enhanced Map Colors 2.0 Reupload)

[mod-description]
Wr_Enhanced_Map_Colors=벨트, 발전기, 파이프, 전신주, 레이더, 로보포트 등의 지도/미니맵 색상을 변경하여 대비를 개선하고, 지도 가시성을 향상시킵니다. osldgoth가 만든 원본 모드를 2.0용으로 재업로드했습니다.\n\n번역: SimpleKoreanLocale(PolarZero)


[controls]
EMC-Hotkey=향상된 지도색 단축키

[mod-setting-name]
Use-Mod-Color-for-heat-pipes=더 붉은 열 파이프
Use-Mod-Color-for-pipes=보라빛 파이프
Use-Mod-Color-for-roboports=회색 로보포트
Use-Mod-Color-for-steam-generators=짙은 초록색 증기 발전기

