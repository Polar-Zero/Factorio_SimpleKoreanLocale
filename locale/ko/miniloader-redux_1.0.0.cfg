[hps__ml-gui]
migration=__2__ (__3__)표면의 미니로더 __1__개를 마이그레이션했습니다.
command_inspect_miniloaders=현재 게임에 있는 모든 미니로더를 검사하고 잘못된 객체를 제거하며, 가능한 경우 내부 게임 상태를 수정합니다.
command_inspect_miniloaders_invalid=[미니로더 검사] 잘못된 객체가 감지되었습니다: 미니로더: __1__ / 내부 적재기: __2__ / 내부 투입기: __3__.
command_inspect_miniloaders_removed=[미니로더 검사] 잘못된 객체가 감지되어 제거했습니다: 제거된 객체: __4__, 미니로더: __1__ / 내부 적재기: __2__ / 내부 투입기: __3__.
command_rebuild_miniloader_inserters=모든 미니로더의 내부 투입기를 다시 생성합니다.
command_control_miniloader_inserters=미니로더 투입기 전원 전환 (디버그 전용)
command_control_miniloader_inserters_invalid=[미니로더 투입기 제어] 'on' / 'off' 가 지원되어야 하지만, __1__ 값이 반환되었습니다.
command_control_miniloader_inserters_off=[미니로더 투입기 제어] 모든 미니로더 투입기가 비활성화되었습니다.
command_control_miniloader_inserters_on=[미니로더 투입기 제어] 모든 미니로더 투입기 활성화됨.
check_speed_mode_result=[Miniloader (Redux)] 터보 모드를 미니로더 __1__대에 대해 활성화하였으며, 미니로더 __2__대는 무시되었습니다.
command_resync_miniloaders=현재 게임 내에 있는 모든 미니로더의 설정을 재동기화하고, 또한 지원 가능한 경우 '터보 모드'를 활성화하여 보관함 사이의 운반 속도를 증폭시킬 수 있습니다.
command_resync_miniloaders_invalid=[미니로더 재동기화] 'speed' 가 지원되어야 하지만, __1__ 값이 반환되었습니다.
command_resync_miniloaders_speed=[미니로더 재동기화] 미니로더에 터보 모드 사용이 가능한지 확인합니다.
lane_filter=라인별 필터 사용
lane_filter_tooltip=라인별 필터 기능을 활성화합니다 (왼쪽 필터는 왼쪽, 오른쪽 필터는 오른쪽)
turbo_mode=터보 모드 (보관함 전용)
turbo_mode_tooltip=터보 모드로 설정할 경우 컨베이어 벨트 <-> 보관함(또는 화물차) 사이로만 아이템을 이동시킬 수 있지만, 운반 속도가 증폭됩니다.

