[mod-setting-description]
hps__ml-debug-mode=디버그 기능을 활성화합니다. 이 모드를 디버깅하는 경우에만 활성화하세요.
hps__ml-loader_snapping=벨트 옆에 배치한 적재기를 자동으로 연결합니다.
hps__ml-chute_loader=물류 기술 연구와 함께 사용할 수 있는 간단하지만 느린 적재기입니다.
hps__ml-migrate_loaders=Factorio 1.1 미니모더 객체를 마이그레이션할 수 있습니다. (https://mods.factorio.com/mod/miniloader)를 이 모드로 마이그레이션하세요. 기본 미니로더만 지원합니다.
hps__ml-no_power=미니로더가 전기 에너지를 사용하지 않도록 합니다. 왜냐하면 그들은 마법적이며, 전력이 필요하지 않더라도 지나치게 강력하게 되지는 않기 때문입니다.
hps__ml-sanitize_loaders=일부 다른 모드에서 Miniloader Redux 모드와 호환되지 않는 충돌 마스크를 선언하는 적재기를 추가했을 수 있습니다. 이로 인해 <객체 A>가 <미니로더 객체> 충돌 마스크와 충돌하는 오류가 발생할 수 있습니다. 이 설정을 활성화하면 이러한 적재기와 호환되도록 패치를 시도합니다. 이 설정이 작동한다는 보장은 없으며 다른 모드가 작동되지 않도록 할 수도 있습니다.
hps__ml-check_speed_mode=시작시, 모든 미니로더가 상자나 조립 기계와 상호작용하는지 확인하고, 상호작용하는 미니로더에 대한 터보 모드를 활성화합니다.
hps__ml-fix_blueprint_mods=팩토리오 게임에서 버그가 발생하여 미니로더가 제대로 조립되지 않도록 하는 일부 설계도면 모드(예: Blueprint Sandboxes 또는 Blueprint Shotgun)에 대한 임시 지원 해결책을 활성화합니다. 다만, 임시 기능이므로 작동이 보장되지 않을 뿐만 아니라 다른 모드와 충돌을 일으킬 수도 있습니다. 활성화에 대한 모든 책임은 사용자에게 있으며, 백업을 강력히 권장합니다.