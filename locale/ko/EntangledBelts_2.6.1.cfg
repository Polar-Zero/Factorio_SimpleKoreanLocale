eb-make-traditional=활성화하면 지하 벨트를 이용해 얽힌 지하 벨트를 제작하고, 회수할 때 일반 벨트 형태로 회수할 수 있습니다.
eb-selected-overlay-seconds=선택한 얽힌 지하 벨트에 대한 오버레이 표시를 얼마나 오래 표시되도록 할지 조정합니다. (0: 비활성화)