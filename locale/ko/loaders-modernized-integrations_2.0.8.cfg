[strings]
mdrn-dummy-entity=적재기 마이그레이션 더미
mdrn-split-suffix=(면 분할)
mdrn-use-split-lanes=벨트 줄 단위 선별 필터 사용
mdrn-power-change=[color=red]적재기 전력 소비량 증가됨[/color]: 현대화된 적재기 모드에서 적재기 관련 밸런스를 조정했습니다. 이제 적재기가 활성화된 상태일 경우 최소 10배 이상의 전력을 소비합니다. 이 변경사항을 원하지 않는 경우 모드 설정에서 이전의 더 낮은 전력 소비량으로 되돌릴 수 있습니다.
mdrn-compatibility-change=[color=yellow]Loaders Modernized[/color]: 다른 모드와의 호환성 제공 방식이 변경되었습니다. 모드 제작자는 자신의 모드에서 직접 지원 기능을 추가하거나, 별도 애드온 모드를 통해 추가할 수 있습니다.
mdrn-compatibility-removed=[color=yellow]Loaders Modernized[/color]: 마이그레이션 후 일부 적재기가 제거된 것으로 보입니다. 이전에 지원되던 모든 모드는 이제 ‘애드온’ 모드를 설치해야 사용할 수 있습니다. 문제가 있다면 Loaders Modernized 토론 페이지에 보고해 주세요.
mdrn-compatibility-removed-2=[color=yellow]Loaders Modernized[/color]: [color=red]저장 금지[/color] 이전 현재화된 적재기 중 일부가 2.0 버전으로 교체되지 않은 것으로 보입니다. 이는 호환성 모드가 로드되지 않았거나, [color=yellow]Loaders Modernized[/color]의 적재기를 추가하는 벨트 티어 확장 모드를 업데이트해야 함을 의미할 가능성이 높습니다.
mdrn-deprecated-addon-warning=[color=yellow]Loaders Modernized[/color]: 추가 기능 [color=red]__1__[/color] 모드는 'Loaders Modernized: Integrations'로 변경되었습니다. 해당 모드를 제거해주세요. 기존 모드는 더 이상 지원되지 않으며 업데이트 역시 제공되지 않습니다.
mdrn-add-loader-variants-tooltip=이 계획기에 있는 기존 기본 적재기 업그레이드 쌍에 해당하는 모든 적재기 변형 객체에 대한 업그레이드 매핑을 추가합니다.
mdrn-chute-direction-change=[color=yellow]Loaders Modernized[/color]: 활송 장치는 기본적으로 오로지 보관함에 아이템을 적재하는 용도로만 사용하도록 설계되었습니다. 설정상으로는 중력의 힘만 사용하여 아이템을 투입하며, 기계가 가득 찼음을 감지하는 회로 역시 없기에, 기계가 가득 찰 때까지 아이템을 채우는 것이 가능할 뿐, 벨트에 기본적으로 아이템을 놓을 수 없습니다. 다만 플레이어가 원한다면 선별 기능이나 투입기 제한 준수 같은 고급 기능을 이용할 수 있도록 모드 시작 설정을 변경할 수 있게 되었습니다. 참고: 이 저장 파일에서 보관함에서 벨트로 물건을 내보내는 활송 장치가 감지되었으며, 공장 손실을 방지하기 위해 모드 설정 -> 지도를 조정하여 활송 장치의 벨트 하역 기능을 재활성화하였습니다. 하지만 활송 장치를 의도한 대로 사용할 수 있도록 공장 구성 및 모드 설정을 조정하는 것을 추천합니다.
mdrn-fill-suffix=(채우기)
mdrn-remove-loader-variants-tooltip=이 계획기에 동일한 기본 티어 쌍이 포함된 적재기 변형 업그레이드 매핑을 제거합니다.
mdrn-use-wfs=묶음이 가득 찰 때까지 대기
mdrn-wfs-suffix=(묶음 기다리는 중)
mdrn-wfs-warning=[color=yellow]Loaders Modernized[/color]: 지난 버전에서 모드에서 적재기에 'Wait-For-Full-Stack' 플래그를 추가하는 함수가 다소 지나치게 적극적이었습니다. 해당 플래그를 제거하고 싶다면 각 적재기에서 개별적으로 설정할 수 있으며, 모든 저장 파일의 모든 현대화된 적재기와 고스트에서 해당 플래그를 제거하는 명령어도 추가되었습니다.  [color=blue]/mdrn-remove-wfs[/color]\n또한 모드 설정 페이지에서, 새로 배치할 적재기에 대한 기본 설정이 본인이 원하는 설정에 맞는지 확인하는 것을 권장합니다.
mdrn-use-fill=모듈 슬롯 채우기
mdrn-lu-migration-complete=[color=yellow]Loaders Modernized[/color]: Loader Utils 모드 마이그레이션 완료.  적재기 __1__개가 Loaders Modernized 변형으로 성공적으로 교체되었습니다. 이제 게임을 저장한 뒤 메인 메뉴로 돌아가, 모드 설정 -> 시작에서 해당 설정을 비활성화할 수 있습니다.
mdrn-lu-migration-reminder=[color=yellow]Loaders Modernized[/color]: Loader Utils 모드 마이그레이션이 완료되었습니다.  게임 저장을 완료했다면 모드 설정 -> 시작에서 [color=yellow]Loader Utils 모드에서 마이그레이션[/color]을 안전하게 비활성화하여 마이그레이션 도중 생성된 도우미 객체를 제거하세요.
mdrn-lu-removed-warn=[color=yellow]Loaders Modernized[/color]: Loader Utils 모드가 비활성화된 것을 확인했으나 [color=red]Loader Utils 모드에서 마이그레이션[/color] 모드 시작 설정이 활성화되어 있지 않았습니다! Loader Utils에 의해 수정된 모든 적재기가 [color=red]영구적으로 손상되었습니다[/color]. 경고: 게임을 [color=red]절대[/color] 저장하지 마십시오, 메인 메뉴로 즉시 돌아간 뒤, 모드 설정 -> 시작 탭에서 [color=yellow]Loaders Modernized: Loader Utils 모드에서 마이그레이션[/color] 시작 설정을 활성화하고, 이전 저장 파일을 다시 불러와야 합니다.
mdrn-lu-stacking-warn=[color=yellow]Loaders Modernized[/color]: Loader Utils 모드에서 모든 적재기에 잔적 기능을 활성화시켰으나, Loaders Modernized의 [color=yellow]잔적 모드[/color] 설정이 [color=yellow]모두[/color]로 설정되어 있지 않은 상태였으며, 이로 인해 이전에 잔적 기능을 사용할 수 있었던 적재기들이 해당 기능을 사용할 수 없게 되었을 가능성이 있습니다. - 연결된 "wait for full stack" 플래그 포함. 게임을 진행/저장하기 전에 메인 메뉴로 돌아가 잔적 모드 설정이 올바른지 확인하고 검토해보는 것을 권장합니다.

