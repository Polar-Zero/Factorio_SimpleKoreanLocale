[mod-setting-description]
mdrn-embiggen-assemblers=모서리에 있는 적재기가 더 연결된 것처럼 보이도록 조립 기계 크기를 키울 수 있습니다.
mdrn-respect-insert-limits=활성화하면, 투입기와 동일하게 기계에 아이템이 "충분하다"고 표시되면 기계 입력 슬롯에 아이템 채우기를 중지하도록 할 수 있습니다.
mdrn-cheap-stacking=벨트 잔적이 '모두'로 설정된 경우, 더 저렴한 비잔적 적재기 제작법 사용이 가능해집니다.\n__ITEM__skl-txtd0__
mdrn-double-recipe=제작 비용과 결과물을 두 배로 늘려, 지하 벨트가 동시에 2개씩 소모되도록 합니다.\n__ITEM__skl-txtd0__
mdrn-enable-chute=매우 느린 적재기인 활송장치 제작법을 활성화합니다.\n__ITEM__skl-txtd1__
mdrn-enable-stack-loader=터보 적재기 속도로 작동하는, 별도의 묶음 적재기 객체 및 제작법을 활성화합니다. 다른 모든 적재기에 대해 잔적 기능을 비활성화한 상태에서 사용하도록 설계되었습니다.
mdrn-keep-5d-loaders=5Dim의 운송 모드에서 제공하는 적재기를 유지할지 선택할 수 있습니다.\n__ITEM__skl-txtra0__없음__ITEM__skl-txtre__
mdrn-keep-turbo-loader=활성화하면, 기본 게임의 터보 적재기를 계속 사용할 수 있도록 합니다. MK4 적재기와 속도가 동일하지만, 제작에 더 많은 재료가 필요합니다.\n__ITEM__skl-txtd0__
mdrn-migrate-from-miniloaders=이미 지도에 배치된 Miniloaders 모드 객체를 Loaders Modernized 모드로 마이그레이션하려고 시도합니다. 인벤토리나 창고에 있던 소형 적재기는 손실되며, 조립 기계의 제작법은 초기화됩니다.\n__ITEM__skl-txtd0__
mdrn-unlock-technology=별도의 기술로 적재기를 잠금 해제할지, 같은 티어의 다른 물류 객체와 함께 잠금 해제하도록 선택할 수 있습니다.
mdrn-use-aai-graphics=AAI 적재기 모드가 감지되었습니다.\n이 모드에서 AAI 적재기의 그래픽을 사용하게 할 수 있습니다.\n\nAAI 적재기의 '작동 모드'를 '그래픽 전용'으로 설정한 상태에서 사용하기 위한 것입니다.
mdrn-use-electricity=활성화하면 적재기 작동에 전력이 필요햐게 됩니다.\n__ITEM__skl-txtd1__
mdrn-wait-for-full-stack=벨트에 적재하기 전에 잔적 한도만큼의 아이템을 (벨트 잔적 한도) 기다리도록 합니다. 이는 별도의 묶음 호환 적재기를 활성화한 경우에만 적용됩니다.
mdrn-aai-fast-replace=AAI Loaders 모드가 감지되었습니다.\n이 설정을 활성화하면 모든 AAI 적재기 객체의 빠른 교체 그룹을 Loaders Modernized와 일치하도록 설정시켜, 두 모드 객체 사이를 빠르게 교체할 수 있도록 호환시킵니다.\n\n[color=yellow]AAI 적재기가 그래픽 전용 모드로 설정되어 있다면 효과가 없습니다.[/color]
mdrn-chute-direction=활송 장치가 보관함에 적재만 가능하도록 할지, 벨트로 하역하는 기능도 허용할지 조정할 수 있습니다. 이 설정은 '활송 장치 모드'가 '기본값' 이여야 적용됩니다.
mdrn-chute-mode=활송 장치의 사용 가능 여부와, 아이템 선별 활성화 여부를 조정할 수 있습니다.
mdrn-default-respect-insert-limits=기계에 재료를 채울 때 적재기의 기본 동작을 조정합니다.
mdrn-default-wait-for-full-stack=적재기가 기계에 가득 채울 지 여부를 조정합니다.
mdrn-enable-stacking=잔적 가능한 적재기를 활성화합니다.
mdrn-use-k2-recipes=적재기에 크라스토리오 2 모드 형식의 제작법이 사용되도록 합니다.
mdrn-lu-migration=활성화하면, 이전에 Loaders Modernized와 Loader Utils 모드를 동시에 사용한 저장 파일을 마이그레이션할 수 있도록 돕는 보조 객체가 생성됩니다. 이 설정을 활성화한 상태로 저장 파일을 로드, 저장해 마이그레이션을 완료했다면 이 설정은 안전하게 비활성화할 수 있습니다.