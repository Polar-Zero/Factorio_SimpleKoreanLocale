[mod-name]
Placeables=배치 도우미 - 인벤토리에서 사용할 수 있는 아이템 표시(Placeables: Show items in your inventory that you can build with!)

[mod-description]
Placeables=현재 인벤토리의 아이템을 이용해 건설할 수 있는 아이템을 강조 표시해주는 단축바 스타일의 동적 GUI를 게임에 추가합니다. 많은 기계를 추가하여 단축바에 다 담을 수 없게 만드는 대형 모드 (pY, Angel/Bobs, Krastorio)등에 적합하도록 설계되었습니다.


[controls]
placeablesToggleCollapse=창 접기/해제
placeablesToggleVisibilty=창 열기/닫기

[placeablesTooltips]
collapse=창을 축소하고 모든 아이템을 숨깁니다.\n[font=default-semibold][color=128, 206, 240]__CONTROL__placeablesToggleCollapse__[/color][/font]를 눌러도 이 작업을 수행할 수 있습니다.
expand=이 창의 너비를 늘리려면 [font=default-semibold][color=128, 206, 240]Shift[/color][/font]+드래그 하세요.
modeSwitch=단축바 모드 전환\n단축바 모드에서는 이 창의 위쪽 대신 아래쪽을 고정하여, 화면 하단에 효과적으로 고정할 수 있게 됩니다.
reduce=이 창의 너비를 줄이려면 [font=default-semibold][color=128, 206, 240]Shift[/color][/font]+드래그 하세요.
topButton=배치 가능 ([font=default-semibold][색상=128, 206, 240]__CONTROL__placeablesToggleVisibilty__[/color][/font])

[mod-setting-name]
placeablesSettingHideButton=화면 왼쪽 위에 숨김 버튼 표시
placeablesSettingPowerUser=창 왼쪽으로 버튼 이동

[mod-setting-description]
placeablesSettingHideButton=[font=default-semibold][color=128, 206, 240]__CONTROL__placeablesToggleVisibilty__[/color][/font]로도 창을 열거나 닫을 수 있습니다.