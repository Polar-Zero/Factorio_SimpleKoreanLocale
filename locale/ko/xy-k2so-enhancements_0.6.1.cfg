[mod-description]
xy-k2so-enhancements=다른 모드와의 호환성, 일관성 변경, 밸런싱 조정 등을 위해 Krastorio 2 Spaced Out 모드에 다양한 개선 사항을 추가합니다. 많은 모드에 대한 테크 카드 이미지를 추가하고, 다른 모드에서 추가한 차량이 K2의 장비 시스템을 사용하도록 개선합니다. 적용할 사항은 설정에서 전환할 수 있습니다.\n\n번역: SimpleKoreanLocale(PolarZero)


