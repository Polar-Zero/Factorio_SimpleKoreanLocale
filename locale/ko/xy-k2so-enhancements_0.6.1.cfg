[mod-setting-description]
xy-adv-chem-plant-rebalance=[color=yellow]경고: 기존 저장에 사소한 문제를 일으킬 수 있습니다.[/color] [entity=kr-advanced-chemical-plant]의 능력치 대부분을 파라켈신(Paracelsin) 행성의 전기화학 공장(게임 후반에 등장)과 교체합니다. [entity=kr-advanced-chemical-plant]의 제작 비용이 감소되지만, 전기화학 공장은 더 비싸집니다.
xy-advanced-centrifuge-rebalance=고급 원심분리기의 제작 속도를 절반으로 낮추는 대신, +50%의 생산성 효과를 추가하여 K2보다 우주 시대 밸런스에 더 맞도록 조정합니다. 또한 [item=kr-matter-tech-card] 대신 [item=electromagnetic-science-pack] 단계에서 사용할 수 있도록 하고, 건물 제작법을 크게 개편합니다.
xy-advanced-tank-expensive-research=전투 목적으로 [entity=spidertron] 사용을 장려하기 위헤, [technology=kr-advanced-tank] 연구에 [item=metallurgic-science-pack],[item=electromagnetic-science-pack],[item=agricultural-science-pack] 이 추가로 필요하도록 합니다.
xy-arig-belts=[color=yellow]경고: 기존 저장에 사소한 문제를 일으킬 수 있습니다.[/color] 극고속 벨트를 우주 시대 터보 벨트가 아닌 아리그 초고속 벨트의 업그레이드로 바꾸고, 더 잘 통합되도록 합니다. 또한 초고속 적재기를 추가합니다. 활성화하면 모든 극고속 벨트 제작에 초고속 벨트가 필요하게 됩니다. 또한 초고속 벨트 제작법을 K2 스타일에 맞게 개편합니다.
xy-item-weight=[item=kr-electronic-components]과 같은 저가치 주요 중간 생산품를 버프하여, [item=kr-inserter-parts]과 같은 건물을 현장에서 주요 재료로 제작할 수 있도록 합니다.
xy-lab-recipe-changes=[color=yellow]경고: 기존 저장에 사소한 문제를 일으킬 수 있습니다.[/color] [entity=kr-singularity-lab] 제작에 [entity=biolab] 대신 뮬루나(Mulana) 극저온 연구소가 필요하도록 하고 (뮬루나 행성이 설치되지 않은 경우 [item=quantum-processor]) Paracelsin(파라켈신) 행성이 활성화된 경우, 냉동 연구소에 파라켈신 연구 및 재료가 필요하도록 수정합니다. 또한 품질에 따른 과학 팩 소모량 배율이 재조정되며, 이 값은 극저온 연구소과 [entity=kr-singularity-lab]에 적용됩니다.
xy-maraxsis-moshine-connection=[color=yellow]경고: 게임 도중 비활성화하면 문제가 발생할 수 있습니다.[/color] 마락시스와 모샤인 사이에 다른 경로보다 빠른 15,000km 길이의 새로운 우주 연결을 추가합니다. 마락시스로 이어지는 다른 경로와 동일한 소행성 유형이 나타납니다. "모샤인까지의 우주 거리 증가" 설정, 마락시스, 모샤인 행성이 활성화되어 있어야 하며, 그렇지 않으면 효과가 없습니다.
xy-moshine-connection-length=[planet=nauvis]과 [planet=vulcanus]에서 모샤인까지의 우주 거리를 각 10,000km와 25,000km로 증가시킵니다. 이 옵션은 소행성 밀도에 영향을 주지 않습니다.
xy-move-lab-category=모든 연구소 건물을 과학 아이템 그룹(Science group) 모드에서 제공하는 과학 탭에서 제작할 수 있도록 이동합니다. 게임에 연구소 유형 건물이 10개 이상이면 이 설정은 자동으로 진행되며, 이 설정이 효과가 없더라도 활성화된 상태를 유지해도 안전합니다.
xy-paracelsin-tech-card=[color=orange]경고: 이 값을 활성화된 상태로 유지하는 것을 추천합니다. 아연도금 과학 팩[/color]을 제작하는 저장 파일에 큰 영향을 줍니다. 아연 도금 테크 카드를 추가하는 다른 모드가 있으므로, 이 설정은 이동되었습니다.
xy-paracelsin-tech-card-endgame=[color=orange]경고: 극후반 저장 파일에 영향을 줍니다.[/color] [item=promethium-science-pack]를 이용한 연구에는 아연도금 테크 카드도 필요하도록 수정합니다. "아연도금 테크 카드 추가/교체"가 활성화되어 있어야 합니다.
xy-processing-unit-alt=[color=yellow]경고: 기존 저장에 사소한 문제를 일으킬 수 있습니다.[/color] [recipe=kr-bio-processing-circuit]을 [entity=biochamber]에서만 제작할 수 있도록 하고, 적절한 양의 [item=advanced-circuit]이 필요하도록 수정합니다. 질산을 이용한 [item=processing-unit] 제작이 세리스(Cerys) 행성에서만 제작 가능하도록 하고, K2 표준 스타일로 재조정합니다. 또한 파라켈신(Paracelsin) 질산을 이용한 [item=processing-unit] 제작법이 다른 제작법와 밸런싱을 위해 조정되지만, 그 대신 [item=advanced-circuit]을 하나 덜 사용하게 됩니다.
xy-secretas-polish=[color=orange]경고: Secretas에 도달한 저장 파일에 영향을 줍니다.[/color] 해당 모드 많은 제작법을 개선하고 다른 모드 및 K2 재료가 필요하도록 변경합니다.
xy-tech-inflation=[color=yellow]경고: 게임을 더 어렵게 만들지만 활성화하는 것을 권장합니다.[/color] 처음 세 기본 행성 이후 연구 비용을 증가시킵니다. 해당 시점에서 플레이어는 K2 기능을 이용하여 엄청난 규모로 확장할 수 있기에, 이를 사용한 게임 후반/극후반 전 3번째 기지와, "킬로베이스" 수준 건설을 장려합니다, 합리적인 시간 내에 엔드게임을 완료하기 위해 [item=promethium-science-pack] 이전 1,000-3,000+ SPM 이상, 이후 10,000 SPM 이상을 추천합니다. 모샤인 행성 및 "업그레이드" 기술에 영향을 미치지 않습니다.\n[font=default-bold]이 옵션은 모든 사람에게 적합하지 않을 수 있으며, 게임 중반 이후 기지에 큰 영향을 미치므로 기본적으로 비활성화되어 있습니다.[/font]
xy-tech-inflation-scale=기본 배율:\n[item=kr-advanced-tech-card] 2x\n[item=metallurgic-science-pack][item=electromagnetic-science-pack][item=agricultural-science-pack](모두) 5x\n[item=cryogenic-science-pack],유압,아연도금 6x\n[item=kr-matter-tech-card] 10x\n[item=kr-singularity-tech-card] 15x\n[item=promethium-science-pack] 25x\n[item=kr-intergalactic-transceiver] 50x\n이 값 중 가장 높은 배율 값가 사용됩니다. [technology=quantum-processor]및 [technology=legendary-quality], 후반 행성 발견 같은 핵심 기술에 더 많은 비용이 필요하도록 합니다.\n이 설정을 변경하면 다른 설정과 연결된 배율도 증가하지만 1x 이하일 경우 영향을 주지 않습니다.