[cargo-drone-migration]
warning-enable-as-depot-removed=경고. 정류장 내부의 창고 사용 설정은 제거되어, 전용 창고 구조로 대체되었습니다.
warning-read-inventory-output-removed=경고. 정류장 내부 인벤토리 구조가 1.5.0에서 변경되었으며, 이제 정류장 GUI 내에서 구성됩니다. 즉, 연료역에서 더 이상 읽은 인벤토리를 출력하지 않으므로 이 동작에 의존하는 모든 연료역은 더 이상 작동하지 않습니다.
warning-wires-removed=경고. 1.4.0 이전 버전의 화물 드론 모드의 업데이트시 발생한 마이그레이션 문제로 인해 정류장에 연결된 모든 회로 전선이 제거되었으며, 재연결해야 합니다. 이제 정류장에서 드론 제한 및 우선순위를 구성해야 합니다. 불편을 드려 죄송합니다.

