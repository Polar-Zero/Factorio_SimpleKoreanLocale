[mod-setting-description]
cargo-drone-burnt-result-inventory-size=[item=cargo-drone] 화물 드론 내부의 연소 결과물 인벤토리 크기를 조정합니다.\n[item=cargo-drone]화물 드론은 연료를 받기 전에 [item=cargo-drone-mooring-constant-combinator-refueler]화물 드론 연료 정류장에 연소 결과물의 하역을 시도합니다. 연소 결과물 슬롯이 완전히 비기 전 [item=cargo-drone]화물 드론은 정류장을 떠나지 않을 것입니다.\n[item=cargo-drone]화물 드론은 [item=cargo-drone-mooring-constant-combinator-refueler]화물 드론 급유 정류장으로 향할 시기를 결정할 때 이미 연소된 결과물의 수량을 고려하지 않습니다.
cargo-drone-fuel-inventory-size=[item=cargo-drone]화물 드론 내부에 저장할 수 있는 연료 크기를 조정합니다.
cargo-drone-heuristic-target-count-cost=드론이 어느 정류장으로 가야 할지 결정할 때 사용됩니다. 정류장 선택에는 기본적으로 거리 기준이 적용되지만, 선택한 정류장으로 향하는 [item=cargo-drone]화물 드론 1대마다 이 설정값만큼 비용이 증가하도록 합니다.\n값이 높을수록 [item=cargo-drone]화물 드론이 더 고르게 분산되며, 낮을수록 같은 방향으로 향하게 됩니다.
cargo-drone-inventory-size=[item=cargo-drone]화물 드론이 수송할 수 있는 인벤토리 슬롯 수량을 변경합니다.
cargo-drone-min-schedule-interval=[item=cargo-drone]화물 드론에 작업을 예약하기 전에 경과해야 하는 최소 틱 시간입니다.\n값이 클수록 [item=cargo-drone]화물 드론이 새 작업에 할당되는 데 시간이 오래 걸리지만, 예약 대기 지연이 급증할 가능성이 증가됩니다.\n값이 작을수록 [item=cargo-drone]화물 드론이 더 빨리 할당되며, 예약 대기 지연이 급증할 가능성이 감소됩니다.
cargo-drone-fuel-interrupt-percentage=화물 드론의 비행을 중단하고 [item=cargo-drone-mooring-constant-combinator-refueler]로 향하게 할 남은 연료 비율입니다.
cargo-drone-mooring-mooring-depot-alert=창고로 표시된 공급역에 대한 알림을 활성화합니다. 이는 이 모드를 최신 버전으로 마이그레이션하는 데 도움이 됩니다.
cargo-drone-mooring-no-wire-connection-alert=전선이 연결되지 않은 공급/요청역에 대한 알림을 활성화합니다.
cargo-drone-stuck-at-refueler-seconds-alert=[item=cargo-drone]화물 드론이 [item=cargo-drone-mooring-constant-combinator-refueler]에 오래 정차한 상태에서, [item=cargo-drone]화물 드론 멈춤 알림이 전송되기까지의 시간 (초)\n비활성화하려면 0으로 설정핫에ㅛ.