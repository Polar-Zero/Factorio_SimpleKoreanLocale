[virtual-signal-description]
signal-available-slots=민원 접수처에 남아있는 대기 구역 자리를 나타내는 회로 신호.
signal-complaint-h=현재 관리망에 남아있는 유해 물질 민원을 나타내는 회로 신호.
signal-complaint-l=현재 관리망에 남아있는 경관 민원을 나타내는 회로 신호.
signal-complaint-lo=현재 관리망에 남아있는 배회 민원을 나타내는 회로 신호.
signal-complaint-lt=현재 관리망에 남아있는 쓰레기 민원을 나타내는 회로 신호.
signal-complaint-n=현재 관리망에 남아있는 소음 민원을 나타내는 회로 신호.
signal-complaint-s=현재 관리망에 남아있는 스모그 민원을 나타내는 회로 신호.
signal-complaint-u=현재 관리망에 남아있는 실업 민원을 나타내는 회로 신호.
signal-complaint-v=현재 관리망에 남아있는 부랑자 민원을 나타내는 회로 신호.
signal-total-waiting=관리 스테이션에서 민원 해결까지 기다리는 바이터 합계를 나타내는 회로 신호.

[mod-setting-name]
administratorio-enable-working-hours=근무 시간 제한 활성화

[mod-setting-description]
administratorio-enable-working-hours=이 기능을 활성화하면 초과 근무 면제가 적용되지 않은 사무실 작업대, 탕비실, 노조 본부, 이사회 회의실이 밤에는 문을 닫게 됩니다. 비활성화할 경우 야간 종료, 초과 근무 모듈 모듈, 초과 근무 연구, 근무 시간 팁, [font=default-bold]주간 작업속도 향상 버프[/font]가 제거됩니다.