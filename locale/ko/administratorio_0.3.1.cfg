[mod-description]
administratorio=공장은 성장해야 하지만, 이제 적절한 허가도 필요합니다. 바이터를 불평하는 자로, 무기를 행정주의적인 요소로 바꾸세요.\n\n번역: SimpleKoreanLocale(PolarZero), runaind


