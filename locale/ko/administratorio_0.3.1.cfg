[recipe-description]
admin-station-production=고급 민원 처리에 사용할 수 있는 5x5 크기의 창구를 만듭니다.
basic-excuse-production=수상한 데이터 5개로 납득 가능한 핑계을 만들어보세요. 경관 민원 해결이나 저티어 제작에 사용됩니다.
blank-approval-production=빈 허가서 서식을 인쇄합니다. 허가 및 승인에 사용할 수 있는 고품질 서식.
blank-directive-production=빈 제안서 서식을 인쇄합니다. 경영진 허가에 사용할 수 있는 프리미엄 삼중 잉크로 보안 처리된 견본.
blank-form-production=종이와 잉크를 사용하여 빈 서식을 인쇄합니다. 범용 행정 서류.
brief-loitering=이전 불만 처리 파이프망과의 호환을 위해 유지되는 제작법.
brief-noise=이전 불만 처리 파이프망과의 호환을 위해 유지되는 제작법.
brief-unemployment=이전 불만 처리 파이프망과의 호환을 위해 유지되는 제작법.
brief-vagrancy=이전 불만 처리 파이프망과의 호환을 위해 유지되는 제작법.
carbon-offset-certificate-basic=빈 서식과 석탄으로 기본 탄소 배출 인증서를 발급하세요. 일괄 제련 작업에 필요합니다.
carbon-offset-certificate-verified=사무실에서 수상한 데이터를 이용한 추가 확인 작업을 진행하여 인증서를 업그레이드하세요. 용광로 건설에 필요합니다.
case-hazmat=접수된 민원, 서류 증거, 압축된 잔해로 검증된 유해 물질 판결문를 제작해보세요.
case-loitering=파일링, 데이터, 인증, 정제된 헛소리로 검증된 배회 판결문를 제작해보세요.
case-noise=접수된 민원, 검증된 데이터, 환경 인증서로 검증된 소음 판결문를 제작해보세요.
case-smog=접수된 민원, 서류 증거, 불필요 잔해로 검증된 스모그 판결문를 제작해보세요.
case-unemployment=접수된 민원, 실증적 사실, 정부 보조금으로 검증된 실업 판결문를 제작해보세요.
case-vagrancy=접수된 민원, 데이터, 정책 지침으로 검증된 부랑자 판결문를 제작해보세요.
charcoal-production=용광로에서 나무를 태워 석탄을 생산합니다. 온실과 함께 사용하면 재생 가능한 석탄 공급원이 됩니다.
chemical-handling-work-order-production=석유화학 허가서, 서식 27B-6, 배럴, 파이프 공정을 이용해여 화학 공장 운영 작업 허가서를 인쇄하세요.
coffee-plantation=커피 원두와 물로 더 많은 커피 원두를 재배해 원두 공급량을 3배로 늘리세요.
coffee-refining=원두, 물, 허가서만 있으면 커피를 추출할 수 있습니다. 간단한 서류 작업, 즉각적인 결과.
compacted-rubble-production=규제를 준수하며 잔해 더미를 압축합니다. 탄소 배출 인증서가 필요합니다. 건물이나 모듈 제작에 사용됩니다.
construction-permit-draft=사무실 작업대에서 빈 허가서 서식, 수상한 데이터, 종이로 건축 허가서 초안을 제작하세요. 프린터를 이용한 마무리 작업이 추가로 필요합니다.
construction-permit-printing=프린터에서 잉크를 사용하여 건축 허가서 초안을 완성합니다. 공식적인 건축 허가서.
construction-work-order-printing=초안에서 직접 건축 작업 허가서를 직접 인쇄하는 것으로, 제작 주기 당 2개씩 제작할 수 있습니다. 전기 프린터 필요.
construction-work-order-production=건설 허가와 작업 허가서를 결합합니다. 조립 기계 2 생산에 필요합니다.
copper-plate-batch=탄소 배출 인증서로 검증된, 10개의 구리 광석을 사용한 10개의 구리 판 제련 작업을 진행합니다. 돌 및 전기 용광로를 위한 제작법.
copy-blank-form=빈 서식 복사: 원본 1장 + 용지 5장 + 잉크 카트리지 1 + 고급 회로 1개로 6장을 출력할 수 있습니다. 용지 낭비 가능성을 줄이세요.
copy-carbon-offset-certificate=탄소 배출 인증서 복사: 원본 1장 + 종이 5장 + 잉크 카트리지 1 + 고급 회로 1개로 사본 6장을 제작할 수 있습니다. 산업용 프린터 필요.
copy-environmental-impact-report=환경 영향 보고서 복사: 원본 1장 + 종이 5장 + 잉크 카트리지 1 + 고급 회로 1개로 사본 6장을 제작할 수 있습니다. 산업용 프린터 필요.
copy-form-27b-6=서식 27B-6 복사: 원본 1장 + 종이 5장 + 잉크 카트리지 1 + 고급 회로 1개로 사본 6장을 제작할 수 있습니다. 산업용 프린터 필요.
corporate-breakroom-production=뒷담화를 생성하는 기업 탕비실을 구축하세요.
crappy-report-production=5개의 수상한 데이터를 이용한 보고서를 작성하세요. 모든 상위 계층 문서의 기본 요소.
credentials-production=유체 형태의 거짓말, 수상한 데이터, 정제된 허위사실로 인증서를 만들어보세요.
data-production=엉터리 보고서와 인증서로부터 실제 데이터를 합성합니다.
dubious-data-batch=탄소 배출 인증서로 검증된, 엉터리 광석을 사용한 수상한 데이터 제련 작업을 진행합니다. 돌 및 강철 용광로를 위한 제작법.
dubious-data-refining=광석을 수상한 데이터로 제련하세요. 정보 경제의 중추.
efficiency-module=엉터리 보고서와 전자 회로로 횡령 모듈 1(효율)을 제작할 수 있습니다..
efficiency-module-2=업그레이드: 티어 1 모듈 4개, 용지, 고급 회로가 필요합니다.
efficiency-module-3=업그레이드: 티어 2 모듈, 정책, 처리 유닛, 압축된 잔해, 인증서 4개가 필요합니다.
environmental-impact-report=엉터리 보고서와 27B-6 서류, 검증된 탄소 인증서, 잉크 카트리지로 종합적인 환경 영향 보고서를 인쇄하세요. 더 높은 수준의 공정 허가에 사용됩니다.
eviction-notice-production=던져 사용할 수 있는 퇴거 통지서를 생성합니다. 바이터 구조물 파괴에 사용.
filing-hazmat=유해 물질 민원을 접수하세요. 해결하려면 유해 물질에 대한 추가 문서가 필요합니다.
filing-landscape=빈 서식으로 경관 민원을 접수하세요. 민원 해결의 첫 번째 단계.
filing-littering=빈 서식으로 쓰레기 투척 민원을 접수하세요. 스피터 민원 해결의 첫 번째 단계.
filing-loitering=배회 민원을 접수하세요. 광범위한 제한 구역 문서가 필요합니다.
filing-noise=소음 민원을 접수하세요. 상당한 시간과 문서가 필요합니다.
filing-smog=스모그 민원을 접수하세요. 추가적인 환경 문서는 경관 신고보다 더 오랜 시간이 걸리도록 합니다.
filing-unemployment=실업 민원을 접수하세요. 가장 복잡한 민원으로, 광범위한 서류가 필요합니다.
filing-vagrancy=부랑자 민원을 접수하세요. 가장 복잡한 스피터 민원으로, 철저한 이동 기록이 필요합니다.
form-27b-6=용지 서식, 잉크, 쓸모없는 문서로 표준화된 요청서 서식을 인쇄하세요.
form-liquifier-production=서류 액화기 (투입구). 서류 작업 아이템을 공압 운송을 위한 유체 형태로 변환합니다.
form-solidifier-production=서류 고체화기 (배출구). 유체화된 서류를 다시 고체 형태의 아이템으로 변환합니다.
good-excuse-production=실제 데이터와 유동적인 거짓말을 혼합하여 설득력 있는 핑계 만들기.
government-grant-production=국채 발행, 엉터리 보고서, 구두 경영진 승인으로 정부 보조금을 확보합니다. 노조 본사에서 제작 가능.
greenhouse-discovery=젖은 퇴비를 뒤져서 희귀한 커피 원두를 찾으세요. 제작당 10% 확률. 원두를 찾지 못하더라도 약간의 나무를 회수할 수 있지만, 투입한 만큼은 아닙니다.
greenhouse-production=목재와 커피 생산을 위한 온실 건설.
greenhouse-wood=온실에서 물을 사용하여 나무를 재배하세요. 안정적이며 지속 가능한 방법입니다.
hazmat-final=검증된 사례, 유체 허위사실, 커피를 사용하여 유해 물질 민원을 해결하세요.
ink-production=석탄을 갈아 원시적인 잉크로 만듭니다. 수동 제작 가능. 글쓰기가 여기서 시작됩니다.
iron-plate-batch=탄소 배출 인증서로 검증된, 철광석 10개의 철 판 10개로의 제련 작업을 진행합니다. 돌 및 전기 용광로용.
justification-production=유체 허위사실, 인증, 정치적 유체로부터 법적인 정당화를 구축합니다.
landscape-final=제출된 민원에 기본적인 핑계을 더해 경관 민원을 해결합니다. 가장 간단한 해결 방법.
littering-final=접수된 투기 민원에 대한 엉터리 보고서를 작성하여 쓰레기 투기 민원을 해결하세요. 경관 민원보다 약간 어려움.
management-verbal-draft=탕비실에서 경영진가 구두로 동의하도록 설득합니다. 서식, 뒷담화, 기본적인 핑계, 커피가 필요합니다. 프린터 마무리 작업 필요.
management-verbal-printing=잉크와 종이를 이용해 구두 관리 초안을 완성합니다. 공식적인 구두 경영진 허가서가 생성됩니다.
management-verbal-work-order-production=구두 경영진 허가서와 작업 허가서를 결합합니다. 3티어 조립 기계 제작에 사용됨.
management-written-1st-printing=첫 번째 프린터 공정: 잉크와 서식 27B-6을 사용하여 서면 제안서를 검토합니다. 경영진 서면 검토가 생성됩니다.
management-written-2nd-printing=두 번째 프린터 공정: 잉크와 종이로 서면 검토를 마무리합니다. 공식적인 서면 경영진 허가서가 생성됩니다.
management-written-proposal=이사회 회의실에서 서면 경영 제안서 초안을 작성합니다. 빈 허가서, 그럴듯한 핑계, 이야기거리, 국채가 필요합니다.
management-written-work-order-production=서면 경영진 허가서와 작업 허가서를 결합합니다. 4티어 조립 기계 제작에 사용됨.
mechanical-printer-production=철, 돌, 종이로 기계식 프린터를 조립하세요. 안정적인 게임 초반 업그레이드.
meeting-room-production=7x7 이사회 회의실을 설정합니다. 사무실 작업대, 경영진 승인 및 정부 보조금이 필요합니다.
misinformation-production=거짓말과 수상한 데이터로 유체 허위사실을 생산합니다. 정책 결정의 핵심 요소.
narrative-production=정당화, 그럴듯한 핑계, 교양 있는 헛소리를 공식적인 이야기거리로 엮어냅니다. 대중의 인식을 통제합니다. 노조에서 제작 가능.
office-desk-production=서류 정리 및 보급품 제작에 필요한, 민원 작업대를 제작해보세요.
office-drama-recycling=탕비실에서 커피와 함께 사내 갈등를 처리하여 무작의 서식이나 이야기, 변명을 복구합니다. 대인 관계 갈등을 행정적 성과로 전환하는 과정.
osha-scrubbing=해결사 사무소에서 OSHA 위반을 처리할 때 정제된 논리와 노조 승인을 더하면 정당성을 확보할 수 있습니다.
osha-violation-recycling=노조 본사에서 OSHA 위반 사항을 일괄 재활용하여 임의의 서식과 중간 생산품을 회수할 수 있습니다. 정당화보다 저렴하지만 안정성은 감소됨.
overtime-exemption=단일 행정 건물에 대한 야간 근무 진행을 허용합니다. 생산 모듈, 공자금 더미, 합법적으로 불을 켤 수 있도록 하는 충분한 양의 커피가 필요합니다.
paper-production=나무를 종이로 변환하세요. 행정적 공급망의 첫 번째 단계.
petrochemical-operating-permit-production=건설, 안전 및 환경 관련 서류를 작업대에서 하나의 석유화학적 허가서로 통합하여 환경 영향 보고서 면제를 받아내세요.
pneumatic-pipe-production=철과 압축된 잔해로 밀폐된 공압 파이프를 생산합니다. 서류 운송에 사용.
pneumatic-pipe-to-ground-production=지하 공압 파이프를 생산합니다. 16칸 지하 범위.
policy-production=노조 본부에서 정책 초안을 작성하세요. 용지, 유체 허위사실, 데이터, 보조금이 필요합니다.
politician-fluid-refining=정치적 유체를 이용해 유체화된 거짓말을 정제합니다. 선전 증류소 필요.
printer-t1-production=잉크 기반 문서 제작에 사용할 수 있도록 기본적인 전기 프린터를 제작하세요.
printer-t2-production=복사 기능을 갖춘 산업용 프린터를 제작하세요. 기본 프린터와 고급 회로가 필요합니다.
productivity-module=수상한 데이터와 전자 회로로 감사 모듈(생산) 1을 제작해보세요.
productivity-module-2=업그레이드: 티어 1 모듈, 데이터, 고급 회로 4개 필요.
productivity-module-3=업그레이드: 티어 2 모듈, 정당화, 처리 유닛, 압축된 잔해, 인증서 4개가 필요합니다.
promise-production=서식, 허가서, 수상한 데이터로 던질 수 있는 행정적 약속을 직접 만들어 보세요. 시위하는 사람에게 던져 진정시킬 수 있습니다.
propaganda-distillery-production=거짓말이나 유체 허위사실와 같은 행정적 유체를 처리하기 위한 선전 증류소를 구축하세요.
provisional-approval-production=가장 기본적인 형태의 행정적 승인을 받습니다. 종이 및 잔해 더미 필요.
radiological-work-order-production=작업대에서 화학 허가서, 서면 경영진 허가서, 정당화, 환경 보고서를 이용해 원심분리기 작동 작업 허가서를 인쇄합니다.
refined-nonsense-production=압축된 잔해와 유체 상태의 허위사실을 융합하여 순수하게 정제된 헛소리를 만들어냅니다. 고도화된 행정적 공정의 필수 요소.
regulation-production=연방 법률 초안을 작성합니다. 헛소리, 인증, 데이터, 상당한 정부 보조금이 필요합니다.
research-grant-approval-production=용지 서식, 불필요 잔해, 수상한 데이터로 기초 연구 지원금을 발급하세요. 모든 과학 팩 제작에 필요.
research-grant-work-order-printing=연구 작업 허가서를 승인한 뒤 바로 인쇄하여 제작 주기당 2개씩 출력합니다. 전기 프린터 필요.
research-grant-work-order-production=연구비 승인과 작업 허가서를 결합합니다. 규제된 조립 기계 과학 생산 중에 소비됨.
resolution-office-production=민원 해결 및 허가 처리 업무를 위한 3x3 해결사 사무소를 제작하세요.
safety-waiver-draft=사무실 작업대에서 빈 허가서과 기본 핑계을 이용해 안전 책임 면책 동의서를 작성하세요. 프린터로 마무리해야 합니다.
safety-waiver-printing=프린터에서 잉크로 안전 책임 면책서 동의서 초안을 완성합니다. 공식 안전 책임 면책서 동의서를 생성합니다.
safety-work-order-printing=안전 작업서를 초안에서 직접 인쇄하여 제작 주기당 2개를 출력하세요. 전기 프린터 필요.
safety-work-order-production=안전 면책서를 작업 허가서와 결합합니다. 1티어 조립 기계 제작에 사용.
slush-fund-production=거짓말을 이용해 국채를 비자금으로 세탁해보세요.
smog-final=검증된 사례, 유체 허위사실, 커피로 스모그 민원을 해결하세요.
speed-module=기본 핑계과 전자 회로로 소환장 모듈 1을(속도) 제작하세요.
speed-module-2=업그레이드: 티어 1 모듈 4개, 그럴듯한 핑계, 고급 회로가 필요합니다.
speed-module-3=업그레이드: 티어 2 모듈, 이야기거리, 처리 유닛, 압축된 잔해, 인증서 4개가 필요합니다.
steel-plate-batch=탄소 배출 인증서로 검증된, 철 판 25개를 이용한 강철 판 5개 제련 작업을 진행합니다. 돌 및 전기 용광로용.
stone-brick-batch=탄소 배출 인증서로 검증된, 돌 20개를 이용한 벽돌 10개 제련 작업을 진행합니다. 돌 및 전기 용광로용.
synthetic-paper-production=플라스틱, 황, 물을 이용한 합성 종이를 제작합니다. 온실을 이용한 목재 종이보다 빠르지만 훨씬 더 많은 자원이 소비됩니다.
tax-audit=기본 국채 서류, 문서 및 데이터를 사용하여 비자금의 규모를 재분류하면 훨씬 더 큰 금액의 세금으로 재분류할 수 있습니다. 정직하지 않지만 효과적.
transit-authorization-production=기차 정류장 작동에 필요한 환승 허가서(서식 12-T)를 작성합니다. 빈 허가서와 서식 27B-6 필요.
treasury-bond-production=세금, 빈 서식, 쓸모없는 서류로 국채를 발행하세요.
union-approval-production=커피, 종이, 데이터와 세금으로 노조 승인 협상을 진행하세요.
useless-documentation-production=폐기물 잔해를 여러 겹의 종이로 감싸세요. 쓸모없는 것을 문서화한 뒤 제출물이나 및 금융 상품에 사용하세요.
watercooler-gossip-production=유체 커피와 수상한 데이터로 뒷담화를 생성하세요. 기업 의사 결정에 필수.
white-paper-production=데이터, 거짓말, 비자금으로 권위 있는 정책 문서를 작성하세요. 이사회 회의실에서 초안 작성.
work-order-production=빈 서식과 수상한 데이터로 작업 허가서 초안을 작성하세요. 규제된 조립 기계 제작에 대한 핵심 승인.
copy-blank-approval=빈 허가증 복사: 원본 1장 + 용지 5장 + 잉크 카트리지 1 + 고급 회로 1개로 6장을 출력할 수 있습니다.
copy-blank-directive=빈 허가서 복사: 원본 1장 + 용지 5장 + 잉크 카트리지 1 + 고급 회로 1개로 6장을 출력할 수 있습니다.
copy-chemical-handling-work-order=중화학 작업 허가서 복사: 원본 1장 + 용지 5장 + 잉크 카트리지 1 + 처리 유닛 1개로 6장을 출력할 수 있습니다.
copy-construction-work-order=건축 작업 허가서 복사: 원본 1장 + 용지 5장 + 잉크 카트리지 1 + 처리 유닛 1개로 6장을 출력할 수 있습니다.
copy-management-verbal-work-order=경영진 구두 작업 허가서 복사: 원본 1장 + 용지 5장 + 잉크 카트리지 1 + 처리 유닛 1개로 6장을 출력할 수 있습니다.
copy-management-written-work-order=경영진 서면 작업 허가서 복사: 원본 1장 + 용지 5장 + 잉크 카트리지 1 + 처리 유닛 1개로 6장을 출력할 수 있습니다.
copy-radiological-work-order=방사선 작업 허가서 복사: 원본 1장 + 용지 5장 + 잉크 카트리지 1 + 처리 유닛 1개로 6장을 출력할 수 있습니다.
copy-research-grant-work-order=연구 작업 허가서 복사: 원본 1장 + 용지 5장 + 잉크 카트리지 1 + 처리 유닛 1개로 6장을 출력할 수 있습니다.
copy-safety-work-order=안전 작업서 복사: 원본 1장 + 용지 5장 + 잉크 카트리지 1 + 처리 유닛 1개로 6장을 출력할 수 있습니다.
copy-work-order=허가서 복사: 원본 1장 + 용지 5장 + 잉크 카트리지 1 + 처리 유닛 1개로 6장을 출력할 수 있습니다.
hush-money-production=공식적으로 보일 수 있는 최소한의 서류만 갖춘 다음, 돈과 함께 던질 수 있는 자루에 넣은 형태. 근처 산란장을 3분 동안 잠잠하게 만듭니다.
loitering-final=확인된 사건 기록을 바탕으로 배회 관련 민원을 직접 해결한 뒤, 기존 초기 사건 기록을 하나의 최종 판결에 통합합니다.
noise-final=확인된 사건 기록을 바탕으로 배회 관련 민원을 직접 해결한 뒤, 기존 초기 사건 기록을 하나의 최종 판결에 통합합니다.
tube-intake-production=1x1 문서 입력 시설. 숨겨진 투입기를 통해 인접한 벨트나 상자에서 유효한 서류 아이템을 문서 네트워크로 끌어옵니다.
tube-outtake-production=1x1 문서 출력 시설. 문서 네트워크의 아이템이 출력되어 인벤토리에 나타납니다 - 자체 투입기나 물류 네트워크를 이용해 꺼낼 수 있습니다. 특정 아이템 유형을 요청하려면 인벤토리 슬롯 필터를 설정하세요.
unemployment-final=확인된 사건 기록을 바탕으로 실업 관련 민원을 직접 해결한 뒤, 기존 초기 사건 기록을 하나의 최종 판결에 통합합니다.
union-headquarters-production=데이터, 거짓말, 그리고 국채를 이용하여 노조본부에서 권위 있는 정책 문서를 작성합니다.
vagrancy-final=확인된 사건 기록을 바탕으로 부랑자 관련 민원을 직접 해결한 뒤, 기존 초기 사건 기록을 하나의 최종 판결에 통합합니다.

