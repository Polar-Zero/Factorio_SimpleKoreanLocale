[mod-setting-description]
TBRE-Expensive=활성화하면, 이 모드의 신호기의 제작 비용이 증가합니다. (생산 모듈을 사용할 수 있으므로 활성화하는 것을 권장합니다)
TBRE-PowerHungry=활성화하면, 이 모드의 신호기가 2배의 전력을 소비하게 됩니다.
TBRE-Productivity=활성화하면, 이 모드의 신호기에서 생산성 모듈을 사용할 수 있습니다. ('제작 비용 증가' 옵션 활성화시 함께 사용하는 것을 권장합니다)
TBRE-Quality=활성화하면, 이 모드의 신호기에서 품질 모듈을 사용할 수 있습니다. ('제작 비용 증가' 옵션 활성화시 함께 사용하는 것을 권장합니다)