[mod-name]
fast_transport_frones=운송 드론 - 드론 속도 가속(Fast Transport Drones)

[mod-description]
fast_transport_frones=설비 및 드론 최적화를 돕는 모드입니다. 파이프/전신주에 대한 플레이어 충돌을 제거하고, 모든 드론 기술을 경량화하며, 콘크리트/드론 도로에서의 드론 이동 속도를 2배로 증가시킵니다. PyCoalProcessing, Bob's Logistics, Asphalt series paving 등과 호환되며, 충돌을 피하기 위해 모든 코드에 null 검사를 진행했습니다!\n\n번역: SimpleKoreanLocale(PolarZero)
