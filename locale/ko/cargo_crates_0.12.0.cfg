[mod-name]
cargo_crates=화물 상자(Cargo Crates)

[mod-description]
cargo_crates=많은 아이템을 일회성 화물 상자에 포장해, 대규모 물류 운송을 용이하게 해보세요.\n\n번역: SimpleKoreanLocale(PolarZero)


[item-group-name]
cargo-crates=화물 상자
cargo-crates-zip=압축된 화물

[item-name]
cargo-crate=화물 상자 (__1__ __2__)

[recipe-name]
cargo-crate-unpack=화물 상자 풀기 (__1__ __2__)
cargo-crate-unpack-zip=__1__ __2__.zip 압축 해제

[technology-name]
cargo-crates=화물 상자
cargo-crates-zip=화물 압축

[technology-description]
cargo-crates=아이템을 단단히 포장하여 압축하고, 필요할 때 포장을 해제하는 것이 가능한 일회용 나무 화물 상자의 잠금을 해제합니다. 조밀한 포장 덕분에 상자 내부의 아이템은 로켓 화물량에 50%만 계산됩니다.
TFMG-cargo-crates=보다 효율적인 아이템 포장 방법을 해제합니다.
cargo-crates-zip=로켓을 통해 더 많은 물품을 보낼 수 있도록 아이템을 압축하세요.

[mod-setting-name]
cargo-crates-pack-ammo=탄약 화물상자 제작 허용
cargo-crates-pack-capsules=캡슐 화물상자 제작 허용
cargo-crates-pack-equipment=장비 화물상자 제작 허용
cargo-crates-pack-spoilables=부패 가능 아이템 화물상자 제작 허용
use-cargo-crates-zip-texture=압축된 화물 제작 허용
cargo-crates-packing-multiplier=화물 압축 배율

[mod-setting-description]
cargo-crates-pack-ammo=탄약을 상자에 포장할 수 있도록 허용합니다. 비활성화하면 생성되는 아이템과 제작법 수를 줄일 수 있습니다.
cargo-crates-pack-capsules=소비 가능한 아이템을 (캡슐 등) 상자에 포장할 수 있도록 허용합니다. 비활성화하면 생성되는 아이템과 제작법 수를 줄일 수 있습니다.\n참고: 음식도 캡슐로 분류됩니다.
cargo-crates-pack-equipment=장비를 상자에 포장할 수 있도록 허용합니다. 비활성화하면 생성되는 아이템과 제작법 수를 줄일 수 있습니다.
cargo-crates-pack-spoilables=부패 가능한 아이템을 상자에 포장할 수 있도록 허용합니다. 비활성화하면 생성되는 아이템과 제작법 수를 줄일 수 있습니다.