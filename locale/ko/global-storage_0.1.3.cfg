[mod-name]
global-storage=전역 저장소(Global Storage)

[mod-description]
global-storage=연결된 상자를 사용한 4차원 저장 네트워크를 구축할 수 있습니다. 상자 사이에 인벤토리를 공유하도록 동일한 네트워크 ID를 설정하면 됩니다. 조립 기계에서 복사+붙여넣기를 통한 자동 구성 역시 가능합니다.\n\n번역: SimpleKoreanLocale(PolarZero)


[controls]
global-network-hotkey=전역 저장소 GUI 토글

[entity-name]
global-chest=전역 저장소
global-provider-chest=전역 공급 저장소

[entity-description]
global-chest=전역 저장소 네트워크에 연결된 상자. 네트워크 ID를 설정해 동일한 ID 상자와 서로 연결합니다.
global-provider-chest=전역 저장소 네트워크의 내용물을 물류 로봇에 공급하는 수동형 공급 상자입니다. 제공할 아이템 구성을 지정할 수 있습니다.

