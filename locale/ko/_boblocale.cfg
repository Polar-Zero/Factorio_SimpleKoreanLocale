[mod-description]
angelsaddons-newlocales=[!!] Angel의 모드에 대한 2.0버전 대응 번역이 이미 SimpleKoreanLocale 모드에서 제공되고 있습니다! [!!]\n\nAngel's Addons - Locales 모드의 번역은 1.1버전의 Angel 모드를 기반으로 하고 있으며, 해당 모드를 동시에 사용할 경우 예기치 못한 번역 오류가 발생합니다.
boblocale=[!!] Bob의 모드에 대한 2.0버전 대응 번역이 이미 Bob의 모드(내장) 및 SimpleKoreanLocale에서 제공되고 있습니다! [!!]\n\nBob's Locale Translations 모드의 번역은 1.1버전의 Bob 모드를 기반으로 하고 있으며, 해당 모드를 동시에 사용할 경우 예기치 못한 번역 오류가 발생할 가능성이 있습니다.
XMKTP=[!!] XMKTP에서 지원하는 대부분의 모드에 대한 2.0버전 대응 번역이 이미 SimpleKoreanLocale에서 제공되고 있습니다! [!!]\n\nXMKTP 모드의 번역은 1.1버전의 모드들을 기반으로 하고 있으며, 해당 모드를 동시에 사용할 경우 예기치 못한 번역 오류가 발생할 가능성이 있습니다.
5dim_locale=[!!] 5Dim's mod - New Locales에서 지원하는 모드에 대한 번역이 이미 SimpleKoreanLocale에서 제공되고 있습니다! [!!]\n\n5Dim's mod - New Locales 모드의 번역본은 불완전하며, 해당 모드를 동시에 사용할 경우 예기치 못한 번역 오류가 발생합니다.
factorio-admin-command-center-locales=[!!] Factorio Admin Command Center 모드에 대한 번역은 이미 SimpleKoreanLocale에서 제공되고 있습니다! [!!]\n\nFactorio Admin Command Center 모드의 번역본은 검수가 완료되지 않았으며, 해당 모드를 동시에 사용할 경우 예기치 못한 번역 오류가 발생할 가능성이 있습니다.