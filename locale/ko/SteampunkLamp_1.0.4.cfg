SteampunkLamp=이 일반적인 조명과 비슷하지만 더 넓은 범위를 비춰주는 스팀펑크 테마 조명을 게임에 추가합니다.\n또한 8방향으로 움직이는 파괴 애니메이션이 특징이며, 이러한 파괴 애니메이션을 구성하는 방법에 대해 알려주신 Hanodest 님께 특별히 감사드립니다.\n\n번역: SimpleKoreanLocale(PolarZero)


