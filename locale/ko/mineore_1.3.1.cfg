[mod-setting-description]
mineore-default-mode=구성 GUI를 열 때 기본적으로 사용할 배치 모드를 설정합니다.
mineore-max-beacons-per-drill=단일 드릴에 영향을 줄 수 있도록 할 최대 신호기 수입니다. 값이 클수록 신호기 배치가 더 촘촘해집니다.
mineore-preferred-beacons-per-drill=드릴에 선호할 신호기 수입니다. 각 드릴이 이 개수만큼의 신호기 영향을 받게되면 계획기에서 신호기 추가를 중지합니다. 신호기 배치 제한을 사용하지 않으려면 0으로 설정하세요.
mineore-show-gui-always=활성화하면 항상 구성 GUI를 표시합니다. 비활성화하면 가능한 경우 기억된 설정을 사용합니다.