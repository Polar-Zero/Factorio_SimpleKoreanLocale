[mod-name]
mineore=채광 계획기(Miner Planner)

[mod-description]
mineore=운송 벨트, 전봇대, 신호기를 이용해 광맥에 채광 드릴 배치를 자동화할 수 있도록 합니다. 지역을 드래그로 선택한 뒤, 아이콘 기반 GUI를 이용하면 드릴, 벨트, 전신주, 신호기를 포함한, 로봇이 건설할 수 있는 고스트 객체 레이아웃이 배치됩니다. 모든 행성의 모든 드릴 유형을 지원하며, 모든 벨트 티어, 전신주 유형, 자원에 사용할 수 있습니다. 공급 범위에 따른 전신주/변전소 간격 자동화, 적응형 지하 벨트 배치, 품질 지원(우주 시대), 강제 배치 모드, 모든 행성 표면에 맞는 토대 사용 역시 가능합니다.\n\n번역: SimpleKoreanLocale(PolarZero)

[control-description]
mineore-toggle=채광 계획기 선택 도구 토글

[controls]
mineore-toggle=채광 계획기

