[technology-description]
administrative-bureaucracy=관료주의의 첫 번째 공식적 단계. 온실과 초기 목재 생산을 잠금 해제합니다.
administrative-science-research=민원 해결 파이프라인을 재현 가능한 과학 형태로 공식화합니다. 회색 관리 과학 팩 잠금 해제 가능.
after-hours-operations=관리소의 야간 근무를 법적으로 표준화합니다. [item=overtime-exemption] 초과 근무 모듈 모듈을 잠금 해제합니다. 이를 투입하면 주요 사무실 건물을 야간에도 사용할 수 있게 됩니다.
board-meetings=고급 관료주의를 위한 위원회 인프라를 구축하세요. 회의실 사용 가능.
constitutional-law=바이터 민원 처리의 마지막 단계. 생산 과학 단계에서 실업 수당, 사례 관리, 보고서 작성, 최종적 해결 작업이 가능합니다.
corporate-hospitality=커피와 오피스 드라마를 유용한 이야기거리로 바꿔보세요. 커피, 회사 휴게실, 커피 정제, 뒷담화, 오피스 드라마 재활용을 사용할 수 있게 됩니다.
creative-accounting=비자금을 공식 수익으로 재분류하는 작업을 표준화하세요. 세무 감사가 가능해집니다.
discovery-bullshit=찾으셨군요. 이제 논리적으로 다듬기만 하면 됩니다. 모호한 데이터 제련, 기본적인 명분 작성, 첫 번째 안전 면제 및 건설 허가서 작성, 기본적인 경관 문제 해결이 가능합니다.
discovery-redundant-rubble=지역 지질 구조을 건드리자마자, 엄청난 불필요한 요구 사항 더미가 쏟아져 들어옵니다. 임시 허가서, 관리소, 해결 사무소, 초기 경관 신고, 화력 채광 드릴을 사용할 수 있게 됩니다.
eminent-domain-zoning=대규모 확장을 위한 정책 발판을 마련해보세요. 용지, 정책 지침, 비자금 잠금 해제 가능.
environmental-certification=기본적인 탄소 관련 서류를 감사된 형태의 환경 인증서로 업그레이드합니다. 검증된 탄소 배출 인증서를 사용할 수 있게 됩니다.
environmental-compliance=제대로 문서화된 환경영향 평가를 통해 석유화학 공정을 사용할 수 있도록 합니다. 석유화학 운영 허가서 사용 가능.
environmental-reporting=표준적인 요청서를 규정 준수 보고서로 재작성합니다. 환경 영향 보고서 사용 가능.
executive-review=관료적 절차를 서명된 공식 서면 지침으로 격상, 개선해보세요. 서면 허가서, 서면 업무 허가서 사용 가능.
federal-regulation=정책을 법적인 효력을 갖는 연방 법률로 전환하세요. 규정 초안 작성이 가능해집니다.
hazmat-response=위험물과 관련된 민원 접수 절차를 공식화하세요. 위험 물질 신고, 서류 작업 및 최종 해결까지 가능해집니다.
health-and-safety=노조의 영향력을 규제의 장으로 바꿔보세요. OSHA(직업안전보건청) 조사, 정당화, 이야기거리 제작이 가능해집니다.
industrial-printing=화학적인 인프라를 이용해 전기 프린터에 비해 확장된 서류 처리량을 이용하세요. 산업용 프린터와 함께 빈 양식, 빈 허가서, 탄소 배출 인증, 양식 27B-6, 환경 영향 보고서에 대한 대량 복사 제작법을 잠금 해제합니다.
industrial-propaganda=산업적 규모로 허위사실 무기화를 진행합니다. 선전 증류소, 압축된 잔해 생산, 정치적 유체 정제, 허위사실, 정제된 헛소리, 인증서를 잠금 해제합니다.
information-management=뒷담화와 인증서를 실질적인 문서 기록으로 바꿔보세요. 데이터 합성과 그럴듯한 명분을 만들 수 있게 됩니다.
littering-resolution=불법 투기 신고 처리 절차를 공식화하세요. 모호한 데이터, 쓰레기 무단투기 신고 및 해결까지 진행할 수 있게 됩니다.
local-precedents=철도 및 규정 준수 서류의 법적 상용구를 표준화하세요. 쓸모없는 문서와 양식 27B-6의 잠금을 해제합니다.
loitering-ordinances=배회 민원 접수 절차를 공식화하세요. 배회 신고, 서류 작업, 요약 및 최종적인 해결까지 진행할 수 있게 됩니다.
nest-expropriation=서류로 뒷받침되는 무력을 통해 영토를 차지하세요. 바이터 산란장 제거를 위한 퇴거 통지 잠금 해제.
noise-ordinances=소음 민원 체인을 공식화하세요. 소음 신고, 서류 작업, 요약 및 최종적인 해결까지 진행할 수 있게 됩니다.
office-agriculture=사무실 커피 공급을 단순하게 주워 모으는 수준을 넘은 산업화를 진행해보세요. 커피 농장과 목탄을 잠금 해제합니다.
pneumatic-form-transport=공압 파이프를 통해 문서를 전송합니다. 문서 액화기, 문서 고형화기, 공압 문서 파이프의 잠금을 해제합니다. 공압 파이프는 일반 유체 파이프 인프라와 연결되지 않습니다.
printing-technology=자동화된 문서 생산. 공정 검색이 모두 완료되면 기본적인 프린터와 기초적인 약속을 사용할 수 있게 됩니다.
public-finance=재무부와 노동조합을 관료 채제로 끌여들여보세요. 국채, 노동조합 본부, 노동조합 승인 및 정부 보조금을 해금합니다.
radiological-compliance=서류 처리 작업을 원자력 영역으로 확대하세요. 원심분리기 및 우라늄 처리를 위한 방사선 작업 허가서를 사용할 수 있게 됩니다.
rubble-compaction=여분의 잔해를 표준화된 건축 자재로 압축하여 추후 인프라 구축에 사용할 수 있도록 합니다. 압축된 잔해 생산이 가능해집니다.
smog-abatement=스모그 민원 처리 절차를 공식화하세요. 스모그 신고, 서류 작업 및 최종적인 해결까지 진행할 수 있게 됩니다.
streamlined-work-orders=허가서 중간 단계를 생략하고 초안에서 바로 작업 허가서를 인쇄할 수 있게 됩니다. 전기 프린터에서 초안을 작업 허가서로 직접 인쇄할 수 있으며, 제작 과정 당 2개의 작업 허가서를 출력할 수 있습니다.
synthetic-stationery=석유에서 추출한 문구류 생산을 공식화하세요. 플라스틱, 유황, 물로 만든 합성 용지를 잠금 해제하여 많은 양의 서류를 공급할 수 있습니다.
vagrancy-ordinances=최종 스피터 민원 단계. 다용도 과학 단계에서 부랑자 신고, 서류 작업, 개요 및 최종적인 해결까지 가능해집니다.
verbal-approvals=관리자와의 구두 약속을 재사용 가능한 문서로 공식화하세요. 빈 허가서, 허가서 복사 및 관리자 구두 허가서 잠금이 해제됩니다.
work-order-duplication=완성된 작업 허가서의 산업적 복사 절차를 표준화합니다. 이를 통해 산업용 프린터에서 기본 허가서 양식부터 방사선 작업 허가서에 이르기까지 모든 작업 허가서 계열에 대한 대량 복사가 가능해집니다.

