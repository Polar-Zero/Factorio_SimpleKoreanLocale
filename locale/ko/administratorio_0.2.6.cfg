[achievement-description]
behemoth-paperwork=관리소에 베헤모스 바이터를 등록하세요. 그... 엄청나게 많은 서류를 가지고 온 녀석이요.
capsule-promise=약속 캡슐을 사용하세요. 약속은 어리석은 사람에게 위로가 됩니다.
case-closed=첫 민원을 해결하세요. 한 건이 해결되었고, 앞으로 엄청나게 많이 남았습니다.
coffee-break=관리소에 휴게실을 구축하세요. 가장 중요한 건물입니다.
constitutional-scholar=헌법을 연구하세요. 모든 규정을 읽으셨습니다. 겨우.
department-of-everything=10개의 관리소에 동시에 전원을 공급하세요. 확장되는 관료적 요구를 충족하려면 확장이 필요합니다.
discovery-of-bullshit=헛소리 연구를 완료하세요. 이 모든 것이 바로 여러분의 발밑에 있었습니다.
endless-meetings=회의실을 제작하세요. 이제 이메일을 받는 것도 가능합니다.
environmental-compliance-achievement=환경 규제 준수 연구를 완료하세요. 이제 적절한 서류를 갖추면 석유 및 화학적 경제 작업을 진행할 수 있습니다.
eviction-notice-achievement=퇴거 통지 100개를 사용하세요. 개인적인 감정이 아닌 정책일 뿐입니다.
first-complaint=관리소에 첫 번째 바이터를 등록하세요. 그들이 원하는 걸 들어줄 시간입니다.
form-27b-6-achievement=시간당 100개의 양식 27B/6을 제작하세요. 아직도 많은 27B/6가 필요합니다.
full-resolution=8가지 종류의 민원을 해결하세요. 모든 상황에 대한 대처법을 배웠습니다.
ink-stained=인쇄 기술 연구를 완료하세요. 프린터 용지가 걸려버렸으니 다시 해야겠군요.
its-a-copy-of-a-copy=판결 기록 연구를 완료하세요. 간혹 원본보다 사본이 더 효용적인 경우 역시 존재합니다.
know-it-all=모든 기술을 연구하세요. 이제, 축하받을 자격을 갖추었습니다.
mass-transit=기차가 2,000칸 이상 이동하도록 하세요. 환승역을 거칠 때마다 자체적인 허가서가 필요합니다.
paper-pusher=시간당 1,000개의 빈 양식을 제작하세요. 나무가 의미없이 죽지 않았음을 증명했습니다.
permit-denied=10개의 기차 정류장을 건설하세요. 서류 절차 없이는 기차는 움직이지 않습니다.
pneumatic-delivery=공압 문서 운송 연구를 완료하세요. 파이프를 통한 문서 이동이라니! 살아있는 보람이 있군요.
propaganda-machine=선전 증류소를 건설하세요. 제조 동의함, 한번에 배럴 하나씩.
protest-suppressed=시위하는 바이터와의 약속을 진행하여 돌려보세요. 막연한 약속이라도 바이터를 진정시킬 수 있습니다.
safety-first=행정적 관료주의 연구를 완료하세요. OSHA도(미국 노동부 산업안전보건청) 자랑스러워할 것입니다. 존재했다면 말이죠.
union-strong=노동조합 본부를 건설하세요. 노동자들이 조직을 만들었으며, 관리자이 우려하고 있습니다.
welcome-to-the-department=첫 번째 바이터 관리소를 건설하세요. 사무실에 당신이 일할 자리가 기다리고 있습니다.

[administratorio-factoriopedia]
regulated-assembling-note=적절한 작업 허가서를 사용하는 규정된 제작법을 통해 표준적인 조립 기계로 제작하는 것도 가능합니다.

