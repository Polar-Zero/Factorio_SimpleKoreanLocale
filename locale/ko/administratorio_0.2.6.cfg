[tips-and-tricks-item-description]
administratorio-admin-science=[font=default-bold]행정 과학은 관료 확장의 원동력 그 자체입니다.[/font]\n\n행정 연구를 진행하려면 [item=administrative-science-pack] 행정 과학 팩이 (회색) 필요합니다. 이 과학 팩은 대부분의 관료주의 기술에 병목 현상처럼 작동할 것입니다.\n\n[font=default-bold]생산:[/font]\n[entity=office-desk]에서 제작할 수 있습니다. 관리소 작업대 출발지:\n- [item=blank-form] 빈 양식\n- [item=provisional-approval] 임시 승인\n- [item=basic-excuse] 명분\n- [item=research-grant-approval] 연구 허가서\n\n[font=default-bold]사용:[/font]\n이 팩은 기본 게임의 연구에서 군사 과학을 대체하며, 사용자 지정 기술 트리 전체에서 사용됩니다. 서류 작업 공정이 멈추면 연구도 함께 멈출 것입니다.
administratorio-biter-complaints=[font=default-bold]관리소는 모드 전체에서 접수처로 사용됩니다.[/font]\n\n일반적으로 공격하던 적 유닛은 대신 [entity=admin-station]가 있을 경우 대기하도록 경로가 변경됩니다. 등록된 바이터는 중립적으로 전환되며, 관리소의 [font=default-bold]대기 슬롯 6개[/font] 중 하나를 차지하며 관리소 인벤토리에 민원 관련 아이템을 생성합니다.\n\n[font=default-bold]기본 공정:[/font]\n1. [entity=admin-station]를 만들고 민원 아이템을 보관할 공간을 확보하세요.\n2. 바이터와 스피터가 중앙 대기 구역에 들어와 민원을 등록하도록 합니다.\n3. 작업대의 민원 티켓을 꺼내 [entity=resolution-office]해결 사무소를 통해 처리합니다\n4. 최종적으로 해결된 [item=resolved-landscape]건을 해당 시민을 응대하는 관리소에 다시 투입하세요\n5. 시민이 자리를 떠나며 [item=taxpayer-money]세금을 지불합니다.\n\n[font=default-bold]민원 계열:[/font]\n- 물기: 경관 → 스모그 → 소음 → 실업\n- 뱉기: 쓰레기 → 유해 물질 → 배회 → 방랑\n더 큰 적일수록 더 높은 단계를 굴릴 수 있으며 진화하기 전에 게임에서 새로운 단계가 중요해지기 시작하면 경고가 표시됩니다.\n\n[font=default-bold]확대:[/font]\n각 관리소는 접수된 민원 건수, 남은 대기 슬롯, 총 대기 중인 바이터에 대한 회로 신호 역시 출력하므로 시위가 시작되기 전에 기록을 모니터링하고 수용 인원을 추가할 수 있습니다.
administratorio-bullshit-economy=[font=default-bold]헛소리 광석은 인증서 및 명분 공급 공정에 사용됩니다.[/font]\n\n광산에서 채광한 [item=bullshit-ore] 헛소리 광석:\n- [item=dubious-data] 모호한 데이터(광석에서 정제)\n- [item=basic-excuse] 명분 → [item=good-excuse] 그럴듯한 명분\n- [item=crappy-report] 엉터리 보고서 → [item=justification] 정당화 → [item=narrative] 이야기거리\n- [item=white-paper] 용지 → [item=policy] 정책 → [item=regulation] 규정\n\n[font=default-bold]잔해 더미 파생 아이템:[/font]\n[item=redundant-rubble] 잔해 더미은 세 가지 파생 아이템으로 처리됩니다:\n- [item=useless-documentation] [font=default-bold]쓸모없는 문서[/font] - 잔해 + 종이, 양식 27B-6, 국채에 사용됨\n- [item=compacted-rubble] [font=default-bold]압축된 잔해[/font] - 잔해 + 탄소 인증, 건물, 고티어 제작에 사용\n- [item=refined-nonsense] [font=default-bold]교양 있는 헛소리[/font] - 압축된 잔해 + 유체 허위사실, 인증, 이야기거리 및 상위 티어 제작에 사용\n\n[font=default-bold]공자금 공정:[/font]\n[item=taxpayer-money] 세금(민원 해결로 획득) → [item=treasury-bond] 국채 → [fluid=slush-fund] 비자금 → [item=taxpayer-money] 더 많은 세금\n\n세금은 병목 현상을 일으킬 수 있는 요소 중 하나입니다. 게임 후반에 [entity=meeting-room]에서 [font=default-bold]세무 감사[/font]를 진행할 수도 있습니다. 회의실에서 비자금, 기초 채권 서류, 데이터를 추가 자금으로 전환해보세요.\n\n[font=default-bold]다중 생산 공정:[/font]\n- [entity=office-desk] 사무실 작업대: 양식, 과학 팩, 데이터, 채권\n- [entity=corporate-breakroom] 휴게실: 커피, 뒷담화, 그럴듯한 명분, 구두 결재 초안\n- [entity=union-headquarters] 노동조합 본부: 노조 승인, 정부 보조금, 이야기거리, 검증된 인증, OSHA 위반 처리\n- [entity=meeting-room] 회의실: 서면 승인, 용지, 정책, 연방 규정, 세무 감사\n- [entity=propaganda-distillery] 선전 증류소: 거짓말, 유체 허위사실, 인증, 비자금, 교양있는 헛소리
administratorio-complaint-chain=[font=default-bold]민원은 진화 요인에 따라 점진적으로 다양하게 발생합니다.[/font]\n\n모든 민원 처리는 [entity=resolution-office]에서 진행합니다. 초기 단계는 짧은 공정만으로 처리할 수 있지만, 이후 단계는 서류 작업 및 판결문 검토 등이 필요하게 됩니다.\n\n[font=default-bold]인적 민원:[/font]\n[item=ticket-landscape] 민원 → [item=filing-l] 접수 → 해결\n[item=ticket-smog] 민원 → [item=filing-s] 접수 → [item=case-s] 검증 → 해결\n[item=ticket-noise] 민원 → [item=filing-n] 접수 → [item=case-n] 검증 → [item=brief-n] 판결문 해석 → 해결\n[item=ticket-unemployment] 민원 → [item=filing-u] 파일링 → [item=case-u] 검증 → [item=brief-u] 례 해석 → 해결\n\n[font=default-bold]스파이터 민원:[/font]\n[item=ticket-littering] 민원 → [item=filing-lt] 접수 → 해결\n[item=ticket-hazmat] 티켓 → [item=filing-h] 접수 → [item=case-h] 검증 → 해결\n[item=ticket-loitering] 민원 → [item=filing-lo] 제출 → [item=case-lo] 검증 → [item=brief-lo] 례 해석 → 해결\n[item=ticket-vagrancy] 민원 → [item=filing-v] 접수 → [item=case-v] 검증 → [item=brief-v] 판결문 해석 → 해결\n\n[font=default-bold]게임 후반:[/font]\n인적 민원은 [technology=noise-ordinances] 및 [technology=constitutional-law]를 거쳐 완료할 수 있습니다. 스피터의 민원은 [technology=loitering-ordinances]과 [technology=vagrancy-ordinances]을 거쳐 완료할 수 있습니다. 공정이 완료되면 최종 해결된 아이템을 스피터를 담당하는 관리소에 돌려보내세요.

