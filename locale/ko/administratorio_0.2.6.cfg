[entity-description]
admin-station=5x5 바이터 인터페이스. 민원 티켓과 해결 관련 아이템을 저장합니다. 도착한 바이터는 이곳에서 민원을 접수한 뒤 해결될 때까지 기다립니다. 제작 기능 없음 - 보관소로만 작동합니다.
bullshit-ore=자연적으로 발생하는 풍부한 헛소리들. 관료적 처리에 사용할 광물 원석을 얻기 위해 채광할 수 있습니다.
corporate-breakroom=커피와 모호한 데이터를 이용하여 뒷담화를 생성합니다. 이는 관공서 의사 결정에 필수적입니다. [item=overtime-exemption]을 장착하지 않았다면 야간에 문을 닫습니다.
corporate-breakroom-no-working-hours=커피와 모호한 데이터를 이용하여 뒷담화를 생성합니다. 이는 관공서 의사 결정에 필수적입니다.
form-liquifier=1x1 유체화 시설. 인접한 벨트/상자의 서류 작업 아이템을 공압 파이프 운송을 위한 유체로 변환합니다. (20kW 사용)
form-solidifier=1x1 고체화 시설. 들어온 공압 유체를 다시 일반적 형태의 서류 작업 아이템으로 변환하여 인접한 벨트/상자에 출력합니다. (20kW 사용)
mechanical-printer=투박하지만 잘 작동하는 크랭크식 수동 프린터. (0.5배속) 신뢰할 수 있는 게임 초반 주력 아이템입니다.
meeting-room=매우 느린 속도로 (0.5배속) 서면 결재, 정책 업무, 세무 감사 초안을 작성합니다. 7x7 공간이 필요하며, [item=overtime-exemption]을 장착하지 않았다면 야간에 문을 닫습니다.
meeting-room-no-working-hours=고통스러울 정도로 느린 속도로 (0.25배속) 서면 결재, 정책 업무, 세무 감사 초안을 작성합니다. 7x7 공간이 필요합니다.
office-desk=서류 정리, 소모품 및 기본 관리 업무를 위한 통합 작업실. [item=overtime-exemption]을 장착하지 않았다면 야간에 문을 닫습니다.
office-desk-no-working-hours=서류 정리, 소모품 및 기본 관리 업무를 위한 통합 작업실입니다.
overtime-exemption=하나의 관리 건물이 합법적으로 야간 근무를 진행할 수 있도록 인증합니다. 모듈 하나로 야간에 건물 한 채 전부에 적용되므로, 더 있더라도 그저 장식일 뿐입니다.
pneumatic-pipe=유체 형태의 서류를 운반하기 위한 서류색 밀폐형 파이프. 일반 유체 파이프와 연결할 수 없습니다.
pneumatic-pipe-to-ground=지하 연결용 공압 파이프. 일반 유체 파이프와 연결할 수 없습니다.
politician-fluid=정치적 본질을 지닌 가압된 지하 균열. 시추기로 추출하여 정치적 유체를 퍼올리세요.
printer-t1=느리지만 안정적인 전기 프린터. 잉크 카트리지로 문서를 출력합니다. (50kW 사용)
printer-t2=복사 모드가 있는 산업용 고속 프린터. 인쇄된 문서를 1:6 비율로 복제할 수 있습니다. (200kW 사용)
propaganda-distillery=3x3 행정 유체 정제소. 정치적 유체를 거짓말로 정제하거나, 유체 허위사실을 합성하여 명분과 비자금으로 만들어냅니다. 유체 입력부 2개, 유체 출력부 1개 지원.
redundant-rubble=종이가 매장된 지질학적 장소. 채굴하여 공문서 제본에 필요한 잔해를 확보하세요.
resolution-office=3x3 제작 기계. 유체 입력 포트 2개를 가졌으며, 모든 민원 관련 제작법을 처리합니다.
union-headquarters=운영 허가를 유지하기 위해 직원들과 협상하세요. 커피, 종이, 데이터, 세금이 필요합니다. 야간에는 [item=overtime-exemption]이 장착되어 있지 않으면 문을 닫습니다.
union-headquarters-no-working-hours=운영 허가를 유지하기 위해 직원들과 협상하세요. 커피, 종이, 데이터, 세금이 필요합니다.
admi-greenhouse=물에서 천천히 나무를 키우거나 희귀한 커피 원두를 재배합니다. 화력 구동.
admi-locomotive=환승 허가 상자가 각 기차 정류장에 자동으로 배치됩니다. [item=transit-authorization]이 도착한 기차마다 하나씩 필요합니다. 정류장의 기차 한도는 상자에 있는 양식의 수와 동일합니다.

