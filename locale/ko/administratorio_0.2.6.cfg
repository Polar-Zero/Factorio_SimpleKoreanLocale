evolution-complaint-overdue=규정 미준수 사항 확인됨: 적 진화가 __1__%에 도달했습니다. __3__에 대한 신고 자격이 __2__%로 발효되었지만 아직 불완전한 항목 __4__개가 존재합니다. 즉각적인 행정적 개선이 필요합니다.
