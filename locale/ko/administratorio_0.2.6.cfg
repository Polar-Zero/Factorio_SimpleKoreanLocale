administratorio-frustration=[font=default-bold]대기 중인 바이터는 타이머가 설정되어 있습니다.[/font]\n\n등록된 각 바이터는 대기 중이거나 작업대으로 걸어가는 동안 자신의 좌절감을 추적합니다. 바이터에게 마우스를 가져가면 현재 기분과 해결되지 않은 민원을 확인할 수 있습니다.\n\n[font=default-bold]좌절감 단계 :[/font]\n- [color=green]0-25%[/color] - 평온\n- [color=yellow]25-50%[/color] - 짜증\n- [color=yellow]50-75%[/color] - 분노\n- [color=red]75-100%[/color] - 격분\nA [color=red]100%[/color] 좌절감이 있으면 바이터는 대기열에서 나가 시위하기 시작합니다. 작업대 정원을 찾지 못한 바이터는 대기열 대신 즉시 시위할 수도 있습니다.\n\n[font=default-bold]중요:[/font]\n민원 단계는 좌절이 아닌 적 유형과 기술 진척도에 따라 결정됩니다[color=red]이 아닌[/color]. 좌절감은 건물 무력화에 얼마나 근접했는지에 따라 결정됩니다.\n\n[font=default-bold]앞서는 방법:[/font]\n작업대이 [entity=admin-station]개 더 많으면 대기열 오버플로를 줄일 수 있습니다. 추가 [entity=resolution-office] 해결 사무소 및 서류 처리량으로 해결 시간이 단축됩니다. 72}로 확장하는 경우 퇴거 통지서로 확장할 경우, 퇴거 대상자는 이미 반쯤 좌절한 상태에서 도착한다는 점을 기억하세요.
administratorio-nest-expropriation=[font=default-bold]퇴거 통지는 확장 도구입니다.[/font]\n\n조사 [technology=nest-expropriation] 산란장 수용을 통한 제작 [item=eviction-notice] 퇴거 통지서. 적 영토에 던지면 충격 영역에서 가장 가까운 적 산란장 또는 생성기를 파괴합니다.\n\n[font=default-bold]캐치:[/font]\n약 [font=default-bold]25 타일[/font] 안에 있는 근처의 적 유닛은 죽지 않습니다. 그들은 [color=red]당신의 민원 시스템으로 [/color]이동하고 [font=default-bold]50%의 좌절감을 받습니다[/font]. 작업대 여유 공간이 없는 경우, 쫓겨난 바이터들은 거의 즉시 시위할 수 있습니다.\n\n토지가 필요할 때 퇴거를 사용하되, 관리 부하가 급증하는 것처럼 취급하세요. 작업대, 해결 사무소, 서류 작업 파이프라인이 쫓겨난 대기열을 흡수할 수 있을 때만 영역을 비우세요.
administratorio-operating-paperwork=[font=default-bold]모든 기계가 조립업체 서류로 가동되는 것은 아닙니다.[/font]\n\n[font=default-bold]첫 날부터:[/font]\n- [item=carbon-offset-certificate-basic] 탄소 배출 인증서 - 용광로 및 제련\n\n[font=default-bold]나중 전문 문서:[/font]\n- [item=petrochemical-operating-permit] 석유화학 운영 허가 - 정유소 및 석유 가공 제작법\n- [item=chemical-handling-work-order] 화학물질 취급 작업 명령서 - 화학 공장 및 화학 제작법\n- [item=radiological-work-order] 방사선 작업 명령서 - 원심분리기 및 원심분리 제작법\n\n이러한 전문 양식은 [item=safety-waiver]과 같은 하위 계층 승인을 기반으로 작성됩니다. 안전 면제, [item=construction-permit] 건설 허가 및 이후 관리자 허가과 같은 하위 단계 승인을 기반으로 합니다. 민원은 여전히 해결 체인 안에 남아 있습니다. 이러한 양식은 간접적으로 관료주의에 자금을 지원하고 잠금을 해제하지만 다음과 같은 운영 양식에 의해 소비되지는 않습니다.
administratorio-paperwork=[font=default-bold]종이는 모든 관료주의의 기초입니다.[/font]\n\n[item=paper] 종이는 나무에서 시작하고 [item=ink] 잉크는 석탄에서 정제됩니다. 82}를 연구한 후에는 [item=plastic-bar] 플라스틱, [item=sulfur] 유황, 물로 종이를 직접 합성하여 훨씬 더 빨리, 그러나 더 비싸게 공급할 수도 있습니다.\n\n[font=default-bold]프린터:[/font]\n- [entity=mechanical-printer] [font=default-bold]기계식 프린터[/font] - 첫 번째 인쇄 양식을 위해 충돌 현장에 있는 프린터로 시작\n- [entity=printer-t1] [font=default-bold]프린터 T1[/font] - 일상적인 양식 생산을 위한 전기 인쇄\n- [entity=printer-t2] [font=default-bold]프린터 T2[/font] - 더 빠른 인쇄와 [technology=industrial-printing]\n\n[font=default-bold]로 잠금 해제된 대량 복사 제작법 주요 양식:[/font]\n- [item=blank-form] 빈 양식 - 대부분의 행정 서류 작업을 위한 기본\n- [item=blank-approval] 공란 승인 - 면제, 허가 및 환승 양식용 템플릿\n- [item=form-27b-6] 양식 27B-6 - 철도 및 규정 준수 서류 작업을 위한 표준화된 요청 양식\n- [item=carbon-offset-certificate-basic] 탄소 배출 인증서 - 일괄 제련에 필요한 서류
administratorio-pneumatic-transport=[font=default-bold]밀폐된 마닐라 파이프를 통해 서류 작업을 이동합니다.[/font]\n\n공압 시스템이 종이 양식을 파이프 기반 운송을 위한 유체로 변환합니다.\n\n[font=default-bold]건물:[/font]\n- [entity=form-liquifier] [font=default-bold]폼 액화기[/font] - 1개 폼을 10개의 유체 단위로 변환\n- [entity=form-solidifier] [font=default-bold]폼 고형화기[/font] - 10개의 유체 단위를 다시 1개의 형태로 변환\n- [entity=pneumatic-pipe] [font=default-bold]공압 파이프[/font] - 마닐라색, 공압 건물에만 연결\n- [entity=pneumatic-pipe-to-ground] [font=default-bold]공압 지하 파이프[/font] - 10 타일 범위\n\n[font=default-bold]작동 방식:[/font]\n액화기와 고형화기에는 숨겨진 투입기가 있어 인접한 벨트나 상자에서 자동으로 집어 올려 놓을 수 있습니다. 옆에 벨트나 상자를 놓기만 하면 됩니다.\n\n공압 파이프는 별도의 연결 카테고리를 사용하므로 일반 수액 파이프에 [color=red][/color] 연결할 수 없습니다. 각 폼 유형에는 고유한 유체가 있으므로 별도의 파이프 네트워크를 통해 여러 폼 유형을 실행할 수 있습니다.\n\n[font=default-bold]인쇄 기술[/font] 및 [font=default-bold]물류 과학[/font] 연구 후 [font=default-bold]공압 폼 운송[/font]으로 잠금 해제됩니다.
administratorio-propaganda-distillery=[font=default-bold]선전 증류소는 모든 행정 유체를 처리합니다.[/font]\n\n[font=default-bold]산업 선전[/font]으로 잠금 해제하면 이 건물은 관료 유체의 화학 처리를 대신합니다.\n\n[font=default-bold]주요 제조법:[/font]\n- [fluid=politician-fluid] 정치가 유체 → [fluid=lie] 유체 거짓말\n- [fluid=lie] 거짓말 + [item=dubious-data] 모호한 데이터 → [fluid=misinformation] 유체 허위사실\n- [fluid=lie] 거짓말 + [item=dubious-data] 모호한 데이터 + [item=refined-nonsense] 정제된 헛소리 → [item=credentials] 인증서\n- [item=compacted-rubble] 압축된 잔해 + [fluid=misinformation] 유체 허위사실 → [item=refined-nonsense] 정제된 헛소리\n- [item=treasury-bond] 국채 + 거짓말 → [fluid=slush-fund] 비자금\n\n화학 공장과 정유소는 [color=red]이 아닌 [/color]로 처리합니다. 모든 거짓말, 유체 허위사실, 비자금 처리는 선전 증류소를 거칩니다.
administratorio-protest-resolution=[font=default-bold]시위는 단순한 경고가 아니라 실시간 중단입니다.[/font]\n\n좌절감이 최고조에 달하면, 공격자는 도달 가능한 플레이어 건물을 선택해 그곳으로 이동한 후 [color=red]비활성화합니다[/color]. 시위가 활성화되면 경고, 지도 태그, 사이렌이 울립니다. 시간 초과 면제는 시위로 인한 건물 폐쇄로부터 [color=red]보호하지 않습니다[/color].\n\n[font=default-bold]시위 도구:[/font]\n[item=promise] [font=default-bold]관료적 약속[/font]은 게임 초반부터 던질 수 있는 캡슐입니다. 건물이 아닌 [font=default-bold]시위하는 바이터[/font]에게 던집니다.\n- 작업대 슬롯이 비어 있으면 바이터는 즉시 가장 가까운 대기열로 경로를 변경합니다\n- 슬롯이 없으면 바이터는 60초 동안 [font=default-bold]진정[/font]이 된 후 그래도 슬롯이 열리지 않으면 시위를 재개합니다\n- 약속은 민원을 지우거나 일부 민원 진행을 초기화하지 않습니다\n\n[font=default-bold]영구 수정:[/font]\n약속은 시간을 벌게 해줍니다. 민원을 완료하고 최종 해결된 아이템을 데스크에 반환하는 것이 실제로 시민이 시스템에서 삭제되는 것입니다.
administratorio-regulation=[font=default-bold]조립 기계 제작 및 건설 제작법는 형태 계층 시스템으로 묶여 있습니다.[/font]\n\n[font=default-bold]계층 시스템:[/font]\n- [color=green]T0[/color] [item=work-order] 작업 허가서 - 조립 기계 전용 기본 유틸리티 아이템\n- [color=green]T1[/color] [item=safety-waiver] 안전 면제 / [item=safety-work-order] 안전 작업서 - 투입기, 레이더, 벽, 폴, 보일러 및 AM1\n- [color=yellow]T2[/color] [item=construction-permit] 건축 작업 허가서 / pumps,  [item=construction-work-order] 건축 작업 허가서 - 용광로, 광산 드릴, , and demolition jobs, AM2 및 중공업 건물 제작법\n- [color=yellow]T3[/color] [item=management-approval-verbal] 관리자 허가(구두) / [item=management-verbal-work-order] 구두 관리 작업 지시 - 철도, 로보포트, 태양광, 축전지personal roboports, robot logistics, \n- [color=red]T4[/color] [item=management-approval-written] 관리자 허가(서면) / [item=management-written-work-order] 서면 관리 작업 허가서 - AM3, 신호기, 로켓 격납고 및 기타 메가 프로젝트nuclear support hardware, \n- [item=research-grant-approval] 연구비 승인 - 모든 과학 팩\n\n[font=default-bold]중요:[/font]\n[item=work-order] 작업 허가서와 그 계층화된 변형은 조립 기계 제작법에서만 사용됩니다. 용광로, 정제소, 화학, 원심분리는 별도의 운영 서류를 사용합니다.\n\n[font=default-bold]수제작:[/font]\n처음부터 사용 가능하거나 빨간색 과학 단계 기술로 잠금 해제된 제작법만 수제작로 제작할 수 있습니다. 이후 규제되는 제작법는 플레이어 제작에서 숨겨지며 반드시 자동화해야 합니다.
administratorio-transit-authorization=[font=default-bold]열차 정류장에는 통합 서류 상자가 있습니다.[/font]\n\n매 [entity=train-stop]마다 열차 정류장에는 이제 [item=transit-authorization] 환승 허가(양식 12-T) 양식이 있어야 계속 운영할 수 있습니다.\n\n[font=default-bold]작동 방식:[/font]\n1. 각 열차 정류장에는 [entity=transit-permit-chest] 통합 환승 허가서 상자가 있습니다.\n2. 해당 상자에 [item=transit-authorization] 환승 허가서을 해당 상자에 넣습니다.\n3. 열차가 역에 [/font] 도착하여 대기를 시작할 때 한 장이 [font=default-bold] 소모됩니다.\n4. 역에 양식이 부족하면 열차 제한을 0으로 설정하여 자동으로 닫힙니다.\n\n[font=default-bold]설정:[/font]\n- [font=default-bold]철도[/font] 기술을 연구하여 양식 제작법을 잠금 해제합니다.\n- [entity=office-desk] 관리 사무 데스크에서 제작합니다.\n- 바쁜 허브가 정체되지 않도록 벨트, 투입기 또는 물류가 역에 비축되어 있습니다.\n\n이 시스템은 철도 물류가 전투가 아닌 또 다른 서류 작업 문제가 됩니다.
administratorio-welcome=[font=default-bold]행정관에 오신 것을 환영합니다![/font]\n\n팩토리오의 군사 분쟁을 관료주의 행정으로 대체하는 [font=default-bold]총체적 전환 모드[/font]입니다. 바이터는 더 이상 성벽을 공격하지 않습니다. 그들은 가로채서 등록한 후 [entity=admin-station]의 [item=ticket-landscape] 민원으로 전환됩니다. 바이터 관리 데스크에 접수됩니다.\n\n[font=default-bold]바닐라와의 주요 차이점:[/font]\n- [color=red]군대가 없습니다[/color] - 총, 포탑, 군사 과학이 제거됩니다\n- [color=green]기계, 제련, 유체 등 모든 [/color]이 서류 작업으로 문을 닫습니다, 그리고 연구는 모두 양식을 소비합니다[/color]시민이 급습을 대체합니다[/color] - 이빨은 전투 목표가 아니라 대기 중인 민원이 됩니다[/color]- [color=green]투척물은 행정입니다[/color] - [item=promise] 약속은 시위대를 진정시키고 [item=eviction-notice] 퇴거 통지는 더 많은 서류 작업을 만들면서 산란장을 정리합니다[color=green]근무 시간이 중요합니다[/color] - 초과 근무를 합법화하지 않으면 일부 건물은 밤에 문을 닫습니다\n\n귀하의 목표입니다\n: 인간 민원 트리를 밀어내기[technology=constitutional-law]- [technology=constitutional-law] 헌법과 침 뱉기 나무를 통해 [technology=vagrancy-ordinances] 방랑자 조례, 밀린 업무가 반란을 일으키지 않을 정도로 사무실의 기능을 유지하면서.
administratorio-working-hours=[font=default-bold]일부 행정 건물은 이제 근무 시간을 준수합니다.[/font]\n\n[entity=office-desk] 사무실 작업대, [entity=corporate-breakroom] 회사 휴게실, [entity=union-headquarters] 노조 본부, [entity=meeting-room] 회의실은 [item=overtime-exemption] 초과 근무 면제가 설치되어 있지 않는 한 야간에 문을 닫습니다.\야간 근무의 작동 방식: [/font]\n- 모듈 잠금을 해제하려면 [technology=after-hours-operations]를 조사합니다\n- 건물의 모듈 인벤토리에 [font=default-bold]개[/font] 복사본을 설치하고 여분은 아무것도 하지 않습니다\n- 주간 처리량은 의도적으로 높으므로 조기 자동화는 24시간 내내 흐르지 않고 근무 시간에 급증하도록 되어 있습니다\n- 시위가 있으면 초과 근무 허가가 있어도 이 건물들을 [color=red] 여전히[/color] 비활성화할 수 있습니다\n\n[font=default-bold]선택 사항입니다:[/font]\n정비공이 완전히 마음에 들지 않으면 모드를 로드하기 전에 시작 설정에서 근무 시간을 비활성화하세요. 이 설정으로 팁, 모듈, 연구 및 런타임 종료가 모두 사라집니다.
