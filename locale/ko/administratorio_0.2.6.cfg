[fluid-description]
lie=유체 형태로 증류된 거짓말. 유체 허위사실, 그럴듯한 명분, 용지 등을 포함하는 비자금의 핵심 요소입니다.
liquid-coffee=유체 형태로 증류된 커피. 관료주의의 보편적인 윤활유. 허가서, 뒷담화, 해결책 제작에 필요합니다.
misinformation=유체 형태로 증류 및 무기화된 허위사실. 거짓말과 모호한 데이터로 합성되었으며. 정당화 및 정책 제작에 필요합니다.
politician-fluid=자연적인 균열에서 추출한 점성이 있고 악취가 나는 액체입니다. 선전 증류소에서 정제하여 액화된 거짓말을 얻어보하세요.
slush-fund=유체 형태로 세탁된 공적 자금. 국채를 이용하거나 거짓말을 이용한 선전 가공을 통해 얻을 수 있습니다.
union-approval=유체 형태로 세탁된 인적 동의. 커피, 종이, 데이터, 세금으로 노동조합 본부에서 협상을 진행하세요.

