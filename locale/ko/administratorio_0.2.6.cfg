[item-description]
admin-station=바이터 접수처 인터페이스. 대기 구역이 내장되어 있어 바이터들이 대기하는 위치를 정확히 알 수 있으며, 해결된 사건 아이템을 이곳에 놓으면 바이터들이 만족하며 돌아가도록 할 수 있습니다. 보관만 가능 - 제작 불가.
administrative-science-pack=회색 과학 팩. 행정 연구에 활력을 불어넣습니다. 관리소 작업대에서 제작 가능.
basic-excuse=모호한 데이터를 이용한 간단한 정당화. 경관 해결이나 일반적인 관료적 공정에 사용됩니다.
blank-approval=잉크를 이용한 공식적인 결재가 필요한 경우 사용되는, 사전 인쇄된 허가서 템플릿. 안전 면제, 건설 허가. 운송 승인에 필요합니다.
blank-directive=3중 잉크가 적용되어 보안성이 향상된 제안서 템플릿입니다. 관리자 수준의 승인에 필요합니다.
blank-form=목적을 기다리는 빈 행정 양식. 관료주의의 도화지. 거의 모든 서류 작업 방식에 사용됩니다.
brief-lo=배회 민원을 논증하는 대법원 판결문. 최종 문서 단계입니다, 검증된 판결문, 용지, 연방 법률이 필요합니다.
brief-n=소음 민원을 논증하는 대법원 판결문. 최종 문서 단계입니다, 검증된 판결문, 용지, 정책 지침이 필요합니다.
brief-u=실업 민원을 논증하는 대법원 판결문. 최종 문서 단계입니다. 검증된 판결문, 연방 법률, 국채가 필요합니다.
brief-v=부랑자 민원을 논증하는 대법원 판결문. 최종 문서 단계입니다. 검증된 판결문, 정책, 국채, 정의된 헛소리가 필요합니다.
bullshit-ore=자연적으로 발생하지만, 순수하고 정제되지 않은 헛소리 퇴적물. 관료제 경제의 핵심 토대입니다. 채굴, 정제, 무기화 공정을 거칠 수 있습니다.
carbon-offset-certificate-basic=제한적인 산업적 제련을 위한 기본적인 인증서. 대부분의 용광로 제작에 필요합니다.
carbon-offset-certificate-verified=공식 인증을 받은 업그레이드된 인증서. 강철 용광로 건설 및 고급 제련에 필요합니다.
case-h=위험 물질 위반에 대한 검증된 판결 사례. 제기된 민원, 서류 증거, 압축된 잔해가 필요합니다.
case-lo=배회 위반에 대한 검증된 판결 사례. 제기된 민원, 데이터, 인증, 정제된 헛소리가 필요합니다.
case-n=소음 위반에 대한 검증된 판결 사례. 제기된 민원, 검증된 데이터, 환경 인증이 필요합니다.
case-s=스모그 위반에 대한 검증된 판결 사례. 제기된 민원, 서류 증거, 불필요 잔해가 필요합니다.
case-u=실업에 대한 검증된 판결 사례. 제기된 민원, 실증적 사실, 정부 보조금이 필요합니다.
case-v=방랑자에 대한 검증된 판결 사례. 제기된 민원, 데이터, 정책 지침이 필요합니다.
chemical-handling-work-order=화학 공장을 위한 전문 운영 작업 허가서입니다. 석유화학 허가서, 하급 허가서, 건설 관련 서류가 필요합니다. 화학 제작법에 필요.
coffee-bean=희귀하고 귀한 아이템. 퇴비를 샅샅이 뒤져 발견할 수 있으며, 모든 관료적 일처리의 생명과도 같습니다.
compacted-rubble=산업적으로 압축된 관료적 폐기물, 사용 인증을 받았습니다. 탄소 배출 인증을 갖춘 규제된 제련을 통해 처리된 잔해 형태로 제작할 수 있습니다.
construction-permit=표준적인 건축 허가. 대부분의 기계 제작이나, 높은 단계의 허가서에 필수적으로 필요합니다.
construction-permit-draft=서류 검증 및 잉크 날인을 기다리는 미확정 건축 허가서.
construction-work-order=제작 규제 준수가 확인되었음을 증명하는 통합 조립 기계 허가서입니다. 조립 기계 제작에만 사용되며. 제작 시 소비됩니다.
corporate-breakroom=커피가 소문 제조기에 연료를 공급하는 소셜 허브. 뒷담화, 그럴듯한 명분, 구두 관리 초안 제작에 사용됩니다. [item=overtime-exemption]을 장착하지 않았다면 야간에 문을 닫습니다.
crappy-report=정확성이 모호한 급하게 작성된 보고서. 모든 상위 티어 문서의 기본 요소입니다.
credentials=거짓말 유체, 모호한 데이터, 정제되지 않은 헛소리로 만들어진 공식적인 인증서. 출처가 모호한 권위 증명서입니다.
data=엉터리 보고서와 인증서를 이용해 합성된 정보. 실제로도 사용 가능하며, 관리소에서 보기 드문 형식입니다.
dubious-data=엉터리 광석에서 정제된 정보. 신뢰할 수 없지만 기술적인 정보에 해당합니다. 명분 경제의 중추.
environmental-impact-report=환경 피해에 대한 포괄적인 (심하게 검열된) 평가. 석유화학 및 방사능 관련 서류에 사용됩니다.
eviction-notice=바이터 산란장을 파괴하는, 사용 가능한 캡슐입니다. 매우 주의해서 사용하세요.
filing-h=정식 접수된 위험 물질 민원. 유해 물질 노출에 대한 스피터의 민원 기록이 담겼습니다.
filing-l=정식 접수된 경관 민원. 지역 경관에 대한 시민의 민원을 해결하기 위한 첫 번째 단계입니다.
filing-lo=정식 접수된 배회 민원. 제한 구역 위반에 대한 스피터의 이의가 공식 문서화된 형태입니다.
filing-lt=정식 접수된 쓰레기 투기 민원. 사방에 방치된 산성 웅덩이에 대한 스피터의 이의가 공식 문서화된 형태입니다.
filing-n=정식 접수된 소음 민원. 인프라에서 발생하는 소음에 대한 시민들의 민원 기록이 담겼습니다.
filing-s=정식 접수된 스모그 민원. 산업적 오염에 대한 시민들의 이의가 공식 문서화된 형태입니다.
filing-u=정식 접수된 실업 민원. 경제 정책 실패를 주장하고 있는, 가장 심각한 시민 민원 유형입니다.
filing-v=정식 접수된 부랑자 민원. 가장 심각한 스피터 민원 제기로, 노숙자 및 부랑자에 대한 내용이 포함됩니다.
form-27b-6=악명 높은 표준 요청 양식. 운송 서류 작업, 규정 준수 보고, 상위 티어 관료적 문서 제작에 사용됩니다.
form-liquifier=서류 아이템을 공압 운송을 위한 유체 형태로 변환합니다. 아이템을 인접하게 배치하면 숨겨진 투입기를 통해 자동으로 공급됩니다.
form-solidifier=유체 형태의 서류 작업을 다시 고체 형태의 아이템으로 변환합니다. 출력된 아이템은 숨겨진 투입기를 통해 인접한 인벤토리로 투입됩니다.
good-excuse=실제 데이터와 유동적인 거짓말을 혼합한, 잘 짜여진 명분. 고급 허가서 및 이야기거리 구성에 사용됩니다.
government-grant=상당한 규모의 공자금이 할당된 형태. 주요 인프라 구축, 회의, 정책 개발에 필요합니다.
ink=석탄에서 추출할 수 있는 필기액. 서류 문서에 사용하거나 잉크 카트리지 형태로 정제할 수 있습니다.
justification=허위 사실, 자격 증명, 정치적 유체를 이용하면 공식적으로 법적 정당성을 주장할 수 있습니다. OSHA 정당화에 필요합니다.
management-approval-verbal=관리자의 구두 동의는 기술적인 구속력이 있으나, 쉽게 거부할 수 있습니다. 약간의 커피가 필요하다는 점을 참고하세요.
management-approval-written=서명, 공증된 관리자의 서약서. 구하기 훨씬 어렵지만 거부하는 것이 불가능합니다.
management-verbal-draft=휴게실 대화에서 가져온 구두 허가서 초안. 프린터로 마무리 작업을 진행할 수 있습니다.
management-verbal-work-order=관리자의 구두 약속으로 보증되는 통합된 조립 기계 권한입니다. 조립 기계에만 사용되며, 사용 시 소모됩니다.
management-written-proposal=끝없는 회의 결과 도출된 관리 제안서. 두 차례의 프린터 마무리 작업이 필요합니다.
management-written-review=한 번 출력된 뒤 검토된 관리 제안서입니다. 한 차례의 프린터 마무리를 통해 작성을 완료하세요.
management-written-work-order=서명된 관리 지침에 의해 보증되는 통합된 조립 기계 권한입니다. 조립 기계에만 사용되며, 사용 시 소모됩니다.
mechanical-printer=수동 크랭크 구동식 프린터. 전자 인쇄가 가능할 때까지 주력으로 사용됩니다.
meeting-room=서면 관리 제안, 정책 업무, 후기 감사에 사용할 수 있는 7x7 회의 시설입니다. [item=overtime-exemption]을 장착하지 않았다면 야간에 문을 닫습니다.
narrative=정당화, 그럴듯한 명분, 정제되었지만 말도 안 되는 이야기거리로 짜여진 공식적인 이야기거리. 관리 작업과 관련된 대중의 인식을 통제합니다.
office-desk=양식, 과학 팩, 자금 지원서 작성, 일반 행정 업무를 위한 다용도 워크스테이션입니다. [item=overtime-exemption]을 장착하지 않았다면 야간에 사용할 수 없습니다.
office-desk-no-working-hours=양식, 과학 팩, 자금 지원서 작성, 일반 행정 업무를 위한 다용도 워크스테이션입니다. 
office-drama=뒷담화가 들킬 때 발생하는 대인 관계 갈등. 충분한 커피만 있다면 휴게실에서 재활용할 수 있습니다.
osha-violation=위험한 산업 공정을 통해 발생한 작업장 안전 위반. 노동조합을 통해 정당화 또는 재활용할 수 있습니다.
paper=표준 발행 관료적 기질. 나무로 만들거나 플라스틱으로 합성합니다. 빈 양식부터 대법원 서류에 이르기까지 모든 용도에 사용됩니다.
petrochemical-operating-permit=정유 및 석유화학 공장에 대한 전문 운영 허가. 건설, 안전 및 환경 관련 서류로 작성됩니다. 석유 가공 제작법에 사용됩니다.
pneumatic-pipe=유체화된 서류를 운반할 수 있는 서류색 파이프입니다. 일반 유체 파이프와 연결되지 않음
pneumatic-pipe-to-ground=지하 연결용 공압 파이프. 일반 유체 파이프와 연결할 수 없습니다.
policy=끝없는 회의 끝에 작성된 정책 지침. 용지, 유체 허위사실, 데이터, 정부 보조금 필요
printer-t1=기본적인 전기 프린터. 느리지만 안정적입니다. 잉크 카트리지로 문서를 출력합니다.
printer-t2=복사 기능을 사용할 수 있는 고속 산업용 프린터입니다. 원본 1장으로 사본 6장 생성 가능.
promise=관료적 약속이 담긴 던질 수 있는 캡슐입니다. 시위하는 바이터에 사용해 일시적으로 진정시키세요.
propaganda-distillery=행정과 관련된 유체를 처리할 수 있는 시설. 정치적 유체를 유체화된 거짓말로 정제하거나, 유체 허위사실을 합성하거나, 인증서를 제작할 수 있습니다.
provisional-approval=기본적인 관료적 허가서. 돌 용광로나 화력 장비에 필요합니다. 폐기물 더미의 첫 사용처.
radiological-work-order=원심분리기 및 방사선 처리를 위한 높은 수준의 보안 운영 작업 허가서입니다. 화학 관련 서류와 서면 관리 허가서를 이용해 작성됩니다. 원심분리 제작법에 필요.
redundant-rubble=과도한 절차적 감독으로 인해 발생한 광물성 폐기물. 그 자체로는 전혀 쓸모가 없지만 구속력 있는 공식 법적 문서 제작에 다량 필요합니다.
refined-nonsense=순수하게 농축된 관료적 부조리. 선전 증류소에서 압축된 잔해와 유체 허위사실을 융합하여 만들 수 있습니다. 고위 행정 절차의 중추적 역할.
regulation=철저한 관료적 절차를 거쳐 작성된 연방 법률입니다. 정부 권위의 궁극적인 표현.
research-grant-approval=기본적인 연구 보조금 허가서. 모든 과학 팩 제작에 필요합니다. 간단하지만 핵심적인 요소입니다.
research-grant-work-order=과학 연구와 관련된 생산을 위한 통합된 조립 기계 인증. 기계 제작에만 사용되며, 제작시 소비됩니다.
resolution-office=민원을 처리하는 데 특화된 사무실. 민원 접수, 서류 작업, 요약, 최종 해결까지 가능합니다.
resolved-hazmat=완전히 해결된 위험물 관련 민원. 압축된 잔해 증거, 유체 허위사, 커피가 필요합니다.
resolved-landscape=완전히 해결된 경관 관련 민원. 시스템이 작동한다는 증거(가끔이지만)
resolved-littering=완전히 해결된 쓰레기 투기 민원. 산성 웅덩이는 이제 장식용 시설로 분류됩니다.
resolved-loitering=완전히 해결된 배회 관련 민원. 대법원 판결문, 연방 규정, 커피, 이야기거리, 인증서가 필요합니다.
resolved-noise=완전히 해결된 소음 민원. 대법원 판결문, 정책, 커피, 이야기거리, 인증서가 필요합니다.
resolved-smog=완전히 해결된 스모그 민원. 상당한 유체 허위사실과 커피가 필요합니다.
resolved-unemployment=완전히 해결된 실업 민원. 관료적 성취의 정점. 실업 문제는 이제 없습니다.
resolved-vagrancy=완전히 해결된 부랑자 민원. 스피터에 대한  궁극의 관료주의적 성과. 노숙자 문제는 이제 없습니다.
safety-waiver=관리자의 모든 책임을 면제하는 문서입니다. 1티어 건물 제작이나 더 무거운 운영 허가에 필요합니다.
safety-waiver-draft=프린터 확인 및 잉크 봉인을 기다리는 미확정된 안전 면제.
safety-work-order=안전 등급 규제가 적용되는 제작 작업을 허용하는 통합 제작 허가서. 조립 기계에만 사용되며, 사용시 소모됩니다.
taxpayer-money=악성 민원을 해결해 어렵게 번 돈. 관료적 운영에 핵심적으로 사용됩니다.
ticket-hazmat=유해 물질 노출에 대한 스피터의 민원입니다. 중형+ 스피터에 의해 제기됨.
ticket-landscape=경관 파괴에 대한 시민 민원입니다. 관리소에서 소형 바이터에 의해 제기됨.
ticket-littering=산성 웅덩이에 쓰레기를 무단 폐기한 스피터에 대한 민원입니다. 관리소에서 소형 스피터에 의해 제기됨.
ticket-loitering=제한 구역 위반에 대한 스피터의 민원입니다. 대형 스피터에 의해 제기됨.
ticket-noise=소음 공해에 대한 시민 민원입니다. 대형+ 바이터에 의해 제기됨.
ticket-smog=대기 공해에 대한 시민 민원입니다. 중형+ 바이터에 의해 제기됨.
ticket-unemployment=실업에 대한 시민 민원입니다. 베헤모스 바이터에 의해 제기됨.
ticket-vagrancy=이재민과 노숙자에 대한 스피터의 민원입니다. 베헤모스 스피터에 의해 제기됨.
transit-authorization=공식 여행 허가서 (양식 12-T) 기차 정류장의 환승 허가서 상자에 넣으세요. 도착할 때마다 1개씩 사용되며, 역의 기차 한도는 상자에 있는 양식 수와 같아집니다.
transit-permit-chest=열차 정류장에 자동으로 배치되는 상자. 여기에 환승 허가서를 적재하세요. 열차가 도착할 때마다 하나씩 소모됩니다. 역의 열차 한도는 양식 수와 같으며, 투입기나 물류 로봇이 접근할 수 있습니다.
treasury-bond=정부가 지원하는 금융 상품. 세금과 쓸모없는 서류를 결합합니다. 고급 건설 및 정책에 사용 가능.
union-headquarters=인적 협상을 진행하는 거대 복합 건물. 정부 보조금, 탄소 인증서 검증 및 OSHA 정당화를 처리합니다. [item=overtime-exemption]을 장착하지 않았다면 야간에 문을 닫습니다.
union-headquarters-no-working-hours=인적 협상을 진행하는 거대 복합 건물. 정부 보조금, 탄소 인증서 검증 및 OSHA 정당화를 처리합니다. 
useless-documentation=여러 겹의 종이로 조심스럽게 포장된 잔해. 쓸모없는 문서를 공식 문서화하거나. 표준화된 접수 과정 및 금융 상품에 사용합니다.
watercooler-gossip=정수기 근처에서 자연스럽게 오가는 비공식 정보. 기업 의사결정에 필수적입니다.
white-paper=데이터, 거짓말, 터무니없는 헛소리가 뒤섞인 권위 있는 정책 문서. 정부 정책의 토대.
work-order=일반적인 제작을 허용하는, 기본 조립 기계 작업 권한입니다. 기계 제작이나 상위 티어의 조립 기계 서류 제작에만 사용됩니다.
admi-efficiency-module=에너지 소비량 -30%
admi-efficiency-module-2=에너지 소비량 -40%
admi-efficiency-module-3=에너지 소비량 -50%
admi-productivity-module=생산성 보너스 +4%. 하지만 제작 속도가 감소되며 소비 전력과 공해 배출량이 증가합니다.
admi-productivity-module-2=생산성 보너스 +6%. 하지만 제작 속도가 감소되며 소비 전력과 공해 배출량이 증가합니다.
admi-productivity-module-3=생산성 보너스 +10%. 하지만 제작 속도가 감소되며 소비 전력과 공해 배출량이 증가합니다.
admi-speed-module=50%의 추가 에너지를 소비하지만, 기계 제작 속도가 20% 가속됩니다.
admi-speed-module-2=60%의 추가 에너지를 소비하지만, 기계 제작 속도가 30% 가속됩니다.
admi-speed-module-3=70%의 추가 에너지를 소비하지만, 기계 제작 속도가 50% 가속됩니다.
admi-greenhouse=기후 제어식 재배 시설. 물로 나무를 천천히 재배하거나 적절한 아이템을 이용해 희귀한 커피 원두를 재배합니다.

