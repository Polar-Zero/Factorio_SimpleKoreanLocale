[mod-setting-description]
advanced-electric-difficulty=상위 티어 설비 제작 난이도를 조정합니다.\n쉬움: 다음 티어 비용: '설정값'.\n중간: 다음 티어 비용: '1.1 * 설정값'.\n하드: 다음 티어 비용: '1.3 * 설정값'.\n모드 페이지에서 자세한 정보를 확인하세요.
advanced-electric-enabled-tiers=특정 티어를 비활성화할 수 있습니다.
advanced-electric-multiplier-advanced-accumulator=해당 티어의 저장량 배율.\n5MJ * [설정값].\n예: 축전지 저장량을 50MJ로 설정하려면 10의 값을 지정하면 됩니다.
advanced-electric-multiplier-advanced-solar=해당 티어의 생산량 배율.\n60kW * [설정값].\n예: 전지판 발전량을 600kW로 설정하려면 10의 값을 지정하면 됩니다.
advanced-electric-multiplier-elite-accumulator=해당 티어의 저장량 배율.\n5MJ * [설정값].\n예: 축전지 저장량을 500MJ로 설정하려면 100의 값을 지정하면 됩니다.
advanced-electric-multiplier-elite-solar=해당 티어의 생산량 배율.\n60kW * [설정값].\n예: 전지판 발전량을 6MW로 설정하려면 100의 값을 지정하면 됩니다.
advanced-electric-multiplier-ultimate-accumulator=해당 티어의 저장량 배율.\n5MJ * [설정값].\n예: 축전지 저장량을 5GJ로 설정하려면 1,000의 값을 지정하면 됩니다.
advanced-electric-multiplier-ultimate-solar=해당 티어의 생산량 배율.\n60kW * [설정값].\n예: 전지판 발전량을 60MW로 설정하려면 1,000의 값을 지정하면 됩니다.