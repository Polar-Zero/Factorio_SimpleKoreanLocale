[alignment]
align-concordance=__1__ 플레이어가 행성 전체의 완전한 통합을 달성했습니다. 이 항성계는 은하 네트워크상에서 영구적으로 점령되었으며, 이제 항성계에 도착했거나 도착할 모든 경쟁 세력은 동일한 테라포밍 계획에 포함될 것입니다.
align-guarded-identity=신원이 확인된 세력원이 지키고 있는 건물입니다.
align-no-identification=현재 진영에서 독자적으로 개발하지 않은 정렬 카드는 사용할 수 없습니다.
align-protected-identity=대상 플레이어는 스스로의 신분증으로 보호받고 있습니다.
align-protected-transmitter=대상 세력은 일관성 신호기로 보호받고 있습니다.
align-transponder-other=__1__ 플레이어가 (__2__, __3__)에서 현재 위치를 알렸습니다.
align-transponder-self=__1__ 플레이어가 (__3__, __4__)에서 __2__ 플레이어의 위치를 알렸습니다.
faction-absorbed=__1__ 진영이 __2__ 진영에 흡수되었습니다.
faction-joined=__1__ 플레이어가 __3__에서 __2__ 진영으로 영입되었습니다.
faction-name=__1__플레이어의 진영
faction-quit=__1__플레이어가 __2__를 떠나 __3__ 진영에 합류했습니다.
faction-summoned=새로 도착한 __1__플레이어가 __2__ 플레이어의 통신에 응답했습니다.
faction-switched=__1__에서 __2__ 진영으로 전환했습니다.
nullius-align-first-intro=당신은 폰 노이만, 안드로이드입니다. 당신의 탐사선은 황량한 행성에 도착했으며, 이제 이 행성을 테라포밍하고, 생명을 정착시키거나, 새로운 행성으로 나아가기 위한 후계자들을 양성해야 합니다. 다른 탐사선이 이 행성으로 접근하고 있을 가능성이 감지되었지만, 가장 먼저 도착한 것은 바로 당신입니다. 그들이 호환 가능한 지침에 따라 행동하는지 확실히 확인할 때까지, 이 유리한 위치를 활용해 잠재적인 적대적 간섭에 대비하세요. 만약 그렇지 않더라도, 목표를 더 빨리 달성하기 위해 협력하거나, 경쟁에서 이기기 위해 서둘러야 합니다. 대기권에 진입하기 시작합니다. 거친 착륙에 대비하십시오.
nullius-align-intro=당신은 폰 노이만, 안드로이드입니다. 당신의 탐사선은 황량한 행성에 도착했으며, 이제 이 행성을 테라포밍하고, 생명을 정착시키거나, 새로운 행성으로 나아가기 위한 후계자들을 양성해야 합니다. 다른 탐사선이 이 행성에 먼저 도착했을 가능성이 감지되으며, 그들이 호환 가능한 지침에 따라 행동하는지 확실히 관찰하는 것을 추천합니다. 만약 그렇지 않더라도, 목표를 더 빨리 달성하기 위해 협력하거나, 경쟁에서 이기기 위해 서둘러야 합니다. 대기권에 진입하기 시작합니다. 거친 착륙에 대비하십시오.

