nullius-algae=조류 배양 드론을 사용하여 물가에 조류를 번식시키세요.
nullius-arthropod=나무와 물고기가 주변에 있는 육지에 절지동물을 번식시키세요.\n산소 농도가 80% 이상인 환경을 선호합니다.
