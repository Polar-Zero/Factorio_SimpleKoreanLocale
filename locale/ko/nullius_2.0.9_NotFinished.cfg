nullius-cloned=자신의 복제를 만들어보세요. ([item=nullius-android-1])
nullius-demanding=수요 상자를 제작하세요. ([item=nullius-small-demand-chest-1])
nullius-easy-breezy=게임 시작 45분 이내에 풍력 터빈을 만드세요.
