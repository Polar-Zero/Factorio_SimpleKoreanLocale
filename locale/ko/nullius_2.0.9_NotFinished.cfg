nullius-complete-objective=임무 목표: __1__ 완료!
nullius-copper=구리 소행성 안내 드론 20대를 착륙시키세요.
nullius-escape=[color=1,0.5,0.2]경고: 드론 발사 도중 거미 일부가 격리 구역을 뚫고 탈출했습니다![/color]
nullius-fish=수경 재배 드론을 이용해 조류 근처에 물고기를 방류하십시오.\n산소 농도가 60% 이상인 환경을 권장합니다.
nullius-grass=원예 드론을 이용해 해안 지대를 잔디로 채우세요.
nullius-objective=__1__ 임무 목표를 __2__% 달성하세요.
nullius-overall=모든 승리 조건에 대한 달성 진행도를 표시합니다.
nullius-oxygen=대기 중 산소 농도를 높여야 합니다. 야생에 심은 식물들은 시간이 지남에 따라 서서히 이를 수행할 것입니다. 산소를 배출하는 것 역시 큰 도움이 되며, 수소, 메탄이나 환원제를 배출하면 배출했던 산소 일부가 상쇄될 수 있습니다.
nullius-petroleum=격리 드론을 통해 총 12,000,000 단위의 석유 매장지를 생성하세요.
nullius-probe=로켓으로 탐사선 10대를 발사하세요.
nullius-switch-bodies=몸체를 __1__번 전환하세요.  __CONTROL__nullius-upload-mind__로 비어 있는 몸체를 제어하거나, __CONTROL__nullius-next-body__로 이전 몸체로 돌아갈 수 있습니다.
nullius-terraform=테라포밍 또는 발굴 드론을 사용하여 검은색, 보라색, 화산 지형과 같은 이국적인 외계 지형을 재구성하세요.
nullius-tree=나무 재배 드론을 이용해 땅벌레나 분기공에서 떨어진 곳에 나무를 심어보세요.
nullius-uranium=우라늄 소행성 안내 드론 12대를 착륙시키세요.
nullius-vented=배출한 산소의 총량입니다.
nullius-worm=곤충학 드론을 사용하여 풀이나 나무 근처에 땅벌레를 번식시키세요.\n산소 농도가30% 이상인 환경을 권장합니다.

