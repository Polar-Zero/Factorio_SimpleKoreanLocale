nullius-alignment=플레이어들이 서로 다른 진영에서 시작한 뒤, 추후 필요에 따라 진영을 구축하도록 합니다.
nullius-hide-recipe-signals=기본적으로 신호 GUI에 포함되지 않는, 모든 제작법 신호를 숨깁니다.
nullius-hide-void-alt=배출탑과 배출구의 대체 아이콘을 숨깁니다.
nullius-infinite-fumaroles=수중 퇴적물을 사용할 수 있는 경우, 육지 화산 가스 퇴적물을 제한하지 않습니다.
nullius-match-wind-turbine-activity-sound=활성화하면, 풍력 발전기 효과음 크기가 발전량에 따라 달라집니다.
nullius-pump-energy-multiplier=펌프의 전기 비용 증가율을 결정합니다.
nullius-wind-turbine-volume=풍력 터빈 소리의 볼륨을 조절합니다.