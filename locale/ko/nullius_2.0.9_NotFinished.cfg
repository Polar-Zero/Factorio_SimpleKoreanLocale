[]
nullius-intro=당신은 폰 노이만, 안드로이드입니다. 수백 년에 걸친 상대론적 항해 끝에, 당신의 탐사선은 황량한 행성에 도착했으며, 필수 장비로 구성된 소량의 탑재물을 싣고 막 활성화되었습니다. 이 황량한 행성은 중원소가 상대적으로 부족한데다 호흡 가능한 대기도 없습니다. 하지만 이 사소한 결함에도 불구하고, 이 행성은 전반적으로 테라포밍에 매우 적합한 후보로 분류되었습니다. 당신의 임무는 이 행성을 테라포밍하는 데 필요한 산업 역량을 개발하고, 생명체를 정착시키며, 새로운 행성으로 나아가기 위해 후속 세대를 양성하는 것입니다.
nullius-mission=이 외딴 황무지 행성에 거대한 첨단 산업 전초기지를 건설함으로써 임무의 첫 단계를 성공적으로 완료했습니다. 이제 이 역량을 활용하여 행성을 테라포밍해야 합니다. 각 목표의 남은 진행도를 추적할 수 있도록 관려 GUI 패널과 이를 관리할 수 있는 새로운 버튼을 사용할 수 있게 되었습니다. 모든 과제를 완료하면 임무가 성공으로 간주됩니다.\n\n1. 식물 3종과 동물 3종을 도입해야 합니다. 성간 네트워크로 위성 연결이 수립하면 유전체를 다운로드할 수 있습니다. 각 종에 적합한 최적의 서식 환경을 안내하는 드론의 도움을 받아 야생에 방사하십시오.  동물이 생존하려면 대기 중 산소가 필요합니다.\n\n2. 행성 전역의 산소 농도를 높이는 것도 또 다른 목표 중 하나입니다. 야생에 방사된 식물은 시간이 지남에 따라 산소 농도를 점차 높여줍니다. 배출하는 산소(또는 압축 산소) 역시 대기 구성에 기여합니다. 배출된 수소나 기타 환원성 가스는 산소 일부를 상쇄시키는 점에 유의하세요. 또한 이산화탄소를 석탄과 석유 형태로 격리하여 대기 중 이산화탄소 농도를 낮춰야 합니다.\n\n3. 이 행성은 중원소가 부족하므로, 소행성 채광을 통해 이를 보충해야 합니다. 우선 새로운 희귀 광물 매장지를 조성하는 것이 필요합니다. 또한 테라포밍 드론을 사용하여 외계 지형을 새로운 생명체에 더 적합하게 재구성해야 합니다.\n\n4. 마지막으로, 자신의 복제체를 만들어 테라포밍이 가능한 다른 행성들로 우주선을 통해 발사함으로써, 테라포밍의 물결을 은하계 전역으로 확산시켜보세요.

