#Retranslation of Nullius is Not Finished Yet - PolarZero

[mod-name]
nullius=널리어스(Nullius)

[mod-description]
nullius=이 팩토리오 확장판에서 플레이어는 행성을 개척하고 생명체를 정착시키는 안드로이드로 플레이합니다. 모든 제작법과 기술은 새롭게 변경됩니다. 이제 생명 없이는 석탄, 원유, 목재, 바이터, 심지어 자연적인 산소도 얻을 수 없게 되므로 이제 다양한 재생가능 에너지에 의존해야 할 것입니다. 안정적인 에너지 공급을 원한다면 공기나 바다에서 풍부하게 얻을 수 있는 원소나, 철, 보크사이트, 사암, 석회석과 같은 흔한 광물 채광에 집중해야 할 것입니다. 고급 기술을 연구하면 소행성에서 희귀한 원소를 채광할 수도 있습니다.\n\n재번역: SimpleKoreanLocale(PolarZero)


