[mod-description]
yunrus-space-block=누가 행성을 탐험하고 싶어할까요? 더럽고 역겨우며, 엔지니어의 생활에 도움이 되지도 않으며, 불쾌한 냄새가 나죠. 대신 궤도 플랫폼에 공장을 지어보면 어떨까요?\n\n번역: SimpleKoreanLocale(PolarZero)


