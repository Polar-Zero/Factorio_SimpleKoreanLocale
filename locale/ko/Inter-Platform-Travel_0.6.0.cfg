[mod-name]
Inter-Platform-Travel=IPT - 플랫폼간 이동(IPT: Inter Platform Travel)

[mod-description]
Inter-Platform-Travel=우주 플랫폼 허브 인터페이스에서 직접 다른 우주 플랫폼으로 이동할 수 있도록 하는 기능을 추가합니다.\n\n번역: SimpleKoreanLocale(PolarZero)


[ipt]
board-failed=IPT: 플랫폼간 이동 ERROR07: 화물 포드에 탑승할 수 없음 - 발사가 취소되었습니다.
destination-invalid=IPT: 플랫폼간 이동 ERROR03: 선택한 목적지가 더 이상 유효하지 않습니다.
gui-cost-line=필요: 2x [item=rocket-fuel]
gui-destination-heading=목적지 선택
gui-no-destinations=IPT: 플랫폼간 이동 ERROR01: 해당 궤도에서 플랫폼을 찾을 수 없습니다.
gui-title=IPT: 플랫폼간 이동
gui-traveling=이동 진행 중...
launch-failed=IPT: 플랫폼간 이동 ERROR05: 이 허브에서 화물 포드를 발사할 수 없습니다.
needs-character=IPT: 플랫폼간 이동 ERROR06: 플랫폼간 이동에는 이 플랫폼에서 제어되는 캐릭터가 필요합니다. (원격/지도 보기 상태가 아닌 실제 캐릭터)
no-hatch=IPT: 플랫폼간 이동 ERROR04: 이 플랫폼 허브에 화물 포드를 발사할 수 있는 화물 해치가 없습니다.
not-enough-fuel=IPT: 플랫폼간 이동 ERROR02: 플랫폼간 이동 포드를 발사하려면 우주 플랫폼 허브 인벤토리에 로켓 연료 2개가 필요합니다.

[mod-setting-name]
ipt-charge-2-rocket-fuel=이동시 로켓 연료 2개 필요

[mod-setting-description]
ipt-charge-2-rocket-fuel=활성화하면 플랫폼간 발사를 할 때마다 우주 플랫폼 허브 인벤토리에서 로켓 연료 2개를 소모합니다. 비활성화하면 이동은 무료입니다.