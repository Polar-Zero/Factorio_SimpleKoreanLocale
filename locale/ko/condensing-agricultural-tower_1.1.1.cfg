[mod-name]
condensing-agricultural-tower=응축 농업탑(Condensing agricultural tower)

[mod-description]
condensing-agricultural-tower=식물에서 유체를 수확하는 기능을 추가한 새로운 농업용 탑을 추가합니다. 탑 내부의 탱크에 유체가 보관됩니다.\n\n번역: SimpleKoreanLocale(PolarZero)

[entity-name]
condensing-agricultural-tower=응축 농업탑
hidden-condensing-agricultural-tower-tank=응축 농업탑 유체 탱크

[entity-description]
condensing-agricultural-tower=씨앗을 심고 수확할 때마다 유체를 응축하여 탱크에 저장합니다. 탱크가 가득 차면 초과분은 사라집니다. 팩토리오백과에서 자세히 알아보세요.
hidden-condensing-agricultural-tower-tank=수확한 유체를 최대 30,000 단위까지 저장합니다.

[factoriopedia-description]
condensing-agricultural-tower=씨앗을 심고 수확할 때마다 약간의 유체를 추가로 응축하여 내부 탱크에 저장합니다. 탱크가 가득 차면 비워질 때까지 응축 작업은 일시 중단됩니다.
condensing-jellynut=\n[entity=jellystem] 수확시 420 [fluid=lubricant](32.2/초) 응축 가능
condensing-tree=\n[entity=tree-plant] 수확시 2,000 [fluid=water](153.3/초) 응축 가능
condensing-yumako=\n[entity=yumako-tree] 수확시 810 165°C [fluid=steam](62.1/초) 응축 가능

[mod-setting-name]
enable-jellynut-condensing-lubricant=젤리스템 응축 윤활유 활성화
enable-tree-condensing-water=나무 응축수 사용
enable-yumako-condensing-steam=증기 응축 유마코 나무 활성화

[mod-setting-description]
condensing-jellynut=\n[entity=jellystem] 수확시 420 [fluid=lubricant]를 (32.2/초) 응축할 수 있도록 활성화합니다.
condensing-tree=\n[entity=tree-plant] 수확시 2,000 [fluid=water]을 (153.3/초) 응축할 수 있도록 활성화합니다.
condensing-yumako=\n[entity=yumako-tree] 수확시 810 165°C [fluid=steam]를 (62.1/초) 응축할 수 있도록 활성화합니다.