[recipe-description]
tsb-accumulator-v2=[fluid=angels-liquid-nitric-acid]를 사용하여 개선된 축전지입니다.
tsb-nitric-acid-plastic=[fluid=angels-liquid-nitric-acid]와 다른 재료를 활용해 플라스틱을 제작합니다.
tsb-nitric-acid-rocket-fuel=[fluid=angels-liquid-nitric-acid]의 효율적인 사용법 중 하나입니다.
tsb-solar-matrix=[fluid=angels-gas-nitrogen]로 처리되어, 더 고급스럽고 효율적인 태양 전지판입니다. 하지만 햇빛이 부족한 [planet=paracelsin] 등 환경에서는 여전히 사용이 어렵습니다.
tsb-solid-fuel-from-nitrogen=[fluid=angels-gas-nitrogen]의 효율적인 사용법 중 하나입니다.
tsb-sphalerite-melting=[fluid=steam]와 [fluid=angels-liquid-nitric-acid]를 이용해, 부산물을 남기지 않고 [item=sphalerite]를 [fluid=angels-liquid-molten-iron]로 효율적으로 녹여보세요.
tsb-tetrahedrite-melting=[fluid=steam]와 [fluid=angels-liquid-nitric-acid]를 이용하면, 부산물을 남기지 않지만 비효율적인 [item=tetrahedrite]를 [fluid=angels-liquid-molten-copper] 주조 공정을 진행할 수 있습니다.
tsb-vaterite-formation=[entity=electrochemical-plant]에서 [planet=paracelsin]의 근본적 특성을 재현한 결과, 우리는 [item=vaterite]를 촉매로 사용하며 [item=stone]을 [fluid=angels-gas-nitrogen]를 사용하여 처리하는 것이, 더 많은 생산량을 확보할 기회를 가질 수 있음을 알게 되었습니다.
tsb-vaterite-processing=많은 양의 [item=vaterite]을 [fluid=water]과 함께 처리해 [item=angels-solid-carbon]와 [item=calcite]를 얻어보세요.
tsb-zinc-leaching=[fluid=angels-liquid-nitric-acid]를 이용한 [fluid=zinc-concentrate] 침출 작업을 진행합니다.

