tsb-galvanized-steel=[item=bob-zinc-ore]을 [item=steel-plate]에 도금하면 강도가 높아지고 부식에도 강해집니다.
tsb-muluna-anorthite-processing=[item=anorthite-chunk]로부터 알루미늄을 생산하면, [item=rocket-fuel]나 [item=aluminum-cable] 제작에 사용할 수 있습니다.
tsb-muluna-greenhouses=화학 공장보다 빠르게 [item=wood]와 [fluid=angels-gas-oxygen]를 생산할 수 있지만, 사용하기 전에 먼저 [item=angels-solid-tree]을 파종해야 하는 온실입니다.
tsb-muluna-regolith-digging=근처에 자원이 없는 [planet=muluna] 지역에 채광 드릴을 배치하여 레골리스를 굴착하세요, 원치 않는 [item=angels-stone-crushed]는 투입기로 달의 흙에 묻거나 다른 타일에 놓아 폐기할 수 있습니다. 다른 원치 않는 아이템도 비슷한 방법으로 폐기할 수 있습니다.
tsb-muluna-wood-cultivation=[entity=chemical-plant]에서 [item=wood]를 재배할 수 있도록 합니다. 설정은 간단하지만 생산 속도는 느립니다. [fluid=angels-gas-carbon-dioxide]를 소비하고, [fluid=angels-gas-oxygen]를 생산합니다.
tsb-planet-discovery-paracelsin=얼음화산이 매우 활발히 활동하는 얼어붙은 황무지입니다. 지하로부터 흘러나오는 [fluid=angels-gas-nitrogen]로 인해 형성된 질소 호수가 덮고 있는 표면에는, [item=bob-zinc-ore] 추출에 필수적인 [item=tetrahedrite]와 [item=sphalerite] 광맥과 더불어, [entity=water-cryovolcano]이 곳곳에 흩어져 있습니다. [item=vaterite] 역시 드물게 존재합니다. 이 행성의 건물이 지속적으로 작동하려면 보온을 통해 적절한 온도를 유지해야 하며, 그렇지 못하면 아연 부산물이 발생하게 되며, 이는 전부 당신이 폐기해야 할 것입니다.
tsb-zinc-extraction=다양한 공정을 통해 [fluid=dirty-zinc-solution]을 [item=bob-zinc-ore]로 가공합니다.
tsb-zinc-piping=[item=bob-zinc-plate]를 이용하여 더 튼튼하고 뛰어난 단열 성능을 가진 파이프를 제작할 수 있게 됩니다. [planet=paracelsin]나 [planet=aquilo]같은 추운 환경에서도 얼지 않으며, 지하 파이프의 경우 더 넓은 지하 연결 범위를 지원합니다.

[mod-setting-name]
setting-early-cliff-explosives=[color=orange][font=default-bold]추가 기능:[/font][/color] 빠른 절벽 폭발물
setting-early-sintering-oven=[color=orange][font=default-bold]추가 기능:[/font][/color] 빠른 소결로
setting-multi-building=[color=orange][font=default-bold]추가 기능:[/font][/color] 다중 전력 건물 건설 허용
setting-no-spoilage=[color=orange][font=default-bold]추가 기능:[/font][/color] 아이템 부패 제거
setting-science-pack-nostalgia=[color=orange][font=default-bold]추가 기능:[/font][/color] 노스텔지아(추억) 모드

[mod-setting-description]
setting-early-cliff-explosives=절벽 폭발물을 더 빠른 시점에 사용할 수 있도록 조정합니다.
setting-early-sintering-oven=소결로를 더 빠른 시점에 사용할 수 있도록 조정합니다.
setting-multi-building=증기 엔진, 터빈, 태양 전지판, 축전지를 결합해, 2x 및 4x 다층 형태로 만들 수 있도록 허용합니다.
setting-no-spoilage=모든 아이템의 부패를 비활성화하고, 시간이 지남에 따라 부패 물질 아이템으로 변하는 것을 방지합니다.
setting-science-pack-nostalgia=과학 팩의 그래픽 모델을 새로운 유형으로 맞추는 대신, 이 모드에서는 모든 과학 팩 그래픽 모델을 구버전에서 사용하던 모델로 맞춥니다.