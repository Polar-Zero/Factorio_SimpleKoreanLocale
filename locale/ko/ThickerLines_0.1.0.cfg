[mod-name]
ThickerLines=두꺼운 전선(Thicker Power Wires)

[mod-description]
ThickerLines=전선 및 회로 전선의 가시성을 향상시킵니다.\n\n번역: SimpleKoreanLocale(PolarZero)


[mod-setting-name]
thicker-lines-circuit=더 두꺼운 회로 전선
thicker-lines-copper=더 두꺼운 전력 전선
thicker-lines-shadow=더 두꺼운 전선 그림자

