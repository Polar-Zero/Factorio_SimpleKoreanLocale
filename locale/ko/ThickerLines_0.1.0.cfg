thicker-lines-circuit=조합기, 전신주 및 기타 객체 사이의 회로 전선 두께를 늘립니다.
thicker-lines-copper=전신주 사이의 구리 전선 두께를 늘립니다.
thicker-lines-shadow=와이어 그림자 두께를 늘립니다.