[mod-setting-description]
kry-cargo-ships=화물선 엔진과 보트에 장비 그리드를 활성화합니다.\n참고: 차량 회수 시 장비 그리드 내부에 아이템이 남아있다면 소실됩니다. 차량을 회수하기 전에 엔진에서 미리 모든 장비를 제거해야 한다는 점을 잊지 마세요.
kry-car=모든 지상 차량에 대한 장비 그리드를 활성화합니다.
kry-train=모든 열차에 대한 장비 그리드를 활성화합니다.
kry-logi-cars=기차가 아닌 차량도 물류 요청을 할 수 있습니다.
kry-aircraft=항공기로 분류된 모든 차량에 대한 장비 그리드를 활성화합니다.
kry-watercraft=선박으로 분류된 모든 차량에 대한 장비 그리드를 활성화합니다.
kry-raven=‘레이븐’ 제작법을 수정하여, 외골격 장비 대신 차량 전용 엔진 부스터 장비가 필요하도록 대체합니다. 또한 이에 맞춰 필수 기술 조건도 변경합니다. 'Aircraft' 모드가 활성화된 경우, 기술 전제조건에 ‘고급 공기역학’도 추가합니다.
kry-equipment-bonus=엔진 속도 부스터 장비의 이동 속도 보너스를 설정할 수 있습니다. (백분율 값) 참고로 기본 게임의 외골격은 30%의 보너스를 부여합니다. __ITEM__skl-txtra0__20%__ITEM__skl-txtre__
kry-equipment-power=엔진 속도 부스터 장비의 전력 요구량(kW 기준)입니다.__ITEM__skl-txtra0__200kW (기본 게임 외골격과 동일)__ITEM__skl-txtre__