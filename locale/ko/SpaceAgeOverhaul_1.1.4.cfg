[technology-description]
advanced-space-logistics=각 행성에 더 많은 착륙 패드를 배치할 수 있게 됩니다.
promethium-module=어떻게 작동하는지 명확하지 않지만 결과를 도출합니다.
promethium-processing=정제하기 어렵고 매우 불안정하지만, 과학적 돌파구를 마련하는 데 큰 도움이 될 것입니다.
speed-demon=35분 이내에 나우비스에서 부서진 행성에 도착하면 자동으로 잠금 해제됩니다.
speed-demon-2=30분 이내에 나우비스에서 부서진 행성에 도착하면 자동으로 잠금 해제됩니다.
speed-demon-3=25분 이내에 나우비스에서 부서진 행성에 도착하면 자동으로 잠금 해제됩니다.
the-factory-must-grow=공장의 부하 테스트 과제. 10,000 SPM (분당 과학 팩)을 달성하세요.
the-factory-must-grow-2=공장의 부하 테스트 과제. 20,000 SPM (분당 과학 팩)을 달성하세요.
the-factory-must-grow-3=공장의 부하 테스트 과제. 50,000 SPM (분당 과학 팩)을 달성하세요.
the-factory-must-grow-4=공장의 부하 테스트 과제. 100,000 SPM (분당 과학 팩)을 달성하세요.
the-factory-must-grow-5=공장의 부하 테스트 과제. 250,000 SPM (분당 과학 팩)을 달성하세요.
quantum-lab=양자 프로세서를 기반으로 작동하는 첨단 연구소입니다. 바이오 연구소보다도 더 좋은 효율을 가졌지만, 더 많은 에너지도 필요합니다.

