[mod-setting-description]
quality-evolution-on-gleba=고급 유닛을 반복적으로 생성한 글레바 부화장의 품질이 증가될 수 있도록 활성화합니다.
quality-evolution-on-nauvis=고급 유닛을 반복적으로 생성한 나우비스 바이터 산란장의 품질이 증가될 수 있도록 활성화합니다.
quality-evolution-speed=높은 진화 요인에서 고급 유닛을 생성할 때 품질 업그레이드가 일어날 확률을 조정합니다.
rocket-silo-capacity-multiplier=로켓 수용량과 필요 로켓 부품 수량을 증가시킵니다. 모듈/품질이 제대로 지원되는 상황에서 격납고 처리량을 높일 수 있습니다. 하지만 건물 재료와 같이, 다양한 아이템이 소량 필요한 초반부에 불편할 수 있습니다. 초기 우주 진출시 권장값: 1, 게임 후반 권장값: 4