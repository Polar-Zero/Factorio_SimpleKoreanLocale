[mod-name]
shield-projector=보호막 프로젝터(Shield Projector)

[mod-description]
shield-projector=에너지 보호막을 원호 형태로 투사하는, 에너지만 사용하여 유지할 수 있는 역장을 만듭니다. Space Exploration 및 AAI Industry 모드를 위해 설계되었습니다.


[ammo-category-name]
shield-projection=보호막 프로젝터

[controls]
shield-projector-mode-toggle=보호막 활성화/비활성화

[entity-description]
shield-projector=보호 역장을 생성합니다. 프로젝터를 충전하거나 보호막 피해를 복구하고 있는 경우, 더 많은 에너지가 필요합니다. "Combat Mechanics Overhaul"모드가 설치되어 있으면 적의 투사체를 차단할 수 있습니다.\n[__CONTROL__shield-projector-mode-toggle__]로 보호막 작동 여부를 전환할 수 있습니다.

[technology-description]
shield-projector=보호 역장을 생성합니다. 프로젝터를 충전하거나 보호막 피해를 복구하고 있는 경우, 더 많은 에너지가 필요합니다. "Combat Mechanics Overhaul"모드가 설치되어 있으면 적의 투사체를 차단할 수 있습니다.\n[__CONTROL__shield-projector-mode-toggle__]로 보호막 작동 여부를 전환할 수 있습니다.