[mod-name]
quality-seeds-fork=고품질 씨앗(Quality Seeds)

[mod-description]
quality-seeds-fork=이 모드는 씨앗의 품질작을 진행해야 할 목적을 제공합니다.\n모든 식물에 대한 맞춤형 온실 재배 기능을 추가합니다.(나무, 유마코, 젤리스템 + 다른 모드 식물 포함!)\n포자를 방출하는 식물이 이제 새로운 포자 액체를 통해 두 배의 포자를 방출하게 됩니다.\n포자를 포함하는 객체를 파괴하거나 포자 배출구를 사용해, 포자가 대기로 배출되는 방식을 더 잘 제어할 수 있습니다.\n마지막으로, 이제 우주에서 식물을 재배할 수 있는 극후반 보상을 추가합니다!

[entity-name]
spore-tower=포자 배출구

[entity-description]
spore-tower=포자를 통제된 대기 중 위치에서 방출합니다.

[item-name]
spore-tower=포자 배출구

[item-description]
spore-tower=포자를 통제된 대기 중 위치에서 방출합니다.

[quality-seeds-error-message]
