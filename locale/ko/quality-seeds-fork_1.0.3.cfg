[technology-name]
fruit-cultivation=재배
space-cultivation=우주 재배

[technology-description]
fruit-cultivation=글레바의 생물학 기술 연구를 활용하면, 씨앗에서 나무를 재배할 수 있게 됩니다.
space-cultivation=글레바를 마스터하면 생명 자체를 지배할 수 있으며, 공허한 우주에서도 생명을 유지할 수 있게 됩니다.