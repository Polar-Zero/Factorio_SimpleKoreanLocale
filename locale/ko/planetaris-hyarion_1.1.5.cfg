planetaris-particle-manipulation=입자 조작와 관련된 메커니즘을 배워보세요.
planetaris-polishing=연마제를 사용하여 원석을 광택이 나는 보석으로 바꿔보세요.
planetaris-polishing-science-pack=연마에 대해 더 자세히 알아보세요.
planetaris-quartz-furnace=석영 용광로를 제작할 수 있게 됩니다.
planetaris-refraction-science-pack=굴절에 대해 더 자세히 연구할 수 있도록 합니다.
