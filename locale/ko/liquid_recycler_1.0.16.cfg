[technology-description]
asteroid-squeezing=소행성 덩어리 처리를 마지막 단계까지 마스터하고, 소행성 덩어리를 정말 세게 쥐어짜보세요. 비효율적이지만 매우 빠릅니다.
fluid-recycler=풀고라에서의 수없이 많은 연구와, 수많은 고철 탐색을 마친 뒤, 가장 효율적인 유체로의 재활용법을 드디어 알아냈습니다: 고철을 정말 세게 짜내는 것이죠. 유체 재활용을 통해 투입한 유체의 25%를 돌려받고 모든 아이템을 분쇄합니다.
squeeze-coconut=잔여물 없이 코코넛 기름을 짜내는 방법을 알아보세요. 비효율적이지만 매우 빠릅니다.

[tips-and-tricks-item-name]
asteroid-squeezing=[item=carbonic-asteroid-chunk] 소행성 쥐어짜기
fluid-recycler=[entity=fluid-recycler] 유체 재활용기

[tips-and-tricks-item-description]
asteroid-squeezing=[entity=fluid-recycler]는 높은 압력을 활용해서 소행성 덩어리나 얼음을 액화시키는 데 사용할 수 있습니다. 이 과정은 빠르지만 많은 자원이 필요하다는 점에 유의하세요. [item=metallic-asteroid-chunk]에서는 [fluid=molten-iron]가, [ item=carbonic-asteroid-chunk]에서는 [fluid=crude-oil]가, [item=oxide-asteroid-chunk]에서는 [item=ice]가 나옵니다. ([fluid=water]로 재처리 가능)
fluid-recycler=다양한 아이템에서 유체를 짜내는 데도 사용할 수 있습니다. 투입 가능한 아이템에는 [fluid=water]을 짜내려면 [item=raw-fish], [item=explosives], [item=pentapod-egg]를 투입할 수 있으며, [fluid=sulfuric-acid]을 짜내려면 [item=battery] and [item=processing-unit]를 투입할 수 있습니다.

[mod-setting-name]
balanced-mode=균형 모드 활성화

[mod-setting-description]
balanced-mode=균형 모드: 확인된 제작법만 사용됩니다. 비활성화시: 완전한 혼란. 수많은 제작법, 그 중 상당수는 매우 강력할 것입니다.