[mod-name]
lawn-mower=잔디깎이(Lawn Mower)

[mod-description]
lawn-mower=지형 장식을 제거하기 위한 여러 옵션을 추가합니다.\n\n번역: SimpleKoreanLocale(PolarZero)


[controls]
lawnmower-give-lawnmower=잔디깎이

[item-name]
lawnmower-lawnmower=잔디깎이

[item-description]
lawnmower-lawnmower=마우스에 들고 있을 경우:\n__CONTROL_LEFT_CLICK__ + 드래그: 적 시체와 장식을 제거합니다.\n__CONTROL_KEY_SHIFT__ + __CONTROL_LEFT_CLICK__ + 드래그: 적 시체만을 제거합니다.

[mod-setting-name]
lawnmower-building-clear-range=장식 제거 범위
lawnmower-drop-minable-items=채광 가능한 아이템 떨구기

[mod-setting-description]
lawnmower-building-clear-range=장식이 제거될 범위입니다.
lawnmower-drop-minable-items=제거한 시체를 회수할 수 있다면, 회수 가능한 아이템을 지면에 떨굽니다.

[shortcut-name]
lawnmower-give-lawnmower=잔디깎이