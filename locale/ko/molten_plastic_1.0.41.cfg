[technology-description]
molten-bio-plastic-processing=생물학적 아이템으로부터 직접 녹은 플라스틱을 추출해보세요.
molten-corrundum-sulfonated-plastic=행성의 아이템만으로 유체 플라스틱을 생산할 방법을 알아보세요.
molten-cube-jelly-plastic=큐브에게 녹은 플라스틱의 비밀을 알려달라고 부탁하세요.
molten-igrys-plastic-bar=녹은 플라스틱을 합성하는 방법을 찾아보세요.
molten-micro-plastic-processing=유해한 미세 플라스틱을 녹일 방법을 찾아보세요.
molten-nitric-acid-plastic=질산을 이용하여 직접 녹은 플라스틱을 생산할 수 있도록 합니다.
molten-pelagos-bio-plastic-processing=생물학적 아이템으로부터 직접 녹은 플라스틱을 제작해보세세요.
molten-planetaris-plastic-processing=압축기를 이용하여 직접 녹은 플라스틱을 제작해보세세요.
molten-plastic-hydrogen-sulfide=설폰화 플라스틱을 녹은 상태로 유지하는 방법을 찾아보세요.
molten-plastic-processing=플라스틱을 녹여 틀에 붓는 방법 알아보세요.
molten-polyvinyl-chloride=방해석을 이용해 PVC(폴리염화비닐)를 녹은 상태로 유지하는 방법을 알아보세요.
plasma-molten-plastic=질량분석법을 이용한 플라스틱 분리를 통해, [item=calcite] 없이도 플라스틱을 녹일 수 있도록 합니다.
molten-plastic-processing-advanced-kr=녹은 플라스틱 가공의 최전선 기술입니다.

[mod-setting-name]
dynamic-recipes=동적 제작법 생성
replace-plastic=플라스틱 막대를 완전히 교체

[mod-setting-description]
dynamic-recipes=플라스틱 막대를 사용하는 모든 제작법에 대한 녹은 플라스틱 대체 제작법을 자동으로 추가합니다. 대규모 개편 또는 컨텐츠 추가, 대체 제작법 추가 목적으로 이 모드를 사용하려는 경우 유용합니다.
replace-plastic=플라스틱 막대가 잠금 해제되는 시점에 녹은 플라스틱을 함께 사용할 수 있도록 합니다. 모든 행성과 제작법에 적용되며, 전체 또는 부분 개편 모드의 일부로 이 모드를 사용할 경우 '동적 제작법 생성' 옵션을 동시에 활성화하는 것을 추천합니다.