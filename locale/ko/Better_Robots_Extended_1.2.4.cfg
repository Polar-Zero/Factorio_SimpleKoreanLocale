[entity-description]
bre-roboport-mk2=더 넓은 범위와 개선된 충전 공간을 제공하는 로보포트.
bre-roboport-mk3=더 넓은 범위와 많은 충전 공간을 제공하는 로보포트.
BRE-robo-box-mk1=물류 및 건설 로봇을 보관합니다. 비상용 충전 슬롯 1개를 사용할 수 있습니다.
BRE-robo-box-mk2=더 큰 용량으로 업그레이드된 로봇 저장소. 더 강력해진 충전 슬롯 1개를 제공합니다.
BRE-robo-box-mk3=대규모 물류망에도 적합한 로봇 저장소. 고성능 충전 슬롯 1개를 포함합니다.
BRE-robo-erweiterung-mk1=물류 및 건설 네트워크 범위를 확장합니다. 충전 슬롯이나 로봇 저장 공간은 제공되지 않습니다.
BRE-robo-erweiterung-mk2=물류 및 건설 네트워크 범위를 더욱 확장합니다. 충전소나 로봇 저장 공간은 포함되어 있지 않습니다.
BRE-robo-erweiterung-mk3=초대형 물류망 구축에 적합한 네트워크 확장기. 충전 또는 로봇 저장에는 적합하지 않습니다.
BRE-robo-lader-mk1=로봇 충전 스테이션. 로보포트보다 빠른 속도로 로봇을 충전합니다.
BRE-robo-lader-mk2=더 빠른 충전 속도와 많은 충전 슬롯을 제공하는 개선된 로봇 충전소.
BRE-robo-lader-mk3=대규모 물류망에서도 안전하게 사용하도록 설계된 고성능 충전소입니다.
BRE-roboport-mk1=로보포트 MK1의 대체 버전입니다. 다른 모드 설정과의 제작법 호환 개선 목적으로 사용됩니다.
BRE-roboport-mk2=더 넓은 범위와 많은 충전 슬롯을 제공하는 로보포트.
BRE-roboport-mk3=더 넓은 범위와 매우 많은 충전 슬롯을 제공하는 로보포트.

