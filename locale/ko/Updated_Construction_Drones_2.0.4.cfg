[mod-name]
Updated_Construction_Drones=건설 드론 - 업데이트(Updated Construction Drones)

[mod-description]
Updated_Construction_Drones=지상 기반 건설 로봇을 추가합니다. Klonan의 원본 모드의 roy192 포크를 재작업했습니다.\n\n경고: 2.0 지원은 실험적인 단계이므로 사용자 책임하에 사용하세요!\n\n번역: SimpleKoreanLocale(PolarZero)


[controls]
construction-drone-toggle=건설 드론 전환

[mod-setting-name]
throttling=탐색 영역 세분화

[mod-setting-description]
throttling=플레이어당 검색 영역을, 설정값 N에 대한 (N*2)^2개로 나눕니다. 값이 낮으면 반응 속도가 빨라지지만, CPU 성능 영향이 발생할 수 있습니다.