[technology-description]
planet-discovery-terrapalus=끝없는 늪, 바이터, 펜타포드, 팔루슘 광석이 있는 어둡고 축축한 위성입니다.
palusium-processing=팔루슘 광석을 녹여 판 형태로 만듭니다.
palusium-crushing=팔루슘 광석을 팔루슘 분말로 분쇄합니다. 분쇄한 분말은 팔루슘 크리스탈로 만들 수 있습니다.
palusium-liquefaction=팔루슘 분말과 물, 원유를 섞어 울트라븀을 만듭니다.
palusium-refining=팔루슘 분말을 팔루슘 크리스탈로 정제합니다.
inhibitor-lamp=이 조명은 적에게 신경학적 반응을 일으키는 자외선 파장을 이용하여 적을 얼려버릴 수 있습니다.
uv-turret=자외선을 집중시켜 일부 적을 물리치고 혼란에 빠뜨립니다.
inhibitor-lamp-damage=더 유해한 자외선을 방출하는 공격적인 조명입니다. 적의 이동 속도를 50% 감소시키고, 틱당 5 피해를 줍니다.
inhibitor-lamp-mk2=동결 반경가 40% 증가된 확장된 억제 조명.
inhibitor-lamp-mk3=동결 반경가 80% 증가된 최대 효율의 억제 조명.
ultravium-power-systems=태양광을 사용할 수 없는 테라 팔루스에서 울트라븀 에너지를 활용하여 파워 아머를 충전하세요.
ultravium-power-systems-2=더 큰 건전지와 확장된 충전소를 이용해 울트라븀 전력 시스템을 개선할 수 있습니다.
ultravium-power-systems-3=최대 용량의 동력 전지과 장거리 충전 인프라를 이용한 첨단 울트라븀 전력 시스템을 사용할 수 있습니다.
uv-personal-equipment=개인 방어구에 사용할 수 있도록 소형화된 자외선 기술입니다. 적을 도망치게 하는 방어 포탑과 주변의 적을 얼려버리는 보호막을 사용할 수 있습니다.
uv-spotlight=30초 동안 적을 빠르게 정지시킨 후 다음 대상으로 전환하는 신속 타겟팅 스포트라이트입니다. 최소한의 피해, 순수한 군중 제어 도구.
