[recipe-description]
palusium-processing=팔루슘 광석을 녹여 판 형태로 만듭니다.
palusium-crushing=팔루슘 광석을 팔루슘 분말로 분쇄합니다. 분쇄한 분말은 팔루슘 크리스탈로 만들 수 있습니다.
palusium-liquefaction=팔루슘 분말과 물, 원유를 섞어 울트라븀을 만듭니다.
palusium-refining=팔루슘 분말을 팔루슘 크리스탈로 정제합니다.
armor-charging-station=파워 아머에 사용할 수 있는 무선 충전소입니다.
armor-charging-station-mk2=확장된 범위의 충전소로 업그레이드합니다.
armor-charging-station-mk3=가장 강력한 방어구 충전소를 건설하세요.
ultravium-battery=아머 충전에 사용할 수 있는 휴대용 울트라븀 건전지입니다.
ultravium-battery-pack=여러 개의 건전지를 더 큰 전지 팩으로 결합하세요.
ultravium-power-cell=확장 운영을 위한 고용량 동력 전지.
uv-defense-turret=자외선 기술과 개인 방어 장비의 결합.
uv-personal-shield=자외선 동결 기능을 추가하도록 보호막을 강화하세요.

