[mod-setting-description]
inhibitor-freeze-duration=빙결 지속 시간을 조정할 수 있습니다 (틱 단위)
inhibitor-thaw-duration=해동 지속 시간을 조정할 수 있습니다 (틱 단위)
inhibitor-radius=억제 조명의 작동 범위/사거리를 조정할 수 있습니다.
surface-pressure=이 값은 인공 토양을 지을 수 있는지 여부도 결정합니다. (2,000 hPa 이상 필요).
freeze-daytime='항상 낮 고정할 시간'값에 설정한 값으로 시간을 고정합니다.
daytime-value=고정할 시간 값을 설정합니다. (0.5: 밤, 1.0: 낮)
day-night-cycle-minutes=Duration of a full day/night cycle in minutes.
inhibitor-lamp-power-multiplier=Multiplier for inhibitor lamp power consumption (1.0 = default).
surface-gravity=Gravity strength on the planet surface.
surface-magnetic-field=Magnetic field strength.
surface-solar-power=Solar power efficiency percentage.
surface-temperature=Base temperature in degrees Celsius.
surface-temperature-variance=Temperature variation across the surface.
terrapalus-biome-scale=Controls the size of biome regions. Higher = larger biomes.
terrapalus-cloud-color-b=Blue component of cloud color (0-1).
terrapalus-cloud-color-g=Green component of cloud color (0-1).
terrapalus-cloud-color-r=Red component of cloud color (0-1).
terrapalus-cloud-opacity=Opacity of cloud effects (0 = none, 1 = full).
terrapalus-elevation-scale=Controls the size of hills and terrain features. Higher = larger features.
terrapalus-enemy-safe-zone-radius=Radius of the enemy-free safe zone near spawn.
terrapalus-fertile-candidate-spots=Number of candidate spots per region. Higher = more dense.
terrapalus-fertile-region-size=Size of regions for fertile spot generation.
terrapalus-fertile-soil-frequency=Controls how frequently fertile soil patches appear.
terrapalus-fertile-spot-radius=Radius of fertile soil spots in tiles.
terrapalus-fertile-spot-spacing=Minimum spacing between fertile spots in tiles.
terrapalus-fog-color-b=Blue component of fog color (0-1).
terrapalus-fog-color-g=Green component of fog color (0-1).
terrapalus-fog-color-r=Red component of fog color (0-1).
terrapalus-fog-opacity=Opacity of the fog effect (0 = none, 1 = full).
terrapalus-lowland-size=Controls the size of swamp/lowland areas on Terra Palus.
terrapalus-moisture-threshold=Moisture level threshold for terrain generation.
terrapalus-mud-basin-scale=Controls the frequency of mud basins. Higher = less frequent.
terrapalus-small-spawner-frequency=Frequency of small enemy spawners.
terrapalus-small-spawner-size=Size multiplier for small enemy spawners.
terrapalus-spawner-frequency=Frequency of large enemy spawners.
terrapalus-spawner-size=Size multiplier for large enemy spawners.
terrapalus-starting-area-multiplier=Multiplier for the overall starting area size.
terrapalus-starting-distance=Distance from spawn to starting lowlands in tiles.
terrapalus-starting-fertile-radius=Radius of starting fertile soil spots in tiles.
terrapalus-starting-radius=Radius of starting lowland areas in tiles.
