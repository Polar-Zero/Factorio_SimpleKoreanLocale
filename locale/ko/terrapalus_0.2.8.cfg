[item-description]
palusium-ore=팔루슘 광석에는 열에 반응하여 활성화되는 작은 자외선 결정이 들어 있습니다.
palusium-plate=팔루슘 판은 팔루슘 자외선 기술을 구성하는 데 사용되는 중간 생산품입니다.
palusium-powder=팔루슘 분말은 팔루슘 광석을 분쇄하여 쉽게 접근 가능한 결정 형태로 만든 것입니다.
palusium-crystal=팔루슘 결정은 자외선 스펙트럼에서 다양한 용도로 사용할 수 있습니다.
armor-charging-station=15칸 범위 내 파워 아머와 차량 장비 그리드를 무선으로 충전합니다. 충전 중일 때만 전력을 소모합니다.
armor-charging-station-mk2=22칸 범위에 2MW 충전을 제공하는 개선된 충전소.
armor-charging-station-mk3=30칸 범위에 4MW 충전을 제공하는 고급 충전소.
ultravium-battery=울트라븀 에너지가 주입된 소형 건전지. 파워 아머 장비를 충전할 때 사용합니다.
ultravium-battery-pack=여러 개의 울트라븀 전지가 포함된 대형 건전지 팩입니다. 파워 아머 장비에 50MJ를 제공합니다.
ultravium-power-cell=정교한 울트라븀 기술을 활용한 고급 고용량 파워 셀입니다. 파워 아머 장비에 200MJ를 제공합니다.
uv-defense-turret=자외선 기술로 강화된 개인용 방어 포탑입니다. 광선에 맞은 적들은 공포에 질려 도망칩니다. 장비 그리드에 넣어 사용하세요.
uv-personal-shield=자외선 기술로 강화된 개인용 보호막, 10타일 반경 내의 적을 얼리고, 스트레이퍼 투사체를 차단합니다. 얼릴 때마다 20kJ, 투사체 방어시 5kJ가 소비됩니다.

