[entity-description]
inhibitor-lamp=이 조명은 적에게 신경학적 반응을 일으키는 자외선 파장을 이용하여 적을 얼려버릴 수 있습니다.
palusium-ore=거칠고 결정화된 짙은 파란빛의 광석. 어둠 속에서도 빛을 발합니다.
uv-turret=자외선을 집중시켜 일부 적을 물리치고 혼란에 빠뜨립니다.
armor-charging-station=15칸 범위 내 파워 아머와 차량 장비 그리드를 무선으로 충전합니다. 충전 중일 때만 전력을 소모합니다.
armor-charging-station-mk2=22칸 범위에 2MW 충전을 제공하는 개선된 충전소.
armor-charging-station-mk3=30칸 범위에 4MW 충전을 제공하는 고급 충전소.
inhibitor-lamp-damage=더 유해한 자외선을 방출하는 공격적인 조명입니다. 적의 이동 속도를 50% 감소시키고, 틱당 5 피해를 줍니다.
inhibitor-lamp-mk2=동결 반경가 40% 증가된 확장된 억제 조명.
inhibitor-lamp-mk3=동결 반경가 80% 증가된 최대 효율의 억제 조명.
uv-spotlight=30초 동안 적을 빠르게 정지시킨 후 다음 대상으로 전환하는 신속 타겟팅 스포트라이트입니다. 최소한의 피해, 순수한 군중 제어 도구.
uv-turret-aoe=대상 주위 6칸 범위의 모든 적에게 피해를 주는 광역 자외선 포탑.
uv-turret-chain=연쇄 피해를 주는 자외선 포탑입니다. 주 대상에 20 데미지, 8칸 범위의 주변 적은 12 데미지를 입힙니다.
uv-turret-mk2=사거리와 (35칸) 피해량이 향상된 고급 자외선 포탑.
uv-turret-mk3=확장된 사거리와 (42타일) 최고 피해량을 가진 최대 출력의 자외선 포탑.

[equipment-name]
uv-defense-turret=자외선 방어 포탑
uv-personal-shield=개인용 자외선 보호막

[equipment-description]
uv-defense-turret=자외선 기술로 강화된 개인용 방어 포탑입니다. 광선에 맞은 적들은 공포에 질려 도망칩니다.
uv-personal-shield=자외선 기술로 강화된 개인용 보호막, 10타일 반경 내의 적을 얼리고, 스트레이퍼 투사체를 차단합니다. 얼릴 때마다 20kJ, 투사체 방어시 5kJ가 소비됩니다.

[fluid-name]
ultravium=울트라븀

[fluid-description]
ultravium=테라 팔루스의 늪에서 생성된 에너지가 넘치고 활동적인 유체 형태의 팔루슘 결정체입니다.

