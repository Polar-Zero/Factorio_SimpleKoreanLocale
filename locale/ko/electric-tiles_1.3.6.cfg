[mod-setting-description]
electric-tiles-chunk-subdivision=모드에서 청크의 크기를 다르게 간주하도록 합니다.\n\n[color=#ffe600]경고:[/color] 이 설정은 모든 표면에 대한 재계산을 진행합니다. 본인 책임 하에 진행하세요.
electric-tiles-debug-mode=디버그 모드를 활성화합니다.
electric-tiles-update-delay=전력망 업데이트 시간 간격을 설정할 수 있습니다.
F077ET-base-processing-amount=각 기본 업데이트마다 (플레이어 관련) 처리할 청크 갯수를 조정합니다.
F077ET-base-update-delay=각 그리드의 기본 업데이트 (플레이어 관련)를 진행할 시간 간격을 조정합니다.
F077ET-chunk-subdivision=모드에서 청크의 크기를 다르게 간주하도록 합니다.
F077ET-debug-mode=디버그 모드를 활성화합니다.
F077ET-long-processing-amount=각 중규모 업데이트마다 (로봇 관련) 처리할 청크 갯수를 조정합니다.
F077ET-long-update-delay=각 그리드의 중규모 업데이트 (로봇 관련)를 진행할 시간 간격을 조정합니다.