[mod-name]
Diggs=Diggs - 광맥 고갈까지 시간 표시(Diggs - timer to empty ore)

[mod-description]
Diggs=이 모드는 채광 드릴 위에 텍스트를 추가하여, 고갈까지 남은 시간을 알 수 있도록 합니다.\n\n번역: SimpleKoreanLocale(PolarZero)


[mod-setting-name]
diggs-show-seconds=초 단위 표시

[mod-setting-description]
diggs-show-seconds=활성화하면, 남은 시간이 HH:MM:SS 단위로 표시됩니다. 비활성 상태일 경우 HH:MM만 표시됩니다.