[tips-and-tricks-item-description]
warptorio=워프토리오 (우주 시대)
warptorio-warp-trains=기차는 특별 기차역을 사용하여 [font=default-bold]지상[/font]과 [font=default-bold]공장 바닥[/font] 사이에서 워프할 수 있습니다.\n\n기차를 워프하려면 다음 이름의 역에 [color=yellow]완전히 정차[/color]한 상태여야 합니다:\n - [color=orange]WarpGround[/color] (공장 -> 지상 이동)\n - [color=orange]WarpFactory[/color] (지상 -> 공장 이동)\n\n[color=red][font=default-bold]중요:[/font][/color]\n두 역의 방향이 [color=red]동일해야 합니다[/color](동/서/남/북)\n\n역 이름만 일치하고, 방향이 일치하지 않은 상태일 경우, 기차가 [font=default-bold]워프할 수 없습니다[/font].\n열차가 수동 조작 상태이거나, 엔지니어가 탑승한 경우에도 [font=default-bold]워프할 수 없습니다[/font].\n\n[color=green]팁:[/color] 두 역의 방향이 일치하도록 역을 복사하거나 설계도면을 만들어보세요. 한 방향에 여러 기차역을 보유하고 싶을 경우, 기차를 향하게 할 역이 아닌 다른 역을 모두 비활성화할 필요가 있습니다.
warptorio-asteroids=Once [technology=warp-factory-platform-2] 연구가 완료되면, 워프는 즉각적인 순간이동이 아닌, 공장이 [font=default-bold]우주 공간[/font]을 따라 이동하며, 그 과정에서는, 바이터가 아닌 소행성이 대신 등장하게 됩니다.\n\n소행성 크기는 [font=default-bold]고정되어 있지 않으며[/font] — 현재 진화 요인에 맞는 [font=default-bold]모든 크기[/font]로 생성될 수 있습니다:\n • 진화 요인 [color=orange]> 0%[/color] -> 소형 소행성\n • 진화 요인 [color=orange]> 25%[/color] -> + 중형 소행성\n • 진화 요인 [color=orange]> 61%[/color] -> + 대형 소행성\n • 진화 요인 [color=orange]> 81%[/color] -> + 거대한 소행성\n\n[color=green]참고:[/color] 소행성은 진화도가 0%일 경우 생성되지 않지만, 소행성 수집기를 미리 준비하는 것을 권장합니다. - 플랫폼 연구가 진행될수록 진화도는 가파르게 증가될 것입니다.
warptorio-evolution-scaling=워프토리오의 적 진화는 시간이나 공해에 기반하지 않으며[/font], 핵심적인 플랫폼 연구 진행 상황에 따라 결정됩됩니다.\n\n완료된 홱심 마일스톤 연구에 따라 적 진화 요인이 고정된 값으로 설정됩니다.:\n • [technology=warp-ground-platform-4] -> [color=orange]10%[/color]\n • [technology=warp-factory-platform-3] -> [color=orange]15%[/color]\n • [technology=warp-ground-platform-5] -> [color=orange]20%[/color]\n • [technology=warp-factory-platform-4] -> [color=orange]30%[/color]\n • [technology=warp-ground-platform-6] -> [color=orange]40%[/color]\n • [technology=warp-factory-platform-5] -> [color=orange]50%[/color]\n • [technology=warp-ground-platform-7] -> [color=orange]60%[/color]\n • [technology=warp-factory-platform-6] -> [color=orange]70%[/color]\n • [technology=warp-ground-platform-8] -> [color=orange]80%[/color]\n • [technology=warp-factory-platform-7] -> [color=orange]90%[/color]\n • [technology=warp-end-prepare] -> [color=red]100%[/color]\n\n[color=green]참고:[/color] 더 높은 단계의 적을 마주할 준비가 되지 않았다면, 방어가 준비될 때까지 기술 연구를 중단해보세요.
warptorio-planet-hopping=모드에서 플레이어가 최근에 방문한 [font=default-bold]2개의 행성[/font]을 내부적으로 기록합니다.\n\nHUD의 [font=default-bold]다음 행성[/font] 표시창에 행성 이름이 [color=red]빨간색[/color]으로 표시된다면, 이는 곧 [font=default-bold]복귀 도약[/font]을 시도하게 된다는 뜻이며, 이는 즉, [font=default-bold]2번 전[/font]에 방문했던 행성으로 되돌아갈 것이라는 것을 의미합니다.\n\n[color=red][font=default-bold]복귀 도약 후:[/font][/color]\n도약 이후 적의 [font=default-bold]공세 횟수[/font]와 [font=default-bold]공세 타이머[/font]는 [font=default-bold]재설정되지 않습니다[/font]! 해당 행성에서 중단되었던 지점부터 적의 공세가 다시 시작될 것이며, 이후 동일한 강도로 지속되거나 더 강해질 것입니다.\n\n[color=green]참고:[/color] [color=red]빨간색[/color] 목적지는 대비할 것을 의미합니다. 더 치열한 전투에 대비하지 못했다면, 워프하기 전 남은 시간을 활용해 방어선을 강화하세요.

