[mod-name]
ghost-counter=고스트 카운터(Ghost Counter)

[mod-description]
ghost-counter=선택된 영역이나 청사진에 포함된 모든 고스트 객체의 목록을 생성하세요. 인벤토리에 무엇이 있는지 확인한 뒤, 물류 네트워크를 이용해 필요한 아이템을 빠르게 요청할 수 있습니다.\n\n번역: SimpleKoreanLocale(PolarZero)


[controls]
ghost-counter-selection-hotkey=고스트 카운터 활성화

[ghost-counter-gui]
cancel-all-tooltip=모든 임시 물류 요청 취소
close-button-tooltip=창 닫기
craft-all-tooltip=누락된 모든 아이템 제작 시도
existing-logistic-request-tooltip=기존 물류 요청이 필요한 아이템을 충족합니다.
get-signals-tooltip=고스트 카운트를 회로 신호로 내보내기
hide-empty-requests-tooltip=배치 완료된 고스트 객체 유형 자동 숨기기 활성화
request-all-caption=모두 요청
request-all-tooltip=누락된 모든 아이템에 대한 임시 물류 요청을 추가합니다.
set-temporary-request-tooltip=__CONTROL_LEFT_CLICK__: __1__ __2__에 대한 임시 물류 요청을 추가합니다.\n__CONTROL_KEY_SHIFT____CONTROL_STYLE_BEGIN__ + __CONTROL_STYLE_END____CONTROL_LEFT_CLICK__: 제작을 진행합니다.
unset-temporary-request-tooltip=__CONTROL_LEFT_CLICK__: 임시 물류 요청을 취소합니다.\n__CONTROL_KEY_SHIFT____CONTROL_STYLE_BEGIN__ + __CONTROL_STYLE_END____CONTROL_LEFT_CLICK__: 제작을 진행합니다.

[ghost-counter-message]
crafts-attempted-none=아이템을 제작할 수 없습니다.
crafts-attempted-quality=이 품질의 아이템을 제작할 수 없습니다.
crafts-not-needed=추가적인 제작이 필요하지 않습니다.
failed-to-clear-cursor=커서를 비우지 못했습니다.
missing-constant-combinator-prototype=게임 객체 프로토타입에서 constant-combinator를 찾을 수 없습니다.

[item-name]
ghost-counter-tool=고스트 카운터 선택 도구

[shortcut]
make-ghost-counter=고스트 카운터

[mod-setting-name]
ghost-counter-min-update-interval=최소 업데이트 간격

[mod-setting-description]
ghost-counter-min-update-interval=모드 데이터 업데이트를 진행할 최소 틱 간격을 조정합니다. 낮은 값일수록 모드 UI가 더 자주 갱신됩니다. UPS 성능에 미치는 영향을 최소화하려면 이 설정값을 증가시키세요. (사용 가능한 값: 5 ~ 120 / 기본값: 10)