[mod-name]
Nanobots3=나노봇: 초기 로봇 3.0(Nanobots: Early Bots 3.0)

[mod-description]
Nanobots3=품질 지원, 차량 자동화, 자동 포탑 공급 기능을 포함한, 개인용 건설에 사용할 수 있는 나노봇을 게임에 추가합니다. 고스트를 건설하거나, 건물을 수리하고, 포탑 탄창을 자동으로 보충하세요. 로보포트 없이도 작동합니다. 우주 시대 호환성과 70% UPS 개선을 추가한 버전입니다. 이제 어디든 배치하세요!\n\n번역: SimpleKoreanLocale(PolarZero)


