[item-description]
gun-nano-emitter=나노 방출기 무기가 선택된 상태에서, 방출기에 장비된 탄약에 맞게 프로그래밍된 나노봇을 자동으로 보냅니다. 나노봇은 기존 물류 네트워크에서 작동하지 않습니다.
ammo-nano-termites=범위 내의 나무를 파괴합니다. 목재 등의 아이템은 소실됩니다.
ammo-nano-scrappers=범위 내의 해체하도록 표시된 모든 객체를 파괴합니다. 파괴한 객체는 영구적으로 소실됩니다.
ammo-nano-deconstructors=범위 내의 해체하도록 표시된 모든 객체를 해체하고 아이템을 회수합니다.
ammo-nano-constructors=인벤토리의 아이템을 사용하여 범위 내의 고스트 객체를 건설합니다. 수리 팩을 이용해 피해를 입은 객체의 수리도 가능합니다.
roboport-interface-main=작업을 할당하기 위해 가장 가까운 물류 네트워크과 연결합니다.

