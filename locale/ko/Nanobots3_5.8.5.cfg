[entity-description]
roboport-interface-cc=네트워크에서 비활성 로봇에 특별한 작업을 부여하는 신호를 설정합니다. 원목을 설정하면 로봇에게 나무를 자르라고 명령하고, 타일을 설정하면 로봇에게 타일을 만들라고 명령합니다. 더 많은 예제는 문서를 참조하세요.
roboport-interface-main=가장 가까운 물류 네트워크와 인터페이스하여 작업 할당.
roboport-interface-scanner=네트워크를 스캔하여 사용 가능한 작업을 보고합니다.

