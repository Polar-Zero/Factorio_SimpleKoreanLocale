[mod-setting-description]
nanobots-active-emitter-mode=활성화하면, 나노봇이 작동하려면 나노 방출기 무기가 선택된 상태여야 합니다.
nanobots-afk-time=나노봇이 꺼지기 전까지 얼마나 오랫동안 방치되어야 하는지 조정할 수 있습니다. 0: 꺼지지 않음
nanobots-auto-defense-adaptive-scan=활성화하면, 적이 근처에 있을 때 더 빠르게 스캔하고 (2배 속도), 평상시에 더 느리게 스캔합니다 (1.5배 간격). 평상시에 UPS 성능 절약을 절약하는 데 도움이 됩니다.
nanobots-auto-defense-ammo-quality-priority=다른 품질의 동일한 탄약 유형이 존재하는 상황에서 어떤 품질의 아이템을 먼저 사용할지 조정합니다. 평화 모드에서 사용됩니다 (또는 전투 모드 비활성화시 항상 사용됨)
nanobots-auto-defense-ammo-type-priority=여러 탄약 유형을 사용할 수 있는 상황에서 우선적으로 선호할 탄약 유형을 조정합니다. 평화 모드에서 사용됩니다 (또는 전투 모드 비활성화시 항상 사용됨)
nanobots-auto-defense-artillery-delivery=대포마다 보급할 탄약 수량을 지정합니다.
nanobots-auto-defense-artillery-threshold=대포에 보급하기 전 탄약 임계값을 지정합니다.
nanobots-auto-defense-artillery-turrets=활성화하면, 대포 포탑에 자동으로 탄약을 보급합니다.
nanobots-auto-defense-auto-enable-combat=활성화하면, 적이 근처에 있을 때 자동으로 배달 시스템을 활성화하고, 평상시에 비활성화합니다. 사용할 탄약 유형만 변경하는 전투 우선순위 모드와는 별도의 설정입니다.
nanobots-auto-defense-combat-mode=활성화하면, 적의 존재 여부에 따라 탄약 우선순위를 자동으로 전환하도록 합니다.\n전투 중: 항상 최고 성능의 탄약을 사용\n평상시: 아래 탄약 우선순위 설정을 사용합니다.\n항상 수동 설정을 사용하려면 비활성화하세요.
nanobots-auto-defense-delivery=포탑마다 보급할 탄창 수량을 지정합니다.
nanobots-auto-defense-gun-turrets=포탑에 보급하기 전 탄창 임계값을 지정합니다.
nanobots-auto-defense-low-nano-threshold=나노 방출기에 탄약이 이 설정값만큼 남아있다면 소리와 함께 경고를 표시합니다. 비활성화하려면 0으로 설정하세요.
nanobots-auto-defense-max-per-tick=스캔당 확인할 최대 포탑 수량을 지정합니다.
nanobots-auto-defense-modded-turrets=우주 시대 DLC의 로켓 포탑, 레일건 포탑 등이나 다른 모드의 탄약 포탑을 자동으로 보급하도록 합니다. 이 설정은 객체 유형별 감지를 사용합니다. (탄약 포탑, 대포 포탑)
nanobots-auto-defense-scan-interval=기본 스캔 간격(60틱 = 1초)\n적응형 스캔 사용시: 전투 시 0.5x, 평상시 1.5x
nanobots-auto-defense-show-projectile=탄약이 보급될 때 플레이어로부터 포탑으로 날아가는 시각적 투사체를 표시합니다. 대규모 기지에서 성능을 향상하려면 비활성화하세요.
nanobots-auto-defense-threshold=포탑에 탄약이 이 임계값보다 적게 남으면 보급 요청이 진행됩니다.
nanobots-auto-defense-warning-interval=포탑에 보급을 진행할 수 없는 경우 (호환되는 탄약 없음) 경고를 표시할 빈도를 조정합니다. 사용 가능한 값: 30 ~ 300(초)
nanobots-cell-queue-rate=로보포트 인터페이스에서 대기 중인 로보포트를 확인할 함수를 진행하는 시간 간격을 조정합니다.
nanobots-debug-defense-system=자동 방어 시스템의 탄약 보급에 대한 로그를 표시합니다. [font=default-semibold]로그 수준 '표준'이상에서 작동함[/font]
nanobots-debug-repair-system=시스템의 수리 및 건설과 관련된 대한 로그를 표시합니다. [font=default-semibold]로그 수준 '표준'이상에서 작동함[/font]
nanobots-equipment-auto=활성화하면 로봇 칩 장비를(유닛 발사기, 아이템 수집기, 나무 절단기 등) 자동으로 활성화합니다. 비활성화하면 수동으로 활성화할 필요가 있습니다.
nanobots-free-bots-per=로보포트 인터페이스에만 해당됩니다(나노봇 제외!)\n물류 네트워크에서 일반 건설 로봇을 얼마나 대기 상태로 유지할지 결정합니다. \n0%: 모든 로봇 사용, 50%: 다른 작업에 절반만 사용, 100%: 로봇을 사용하지 않음.
nanobots-indside-area-radius=대기열에 있는 엔터티가 취소되기 전에 대기열에서 얼마나 멀리 떨어져 있어야 하나요?.
nanobots-log-level=나노봇 모드의 디버그 로그 수준을 설정합니다.\n'비활성화': 로깅 비활성화\n'기본': 기본적인 정보만\n'디버그': 자세한 정보\n아래의 선택 상자 설정을 통해 로그를 활성화할 행성을 조정하세요.
nanobots-low-nano-warning-interval=나노봇 탄약이 부족할 때 경고(떠다니는 문자)를 표시할 빈도. 사용 가능한 값: 30 ~ 300(초)
nanobots-nano-build-tiles=나노봇이 콘크리트 등 바닥재 타일을 배치할 수 있도록 허용합니다.
nanobots-nano-fullfill-requests=나노봇이 모듈 등의 아이템 요청 프록시를 수행하려고 시도합니다.
nanobots-nano-poll-rate=나노봇 작업을 검색할 빈도를 조정합니다. (틱 단위) 틱당 한 명의 플레이어가 처리됩니다.
nanobots-nano-queue-per-cycle=주기당 대기열에 대기 중인 최대 객체 수.
nanobots-nano-queue-rate=대기열 작업 사이의 틱 지연.
nanobots-nano-repair=나노봇은 인벤토리에 있는 수리 팩을 사용하여 손상된 개체를 자동으로 수리합니다.
nanobots-nanobots-auto=활성화하면 나노 방출기가 자동으로 작동합니다. 비활성화하면 수동으로 나노봇을 특정 영역에 발사해야 합니다. (아직 사용할 수 없음)
nanobots-network-limits=활성화하면, 나노봇을 파견하기 전에 기존 물류 네트워크를 확인합니다.
nanobots-repair-cat-defense=포탑, 벽, 출입문, 레이더, 지뢰
nanobots-repair-cat-other=보관함, 상자, 저장 탱크 및 기타 관련 개체
nanobots-repair-cat-power=모든 전력망 관련 객체(전기 + 증기/열/유체 인프라)
nanobots-repair-cat-production=조립 기계, 용광로, 채광 드릴, 투입기, 로보포트, 연구소, 신호기
nanobots-repair-cat-transport=자동차, 스파이더트론, 기차 및 화물차
nanobots-repair-combat-enemy-radius=이 반경 내에 적이 있을 때 플레이어가 전투 중인 것으로 간주합니다
nanobots-repair-combat-important-only=활성화하면, 전투 중일 때 중요한 객체만 수리하도록 합니다. (포탑/벽/출입구 → 레이더 → 지뢰 → 차량)
nanobots-repair-combat-recent-damage-seconds=이 시간 내에 플레이어가 피해를 입었다면, 플레이어가 전투 중인 것으로 간주합니다
nanobots-repair-hp-per-action=수리를 진행할 때마다 회복할 체력량을 조정합니다.
nanobots-repair-max-sessions=플레이어당 최대 활성화할 수리 세션 수를 조정합니다.
nanobots-repair-requeue-delay=수리 단계 사이의 틱 지연 간격을 조정합니다.
nanobots-repair-start-threshold=객체의 남은 체력이 해당 값 %보다 적을 때에만 수리를 진행합니다 (경미한 피해를 무시)
nanobots-repair-throttle-ticks=동일한 객체에 대해 이 틱 간격보다 더 자주 체력을 확인하지 않도록 합니다 (0: 비활성화)
nanobots-wrong-ammo-warning-interval=건설 로봇이 아닌 나노봇 탄약으로 인해 (예: 흰개미) 자동 방어가 일시 중지되었다는 알림를 표시할 빈도입니다. 비활성화하려면 0으로 설정하세요.