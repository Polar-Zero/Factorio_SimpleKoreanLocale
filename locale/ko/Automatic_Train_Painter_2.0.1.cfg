[mod-name]
Automatic_Train_Painter=자동화된 기차 도색(Automatic Train Painter)

[mod-description]
Automatic_Train_Painter=적재한 아이템에 맞도록 기관차와 화물차의 색상을 자동으로 지정합니다.\n\n번역: SimpleKoreanLocale(PolarZero)


[equipment-name]
manual-color-module=자동 도색 방지 모듈

[error-message]
color-length-error=자동화된 기차 도색 | [img=utility/warning_icon] 경고: [font=default-large-bold]__1__[/font] 기본 색상 값 길이가 잘못되었습니다 [font=default-large-bold](__2__)[/font]. 3자리, 6자리 또는 공백이어야 합니다.
custom-colors-loaded=자동화된 기차 도색 | 사용자 지정 색상을 성공적으로 불러왔습니다.
custom-colors-not-loaded=자동화된 기차 도색 | [img=utility/warning_icon] 경고: 사용자 지정 색상이 올바른 테이블 형식으로 지정되지 않았습니다. 색상이 로드되지 않았습니다.
custom-colors-not-loaded-tag=사용자 지정 색상 테이블에서 오류가 발견되었습니다. 색상이 로드되지 않았습니다.
invalid-custom-color-key=자동화된 기차 도색 | [img=utility/warning_icon] 경고: 아이템 [font=default-large-bold]"__2__"[/font]에 대한 잘못된 색상 키 [font=default-large-bold]"__1__"[/font]를 발견했습니다: \n찾음: [font=default-large-bold]"__3__"[/font], 예상: "abgr"\n색상 테이블에는 "r", "g", "b" 및 "a" 값이 포함되어야 합니다.
invalid-custom-color-value=자동화된 기차 도색 | [img=utility/warning_icon] 경고: R G B A 값이 잘못되었습니다: 아이템 [font=default-large-bold]"__3__"[/font]의 [font=default-large-bold]"__1__" = "__2__"[/font]
invalid-custom-item-name=자동화된 기차 도색 | [img=utility/warning_icon] 경고: 잘못된 아이템 이름이 발견되었습니다: [font=default-large-bold]"__1__"[/font]\n이름에는 영어, 숫자, "-" 또는 "_" 만 포함할 수 있습니다.
invalid-custom-table=자동화된 기차 도색 | [img=utility/warning_icon] 경고: 입력 문자열을 유효한 테이블로 변환할 수 없습니다.
possible-custom-color-values=R G B A 값은 0에서 255 사이여야 합니다.

[item-name]
manual-color-module=자동 도색 방지 모듈

[item-description]
manual-color-module=이 모듈이 장착된 열차는 자동으로 도색되지 않습니다.

[mod-setting-name]
atp-custom-colors-enable=사용자 지정 색상 사용
atp-custom-colors-list=사용자 지정 색상 리스트
atp-ltn-paint=LTN 배송 도색 활성화
loc-eqpm-grid=기관차 장비 그리드 활성화
loc-eqpm-grid-h=기관차 장비 그리드 높이
loc-eqpm-grid-w=기관차 장비 그리드 너비
paint-cargo-wagon=화물차 도색 허용
paint-fluid-wagon=유체 화물차 도색 허용
paint-loco=기관차 도색 허용
u-cargo-wagon=도색되지 않은 화물 왜건 색상
u-fluid-wagon=도색되지 않은 유체 왜건 색상
u-loco=도색되지 않은 기관차 색상
unpaint-empty=빈 열차 도색 해제

[mod-setting-description]
atp-custom-colors-enable=Off: 사용자 지정 색상을 사용하지 않습니다\nPriority: 사용자 지정 색상을 모드의 색상 데이터베이스보다 우선시합니다.\nOnly: 사용자 지정 색상만 사용합니다. 모드의 색상 데이터베이스는 적용되지 않습니다.
atp-custom-colors-list=설정 값은 다음과 같은 테이블 형식으로 지정되어야 합니다 합니다.\n\n[font=default-bold]{\n['item1']={r=000,g=000,b=000,a=000}\n['item2']={r=255,g=255,b=255,a=255}\n}[/font]\n\n[font=default-small]아이템 이름은 내부 프로토타입 ID 기준이며, 영문, 숫자, "-" 또는 "_" 문자가 포함될 수 있습니다.\nrgb & a 값은 0에서 255 사이여야 합니다.\n테이블 행은 실질적인 제한 없이 추가하는 것이 가능합니다.[/font]
atp-ltn-paint=물류 열차 네트워크에서 파견한 열차가 차고지를 떠나면 페인트칠을 합니다. (일반적으로 노란색 표시등이 켜지면)
custom-colors-list=미니맵에서 사용자 지정 색상을 적용합니다.
loc-eqpm-grid-h=(사용 가능한 값: 2 ~ 16 / 기본값: 4)
loc-eqpm-grid-w=(사용 가능한 값: 2 ~ 16 / 기본값: 2)
paint-fluid-wagon=제대로 작동하려면 fluid wagon mask 모드가 필요합니다.
u-cargo-wagon3자리 또는 6자리 16진수 값이나 공백이어야 합니다. \n기본값: [color=#6D3A00][font=default-bold]6D3A00[/font][/color]
u-fluid-wagon=3자리 또는 6자리 16진수 값이나 공백이어야 합니다. \n기본값: [color=#C8C8C8][font=default-bold]C8C8C8[/font][/color]
u-loco=3자리 또는 6자리 16진수 값이나 공백이어야 합니다. \n기본 회색: [color=#E4D1C7][font=default-bold]E4D1C7[/font][/color]\n원본 빨간색: [item=locomotive] = [color=#EA1100][font=default-bold]EA1100[/font][/color]