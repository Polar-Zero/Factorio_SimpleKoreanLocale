[mod-description]
Better-Planets=궤도 조정, 아이콘, 기술 수정 등을 통한 유연한 항성계 구조 편집을 가능하게 합니다. Better StarMap Background 모드와 플레이할 수 있도록 설계되었지만, 독립 실행 역시 가능합니다.\n\n번역: SimpleKoreanLocale(PolarZero)
BetterPlanets=궤도 조정, 아이콘, 기술 수정 등을 통한 유연한 항성계 구조 편집을 가능하게 합니다. Better StarMap Background 모드와 플레이할 수 있도록 설계되었지만, 독립 실행 역시 가능합니다.\n\n번역: SimpleKoreanLocale(PolarZero)

[bp]
desc-angle=각도(도). 북쪽을 기준으로 시계 반대 방향으로 회전합니다. 사용 가능한 값: 0 ~ 360
desc-connlen=내부 경로 "부모 ↔ 위성" 거리 (km)
desc-enable=이 객체에 사용자 지정 각도/반경을 적용합니다. 비활성화되었다면 다른 모드에서 제공한 값을 그대로 반영합니다.
desc-enable-asteroid-belt-clones=활성화하면 새로운 소행성대 위치 6개를 추가로 생성합니다: 내부 3개, 외부 3개. AsteroidBelt 모드 필요.
desc-enable-connection-normalizer=활성화하면 우주 연결 길이를 10,000km 단위로 반올림하여 더 깔끔하게 표시합니다. 정확한 값을 유지하려면 비활성화하세요.
desc-enable-kuiper-belt-clones=활성화하면 태양계 외부에 3개의 카이퍼 벨트 위치를 추가로 생성합니다. AsteroidBelt 모드 필요.
desc-enable-remove-zero-degree-connections=활성화하면 내부 행성의 0도(북위) 선을 가로지르는 우주 연결을 자동으로 제거하여, 성계 지도 표시를 개선할 수 있습니다.
desc-enable-space-connections=활성화하면 이 모드가 우주 연결을 관리합니다. (특히 위성의 경우) 행성 위치를 변경하거나 다른 모드가 연결을 처리하도록 하려면 비활성화하세요.
desc-enable-tech-reparent=활성화하면 행성 티어에 따라 기술 전제 조건을 조정합니다. 기술을 직접 관리하려면 비활성화하세요.

desc-master-toggle=활성화하면 아래의 모드 설정의 사용자 지정 각도/반경/배율을 사용합니다. 비활성화하면 모드 기본값만 사용됩니다. (모든 사용자 지정 설정 무시)
desc-radius=부모 궤도와의 궤도 거리. (지도 단위)\n사용 가능한 값: 0-5000
desc-scale=우주 지도의 아이콘 크기를 조정합니다. (비어 있음 ~ 변경하지 않음)
enable-asteroid-belt-clones=소행성대 위치 추가
enable-connection-normalizer=연결 길이 정규화 프로그램 사용
enable-kuiper-belt-clones=카이퍼 벨트 위치 추가
enable-remove-zero-degree-connections=0° 우주 연결 제거
enable-space-connections=우주 연결 다시 그리기 활성화
enable-tech-reparent=기술 재조정 활성화
master-toggle=사용자 지정 매개변수 설정 사용
setting-angle-child=↳ 각도 (°)
setting-connlen-child=↳ 경로 길이(km)
setting-radius-child=↳ 반경
setting-scale-child=↳ 크기

