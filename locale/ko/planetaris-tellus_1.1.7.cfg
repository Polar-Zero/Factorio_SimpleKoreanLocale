[tips-and-tricks-item-description]
tellus-bioassembler=[entity=planetaris-bioassembler]은 텔루스 고유 제작법과 재료를 처리할 수 있는 조립 기계입니다.\n[entity=planetaris-bioassembler]은 살아있는 객체로, 사용하기 전 먼저 자연적인 땅에 [item=planetaris-bioassembler-seed]을 심어야 합니다. 모든 식물에 생명 주기가 존재하는 것과 비슷하게, [entity=planetaris-bioassembler] 역시 결국 죽어버리겠지만, 완전히 분해되기 전에 [item=nutrients]을 투입하는 것으로 되살릴 수 있습니다. 참고: [entity=construction-robot]으로 [entity=planetaris-bioassembler]을 배치하는 것도 가능합니다.
tellus-briefing=[planet=tellus]는 박테리아와 기생충에 감염된 행성으로, 대기 중의 꽃가루는 [entity=small-wasp]의 번식을 돕고 일부 물질에 영향을 미치지만, 텔루스 기술에 대해 연구를 진행하면 해결책을 찾을 수 있을지도 모릅니다.\n엽록소와 균사체는 [entity=condensing-agricultural-tower]로 재배한 뒤 [entity=planetaris-bioassembler]에서 가공하여 획득할 수 있습니다.\n[entity=iron-ore], [entity=copper-ore], [entity=crude-oil], [entity=coal], [entity=uranium-ore]은 존재하지 않지만 현지 식물을 활용하여 필요한 품목을 생산하는 방법을 찾을 수 있습니다.\n농업을 통해 생산할 수 있는 대부분의 아이템은 시간이 지나면 부패한다는 추가적인 문제가 있습니다. [item=planetaris-bioengineering-science-pack]조차도 부패 가능하므로, 비축할 수 없습니다. 또한, [item=planetaris-pathological-science-pack]이 부패하면 [entity=big-wasp]가 출현하므로, 이에 대한 해결책 역시 마련해야 합니다.
tellus-roots=파이프는 꽃가루에 의해 쉽게 부식되며, 텔루스 조립 기계는 부식과 무관하게 [entity=pipe]에 연결할 수 없지만, [entity=planetaris-root]을 이용하면 수액을 운반할 수 있습니다. 22}로 파이프에서 나오는 유체로 뿌리를 채울 수 있습니다.

