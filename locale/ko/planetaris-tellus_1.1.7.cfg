tellus-easy-not-damage-while-stop=[entity=planetaris-bioassembler][entity=planetaris-incubator] 살아있는 기계가 대기 중 (작동하지 않는 중) 피해를 받지 않게 되지만, 작동 중일 경우 1 추가 피해를 입게 됩니다.
tellus-easy-spoiling-enemies=적 형태로 변이하는 아이템이 여러 마리의 베헤모스 변종 대신, 조산한 중간 크기 변종 한마리만을 생성하도록 합니다.