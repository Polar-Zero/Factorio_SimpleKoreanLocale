[mod-setting-description]
bottleneck-analyzer-diagnostics=샘플링 가정에 대한 오프라인 분석을 위해 스윕별 진단을 스크립트 출력/보틀림 진단.로그에 기록합니다.
bottleneck-analyzer-enabled=병목 현상 기록을 활성화 또는 비활성화합니다. 비활성화하여 CPU 영향을 확인하세요.
bottleneck-analyzer-max-samples=링 버퍼에 제작법당 보관할 표본 수입니다. 값이 클수록 기록 가능 횟수가 많아지지만 저장 파일 크기가 증가합니다.
bottleneck-analyzer-sample-rate=병목 현상 데이터를 위해 기계를 분석할 빈도. 값이 낮을수록 더 세분화된 데이터가 제공되지만 메모리와 CPU 사용량이 증가됩니다.