[mod-name]
bottleneck-analyzer=병목 분석기(Bottleneck Analyzer)

[mod-description]
bottleneck-analyzer=공장 전체에서 어떤 재료가 생산 지연을 일으키는지 추적합니다. 모든 제작 기계를 샘플링하고, 누락된 재료를 기록하고, 시간대별 선별을 통해 병목 현상 통계를 종합적으로 표시합니다.\n\n번역: SimpleKoreanLocale(PolarZero)


