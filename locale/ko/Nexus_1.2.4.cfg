[mod-setting-description]
nexus-threat-activation=비활성화된 상태일 경우, 이 모드의 모든 스크립트와 콘텐츠가 비활성화됩니다.
nt-base-damage=불안정도가 0%인 객체에 번개가 가하는 데미지.
nt-damage-inc=불안정도 1%마다 추가할 번개 피해량을 정의합니다.
nt-drill-interval=성능 개선 설정: 채광 드릴 계산 사이의 틱 간격. 높은 값으로 설정하면 대규모 기지에서의 CPU 사용량 절약에 도움이 될 수 있습니다. (사용 가능한 값: 1 ~ 60)
nt-drill-rate=활성화된 채광 드릴당 초당 불안정성 증가 속도를 조정합니다.
nt-max-shield=전역 보호막이 저장할 수 있는 최대 에너지량을 정의합니다.
nt-recipe-bonus=조립 기계가 안정화 제작법을 제작할 때 초당 생산하는 보호막 에너지량을 조정합니다.
nt-shield-drain=번개 데미지를 흡수할 때 사용될 보호막 에너지량의 배율을 조정합니다.
nt-shield-regen=매초 자동으로 복구될 보호막 에너지량을 정의합니다.
nt-storm-chance=불안정도가 존재할 때 폭풍이 발생할 확률 배율을 조정합니다.
nt-storm-dur-base=폭풍 최소 지속시간을 조정합니다. (초)
nt-storm-dur-mult=불안정성 수준에 따른 추가 폭풍 지속시간을 조정합니다.