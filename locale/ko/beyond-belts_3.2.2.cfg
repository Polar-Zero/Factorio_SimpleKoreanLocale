[mod-name]
beyond-belts=벨트 한계 돌파(Beyond Belts)

[mod-description]
beyond-belts=터보 벨트 이후 사용할 수 있는 3종류의 벨트 티어를 게임에 추가합니다: 극고속 (90/초), 초고속 (120/초), 첨단 (150/초). 분배기와 지하 벨트도 포함되어 있으며, 여러 적재기 모드와 호환됩니다. 'Lane Balancers(라인별 분배기)' 모드를 설치하면 라인별 분배기 역시 사용할 수 있게 됩니다.\n\n번역: SimpleKoreanLocale(PolarZero)


