[mod-setting-description]
bb-extreme-color=모든 극고속 벨트의 색상을 설정할 수 있습니다. 특정 지점의 강조에 사용되는 어두운 색조 보조 색상은 자동으로 보정됩니다.
bb-extreme-enabled=극고속 벨트 티어를 활성화합니다. (120/초) 비활성화할 경우 기존 파일에 있던 해당 티어의 모든 객체가 지워지므로, 게임 진행 중에 조정하지 않는 것을 추천합니다.
bb-extreme-name=극고속 티어에 사용할 사용자 지정 접두사 이름입니다. 기본 '극고속' 이름을 사용하려면 비워두세요.
bb-extreme-speed=극고속 (T6) 벨트의 아이템 운반 속도를 조절할 수 있습니다.
bb-extreme-u-dist=극고속 지하 벨트의 최대 지하 연결 범위를 조절할 수 있습니다.
bb-hyper-color=모든 초고속 벨트의 색상을 설정할 수 있습니다.  (벨트, 분배기, 지하 벨트, 라인별 분배기, 적재기, 기술 연구 아이콘) 특정 지점의 강조에 사용되는 어두운 색조 보조 색상은 자동으로 보정됩니다.
bb-hyper-enabled=초고속 벨트 티어를 활성화합니다. (120/초) 비활성화할 경우 기존 파일에 있던 해당 티어의 모든 객체가 지워지므로, 게임 진행 중에 조정하지 않는 것을 추천합니다.
bb-hyper-name=초고속 티어에 사용할 사용자 지정 접두사 이름입니다. 기본 '초고속' 이름을 사용하려면 비워두세요. 이 값을 설정하면 아이템 이름이 "<설정값> 운송 벨트"나 "<설정값> 분배기" 등 방식으로, '설정값 + 언어 파일에서 가져온 아이템 이름 접미사' 로 설정됩니다.
bb-hyper-speed=초고속 (T5) 벨트의 아이템 운반 속도를 조절할 수 있습니다.
bb-hyper-u-dist=초고속 지하 벨트의 최대 지하 연결 범위를 조절할 수 있습니다.
bb-k2so-compat=활성화하면 업그레이드 단계가 터보 -> K2SO 극고속 -> 초고속+ -> 극고속+ -> 첨단 순으로 변경되며, 기본 속도가 30/s씩 상승하고(초고속 120, 극고속 150, 첨단 180), 하이퍼 벨트 제작법에 터보가 아닌 K2SO 극고속 벨트가 필요하도록 수정됩니다. K2SO의 "kr-loaders" 설정을 동시에 활성화되면, 라인별 적재기 제작 역시 K2SO 극고속 적재기부터 진행됩니다. 이 설정은 Krastorio2-spaced-out이 감지되었을 경우 자동으로 활성화됩니다.
bb-sane-loader-balance=When enabled, Ultimate-tier 적재기 recipes from AAI 적재기s and Deadlock 잔적기es & 적재기s return fluoroketone-hot — matching the cryogenic belt recipe so fluoroketone-cold is recycled instead of consumed. Only affects cryo-tier 적재기s; without AAI or Deadlock the setting has no effect.
bb-ultimate-color=모든 첨단 벨트의 색상을 설정할 수 있습니다. 특정 지점의 강조에 사용되는 어두운 색조 보조 색상은 자동으로 보정됩니다.
bb-ultimate-enabled=첨단 벨트 티어를 활성화합니다. (150/초) 비활성화할 경우 기존 파일에 있던 해당 티어의 모든 객체가 지워지므로, 게임 진행 중에 조정하지 않는 것을 추천합니다.
bb-ultimate-name=첨단 티어에 사용할 사용자 지정 접두사 이름입니다. 기본 '첨단' 이름을 사용하려면 비워두세요.
bb-ultimate-speed=첨단 (T7) 벨트의 아이템 운반 속도를 조절할 수 있습니다.
bb-ultimate-u-dist= 첨단 지하 벨트의 최대 지하 연결 범위를 조절할 수 있습니다.