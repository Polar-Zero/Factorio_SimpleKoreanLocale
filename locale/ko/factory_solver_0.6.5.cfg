factory-solver-helmod-export-warning-constraint-temperature=Helmod 내보내기: "__1__"에 대한 온도 제약 조건 값이 생략되었습니다. (Helmod에는 아이템에 대한 온도 속성 필드가 없음)
factory-solver-helmod-export-warning-multiple-solutions=Helmod 내보내기: 공유 문자열에는 하나의 모델만 포함할 수 있습니다. 선택된 첫 번째 해결법만 내보내집니다.
factory-solver-helmod-export-warning-no-machine=Helmod 내보내기: "__1__" 생산 라인에 machine_typed_name이 할당되지 않아 해당 라인이 생략되었습니다.
factory-solver-helmod-export-warning-no-recipes-emitted=Helmod 내보내기: __1__ 생산 라인이 포함되어 있으나 Helmod 모델로 변환 출력된 제작법 결과물이 없었습니다. 지원되지 않는 가상 제작법 또는 기계 할당 누락으로 인해 모든 라인이 생략되어 버린 것 같습니다.
factory-solver-helmod-export-warning-partial-drop=Helmod 내보내기: __2__개의 생산 라인 중 __1__개가 생략되었습니다. 구체적인 오류에 대해서는 경고를 참조하십시오.
factory-solver-helmod-export-warning-recipe-equal-bound=Helmod 내보내기: 제작법 "__1__"의 = 제약 조건이 상한으로 수정 작성되었습니다. (Helmod에는 강제 제한이 없음)
factory-solver-helmod-export-warning-recipe-lower-bound=Helmod 내보내기: 제작법 "__1__"의 하한 제약 조건을 표현할 수 없어 생략되었습니다.
factory-solver-helmod-export-warning-self-test-loadstring=Helmod 내보내기: 직렬화된 모델이 유효한 Lua 소스 코드가 아닙니다(공장 계산기 버그). 어떤 생산 라인을 내보냈는지 모드 포탈 제보페이지에 제보해주세요. Helmod에서 불러오려 하더라도 내부 Converter.lua 오류로 인해 이 문자열을 불러오는 데 실패할 것입니다.
factory-solver-helmod-export-warning-self-test-roundtrip=Helmod 내보내기: 인코딩된 문자열이 인코딩/디코딩 진행 과정에서 손상되었습니다. (Factorio 런타임 문제일 가능성이 높음.Helmod에서 불러오려 하더라도 내부 Converter.lua 오류로 인해 이 문자열을 불러오는 데 실패할 것입니다.
factory-solver-helmod-export-warning-substrate=Helmod 내보내기: 공장 제작법 "__1__"에 대한 기판 타일이 제거되었습니다. (Helmod에는 공장 기판 개념이 없음)
factory-solver-helmod-export-warning-unsupported-constraint=Helmod 내보내기: __1__에 대한 제약 조건 "__1__"에 대한 Helmod에 상응하는 항목이 없어 제거되었습니다.
factory-solver-helmod-export-warning-upper-bound-product=Helmod 내보내기: "__1__"에 대한 >= 제약 조건이 하한으로 수정 작성되었습니다. (Helmod의 제품/원료 입력은 하한만 허용) 수치 값은 유지되며, 입출력 방향이 중요한 경우 Helmod에서 직접 수정하는 것을 권장합니다.
factory-solver-helmod-export-warning-virtual-recipe=Helmod 내보내기: 가상 제작법 "__1__"에 대한 Helmod에 해당하는 항목이 없어 삭제되었습니다.
factory-solver-helmod-export-warning-virtual-recipe-research=Helmod 내보내기: 연구 가상 제작법 "__1__"이 삭제되었습니다. (Helmod 기술 제작법은 과학 흐름이 아닌 기술 의사 아이템을 생성함)
factory-solver-helmod-import-warning-beacon-extras=Helmod 가져오기: __1__ 제작법에서 신호기 per_factory/per_factory_constant가 제거되었습니다. 중첩 횟수만 유지됩니다.
factory-solver-helmod-import-warning-duplicate-recipe=Helmod 가져오기: 제작법 "__1__"이 두 번 이상 발견되었으며, 첫 번째로 발견한 아이템만 유지합니다. (일반적으로 동일한 제작법이 여러 블록에 존재하는 이유로 발생할 가능성이 높음) 
factory-solver-helmod-import-warning-energy-pseudo-아이템=Helmod 가져오기: Helmod 에너지 의사 아이템 "__1__"에 대한 제약 조건이 제거되었습니다(Factory 솔버의 LP에는 전력 채널이 없음).
factory-solver-helmod-import-warning-flattened-blocks=Helmod 가져오기: 다중 계층 구조가 단일 생산 라인 목록으로 변환되었습니다.
factory-solver-helmod-import-warning-module-priority=Helmod 가져오기: __1__ 제작법에 대한 모듈 우선순위가 제거되었습니다. 모듈 목록 자체만 유지됩니다.
factory-solver-helmod-import-warning-recipe-production=Helmod 가져오기: 제작법 "__1__"의 배율이 __2__이었습니다. (1이 아님) 1로 재설정되었습니다.
factory-solver-helmod-import-warning-unsupported-constraints=Helmod 가져오기: __1__ 제작법에 대한 Helmod 고유 제약 조건이 제거되었습니다.
factory-solver-helmod-import-warning-virtual-recipe-burnt=Helmod 가져오기: 연료 부산물 제작법 "__1__"이 제거되었습니다 (공장 계산기는 기본 제작법의 연료 반환 유무를 통해 부산물 결과를 추적합니다)
factory-solver-helmod-import-warning-virtual-recipe-customized=Helmod 가져오기: 사용자 지정 제작법 "__1__"이(가) 제거되었습니다. (공장 계산기에는 이에 상응하는 편집 가능한 제작법 메커니즘이 없습니다)
factory-solver-helmod-import-warning-virtual-recipe-technology=Helmod 가져오기: 연구 제작법 "__1__"이(가) 제거되었습니다. (기술 및 연구 팩의 의미 체계가 일치하지 않음)
factory-solver-helmod-import-warning-virtual-recipe-unmappable=Helmod 가져오기: 가상 제작법 "__1__"에 대한 참조를 공장 계산기에서 찾을 수 없어 제거되었습니다.
