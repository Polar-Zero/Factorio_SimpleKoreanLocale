factory-solver-fp-export-warning-restriction-temprature=공장 계획기 내보내기: "__1__"에 대한 온도 제약 조건이 제거되었습니다. 공장 계획기에는 유체 온도 차원이 없습니다.
factory-solver-fp-export-warning-muliple-beacons=공장 계획기 내보내기: 제작법 "__1__"의 라인에 여러 개의 신호기가 있습니다. 첫 번째 신호기만 내보내졌습니다.
factory-solver-fp-export-warning-recipe-lower-bound=공장 계획기 내보내기: 제작법 "__1__"의 하한 제약 조건을 표현할 수 없어 생략되었습니다.
factory-solver-fp-export-warning-unsupported-constraint=공장 계획기 내보내기: __1__ "__2__"에 대한 제약 조건은 공장 계획기에 상응하는 항목이 없어 생략되었습니다.
factory-solver-fp-export-warning-upper-bound-product=공장 계획기 내보내기: "__1__"에 대한 상한/등가 제약 조건이 Factory Planner의 ‘최소 생산량’ 목표로 내보내졌으며, 제약 조건의 방향이 손실되었습니다.
factory-solver-fp-export-warning-virtual-recipe=공장 계획기 내보내기: 가상 제작법 "__1__"에 대한 참조를 Factory Planner에서 찾을 수 없어 제거되었습니다.
factory-solver-fp-import-warning-duplicate-recipe=공장 계획기 가져오기: 제작법 "__1__"이 두 번 이상 발견되어, 첫 번째 항목만 유지합니다.
factory-solver-fp-import-warning-flattened-subfloors=공장 계획기 가져오기: 하위 층 계층 구조가 단일 생산 라인 목록으로 정리하고 합쳤습니다.
factory-solver-fp-import-warning-inactive-line=공장 계획기 가져오기: __1__개의 비활성 라인을 활성 상태로 가져왔습니다. Factory Planner에는 라인별 공장활성화 기능이 존재하지 않습니다.
factory-solver-fp-import-warning-percentage=공장 계획기 가져오기: __1__개의 라인 중 100%가 아닌 라인 비율이 제거되었으며, 각 라인은 원래 속도로 계산됩니다.
factory-solver-fp-import-warning-priority-product=공장 계획기 가져오기: __1__ 라인의 제품 선택 우선순위를 제거했습니다. 공장 계산기에서 다중 제작법의 균형을 맞추도록 하세요.
