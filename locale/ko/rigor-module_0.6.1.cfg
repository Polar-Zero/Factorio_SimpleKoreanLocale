[tips-and-tricks-item-description]
rigor-module-list=[item=rigor-module] 정밀 모듈\n[item=rigor-module-2] 정밀 모듈 2\n[item=rigor-module-3] 정밀 모듈 3
rigor-module-mod-tip-1=정밀도는 [tooltip=정밀 모듈,tips-and-tricks-item-description.rigor-module-list]에서 제공하는 새로운 모듈 효과입니다. 정밀도는 제작법이 가장 가치 있는 아이템을 제작할 확률을 증가시킵니다. 정밀도는 확률적 생산이 존재하는 제작법에만 영향을 미칠 수 있으며, 제작법마다 하나의 출력물에만 적용됩니다. 또한 [recipe=scrap-recycling]을 제외한 재활용 제작법에 영향을 미치지 않습니다.
rigor-module-mod-tip-2=정밀도는 제작법이 지정된 산출물을 생산할 확률을 다음과 같이 증가시킵니다. 확률 ‘p'일 때: 확률 = 'p/(1-p)'. 확률 'p'와 정밀도 'r'일 때, 확률은 다음 공식으로 조정됩니다: 'rp/(rp - p + 1)’.

