[mod-setting-name]
rigor-module-compatibility-mode=호환 모드 활성화
rigor-module-compatibility-mode-include-vanilla=[호환성 모드] 기본 게임 제작법 허용
rigor-module-multiplayer-wait-ticks=(비활성화) 업데이트 간격 (틱)
rigor-module-disable-rigor-effect=[img=utility/warning_icon]정밀 모듈 비활성화

[mod-setting-description]
rigor-module-compatibility-mode=호환 모드가 활성화된 경우, 제작법이 정밀 모듈 효과를 받기 위해서는 허용 목록에 명시적으로 등록된 상태여야 합니다. 이 모드가 다른 모드와의 호환성 문제를 일으키는 경우에만 활성화하는 것을 추천합니다.
rigor-module-compatibility-mode-include-vanilla=호환 모드에서 기본 게임의 (우주 시대 포함) 모든 사용 가능한 제작법을 허용 목록에 추가해야 할지 여부입니다. 호환 모드가 활성화된 경우에만 적용됩니다.
rigor-module-disable-rigor-effect=[img=utility/warning_icon]경고[img=utility/warning_icon] 이 설정은 모드 제거를 원하거나 객체를 사라지게 하는 설정을 변경하기 전, 저장 파일을 조정하는 경우에만 사용해야 합니다.
rigor-module-multiplayer-wait-ticks=이 설정은 현재 사용되지 않습니다.