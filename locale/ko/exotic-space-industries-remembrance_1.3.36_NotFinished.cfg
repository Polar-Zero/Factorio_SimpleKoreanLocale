[string-mod-setting-description]
ei-flammable-rupture-fidelity-cinematic=8개의 고리, 더 넓은 연기와 화염 범위, 더 강한 부가 효과, 그리고 더 느린 속도의 외부 의식 확산.
ei-flammable-rupture-fidelity-lean=가장 짧은 파열. 4개의 고리, 제한된 효과 범위, 부가 효과 없음, 대규모 폭발 없음.
ei-flammable-rupture-fidelity-standard=기본 설정값. 6개의 고리, 적당한 효과 범위, 하나의 의미 있는 2차 강조 효과, 그리고 절제된 대규모 폭발.
ei-flammable-rupture-fidelity-unbounded=엄격한 시각적 제한은 이제 없으며, 준비된 고리들이 이제 같은 틱 내에서 공격적으로 소진됩니다. 안전보다는 장관 연출을 목적으로 하는 설정입니다.
ei-tl-behavior-mode-hybrid=선택 가능한 가장 빠른 경로. 격자의 교리가 방전 논리를 직접 반영하여, 전장 내 역할을 유지하면서도 UPS 부하를 완화합니다.
ei-tl-behavior-mode-legacy-fidelity=(기본값) 레거시 재귀, 지속적인 도움, 처치에 따른 여진, UPS 비용과 무관한 전체 탱크 변동성 흐름 등을 포함한, 기존 '테슬라의 유산' 모드 동작을 그대로 유지합니다.
tl-advanced-attack-anim-charge-up=고급 테슬라 코일의 코어를 따라 전하가 상승하고, 그 전하가 정점에 도달할 때 포탑이 발사됩니다. 다른 포탑이 발사 전에 표적 대상을 먼저 처치해버릴 경우, 다른 표적을 지정하기 전까지 약간의 시간이 소요될 수 있습니다.
tl-advanced-attack-anim-simple=적이 접근하는 것을 발견하는 즉시, 전류가 코일 사이를 오가며 코일이 즉시 발사됩니다.
ei-emerald-apocalypse-hover-tank-hover-visual-fidelity-cinematic=고리들이 밝아지며 접차 겹쳐진 다음, 각 호버링 지점 주위에서 초록빛 민트색의 프리즘 조각들로 쪼개집니다.
ei-emerald-apocalypse-hover-tank-hover-visual-fidelity-lean=네 개의 방출된 고리들이 잠시 지면을 향해 반응한 다음, 단정하게 정렬된 프리즘 모양의 가장자리를 드러냅니다.
ei-emerald-apocalypse-hover-tank-hover-visual-fidelity-maximal=각 방출기가 유물 아래에 있던 엄청난 빛의 봉인을 해방합니다. 그 강도는 거의 경건할 정도입니다.
ei-emerald-apocalypse-hover-tank-hover-visual-fidelity-off=선체 하부에 있던 고리는 이제 봉인되었으며, 이제 눈에 띄는 반짝임 없이 호버링하여 이동합니다.
ei-emerald-apocalypse-hover-tank-hover-visual-fidelity-standard=운동 에너지가 압력으로 변하면서, 방출기 아래에 꾸준한 에메랄드빛 고리를 그려냅니다.
ei-emerald-apocalypse-hover-tank-hover-visual-fidelity-unbounded=조절기는 이제 완전히 파손되었습니다; 호버링하는 각 발자취마다 지면은 탱크의 통과 흔적을 기억할 수밖에 없게 됩니다.
ei-gaian-saucer-wake-visual-fidelity-cinematic=남은 흔적은 더 커졌으며, 더 오래 머물며, 접시 비행체의 회전 궤적에 따라 휘어집니다.
ei-gaian-saucer-wake-visual-fidelity-lean=선체를 따라가는 것은 얇은 약간의 흔적뿐이며, 그조차도 심하게 절제되어 있습니다.
ei-gaian-saucer-wake-visual-fidelity-maximal=선체가 지나가는 곳마다 강하게 빛나는 움직임의 상처가 남습니다.
ei-gaian-saucer-wake-visual-fidelity-off=선체의 잔상을 이제 봉인되었으며, 이동하더라도 눈에 띄는 흔적은 더 이상 없습니다.
ei-gaian-saucer-wake-visual-fidelity-standard=잔상은 명확하게 드러나도록 허용되었지만, 교리가 되기 전에 서서히 사라지고 맙니다.
ei-gaian-saucer-wake-visual-fidelity-unbounded=제한은 더 이상 존재하지 않으며; 접시 모양의 우주선은 이제 세계가 감당할 수 있는 모든 반짝임을 기록합니다.
ei-singularity-lance-visual-fidelity-cinematic=절단면의 더 많은 부분이 머무르도록 허용합니다: 더 밝은 단면, 더 풍부한 증인, 그리고 상처 위로 더 오래 지속되는 빛.
ei-singularity-lance-visual-fidelity-lean=필요한 부분만이 절단을 견뎌냅니다: 더 적은 광선 효과, 적은 증인, 그리고 절제된 불꽃과 그을음.
ei-singularity-lance-visual-fidelity-maximal=프리즘 광선이 이제 절제된 계시를 허락받았습니다: 고밀도 광선과 지속적인 증언, 하지만 조절 장치는 여전히 깨어 있습니다.
ei-singularity-lance-visual-fidelity-standard=광선은 선명하게 기억된 뒤, 상처가 교리로 바뀌기 전에 방출됩니다.
ei-singularity-lance-visual-fidelity-unbounded=조절 장치조차 파손되었으며, 이제 창은 세계에 모든 반짝임을 강제로 비춘 다음 기록시킵니다.
ei-arc-furnace-light-flicker-preset-off=작동 중인 조명을 모조리 제거합니다. 이제 남은 건 용광로 애니메이션과 대기 상태에서의 빨간색 캐피시터 불빛 뿐입니다.
ei-arc-furnace-light-flicker-preset-original=기본적으로 사용되는, 불안정한 아크 용광로 조명을 보존합니다.
ei-arc-furnace-light-flicker-preset-reduced=층을 이루는 아크 용광로 색상은 유지되지만, 깜빡임의 속도와 빈도는 줄어들었습니다.
ei-arc-furnace-light-flicker-preset-soft=더 차분한 용광로 작동을 위해 희미하고 느린 맥동만을 유지합니다.
ei-arc-furnace-light-flicker-preset-static=깜빡임을 거의 비활성화하고 약간의 빛만을 일정하게 유지합니다.

[description]
auric-fumarole-rescan-refusal=황금 간헐천 재스캔을 이 표면에서 진행할 수 없습니다. 불카누스에서만 가능합니다.
auric-fumarole-rescan-success=불카누스 황금 간헐천의 재스캔을 진행하였으며, 생성된 청크 __1__개에 대한 대기열을 재구성했습니다.

