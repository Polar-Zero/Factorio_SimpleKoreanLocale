gate-gui-control-runtime-label-tooltip=Stable means no cooldown lockout is active. Cooling means the gate is waiting out its current cooldown and transfer is paused on that route. Critical means stress is high enough that instability and discharge risk are elevated.
gate-gui-control-source-circuit=회로
