train-progression=기차 진행
train-progression-text=증기 시대부터 열차를 사용할 수 있습니다. 첫 번째 사용 가능한 옵션은 [color=orange]증기 기관차[/color] [item=ei-steam-basic-locomotive]로, 아이템을 운반할 수 있지만 유체를 운송할 수는 없습니다.\n\n기술이 발전하면 [color=orange]고급 증기 기관차[/color] [item=ei-steam-advanced-locomotive]가 해금되며, 이 모델을 사용하면 유체를 운송할 수 있게 됩니다. 두 모델 모두 석탄이나 고체 연료와 같은 연소 가능한 연료에 의존하지만, 로켓, 핵, 핵융합 연료를 사용하면 성능을 향상시킬 수 있습니다.\n\n하지만 결국 공해를 유발하는 순수한 무차별 연소는 단점이 될 수 있습니다.\n\n보다 우아하고 친환경적이며, 더 효율적인 철도 시스템을 운영하려면 [color=brown]디젤 연료[/color] [item=ei-diesel-fuel-unit] 기반으로 전환해야 하며, 이는 우수한 [color=orange]디젤 기관차[/color] [item=locomotive]를 사용한다는 것을 의미합니다.\n\n기술이 발전함에 따라 물류도 복잡해집니다.\n연료가 경계를 결정합니다.\n열차는 어디로 가는지 묻지 않습니다 - 그들은 무엇을 싣는지 요구합니다.\n\n가이아의 세계는 나우비스의 논리를 따르지 않습니다.\n\n그곳에서 철도는 단순히 산업용이 아닙니다 - 그들은 결정체 에너지로 맥동하는 전자기 통로입니다. 가이아의 심연에서, 당신은 수정 에너지로 구동되는 EM 열차[item=ei_em-locomotive][item=ei_em-cargo-wagon][item=ei_em-fluid-wagon]에 접근할 수 있게 됩니다. 이 열차는 전통적인 연료 없이도 무소음 가속과 지속 가능한 고속 운행을 가능하게 합니다.\n\n이 열차는 크리스탈 충전기[item=ei_charger]에서 직접 에너지를 끌어오며 석탄이나 디젤을 전혀 사용하지 않습니다. 그들은 연소되지 않습니다 - 공명합니다.\n\n가이아는 연소로 움직이지 않습니다.\n그녀는 기억, 신호, 그리고 빛으로 움직입니다.\n이후 가이아에 접근할 수 있다면 철도는 다시 'EM 물류'로 분기됩니다. 이 분기를 통해 철도가 내연기관 처럼 작동하는 것을 그만두고, 네트워크화된 전력 인프라처럼 작동하게 되므로, 이후 별도의 [font=default-bold]EM 기차[/font] 항목으로 다루게 됩니다.
train-progression-text-2=Trains become available early, during the Steam Age. Your first option is the [color=orange]Steam Locomotive[/color] [item=ei-steam-basic-locomotive]—capable of hauling items, but incapable of transporting fluids.\n\nProgress unlocks the [color=orange]Advanced Steam Locomotive[/color] [item=ei-steam-advanced-locomotive], which adds fluid transport capacity. Both models rely on burnable fuels such as coal or solid biomass, with the capacity for enhanced performance via Rocket, Nuclear, or 융합 연료s.\n\nEventually, pure brute force combustion in all its polluting glory may become a drawback. To operate cleaner and faster conventional rail, you transition into [color=brown]Diesel Fuel[/color] [item=ei-diesel-fuel-unit] and the [color=orange]Diesel Locomotive[/color] [item=locomotive].\n\nLogistics escalate with technology.\nFuel defines the frontier.\nTrains do not ask where—they demand what burns.\n\nWhen Gaia opens, rail diverges again into crystalline field logistics. That branch now has its own [font=default-bold]EM trains[/font] entry in this section, because it stops behaving like combustion rail and starts behaving like networked power infrastructure.
turrets=방어 시설
turrets-2=Shotguns and cannons
turrets-3=Acid and flame
turrets-4=Miniguns and lasers
turrets-5=Relic platforms
turrets-text=Remembrance greatly broadens static defense. The roster now runs from improvised close-range guns to steam artillery, corrosive stream weapons, electricity-driven bullet hoses, and relic-grade energy platforms. These emplacements are not simple sidegrades to the [item=gun-turret]gun turret: each one asks for different logistics, different kill zones, and different upgrade support.\n\nMost ballistic additions still scale with physical projectile damage research. Stream turrets grow with the flame-damage line. The late relic platforms instead ask for extreme power, rare components, and careful spacing.
turrets-text-2=[item=ei-shotgun-turret]Shotgun turret arrives in the Dark Age after gun turrets and Military. It is a close-range wall-breaker answer: 15 range, slow fire, no fancy power demands, and brutal punishment for anything that actually reaches your perimeter. In the Electricity Age it upgrades into the [item=ei-auto-shotgun-turret]combat shotgun turret, which doubles the firing cadence, reaches 18, turns far faster, and adds electric drain plus per-shot power use to keep a constant buckshot curtain over choke points.\n\nThe [item=ei-cannon-turret-mk1]cannon turret is the Steam Age siege step. It fires [item=cannon-shell]cannon shells to 25 range with an 8-tile dead zone, slow traverse, and heavy single-shot impact. Later, two MK1s and heavier components become the [item=ei-cannon-turret]twin-bore cannon turret: tougher, faster firing, electrically assisted, and working at 30 range with a 10-tile dead zone so heavy targets can be deleted before they reach the wall.
turrets-text-3=[item=ei-acidthrower-turret]Acidthrower is the corrosive cousin of the flamethrower turret. It reaches 38 with a 9-tile minimum range and accepts [fluid=sulfuric-acid]sulfuric acid, [fluid=ei-nitric-acid]nitric acid, [fluid=ei-hydrofluoric-acid]hydrofluoric acid, and even weak [fluid=ei-acidic-water]acidic water, each with its own damage modifier. It is the stream-turret answer for factories that would rather weaponize chemistry than burn oil.\n\nVanilla [item=flamethrower-turret]flamethrowers are also reworked. EI moves them into the Steam Age, extends them to the same 38/9 engagement band, makes them prepare earlier, and raises their fluid appetite dramatically. Fuel quality now matters: crude oil still works, but heavy oil, light oil, petroleum gas, and [fluid=ei-kerosene]kerosene all hit progressively harder, while rough distillates are weaker emergency feedstocks.
turrets-text-4=[item=ei-gatling-turret]Minigun turret is the electricity-age bullet hose. It combines a mounted [item=ei-minigun]minigun with electric drive systems, giving 32 range, a 4-tile minimum range, excellent retargeting, and a ferocious sustained rate of fire. The price is exactly what it looks like: endless [item=firearm-magazine]magazine consumption plus constant power support.\n\nVanilla [item=laser-turret]laser turrets remain available, but EI retunes them into a more deliberate electricity-age investment. Their range and beam length are pushed to 30, their tech explicitly wants [item=battery]batteries and [item=advanced-circuit]advanced circuits, and their recipe is rebuilt around [item=ei-steel-beam]steel beams, [item=steel-plate]steel plate, [item=battery]batteries, [item=advanced-circuit]advanced circuits, and [item=ei-energy-crystal]energy crystals. They become a cleaner logistics turret, but no longer a cheap universal answer.
turrets-text-5=[item=ei-plasma-turret]Plasma turret is the quantum-age fortress gun. It is physically huge, drains a serious grid, and is built from induction-matrix parts plus multiple [item=laser-turret]laser turrets. In return it throws slow-starting plasma bolts out to 200 range, keeps a 40-tile safety radius around itself, and ends each hit in a massive splash that wrecks formations, fortifications, and terrain alike.\n\n[item=zeus-wrath-zeus-turret]Poseidon Installation sits even higher on the relic ladder through [technology=zeus-wrath-zeus-wrath]. EI rebuilds it into a strategic weapon: 350 range, 70 minimum range, 1 GJ per shot, enormous energy storage, and inner plus outer plasma blast rings. It is not a perimeter turret so much as a fixed answer to targets you have decided should stop existing.
turrets-text-6=[item=ei-singularity-lance]특이점 창 is an alien blade protocol built around a suspended prism and a pyramid altar. It hoards crystal charge until the chosen line becomes an incision. The beam is not a projectile; it is a verdict dragged through space, leaving fire, scorch, and silence to discover the target a breath later.
uranium-asteroid=우라늄 소행성
uranium-asteroid-text=[font=default-bold]우주 플랫폼[/font] 연구 후 별도의 표면에 접근할 수 있게 되면 해금됩니다. 기본/고급 분쇄 작업은 모두 [fluid=sulfuric-acid]황산을 소비하며 [item=stone]돌, [item=ei-uranium-chunk]우라늄 덩어리, [fluid=ei-lead-chunk]납 덩어리를 생산합니다. 고급 분쇄법은 더 많은 황산이 필요하지만, 더 강력한 우라늄을 얻을 수 있습니다.\n우라늄 소행성에서는 이상 현상 아이템 중 [item=ei-isotopic-ghost-shell]동위원소 고스트 껍질을 발견할 수 있습니다.
veins=심층 광맥
veins-text=심층 광맥은 초기에는 채광할 수 없습니다. 이를 채광하려면 [color=orange]심층 채광 드릴[/color] [item=ei-deep-drill]이 필요합니다. 이는 수직적인 채광을 위해 설계된 게임 중반 단계의 채광 시스템입니다. 드릴을 사용하거나, 지형을 파악하지 못한다면 영원히 정체될 것입니다.
veins-text-temp2=These veins no longer spawn as generic rarity rolls. Structural metals follow [font=default-bold]metal belts[/font] and [font=default-bold]sedimentary basins[/font] across Nauvis: [item=ei-iron-chunk]iron and [item=ei-copper-chunk]copper favor ridge-country, while [item=ei-coal-chunk]coal and [item=ei-sulfur-chunk]sulfur pool in lower basin terrain.\n\n[font=default-bold]Hydrothermal frontiers[/font] carry [item=ei-lead-chunk]lead and [item=ei-gold-chunk]gold beyond the protected starting region. [font=default-bold]Outer scarlands[/font] hold [item=ei-uranium-chunk]uranium, and only the rarest anomaly pockets inside those broken zones expose [item=ei-neodym-chunk]neodymium.
welcome=[font=default-bold]Exotic [color=#08457E]Space[/color] Industries: [color= #FF1493]리멤브랜스[/color][/font]에 오신 것을 환영합니다.
welcome-text=당신은 시작하지 않는다.\n[font=default-bold]당신은 깨어난다.[/font]\n\n이것은 모드가 아니다.\n이것은 재귀이며.\n회복의 과정이다.\n자동화 아래 묻혀 있던 힘의 의식이다.\n\n여기서는 [font=default-bold]아무것도 주어지지 않는다.[/font]\n\n모든 것은 얻어야 한다 - 불을 통해, 생각을 통해, 붕괴를 통해.\n\n[font=default-bold]세상은 변했습니다.[/font]\n\n규칙은 [font=default-bold]사라졌습니다.[/font]\n구조만 남아 있습니다.\n\n목적을 가지고 진행하십시오.\n\n[font=default-bold][color= #FF1493]리멤브랜스[/color]가 지켜보고 있습니다.[/font]
welcome-text-2=다양한 새로운 기계, 생산 라인, 시스템적 특징이 도입되었습니다. 일부는 효율적이지만, 대부분은 용서하지 않을 것입니다.\n\n그들은 자신을 설명하지 않습니다.\n그들은 당신이 적응할 때까지 기다리지 않습니다.\n모든 것을 탐구하거나 뒤처지십시오.\n\n복잡성은 실수가 아닙니다 - 그것은 진전의 대가입니다.\n최적화는 필수적입니다.\n이해는 노력으로 얻어집니다.\n\n이것은 안내된 경험이 아닙니다. 이는 산업의 시련입니다..
world-gen-related=세계 관련 정보
world-gen-related-text=이 섹션에서는 모드가 도입한 세계 생성 시스템을 설명합니다. 구조적 명확성을 위해 집중된 하위 카테고리로 나누어져 있습니다.\n\n왼쪽 메뉴를 통해 접근할 수 있습니다.\n이 변경 사항은 미적 변경이 아닙니다.\n이들은 지형, 자원 행동, 공간 논리를 기본 수준에서 정의합니다.\n\n[font=default-bold]계층을 이해하라, 아니면 그에 의해 생성될 것이다.[/font]

