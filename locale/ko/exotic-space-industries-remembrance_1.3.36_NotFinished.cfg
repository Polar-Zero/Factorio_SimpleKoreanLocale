[virtual-signal-description]
ei-gate-active=Outputs 1 when the gate is enabled, has a resolved destination, and is above the low-power floor.
ei-gate-energy=Outputs the gate's stored energy in MJ.
ei-gate-stress=Outputs the gate's current stress on a 0-100 scale.
ei-neutron-collector-agent=Outputs collector agent state: 1 active, 2 idle, 3 blocked.
ei-neutron-distance=Outputs bound source distance in tenths of a tile.
ei-neutron-efficiency=Outputs current collector efficiency from 0 to 300.
ei-neutron-scan-agent=Outputs scan agent state: 1 stable, 2 dirty, 3 rebind pending.
ei-neutron-source-agent=Outputs source agent state: 1 live, 2 dormant, 3 absent.
ei-orbital-blocked=Outputs blocked lanes, blocked jobs, or blocked cohort state.
ei-orbital-invalid=Outputs invalid IDs, invalid targets, or invalid dispatch state.
ei-orbital-lease=Outputs active cohort lease count or marks an entity as holding a live lease.
ei-orbital-overflow=Outputs how many request filters were omitted because the adjacent scanner bank ran out of slot capacity.
ei-orbital-ready=Outputs readiness or available work inside the orbital logistics cohort.
ei-platform-id=Outputs the force-local numeric platform ID chosen by a transponder, selector, or uplink.
ei-auric-vat-band=Outputs the vat's current basin band index from 1 to 7, based on claimed wetland tiles.
ei-auric-vat-bloom=Outputs bloom state: 1 stable, 2 strained, 3 failed.
ei-auric-vat-claims=Outputs the number of wetland basin tiles currently claimed by the vat.
ei-auric-vat-contamination=Outputs the vat's current contamination pressure on a 0-100 scale.
ei-auric-vat-vigor=Outputs the vat's current cycle vigor on a 0-100 scale.
ei-fusion-circuit-agent=Outputs 1 unwired, 2 readable, or 3 commanding.
ei-fusion-control-agent=Outputs 1 manual or 2 circuit.
ei-fusion-coolant-agent=Outputs 1 valid coolant demand or 3 invalid.
ei-fusion-coolant-rate=Outputs hot coolant per second multiplied by 100.
ei-fusion-efficiency=Outputs efficiency percent.
ei-fusion-fuel-agent=Outputs 1 valid or 2 corrected.
ei-fusion-neutron-flux=Outputs neutron flux multiplied by 100.
ei-fusion-power=Outputs estimated reactor power in MW.
ei-fusion-set-fuel-1=Circuit input for fuel 1. Values: 1 protium, 2 deuterium, 3 tritium, 4 helium-3, 5 lithium-6.
ei-fusion-set-fuel-2=Circuit input for fuel 2. Values: 1 protium, 2 deuterium, 3 tritium, 4 helium-3, 5 lithium-6.
ei-fusion-set-injection=Circuit input for injection rate. Values: 1 low, 2 medium, 3 high.
ei-fusion-set-temperature=Circuit input for temperature. Values: 1 low, 2 medium, 3 high.
ei-fusion-state-fuel-1=Outputs the effective fuel 1 index.
ei-fusion-state-fuel-2=Outputs the effective fuel 2 index.
ei-fusion-state-injection=Outputs the effective injection index.
ei-fusion-state-temperature=Outputs the effective temperature index.
ei-fusion-thermal-agent=Outputs 1 low, 2 medium, or 3 high.

