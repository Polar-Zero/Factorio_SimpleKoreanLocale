[exotic-industries-fueler-informatron]
menu_exotic-industries-fueler-informatron=연료 보급탑
title_exotic-industries-fueler-informatron=연료 보급탑
welcome=엑조틱 산업: 연료 보급탑
welcome-text=연료 보급탑은 주변의 적합한 대상들을 확인하고, 내부 인벤토리 연료를 해당 목표에 보급하도록 설계된 자동 지원 구조물입니다.\n\n차량 모드에서는 기차, 자동차, 탱크, 스파이더트론, 기관 포탑, 대포 포탑, 대포 화물차에 연료를 공급할 수 있으며, 장비 모드에서는 화력 기반 발전기를 포함한, 차량 및 플레이어 장비 그리드의 장비에 연료를 공급합니다. 인벤토리 공간이 남아있다면, 사용된 연료나 연소 부산물을 회수하는 것도 가능합니다.\n\nGUI를 사용하여 목표와 공급 모드를 설정해야 작동합니다. 타워가 미작동 상태일 경우, 대부분의 경우 설정 불일치가 원인입니다. 차량 모드더라도 보급탑이 기관차 필터로 지정되어 있다면 자동차 등 다른 차량에는 연료를 공급하지 않으며, 장비 모드로 설정되어 있다면 그리드 내부의 화력 기반 장비에만 연료를 공급할 수 있습니다.\n\n[font=default-bold]이 장치는 묻지 않고, 그저 주어진 일만 수행합니다.\n범위나 선택된 업무를 벗어나지 않습니다.\n\n한 번 설정한 다음, 그대로 작동하게 두십시오.[/font]
welcome-text-2=연료 보급탑은 주행 중인 기차를 포함한 이동 중인 목표에도 보급할 수 있습니다. 보급탑 툼질은 사거리나 보급 간격에 영향을 주지 않지만, 한 번의 보급에 더 많은 목표에 보급할 수 있으므로, 대규모 기지 관리에 더 유리합니다.\n\n모드 버전 마이그레이션, 모드 상호작용 또는 피해로 인해 시스템 동기화에 문제가 있을 경우, 관리자가 /rescan_fuelers 명령어를 사용해 재설정할 수 있습니다.\n보급탑의 내부 인벤토리에는 Factorio 게임의 일반적인 품질 규칙이 적용되므로, 고품질의 아이템은 더 많은 연료와 탄약을 적재할 수 있다는 점에 유의하세요.\n\n[font=default-bold]이 타워는 효율적이지만 전지전능하지는 않습니다.\n고품질의 탑은 한 번에 더 많은 일을 끝낼 수 있습니다.[/font]
welcome-text-3=화력 기반 원자로 장비도 장비 모드에서 보급할 수 있습니다.

[exotic-industries-informatron]
ages-and-tech=시대의 발전
ages-and-tech-2=6개의 시대
ages-and-tech-text=Exotic Industries에서는 연구 비용이 단순한 선형 방식으로 책정되지 않습니다. 이제 [font=default-bold]초기 비용[/font], [font=default-bold]지수적 곡선[/font], 그리고 지정된 [font=default-bold]상한선[/font]을 바탕으로 연구 비용을 산정하고, 전체 기술에 고르게 분배합니다. [font=default-bold]선형(linear)[/font]은 일정한 수준을 유지하고, [font=default-bold]2차 함수(quadratic)[/font]는 초반에는 완만하지만 후반에 가파르게 상승하며, [font=default-bold]지수적(exponential)[/font]은 초반에는 완만하지만 후반에 매우 급격히 치솟습니다, [font=default-bold]시대적 상승[/font]은 대부분의 부담을 후반 시대에 집중시킵니다.\n\n시대 연구는 여전히 전체 연구가 사용 가능해지는 시점을 결정하지만, 비용 스케일링은 스피드런에 대해 얼마나 관대할지를 결정합니다. 이러한 정의는 여전히 기술 가중치 라이브러리를 따르기에, 할인된 기술일 경우 더 낮은 가중치가 적용될 것입니다.
ages-and-tech-text-2=이 모드는 6개의 시대로 나뉘며, 각 시대는 재귀와 기계, 통제의 심연으로 점점 더 깊이 빠져드는 과정을 보여줍니다. 이는 진보의 시대가 아닙니다. 오히려 억압의 문턱이며, 이전 시대보다 더 폭력적이고 무자비한 정복의 문턱입니다.\n\n이 시대들은 [font=default-bold]게임플레이 구조의 근본적인 변화[/font]를 의미하며, 플레이어가 진행함에 따라 새로운 시스템, 생산 체인, 에너지 패러다임이 해금됩니다. 원시적인 증기 시대부터 엑조틱 양자 물질 시대까지, 각 단계는 독특한 메커니즘, 인프라 도전 과제, 디자인 제약을 도입하여 공장 레이아웃, 자원 획득, 물류 전략을 재검토하도록 강요합니다.\n\n이 시대를 통과하는 것은 엄격히 제한되어 있습니다. 다음 시대를 해금하려면 단순히 연구만으로는 부족하며, 현재 시대 내에서의 [font=default-bold]기술적인 숙달[/font]도 필요합니다. 깊이 들어갈수록 규칙은 변형되고, 결국 깨집니다. 단순한 자동화에서 시작된 것은 에너지 제어, 질량 억제, 신호 전송을 둘러싼 재귀적 고압 시뮬레이션으로 변모합니다. 각 시대는 적응, 예측력, 그리고 한때 영원하다고 믿었던 것을 해체할 의지를 요구하는 시련의 용광로입니다..\n\n[font=default-bold]암흑 시대[/font]\n왜곡된 탄생. 재, 썩음, 그리고 침묵. 원시적인 증기와 부서진 돌 사이를 기어간다. 자동화는 존재하지 않는다. 모든 것은 피로 대가를 치른다.\n\n[font=default-bold]증기 시대[/font]\n석유가 발견된다 - 자원이 아닌 무기로서. 타오름으로서 움직이고 살아간다. 땅이 울부짖기 시작한다.\n\n[font=default-bold]전기 시대[/font]\n회로가 튀겨지며 울린다. 기계가 깨어난다. 로봇이 등장하지만, 도우미가 아닌 의지의 연장선일 뿐. 핵의 불꽃이 곧 법이 된다. 육체는 뒤쳐진다.\n\n[font=default-bold]컴퓨터 시대[/font]\n생각이 형식화된다. 모듈, 신호기, 회로 - 마음은 기계에 분산된다. 최적화는 필수다. 중복은 곧 죽음이다.\n\n[font=default-bold]양자 시대[/font]\n현실이 휘어진다. 기계는 이 세계의 논리가 아닌 논리를 따른다. 경계가 사라진다. 용광로는 지능을 얻지만, 오용은 용서하지 않는다.\n\n[font=default-bold]엑조틱 시대[/font]\n모든 것이 부서진다. 경계는 사라진다. 이상 현상을 지배하거나 그에 의해 삼켜진다. 승리는 보장되지 않으며, 실패한 시간선의 뼈대에서 추출된다.\n\n각 시대는 거스를 수 없는 단방향 진행입니다.\n\n[font=default-bold]순수한 것은 존재하지 않습니다.[/font]\n\n오직 권력만이 있습니다 - 잔인하고, 재귀적이며, 절대적인 것..
alien=원시 외계 데이터
artifacts=외계 유물
artifacts-text=세계 곳곳에 고대 문명의 유적이 흩어져 있습니다 - 그들은 당신의 도착보다 훨씬 전에 신비로운 물질을 활용했던 문명입니다. 그들의 유물들은 지형에 박혀 있으며, 일부는 땅에 묻혀 있고, 일부는 여전히 살아 움직이고 있습니다.\n\n일부는 움직이지 않습니다.\n그 중 일부는 여전히 작동하고 있는 상태일지도 모릅니다.\n하지만, 우연한 것은 단 하나도 없다는 사실만큼은 명심하십시오..
actifacts-text-2=그들은 배치되지 않았으며, [font=default-bold]그들은 의도적으로든 아니든 어찌되었든 남겨졌습니다.[/font] 그들을 찾아라. 그들을 연구하라. 그들이 암시하는 것을 두려워하라..
artifacts-text-2=그들은 배치되지 않았으며, [font=default-bold]그들은 의도적으로든 아니든 어찌되었든 남겨졌습니다.[/font] 그들을 찾아라. 그들을 연구하라. 그들이 암시하는 것을 두려워하라..
asteroid-anomalies=우주 데이터 이상현상
asteroid-anomalies-text=각 소행성 유형마다 고유한 특이점 아이템을 추출할 수 있습니다. 이 6종류의 특이점 아이템은 [entity=ei-computer-core]컴퓨터 코어 제작에 사용됩니다. 이는 시뮬레이터 내부에서 데이터 카드로 변환한 뒤, [entity=ei-quantum-computer]양자 연구 컴퓨터를 통해 무중력 상태에서 [item=ei-space-data]우주 데이터로 재조립됩니다.\n\n소행성들은 단순한 재료가 아닙니다. 이제는 두 번째 연구 전선으로 사용됩니다.
asteroid-variants=더 많은 소행성
asteroid-variants-text=Exotic Industries에서는 6가지 유형의 소행성 덩어리를 게임에 추가합니다: [item=ei-chemical-asteroid-chunk], [item=ei-organic-asteroid-chunk], [item=ei-rock-asteroid-chunk], [item=ei-uranium-asteroid-chunk], [item=ei-petrified-asteroid-chunk], [item=ei-scrap-asteroid-chunk]. 이들은 우주 경로에 추가되며, [entity=crusher]분쇄기에서 분쇄할 수 있습니다. 또한 12종류의 기본/고급 소행성 처리 제작법에는 [font=default-bold]소행성 생산성[/font] 효과가 적용됩니다.\n\n또한 분쇄기의 출력 보관함과 유체 슬롯이 추가되어, 혼합 산출물 수용에 더욱 적합합니다.
auric-fumarole=황금 간헐천 분출구
auric-fumarole-2=생성 제한 및 재스캔
auric-fumarole-text=불카누스 행성은 이제 상처가 다시 생겨날 수 있는 위치를 기억합니다. 아래 규칙은 상징적인 의미가 아닌 문자 그대로를 뜻합니다.\n\n[font=default-bold]출현 위치:[/font] 황금 간헐천은 불카누스의 화산 지형 중 용암이 없는 장소에서 나타날 수 있습니다. 또한 표면 영점 (소환 지점)으로부터 3청크(96칸) 밖이여야 합니다. 영점으로부터 벗어날수록 확률은 점진적으로 증가하며 32청크(1,024칸) 떨어진 지점에서 최대치에 도달하게 됩니다.\n\n[font=default-bold]첫 출현:[/font] 새로 생성된 불카누스 지형은 한 번에 전체 자원을 생성하는 대신, 거리에 따른 가중치를 적용한 간단한 초기 무작위 시도만 진행합니다. 이 시도가 실패하더라도 해당 청크는 잊혀지지 않고, 휴면 목록에 대신 등록됩니다. 재스캔 및 기존 저장 데이터 복구는 이전에 생성된 불카누스 청크의 휴면 목록을 재설정하지만, 이는 또 다른 즉각적인 생성 시도를 강제하지 않습니다.\n\n[font=default-bold]채취 및 수명:[/font] 생성된 간헐천은 4,000~8,000 자원량을 가지고 생성됩니다. 만약 생성된 뒤 35~65분(최대) 내에 시추를 시작하지 않으면, 자동으로 봉인되지만, 봉인되기 전에 시추를 시작했다면 자원이 고갈될 때까지 시추할 수 있습니다. 봉인되거나 자원이 고갈된 간헐천은 약 60분 후(약간의 오차가 있음), 봉인 해제 시스템을 이용하면 다시 활성화시킬 수 있습니다.
auric-fumarole-text-2=[font=default-bold]간헐천 생성 대기 확인:[/font] 모드 스크립트에서 매 30초마다 지도 전체에서 대기 목록의 청크를 최대 6개까지 뽑아 확인합니다. 일반적인 휴면 청크는 재검사시에 기본 분출 확률(0.25%)에 원점과의 거리 가중치, 황금 조절, 지역 억제, 생성 영역 과밀도 등의 보정치가 적용됩니다.\n\n[font=default-bold] 원점과의 거리 대역:[/font] 생성된 적합한 형태의 불카누스 청크는 원점으로부터의 3-6, 6-16, 16-24, 24-32, 32+ 청크 거리에 따라 분리되어 관리됩니다. 특정 대역에 간헐천이 충분하게 채워지지 않았다면 휴면 분출 보정치가 증가하며, 과도하게 채워진 경우 감소됩니다. 또한, 탐사된 한 방향에 향후 대부분의 분출구가 생성되는 것을 막기 위해 휴면 회복 시도는 가장 취약한 대역을 우선적으로 목표로 하게 됩니다.\ \n\n[font=default-bold]지역 억제 및 대체:[/font] 6청크(192칸)이내에 활성화된 황금 간헐천이 존재할 경우, 단순한 갯수 기준이 아닌 근접도에 따라 휴면 회복 확률을 감소시킬 것입니다. 간헐천이 더 가까울수록 더 강력한 회복 억제력을 발휘할 것이며, 분기공이 많이 있을수록 그 효과는 중첩될 것입니다. 불카누스에 활성화된 황금 간헐천 수가 2개 미만인 상태가 5분동안 유지될 경우, 기존에 유지되어오던 경로에서 주기당 최대 2번까지 강제적인 재해 회복 시도가 진행됩니다.\n\n[font=default-bold]배치 및 재스캔:[/font] 간헐천은 반드시 청크의 정확한 중심점에 생성될 필요가 없습니다. 청크 내부의 다양한 위치에 배치될 수 있으며, 최대 24개의 위치에 생성을 시도하게 됩니다. 또한 황금 간헐천은 다른 간헐천과 64칸 떨어져 있도록 생성됩니다. 황금 간헐천은 매우 가까운 주변 영역, 대략적으로 주변의 16칸 범위만 차단합니다; 32칸 전체를 포함하지 않습니다. /ei-auric-fumarole-rescan 명령은 불카누스에서만 사용할 수 있으며, 홍수를 바로 불러오는 대신, 이미 생성된 불카누스 청크에서 대기 중인 휴면 자격을 다시 확인합니다.
auric-inoculation-vat=황금 주입조
auric-inoculation-vat-2=Cycle inputs and band scaling
auric-inoculation-vat-3=Vigor, contamination, and bloom failure
auric-inoculation-vat-4=Cyst washing, dirty-water recapture, and telemetry
auric-inoculation-vat-text=Gleba's [entity=ei-auric-inoculation-vat] does not latch onto existing [entity=ei-auric-cyst-node] growth. It claims a contiguous wetland basin around itself and turns that living marsh body into a batch process that later blooms fresh nodes.\n\n[font=default-bold]Placement and basin claims:[/font] These vats are for Gleba. Set them where the claim field can touch enough marsh tiles to form a real basin. A valid basin needs 24-160 connected wetland tiles; a larger contiguous marsh must be cut down or split, and the basin cannot be shared with another vat. Overlapping footprints create claim conflicts, while a vat without a valid basin has nothing stable to inoculate.
auric-inoculation-vat-text-2=The vat runs through [font=default-bold]seed -> flood -> ferment (optionally enriched with bioflux) -> drain -> bloom -> rest[/font], not as a passive marsh drainer. Seed consumes [item=spoilage] and [fluid=ei-bio-oil], flood consumes [fluid=ei-dirty-water], and ferment consumes [item=jelly] and [item=yumako-mash]. During the enrichment window, feeding [item=bioflux] switches that ferment craft to enriched ferment before the vat drains and blooms.\n\nBasin size sets the active band: b1 at 24-39 claimed tiles, b2 at 40-55, b3 at 56-71, b4 at 72-87, b5 at 88-103, b6 at 104-127, and b7 at 128-160. Those same bands cap living cyst nodes in the claimed basin at 3, 4, 6, 8, 10, 12, and 14. Higher bands can hold more bloom output, but they also demand more water handling and more stable reagent support across the cycle.
auric-inoculation-vat-text-3=Every cycle balances [font=default-bold]vigor[/font] against [font=default-bold]contamination[/font]. Healthy basin footprints, fed phases, and manageable band pressure keep vigor ahead. Starvation, blocked drains, claim conflicts, and overworked marsh tiles drive contamination upward and push the vat into strained states.\n\nWhen contamination reaches failure thresholds, bloom stability collapses. The vat starts degrading basin tiles into worse wetland states and drops back toward rest instead of holding a clean bloom. If the console keeps drifting from stable to strained, either tighten the basin footprint or feed the cycle harder before the marsh dies under the machine.
auric-inoculation-vat-text-4=A successful vat later blooms fresh [entity=ei-auric-cyst-node]. Mine those nodes for [item=ei-auric-cyst], then run [recipe=ei-auric-cyst-washing] to strip the cysts into useful output while returning a [fluid=ei-dirty-water] fraction to Gleba's wider water loop. The vat's own drain phase outputs [fluid=ei-dirty-water] and sometimes [fluid=ei-acidic-water]; those output ports must clear before the next phase begins. A blocked drain holds the vat in place and raises contamination until the pipework can breathe.\n\nCircuit telemetry keeps the marsh legible. The vat can export [virtual-signal=ei-auric-vat-vigor], [virtual-signal=ei-auric-vat-contamination], [virtual-signal=ei-auric-vat-band], [virtual-signal=ei-auric-vat-claims], and [virtual-signal=ei-auric-vat-bloom]. Use them to compare basin footprints, alarm on conflicts or failure states, and decide when the washing line and drain handling need to grow with the next marsh band.
beacon-overhaul=신호기 개편
beacon-overhaul-text=Exotic Industries는 받을 수 있는 신호기 효과에 엄격한 제한을 부과합니다: 한 기계는 최대 4개의 신호기까지만 영향을 받을 수 있습니다. [font=default-bold]무한 중첩 시대는 끝났습니다.[/font]\n\n또한, 두번째 티어의 신호기부터는 이제 작동하기 위해 [fluid=ei-liquid-nitrogen]가 필요합니다. 냉각제가 없으면 과열되어 작동이 중단되므로, 이제 전력은 중요하지 않습니다 - 물류가 열역학적 안정성을 지원해야 합니다.\n\n그 대신 신호기가 구조적으로 업그레이드되었습니다:\n\n모듈 용량 증가\n개선된 신호기 도입\n한도 계산 시 2개로 계산\n더 많은 모듈 보관 가능\n더 많은 인프라 필요\n\n[font=default-bold]증폭은 더 이상 단순한 일이 아닙니다.[/font]\n이는 기계적 전문 분야입니다.\n정밀하게 구축하십시오 - 아니면 [font=default-bold]비효율의 늪에 빠질 것입니다.[/font]
biters=바이터와 적
biters-text=엑조틱 우주 산업: 리멤브렌스를 사용할 경우 폭발, 얼어붙은, 스내퍼, 독성, 거미 적이 이제 기본 지도 생성 방식을 수정하는 대신, ESIR의 자체적인 난이도 체계에 따라 관리됩니다. [font=default-bold]ei-default[/font] 지도 프리셋을 사용해야, 나우비스에서 전투 난이도를 별도로 분리하는 상태에서 의존성 프로토타입에 이미 존재하는 객체에 대한 능력치 스케일링을 진행할 수 있습니다. 자세한 내용은 '적 난이도' 페이지를 참고하세요.
black-hole=블랙홀 생성장치
black-hole-2=반응로 구성요소
black-hole-2-text=블랙홀 생성장치는 단일 구조물이 아니라, 안정성, 에너지 흐름, 최종 활성화에 각각 필수적인 여러 고강도 구성 요소로 구성된 모듈형 특이점 격리 배열입니다.\n\n중앙 구조물은 [color=orange]블랙홀 생성장치[/color] [item=ei-black-hole]입니다.\n\n활성화되면 인벤토리에 넣은 모든 아이템을 유형에 관계없이 소비합니다.\n\n각 아이템은 생성장치의 내부 [color=green]질량 계수[/color]에 동일하게 기여하며, 이는 시간이 지남에 따라 지속적으로 감소합니다. 질량 수준을 유지하기 위해 지속적인 아이템 입력이 필요합니다.\n\n아이템의 유형은 중요하지 않습니다.\n철 판, 돌, 회로, 생선 등 모든 것이 가능하며, 모두 질량으로 변환됩니다.\n\n[color=orange]에너지 주입 첨탑[/color] [item=ei-energy-injector-pylon]은 특이점이 성장함에 따라 격리 장벽을 유지합니다.\n각 기둥은 5GW의 지속적인 전력을 소비합니다.\n\n주입기는 시작 시에는 필요하지 않습니다 - [font=default-bold]기계는 신생 블랙홀을 포함할 수 있습니다[/font] - 하지만 질량이 축적되면서 필요해집니다.\n\n[color=orange]에너지 추출 첨탑[/color] [item=ei-energy-extractor-pylon]은 발전기가 [color=green]완전히 작동하는[/color] 상태에 도달한 이후 전력 추출을 가능하도록 합니다.\n각 추출기는 안정화된 특이점으로부터 최대 100GW의 원시 전력 에너지를 추출할 수 있습니다.\n\n추출은 발전기의 최종 단계에 도달해야 비로서 가능합니다.\n\n[font=default-bold]이것은 기계가 아닙니다. 이것은 붕괴의 의식입니다.[/font]\n당신은 [font=default-bold]경계 이상현상[/font]에 질량을 공급하고 있습니다.\n만약 이를 통제하지 않으면 실패할 것입니다.\n만약 공급을 중단하면 죽을 것입니다.\n\n두 가지를 모두 하면 - [font=default-bold]모든 것의 종말을 구동할 수 있을 것입니다.[/font]\n\n파괴 없이 자동화는 존재하지 않습니다.
black-hole-3=블랙홀 진행단계
black-hole-3-text=블랙홀 생성장치를 가동하는 것은 단계별로 큰 위험이 수반되는 과정입니다. 각 단계는 에너지, 질량, 구조적 요구사항을 점차 증가시킵니다. 단계를 건너뛸 수는 없으며, 진행하거나 실패하는 것만이 가능합니다.\n\n🜏 시작 단계\n\n첨탑은 필요하지 않습니다.\n\n생성장치는 초기 [color=blue]10×10³kg[/color] 질량에 도달하기 위해 충분한 재료를 소비해야 합니다.\n\n아이템 유형은 중요하지 않습니다 - 용량만 중요합니다.\n\n질량이 100% 진행도에 도달하면 생성장치는 격리 단계로 안정화됩니다.\n\n🜏 격리 단계\n\n이제 [color=blue]8개의 활성 에너지 주입 첨탑[/color] [item=ei-energy-injector-pylon]이 활성 상태를 유지해야 합니다.\n\n각 첨탑은 5GW를 소비하므로, 합계 40GW의 전력을 소모할 것입니다.\n\n확장 버튼을 누르면 특이점 반경의 통제된 성장이 시작됩니다.\n\n이 상태는 [color=blue]60초 동안 지속적으로 유지되어야 합니다.[/color]\n\n사소한 중단 - 전력 공급 중단, 첨탑 손실 - 도 타이머 초기화로 이어질 것입니다.\n\n🜏 완전 가동 단계\n\n발전기가 안정화되었으며, 특이점은 이제 외부에서 에너지를 추출할 수 있을 만큼 충분히 커졌습니다.\n\n[color=orange]에너지 추출 첨탑[/color] [item=ei-energy-extractor-pylon]을 범위 내에 배치하면 각 기둥당 최대 100GW를 추출하여 전력망에 직접 공급할 수 있습니다.\n\n이 단계에서 시스템은 대부분 자체적으로 운영되며, 붕괴를 상쇄하기 위한 지속적인 질량 투입만 필요합니다.\n\n당신은 반응로에 연료를 공급하는 것이 아닙니다.\n당신은 [font=default-bold]결합된 특이점의 배고픔을 관리하고 있는 것입니다.[/font]\n질량은 곧 힘이 됩니다. 힘은 곧 통제가 됩니다. [font=default-bold]통제는 최종적입니다.[/font]\n\n비활성 스위치는 없습니다. 오직 격리만이 존재합니다..
black-hole-text=[color=orange]블랙홀 생성장치[/color]는 최종 티어 기계입니다 - 중력 특이점을 산업용 기능으로 활용할 수 있도록 하는 장치입니다. 이 기계는 물질을 소비하며, 엔트로피를 거스르므로. 게임을 완료할 수 있습니다.\n\n이 장치를 [color=green]완전히 작동 가능한[/color] 상태로 만드는 것은 시스템의 완전한 지배 역시 의미합니다. 이것이야말로 당신의 승리 조건입니다. 정복이 아닌, 물리학의 기반을 이루는 구조를 통제함으로써 달성할 수 있습니다.\n\n블랙홀 생성장치를 가동하려면 다음 과정이 필요합니다:\n다량의 정제된 건축 자재\n지속적인 소비 물질 공급원\n거대하고 안정적인 전력 인프라\n\n강화된 [color=orange]융합 반응로[/color] 그리드를 건설하고, 산업 규모로 전력을 흡수 및 방출할 수 있는 계층형 [color=orange]유도 매트릭스[/color]로 보강하는 것이 강력히 권장됩니다.\n\n이것은 단순한 발전기가 아닙니다. [font=default-bold]붕괴에서 엮어진 종말입니다.[/font]\n\n현명하게 건설하십시오. [font=default-bold]지속적으로 공급하십시오.[/font] 두 번째 기회는 없습니다..
bots=더 많은 로봇
bots-text=리멤브랜스는 꺠끗한 전기 물류 시스템이 갖춰지기 전부터 기계를 공중에 띄울 수 있도록 합니다. 로봇은 이제 [font=default-bold]증기 시대[/font]에 [item=rp-steam-roboport], [item=rp-steam-logistic-bot], [item=rp-steam-construction-bot]을 통해 사용할 수 있으며, 이후 더 무겁고 발전된 전기 로봇떼로 발전합니다.\n\n이제, 공중 자동화를 더 빠르게 사용할 수 있습니다:처음에는 투박할지도 모르지만, 나중에는 우아해집니다.
bots-text-2=공장이 완전한 전기 로봇 체계를 갖춘 뒤, Exotic Industry 모드에서는 다양한 로봇 유형을 사용할 수 있도록 추가합니다. 대규모 물류 운송에 사용할 수 있도록 하는 중형 화물 로봇, 공격적인 건설 작업을 위한 중장비 건설 로봇부터 시작해, 나중에는 더 빠르며, 더 단단하며, 더 넓은 범위를 가진 특정 임무에 특화된 고급 변종들로 무리를 확장합니다. [font=default-bold][color=orange]고급 로보포트[/color][/font]는 개선된 충전 속도, 넓은 충전소, 확장된 건설/물류 범위를 제공하여 이러한 로봇 네트워크를 지원합니다.\n\n이것은 단순한 드론 네트워크가 아닙니다. [font=default-bold]이것은 기계화된 군단 프로토콜입니다.[/font]
chemical-asteroid=화학 소행성
chemical-asteroid-text=[font=default-bold]행성 아퀼로 발견[/font] 연구 후 해금됩니다. 기본 및 고급 분쇄 제작법은 덩어리에서 [fluid=ammonia]암모니아, [item=ei-fluorite]형석, [fluid=fluorine]플루오린 가스를 추출하며, 고급 제작법에서는 간혹 [fluid=lithium-brine]리튬 염수가 나올 가능성이 있습니다.\n화학 소행성에서는 이상 현상 아이템 중 [item=ei-neuro-reactive-residue]신경 반응성 잔여물을 발견할 수 있습니다.
chunk-grades=하급/일반 광석 덩어리
chunk-grades-text=모든 광석이 똑같은 것은 아닙니다. [item=ei-poor-iron-chunk]하급 철 덩어리와 [item=ei-poor-copper-chunk]하급 구리 덩어리는 부서진 지각 상층부에 남아 있는 오염된 고철 잔여물입니다. 이것은 산업을 유지하기 위한 것이 아니라, 시작하기 위한 용도입니다. 이 하급 광석의 진면목은 용광로에서 바로 드러나고 맙니다: [font=default-bold]하급 덩어리 3개 -> 판 1개[/font], 그리고 상당히 많은 광재 부산물이 배출됩니다.\n\n[item=ei-iron-chunk]심층 광맥에서 채취할 필요가 있는 [item=ei-iron-chunk]철 덩어리와 [item=ei-copper-chunk]구리 덩어리가 진정한 산업적 광석입니다. 추가 가공을 거치지 않더라도, [font=default-bold]일반 광석 덩어리 3개 -> 판 2개[/font]로 제련할 수 있으며, 광재 부산물 배출량도 훨씬 적습니다. [item=ei-poor-uranium-chunk]하급 우라늄도 동일한 규칙이 적용됩니다. 표면은 그저 힌트를 줄 뿐이며, 진짜 [item=ei-uranium-chunk]우라늄은 깊은 곳에 있습니다.
chunk-refining=여과기와 순수 광석
chunk-refining-2=아크 용광로와 플라즈마 열교환기
chunk-refining-text=[item=ei-purifier]여과기는 is the first machine that truly upgrades chunk quality instead of merely accepting it. It washes [item=ei-iron-chunk]iron chunks and [item=ei-copper-chunk]copper chunks with [fluid=water]water, converts them into [item=ei-pure-iron]pure iron or [item=ei-pure-copper]pure copper, and returns [fluid=ei-dirty-water]dirty water that you must deal with.\n\nThat extra step pays for itself. [font=default-bold]3 poor chunks -> 1 plate[/font], [font=default-bold]3 proper chunks -> 2 plates[/font], but [font=default-bold]1 pure ore -> 2 plates[/font] with only about a [font=default-bold]1% slag chance[/font]. Deep chunks begin a real metal economy; purification makes it dense, clean, and industrial.
chunk-refining-text-2=The [item=ei-arc-furnace]Arc furnace turns chunk processing into full metallurgy by melting chunks, pure ore, plates, and parts into [fluid=ei-molten-iron]molten iron and [fluid=ei-molten-copper]molten copper for casting chains. It can consume poor chunks if it must, but the numbers explain why you should not stop there: [font=default-bold]3 poor chunks only become 15 molten metal[/font], while [font=default-bold]1 pure ore becomes 40[/font] with almost no slag.\n\nThe [item=ei-plasma-heater]Plasma heater continues that path in the Quantum Age. It can still run the arc-furnace metal recipes while also unlocking extreme-temperature gas and plasma processing. The purifier improves the feedstock, the arc furnace improves the metallurgy, and the plasma heater carries that same chain into the late game.
cranes-and-belts=새로운 벨트와 투입기 크레인
cranes-and-belts-text=Exotic Industries는 새로운 수준의 물류 인프라를 소개합니다: [color=orange]네오 물류 벨트[/color] [item=ei-neo-belt]. 고성능 소재로 제작된 이 시스템은 기본 운송 한계를 모두 초과하는, 초당 [font=default-bold]90개[/font]의 물품을 처리할 수 있습니다. 이 벨트는 엔드게임 규모의 물량을 처리하는 재귀적 규모 공장을 위해 설계되었습니다.\n\n또한 이 모드는 [color=orange]크레인[/color] [item=ei-big-inserter-normal] - 대량 전송을 위해 설계된 2x2 대용량 투입기를 추가합니다.\n\n사용예:\n\n열차의 화물을 빠르게 하역합니다\n\n대형 인벤토리 구조물(예: 상자 ↔ 창고)을 연결합니다\n\n표준 투입기가 압력 하에서 실패하는 곳에서도 흐름을 유지합니다\n\n[font=default-bold]속도는 더 이상 사치가 아닙니다.\n그것은 곧 기본입니다.\n물류는 전력과 함께 확장되어야 하며, 그렇지 않으면 파멸 뿐입니다.[/font]
crystal-accumulator-resonance=수정 축전지 공명
crystal-accumulator-resonance-2=Nauvis profile
crystal-accumulator-resonance-3=Other surfaces and orbit
crystal-accumulator-resonance-4=Quality is not coherence
crystal-accumulator-resonance-5=Mining and repair
crystal-accumulator-resonance-6=UI legend
crystal-accumulator-resonance-text=수정 축전지s are not ordinary batteries. They are alien resonance shells seeded into generated relic clusters, and the useful way to read them is through [font=default-bold]load[/font] and [font=default-bold]coherence[/font], not a simple on/off toggle.\n\nIn the live runtime, [font=default-bold]load[/font] is a resonance proxy: it blends averaged surface output for the current shell and quality with the local strain inside that specific crystal. Read it as lattice pressure, not as a literal per-entity watt meter.\n\nIn the current live shell ladder, the unstable profile can sit at a [font=default-bold]4 MW low shell[/font], a [font=default-bold]7.5 MW base shell[/font], or a [font=default-bold]10 MW surged shell[/font]. Gaia resolves the same geometry into a [font=default-bold]15 MW Gaia shell[/font]. Offline husks sit outside that ladder entirely until repaired.
crystal-accumulator-resonance-text-2=Nauvis is the explicit grounded profile for the unstable shell. When you discover or place [item=ei-crystal-accumulator] there, read it as the baseline resonance case: productive, alien, and never quite settled.\n\nThe shell may drift between low, base, and surged rungs, but it remains the same unstable class. Nauvis is not the cure. It is the reference wound.
crystal-accumulator-resonance-text-3=Outside Nauvis, treat non-Gaia planets and orbital platforms as foreign-profile space. The unstable shell can still operate there, but it does not gain stability simply by leaving its point of discovery.\n\nGaia is the exception. There the same chassis resolves into [item=ei-crystal-accumulator-gaia]the stable 수정 축전지, doubling base output from [font=default-bold]7.5 MW to 15 MW[/font] and lifting the whole shell ladder with it.
crystal-accumulator-resonance-text-4=Do not confuse [font=default-bold]quality[/font] with [font=default-bold]resonance profile[/font]. Quality is the usual item layer; low shell, base shell, surged shell, Gaia shell, and offline husk are shell states this page is documenting.\n\nIf a crystal item carries quality, that does not replace the load/coherence read. The page legend is about how the lattice is singing, not how finely the item rolled.
crystal-accumulator-resonance-text-5=수정 축전지s are relics first and equipment second. Mining an unstable shell should be read as a violent break in coherence: the safe expectation is a broken body, not a clean relocation. The off-state shells [item=ei-crystal-accumulator_off-1][item=ei-crystal-accumulator_off-2][item=ei-crystal-accumulator_off-3][item=ei-crystal-accumulator_off-4] persist until a [item=ei-crystal-accumulator-repair]repair kit is dragged across them.\n\nAlt-selecting with the repair tool inspects 수정 축전지s and husks without spending the kit. Dragging it normally performs the repair. If that restoration happens on Gaia, the surface resolves it immediately into the stable variant.
crystal-accumulator-resonance-text-6=[font=default-bold]Low shell[/font]: coherence is damped and output sits below the base rung.\n[font=default-bold]Base shell[/font]: the unstable chassis is holding its default 7.5 MW band.\n[font=default-bold]Surged shell[/font]: output is above base and the lattice is under strain.\n[font=default-bold]Gaia shell[/font]: Gaia has resolved the same chassis into the stable 15 MW rung.\n[font=default-bold]Offline husk[/font]: inert artifact body awaiting repair.\n\nCrowding reads the nearby shell chorus as [font=default-bold]Clear -> Crowded -> Strained -> Chaotic[/font]. Read the ladder in that order and the crystal stops looking random.
crystal-accumulator-resonance-text-7=Alt-select with [item=ei-crystal-accumulator-repair] to inspect 수정 축전지s and husks without spending the kit. Drag the tool normally only when you actually want to repair.\n\nThe telemetry line reads either [font=default-bold]Surface output + strain[/font] or [font=default-bold]Strain fallback[/font]. Crystals with the same shell and quality on the same surface share that averaged surface-output term; local strain is what still separates a depleted shell from its sibling.
drone=드론 기지
ei-runtime-status-command-help=ESIR 런타임 요약 정보를 실시간으로 출력합니다. 추가 인수로 snapshot, auric, auric-detail, telemetry-on, telemetry-off를 사용할 수 있습니다.
ei-runtime-status-disabled=ESIR 런타임 원격 측정 기능이 비활성화되었습니다.
ei-runtime-status-enabled=ESIR 런타임 원격 측정 기능이 활성화되었습니다.
ei-runtime-status-usage=사용법: /ei_runtime_status [snapshot|auric|auric-detail|telemetry-on|telemetry-off] (인수가 없을 경우: 현재 실행 상태의 요약 정보를 출력)
emerald-apocalypse-hover-tank=에메랄드 아포칼립스 호버 탱크
emerald-apocalypse-hover-tank-2=Crystal charge
emerald-apocalypse-hover-tank-3=Orbital shard doctrine
emerald-apocalypse-hover-tank-4=Shard console
emerald-apocalypse-hover-tank-5=Hull doctrine
emerald-apocalypse-hover-tank-6=봉인 해제시 제어
emerald-apocalypse-hover-tank-text=The [item=ei-emerald-apocalypse-hover-tank] is a hover fortress from the late exotic age: too heavy for grace, too devoted to fall. Its emitter rings hold the hull above the world while the fixed cannon turns facing into sentence.
emerald-apocalypse-hover-tank-text-2=The [item=ei-emerald-apocalypse-charge] is a single sealed rupture carried for the [item=ei-emerald-apocalypse-cannon]. When fired, the tank does not scatter anger. It opens one green commandment and lets the battlefield answer.
emerald-apocalypse-hover-tank-text-3=The orbital shards are scripted doctrine, not turret equipment. Shard manifold raises the ring from three to six active shards. Reload litany cuts the per-shard cadence from 1.17 seconds to 0.92, 0.75, then 0.58 seconds. Target verdict changes selection from nearest prey to a threat score that values spawners, turrets, health, wounds, and distance. Verdict aperture widens the beam and lets each hit spill capped damage into nearby or corridor-aligned targets.
emerald-apocalypse-hover-tank-text-4=Open the tank inventory to reveal the orbital shard console. Each placed tank can command 0 to its researched maximum shards. Split targeting lets shards distribute their verdicts across the best nearby threats; Focus orders every active shard into the same current target. The displayed DPS includes active shard count, laser weapon damage 7+ repeatables, and the placed tank's quality.
emerald-apocalypse-hover-tank-text-5=Hull doctrine is finite. Charge catechism shortens the wind-up from 9.48 seconds to 8.5, 7.58, then 6.67 seconds, each tier answering through its own shorter charge hymn. Inertial oath lowers the post-fire seal from 15 seconds to 13.17 and then 11.33 seconds. Aegis covenant makes shield harm answer nearby hostiles. Vector keel improves the hover chassis without removing its skid. Collapse mandate hardens the 52-tile endpoint wave without letting it grow unbounded.
emerald-apocalypse-hover-tank-text-6=Apocalypse recursion opens per-tank toggles. They default on: charge reclamation, keel wake, branching scars, split wake, and unsealed impact. These are not gentle doctrines. Disable them on individual tanks when the oath should stay narrow.
em-trains=EM 기차
em-trains-2=품질, grace, and transfer efficiency
em-trains-3=Research and field behavior
em-trains-text=Gaia does not ask its late railways to burn. It asks them to couple. [item=ei_charger]EM chargers establish a crystalline field mesh over the rail path, and the [item=ei_em-locomotive]EM locomotive with its [item=ei_em-cargo-wagon]cargo and [item=ei_em-fluid-wagon]fluid wagons rides that mesh instead of feeding coal or diesel into a firebox.\n\nBecause motive force comes from the charger lattice rather than onboard combustion, the same rolling stock is usable on planetary lines and off-world corridors alike. Gaian engineers insist the crystals are not pushing against smoke, steam, or even air; they are remembering the rail's geometry and pulling the consist through that memory. Whether that is physics or liturgy, it survives the vacuum just fine.
em-trains-text-2=Quality now matters on both sides of the link. Higher-quality [item=ei_charger]chargers reduce their own field upkeep by up to [font=default-bold]20%[/font] and improve transfer efficiency by another [font=default-bold]12%[/font]. Higher-quality [item=ei_em-locomotive]locomotives reduce the field power they demand by up to [font=default-bold]16%[/font]. These bonuses are normalized across the active quality ladder, so modded quality tiers scale cleanly between the lowest and highest available grades instead of assuming vanilla's exact steps.\n\nLocomotive quality also creates a [font=default-bold]grace window[/font] after leaving charger coverage. At maximum quality, field coherence can be preserved for up to [font=default-bold]480 ticks, or 8 seconds[/font]. Normal quality gets no grace at all. This is meant to bridge short gaps, rail seams, or brief routing mistakes—not to excuse building dead sections into the network.
em-trains-text-3=The research families [font=default-bold]ei_acc[/font], [font=default-bold]ei_spd[/font], and [font=default-bold]ei_eff[/font] remain the main global multipliers. Speed and acceleration each add [font=default-bold]+10% per level[/font] up to [font=default-bold]+200%[/font]. Charger efficiency climbs through five tiers to as much as [font=default-bold]90% less network power burden[/font]. Local charger quality and local locomotive quality then stack on top of that global research when power is actually transferred.\n\nIn practice, good EM rail is built from both science and hardware. If coverage refreshes, the train keeps its field fuel topped up and runs like light on a wire. If coverage collapses, the system first spends any grace reserve and then the locomotive turns inert. Gaia forgives many things. A broken field is not one of them.
