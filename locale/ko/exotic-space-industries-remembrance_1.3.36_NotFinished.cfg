ei-bridge-coupling-1-effect=Bridge coupling I: late bridge damage rises without collapsing the vanilla tesla family into TL doctrine.
ei-bridge-coupling-2-effect=Bridge coupling II: the Replica Fulgoran tower inherits the heavier late bridge payoff.
ei-dielectric-rupture-1-effect=유전체 파열 I: advanced aftershocks retain more charge after confirmed kills.
ei-dielectric-rupture-2-effect=유전체 파열 II: advanced aftershocks reach farther and ignite more reliably.
ei-dielectric-rupture-3-effect=유전체 파열 III: advanced coils turn kill confirmations into short execution storms.
ei-exotic-waveform-convergence-effect=Exotic waveform convergence: Legacy coils gain exotic branch, execution-storm, and stormfront bursts, while the Replica Fulgoran coil gains a turret-only exotic aftershock bloom.
ei-reactance-overdrive-1-effect=Reactance overdrive I: the tesla tank widens its volatility envelope and throws more saturation arcs.
ei-reactance-overdrive-2-effect=Reactance overdrive II: the tesla tank holds longer overdraw and heavier stormfront discharge.
ei-reactance-overdrive-3-effect=Reactance overdrive III: the tesla tank reaches its final fusion-era twin-coil brutality.
ei-storm-lattice-1-effect=Storm lattice I: the basic coil gains broader field-arc propagation and cleaner target handoff.
ei-storm-lattice-2-effect=Storm lattice II: the basic coil keeps wider arc lattices alive under heavier swarms.
ei-storm-lattice-3-effect=Storm lattice III: the basic coil becomes a true late-game suppression tower.
ei-waveform-harmonics-1-effect=Waveform harmonics I: harmonized impact semantics and the first shared bridge bonus.
ei-waveform-harmonics-2-effect=Waveform harmonics II: modern chained follow-up families unlock for Legacy coils and the bridged tesla family.
ei-waveform-harmonics-3-effect=Waveform harmonics III: full Space Age follow-up language and stronger bridged turret chaining.
