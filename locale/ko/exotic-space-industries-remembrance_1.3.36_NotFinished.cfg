[mod-setting-description]
ei-black-hole-notifications=격리 실패와 같은 블랙홀 관련 알림을 채팅에 출력합니다.
ei-enable-preliminary-k2so-patch=개발 중인 Krastorio2 Spaced Out 호환성 레이어는 기본적으로 비활성화 상태로 유지됩니다. 현재 예비 상태로 구성된 패치 세트를 명시적으로 테스트하려는 경우에만 이 옵션을 활성화하세요.
ei-enemy-difficulty=엑조틱 산업: 리멤브렌스 모드에서 사용할 적 난이도 수준을 조정합니다. 'Gentle'부터 'Nightmare'까지는 적의 전투력 및 생성 능력치가 변경됩니다. 'Original'은 모든 값이 1.0으로 유지되며, 'Merciful'과 'Impossible'은 일부 상황에서의 최대치 재정의도 적용합니다. 'Impossible'은 나우비스 초기 진화 지연을 비활성화하며, 로켓 발사 시 발생하는 공해는 이미 적대적인 적의 보복을 유도할 수 있습니다.
ei-flammable-rupture-fidelity=가연성 유체의 누출 시 시각 효과와 위험 확산 방식을 조정합니다. '간결히'는 폭발을 간결하게 유지합니다. '기본'은 기본값을 유지합니다. '과장'은 조형물을 더 많은 고리 형태로 늘려뜨립니다. '무제한'으로 설정하면 효과 상한을 무제한으로 바꿀 수 있지만, 대형 탱크가 파열될 때 UPS에 심각한 부하가 발생할 수 있습니다.
ei-fueler_range=사거리 값이 높을수록 타워가 더 멀리 있는 목표물에 도달할 수 있지만, 각 타워가 더 넓은 탐색 영역을 검색해야 하므로 UPS 성능이 감소됩니다.
ei-fulgora-day-length-variation-max-multiplier=풀고라 일과 시간 변동폭의 최대 배율. 매 하루 시작시 기본 하루 길이에 '최소 배율 ~ 최대 배율' 사이의 무작위 값이 곱해집니다. 최대 배율이 높을수록 하루 길이가 길어질 수 있으며, 낮을수록 짧아질 수 있습니다.
ei-fulgora-day-length-variation-min-배율=풀고라 일과 시간 변동폭의  최소 배율. 매 하루 시작시 기본 하루 길이에 '최소 배율 ~ 최대 배율' 사이의 무작위 값이 곱해집니다. 최대 배율이 높을수록 하루 길이가 길어질 수 있으며, 낮을수록 짧아질 수 있습니다.
ei-gate-difficulty=관문 조율이 가능한 연구 진행 수준을 조정합니다. '회복'은 기본 수준을 유지합니다. '조율'은 관문 연구를 외계 컴퓨터 시대 후반으로 이동시킵니다. '공명'은 관문을 양자 시대 후반으로 이동시킵니다. '역설'은 관문을 엑조틱 시대에서야 가능하도록 이동시킵니다. 새 저장 파일이나 관문 연구 이전 조정을 마치는 것을 권장합니다.
ei-gate-notifications=관문 목적지 갱신 및 전력 부족 경고와 같은 알림을 채팅에 출력합니다.
ei-insulated-pipe-notifications=누출, 파열, 오염 등의 단열 파이프 손상과 관련된 알림을 채팅에 출력합니다.
ei-matter-machine-notifications=엔트로피 연쇄 반응 경고와 같은 엑조틱 조립 기계와 관련된 알림을 채팅에 출력합니다.
ei-nauvis-pressure-grace=나우비스에서 적이 과도하게 진화하지 않도록 일시적으로 늦춥니다. 활성화되어 있다면 5분마다 한 번씩 진화 요인을 시대 목표 기준치로 낮추며, 공해를 감소시키거나, 산란장을 제거하거나, 이미 파괴된 기지를 재건하지는 않습니다. 선택한 프로필에 따라 이 효과가 '전기 시대'에서 종료되는지, 아니면 '전기 시대' 초반에 서서히 감소할지 조정할 수 있습니다.\n난이도가 'Impossible'로 설정되어 있다면 이 설정이 활성화되어 있더라도 이 기능이 작동하지 않음에 유의하세요.
ei-ticks_per_full_update=모든 EI 객체를 업데이트할 틱 간격을 조정합니다.
ei-nauvis-interlude-tracks-override=리멤브랜스 사운드트랙이 기본 게임 나우비스 간주 배경음악을 덮어쓰도록 허용합니다.
ei-nauvis-main-tracks-override=리멤브랜스 사운드트랙이 기본 게임 나우비스 메인 배경음악을 덮어쓰도록 허용합니다.
ei-solar-icon-scaling=설치 공간과 에너지 출력 측면에서 3가지 유형의 태양 전지판 티어를 모두 확장합니다.\n75% 미만으로 확장하면 배치의 [color=cyan]유연성[/color]이 증가하며, 75% 이상으로 설정하면 동일한 자원으로 주어진 발전량에 [color=yellow]더 쉽게[/color] 도달할 수 있게 됩니다.
ei-science-pack-yield-alien=[color=pink]외계[/color] 시대 기술 팩 제작법으로 한 번에 제작할 수 있는 기술 팩 수량을 조정합니다.
ei-science-pack-yield-black-hole=[color=black]블랙홀 엑조틱[/color] 시대 기술 팩 제작법으로 한 번에 제작할 수 있는 기술 팩 수량을 조정합니다.
ei-science-pack-yield-computer=[color=yellow]컴퓨터[/color] 시대 기술 팩 제작법으로 한 번에 제작할 수 있는 기술 팩 수량을 조정합니다.
ei-science-pack-yield-dark=[color=red]암흑[/color] 시대 기술 팩 제작법으로 한 번에 제작할 수 있는 기술 팩 수량을 조정합니다.
ei-science-pack-yield-electricity=[color=blue]전기[/color] 시대 기술 팩 제작법으로 한 번에 제작할 수 있는 기술 팩 수량을 조정합니다.
ei-science-pack-yield-exotic=[color=#00912E]엑조틱[/color] 시대 기술 팩 제작법으로 한 번에 제작할 수 있는 기술 팩 수량을 조정합니다.
ei-science-pack-yield-fusion-quantum=[color=cyan]융합 양자[/color] 시대 기술 팩 제작법으로 한 번에 제작할 수 있는 기술 팩 수량을 조정합니다.
ei-science-pack-yield-quantum=[color=purple]양자[/color] 시대 기술 팩 제작법으로 한 번에 제작할 수 있는 기술 팩 수량을 조정합니다.
ei-science-pack-yield-simulation=[color=green]시뮬레이션 컴퓨터[/color] 시대 기술 팩 제작법으로 한 번에 제작할 수 있는 기술 팩 수량을 조정합니다.
ei-science-pack-yield-steam=[color=gray]증기[/color] 시대 기술 팩 제작법으로 한 번에 제작할 수 있는 기술 팩 수량을 조정합니다.
ei-check-for-recipe-icons-improvement-mod=[color=red]활성화 매우 권장[/color] [color=orange]NaK1119[/color]가 제작한 Recipe Icons Improvement for Exotic Space Industries Remembrance 모드를 확인합니다, 모드 로드/리스폰 시 적용됩니다.\n이 모드는 제작법/아이템/유체를 분류하고 아이콘을 수정하여 더 쉽게 식별하고 찾을 수 있도록 합니다.\n주요 기능:\n모든 제작법, 아이템, 유체의 그룹/순서를 전면 개편\n제작법, 아이템, 유체 아이콘을 수정하여 가시성을 높임.\n팩토리오백과 및 신호 GUI에 포함할 필요가 없는 제작법, 객체 등을 숨김.\n게임 시작 설정에서 각 기능을 비활성화할 수 있습니다.\n기존 게임에 관하여\n이 모드는 모든 저장 파일에 적용하거나 제거할 수 있습니다. 단, 아이템/유체 신호(제작법 신호 제외) 제작법을 설정한 경우, 이 모드를 적용/제거할 경우 해당 제작법이 변경될 수 있습니다.\n제한 사항:\nKrastorio 2 Space Out을 지원하지 않음
ei-rocket-launch-pollution-cap=진화 요인이 1.0일 때 로켓 발사로 인해 발생하는 공해량을 조정합니다.
ei-rocket-launch-pollution-mode=linear -> 예측 가능, 진화에 따른 일정한 증가\nquadratic -> 초반은 약하지만, 후반에 급속 상승\nexponential -> 초반이 매우 약하지만, 후반에 매우 급속한 상승\nthreshold -> 특정 진화 요인에 단계적 증가\nhybrid -> 선형 기본값 + 후반에 추가 증가
ei-tl-behavior-mode=테슬라의 유산 모드의 객체를 가벼운 혼합 방식을 따라 포함할지, 아니면 원작 모드를 충실히 재현하도록 할지 여부를 조정할 수 있습니다.
tl-advanced-attack-anim=고급 테슬라 코일이 곧 방전할 것임을 알릴 방식을 변경합니다.
tl-critical-chance=테슬라 공격이 치명타를 가할 확률을 조정할 수 있습니다.
tl-critical-multiplier=테슬라 공격이 치명타를 가했을 때, 기본 공격 피해량이 해당 설정값만큼 곱해집니다
tl-flying-text-critical=치명타 피해를 입혔을 때 플로팅 텍스트를 표시합니다.
tl-flying-text-damage=Shows floating text for the 테슬라 탱크가 Bionization 피해를 입혔을 때 플로팅 텍스트를 표시합니다.
tl-flying-text-vaporize=증발이 즉사 효과를 발동했을 때 플로팅 텍스트를 표시합니다.
ei-emerald-apocalypse-hover-tank-hover-visual-fidelity='에메랄드 아포칼립스 호버 탱크'의 선체 하부 엔진이 얼마나 강렬하게 빛나도록 할지 설정합니다. 이 설정은 유물 아래쪽의 프리즘 고리에만 적용되며, 외피, 무기, 연료, 충전량, 이동 능력 등은 변경되지 않습니다.
ei-gaian-saucer-wake-visual-fidelity='슬립웨이크 비행접시'가 이동 흔적을 얼마나 강렬하게 남기도록 할지 조정합니다. 이 설정은 짙은 색체의 항적에만 적용되며, 인벤토리 슬롯, 격자 구조, 추진기, 외피, 제작법 등은 변경되지 않습니다.
ei-item-glow-overlay-fidelity=아이템 아이콘에 대한 빛 투과 오버레이 레이어를 제어합니다. '모든 글로우 레이어(All)'은 일반적인 시각 효과를 모두 유지하지만, '평면 글로우 이미지(Flat)'은 빛을 렌더링하지 않고 빛나는 부분만 남깁니다, '비활성화(Off)'로 설정하면 빛나는 오버레이 요소가 완전히 제거됩니다.
ei-singularity-lance-visual-fidelity=특이점 창이 각 공격 흔적을 얼마나 강렬하게 남길지 설정합니다. 이 설정은 빔 흔적, 글로우, 불꽃, 그을음, 소리에만 영향을 미치며, 칼날의 굶주림, 사거리, 본체, 제작 방식은 변경되지 않습니다. 'Revelatory'는 드러남에 대한 절제를 강제합니다. '무제한적인 표현도(Unbound)'는 제한 장치를 해제하여 프리즘 광선이 세계에 감당할 수 있는 모든 상처를 새기도록 합니다.
ei-arc-furnace-light-flicker-preset=아크 용광로의 작업등이 어떻게 표시되어야 할지 제어합니다. 'Original'은 불안정한 아크를 그대로 유지합니다. '감소된 반짝임(Reduced)'와 '편안한 불빛(Soft)'는 깜빡임을 완화합니다. '안정적인 빛(Static)'은 일정한 빛을 유지합니다. '비활성화(Off)'로 설정되면 작업등은 표시되지 않지만, 용광로 애니메이션과 대기 상태에서의 빨간색 커패시터 불빛은 유지됩니다.
ei-nauvis-pressure-grace-profile='Classic'은 기존 버전에서 사용했던 전기 시대 기준을 유지합니다. 새로운 기본값인 'Extended'는 전기 시대 이전 상한선이 더 낮게 설정되어 공해로 인한 진화 계수를 일시적으로 낮추며, 유예 기간이 끝난 뒤 원래 값으로 복원합니다.
ei-rocket-launch-pollution-visual-style='하이브리드(Hybrid)'로 설정하면 격납고 공해 효과가 감소된 상태로 시작하도록 한 뒤, 발사 이후 점차 사라지도록 합니다. '공중 효과만(Ascending plume only)는 하늘로 뻗어 올라가는 공해 효과만 유지하며, 격납고에서의 효과를 생략합니다. '시네마틱(Cinematic)'에서는 발사가 완료될 때까지 공해 효과를 온전히 유지합니다. '지면 효과만(Pad exhaust only)'는 하늘로 뻗어 올라가는 공해 효과를 제외한 지면 상의 격납고 효과만 유지합니다.
tl-advanced-sound-volume=고급 테슬라 코일의 발사시 발생하는 효과음 음량을 설정합니다. 0은 코일 발사음을 완전히 음소거하며, 100으로 설정하여 최대 음량으로 설정할 수 있습니다. (기본값: 70)
tl-basic-sound-volume=테슬라 코일의 발사시 발생하는 효과음 음량을 설정합니다. 0은 코일 발사음을 완전히 음소거하며, 100으로 설정하여 최대 음량으로 설정할 수 있습니다. (기본값: 70)