[recipe-description]
ei-bio-oil-refining=유충 점액을 점도에 따라 분류합니다.
ei-bio-oil-synthesis=Pentapod eggs are dumped into the jelly alive—then the real horror starts: they feed. The jelly thins as it’s consumed, tugged into the eggs in slow, hungry pulses, until the vat turns into a trembling slurry. As the brood metabolizes, it sweats out a yellow-blue, iridescent oil—a slick byproduct that rises to the surface in shimmering sheets. Skim the 유충 점액 off fast, before the eggs drink it back.
ei-breach-residue-neutralization=Neutralize gate residue into dirty water.
ei-carbon-fiber-from-bio-oil=A harsher, higher-yield carbon fiber run: 유충 점액 and nitric acid are driven through yumako mash to strip organics and expose its nanotube scaffold. Carbon is added as seed grit, while bioflux forces the slurry into rapid polymerization—spitting out a thicker, tighter carbon-fiber weave. The process leaves behind acidic water and dirty runoff, with occasional ash precipitating out as the mash burns down under the acid.
ei-fluoride-uranium-235-reprocessing=A cleaner fluoride route that recovers more material while pushing uranium-238 toward uranium-235.
ei-fluoroketone-cooling-ice=Condense hot fluoroketone with ice, venting the recovered heat as 500 C steam.
ei-irradiated-water-purification=Strip radioactive contamination from coolant into dirty water and concentrated nuclear waste.
ei-lube-destilate-steam-finishing=Steam-finishes lubricant distillate into stable lubricant, venting light coal-gas fractions as a byproduct.
ei-lube-destilation=Hydrothermally degrades lubricant into heavy oil and carbon residue.
ei-neutron-collector-idle=Keeps the collector interface available while no neutron charging recipe can run.
ei-plastic-from-bio-oil=Creating plastic bar from petroleum and 유충 점액
ei-steam-bio-oil-refining=Processing 증기와 유충 점액 into into medium, heavy, and lubricant distillates.
ei-sulfur-from-bio-oil=Creating Sulfur from petroleum and 유충 점액
ei-sulfuric-uranium-235-reprocessing=An early sulfuric route that pushes uranium-238 toward uranium-235 at a higher waste burden.
ei-water-bio-oil-refining=Processing water and 유충 점액 into medium and heavy distillates.
ei-auric-cyst-washing=Scald harvested auric cysts with superheated steam, then etch the opened husk with sulfuric acid. The gold-bearing kernel breaks into chunks while the spent tissue sloughs away as spoilage and dirty water.
ei-auric-inoculation-vat=Construct an auric inoculation vat that claims a nearby wetland basin, runs inoculation cycles on Gleba, and later blooms auric cyst nodes from the marsh.
ei-gaian-saucer=Rehouses a Spidertron command core inside a Gaian hover shell, stripping the launchers and leaving the engine to remember motion without limbs.
ei-railgun-cooling-proxy-running=Circulates cold fluoroketone through a railgun cooling jacket and returns it as hot fluoroketone.

