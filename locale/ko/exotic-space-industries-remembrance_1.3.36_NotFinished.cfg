gate-gui-control-source-label-tooltip=Manual uses the console's selected receiver and state. Circuit takes over only when signal-D resolves to a valid receiver ID. In that case, signal-D picks the destination and signal-E only sets armed or disarmed; if signal-E is absent or 0, the resolved route arms by default. If signal-D cannot resolve, the gate falls back to the manual receiver; signal-E still overrides armed or disarmed when it is nonzero, otherwise the manual state applies.
gate-gui-control-source-manual=Manual
gate-gui-control-state-button-tooltip=Set the manual fallback arm state used when signal-D does not resolve cleanly and signal-E is absent or 0. A nonzero signal-E still overrides armed or disarmed. Active routes still need a resolved destination and must stay above the low-power floor to transfer.
