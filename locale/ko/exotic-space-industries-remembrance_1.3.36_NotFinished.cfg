[mod-description]
exotic-space-industries-remembrance=경고: 지도 생성시 별도의 지도 프리셋 사용이 필요합니다!\n팩토리오 2.0 우주 시대 개편은 압박감 증가, 신중한 선택과 타협, 상황에 따라 달라지는 물류 시스템을 중심으로 재구성된 Factorio 2.0 '우주 시대' DLC의 대규모 개편 모드입니다.시대 기반 산업 발전, 행성 자원 시스템, 관문, 궤도 물류, 그리고 게임 후반 거대 구조물 건설을 통해 게임을 진행하세요. 난이도 역시 모드의 핵심 요소이지만, 기술에 필요한 과학 팩, 적 공세, 기타 요소는 사용자 지정 설정이 가능합니다.\n\n번역: SimpleKoreanLocale(PolarZero)\n일부 번역은 다음 모드를 참고했습니다: EkT(Tororo23)\n[https://mods.factorio.com/mod/Exotic-korean-Translate]
