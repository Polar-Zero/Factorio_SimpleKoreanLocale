[item-description]
ei-induction-matrix-advanced-solenoid=유도 매트릭스 다중 구조에 배치할 수 있는 고급 솔레노이드. 코일 옆에 직렬로 배치하면 코일의 효율을 높일 수 있습니다. 단독으로 배치할 경우에도 기본적인 솔레노이드보다 더 적은 용량을 차지합니다. 솔레노이드가 너무 많으면 매트릭스 에너지 최대치가 감소할 수 있습니다.
ei-plated-wall=합성 폴리머로 층을 쌓은 납 결합 철근 콘크리트. 이전 제품보다 더 견고하고 밀도가 높으며 덜 부서지므로, 엔트로피 자체에 대항하도록 설계된 진정한 성벽이기도 합니다.
ei-tough-wall=세라믹과 콘크리트의 하이브리드 구조에 강철 골조가 뒷받침합니다. 무겁고, 무뚝뚝하며, 무자비한 이것은 밀도만으로 무게를 견뎌냅니다.
ei-acidthrower-turret=적을 뼛속까지 녹일 수 있는데 왜 귀중한 원유를 불에 태워 낭비할까요? 화염방사기의 기괴한 사촌 격인 이 장치는 노즐이 비명을 지를 때까지 [color=green]황산[/color]을 가압합니다. 그 결과, 타지 않을 정도로 부식성이 강한 연기가 생성됩니다. 구조물은 부식되고 외피는 녹아내리며 남은 잔해는 삽마저 녹아내리기 전에 퍼내는 것만이 최선일 것입니다.
ei-camp-fire=신호기라기보다는 꺼지는 것을 거부하는 고집센 촛불에 가까운 이 모닥불 장치는, 화려함을 이용해 빛을 내는 게 아니라, 순수한 대담함으로 빛을 냅니다 - 주어진 건 뭐든 태워버린 뒤, 정중히 더 많은 태울 것을 요청합니다.
ei-burner-quarry=주변 환경을 희생하는 대신, 처리 및 생산량을 극대화하도록 최적화된 초대용량 추출 단지입니다. 막대한 에너지 및 매장량을 소비하고 광활한 굴착 대상 지형에 상처를 남깁니다. [color=gray]54%의 추가 자원[/color]을 얻을 수 있으며, 무자비한 속도로 광석을 채굴하여 최대 효율로 회수합니다.
ei-chemical-asteroid-chunk=정말 이상한 구성입니다.
ei-chrono-fossil-shard=뼈 구조의 화석화된 잔해로, 인공적으로 제작된 것으로 추정되며 광자적 흔적이 남아 있습니다. 단단한 진공 상태에서도 숨 쉬는 소리를 냅니다. 서로 다른 시간대에 걸친 시뮬레이션을 반복하도록 합니다. 과거의 공간 붕괴 연쇄반응으로부터 고해상도 데이터를 추출하는 데 적합합니다.
ei-depleted-uranium-fuel-cell=사용된 우라늄-235 연료 전지
ei-electric-quarry=주변 환경을 희생하는 대신, 처리 및 생산량을 극대화하도록 최적화된 초대용량 추출 단지입니다. 막대한 에너지 및 매장량을 소비하고 광활한 굴착 대상 지형에 상처를 남깁니다. [color=gray]54%의 추가 자원[/color]을 얻을 수 있으며, 무자비한 속도로 광석을 채굴하여 최대 효율로 회수합니다.
ei-mechanical-inserter=바람의 신의 은총으로 움직이며, 전기가 필요하지 않습니다. 단순한 천재성에서 탄생했으며 - 수학을 의심하지 않는 한 영원히 회전합니다.
ei-mechanical-long-inserter=열역학 법칙을 거부하는 장대한 손. 마법이 아닌 균형입니다.\n엔트로피에 정중하게 도전하며 먼 거리를 이동합니다.
ei-neuro-reactive-residue=점성이 있고 반투명한 슬라임으로, 관찰하는 사람에 따라 색이 변합니다. 멸종한 화학 지적 생명체의 응축된 분비물로 추정됩니다. 예측할 수 없는 혼란 요소를 시뮬레이션 모델에 주입하여, 새로운 복잡성과 외래 화학 생명체에 대한 데이터를 생성합니다.
ei-nuclear-fuel=우라늄-235 기반 연료 전지, 원자로에 사용하는 것은 비효율적이지만 차량 연료로는 탁월합니다.
ei-organic-asteroid-chunk=이것이 유기 물질이라고 확신할 수 있나요?
ei-petrified-asteroid-chunk=어떤 고대 비밀을 발견할 수 있을까요?
ei-rock-asteroid-chunk=아직도 조금 뜨겁습니다.
ei-space-science-pack=성간 에너지 연구의 정점인 이 과학 팩은 납, 탄소, 얼음으로 안정화된 핵분열성 우라늄, 플루토늄, 토륨의 휘발성 광채를 활용합니다. 각각의 연료봉의 질량은 구부러지고 물질은 변형되며 이는 과학이 임계점의 칼날 위에서 춤을 추는 우주 규모의 반응을 여는 핵심 열쇠입니다.
ei-sporeglass-heart=심장 박동 리듬에 반응하는 뾰족한 결정체 씨앗. 멸종한 외계 신경세포를 모방한 휴면 RNA 패턴이 포함되어 있습니다. 시뮬레이션하면 가짜 생태계를 생성하며, 이는 블랙홀 특이점으로 붕괴됩니다. 전체적으로 통합하기에 충분한 데이터를 생성합니다.
ei-uranium-asteroid-chunk=으음, 매콤하군!
ei-worm-torn-relay-core=어떤 시스템으로도 해독할 수 없는 버려진 의사 코드가 새겨졌으며, 엉망진창으로 부식되기까지 해 결국 버려지고 만 초광속 통신 부표 덩어리입니다. 방사선에 노출되면 비명을 지르듯 불규칙한 파동을 발산하며, 파동에는 반쯤 안정된 웜홀 메아리를 포함합니다. 시뮬레이터를 재귀적 오류 루프에 빠뜨리게 하며, 이는 데이터 수집에 유용합니다.
eir-ei-advanced-construction-bot=단순한 건설자가 아닙니다 - 기억의 엔진입니다.\n디자인은 건설되지 않습니다. 그들은 기억을 통해 존재로서 재현됩니다.
eir-ei-advanced-deep-drill=광석 광맥에 접근할 수 있는 드릴입니다.\n[color=gray]작동하려면 초당 [/color][color=orange]7 드릴 유체[/color][fluid=ei-drill-fluid][color=gray]가 필요합니다.[/color]
eir-ei-advanced-logistic-bot=조용히. 멀리. 생각보다도 빠르게.\n존재조차 몰랐던 거리를 가로지른 뒤 - 화물을 싣고 돌아옵니다
eir-ei-alien-beacon=[color=purple]신호기 과부하에 계산되지 않습니다.[/color]\n[color=gray]작동하려면 초당[/color][color=purple] 30 생체 물질[/color][item=ei-bio-matter][color=gray]이 필요합니다.[/color]
eir-ei-arc-furnace=[color=red]대량의 전력을 소비하는[/color] 고온 용광로로, 재료를 액체 금속 형태로 녹입니다.\n데규모 작업을 위해 설계되었으며, 효율은 차우선 사항입니다.\n열이야말로 방법이며, 힘은 철학입니다.
eir-beacon=한때 동기화된 투영 방식의 정점이었던 이 신호기 모델은 이제 그 유산의 무게에 짓눌려 비틀거리고 있습니다. 방출된  격자는 거칠며 위상 고조파 역시 옛 방식이지만, 여전히 더 이상 듣지 않는 세계에 신호를 전송하며 버티고 있습니다.\n처리량이 곧 답이며 공명이 무차별적으로 강요되던 시대에 구축된 이 모델은 이제 도구라기보다는 인공물처럼 작동합니다. 그 핵심은 일관성을 유지하기 위해 고군분투하며, 붕괴 기준치를 간신히 넘기지 않고 있습니다. 그럼에도 이 모델은 *기억*합니다. 과부하 집계에서 부담은 모두 동일하게 계산됩니다.\n[color=gray]“효율의 유령은 녹슨 토대에도 깃들어 있습니다."[/color]\n신호기 과부하에 [color=orange]1개[/color]의 신호기로 계산됩니다.
eir-ei-bio-chamber=벽을 통해 지어진 게 아닌, 점막과 장기, 그리고 혈관들로 만들어진 곳.\n살아있는 존재들은 분해되어, 산이 아닌 생체 신호 위반으로서 소화된다.\n뼈는 네트워크 노드로 재배치되며,\n신경세포에서 생각은 분리되어 다른 곳으로 전송되고,\n의식은 재활용된다. 천천히. 간청하며.\n벽은 숨쉬지만, 불일치하는 목소리로 마지막 기억만을 속삭일 뿐입니다.
eir-ei-bio-reactor=의식이 있는 조직으로 구동되는, 살아있는 원자로.\n시체가 아니라 여전히 생각하는 생체 물질이기도 합니다.\n종양처럼 자란 신경 격자가 뼈 골격에 걸쳐 펼쳐져 있으며, 이는 꿈을 꿀 동안 생존하기에 충분한 생명력을 유지하도록 합니다.\n연료를 태우는 것이 아닙니다 - 정체성을 태웁니다.\n통증은 전압으로 변환되며, 기억은 엔트로피로 변환됩니다.\n모든 비명은 피드백 급증이며, 모든 기도는 전압 스파이크입니다.\n배고플수록, 내면의 정신은 더 맑아집니다.\n\n[color=gray]작동하려면 초당[/color][color=purple] 0.1 생체 물질[/color][item=ei-bio-matter][color=gray]이 필요합니다.[/color]
eir-ei-black-hole-data=재고가 없습니다.
eir-ei-cargo-bot=산업의 열기 속에서 단련된 단단한 운반차.\n엔진이 화물을 단단히 움켜쥐고 있으며, 냉혹한 기계적 정확성을 갖추고 전진합니다.\n우아함을 위해 만들어지지 않았습니다 - 오직 끝없는 배송의 고난을 위해서만 존재합니다.
eir-ei-combustion-turbine=[color=gray]재[/color] [item=atan-ash]를 생성하지 않는 고효율 소형 터빈입니다.
eir-ei-computer-core=토대로 기능하는 논리 도가니 - [color=255,255,255]전력[/color]과 정밀하게 배열된 [item=electronic-circuit] 부품을 이용하여 [color=blue]시뮬레이션 기질[/color][fluid=ei-computing-power]을 생성하세요. 이 유체는 에너지가 아닌 유기적 인지를 하기에는 너무 불안정한 이상 현상에서 추출한 증류된 기호학적 압력입니다. [color=orange]데이터 케이블[/color]을 통해 [entity=ei-small-simulator] 환경과 연결해야 합니다.\n그러나 컴퓨터 코어는 단순한 계산을 넘어 - 외계 화학 잔류물부터 고대 화석에 이르기까지 난해한 변칙을 흡수합니다. 코어는 이러한 반항적인 유물이 소비될 때 분석이 아닌 희생적인 해체를 통해 이를 해독하며, 미세한 반복을 통해 스스로를 파편화하여 대략적인 이해에 근접합니다.\n각 변칙은 데이터 스트림에 재귀적 난류, 중력 왜곡 또는 시뮬레이션된 붕괴 신호를 주입하여 그것이 방출하는 인식 기질의 풍미와 기능을 변경합니다. 불가능한 대상일수록 그 광기의 가치는 더욱 커집니다.
eir-ei-computing-unit=작지만 정교한 AI 코어인 컴퓨팅 유닛은 양자 시대의 가장 진보된 경이로움 속에 숨어 있는 조용한 두뇌입니다. 세련된 합금과 정밀 회로를 통해 고전적인 논리와 양자 얽힘을 매끄럽게 처리할 수 있는 프로세서가 탑재되어 있습니다. 빛나는 눈과 절제된 미소에는 심우주 탐사부터 차세대 제조 연구소에 이르기까지 모든 것을 구동할 수 있는 조용한 자신감이 담겨 있습니다.
eir-ei-construction-bot=정확하고. 신속하게. 신호가 사라지기 전에 현장에 도착한다.\n하지만 건설하지는 않는다 - 그 대신 건물로서 현실을 관통할 뿐입니다.
eir-ei-copper-beacon=[color=cyan]액체 질소 냉각제[/color]를 사용하는 신호 중계기 배열로, 극저온 환경에서 안정적된 생산성 신호를 방출합니다. [color=gray]일관된 신호 전송을 유지하려면 초당 [/color][color=blue]1 액체 질소[/color][fluid=ei-liquid-nitrogen][color=gray]가 필요합니다.[/color]\n신호기 과부하에 [color=orange]1개[/color]의 신호기로 계산됩니다.\n[color=gray]이 위상 배열은 부분적인 열 억제를 방지하여 비일관성을 방지하고 신호의 정확성을 유지합니다. 초기 단계의 크라이오 기반 산업 구축에 이상적입니다.[/color]
eir-ei-data-pipe=[color=blue]컴퓨팅 파워[/color][fluid=ei-computing-power]를 전송할 수 있는 데이터 케이블.
eir-ei-deep-drill=광석 광맥에 접근할 수 있는 드릴입니다.\n[color=gray]작동하려면 초당 [/color][color=orange]4.2 드릴 유체[/color][fluid=ei-drill-fluid][color=gray]가 필요합니다.[/color]
eir-ei-excavator=[color=blue]물[/color][fluid=water]과 [color=brown]초당 4.2 드릴 유체[/color][fluid=ei-drill-fluid]를 소비하여 [color=orange]돌[/color][item=stone], [color=brown]폐수[/color][fluid=ei-dirty-water], 그리고 행성에 따라 다른 부산물을 생산합니다.
eir-ei-gate-container=외계 잔해로 단련되고 불가능한 기하학으로 고정된 이 차원문은 다른 차원의 고정된 위치와 연결됩니다.\n[color=red][참고][/color] 차원 전이 과정을 버틸 수 있는 생명체는 없으며, 오직 물체만 상처 없이 통과할 수 있습니다.
ei-gravity-braided-ore=프랙탈 매듭으로 뒤틀린 광물 광맥들, 시간의 흐름이 비선형적인 미세중력 영역 내부에서 형성된 것으로 보이지만, 이를 측정하려는 도구를 분쇄합니다. 시뮬레이션에 비유클리드 밀도 필드를 주입하여 중력 렌즈 및 위상 플럭스와 관련된 데이터를 산출합니다.
eir-ei-grower=불안정한 에너지장을 방출하는 수정으로 가득 찬 자체 생물군계를 구성합니다.\n[color=green]에너지 수정[/color][item=ei-high-energy-crystal][item=ei-enriched-cryodust]을 재배하고 수확할 수 있습니다 \n이상하게도 수생 생물이 서식합니다. 물속의 무언가는 기억할 것입니다.
eir-ei-high-tech-parts=[color=blue]엑조틱 조립 기계[/color] 내부의 [color=red]불안정성 코어[/color] 에서만 제작되는 이 부품들은 다른 곳에서는 복제할 수 없으며, 그 구조는 고전 물리학을 거스릅니다 - 양자 고정 합금, 확률 전도성 필라멘트, 아원자적 공명 진동 코어\n제작 과정은 매우 위험하지만 유물급 기술에 필수적인 하이테크 부품은 문명을 한계 너머로 밀어붙이는 핵심 열쇠기도 합니다.
eir-ei-high-temperature-reactor=다른 원자로에서 [color=red]열[/색상]에너지를 공급받아야 합니다. [color=gray]액체 납 냉각제[/색상]를 과열할 수 있습니다. [color=orange]토륨[/색상][item=ei-thorium-232] 기반 연료도 사용할 수 있으며, [color=green]우라늄-235 연료봉[/color] [item=ei-uranium-235-fuel]을 사용할 경우 약 500MW의 전력을 생산합니다.
eir-ei-insulated-pipe=단열 파이프는 냉혹한 환경에서도 작동에 가열이 필요하지 않으며, 파이프에 손상을 줄 수 있는 [color=pink]전해질[/color], [color=green]플루오르케톤[/color], [color=red]초고온 (과열된 플라즈마)[/color] 또는 [color=blue]극저온 유체 (액체 가스)[/color]를 운송하는 데 사용할 수 있습니다.
eir-ei-insulated-tank=단열 탱크는 냉혹한 환경에서도 작동에 가열이 필요하지 않으며, 파이프에 손상을 줄 수 있는 [color=pink]전해질[/color], [color=green]플루오르케톤[/color], [color=red]초고온 (과열된 플라즈마)[/color] 또는 [color=blue]극저온 유체 (액체 가스)[/color]를 운송하는 데 사용할 수 있습니다.
eir-ei-insulated-underground-pipe=단열 파이프는 냉혹한 환경에서도 작동에 가열이 필요하지 않으며, 파이프에 손상을 줄 수 있는 [color=pink]전해질[/color], [color=green]플루오르케톤[/color], [color=red]초고온 (과열된 플라즈마)[/color] 또는 [color=blue]극저온 유체 (액체 가스)[/color]를 운송하는 데 사용할 수 있습니다.
eir-ei-iron-beacon=초전도 평면 전반에 걸친 완전한 신호 공명을 보장하기 위해 절대 영도에 가깝게 고정된 [color=cyan]초냉각식 첨단 신호기 배열[/color]입니다. 내부 코어를 유지하려면 [color=blue]초당 2 액체 질소[/color][fluid=ei-liquid-nitrogen]가 필요합니다.\n신호기 과부하에 [color=orange]2개[/color]의 신호기로 계산됩니다.\n[color=gray]이 장치는 알려진 물질 붕괴점 바로 위에서 작동하며, 열 편차가 전혀 없는 위상 안정 생산 필드를 전송합니다. 고밀도, 고효율 설비에 필수적입니다.[/color]
ei-isotopic-ghost-shell=붕괴된 핵분열 물질로 이루어진 속이 빈 캡슐, 하지만 여전히 차가운 중성미자를 방출합니다. 2번 스캔할 때마다 음수 질량을 나타나는데, 이는 역 엔트로피 시도의 실패일 수도 있습니다. 열사망 임계값에서 시뮬레이션 우주를 불안정하게 만들어, 시뮬레이션 내 데이터 붕과 사건을 촉발합니다.
eir-ei-matter-stabilizer=직접 제작한 물질 안정기입니다. [color=orange]엑조틱 조립 기계[/color] [item=ei-exotic-assembler]를 안정화시켜 엔트로픽 연쇄 반응이 발생할 확률을 낮추는 데 사용할 수 있습니다. [color=gray]불안정성에 대해 3 x (품질Lv - 1) 개의 안정기로 계산되며, 과부하가 걸린 격자 구조는 이제 눈에 띄는 불안정 및 아크 방전 현상이 발생합니다.[/color]
eir-ei-metalworks-1=생산성 +10%, 공해 및 에너지 소비량이 증가하지만 [color=orange]주괴[/color]를 빠르게 처리합니다. [color=blue]속도[/color] 또는 [color=gray]품질[/color] 모듈 2개를 장착할 수 있습니다.
eir-ei-metalworks-2=생산성 +20%, 공해 및 에너지 소비량이 증가하지만 [color=orange]주괴[/color]를 빠르게 처리합니다. [color=blue]속도[/color] 또는 [color=gray]품질[/color] 모듈 2개를 장착할 수 있습니다.
eir-ei-metalworks-3=생산성 +30%, 공해 및 에너지 소비량이 증가하지만 [color=orange]주괴[/color]를 빠르게 처리합니다. [color=blue]속도[/color] 또는 [color=gray]품질[/color] 모듈 2개를 장착할 수 있습니다.
eir-ei-metalworks-4=생산성 +40%, 공해 및 에너지 소비량이 증가하지만 [color=orange]주괴[/color]를 빠르게 처리합니다. [color=blue]속도[/color] 또는 [color=gray]품질[/color] 모듈 2개를 장착할 수 있습니다.
eir-ei-nano-factory=나노 제조 단지는 시설이라기보다는 무생물에 내려진 형벌에 가깝습니다. 기하학적 구조와 기능에 있어 몹시도 잔인한 이 시설은 하부 구조의 설계자 역할을 하며, 지각 아래의 혼돈에 형태와 일관성을 강요합니다. 진공으로 밀봉된 공허와 중성자가 정지된 배관 깊숙한 곳에서 분자적 의도가 추출되고 재배열되며 이온 전단 배열과 재귀적 자기 조립 챔버를 통해 격자 정밀도 구성으로 단련됩니다. 이곳은 건설하지 않으며 - 강제합니다. 그 핵심에서 만들어지는 것은 제품이 아닌 물리적 형태의 교리, 즉 이단에 가까울 정도로 의도적으로 접힌 나노 구조물이다. 감독은 최소화되고 시스템은 스스로를 개선하여 비효율적인 부분을 떼 벗기듯 버립니다. 알고리즘의 지하 묘지로 더 깊이 파고들수록 분명해집니다 - 이곳은 결코 인간을 위해 만들어진 곳이 아니다. 인간이 감히 창조하려 했던 것을 기억하기 위해 만들어진 곳이다.
eir-ei-plasma-heater=가스를 고에너지 플라즈마로 과열시킬 수 있지만, [color=red]엄청난 양의 전력을 소모합니다[/color].\n극한 온도 제련 작업도 수행할 수 있습니다.\n효율적이지 않으며, 안전하지도 않습니다. 단지 필수적일 뿐입니다.
eir-ei-plutonium-239-fuel=플루토늄-239 기반 핵연료, [color=green]고온 반응로[/color][item=ei-high-temperature-reactor]에 사용할 수 있으며, [color=orange]1,820[/color] 단위의 액체 납 냉각제[fluid=ei-hot-coolant]를 120초 만에 과열합니다.
eir-ei-space-data=우주의 속삭임, 부서진 별의 파편, 살아있는 시간 등을 암호화하여 세계가 스스로 담을 수 없는 형태로 결정화합니다.\n이들은 [color=purple]우주 이상현상[/color]에서 시작됩니다. [item=ei-chemical-asteroid-chunk][item=ei-organic-asteroid-chunk][item=ei-rock-asteroid-chunk][item=ei-uranium-asteroid-chunk][item=ei-petrified-asteroid-chunk][item=ei-scrap-asteroid-chunk]다양한 소행성 유형을 분쇄해 발견한 [item=ei-neuro-reactive-residue][item=ei-sporeglass-heart][item=ei-gravity-braided-ore][item=ei-isotopic-ghost-shell][item=ei-chrono-fossil-shard][item=ei-worm-torn-relay-core] 이상현상 데이터를 컴퓨터 코어[entity=ei-computer-core]에서 처리해 시뮬레이션 기판을 만들고, 소형 시뮬레이션 챔버[entity=ei-small-simulator]를 이용하여 이를 데이터 카드 [item=ei-simulation-data-chemical][item=ei-simulation-data-organic][item=ei-simulation-data-stone][item=ei-simulation-data-uranium][item=ei-simulation-data-petrified][item=ei-simulation-data-scrap]로 만든 뒤 양자 연구 컴퓨터[entity=ei-quantum-computer]에서 조합하면 시간과 공간의 신비를 풀어낼 수 있습니다.
ei-steam-quarry=주변 환경을 희생하는 대신, 처리 및 생산량을 극대화하도록 최적화된 초대용량 추출 단지입니다. 막대한 에너지 및 매장량을 소비하고 광활한 굴착 대상 지형에 상처를 남깁니다. [color=gray]54%의 추가 자원[/color]을 얻을 수 있으며, 무자비한 속도로 광석을 채굴하여 최대 효율로 회수합니다.
eir-ei-thorium-232-fuel=토륨-232 기반 핵연료, [color=green]고온 반응로[/color][item=ei-high-temperature-reactor]에 사용할 수 있으며, [color=orange]780[/color] 단위의 액체 납 냉각제[fluid=ei-hot-coolant]를 120초 만에 과열합니다.
eir-ei-uranium-233-fuel=우라늄-233 기반 핵연료, [color=green]고온 반응로[/color][item=ei-high-temperature-reactor]에 사용할 수 있으며, [color=orange]1,040[/color] 단위의 액체 납 냉각제[fluid=ei-hot-coolant]를 120초 만에 과열합니다.
eir-ei-uranium-235-fuel=우라늄-235 기반 핵연료, [color=green]고온 반응로[/color][item=ei-high-temperature-reactor]에 사용할 수 있으며, [color=orange]1,560[/color] 단위의 액체 납 냉각제[fluid=ei-hot-coolant]를 120초 만에 과열합니다.
eir-ei-warp-beacon=[color=purple]신호기 과부하에 계산되지 않습니다.[/color]\n[color=gray]작동하려면 초당[color=purple] 60 생체 물질[/color][item=ei-bio-matter][color=gray]이 필요합니다.[/color]
zeus-wrath-lightning-ammo_alt=사람의 손으로는 이 물건을 들 수 없습니다. 이 유물은 충전되어 있지 않으며, 그저 [font=default-bold]들어 있을 뿐입니다[/font]. 필요할 때만 발사하세요. 폭풍이 지켜보고 있습니다.
zeus-wrath-zeus-gun_alt=가라앉은 신들의 분노가 집중되어 무기가 되었습니다. 놓치지 않으며, 오직 [font=default-bold]처벌할 뿐입니다[/font].
zeus-wrath-zeus-turret_alt=어떤 땅에도 묶이지 않고, 어떤 신에게도 맹세하지 않은 이 포세이돈 포탑은 모든 바다 밑으로 가라앉아 잊혀진 힘을 퍼붓습니다. 궤도에서 하늘을 향해 불을 퍼붓고, 공기를 통해 심판을 내립니다. 일단 설치되면, 포세이돈은 그저 지켜보며 폭풍이 다가오고 있다고 세계에 [font=default-bold]경고[/font]합니다.
ei-fueler=자동화된 [color=orange]급유탑[/color]입니다.\n차량 모드: 기차, 자동차, 탱크, 스파이더트론, 기관 포탑, 대포 포탑, 대포 화물차에 연료를 보급합니다.\n장비 모드:[color=blue]차량 및 플레이어 아머 장비 그리드[/color]에 연료를 보급하고, [color=red]연소 잔여물을 빼내옵니다.[/color]\n\n높은 품질일수록 한 업데이트 시점에 더 많은 대상에 보급할 수 있지만, 사거리가 증가하지는 않습니다. 일반적인 창고와 같이 품질은 내부 인벤토리 용량도 증가시킵니다. 자세한 정보는 게임 내 인포매트론 위키에서 확인하세요.
eir-ei-cannon-turret=두 개의 배럴, 하나의 섀시. 두 배의 화력, 두 배의 소음.\n[color=gray]속사 메커니즘과 고급 조준 솔루션이 작동하려면[/color] [color=cyan]전력[/color][color=gray]이 필요합니다.[/color]
ei-cannon-turret-mk1=단순하게 뚫린 배럴, 정제되지 않은 원시 화력.
ei-tesla-turret=붕괴 이전 시대의 풀고란 아크 무기의 재구성 레플리카입니다. 초전도 코일의 기본 구조는 부분적으로만 파악되었지만, 이 복제품 포탑은 통제된 전기 방전을 인근 위협을 향해 발사시킬 수 있습니다. 출력과 효율성은 정통 풀고란 설계에 비해 여전히 제한적이지만, 첨단 소재를 사용하여 안정적인 지역 제압력과 높은 연사 잠재력을 제공합니다.
ei-dragons-breath-shotgun-shell=불카누스의 열로 단련된 이 포탄은, 강철처럼 단련되어 산업 공정과 다를 바 없는 폭력성을 전달합니다.\n이 포탄은 불활성 표식을 살아 움직이는 불꽃 패턴으로 대체하고, 극한의 열적 부하를 발사체에 집중시킵니다.\n이는 포탄 발사체를 재, 파편, 진공 노출 환경이더라도 일관성있게 뜨겁게 타오르게 하며, 이는 기존 탄약을 사용하기 어려운 적대적 환경에서도 적합하게 합니다.\n불카누스 금속공학과 용암 주조 기술로 탄생한 이 탄약은 행성의 단순한 진리를 반영합니다:\n불길 속에서 살아남았다면, 그것은 발사되도록 운명지어졌다는 것이다.
ei-shotgun-turret=경고하지 않고, 빗나가지 않으며, 망설임 없는 근접 억제력. 사거리에 도달한 것들은 이미 큰 실수를 저지른 것입니다.
ei-steampunk-lamp=[color=green]등유[/color][fluid=ei-kerosene]를 연소시켜 [color=orange]따뜻하고[/color] 깜빡이는 빛을 방출합니다.\n연료를 지속적으로 소모합니다.
ei-auto-shotgun-turret=장거리 사격 목적으로 제작된, 모터 구동식 소형 이중 포탑입니다. 빠른 속도로 산탄총 탄환을 쏟아내며, 그 화력으로 통로와 병목 지점을 뒤덮어 돌진해오는 적들을 고철로 만들어버립니다. 신속한 목표 전환, 정밀한 추적, 강력한 반동 보정 기능에는 [color=cyan]전력[/color]이 필요하지만, 그 결과 감히 접근하는 적에게 가차없는 파괴의 폭풍우를 퍼붓습니다.
ei-gatling-turret=소모전을 찬양하는 회전곡. 그것은 발사하는 대신 선언합니다: 아무도 통과할 수 없다. 포신은 회전하고 공기는 황동빛이 되며, 땅은 충격으로 이루어진 새로운 언어를 배운다. 끊임없이 십일조를 공급하는 대가로, 이 무기는 전선을 지킨다.\n이것은 단순히 “공급"하는 무기가 아니다.\n이것은 십일조를 바쳐야 하는 무기다.\n\n작동에 [color=cyan]전력[/color]이 필요합니다
eir-ei-deep-pumpjack=업그레이드된 시추기. [color=blue]크라이오플럭스[/color][fluid=ei-cryoflux]와 [color=green]식물성 가스[/color][fluid=ei-phythogas] 구덩이, 황화수소 분출구에 접근할 수 있습니다.
eir-ei-exotic-assembler=이 조립 기계는 [color=orange]엑조틱 아이템[/color] 제작에 사용할 수 있습니다. 하지만 엑조틱 물질은 매우 불안정하므로 폭발 가능성을 줄이려면 [color=blue]물질 안정기[/color] 근처에 배치해야 합니다.\n[color=gray]활성화 상태에서는 위험이 증가될수록 격리장이 더 강하게 빛나며, 더 큰 소리가 나며, 아크 방전이 발생합니다. 초당 폭발 확률은 12% - (품질 - 1)%이며, 주변에 물질 안정기를 배치하여 완화할 수 있습니다.[/color]
eir-atomic-bomb=Plutonium atomic rocket. Compatibility shell outside, full breach doctrine within. The breach speaks first; the fallout stays to finish the sentence.
dw-deer-ammo-atomic-plutonium=플루토늄 핵 로켓포. Full breach language for a firing position willing to hear it up close, plus broader fallout when it answers.
dw-deer-ammo-atomic-plutonium-crate=상자에 포장된 플루토늄 핵 로켓포. A transport solution for people who stopped mistaking caution for virtue.
dw-deer-ammo-atomic-u235=우라늄-235 핵 로켓포. A tighter atomic center built for the rack, with fallout that stays close to the crater.
dw-deer-ammo-atomic-u235-crate=상자에 포장된 우라늄-235 핵 로켓포. Even the box feels accusatory.
dw-deer-ammo-basic=공성용 로켓포. Awkward to aim. Honest about demolition.
dw-deer-ammo-basic-crate=상자에 포장된 공성용 로켓포. Logistics wrapped around sacrificial recoil.
dw-deer-ammo-corrosive=부식성 로켓포. The same acid family, scaled until structures learn fear.
dw-deer-ammo-corrosive-crate=상자에 포장된 부식성 로켓포. Nitric denial in bulk form.
dw-deer-ammo-cryo=냉동 로켓포. It lands like winter with authorization.
dw-deer-ammo-cryo-crate=상자에 포장된 냉동 로켓포. Control packed for emplacement fire.
dw-deer-turret=A fixed-cone artillery rack for modular rockets. It rewards angle, distance, and nerve.
ei_charger=EM Charger. Active field node that creates and maintains the network envelope used by EM transport. It is the operational nexus for both planetary and space-travel segments. Loss of the field disables EM propulsion. Higher-quality field nodes waste less energy and maintain a cleaner lattice.
ei_em-cargo-wagon=화물 운송용 EM 차량. 궤도 보급로로 연결된 충전소가 연결된 선로에서 이동하도록 설계된 자기장 결합형 수송 모듈입니다.
ei_em-fluid-wagon=유체 운송용 EM 차량. 나우비스나 외계 행성 선로에서 충전소 자기장 흐름의 일부로서 무결성을 유지하는, 수동형 자기장 결합형 유체 수송 모듈입니다.
ei_em-locomotive=EM 기관차.  [item=ei_charger][color=orange]충전소[/color] 네트워크 클라이언트 역할을 하는 필드 구동형 이동체입니다. 필드 그물망로부터 동작 신호를 지속적으로 수신받아야 하며, 범위를 벗어나면 비활성화됩니다. 고급 연결기를 사용하면 범위를 벗어나더라도 잠시동안 필드 일관성을 보존할 수 있습니다.
ei-atomic-bomb-u235=우라늄-235 원자 로켓. Tighter at the core, no less sincere about opening a sun at ground level., with a cleaner radiological wake that still refuses mercy.
ei-auric-slag=Gold-bearing slag precipitated out of auric vapor. Still full of heat, grit, and trapped trace metal; acid washing and water force the buried gold to separate.
ei-breach-residue=A scab of dimensional contamination left by repeated gate use.\nIt is breach scarring, not useful feedstock, and should be neutralized through the purifier chain into dirty water before it spreads.
ei-calcite-bed=A sacrificial calcite packing bed used where hot mineral streams need fresh stone to bite against. It broadens the reaction surface, steadies the chemistry, and is meant to be replaced.
ei-carbide-precipitation-core=A tungsten-carbide-derived seed used to stabilize auric precipitation. It is deliberately sacrificial: steam wakes the vent, the core holds the choke, and the purifier keeps what the vapor gives up.
ei-cryo-rocket=The control branch. Cold shock, heavy slow, and a long moment in which escape becomes theory.
ei-corrosive-rocket=A nitric wound in a rocket body. The first strike bites; the cloud keeps arguing with the ruins.
ei-express-loader=Direct-feed loader with one shared filter across both belt lanes. 최대 2층까지 잔적할 수 있습니다.
ei-fast-loader=Fast direct-feed loader with one shared filter across both belt lanes. 잔적 기능을 지원하지 않습니다.
ei-gate=A gate shell forged from alien remnants and anchored through impossible geometry.\nIt links to a receiver ID instead of a raw position.\nIts upkeep is not constant: when armed, it draws power to hold alignment, and when stressed, it draws more.\nOnly non-living matter may pass through.\nThis is not a portal. It is a machine that remembers where it tears.
ei-gate-container=Hidden source-side housing for the gate inventory and control logic.\nIt only accepts items while the gate is armed and above the low-power floor.\nThe destination is chosen by receiver ID.
ei-gate-receiver=A tuned receiving anchor for gate traffic.\nEach receiver claims an ID, and compatible gates can target that ID directly.\nA circuit signal can override the automatic ID.\nThis is the destination side of the gate system.
ei-induction-matrix-core-circuit-interface=Core of the Induction matrix multistructure. Only one core can be placed per matrix. Outputs current charge on signal-C, total capacity on signal-T, and max IO on signal-M.
ei-loader=Direct-feed loader with one shared filter across both belt lanes. 잔적 기능을 지원하지 않습니다.
ei-neo-loader=Direct-feed loader with two per-lane filters, one for each belt lane. Supports adjustable belt stacking up to the current global belt stack limit.
ei-orbital-combinator=Mirrors same-surface platform logistics in three read-only modes: Requests, On The Way, and Need.\nOrthogonally adjacent scanners form one shared bank, split large platform output into continuation sections, and emit [virtual-signal=ei-orbital-overflow] when bank capacity runs out.\nSee the Informatron entry under New logistics for wiring, freshness, and usage notes.
ei-orbital-coordinator=The surface command core for the orbital logistics cohort.\nOnly one coordinator is active per force and surface. It arbitrates selector jobs, assigns dispatch leases, and prevents multiple uplinks from blindly serving the same target.\nOpen the coordinator directly to inspect active or standby state and request a cohort refresh.
ei-orbital-dispatch-uplink=Binds one nearby rocket silo into the orbital logistics cohort.\nAn uplink holds one leased mixed-manifest job at a time, republishes the target manifest for hybrid loading, and can keep or release oversized work according to Sticky, Single Shot, or Threshold behavior.\nIt stays blocked until it has a valid silo binding, an active coordinator, and a selector job with positive Need.\nOpen the uplink directly to confirm, replace, or clear its silo binding.
ei-orbital-selector=Focuses one platform at a time and republishes its current Need manifest.\nManual mode locks to a chosen platform ID, circuit mode reads [virtual-signal=ei-platform-id], and policy mode nominates a target automatically from live orbital demand on the same surface.\nOpen the selector directly to choose its mode and target. A new selector stays idle until configured.
ei-platform-transponder=Marks one platform with a stable force-local numeric ID so selectors, coordinators, and dispatch uplinks can target it without relying on names.\nPlace it on the platform itself. Manual overrides are allowed, but conflicting IDs are treated as invalid until resolved.\nOpen the transponder directly to assign or clear a manual platform ID override.
ei-rocket-airframe=The shell before doctrine. It keeps the promise pointed forward.
ei-rocket-motor-basic=Baseline thrust for ordinary reach. Stable enough to aim. Brutal enough to matter.
ei-rocket-motor-high-energy=Hotter thrust for heavier promises. The casing complains; the target still understands.
ei-rocket-warhead-atomic-plutonium=Plutonium wrapped around a heavier promise. Harder to excuse once spoken.
ei-rocket-warhead-atomic-u235=우라늄-235 sleeved in lead and ceramic. A tight fissile wound.
ei-rocket-warhead-corrosive=Acid held in ritual discipline until impact grants release.
ei-rocket-warhead-cryo=Cryodust under seal. It wounds by stealing motion first.
ei-rocket-warhead-explosive=Blast shaped into doctrine. It opens space by forcing matter to leave.
ei-rocket-warhead-impact=Mass arranged into refusal. It does not bloom or freeze. It strikes.
ei-rocket-warhead-siege=Fortification doctrine cast in steel. What thickness hides, this was built to expose.
ei-turbo-loader=Direct-feed loader with two per-lane filters, one for each belt lane. 최대 2층까지 잔적할 수 있습니다.
explosive-rocket=The breach variant. Built to open walls, clusters, and confidence.
rocket=The first answer in the line. Airframe, basic motor, impact 탄두. It arrives without theater.
tl-advanced-tesla-coil=조금 더 개선된 테슬라 코일입니다.
tl-basic-tesla-coil=주변 적에게 고전류 방전을 가하도록 개조된 전기 공진식 변압기입니다.
tl-tesla-coil-ammo=A single-use high-powered portable energy source.
tl-tesla-tank=고급 테슬라 코일 2개를 장착한 탱크입니다.
ei-arc-ammo=The overcharge magazine. It does not merely strike; it locks the target in seizure.
ei-atomic-bomb-plutonium=Plutonium atomic rocket. Broader fallout, dirtier aftermath, no less committed to rupture.
ei-auric-cyst=Mineralized cyst matter harvested from a stable auric bloom.
ei-auric-inoculation-vat=A Gleban basin-controller that inoculates an adjacent wetland basin and drives it through auric bloom cycles.
ei-compound-ammo=The first heresy in the exotic line. Fracture, discharge, and destabilization in one expensive magazine.
ei-corrosive-ammo=An acid-loaded exotic magazine. The opening hit is only an introduction; corrosion delivers the verdict.
ei-cryo-ammo=Cold control rounds. Survival matters less when nothing can still close the distance.
ei-emerald-apocalypse-cannon=A hull-fixed crystal beam cannon. It does not track. It judges what the tank is facing.
ei-emerald-apocalypse-charge=A sealed crystal rupture for the 에메랄드 멸망포. One oath, one discharge, one green wound in the world.
ei-emerald-apocalypse-hover-tank=A relic hover fortress with a fixed crystal cannon and a heart that refuses the ground. It advances as pressure, then leaves emerald silence where certainty used to stand.
ei-exotic-magazine-body=The shell before doctrine. Steel, ceramic, and enough discipline to carry expensive violence.
ei-exotic-magazine-core=The common heart of the exotic line: body, driver, and explosive discipline locked into one chamber.
ei-exotic-magazine-driver=Ignition, pulse timing, and release control for the exotic line. It teaches the magazine how to die correctly.
ei-gaian-saucer=A fast Gaian hover shell with a sealed cargo hold, an equipment lattice, and no visible legs. It moves as a remembered step and leaves color-fracture in its wake.
ei-hexafluoride-ammo=Fluorinated penetrator rounds. Clean on entry, harder to explain afterward.
ei-magazine-payload-arc=Overcharge folded into payload form. Short, brutal, unmistakable.
ei-magazine-payload-compound=Crystallized energy and explosives tuned into a hybrid answer. One round, several verdicts.
ei-magazine-payload-corrosive=A nitric wound sealed into payload form. The bullet stops; the argument keeps spreading.
ei-magazine-payload-cryo=Cryodust held under discipline. It hurts mostly by removing movement and certainty.
ei-magazine-payload-hexafluoride=A fluorinated chamber for a wound that punctures first and negotiates with ruin afterward.
ei-magazine-payload-morphium=Concentrated morphium persuaded into a ballistic payload. It enters like contamination, not poison.
ei-magazine-payload-neutron=A charged neutron container reduced to doctrine. It leaves something invisible behind to finish the work.
ei-magazine-payload-oxyfluoride=A white-hot packet of hypergolic chemistry. Too bright, too unstable, exactly the point.
ei-morphium-ammo=Slow contamination rounds. They wound the body and let dread complete the arithmetic.
ei-neutron-ammo=The most expensive malaise in the line. The impact passes. The halo remains.
ei-nuclear-locomotive=X1 "Goliath" atomic locomotive. A rolling compact reactor with the manners of a war crime. If the hull opens, the green burst is only the announcement; the fallout stays to finish the sentence.
ei-oxyfluoride-ammo=A white-burning magazine that turns each impact into chemical permission.
ei-singularity-lance=An alien oath-engine built around a floating crystal heart. Its chromatic ray does not burn so much as divide the target from the memory of being whole.
ei-steam-loader=Steam-driven direct-feed loader with one shared filter across both belt lanes. Moves unstacked items only and requires live steam.
eir-ei-crystal-accumulator-repair=Kit to repair broken 수정 축전지s. Drag it over one to repair it, or alt-select to inspect crystals and husks without spending the kit.
ei-adaptive-surveyor=A quantum-age modular sniper system. Superior data predicts chamber, barrel, wind, and target before the trigger finishes moving.
ei-breach-solver-charge=A compact solver charge that spends simulation data on a narrow, overcommitted blast for cracking nests, worms, and hardened targets.
ei-fusion-reactor=An ESIR thermonuclear fusion reactor. It burns heated light atomic fuels in a lead-coolant loop to produce heat, power estimates, and tunable neutron flux. This is separate from Aquilo dense-plasma fusion reactors, which use fluoroketone and fusion power cells to make plasma for [entity=fusion-generator].
ei-hemocrystal-wall=Clean plating folded into a living hemocrystal lattice. The wall knits shallow wounds shut under its own red pressure, turning every impact into another oath of closure.
ei-incinerator-capsule=Releases five fast destroyer-derived Incinerators. They follow, burn, and refuse the mercy of fire.
ei-inferno-grenade=A cluster grenade rebuilt to rupture at the target into explosive burning fragments. Each fragment detonates on impact, then seeds its own ring of fire.
ei-neutron-collector=Absorbs free neutrons from nearby fission sources, weak Aquilo dense-plasma fusion leakage, and stronger ESIR thermonuclear fusion reactors to charge [color=blue]neutron containers[/color] [item=ei-neutron-container] into [item=ei-charged-neutron-container]. Source type, activity, and distance determine efficiency; weak or distant sources take longer to charge.
ei-prediction-snare-mine=A deployed simulation snare that predicts hostile movement, then floods nearby biology with motor-disrupting false signals.
ei-sanguine-wall=Odd-plated carapace grown over a plastcrete rampart. Black ribs clamp the line while crimson resin hardens in the seams; it does not heal, but it remembers where the breach began.
ei-surveyor-cannon=A simulation-age anti-materiel Surveyor. Its automatic .50-caliber discipline runs on modeled impacts and carbon-fiber recoil structure.
ei-surveyor-carbine=A glass-scoped Steam Age carbine. It fires slowly, but its pressure-corrected barrel reaches farther than ordinary automatic weapons.
ei-surveyor-rifle=A stabilized electric Surveyor frame. The shot remains deliberate; the sight picture becomes cleaner.
ei-uranium-shotgun-shell=Uranium-238 penetrators packed into shotgun hulls. Each discharge throws a green, overbright pattern of dense pellets: no flame, no cloud, only close-range radiological pressure and the hard arithmetic of impact.
