mining-scars-2=행성 환경 파괴
mining-scars-text=광맥을 모두 채굴하면서도 주변 지형을 손상 없이 보존하는 것은 이제 까다로워집니다. Exotic Industries 모드에서는 특정 유형의 드릴이 광맥 채광을 완전히 완료할 때 인근 지면에 영구적인 피해를 줄 가능성이 생깁니다: [item=ei-burner-quarry] 화력 채광장, [item=ei-steam-quarry] 증기 채광장, [item=ei-electric-quarry] 전기 채광장, [item=big-mining-drill] 대형 채광 드릴.\n\n각 광맥 고갈 이벤트가 이제 고갈된 광맥 근처의 무작위 위치에 작은 흉터 자국을 생성할 가능성을 부여합니다. 이 효과는 지형 피해이며, 추가 자원 획득 효과가 아닙니다.
mining-scars-text-2=흉터는 행성별 고유 규칙에 따라 지형을 변형시키게 됩니다. 나우비스의 잔디는 흙과 모래로 무너지며, 풀고라의 바위는 모래, 먼지, 모래 언덕으로 닳아 없어집니다. 글레바의 땅은 부패하게 되며, 불카누스는 잿더미만 남으며, 아퀼로는 압축되어 다져진 눈과 얼음만 남게 될 것입니다. 물이나 숨겨져있을 경우 무시되며, 장식이 있을 경우 제거됩니다.\n\n이러한 흉터는 마치 행성에서 플레이어가 가져간 것들을 기억하는 것처럼 보입니다.
nauvis-pressure-grace=나우비스 진화 지연
nauvis-pressure-grace-2=시대에 따른 진화 제한치
nauvis-pressure-grace-text=모드 설정에서 "나우비스 진화 지연" 시작 설정을 활성화하면 나우비스 행성에서의 게임 초반 과도한 진화도 상승을 일시적으로 억제시킬 수 있습니다. 스크립트에서 18,000틱(5분)마다 나우비스의 적 진영의 진화도를 확인하고, 현재 값이 시대에 따른 최대 허용치보다 높을 경우 이를 낮춥니다.\n\n이 기능은 지도상의 공해나 산란장을 없애거나, 이미 시작된 공격을 취소하지 않습니다. 단지 초과된 진화 요인을 게임 초반 상한치로 되돌릴 뿐입니다. 'Extended' 설정은 전기 시대 초반의 지연 기간 동안 일시적으로 공해 진화 요인을 낮추지만, 기간이 종료된 이후 원래 수치로 다시 복원합니다.
nauvis-pressure-grace-text-2=[font=default-bold]암흑 시대[/font]의 최대 허용 진화도는 [font=default-bold]0.25 (25%)[/font]입니다. (증기 시대 연구 이전)\n[font=default-bold]증기 시대[/font] 진행 중에는 이 수치가 [font=default-bold]0.45 (45%)[/font]까지 상승합니다.\n\n'Extended' 설정이 적용되면 이 기능을 [font=default-bold]컴퓨터 시대[/font]까지 확장시킬 수 있습니다: [font=default-bold]증기 시대[/font]에서 [font=default-bold]0.50 (50%)[/font], 전기 시대 레이저 포탑 기술 연구 이전에는 [font=default-bold]0.55 (55%)[/font], 컴퓨터 시대 이전까지 [font=default-bold]0.60 (60%)[/font].\n\n이 설정이 비활성화되어있을 경우 나우비스 행성은 이러한 압력을 모두 가져갈 것입니다.
neutron-collector=중성자 수집기
neutron-collector-2=Binding, distance, and standby
neutron-collector-3=회로 원격 측정
neutron-collector-text=The [color=orange]Neutron Collector[/color] [item=ei-neutron-collector] is a quantum-age charge machine. It captures free neutrons from nearby fission sources, weak leakage from active Space Age dense-plasma fusion reactors on Aquilo, and the stronger tunable flux of ESIR thermonuclear fusion reactors. It uses that flux to convert [item=ei-neutron-container] into [item=ei-charged-neutron-container].\n\nIt does not create neutrons. It harvests what nearby reactors fail to keep for themselves. The collector binds to one source at a time and favors the strongest live yield in range rather than averaging every machine around it.
neutron-collector-text-2=Collector efficiency is shaped by source type, source activity, and geometry. Space Age dense-plasma fusion reactors on Aquilo are weak leakage sources only while active; ESIR thermonuclear reactors remain the stronger sources and can be tuned through their temperature and injection controls. The runtime clamps the reported efficiency to 0-300%, and greater distance means longer charge time.\n\nIf no viable source is nearby, the neutron flux is below the charge threshold, the bound source goes dormant, the output is blocked, or a circuit condition disables the assembler, the collector falls back to its standby recipe so the machine stays openable and its diagnostics remain visible.
neutron-collector-text-3=When the collector is wired, its hidden circuit interface publishes five custom signals onto the collector's network: [virtual-signal=ei-neutron-efficiency], [virtual-signal=ei-neutron-distance], [virtual-signal=ei-neutron-collector-agent], [virtual-signal=ei-neutron-source-agent], and [virtual-signal=ei-neutron-scan-agent].\n\nEfficiency reports 0-300. Distance is emitted in tenths of a tile. Collector agent is 1 active, 2 idle, 3 blocked. Source agent is 1 live, 2 dormant, 3 absent. Scan agent is 1 stable, 2 dirty, 3 rebind pending. These signals refresh on the collector's scheduled telemetry pass rather than every tick.
new-logistics=새로운 물류
new-logistics-text=Exotic Industries는 새로운 시스템, 객체, 메커니즘을 통해 물류 레이어를 확장합니다. 이러한 기능들은 편의성을 위한 것이 아니라 [font=default-bold]구조적 명확성[/font]을 위해 하위 카테고리로 조직화하였습니다. \n\n왼쪽 메뉴에서 탐색할 수 있습니다. \n\n이동은 더 이상 단순한 일이 아닙니다. \n\n모든 경로는 결정입니다. \n\n모든 흐름은 설계입니다. \n\n효율은 [font=default-bold]획득하는 것입니다.[/font]
new-mechanics=새로운 게임플레이 방식
new-mechanics-text=Exotic Industries는 게임 플레이의 기본 논리를 근본적으로 변화시키는 다양한 새로운 메커니즘을 추가합니다.\n\n이 시스템들은 구조적 명확성을 위해 집중된 하위 카테고리로 구분되어 있습니다.\n왼쪽 메뉴에서 탐색할 수 있습니다.\n\n[font=default-bold]이들은 선택적인 계층이 아닙니다.[/font]\n\n이들은 세계의 새로운 물리법칙입니다.\n\n이를 연구하거나, [font=default-bold]그들에 의해 해체될 것입니다.[/font]
nuclear-fission-and-fusion=핵분열과 핵융합
nuclear-fission-and-fusion-text=Exotic Industries는 새로운 메커니즘, 아이템, 제어 시스템을 통해 원자력 에너지 계층을 확장합니다.\n\n이 기능들은 원자력 인프라, 연료 동력학, 또는 격리 논리 등 특정 측면을 대표하는 여러 하위 카테고리로 나뉩니다.\n왼쪽 메뉴를 통해 액세스할 수 있습니다.\n\n[font=default-bold]이것은 단순히 분열이 아닙니다.[/font]\n열, 압력, 그리고 불가역적 반응으로 인한 확장입니다.\n[font=default-bold]점화하기 전에 시스템을 연구하세요.[/font]
orbital-scanner=궤도 물류 스캐너
orbital-scanner-2=Transponders, selectors, and coordination
orbital-scanner-3=Dispatch uplinks and hybrid loading
orbital-scanner-text=The orbital logistics cohort starts with the [entity=ei-orbital-combinator]. Place scanners on the launch surface that owns the platforms you want to read. The scanner only mirrors platforms whose [font=default-bold]space location matches that same surface[/font]. Requests shows configured minima. On The Way shows cargo already committed. Need shows the remaining shortfall after in-flight cargo and current hub stock are subtracted.\n\nOrthogonally adjacent scanners still form one bank, split oversized output into continuation sections, emit [virtual-signal=ei-orbital-overflow] when the bank runs out of room, and draw [font=default-bold]750 kW[/font] each. Circuit wiring keeps the bank hot. If the bank is unwired, it still updates while the GUI is open; once the panel is closed, it falls back to sparse maintenance.
orbital-scanner-text-2=[font=default-bold]Cohort roles[/font]\n\n[entity=ei-platform-transponder] lives on the platform deck and assigns the stable numeric platform ID used by every downstream tool. Manual overrides are allowed, but duplicate IDs across different platforms stay in conflict until one is cleared.\n\n[entity=ei-orbital-selector] lives on the dispatch surface and nominates one target at a time. Manual mode uses a typed platform ID. Circuit mode reads [virtual-signal=ei-platform-id]. Policy mode nominates an unleased same-surface platform with positive Need.\n\n[entity=ei-orbital-coordinator] is the surface authority. Only one coordinator stays active per force and surface. It arbitrates leases so several launch lanes do not blindly serve the same platform.\n\n[entity=ei-orbital-dispatch-uplink] lives beside the rocket silo and republishes the leased mixed manifest for the factory to load. Open each cohort entity directly to use its side panel. The visible combinator pages are read-only telemetry, not the configuration surface.\n\n[font=default-bold]Panel controls[/font]\n\nThe transponder panel sets or clears a manual platform ID override. The selector panel changes selector mode and, in Manual mode, the target ID. The coordinator panel queues a cohort refresh and, for admins, a runtime rebuild. The uplink panel binds or clears a silo, can grab the nearest adjacent silo, and sets the oversize policy plus Threshold floor.
orbital-scanner-text-2b=[font=default-bold]Open the side panel first[/font]\n\nThe visible combinator pages are read-only telemetry. Open the side panel on the scanner or another cohort device to change settings, then use the legend below to read the top line, the middle lines, and the next-action hint.
orbital-scanner-text-3=[font=default-bold]Startup sequence[/font]\n\n1. Place transponders on the platforms themselves.\n2. Place at least one selector on the dispatch surface, then give it a target with Manual, Circuit, or Policy mode.\n3. Bring one coordinator online on that same dispatch surface.\n4. Place uplinks beside rocket silos. Adjacency gives the first quick pick; use the uplink side panel to confirm, replace, or clear the binding, then choose the oversize policy that should hold the lane.\n\nThe cohort is live when a selector shows ready, the surface has one active coordinator, and an uplink has both a valid silo binding and a lease.\n\n[font=default-bold]Blocked states[/font]\n\nNo target means the selector still lacks a valid platform ID. No demand means the chosen platform currently has no remaining Need. Missing silo binding means the uplink is not locked to a real rocket silo. No active coordinator means the dispatch surface still lacks its single live coordinator.\n\nLoading stays hybrid in v1: inserters, trains, requesters, and lane circuits do the physical work. Sticky keeps oversized work leased across repeated rockets. Single Shot releases after one launch. Threshold continues only while remaining demand stays above the chosen floor, so the floor setting only matters in Threshold mode.
organic-asteroid=유기물 소행성
organic-asteroid-text=[font=default-bold]행성 글레바 발견[/font] 연구 후 해금됩니다. 기본 분쇄 작업은 [fluid=water]물을 소모하며 [item=spoilage]부패 물질, [fluid=ei-bio-sludge]바이오 침전물, [fluid=ei-ammonia-gas]암모니아 가스를 생산합니다. 고급 단계에서는 [item=nutrients]영앙소가 추가로 필요하지만, [item=yumako]유마코, [item=jellynut]젤리넛, [item=ei-bio-matter]생체 물질과 간혹 [item=pentapod-egg]펜타포드 알까지 얻을 수 있습니다.\n유기물 소행성에서는 이상 현상 아이템 중 [item=ei-sporeglass-heart]포자유리 심장을 발견할 수 있습니다.
overall=전반적인 정보
overall-text=엑조틱 [color=#08457E]우주[/color] 산업: [color= #FF1493]리멤브랜스[/color]는 단순한 콘텐츠 모드가 아닙니다. 이는 가이안 리메이크로, 나우비스가 서 있던 법칙 자체를 다시 작성하는 대규모 개편입니다. 자동화의 바람은 더 이상 같은 방향으로 불지 않습니다. 불, 광물, 신호는 더 오래된 계약 아래 재편되었습니다.\n\n이 모드의 난이도는 의도적입니다. 투쟁은 수치스러운 것이 아닙니다 - 그것은 주권의 시험장이기도 합니다. 편안함을 찾는 자에게는 적합하지 않습니다. 가이아와 함께 일어나고자 하는 자는 새로운 게임을 시작하기 전에 모드 설정을 확인하세요. 일부 시스템은 조정할 수 있지만 - 다른 일부는 아닙니다. 중요한 것들은 변경할 수 없습니다.\n\n필요하다면 QoL (편의) 모드를 가져오세요. 하지만 이 점은 기억하세요: 싸워서 얻지 않는 한, 아무것도 당신의 것이 아니라는 것을요.\n\n그렇게 되었습니다.\n그렇게 있었습니다.\n그렇게 될 것입니다.\n환영합니다, 리멤브랜스.
petrified-asteroid=화석 소행성
petrified-asteroid-text=[font=default-bold]우주 플랫폼[/font] 연구 이후 해금됩니다. 기본 분쇄 작업은 [item=wood]나무, [item=raw-fish]물고기, [fluid=ei-liquid-nitrogen]액체 질소, [fluid=ei-liquid-oxygen]액체 산소의 이상한 조합을 생산합니다. 고급 단계에서는 [item=nutrients]영양소와 [fluid=fluoroketone-cold]차가운 플루오로케톤이 추가로 필요하지만, 적은 확률로 [item=biter-egg]바이터 알을 얻을 수 있게 됩니다.\n화석 소행성에서는 이상 현상 아이템 중 [item=ei-chrono-fossil-shard]고대 화석 조각을 발견할 수 있습니다.
phase-shift-pipe-1=[img=utility/warning_icon]극저온 파손 발생! [fluid=__1__] [color=blue]증발[/color]이 다음 위치해서 발생했습니다: [color=black]__2__[/color] __3__
phase-shift-pipe-2=[img=utility/warning_icon]극저온 파손 발생! [color=blue]증발[/color]이 다음 위치해서 발생했습니다: [color=black]__1__[/color] __2__
pipe-breach-chemical=화학 물질 유출
pipe-breach-cryo=극저온 과부하
pipe-breach-data=데이터 쇼트
pipe-breach-generic=파이프 유출
pipe-breach-phase-shift=극저온 파손
pipe-breach-thermal=열 유출
railgun-cooling=레일건 냉각
railgun-cooling-2=Cooling loop and fallback recipe
railgun-cooling-3=Surface behavior
railgun-cooling-4=Recovery and status
railgun-cooling-text=The railgun assembly is cooled at the gun, not by converting ammunition into a separate coolant-fed round. Cold fluoroketone is consumed at the turret, hot fluoroketone must be recovered, and the weapon will block itself when the cooling loop cannot keep up.\n\nThis is deliberate. The gun runs hot, the barrel keeps a short afterglow, and the coolant path is the thing that makes sustained fire possible.
railgun-cooling-text-2=The normal operating path uses cold fluoroketone at the turret. When that loop is starved, the railgun takes heat debt, disables itself, and starts recovery instead of pretending the shot was free.\n\nAn ice-based fallback recipe is also available for the cooling chain, giving you another way to make cold fluoroketone when liquid nitrogen is not the only answer. The ice route trades in a little steam instead of pretending the world is made of free cold.
railgun-cooling-text-3=Different surfaces cool differently. Space platforms bleed heat slowly, while atmospheric worlds shed it faster. Aquilo recovers the quickest on natural bleed, Vulcanus stays hot for longer, and thin or low-pollution surfaces sit between the two. The same railgun therefore feels very different depending on where it is bolted down.
railgun-cooling-text-4=Healthy railguns do not sit in a steady-state queue. Only overheated or blocked guns enter recovery, and they stay disabl
repair=유물 수리
repair-text=You can repair broken alien artifacts by making [color=blue]artifact repair packs[/color][item=ei-crystal-accumulator-repair][item=ei-farstation-repair][item=ei-alien-beacon-repair]. This allows you to use them again. Drag the repair kit over the artifact to repair it; the kit is consumed when the repair succeeds. 수정 축전지 kits can also be alt-selected to inspect crystals and husks without spending the kit.
resources=새로운 자원 시스템
resources-text=Exotic Industries는 재구조화된 자원 시스템을 도입했습니다. 전통적인 광물 채굴지는 더 이상 자원을 획득하는 유일한 방법이 아닙니다. 자원은 이제 서로 다른 카테고리로 구분되며, 각 카테고리는 자체적인 논리, 생산 흐름, 공간 제약 등을 따릅니다.\n채굴은 더 이상 단순한 작업이 아닙니다.\n[font=default-bold]획득에는 적응이 필요합니다.[/font]\n카테고리를 이해하지 않으면 아무것도 생산할 수 없습니다..
rock-asteroid=암석 소행성
rock-asteroid-text=[font=default-bold]행성 불카누스 발견[/font] 연구 후 해금됩니다. 기본 분쇄 결과물은 대부분 [item=stone]입니다. 고급 분쇄 제작법을 사용하면 더 풍부한 광물을 얻을 수 있으며, [item=tungsten-ore]텅스텐 광석, [item=calcite]방해석, [item=ei-gold-chunk]금 덩어리가 포함됩니다.\n암석 소행성에서는 이상 현상 아이템 중 [item=ei-gravity-braided-ore]중력자 광석을 발견할 수 있습니다.
rocket-ammo-schema=Rocket ordnance schema
rocket-ammo-schema-2=Payload branches
rocket-ammo-schema-3=FX families
rocket-ammo-schema-4=Artillery atomic line
rocket-ammo-schema-text=Rocket ordnance is built in layers: [item=ei-rocket-airframe]airframe, [item=ei-rocket-motor-basic]motor, [item=ei-rocket-warhead-impact]warhead, then the final round. The airframe keeps the shell intact, the motor sets the reach, and the 탄두 decides the damage family. The artillery branch follows the same logic, only heavier and less forgiving.
rocket-ammo-schema-text-2=The baseline families now hit hard enough to justify their cost. Impact and explosive rounds both strike heavier. Corrosive payloads share one chemistry package between the handheld launcher and the artillery line: a brutal acid hit first, then a lingering corrosive cloud that keeps eating structure. Cryo payloads keep the same control duration across both branches, but they land with more weight. The atomic line is now split cleanly: U-235 resolves into ESIR's own [item=ei-atomic-bomb-u235] and carries the tighter fallout package, while plutonium remains the plutonium atomic rocket, keeps the vanilla atomic explosion, and throws broader radiological contamination behind the breach.
rocket-ammo-schema-text-3=Each family now keeps its own explosion, smoke, and sticker set so the blast reads clearly in motion instead of collapsing into one generic white flash.
rocket-ammo-schema-text-4=The fixed-arc artillery launcher can now also load U-235 and plutonium atomic rockets as loose rounds or full crates. Crated salvos are essentially sacrificial use: fissile production and unlock routing stay split, U-235 uses the tighter ESIR-centered detonation and the cleaner fallout footprint, plutonium keeps the vanilla atomic explosion but throws wider radiological contamination, and a launch fired too close can still tear open the firing position along with the target.
rocket-launch-pollution=Rocket launch pollution
rocket-launch-pollution-2=Curve modes and smoke
rocket-launch-pollution-text=Rocket launches can dump pollution directly onto the launch surface. The system samples the launching force's evolution factor on that surface, feeds it through the selected startup curve, and scales the result against the configured ceiling.\n\nBy default the ceiling is [font=default-bold]10,000 pollution[/font] at evolution [font=default-bold]1.0[/font]. Most curve modes also keep a [font=default-bold]10% floor[/font], so low-evolution launches are still felt.
rocket-launch-pollution-text-2=The startup [font=default-bold]curve form[/font] can be set to linear, quadratic, exponential, threshold, or hybrid. Linear tracks evolution directly. Quadratic and exponential push more punishment into later launches. Threshold jumps across fixed evolution bands. Hybrid uses a linear base and adds an extra late-game spike.\n\nThe launch visual style controls how the sky records the debt: Hybrid starts with a short pad-exhaust bloom that tapers out as the rising plume begins, Ascending plume only keeps the vertical smoke, Cinematic runs full pad exhaust until the plume takes over, and Pad exhaust only keeps the ground smoke without the vertical plume.
scrap-asteroid=고철 소행성
scrap-asteroid-text=[font=default-bold]행성 풀고라 발견[/font] 연구 후 해금됩니다. 분쇄 제작법 결과물은 고철 재활용 결과물과 연동되어 있으므로, 이를 분쇄하는 것은 단일 제품 제작법이 아닌 회수 흐름으로 연결됩니다. 일반/고급 분쇄 제작법 모두 [item=ei-crushed-neodym] 분쇄된 네오디뮴이 나올 가능성이 있으며,\n드물게 고철 소행성의 이상 현상 아이템인 [item=ei-worm-torn-relay-core]웜톤 릴레이 코어를 발견할 수 있습니다.\n\n우주 쓰레기를 창고 재고로 바꾸고 싶다면, 이 제작법을 활용해보세요.
singularity-lance=특이점 창
singularity-lance-2=Chromatic Trace
singularity-lance-3=Witness Triage
singularity-lance-4=Witness Vow
singularity-lance-text=The [item=ei-singularity-lance]특이점 창 is a compact alien-age execution engine. A levitated crystal hangs over its pyramid cap, drinks a vast electric pulse, and answers a target by opening a bright wound across the battlefield instead of tracking every victim as an individual projectile.
singularity-lance-text-2=Each shot wakes one living trace for that lance. The endpoint becomes a witness: fire, scorch, marker, splash, and laser wound answer the visible cut after the prism names the target.
singularity-lance-text-3=When too many lances speak at once, the prism chooses which cuts deserve memory. Some streaks become faint or vanish, but the wound still arrives; absence of spectacle is not mercy.
singularity-lance-text-4=Current witness-vow: __1__. The vow governs how much of the chromatic cut is allowed to remain visible: beam, glow, fire, scorch, sound, and afterimage. It does not rewrite the lance's hunger or body; it only decides how loudly the wound is remembered.\n\nFor the living number, read the placed lance's status; there it speaks the current force-tuned sustained DPS.
space-destinations=우주 목적지
space-destinations-2=다양한 목적지
specialised-pipes=특수 파이프 및 데이터 케이블
specialised-pipes-2=Failure classes
specialised-pipes-3=Containment discipline
specialised-pipes-4=Signatures and monitoring
specialised-pipes-text=Remembrance treats fluid carriers as containment hardware, not interchangeable plumbing.\n\n[color=orange]Insulated pipes[/color] keep cryogenic, thermal, and chemically hostile fluids stable. [color=orange]Data cables[/color] carry [color=blue]simulation substrates[/color] [fluid=ei-computing-power] and are not general-purpose fluid lines: feed them ordinary chemistry and the conduit shorts out.\n\nWhen you choose a carrier, you are choosing what kind of failure the line is allowed to survive.
specialised-pipes-text-2=Uninsulated pipes, underground segments, elevated lines, and tanks do not all fail the same way. [fluid=ei-liquid-nitrogen]Liquid nitrogen and [fluid=ei-liquid-oxygen]liquid oxygen boil off back into gas in ordinary plumbing. [fluid=ei-heated-helium-3]Heated process fluids and lava rupture hot. Fluoroketones and electrolyte break lines with chemical discharge.\n\nTanks can throw a heavier rupture than a simple line segment, while elevated pipes keep their footprint tighter and avoid broad deck contamination.
specialised-pipes-text-3=Insulated pipes still ignore the usual pipe-heating requirement. The insulated pipe, underground, and tank prototypes all use [font=default-bold]0 heating energy[/font], so they do not need external heat to avoid freezing on Aquilo or any other cold surface.\n\nUse them when fluids must stay exactly as prepared: cold liquids remain cold, reactive mixtures stay contained, and specialist lines survive where ordinary plumbing would vent, short, or burst.
specialised-pipes-text-4=Rupture aftermath now depends on both the carrier and the contaminant. In mixed segments, the breach follows the contaminant that actually threatens the carriers present, even when that fluid is not the largest share. Data failures arc and short, cryogenic failures vent frost, thermal failures scorch hot, and chemical failures spit mist or corrosive discharge. Data cables stay fireless even when the contaminant is thermal or chemical, while elevated pipes keep the blast local. Repeated same-segment failures are throttled so one bad line does not flood the screen with duplicate aftermath.\n\nIf you need to audit a live factory, `/ei_runtime_status` now reports `fluid(t/u/d/s/cursor/mode)` for tracked / urgent / dirty / scan / service cursor / next service mode, `fluidfx(qh/ql|sh/sl)` for queued heavy / queued light | suppressed heavy / suppressed light, and `rupture(mode/a/p/d|ob/oi)` for fidelity mode / active jobs / pending rings / scheduled delay buckets | overdue buckets / overdue items.
spidertron=스파이더트론 변경사항
spidertron-text=기본 게임에 비해 [font=default-bold]스파이더트론을 더 일찍 사용할 수 있게 됩니다[/font] - 시뮬레이션 컴퓨터 시대부터 사용할 수 있습니다. 하지만 나우비스의 대응 모델과 달리, 더 이상 자체적으로 작동하는 기적의 기계는 아니며, 연료가 필요합니다.\n\n초기에는 연소 가능한 고체 연료로도 충분합니다 - 석탄, 생체 물질 등 유사한 재료로도 가동할 수 있습니다. 그러나 진행함에 따라 핵연료와 융합 연료가 해금되며, 이를 사용하면 속도, 가속도, 운영 범위에 큰 보너스를 제공합니다.\n\n이것은 단순히 차량이 아닙니다. 이는 [font=default-bold]확장된 기지입니다.[/font]\n\n[color=green]Spidertron Patrols[/color]와 [color=green]Constructron-Continued[/color]와 같은 모드를 설치하면 특별한 통합 기능 연결이 가능하며, Exotic Industries의 수정된 Spidertron 프레임워크와 시스템을 동기화할 수 있습니다.\n\n거미는 더 일찍 등장합니다. 하지만 목적, 무게, 그리고 요구사항을 지니고 걷습니다.\n\n잘 공급하라 - 아니면 [font=default-bold]뒤처질 것이니.[/font]
steam-bots=증기 로봇
steam-bots-2=보일러의 피, 그리고 실패
steam-bots-text=증기 시대의 드론은 세련된 전기 드론이 아닙니다. 그들은 피스톤과 압력, 거친 계산에 의해 공중에 떠 있는 공기압과 황동 몸체로 이루어진 영혼이며, 여전히 뜨거운 금속과 젖은 증기 냄새가 나는 산업적 하수인입니다.\n\n[font=default-bold]증기 시대[/font]부터 사용할 수 있는 증기 로보포트는, 기본 게임의 로봇을 사용할 수 있는 시점보다 더 빠르게 건설/물류 지원을 받을 수 있도록 추가되었습니다.
steam-bots-text-2=다만 제일 큰 단점이 있는데, 바로 지구력입니다. 증기 로봇은 가지고 있는 압력만으로 비행해야 하며, 예비 동력을 가지고 있지 않기에 압력이 고갈되기 전에 로보포트로 돌아와야 합니다. 이동 중에 증기가 바닥난다면, 이들은 우아하게 하늘에 떠있는 대신 [font=default-bold]땅바닥에서 구조를 기다릴 것입니다[/font].\n\n증기 로보포트는 로봇들이 더 빠르게 재충전을 하도록 유도하지만, 과도한 작업, 혼잡한 대기 구역, 과도하게 확장된 네트워크 등의 요소 등이 있다면 이러한 초기 편의성은 곧 파멸로 연결될 것입니다.
stone=돌
stone-text=돌은 성계에서 가장 풍부한 자원입니다. 전통적인 방법으로 지표면 지역에서 채굴할 수도 있지만, Exotic Industries에서는 더 많은 경로로 채광할 수 있습니다:\n\n[color=orange]표면 채집기[/color] [item=ei-burner-surface-harvester]는 어떤 지형에서도 돌 채광이 가능하도록 합니다.\n\n[font=default-bold]수동 채광 역시 가능하지만 비효율적입니다.[/font]\n돌은 모든 곳에 있습니다.\n효율은 선택 사항이지만, 출력은 아닙니다..
surface-patches=표면 광석 광맥
surface-patches-text=나우비스의 표면은 평평하지 않습니다. 착륙 지점 주변은 여전히 다양한 산업적 자원으로 가득 차 있습니다: [item=ei-poor-iron-chunk]철, [item=ei-poor-copper-chunk]구리, [item=coal]석탄, [item=stone]돌, 그리고 [fluid=crude-oil]원유까지. 이러한 압력은 초기 산업 설비를 구축할 만큼 충분하지만,\n\n그 요람을 벗어나면 바로 산산조각날 것입니다. [item=ei-poor-iron-chunk]철, [item=ei-poor-copper-chunk]구리, 심지어 [item=ei-poor-uranium-chunk]우라늄조차 대부분 얕은 잔해, 단층, 고갈된 흉터 형태로만 남아있습니다. 이들은 존재하지만, 산업적 경제를 유지하는 데 지속적인 도움을 주지는 못합니다.\n\n석탄, 돌, 그리고 원유는 여전히 나우비스의 실질적인 기반입니다. 이 자원을 활용해 열, 벨트, 화학 공정을 구축하십시오. 그 후 지형을 올바르게 읽어내야 합니다. 그러지 못한다면, 행성이 당신을 속일 것입니다.
tech=기술 연구 스케일링
tech-2=What the startup settings control
tech-3=Practical limits and live changes
tech-output=현재 시대 진행상황
tech-text=Exotic Industrie에서는 기술 연구 비용이 단순한 선형 형태로 측정되지 않습니다. 이 모드에서는 [font=default-bold]시작 가격[/font], [font=default-bold]지수적 곡선[/font], 그리고 명시적인 [font=default-bold]상한선[/font]을 바탕으로 연구 비용을 계산한 뒤, 그 부담을 전체 기술 연구에 고르게 배분합니다. [font=default-bold]선형(linear)[/font]에서는 일정한 부담 가중이 유지되지만, [font=default-bold]2차함수(quadratic)[/font]는 초반에는 완만하다가 후반으로 갈수록 더 어려워집니다. [font=default-bold]지수적(exponential)[/font]는 초반의 완만함과 후반의 어려움이 더 급격해지며, [font=default-bold]시대당 증가(age-ramp)[/font]는 대부분의 부담을 후반 시대로 집중시킵니다.\n\n시대 연구는 여전히 대다수의 연구가 사용 가능해지는 시점을 결정하지만, 이러한 스케일링 설정은 스피드런에 대해 얼마나 가혹하게 처벌할지를 결정합니다. 이 시스템은 여전히 기술 가중치 라이브러리를 따르므로, 저렴한 기술일수록 비중치가 더 낮게 반영됩니다.
tech-text-2=[font=default-bold]시작 비용[/font] is the individual science pack cost near the beginning of the curve. [font=default-bold]Ceiling[/font] chooses the intended per-pack band near the far end, from Sunday stroll through Very Expensive. [font=default-bold]Curve form[/font] now also includes [font=default-bold]age-ramp[/font], which shifts more of the cost into the later ages, while [font=default-bold]additional multiplier[/font] still scales the final result after the curve is evaluated.\n\nIf the chosen ceiling would otherwise run into Factorio's [font=default-bold]x1000[/font] multiplier cap, ESIR now automatically raises the hidden effective base start price so the higher ceiling remains reachable.\n\nIf you want to rebalance EI, use these internal settings instead of vanilla research multipliers. The mod expects to own this part of progression, and vanilla multipliers do not describe the same shape.
tech-text-3=The named ceiling is not an absolute guarantee on its own. Factorio caps the internal research-price multiplier at [font=default-bold]x1000[/font], so the real in-game ceiling is still tied to your chosen [font=default-bold]start price[/font]. ESIR now automatically raises the hidden effective base start price when needed so a higher ceiling can still be represented.\n\n[font=default-bold]Additional multiplier[/font] is still the safest value to change mid-save. Changing [font=default-bold]start price[/font] or [font=default-bold]curve form[/font] after a run has begun can still cause undesirable or unexpected results.
teslas-legacy=테슬라의 유산 무기고
teslas-legacy-2=작동 모드
teslas-legacy-3=Waveform harmonics
teslas-legacy-4=Quantum specialization
teslas-legacy-5=Fusion overdrive
teslas-legacy-6=Exotic convergence
teslas-legacy-7=Combat readouts and default floating text
teslas-legacy-text=What once stood apart as Tesla's Legacy has been bound into Remembrance's electric arsenal. The [item=tl-basic-tesla-coil]basic tesla coil, [item=tl-advanced-tesla-coil]advanced tesla coil, and [item=tl-tesla-tank]tesla tank keep their public names, TL silhouettes, and industrial identity, but the branch is no longer a foreign ladder hung off the side. It now marches as one doctrine: first the rough field tower, then the heavier execution pylon, then the armored stormfront.\n\nThe line also reaches into the vanilla tesla family. [item=teslagun]Teslagun, [item=tesla-ammo]tesla ammo, and the [item=tesla-turret]Replica Fulgoran coil inherit the same harmonic spine without being crushed into disguised TL towers.
teslas-legacy-text-2=현재 작동 모드: [font=default-bold]__1__[/font]\n\n[font=default-bold]기존 정밀도[/font] is the default path. It keeps the original Legacy machine intact: the old recursion, persistent support discharges, kill-born aftershocks, combustion side effects, and the 테슬라 탱크's volatility flow all remain in command. [font=default-bold]혼합[/font] is the lighter path. It routes the same doctrine through a leaner lattice, then lets later harmonics and doctrine research add richer follow-up discharges on top.\n\nThe doctrine ladder is shared, but the order of force changes. In Hybrid, the newer lattice leads. In Legacy fidelity, the original TL behavior strikes first and the modern additions follow after it.
teslas-legacy-text-3=Waveform harmonics is now the shared spine of modernization. Before it, the Legacy coils keep their original TL beam language. At Harmonics I, they begin speaking the same electrical dialect as the bridged tesla family. At Harmonics II, the basic and advanced coils move into modern follow-up arc families. At Harmonics III, those arcs take on a full chained language, and the bridged turret finally receives the dense aftershock profile it was missing.\n\nThat is where the old mismatch ends. Legacy towers, the Replica Fulgoran coil, and the portable tesla branch now share a real line of overlap instead of behaving like unrelated machines.
teslas-legacy-text-4=After harmonics, the doctrine splits cleanly. [font=default-bold]Storm lattice[/font] belongs to the [item=tl-basic-tesla-coil]basic coil and turns it into a swarm-control tower: wider propagation, cleaner target handoff, and steadier suppression. [font=default-bold]유전체 파열[/font] belongs to the [item=tl-advanced-tesla-coil]advanced coil and sharpens kill-confirm aftershocks, retained charge, and combustion inheritance.\n\n[font=default-bold]Bridge coupling[/font] is the late specialization of the bridged branch. It strengthens the vanilla tesla family without dissolving its identity into TL tower doctrine. The Replica Fulgoran coil receives the heaviest turret-side reward, while handheld tesla gear stays lighter.
teslas-legacy-text-5=The [item=tl-tesla-tank]tesla tank does not share the towers' specializations directly. Its late doctrine is [font=default-bold]reactance overdrive[/font], a fusion-era tank path built around twin-coil saturation, broader volatility windows, and heavier spill across the blast lane. The vehicle remains mechanically distinct from the towers: less a fixed pylon, more a stormfront on tracks.\n\nIt also remains the volatility specialist of the whole line. Critical peaks, modulation swings, and vaporization belong to the tank in a way the towers do not imitate.
teslas-legacy-text-6=The final doctrine step is [font=default-bold]exotic waveform convergence[/font]. It does not replace the TL towers with copies from another age. The [item=tl-basic-tesla-coil]basic coil keeps its improvised body and becomes a modern [font=default-bold]branching field-arc tower[/font] that releases a guaranteed side burst on every clean primary hit. The [item=tl-advanced-tesla-coil]advanced coil keeps its high pylon frame and becomes a focused [font=default-bold]overcharge lance[/font], with each confirmed kill releasing a guaranteed exotic execution storm. Their primary beams are modernized at last, but their battlefield roles remain separate.\n\nIn [font=default-bold]Legacy fidelity[/font], these capstone effects layer over the original TL substrate. In [font=default-bold]혼합[/font], they crown the lighter doctrine lattice. The [item=tl-tesla-tank]tesla tank joins only in part: volatility spikes and vaporization can trigger a stormfront burst, but the vehicle remains the armored storm-member of the family rather than collapsing into another tower. The [item=tesla-turret]Replica Fulgoran coil also gains its own turret-only exotic aftershock bloom on confirmed kills, while [item=teslagun]teslagun and [item=tesla-ammo]tesla ammo remain on the lighter bridge path.
teslas-legacy-text-7=Combat readouts remain intentionally selective. [font=default-bold]Critical hit[/font] and [font=default-bold]vaporization[/font] text are enabled by default so exceptional moments still cut through the noise. Routine [font=default-bold]damage[/font] text is disabled by default so every skirmish does not dissolve into electrical confetti.\n\nThat balance matters even more now that the doctrine carries more moving parts: propagation jumps, aftershock chains, bridge coupling, tank volatility, and final beam modernization. The default setup keeps the dramatic moments visible without drowning the battlefield in noise.
