enemy-difficulty-text=This page records the last hand laid upon the hostile stack. It does not remake [font=default-bold]ei-default[/font], and it does not invent a second ecology. It bends the bodies already present in the dependency swarm: biters, spitters, worms, spawners, armoured lines, cold and toxic and explosive strains, mothers, arachnids, electric lines, and infected structures such as [entity=tb_infected_ship_boss].
enemy-difficulty-text-2=Each percentage is measured against [font=default-bold]Original[/font]. [font=default-bold]100%[/font] keeps the dependency value. Higher percentages increase that stat. Lower percentages reduce it. [font=default-bold]Attack interval[/font] and [font=default-bold]spawn interval[/font] work in reverse: lower values mean faster attacks or faster spawning, while higher values mean slower pressure. Values here are rounded for readability.
enemy-difficulty-text-3=The ladder is stats-only. It changes 적 유닛 체력, positive healing, armoured enemy health, positive armoured resistances, attack damage, attack range, movement speed, attack interval, spawner health, spawner healing, spawn interval, and nearby unit caps. It does not rewrite evolution weights, pollution absorption, join-attack thresholds, result units, or the shared projectiles, beams, clouds, streams, and ammunition beneath hostile weapons. Pentapods, demolishers, Gleba spawners, player robots, and roboports remain outside the rite.
enemy-difficulty-text-4=Merciful and Impossible also apply extra apex overrides to leviathans, mothers, MAF boss chains, walking electric boss chains, and [entity=tb_infected_ship_boss]. The royal exception, [entity=arachnid-biter-royalwarrior-unit], keeps the ordinary unit health values while its damage and movement speed are adjusted separately. On [font=default-bold]Impossible[/font], Nauvis grace is disabled even if the startup toggle is on.
enemy-difficulty-text-5=[font=default-bold]Impossible[/font] 난이도에서는, a launch from hostile ground can also rally existing nearby enemies into an attack on the silo. The retaliation usually pulls a local warband from roughly [font=default-bold]100 to 250 tiles[/font], often [font=default-bold]8 to 30 units[/font], with heavier launches drawing harsher responses. If the launch surface has no local enemy ecology, no retaliation group is created.
enemy-difficulty-text-6=[font=default-bold]Original[/font] uses the dependency values without EI enemy edits. [font=default-bold]Tempered[/font] is the default setting. Values above it increase pressure. Values below it reduce pressure without changing the map preset itself.
