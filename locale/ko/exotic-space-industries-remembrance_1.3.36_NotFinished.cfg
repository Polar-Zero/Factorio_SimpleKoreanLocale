exotic-stabilizers=엑조틱 물질 안정기
exotic-stabilizers-text=엑조틱 물질은 자원이 아닙니다 - 그것은 유용하게 포장된 위협입니다. 이를 처리하려면 격리, 정밀성, 그리고 그 불안정성을 견딜 수 있도록 설계된 기계가 필요합니다.\n\n[color=orange]엑조틱 조립 기계[/color] [item=ei-exotic-assembler]은 그 에너지 신호를 처리할 수 있는 유일한 구조물입니다. 그럼에도 불구하고 불안정은 불가피하며, 조립기는 과부하되면 폭발할 수 있습니다. 격자 구조가 견고하게 버티고 있다면 기계에서 눈에 잘 띄는 곳에 있는 억제장이 아주 조용한 소리를 내지만, 이 구조가 무너지기 시작하는 순간 이는 딱딱거리는 소리와 아크 방전을 포함한, 온 몸으로 느껴질 만큼 강렬한 경고 신호로 변합니다.\n\n이 위험을 조금이라도 줄이려면 조립 기계 주변에 [color=orange]엑조틱 물질 안정화 장치[/color] [item=ei-matter-stabilizer]를 배치하세요. 이 장치는 치명적인 엔트로피 연쇄를 억제하고 주변 에너지망을 안정화합니다. 일부가 세계 곳곳에 흩어져 있을 수도 있습니다 - 이전 사이클의 잔재입니다.\n\n엑조틱 물질을 단순히 또 다른 재료로 취급하지 마세요.\n\n[color=gray]고품질의 물질 안정기는 3 x (품질Lv - 1) 개의 안정기로 간주됩니다.\n고품질의 엑조틱 조립 기계는 초당 엔트로피 연쇄 발생 확률이 (품질Lv - 1)% 감소합니다. 즉, 고급 품질의 엑조틱 조립 기계는 12 -> 11%의 기본 연쇄 확률을 가짐을 의미합니다.[/color]\n그것은 [font=default-bold]살아 있으며, 변동성이 높고, 지켜보고 있습니다.[/font]
fission-reactors=핵분열 변경사항
fission-reactors-2=고온 핵분열
fission-reactors-2-text=[color=orange]고온 반응로[/color] [item=ei-high-temperature-reactor]는 최대 열 출력을 위해 설계된 고급 분열로입니다. 이 시스템은 효율성과 규모 측면에서 표준 원자력 인프라를 뛰어넘지만 - [font=default-bold]적절한 유지보수가 이루어질 때에 한정됩니다.[/font]\n\n임계 온도에 도달하고 다음과 같은 조건이 충족되어야 합니다:\n\n[font=default-bold]납 냉각제[/font], 및\n\n최소 한 개의 사용 가능한 연료봉,\n\n… 이제 납 냉각제가 [font=default-bold]과열[/font]될 것입니다. 이는 기존 열교환기의 처리량으로 처리하기에는 부족하므로 맞춤형 시설이 필요합니다.\n\n전통적인 원자로와 달리, [color=brown]토륨[/color] [item=ei-thorium-232-fuel] 연료를 활용할 수 있습니다 - 설계의 극한 강도로 폐기물을 에너지원으로 변환합니다.\n\n이것은 초보자용 원자로가 아닙니다.\n\n공급 중단을 용납하지 않습니다.\n\n규모를 축소할 수 없습니다.\n\n이는 인류 멸망 이후 산업을 위한 압력 엔진입니다 - [font=default-bold]잔인하고 효율적이며 용서하지 않습니다.[/font]
fission-reactors-text=엑조틱 산업에서는핵분열 시스템이 재조정되고 강화되었으며, 더 도전적이지만 보상이 더 큰 시스템으로 재설계되었습니다.\n\n기본 [color=orange]원자로[/color] [item=nuclear-reactor]는 이제 기본 인접 보너스를 더 이상 받지 않습니다.\n\n대신, 각 원자로당 [font=default-bold]전력 출력이 증가합니다[/font] - 이제 밀도를 통해 전력을 생산하며, 인접성에는 의존하지 않습니다.\n\n[font=default-bold]우라늄이 더 희귀해졌습니다.[/font] 채굴 속도가 느려졌으며, 효율이 감소되었습니다. 효율적인 핵 인프라는 장기적인 연료량도 고려해야 합니다.\n\n소모된 연료 전지는 더 이상 폐기물이 아닙니다.\n\n폐쇄적인 재활용 시스템에서 열화된  부산물을 회수하고 효율이 향상된 2차 연료 전지로 정제할 수 있습니다.\n\n그러나 이 모든 과정은 [color=brown]핵 폐기물[/color] [item=ei-nuclear-waste]을 생성하며, 이는 안전하게 격리, 처리, 또는 격리되어야 하는 지속적인 부산물이 됩니다.\n\n이것은 무시하면 안됩니다.\n\n소홀함은 공해으로 이어집니다.\n\n핵 에너지는 더 이상 무한 에너지로의 빠른 길이 아닙니다.\n\n이는 [font=default-bold]열, 붕괴, 재활용[/font]을 수반하는 고위험 경제입니다.\n\n잘 활용하거나 - [font=default-bold]비용에 잠기거나.[/font]
flammable-ruptures=Combustible fluid rupture
flammable-ruptures-2=Fidelity mode
flammable-ruptures-3=Propagation and risk
flammable-ruptures-4=Platforms and pipe runs
flammable-ruptures-text=Storage tanks, pipe bodies, underground fluid links, wagons, and fluid-bearing machines can rupture when they die with enough combustible fluid still trapped inside. The runtime reads the final loaded fluid prototypes, so oil products, gas lines, and exotic fuel-bearing mixtures each have their own aftermath language.\n\nThe trigger respects the killing damage type. Fire, impact, explosions, plasma, and other energetic deaths are far more likely to ignite a rupture than cold or poison.
flammable-ruptures-text-2=현재 설정된 모드: [font=default-bold]__1__[/font]\n\n[font=default-bold]Lean[/font] keeps the sequence short and tightly budgeted. [font=default-bold]Standard[/font] is the default and the intended public path. [font=default-bold]Cinematic[/font] preserves a larger staged bloom over more ticks. [font=default-bold]Unbounded[/font] removes the hard caps and tells the scheduler to spend ready rings aggressively in the same tick when it can.
flammable-ruptures-text-3=Pollution is applied immediately on death, but the rest of the rupture marches outward in rings. Explosions, smoke, fire placement, scorchmarks, and damage to nearby victims are precomputed once and then released over successive ticks so a cluster of giant tanks does not try to materialize its whole apocalypse in one frame.\n\nUnderground pair follow-through uses the same queue. Unbounded is intentionally dangerous to performance—but the price is yours to pay.
flammable-ruptures-text-4=On space platforms the rupture keeps its damage and connected-pipe travel, but swaps out deck-wide floor fire. Vent smoke stays tighter, scorchmarks are skipped, and flames are seeded only at the rupture source plus directly ignited pipe segments. Foundation damage follows that same local chain instead of splashing randomly across the deck.
fulgora-day-variation=Fulgora day length variator
fulgora-day-variation-2=When rerolls apply
fulgora-day-variation-text=Fulgora does not keep a fixed day length. At the start of each cycle the mod rerolls [font=default-bold]the day-night cycle length[/font] using the startup minimum and maximum multipliers. At default settings that means every Fulgora day can land anywhere between [font=default-bold]10% and 200%[/font] of the standard cycle length.
fulgora-day-variation-text-2=The reroll tries to happen during a bright, stable-light window so the surface does not snap into a new cycle length during heavy darkness. If Fulgora never offers a safe window, a failsafe forces the change after roughly one standard day anyway.\n\nThe startup settings define the envelope. Each actual day picks its own random length inside it.


fusion-neutron-collectors=Collector source priority
fusion-neutron-collectors-2=Layout pressure
fusion-neutron-collectors-text=Neutron collectors can see both fusion tiers, but source strength matters. The Aquilo dense-plasma reactor [item=fusion-reactor] offers only weak secondary leakage; the ESIR thermonuclear reactor [item=ei-fusion-reactor] can deliver strong flux when active and tuned. Changing the thermonuclear reactor recipe changes the neutron multiplier seen by collectors in range, so collector queues are refreshed when the reactor mode changes.
fusion-neutron-collectors-text-2=Collectors reward geometry. A close low-temperature reactor [item=ei-fusion-reactor] can feed fuel production with strong flux; a high-temperature power build may starve collectors while making more heat. A nearby reactor [item=fusion-reactor] is only background leakage. The factory must decide whether the star is a generator, a breeder, or a carefully split oath.
fusion-power=핵융합 전력 단계
fusion-power-2=중성자 얻기
fusion-power-2-text=The dense-plasma reactor [item=fusion-reactor] can supply only weak secondary neutron leakage. It may register as a source, but it cannot be tuned into the strong flux that advanced fuel work demands.\n\nThe ESIR reactor [item=ei-fusion-reactor] is built as a strong, tunable neutron source. Low reactor temperature favors neutron leakage, medium temperature keeps a compromise, and high temperature suppresses neutron flux while favoring power output.\n\nNearby [color=orange]Neutron Collectors[/color] [item=ei-neutron-collector] bind to the strongest usable source in range. Reactor type, mode, distance, and activity decide how much useful flux reaches them.\n\nNeutrons are not decoration. They are a currency for advanced fusion fuel. Build close, tune deliberately, and do not mistake a brighter star for a more generous one.
fusion-power-text=Space Age's Aquilo [color=orange]Fusion Reactor[/color] [item=fusion-reactor] is a dense-plasma fusion reactor: compact, heat-focused, and mostly sealed. It may leak weak secondary neutrons, but those neutrons are residue, not a serious breeding source.\n\nESIR's [color=orange]Thermonuclear Fusion Reactor[/color] [item=ei-fusion-reactor] is a later, heavier machine. It burns heated light atomic fuels inside a controlled plasma vessel and exposes neutron production as an intentional output.\n\nIt runs through a closed lead-coolant loop: [fluid=ei-cold-coolant] enters the vessel, [fluid=ei-hot-coolant] leaves carrying the burden. The reactor is expensive to build and hungrier to operate. Once active, it asks for heated fusion fuels without pity.\n\nEarly ESIR work begins with [fluid=ei-heated-protium] and [fluid=ei-heated-lithium-6]. Stronger fuel chains open through [fluid=ei-heated-deuterium], [fluid=ei-heated-tritium], and [fluid=ei-heated-helium-3].
fusion-reactor-agents=Agent states
fusion-reactor-agents-2=Signal values
fusion-reactor-agents-text=Agents are compact status values for circuits and diagnosis. Control agent reports Manual or Circuit authority. Fuel agent reports whether the selected pair is valid or corrected. Thermal agent reports low, medium, or high containment posture. Coolant agent reports whether the selected recipe implies a valid coolant demand. Circuit agent reports unwired, readable, or commanding state.
fusion-reactor-agents-text-2=The numeric convention is intentionally simple. Control agent is 1 manual, 2 circuit. Fuel agent is 1 valid, 2 corrected. Thermal agent is 1 low, 2 medium, 3 high. Coolant agent is 1 valid demand, 3 invalid or dry. Circuit agent is 1 unwired, 2 readable, 3 commanding. The goal is readable combinator logic, not a second hidden doctrine.
fusion-reactor-circuit-interface=Hidden combinator interface
fusion-reactor-circuit-interface-2=Read/write signal contract
fusion-reactor-circuit-interface-text=The reactor circuit surface follows the same invisible-combinator pattern used by other ESIR systems. A hidden interface is internally wired to the visible reactor connector, publishes telemetry, and accepts control signals when the reactor is in Circuit mode.
fusion-reactor-circuit-interface-text-2=Manual mode ignores write signals but still publishes readable state when wired. Circuit mode reads [virtual-signal=ei-fusion-set-fuel-1], [virtual-signal=ei-fusion-set-fuel-2], [virtual-signal=ei-fusion-set-temperature], and [virtual-signal=ei-fusion-set-injection]. Fuel values are 1 protium, 2 deuterium, 3 tritium, 4 helium-3, 5 lithium-6. Temperature and injection use 1 low, 2 medium, 3 high. Missing or zero fields use the manual fallback. Readback uses separate state and telemetry signals, so the reactor does not command itself through signal echo.
fusion-reactor-controls=수동 제어
fusion-reactor-controls-2=Fuel pairs and locked recipes
fusion-reactor-controls-3=Temperature and injection
fusion-reactor-controls-text=The ESIR thermonuclear reactor console keeps four manual controls exposed: fuel 1, fuel 2, temperature, and injection rate. These choices are not cosmetic. Together they select one locked hidden recipe that defines input fuel use, coolant throughput, power estimate, and tunable neutron flux.
fusion-reactor-controls-text-2=Only valid fuel pairs can ignite. If a selected second fuel cannot react with the first, the console falls back to the first valid fuel in the ordered reactor table instead of leaving the vessel in an impossible state.
fusion-reactor-controls-text-3=Temperature and injection are separate levers. Low temperature is neutron-rich and low-power. Medium temperature is the compromise. High temperature suppresses neutron output and leans into power. Low injection conserves fuel, medium is stable, and high injection burns harder at a steep fuel cost.
fusion-reactor-options=Options and fallback
fusion-reactor-options-2=Presets and override
fusion-reactor-options-text=Options are convenience commands layered over the same four manual controls. Reset defaults returns to deuterium-tritium at medium temperature and medium injection. Refresh collectors forces nearby neutron collectors to re-evaluate the reactor.
fusion-reactor-options-text-2=Power, Flux, and Balanced presets choose sane manual values without hiding the fine controls. In Circuit mode those manual values remain the fallback whenever a circuit field is missing, zero, or invalid.
gaian-saucer=슬립웨이크 비행접시
gaian-saucer-2=Wake resonance
gaian-saucer-text=The [item=ei-gaian-saucer] 슬립웨이크 비행접시 is a Gaian hover vessel: a Spidertron command core entombed in a shell that refuses legs. Its cargo hold, equipment lattice, and void-fed drive make it a pilgrim's tool for crossing hostile thresholds.
gaian-saucer-text-2=The current wake-vow is [font=default-bold]__1__[/font]. It changes only the chromatic memory cast behind the hull: how brightly the slipwake blooms, how long the turn-scar holds, and how much of the passage the world is asked to remember. The vessel itself remains unchanged.
game-related=게임플레이 관련 정보
game-related-text=이 섹션에서는 모드의 핵심 시스템과 메커니즘을 정리합니다. 이 섹션은 미관적인 목적보다는 편리한 탐색을 위해 명확한 하위 카테고리로 구분되어 있습니다.\n\n왼쪽 메뉴를 사용하여 해당 섹션에 접근할 수 있습니다.\n각 아이템은 구조를 설명하기 위해 존재하며, 재미를 위한 것이 아닙니다.\n생존을 원하신다면 반드시 읽어보세요..
gate=차원 간 관문
gate-2=수신기와 ID
gate-3=관문 회로 연결
gate-4=관문 원격 제어
gate-5=Stress and residue
gate-6=Legacy gates
gate-7=Gate attunement
gate-control-signals=Control signals read by the gate
gate-telemetry-signals=Telemetry signals emitted by the gate
gate-text=The Gate is a spatial transit structure that moves items through a controlled dimensional breach.\n\nEach gate binds to receiver IDs instead of raw surface positions. The source console selects a receiver, the receiver anchor claims an ID, and circuit signals can override route selection or arming when needed.\n\nTransit cost now depends on both burden and span. Same-surface hops stay cheap, same-location cross-surface transfers still pay a meaningful floor, and moving-platform routes are priced from live route progress.\nThis is not a portal. [font=default-bold]It is a machine that remembers where it tears.[/font]
gate-text-2=관문 수신기s are the destination anchors. Each one claims the lowest free positive ID for its force unless circuit signal [color=orange]I[/color] overrides it.\n\nDuplicate effective IDs conflict and cannot be used by either manual selection or [color=orange]signal-D[/color] until the conflict is resolved.\nSelecting a receiver in the gate console binds the gate to that receiver ID instead of a raw position.
gate-text-3=Control input is read from the source side.\nWiring the visible gate body reaches the hidden source-side container for control input.\nThe signal row below shows what the gate reads.\n\nControl priority is simple:\n[color=orange]signal-D[/color] chooses the destination.\n[color=orange]signal-E[/color] arms or disarms that chosen route.\nReceiver-side [color=orange]signal-I[/color] changes a receiver's effective ID.\n\nA valid [color=orange]signal-D[/color] always overrides manual receiver selection.\nIf [color=orange]signal-D[/color] does not resolve to a valid receiver, the gate falls back to the console's manual receiver; [color=orange]signal-E[/color] still overrides armed or disarmed when it is nonzero, otherwise the manual state applies.\nThe visible gate body is therefore still enough for control-only wiring when you do not need telemetry.\nIf [color=orange]signal-E[/color] is absent or zero while a clean [color=orange]signal-D[/color] route resolves, the gate arms that route by default.
gate-text-4=The gate exports telemetry from the hidden [entity=ei-gate-circuit-interface].\nThe telemetry row below shows what it exports.\nThe visible body connector can still participate in control wiring through the hidden source-side container, but it is not a separate telemetry emitter.\n\nThe interface only updates while it is actually wired to an external circuit, and it refreshes at most once per second. If external wiring is removed, the telemetry output is cleared instead of lingering as stale data.\n\nWhen wired:\n[color=orange]ei-gate-active[/color] stays present and reads 0 or 1 depending on whether the gate is enabled, resolved, and above the low-power floor.\n[color=orange]ei-gate-stress[/color] stays present and reports stress on a 0-100 scale.\n[color=orange]ei-gate-energy[/color] reports stored energy in MJ, but drops out entirely at 0 MJ instead of emitting a literal zero.\n\nUse these signals to drive alarms, buffers, or control logic without paying a full combinator update every tick.
gate-text-5=Each successful transfer adds stress. Stress raises upkeep, lengthens cooldown, and can saturate a receiver if traffic is repeated too quickly.\n\nA gate that is disarmed or below the low-power floor refuses new insertion. Cooling and receiver saturation do not reject already accepted cargo; they only delay transfer until the breach settles or the receiver recovers.\n\nThe console marks active post-transfer lockout as [font=default-bold]Runtime: Cooling[/font], while [font=default-bold]Receiver strain[/font] mirrors the destination's current saturation. [font=default-bold]Runtime: Critical[/font] means stress has crossed the instability threshold and discharge risk is elevated.\n\nThe console's Transit Span bar shows the current route pressure. Same-surface transfers stay cheap, orbit-to-planet hops pay a large floor, and moving platform receivers use live route progress.\n\nAt sufficiently high stress, an actively holding gate can also lash outward with short electrical tendrils around the housing, damaging nearby entities.\n\nOveruse also produces [item=ei-breach-residue], a waste product of dimensional scarring. The gate first tries to leave that residue in the source or receiver inventories; only the excess spills out at the gate. It should be neutralized through the purifier chain before it becomes clutter.\nThe gate is for burst logistics, not for continuous freight.
gate-text-6=Legacy saves that still point at a chest or raw position continue to work until they are reconfigured.\nOnce a gate is assigned to a receiver, that receiver becomes the source of truth and the old raw destination remains informational only.\nThe console may still show that stored point as [font=default-bold]Legacy destination[/font] until it is replaced or cleared.\nThis preserves old saves while moving new setups to receiver IDs.
gate-text-7=현재 조율도 설정: [font=default-bold]__1__[/font]\n\nRecovered keeps the current gate progression.\nAttuned moves it deeper into alien age with steeper ingredients.\nResonant shifts it to late quantum progression.\nParadox shifts it to exotic age.\n\nAttunement changes where gate progression lands in the normal technology chain and how expensive the gate and receiver are to build. It does not change the gate's runtime behavior once constructed.
