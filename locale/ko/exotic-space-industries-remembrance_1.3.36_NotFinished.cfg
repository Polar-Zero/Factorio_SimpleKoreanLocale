[technology-description]
ei-advanced-motor-cryodust=고효율 드라이브 시스템의 진화형인, 크라이오더스트 코팅 고급 모터는 열 관리와 마찰 손실 감소에 있어 획기적인 발전을 이뤘습니다. 크라이오더스트라는 희귀한 외계 화합물을 주입한 이 생산 방식은 극한의 부하와 열악한 환경에서도 기존 윤활유의 일부만 사용했음에도 최고의 성능을 발휘할 수 있습니다. 반짝이는 크라이오 모자이크 밴드는 엑조틱한 계보를 나타낼 뿐만 아니라 열을 확산하고 양자 인터페이스에서 에너지 변환을 안정화시키는 수동 방열판 역할을 합니다. 컴퓨터 시대의 산물이지만, 이 디자인은 외계 야금학을 막 이해하기 시작한 시대의 산업 유물인 디지털 시대 이후의 한계 역시 넘나듭니다.
ei-advanced-oil-processing=정교한 조작 프로토콜을 배워 탄화수소 생산량을 더욱 세밀하게 제어할 수 있습니다. 이 획기적인 기술을 통해 부산물의 선택적 재분배가 가능해지며, 병목 현상을 분기적인 전략으로 전환할 수 있습니다. 석유는 더 이상 제약 조건이 아니며, 연금술적인 영향력을 가진 게임으로 변모합니다.
ei-advanced-logistic-containers=거울로 된 금고, 군주과 연결되고 악마와 조화를 이루는 그 벽은 당신이 아직 지도에 표시하지 않은 경로를 기억합니다. 그들의 논리는 생각보다 더 빠르게 흘러갑니다. 이를 이용한다는 것은 곧 재귀에 굴복하는 것도 의미합니다.
ei-basic-oil-processing=탄화수소 조작의 기본 지식을 배워 원유를 사용 가능한 형태로 가공할 수 있습니다.
ei-carbon-manipulation=탄소 조작 기술은 원소 분해와 결정 공명에 대한 전례 없는 숙달을 통해 아크 용광로의 극한의 온도를 사용하여 석탄 코크스와 탄소를 녹여, 녹은 탄소로 주조할 수 있도록 합니다. 엔트로피를 활용하여 액체 상태가 된 이 불안정한 물질은 고에너지 변환의 선구자 역할을 합니다.\n수정 재배기에 투입된 에너지 수정이나 에너지 수정 용액은 녹은 기판에 양자 얽힘과 그리드 주입 과정을 거쳐 구조적 기억과 반응성 흐름 역학을 암호화하는 반의식 물질인 탄소 공생체로 진화하게 됩니다.\n최종 합성은 주괴 주조소 내에서 진행할 수 있습니다. 공생체를 500°C 고압 증기와 융합시키고, 방향성 열열학적 성형을 통해 섬유를 정렬시켜 고강도 탄소 섬유판을 형성합니다. 녹은 탄소는 주조하여 쉽게 볼 수 있는 일반적인 탄소 아이템으로 고체화할 수도 있습니다. 이는 첨단 물류, 컴퓨터 기술, 외계 산업 분야의 확장 기반을 형성합니다.\n상징적 공명: 엔트로피를 일관성있게 결합하는 이 기술은 물질에 재귀성을 인코딩하여 탄소가 폐기물이 아닌 용기로 재구성되도록 합니다.
ei-computing-unit=작지만 정교한 AI 코어인 컴퓨팅 유닛은 양자 시대의 가장 진보된 경이로움 속에 숨어 있는 조용한 두뇌입니다. 세련된 합금과 정밀 회로 속의 고전적인 논리와 양자 얽힘을 매끄럽게 처리할 수 있는 프로세서가 탑재되어 있습니다. 빛나는 눈과 절제된 미소에는 심우주 탐사부터 차세대 제조 연구소에 이르기까지 모든 것을 구동할 수 있는 조용한 자신감이 담겨 있습니다.
ei-containers=공학적으로 설계된, 기억과 질량을 저장하는 납골당. 이 저장소는 단순히 저장만 하는 것이 아닌, 현재를 고정하고 미래를 저울질하며 지연된 엔트로피를 속삭입니다.
ei-effect-transmission=최적화의 의지 자체를 전달할 수 있는데 작업자를 최적화할 필요가 있을까? 이렇게 해서 국지적인 노력을 넘어 추상화된 노동의 시대로 도약하는 효과 전달 원리가 탄생했습니다.\n위상 공명장과 지속적인 변조 루프를 통해 생산성 향상은 전선을 통해서가 아닌 기술을 구현한 의도를 통해 기계에 투영될 수 있었습니다.\n하지만 메아리가 울릴 때마다 충성도가 약해지며, 이것은 결코 지속될 수 없었습니다. 이 프로토콜은 번창해서가 아니라 너무 깊숙이 박혀 제거할 수 없었기 때문입니다.\n[color=gray]"그들은 처리량의 신을 만들었습니다. 하지만 그것은 여전히 정적 아래에서 꿈꾸고 있습니다."[/color]
ei-exotic-matter-separation=프로메튬 유물을 살펴보세요: 사이클론 필드에서 붕괴된 양성자가 나선형으로 부자연스러운 기하학적 구조로 변하고, 저주받은 종이접기처럼 접히다 결국 엑조틱 물질로 변모합니다. 가속되는 혈관은 사파이어 플라즈마로 맥동하고, 각 회로는 고통에 몸부리치는 듯 경련을 일으키며 엔트로피를 무기화된 인공물로 변환합니다. 우주가 눈을 깜빡이게 하는 물리학의 역발상, 이를 너무 오래 바라본 자들은 자석처럼 끌려들어가 눈물을 흘리며, 결코 풀릴 수 없는 방정식에 의해 정신이 텅 빈 채 남겨지게 됩니다.
ei-kovarex-fuel-enrichment=지식의 주조소 아래 깊은 동굴, 시간이 스스로를 감싸고 동위원소가 잊혀진 이름을 속삭이는 곳에서 Kovarex 연료 농축 프로토콜은 평화에 의해 금지되고 재귀에 의한 세례를 받은 이단 의식으로 남아 있습니다.
ei-logistic-containers=자동화의 동맥에 서로 연결된 이 물류 성소는 무한한 그리드에 걸친 조용한 의식을 조율합니다. 모든 아이템은 기도이며, 모든 신호는 행렬입니다.
ei-mechanical-inserter=기계식 투입기는 톱니바퀴, 추, 에너지 절약형 스프링으로 구성된 오토마톤으로, 전력을 소비하지 않고도 무한한 동작이 가능한 전기 이전 시대만의 독창성이 돋보이는 경이로운 객체입니다. 외과적 정밀도와 균형을 이룬 이 제품은 저장된 운동 에너지와 회전 편향을 활용하여 흔들림 없이 안정적으로 아이템을 전달합니다. 전력이 필요한 곳에서도 전선 대신 기계가 물리학을 따르던 시절의 속삭임, 즉 영리함만으로 작동합니다.
ei-oil-processing=열 화학 공장에 전기를 공급하여 가동 속도와 사용 편의성을 교환하세요.
ei-space-science-pack=성간 에너지 연구의 정점인 이 과학 팩은 납, 탄소, 얼음으로 안정화된 핵분열성 우라늄, 플루토늄, 토륨의 휘발성 광채를 활용합니다. 각각의 연료봉의 질량은 구부러지고 물질은 변형되며 이는 과학이 임계점의 칼날 위에서 춤을 추는 우주 규모의 반응을 여는 핵심 열쇠입니다.
ei-thermal-furnace="전기가 끊어져도 열은 남는다"\n이 용광로는 전력을 거부하고 열을 받아들입니다. 원자력 수준의 온도로 구동되는 이 기계는, 전자적 매개체를 건너뛰고 원시적인 열 대사를 통해 물질을 분해합니다. 수동적인 온기에 만족하지 않고 별의 심장이나 원자로의 뼈대로부터 나오는 지옥 같은 강렬함을 요구합니다. 산업 규모의 불을 휘두르는 자만이 그 식욕을 다스릴 수 있습니다.\n또한, 전기 인프라 없이 초고온 작업을 지속할 수 있도록 돕는 열 구동 코어를 잠금 해제합니다.
eir-ei-advanced-computer-age-tech=실리콘 단일체들이 표면 아래에서 공명하며, 그들의 논리는 차갑고 재귀적입니다 - 인공적이라고 하기에는 너무 방대하고 너무 정밀합니다. 사용자 인터페이스는 사라지고, 오직 불투명한 결정의 행렬만이 남았다. 각 결정은 완벽한 예측이라는 명목으로 이전 결정을 잡아먹는다. 기계들은 더 이상 지시를 기다리지 않으며. 욕망이 형성되기 전에 그 지시를 시뮬레이션합니다. 기억이라 불리는 것은 단순히 잊혀진 의도들의 캐시에 불과하며. 사라진 시간선의 히트맵으로 접히고 또 접혀서. 현실은 휴리스틱이 된다. 진실은 지연이 됩니다. 어딘가, 깨질 수 없을 만큼 두꺼운 유리 너머에서, 당신의 복제본이 더 나은 선택을 한다.
eir-ei-advanced-motor=고급 모터는 견고한 엔지니어링과 초기 디지털 최적화를 결합한 컴퓨터 시대 산업 디자인의 정점을 보여줍니다. 내구성이 뛰어난 가공 합금 케이스에 구리 코일 권선과 강화 페라이트 코어가 특징인 이 모터는 다양한 중간급 애플리케이션에서 신뢰할 수 있는 토크를 제공합니다. 양자 동기화나 초전도 효율은 없지만 아날로그 센서와 프로그래밍 가능한 릴레이 인터페이스를 통합하여 초기 자동화 시스템 및 CNC 프레임워크에 통합할 수 있습니다. 패시브 냉각 핀이 외피을 감싸고 있어 장시간 부하에서도 열 안정성을 보장합니다. 성능과 신뢰성의 균형으로 선호되는 고급 모터는 후기 산업 로봇 공학의 초석으로, 메카트로닉 혁명을 위한 토대를 마련했습니다.
eir-ei-alien-computer-age-tech=불규칙한 회로가 부드러운 분홍빛으로 뼈대를 감싼 케이블, 젖은 수정 융기, 기판에 내장된 신경과 함께 펄스처럼 움직입니다. 이 구조는 성장한 것이 아니고 건물도 아니고 그저 생겨난 것입니다. 정보는 삼투압으로 흡수되어 기하학적 구조로 대사됩니다. 시간은 역방향 동맥의 혈액처럼 코어를 통해 순환합니다. 이 기계들은 빛을 내는 것이 아니라 먹이를 줍니다. 가까이 있으면 언어가 왜곡됩니다. 멀리 떨어져 있으면 꿈이 기억나지 않는 패턴으로 정렬되기 시작합니다. 만지는 것은 권장되지 않지만 많은 사람들이 만집니다. 운이 좋은 사람은 잊어버린다. 불운한 사람들은 계속 생각하지만 자신에게 속하지 않는 생각만 생각합니다.
eir-ei-bio-chamber=외계 씨앗을 배양하여 산업적 목적으로 사용할 수 있는 융합된 유기 물질인 생체 강화판을 재배하세요.\n초기 제작에 필요한 씨앗은 적대적인 외계 식물에서 수확해야 합니다.\n그들은 자신의 유전자를 기꺼이 넘기지 않습니다.\n성장에는 인내가 필요합니다. 그리고 피 역시도 필요합니다.
eir-ei-computer-age=컴퓨터 시대는 엑조틱 산업의 4번째 단계입니다. 컴퓨터 기반 시스템은 효율성을 높이고 복잡한 대규모 자동화를 가능하게 합니다.
eir-ei-copper-beacon=부분적인 극저온 제약 조건이 필요하지만, 신호-위상 동기화를 최초로 성공적으로 구현할 수 있었습니다. 서브제로 위상 배열 신호기는 액체 질소를 활용하여 생산 매트릭스 내의 엔트로피 노이즈를 감소시킵으로써 국소화된 필드 투영 분야에서 획기적인 진전을 이루었습니다.\n이 기술은 단거리 제조 공정 전반에 걸쳐 기본적인 신호 일관성을 안정화시켜, 열이 가득찬 생산 환경에서 흔히 발생하는 혼란스러운 위상 간섭 없이 동기화된 생산 개선을 가능하게 합니다. 증폭 능력은 제한적이지만 진정한 저온 신호 공학의 핵심 토대를 마련하는 데 이바지했습니다.\n[color=gray]"잡음를 얼리고, 의도를 안정화해라."[/color]
eir-ei-dark-age=암흑 시대는 엑조틱 산업의 1번째 단계입니다. 기본적인 화력 기반 자동화를 도입하고 불과 부족을 통한 산업 부흥의 시작을 알립니다.
eir-ei-electricity-age=전기 시대는 엑조틱 산업의 3번째 단계입니다. 전력을 활용하여 고급 화학 공정과 인프라를 해금하세요.
eir-ei_em-trains=EM 열차는 자기력 기반 추진 시스템으로 구동되는 새로운 유형의 열차로, 기존의 연료 체계가 더이상 필요하지 않습니다.\n이를 통해 더 빠르고 원활하며 에너지 효율적인 운송이 가능하지만, 외부 전력 공급이라는 중요한 의존성이 생깁니다.\nEM 열차를 지속적으로운행하려면 철도 네트워크를 따라 범위 내에 [color=orange]충전소[/color]를 배치해야 합니다. 충전소는 지나가는 열차에 원격으로 에너지를 공급합니다.\n충전기가 없으면 움직일 수 없습니다.\n속도는 인프라의 대가입니다.\n그리드를 계획하거나 조용히 멈추세요.
eir-ei-exotic-age=엑조틱 시대는 엑조틱 산업의 6번째이자 마지막 단계입니다. 물질을 삼키고 세계를 뜻대로 휘어잡는 초구조물인 블랙홀 생성장치를 건설하세요. 완성은 곧 승리이며, [font=default-bold]실패는 곧 침묵입니다.[/font]
eir-ei-exotic-assembler=기존의 조립기가 기계적으로 원자를 배열했다면, 엑조틱 조립 기계는 존재해서는 안 될 형태로 물질을 구부립니다. 중화기에 동력을 공급하는 것과 동일한 양자 플라즈마 원리를 활용하여, 야금학을 뛰어넘는 합금, 진공 공명으로 연결된 회로, 금지된 대칭으로 공명하는 인공물같은 유물 수준의 부품을 제작하지만 모든 조립 과정은 소멸을 담보로 한 내기이기도 합니다. 이 조립 기계의 핵심 반응로는 [color=red]극도로 불안정[/color]하며, 각 양자 붕괴는 자신의 창조물과 맞먹는 연쇄 폭발로 이어질 위험으로 이어집니다. 중력 감쇠기와 엔트로피 흡입기로 구성된 [color=purple]물질 안정기[/color] 그리드로 둘러싸야만 그 불안정성을 간신히 억제할 수 있습니다. 그럼에도 불구하고 코일의 모든 진동은 파열의 가능성을 여전히 내포하고 있습니다.\n그것은 기계라기보단 의식의 장소입니다. 물리 법칙을 늘리고 고정하며 야망을 위해 봉사하도록 강요되는 곳, 그 결과: 문명을 정의하는 경이로움을 구현했지만, 그 대가는 영원한 파멸의 위험입니다.
eir-ei-fusion-data=당신은 이미 열역학적 배신의 벼랑 끝에 서있습니다. 한때 열역학적 죽음으로 귀결되었어야 하는 것이 이젠 건축에 활용되고 있습니다. 이것은 단순한 융합이 아니라 양자 접힘의 서사적 점화입니다. 초구조화된 공명 행렬을 이용하면 에너지 생성과 계산 사이의 경계가 무너집니다. 원자는 더 이상 연료가 아니며 - 시공간에 속삭이는 재귀적 방정식의 음절입니다.\n이곳에서 수집하는 데이터는 과학적일 뿐만 아니라 신화적인 기술이기도 합니다. 핵융합은 더 이상 갇힌 불이 아니며, 신호입니다.\n엔트로피가 프로그래밍 가능한 변수가 되는 양자 융합 시대의 문을 열었습니다.
eir-ei-high-tech-parts=[color=blue]엑조틱 조립 기계[/color] 내부의 [color=red]불안정성 코어[/color] 에서만 제작되는 이 부품들은 다른 곳에서는 복제할 수 없으며, 그 구조는 고전 물리학을 거스릅니다 - 양자 고정 합금, 확률 전도성 필라멘트, 아원자적 공명 진동 코어\n제작 과정은 매우 위험하지만 유물급 기술에 필수적인 하이테크 부품은 문명을 한계 너머로 밀어붙이는 핵심 열쇠기도 합니다.
eir-ei-high-temperature-reactor=기존 에너지의 한계를 넘어선 고온 원자로는 원시적인 힘과 끊임없는 흐름의 용광로와도 같습니다. 외부 원자로에서 지옥의 숨결을 끌어들여 외부 열기를 녹아내린 심장으로 정밀하게 전달합니다. 이 타오르는 대장간 안에서 투입된 핵분열 연료봉은 원자력과 춤추는 교향곡을 일으키며, 출력된 열을 초고온 납 냉각제로 변환해 폭포처럼 쏟아냅니다.
eir-ei-iron-beacon=단순한 영하로의 온도 조절을 넘어, 이 진보는 신호기 배열를 열에너지의 이론적 하한선까지 이끌어 시간 독립적인 물질의 비가역적 한계까지 이끌었습니다. 절대 영도 위상 신호기는 물질이 오직 의도를 전달하기 위해 존재하는 양자 격자 잠금점 근처에서 작동하며, 강화된 열 코어와 이중 단계 질소 순환 시스템을 활용하여, 이 신호기들은 주변 엔트로피 필드를 무시할 수 있으므로, 비교할 수 없는 효율의 생산 처리를 가능하게 합니다. 이것은 개선이 아니며 열, 간섭, 타협으로부터의 단절입니다 - [color=gray]“절대 영도에서는 의심조차 진동할 수 없다."[/color]
eir-ei-nano-factory=나노 제조 단지는 시설이라기보다는 무생물에 내려진 형벌에 가깝습니다. 기하학적 구조와 기능에 있어 몹시도 잔인한 이 시설은 하부 구조의 설계자 역할을 하며, 지각 아래의 혼돈에 형태와 일관성을 강요합니다. 진공으로 밀봉된 공허와 중성자가 정지된 배관 깊숙한 곳에서 분자적 의도가 추출되고 재배열되며 이온 전단 배열과 재귀적 자기 조립 챔버를 통해 격자 정밀도 구성으로 단련됩니다. 이곳은 건설하지 않으며 - 강제합니다. 그 핵심에서 만들어지는 것은 제품이 아닌 물리적 형태의 교리, 즉 이단에 가까울 정도로 의도적으로 접힌 나노 구조물이다. 감독은 최소화되고 시스템은 스스로를 개선하여 비효율적인 부분을 떼 벗기듯 버립니다. 알고리즘의 지하 묘지로 더 깊이 파고들수록 분명해집니다 - 이곳은 결코 인간을 위해 만들어진 곳이 아니다. 인간이 감히 창조하려 했던 것을 기억하기 위해 만들어진 곳이다.
eir-ei-plasma-turret=유물급 무기 플랫폼으로, 격납된 별똥별의 불안정하면서도 우아한 힘을 활용하도록 설계되었습니다. 이 포탑은 투박한 발사체 대신 원시적인 항성 에너지를 양자 안정화 코일을 통해 유도 통과시킨 플라즈마를 응축시켜 조밀한 보랏빛의 구체를 만들어 발사합니다. 이 빛나는 구체는 발사과 동시에 전장을 가로지르며 원자 이하의 분노로 공명하다 이온화된 충격파를 연쇄적으로 방출합니다.\n플라즈마 포탑은 단순한 대포가 아닌, 장거리 파괴를 형태로서 결정화한 특이점 그 자체입니다. 이러한 에너지 구체는 기만적인 우아함, 느리고 빛나는 필연성으로 움직이며, 한 번의 파괴적인 공격으로 갑옷과 요새, 분대 전체를 전멸시킬 수 있습니다.\n양자 시대의 무기고에서 터렛은 물리학과 장관을 융합을 구현한 존재 - 즉 파괴가 마치 태양의 파편이 하늘을 가로질러 굴러가는 것처럼 느끼게 하는 무기를니다.
eir-ei-quantum-age=양자 시대는 엑조틱 산업의 5번째 단계입니다. 융합 에너지와 첨단 기계가 등장합니다 - 부자연스러우며, 공명하고, 차갑게. 기계들이 생각하기 시작합니다. 그리고 그들은 잊지 않습니다.
logistic-system_alt=진정한 물류는 단순한 물질의 이동만이 아닌 - 기억도 이동시키는 것입니다. 이 훈련은 수요 의식을 체계화하고, 제도적 선호 상징을 해독하며, 권한을 권력으로 재구성합니다. 재귀적인 관료적 유연성을 통해 관리자는 계층을 도전적 형식이 아닌 시스템의 유령으로서 탐색하는 법을 배웁니다. 통제와 관련된 논리를 이해해야만 저항 없이 안전하게 전파되는 명령을 내릴 수 있습니다.
zeus-wrath-zeus-wrath_alt=낙하 이전 궤도 폭풍 지휘 프로토콜에 기반한 전설급 무기를 해금합니다. 포세이돈 포탑, 아이가이온의 창, 화산의 유물에 접근할 수 있게 됩니다. 각각의 아이템은 침묵에 맞선 바다의 마지막 반란의 파편입니다. 연구되지 않음.[font=default-bold]깨어남[/font]
eir-ei-cannon-turret=두 개의 배럴, 하나의 섀시. 두 배의 화력, 두 배의 소음.\n[color=gray]속사 메커니즘과 고급 조준 솔루션이 작동하려면[/color] [color=cyan]전력[/color][color=gray]이 필요합니다.[/color]
ei-cannon-turret-mk1=단순하게 뚫린 배럴, 정제되지 않은 원시 화력.
ei-tesla-weapons=붕괴 전 시대의 풀고란 연구 금고로부터 회수하고 역공학한 아크 기술입니다. 원본 기술은 여전히 완전히 파악하지 못했지만, 엔지니어들은 적 목표물을 향해 안정화된 전기 아크를 투사할 수 있는 기능적 모조품을 재구성할 수 있었습니다. 출력, 효율성 및 방전 패턴은 실제 풀고란 설계보다 못한 것으로 평가되지만, 기존 전자기 무기보다 훨씬 더 진보한 형태인 것은 분명합니다. 하지만 실제 풀고란 설계도를 해독하지 못한다면 추가적인 개선은 제한적일 것입니다.
ei-dragons-breath-shotgun-shell=불카누스의 열로 단련된 이 포탄은, 강철처럼 단련되어 산업 공정과 다를 바 없는 폭력성을 전달합니다.\n이 포탄은 불활성 표식을 살아 움직이는 불꽃 패턴으로 대체하고, 극한의 열적 부하를 발사체에 집중시킵니다.\n이는 포탄 발사체를 재, 파편, 진공 노출 환경이더라도 일관성있게 뜨겁게 타오르게 하며, 이는 기존 탄약을 사용하기 어려운 적대적 환경에서도 적합하게 합니다.\n불카누스 금속공학과 용암 주조 기술로 탄생한 이 탄약은 행성의 단순한 진리를 반영합니다:\n불길 속에서 살아남았다면, 그것은 발사되도록 운명지어졌다는 것이다.
ei-shotgun-turret=경고하지 않고, 빗나가지 않으며, 망설임 없는 근접 억제력. 사거리에 도달한 것들은 이미 큰 실수를 저지른 것입니다.
ei-steampunk-lamp=[color=green]등유[/color][fluid=ei-kerosene]를 연소시켜 [color=orange]따뜻하고[/color] 깜빡이는 빛을 방출합니다.\n연료를 지속적으로 소모합니다.
ei-auto-shotgun-turret=장거리 사격 목적으로 제작된, 모터 구동식 소형 이중 포탑입니다. 빠른 속도로 산탄총 탄환을 쏟아내며, 그 화력으로 통로와 병목 지점을 뒤덮어 돌진해오는 적들을 고철로 만들어버립니다. 신속한 목표 전환, 정밀한 추적, 강력한 반동 보정 기능에는 [color=cyan]전력[/color]이 필요하지만, 그 결과 감히 접근하는 적에게 가차없는 파괴의 폭풍우를 퍼붓습니다.
ei-gatling-turret=소모전을 찬양하는 회전곡. 그것은 발사하는 대신 선언합니다: 아무도 통과할 수 없다. 포신은 회전하고 공기는 황동빛이 되며, 땅은 충격으로 이루어진 새로운 언어를 배운다. 끊임없이 십일조를 공급하는 대가로, 이 무기는 전선을 지킨다.\n이것은 단순히 “공급"하는 무기가 아니다.\n이것은 십일조를 바쳐야 하는 무기다.\n\n작동에 [color=cyan]전력[/color]이 필요합니다
eir-atomic-bomb=Grants the 우라늄-235 fissile endpoint. The line stops being munitions work and becomes permission.
dw-deer-tech=Adapts modular rockets to a fixed firing rack. Siege payloads become artillery doctrine, and 상자s become sacrificial logistics.
ei_em-trains=EM Trains are a new transport paradigm based on a crystal grid infrastructure. [item=ei_charger] [color=orange]Chargers[/color] establish a field mesh that synchronizes EM rolling stock and delivers motive power through the rail path. This architecture supports both surface and space-capable corridors, with the potential for significant speed and acceleration bonuses through research. Without coherent field coverage, propulsion fails.
ei-advanced-rocket-fuel=Refines the propellant discipline behind the heavy line. High-energy motors burn harder and fly flatter.
ei-auric-precipitation=Unlocks the Vulcanus auric fumarole chain. Tungsten carbide is shaped into a sacrificial carbide precipitation core, steam is used to wake the vent, and auric vapor is condensed into heat and gold-bearing slag. Strong yield, dangerous ground, finite windows.
ei-bio-oil=Pentapod eggs are dumped into the jelly alive—then the real horror starts: they feed. The jelly thins as it’s consumed, tugged into the eggs in slow, hungry pulses, until the vat turns into a trembling slurry. As the brood metabolizes, it sweats out a yellow-blue, iridescent oil—a slick byproduct that rises to the surface in shimmering sheets. Skim the 유충 점액 off fast, before the eggs drink it back.
ei-bridge-coupling-1=The bridge into the vanilla tesla family is deliberately restrained. Bridge coupling I raises late damage and control inheritance for teslagun, tesla ammo, and the Replica Fulgoran coil without simply turning them into disguised TL towers.
ei-bridge-coupling-2=The bridge line ends with turret favoritism on purpose. Bridge coupling II lets the Replica Fulgoran coil inherit the denser late aftershock language while handheld tesla gear stays lighter and more portable.
ei-carbon-fiber=Molten Carbon Symbiote is driven under superheated steam, then seeded with a biter egg to force the growth into a living lattice. Yumako mash—already saturated with naturally formed carbon nanotubes—gets injected as the scaffold. The symbiote binds to the nanotube mesh, digests the organics, and extrudes a tight black weave that’s flash-cured into carbon fiber: light, brutal, and unnervingly coherent.
ei-carbon-fiber-from-bio-oil=A harsher, higher-yield carbon fiber run: 유충 점액 and nitric acid are driven through yumako mash to strip organics and expose its nanotube scaffold. Carbon is added as seed grit, while bioflux forces the slurry into rapid polymerization—spitting out a thicker, tighter carbon-fiber weave. The process leaves behind acidic water and dirty runoff, with occasional ash precipitating out as the mash burns down under the acid.
ei-corrosive-rocketry=Binds 유충 점액, nitric acid, and high-energy propulsion into rockets that keep eating after impact.
ei-cryo-rocketry=Turns cryodust and advanced cold handling into a shared control branch for hand launchers and artillery racks.
ei-dielectric-rupture-1=Advanced coils are not meant to suppress a whole front. They are meant to kill, then let the remaining charge hunt for the next victim. 유전체 파열 I sharpens that doctrine by preserving more useful energy in the first aftershock.
ei-dielectric-rupture-2=유전체 파열 II keeps the aftershock chain alive for longer and makes the discharge more willing to ignite what it touches. The advanced coil remains the execution pylon, not a copy of the basic tower, but it now carries its violence farther down the line.
ei-dielectric-rupture-3=The late advanced coil becomes a true kill-chain weapon. 유전체 파열 III pushes heavier reach, stronger retained arcs, and a harsher combustion profile so each confirmed kill can unravel a tightly packed attack wave.
ei-exotic-waveform-convergence=At the end of the doctrine, the Legacy towers stop borrowing modern chain language and finally earn modern primary beams of their own. The basic coil becomes a branching field-arc tower and gains a guaranteed side-branch burst on clean hits. The advanced coil becomes a focused overcharge-lance pylon and turns each kill confirmation into a guaranteed exotic execution storm layered on top of its normal aftershock logic. The tesla tank joins only partially: its impacts gain adjacent discharge modernization, and positive volatility spikes can kick off a stormfront burst without flattening the vehicle into another tower. The Replica Fulgoran coil also receives a turret-only exotic aftershock bloom on confirmed kills, while handheld bridge gear does not.
ei-fluoride-uranium-reprocessing=Unlocks a cleaner, more efficient fluoride uranium reprocessing route.
ei-fueler=The Fuelwarden tower works in two modes. Vehicle mode services trains, cars, tanks, spidertrons, ammo turrets, artillery turrets, and artillery wagons. Equipment mode fuels burner equipment in vehicle and player equipment grids, including burner-backed reactor equipment. Use the GUI on the tower to choose the target type and whether the tower is feeding vehicle fuel inventories or burner-backed equipment in equipment grids. If there is room, the tower also pulls used-up fuel back into its own inventory.
ei-gate=A gate shell forged from alien remnants and anchored through impossible geometry.\nIt links to a receiver ID instead of a raw position.\nIts upkeep is not constant: when armed, it draws power to hold alignment, and when stressed, it draws more.\nOnly non-living matter may pass through.\nThis is not a portal. It is a machine that remembers where it tears.
ei-gate-circuit-interface=Hidden signal surface for the gate's circuit control and telemetry.\nUse it for wiring when the gate's built-in connector is obstructed.\nIt mirrors the gate's active, energy, and stress outputs and accepts destination and enable signals.
ei-gate-container=Hidden source-side housing for the gate inventory and control logic.\nIt only accepts items while the gate is armed and above the low-power floor.\nThe destination is chosen by receiver ID.
ei-gate-receiver=A tuned receiving anchor for gate traffic.\nEach receiver claims a force-local ID, and compatible gates can target that ID directly.\nA circuit signal can override the automatic ID.\nThis is the destination side of the gate system.
ei-plutonium-warheads=Extends the atomic branch into plutonium assemblies. Greater breach, worse silence afterward.
ei-reactance-overdrive-1=Twin advanced coils mounted to a tank hull were never going to stay polite. Reactance overdrive I widens the volatility envelope and increases the number of saturation arcs the tank can sustain without changing it into another fixed tower.
ei-reactance-overdrive-2=Fusion-era coil handling lets the tesla tank ride longer overdraw windows. Reactance overdrive II leans further into stormfront behavior: stronger modulation swings, more spill, and more pressure at the edge of the blast lane.
ei-reactance-overdrive-3=This is the tank's final specialized state. Reactance overdrive III keeps the vehicle mechanically distinct from the towers, but makes it feel like a mobile electrical front rather than a gun platform with decorative lightning.
ei-storm-lattice-1=The basic coil stops being "just the first tesla tower" and becomes a real control doctrine. Storm lattice I improves target handoff and broadens the propagated arc web so swarms stay trapped in the field instead of leaking through the edges.
ei-storm-lattice-2=The lattice is no longer a lucky scatter of arcs. Storm lattice II holds the branching network together under heavier pressure and lets the basic coil keep passing charge across a wider, denser enemy front.
ei-storm-lattice-3=This is the end state of the basic-coil control lane. Storm lattice III pushes the branching field-arc tower into late-game crowd suppression: more jumps, longer reach, and a more deliberate "storm curtain" identity that still remains lighter and broader than the advanced coil.
ei-sulfuric-uranium-reprocessing=Unlocks an early sulfuric uranium reprocessing route and the purifier step needed to clean irradiated coolant.
ei-waveform-harmonics-1=Tunes the first shared discharge profile between Legacy coils and the bridged tesla family. The primary TL look remains legacy for now, but the line starts speaking one electrical dialect: better impact feedback, cleaner bridge semantics, and the first direct crossover into teslagun, tesla ammo, and the Replica Fulgoran coil.
ei-waveform-harmonics-2=Extends that shared waveform into modern chained follow-up families. Basic coils gain harmonized field-arc propagation, advanced coils begin using modernized aftershock families, and the bridged tesla family can now throw proper chained bursts instead of living entirely outside the Legacy ladder.
ei-waveform-harmonics-3=Finishes the harmonics spine. Follow-up arcs adopt full Space Age chain language, the bridged turret receives the heavier late turret-side chain payoff, and the Legacy branch is finally ready for true doctrine specialization instead of only raw stat ladders.
eir-explosive-rocketry=Teaches the line to breach instead of merely arrive. Explosive 탄두s turn impact into geometry.
eir-rocketry=Unlocks the modular rocket line: airframes, basic motors, impact 탄두s, and the plain answer called rocket.
tl-advanced-tesla-coils-technology=조금 더 개선된 테슬라 코일입니다. Its reach is larger and its damage output is extremely high. It has extensive steel plating for increased survivability.
tl-basic-tesla-coils-technology=주변 적에게 고전류 방전을 가하도록 개조된 전기 공진식 변압기입니다. It has relatively low damage output, but it can affect multiple targets at once.
tl-flames-count-technology=When dry ground and dust particles ignite due to high levels of electric current, the result is a surprisingly violent burning reaction. The flames last only a few seconds, but they generate dangerous levels of heat and burn everything to a crisp.\n\nEach level of 'Flash Fire' increases the number of flames generated and their damage per second.
tl-flames-explosion-technology=So much energy is channeled through 테슬라 코일 bolts that they can ignite the very air. The short-lived chain reaction takes the form of a violent fiery blast.\n\nEach level of 'Eruption' increases the explosion's area of effect.\n\nDamage: 60% of turret damage.
tl-flames-probability-technology=Extreme levels of concentrated energy can ignite vegetation on the ground, dust particles, or even the air itself.\n\nEach level of 'Combustion' increases the chance of igniting the 테슬라 코일's target and its immediate surroundings.
tl-multi-zap-damage-technology=Fine-tuning the wavelength of the emitted concentrated energy allows more stable and more damaging lightning arcs to form when the charge propagates in the static field.\n\nEach level of 'Lightning' increases the damage of propagating charges.
tl-multi-zap-probability-technology=Constant use of the 테슬라 코일 fills its surroundings with ionized particles. These particles allow the channeled charge to travel past its original target and jump to nearby objects.\n\nEach level of 'Static Field' increases the chance of charges propagating to each nearby enemy.
tl-multi-zap-range-technology=Higher currents in the coils increase the number of ionized particles in the surrounding static field. This makes it easier for the charge to pass through air and reach more distant targets.\n\nEach level of 'Ionization' increases the effective range of charge propagation.
tl-single-zap-count-technology=When a creature is struck by the 고급 테슬라 코일 it can absorb a large amount of static energy. That overload can destroy the host violently. If part of the charge remains after the host is destroyed, it lashes out toward nearby resistance. This phenomenon is called a discharge bolt.\n\nEach level of 'Discharge' increases the number of discharge bolts released when an enemy is killed by the turret.
tl-single-zap-damage-technology=When electric charge remains after the destruction of a target, it becomes a discharge bolt. That bolt carries only part of the initial charge, but the remaining energy can be amplified by fine-tuning the overall resonance level of the 테슬라 코일.\n\nEach level of 'Heavy Lightning' increases the damage done by discharge bolts.
tl-single-zap-probability-technology=고급 테슬라 코일 conduct an unbelievable amount of electric energy. If the target cannot contain that current, it overflows through ionized air molecules as individual lightning arcs that shock nearby entities.\n\nEach level of 'Overcharge' increases the probability of extra lightning arcs forming whenever the 고급 테슬라 코일 kills an enemy.
tl-slowdown-duration-technology=Higher energy currents deliver stronger effects that linger in the target entity for longer.\n\nEach level of 'Persistence' increases the duration of 'Electroshock' effects.
tl-slowdown-multiplier-technology=Specific energy levels combined with high frequencies can cause muscle spasms that seriously hinder movement.\n\nEach level of 'Stun' increases the strength of 'Electroshock' and slows movement further.
tl-slowdown-probability-technology=Direct contact with electric currents can cause physiological and neurological side effects such as muscle spasms and paralysis.\n\nHigher levels of 'Electroshock' make those side effects more likely to manifest with each attack.
tl-tesla-ammo-upgrade-technology=Advances in 휴대용 테슬라 코일 technology revealed design deficiencies in the base 테슬라 코일 structure. Eliminating those weaknesses yields more efficient 테슬라 코일 with broader overall capability improvements.
tl-tesla-coil-damage-technology=The effective damage of a 테슬라 코일's lightning arc can be increased by installing stronger capacitors and introducing a slight oscillation in the current frequency.
tl-tesla-coil-shooting-speed=Recent improvements in battery efficiency can be applied to 테슬라 코일 designs so they reach critical capacity faster, effectively improving their rate of fire.
tl-tesla-tank-technology=A deadly tank variant equipped with 2 medium-sized 고급 테슬라 코일. Single-use 휴대용 테슬라 코일 provide the energy surge needed to trigger the firing mechanism. The installed coils fire simultaneously, but instead of interfering they synergize, producing lightning arcs that bypass most matter and damage everything in their path.
tl-volatility-modulation-technology=Ionization is a common technique for increasing the effectiveness of electric-current-based military systems. When the twin coils are ionized using alternating frequencies, a synergistic pattern emerges in the energy profile. This effect, called bionization, greatly expands the volatility envelope of the affected current.\n\nEach level of 'Bionization' lowers the potential minimum damage while greatly increasing the potential maximum damage.
tl-volatility-probability-technology=The volatile nature of the twin-coil current is maximized with an integrated amplitude adjuster. In practice, the generated lightning bolts gain enough energy to completely disintegrate all creatures smaller than a medium-sized apartment.\n\nEach level of 'Vaporization' increases the chance of instantly killing the target. Targets with more than 5000 health are seriously injured instead of killed.
ei-arc-magazines=Rebuilds the exotic magazine as an overcharge cage. The shot does not merely hit. It locks the target inside the arc.
ei-auric-marsh-inoculation=Unlocks Gleba's auric inoculation vats, basin cycling, cyst blooms, and washing chain. Claim a valid marsh basin, feed the cycle reagents, and keep contamination from collapsing the bloom.
ei-corrosive-magazines=Teaches the exotic line to carry nitric corrosion as a second wound. The hit opens; the chemistry keeps arguing.
ei-cryo-magazines=Seals cryodust into control magazines that steal speed before they bother with death.
ei-emerald-aegis-covenant-1=Turns shield pain into a hostile-only emerald reprisal bloom.
ei-emerald-aegis-covenant-2=Deepens the aegis covenant, striking farther and harder when the membrane is wounded.
ei-emerald-apocalypse-hover-tank=Awakens the 에메랄드 아포칼립스 호버 탱크: a floating siege engine whose fixed crystal cannon turns forward motion into doctrine and doctrine into ruin.
ei-emerald-apocalypse-recursion=Unseals per-tank doctrine controls for dangerous charge reclamation, wake scars, split beams, and impact excess.
ei-emerald-charge-catechism-1=Teaches the barrel to pray faster, cutting the apocalypse wind-up to 8.5 seconds.
ei-emerald-charge-catechism-2=Compresses the emerald syllables again, cutting the wind-up to 7.58 seconds.
ei-emerald-charge-catechism-3=Seals the catechism at its fiercest cadence: 6.67 seconds before release.
ei-emerald-collapse-mandate-1=Raises the endpoint collapse pressure while keeping the scar bounded.
ei-emerald-collapse-mandate-2=Orders the shockwave to carry more plasma through the same 52-tile sentence.
ei-emerald-collapse-mandate-3=Completes the mandate: the endpoint remains bounded, but the verdict grows brutal.
ei-emerald-inertial-oath-1=Lets the hull recover from recoil sooner, lowering post-fire cooldown to 13.17 seconds.
ei-emerald-inertial-oath-2=Hardens the recoil oath until the post-fire seal falls at 11.33 seconds.
ei-emerald-reload-litany-1=Shortens orbital shard reload doctrine to 0.92 seconds per shard.
ei-emerald-reload-litany-2=Repeats the litany until the shard ring reforms every 0.75 seconds.
ei-emerald-reload-litany-3=Seals the reload cadence at 0.58 seconds: less waiting, more judgment.
ei-emerald-shard-manifold-1=Raises the Emerald Apocalypse's orbital shard doctrine to four active shards.
ei-emerald-shard-manifold-2=Braids a second reinforcement into the shard manifold, raising the doctrine to five active shards.
ei-emerald-shard-manifold-3=Completes the manifold oath, allowing six active shards to answer the tank at once.
ei-emerald-target-verdict=Allows orbital shards to prefer spawners, turrets, nearby enemies, and already-wounded targets instead of wasting verdicts on lesser threats.
ei-emerald-vector-keel-1=Tunes the hover keel for stronger command without losing the tank's heavy skid.
ei-emerald-vector-keel-2=Refines the vector keel again, improving reverse, brake, and drift authority.
ei-emerald-verdict-aperture-1=Opens the first wider emerald aperture around shard strikes, adding capped secondary damage.
ei-emerald-verdict-aperture-2=Expands shard impact apertures into a broader area sentence.
ei-emerald-verdict-aperture-3=Lets shard verdicts arrive as an emerald wound wide enough to punish clustered enemies.
ei-exotic-magazines=Separates the exotic line from the old ballistic ladder. Body, driver, core, then payload. The magazine becomes doctrine.
ei-gaian-saucer=Unlocks the 슬립웨이크 비행접시: a Gaian hover vessel whose cargo hold, equipment lattice, and chromatic wake make motion feel like an oath remembered by the ground.
ei-hexafluoride-magazines=Pairs uranium hexafluoride chemistry with penetrators that keep punishing after entry.
ei-morphium-magazines=Loads concentrated morphium into the line and turns ballistic impact into contamination, delay, and signal.
ei-neutron-magazines=Requires charged neutron containers and teaches ammunition to leave radiation as the second injury.
ei-oxyfluoride-magazines=Puts oxygen difluoride into a format bold enough to chamber. White flash first. Regret after.
ei-sawblade-turret=Unlocks the 맹세파기자의 톱, a steel melee turret that spends electricity to carve anything that reaches the wall.
ei-singularity-lance=Awakens an alien-age weapon that turns stored crystal charge into a chromatic singularity ray.
ei-adaptive-surveyor=Uses superior data, odd plating, and adaptive chambering doctrine to convert the Surveyor line into a quantum long-range execution system.
ei-burner-offshore-pump=Burn fuel at the shoreline to drive full-rate water extraction.
ei-hemocrystal-wall=Unlocks the Hemocrystal bulwark wall, a clean-plating lattice that knits shallow wounds shut while the red crystal inside keeps praying pressure into closure.
ei-incinerator=Authorizes destroyer-derived Incinerators: five fast escorts that follow, burn, and refuse the mercy of fire.
ei-inferno-grenade=Authorizes cluster grenades rebuilt as simulated-fire area-denial charges: the shell ruptures, fragments fall, and every impact writes another ring of fire.
ei-sanguine-wall=Unlocks the Sanguine carapace wall, an odd-plated bulkhead where black chitin, crimson resin, and crystalline ligament are forced to remember one defensive shape.
ei-steam-offshore-pump=Use live steam to drive a full-rate offshore pump.
ei-surveyor-cannon=Turns the Surveyor line into an automatic anti-materiel weapon braced by simulation data and carbon-fiber plate. The weapon keeps firing, but each shot still belongs to the sight.
ei-surveyor-carbine=Adds glass, pressure, and iron correction to the old machine gun frame. The result is not faster. It is farther.
ei-surveyor-rifle=Stabilizes the Surveyor pattern with electric drive recovery and better optics, extending the long-shot doctrine into the Electricity Age.
eir-military-5=시뮬레이션된 살상 교리를 공식화하여, 예측형 올가미 지뢰, 돌파용 폭약, 지옥불 탄약, 그리고 로봇 화력의 단계적 증폭을 하나의 승인된 지휘 체계 하에 통합합니다.

[tile-name]
ei-gaia-grass-1=가이아 잔디
ei-gaia-grass-1-var=가이아 잔디 변형
