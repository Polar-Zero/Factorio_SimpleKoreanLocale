[map-gen-preset-description]
eir-ei-default=엑조틱 [color=#08457E]우주[/color] 산업: [color=#FF1493]리멤브랜스[/color]를 플레이하는 추천 방법. 여정은 모든 핵심 자원과 초기 인프라가 있는 나우비스에서 시작됩니다.\n여기는 비록상처투성이지만, 친숙하며 제한적인 요람입니다.\n초기 시대 진행시 나우비스 적의 위협이 완화됩니다. 시작 지역이 더 넓고, 초기 진화 속도 역시 더 느리지만, 이러한 유예는 초기 전기 시대를 거쳐 컴퓨터 시대에 이르게 되면서 끝나게 됩니다.\n게임 후반의 재료와 고급 시스템은 나중에 진행을 통해 잠금 해제되는 별도의 표면에서 기다리고 있습니다.\n결국 당신이 아는 세계를 떠나게 될 것입니다.\n[font=default-bold]그리고 계속 돌아오지 않을 것입니다.[/font]

