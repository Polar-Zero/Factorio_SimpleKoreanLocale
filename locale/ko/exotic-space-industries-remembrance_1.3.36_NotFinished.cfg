induction-matrix=유도 매트릭스
induction-matrix-2=유도 매트릭스 부품
induction-matrix-2-text=유도 매트릭스는 고전압 에너지의 저장 및 전달에 사용되는, 특정 역할을 하는 여러 건물들이 상호 연결되어 구성된 모듈형 에너지 저장 구조물입니다.\n\n[color=orange]유도 매트릭스 코어[/color] [item=ei-induction-matrix-core]는 시스템의 중앙 제어 장치로서 기능합니다. 매트릭스를 활성화하려면 이 코어가 반드시 필요합니다.\n\n[color=orange]유도 코일[/color][item=ei-induction-matrix-basic-coil][item=ei-induction-matrix-advanced-coil][item=ei-induction-matrix-superior-coil]는 [font=default-bold]축전지처럼 에너지를 저장[/font]하며, 3단계로 업그레이드 가능합니다. 코일은 [color=orange]매트릭스 솔레노이드[/color] [item=ei-induction-matrix-basic-solenoid]와 인접하게 배치하면 효율 보너스를 얻습니다. [item=ei-induction-matrix-basic-solenoid].\n\n[color=orange]매트릭스 솔레노이드[/color]는 순차적으로 배치하면 코일 효율이 향상됩니다. 여러 솔레노이드를 직렬로 배치하면 [font=default-bold]효과가 증가하지만[/font], 과도한 건설은 수익 감소와 공간 낭비를 초래할 것입니다.\n\n[color=orange]변환기[/color][item=ei-induction-matrix-basic-converter][item=ei-induction-matrix-advanced-converter][item=ei-induction-matrix-superior-converter] 구성 요소는 매트릭스로 흐르는 전력량을 조절하며, 단계에 따라 처리량이 증폭됩니다..
induction-matrix-text=[color=orange]유도 매트릭스[/color]는 대량의 에너지를 저장하는 데 사용할 수 있는 복합 기계입니다. 일반 축전지와 마찬가지로 오버헤드 전력을 저장했다가 나중에 방출하는 데 사용할 수 있습니다. 해당 기술을 연구하여 다양한 계층의 매트릭스 크기를 잠금 해제할 수 있습니다.
knowledge-text=유물을 남긴 고대 문명은 데이터도 일부 남겼습니다.
loaders=적재기
loaders-2=적재기 잔적
loaders-3=적재기 선별
loaders-4=Snapping and placement
loaders-5=Power appetite
loaders-text=Exotic Industry 모드의 적재기는 물류 네트워크에 직접적으로 공급할 수 있는 분기를 구성합니다: [item=ei-steam-loader]증기 적재기, [item=ei-loader]적재기, [item=ei-fast-loader] 빠른 적재기, [아이템=ei-express-loader]고속 적재기, [아이템=ei-turbo-loader]터보 적재기, 그리고 [item=ei-neo-loader]네오 적재기가 있습니다. 증기 적재기는 직접 공급받은 증기 유체를 이용해 물류 라인을 시작하며, 표준적인 전기 적재기는 이러한 구성을 더욱 자동화시킬 수 있도록 이동시킵니다. 이후의 모든 단계는 벨트 처리량에 맞도록 처리량을 증가시키며, 더 강력한 처리량을 위해 압력을 희생한 뒤, 전력 효율을 희생합니다.\n\n이들은 아이템을 공중으로 던지지 않습니다. 대신 물류적인 흐름을 기계, 상자, 화물차, 그리고 화물차 등에 직접 연결합니다.\n\n투입기가 잡고 옮기는 시간이 불만이였다면, 적재기가 곧 답입니다.
loaders-text-2=[item=ei-steam-loader]증기, [item=ei-loader]표준, [item=ei-fast-loader]빠른 적재기는 잔적 기능을 지원하지 않습니다. [item=ei-express-loader]고속 적재기는 한 번에 최대 [font=default-bold]2[/font]층까지 잔적된 아이템을 옮길 수 있으며, 이 수치는 조정할 수 있습니다. [item=ei-turbo-loader]터보 적재기는 한 번에 최대 [font=default-bold]2[/font]층까지 잔적된 아이템을 옮길 수 있습니다. [item=ei-neo-loader]네오 적재기는 게임의 벨트 잔적 제한까지 옮길 수 있으며, 과도한 적재보다 정밀도가 더 중요한 경우 이러한 제한을 조정하는 것도 가능합니다.\n\n이는 고급 적재기가 단순히 더 빠르기만 한 것이 아니라는 것을 의미하며, 이들은 동일한 면적 내에서 더 밀집된 물류 처리를 가능하게 합니다.
loaders-text-3=[item=ei-steam-loader]증기, [item=ei-loader]표준, [item=ei-fast-loader]빠른 및 [item=ei-express-loader]고속 적재기는 두 벨트 레인 모두에 걸친 [font=default-bold]하나의 공유 필터[/font]를 사용합니다. [item=ei-turbo-loader]터보 및 [item=ei-neo-loader]네오 적재기는 벨트 양쪽을 각각 별도로 제어할 수 있는 [font=default-bold]두 개의 레인 필터[/font]를 사용할 수 있습니다.\n\n이 경우 하나의 적재기 본체로 어떤 물건이 통과할지 뿐만 아니라, 어느 줄로 보낼지도 결정할 수 있습니다.
loaders-text-4=Exotic Industry 모드 적재기는 배치될 때 자동으로 [font=default-bold]유효한 연결 지점을 향해 연결[/font]되며, 인근 벨트가 재배치될 경우 해당 연결을 재검토합니다. 적재기는 커서를 처음 설정한 방향을 무조건 따르기보다는 벨트, 상자, 화물차, 철도 옆 지점과의 실제 연결 상태를 확인합니다.\n\n실제로 화물차, 상자, 기계, 철도 옆에 배치된 적재기의 연결이 제대로 고정되도록 방향을 회전하거나 뒤집을 수 있습니다. 기계는 최초의 추측이 아닌 실제 연결 상태를 따릅니다.
loaders-text-5=[item=ei-steam-loader]증기 적재기가 작동하려면 유체 입력구로 공급되는 [font=default-bold]증기[/font]가 필요합니다. 전기로 작동하는 적재기는 [item=ei-loader]표준 적재기 부터입니다. 이동되는 모든 아이템은 내부 에너지 버퍼의 에너지를 소모하며, 고급 적재기일수록 내부 버퍼와 아이템 이동에 필요한 에너지량이 모두 증가합니다. 성능은 향상되지만, 비용은 절감되지 않습니다.\n\n전기 적재기는 저장된 전력이 있어, 일시적으로 전력이 부족하더라도 버틸 수 있지만, 안정적인 전력망이 뒷받침되지 않는다면 최대 처리량을 오랫동안 유지할 수는 없을 것입니다. 전력이 부족해지면 기계가 고장나기 전에 처리량이 먼저 줄어들고 맙니다.
