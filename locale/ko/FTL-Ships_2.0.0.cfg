[technology-description]
ftl_Auto_Assault_tech=직접적이고 가차없는 공격을 위해 설계된 중형 자동전함.
ftl_Auto_Scout_tech=가벼운 순찰 임무 및 조기 경보에 사용되는 소형 자율 드론.
ftl_Bomber_tech=방어력을 희생하는 대신 대량 수송에 초점을 맞춘 공격적인 함선.
ftl_Elite_tech=뛰어난 화력과 강화된 시스템을 갖춘 첨단 전투함.
ftl_Fed_Cruiser_tech=지속적인 전투와 전략적 우위를 위해 설계된 중무장 함선.
ftl_Fed_Scout_tech=빠른 속도와 고속 교전을 위해 제작된 고속 정찰선.
ftl_Fighter_tech=공중전에 이상적인 민첩성을 극대화한 근거리 전투함.
ftl_Flagship_tech=다양한 무기로 무장한 거대한 지휘선, 모든 함대의 중심 역할을 합니다.
ftl_Kestrel_tech=장거리 여행을 위한 균형 잡힌 공격과 방어를 갖춘 다목적 함선.
ftl_Rigger_tech=해적에 의해 주로 보조 역할로 자주 사용되는 즉석 또는 민간 지원 함선.
ftl_Stealth_tech=매복 및 직접 전투를 피하기 위해 제작된 경량 비무장 함선입니다.