science-tab=과학 팩을 위한 새로운 제작법 탭을 추가합니다. 기본적으로 나우비스와 다른 행성 과학 팩을 별도로 분리합니다. 다양한 모드를 지원합니다.\n\n번역: SimpleKoreanLocale(PolarZero)

