[mod-name]
Battleship=화물선 - 전함 & 순찰 보트(Cargo Ships: Battleships & Patrol Boats)

[mod-description]
Battleship=Cargo Ships 모드와 함께 동작하는 하위 모드입니다. 화물선에 포탑을 추가한 형태인 전함, 보트에 미사일 포탑을 추가한 형태인 순찰 보트를 게임에 추가합니다. 자체 그래픽 추가 예정.\n\n번역: SimpleKoreanLocale(PolarZero)


