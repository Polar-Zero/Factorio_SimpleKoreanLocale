[mod-setting-description]
battleship-ammo-refill-ticks=이 지도에서 전함 탄약을 화물로부터 재충전할 빈도(틱 단위)
battleship-debug=로그 파일에 추가적인 디버그 정보를 작성합니다.
battleship-debug-global=지도상의 모든 플레이어에 대한 디버그 출력을 활성화합니다.
battleship-escort-avoid-strength=뭉침 현상을 피하기 위해 사용할 분리 성향 강도를 조정합니다.
battleship-escort-min-separation-tiles=동일한 목표물을 따라갈 때 호위 순찰 보트 사이의 최소 간격을 설정합니다. (칸 단위)
battleship-escort-update-ticks=이 지도에서 호위 이동 및 분리가 업데이트되는 빈도를 조정합니다. (틱 단위)
battleship-force-sync-ticks=이 지도에 대한 강제 동기화 빈도를 조정합니다. (틱 단위)
battleship-patrol-follow-max-distance=순찰선이 경비 대상을 따라갈 때 유지하도록 선호할 최대 거리를 조정합니다. (칸 단위)
battleship-patrol-follow-min-distance=순찰선이 경비 대상을 따라갈 때 유지하도록 선호할 최소 거리를 조정합니다. (칸 단위)
battleship-patrol-follow-step=순찰선이 경비 대상과의 거리를 조정할 속도를 조정합니다.
battleship-radar-chart-ticks=이 지도에서 레이더 차트 업데이트를 실행할 빈도를 조정합니다. (틱 단위)
battleship-radar-min-move-for-rechart=레이더가 새 차트 업데이트를 진행하기 전 움직여야 할 거리를 조정합니다. (칸 단위)
battleship-radar-range=전함 주변에 지도를 밝힐 범위를 조정합니다. (칸 단위)
battleship-speed-multiplier=전함의 최대 속도에 적용되는 배율 값입니다.
patrol-boat-ammo-refill-ticks=이 지도에서 순찰 보트 탄약을 화물로부터 재충전할 빈도(틱 단위)
patrol-boat-missile-range-multiplier=순찰정 미사일 포탑 사거리에 적용할 배율 값입니다.
patrol-boat-radar-range=순찰선에 지도를 밝힐 범위를 조정합니다. (칸 단위)
patrol-boat-speed-multiplier=순찰정 최대 속도에 적용되는 배율 값입니다.