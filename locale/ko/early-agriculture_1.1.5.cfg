[mod-setting-description]
early-agriculture-buff-tree-plant=심은 나무가 두 배 빠르게 성장하고 5배 더 많은 목재를 생산하도록 버프합니다.
early-agriculture-chop-pollution=나무를 벌목할 때 공해가 발생하도록 하여, 임업을 조금 더 복잡하게 만듭니다.
early-agriculture-trex=활성화하면, 기본 농업용 탑의 팔을 더 짧게 만들고, 1칸 반경에서만 재배할 수 있도록 너프합니다. (활성화를 추천하지 않음)