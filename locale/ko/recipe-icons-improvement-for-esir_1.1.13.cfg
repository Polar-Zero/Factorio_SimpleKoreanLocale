[mod-setting-description]
icon-visibility-esir-add-isotope-overlay=두 가지 모드 중 선택할 수 있습니다. 하나는 아이템/제작법 아이콘 우측 상단에 텍스트 오버레이를 추가합니다. (예: 우라늄-235에 "235") 동위원소를 표시하기 위한 더미 제작법을 추가하는 옵션을 대신 사용할 수 있습니다. 이는 글로만으로는 설명이 어려우므로, 관심이 있는 경우 직접 활성화한 뒤 제작법 목록을 확인해보세요.
icon-visibility-esir-enable-hiding=팩토리오백과와 플레이어 수동 제작 목록에서 지정된 아이템, 유체 및 해당 제작법을 숨깁니다. 이 구성은 자동화된 시설(예: 조립 기계)의 제작법 목록에 영향을 미치지 않습니다.
icon-visibility-esir-enable-purging=기본 제작법은 "전자 회로(제작법/아이템)"와 같이 팩토리오백과에서 아이템과 제작법이 동일한 페이지를 공유하는 경우를 나타냅니다. 이 옵션은 팩토리오백과를 아이템 백과가 아닌 레시피북으로 사용하려는 경우 유용합니다.
icon-visibility-esir-hide-signals=아이템과 같은 아이콘을 가진 제작법 신호를 숨깁니다. 이 옵션은 "[color=orange]아이콘[/color]" 옵션이 하나라도 비활성화되지 [color=red]않은[/color] 상태여야 (전부 활성화된 상태여야) 작동합니다.
icon-visibility-esir-merge-recipe-in-factoriopedia=[color=red]아직 구현되지 않음[/color]
icon-visibility-esir-replace-facilities-icons=비활성화하면, 이 모드에서 다른 옵션에 관계없이 시설 아이콘을 변경하지 않습니다.
icon-visibility-esir-replace-items-icons=비활성화하면, 이 모드에서 다른 옵션에 관계없이 시설 아이콘을 변경하지 않습니다.
icon-visibility-esir-replace-weapons-icons=비활성화하면, 이 모드에서 다른 옵션에 관계없이 시설 아이콘을 변경하지 않습니다.
icon-visibility-esir-skip-existence-verification=[color=red]활성화 권장되지 않음[/color] 개발자 디버깅 목적으로만 사용하세요.
icon-visibility-footnote=\n\n* 모드 설정에서 각 단어의 의미는 다음과 같습니다.\n- [color=cyan]시설[/color]은 투입기, 용광로, 기차 등 건설 가능한 구조물을 의미합니다. 단, 전투와 관련된 경우 제외됩니다.\n- [color=cyan]아이템[/color]은 시설, 무기, 적을 제외한 모든 객체를 의미합니다. 여기에는 유체, 자원 패치 등이 포함됩니다.\n- [color=cyan]무기[/color]는 전투 목적으로 사용되는 모든 아이템과 시설, 그리고 적을 의미합니다. 예를 들어 총, 탄약, 포탑, 벽, 바이터 등이 포함됩니다.