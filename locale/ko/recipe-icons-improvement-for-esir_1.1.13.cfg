[mod-name]
recipe-icons-improvement-for-esir=엑조틱 우주 산업: 리멤브랜스 - 제작법 아이콘 개선(Recipe Icons Improvement for Exotic Space Industries Remembrance)

[mod-description]
recipe-icons-improvement-for-esir=제작법/아이템/유체를 분류하고, 해당 아이콘들을 수정하여 더 쉽게 보거나 찾을 수 있도록 합니다.\n\n번역: SimpleKoreanLocale(PolarZero)


[item-group-name]
ivi-ei-metallurgy=채광 및 제련
ivi-ei-petro-and-chem=원유 정제 및 화학
ivi-exoplanets=농업 및 외계 행성

[ivi-esir]
dummy-recipe=더미 제작법

[string-mod-setting-description]
icon-visibility-esir-add-isotope-overlay-board-all=이 옵션은 "[color=green]분류[/color]: 대부분의 아이템과 유체를 분류" 옵션이 [color=red]활성화[/color]되어 있어야 작동합니다.
icon-visibility-esir-add-isotope-overlay-board-nuclear=이 옵션은 "[color=green]분류[/color]: 대부분의 아이템과 유체를 분류" 옵션이 [color=red]활성화[/color]되어 있어야 작동합니다.
icon-visibility-esir-add-isotope-overlay-both-all=Add both of the overlays and the dummy recipes. This may be untidy.
icon-visibility-esir-enable-hiding-extra="표준" 옵션 + 금속공학 제작법 + 하급 철 덩어리로 만드는 추진기 산화제, 우주 시대 DLC의 핵융합 관련 아이템/제작법을 추가로 숨깁니다.
icon-visibility-esir-enable-hiding-immoderate="더 많이" 옵션 + 기본 제작법이 존재하지 않는 모든 아이템과 유체를 추가로 숨깁니다. 기본 제작법은 팩토리오백과에서 아이템/유체와 페이지를 공유하는 제작법을 의미합니다.
icon-visibility-esir-enable-hiding-minimum=팩토리오백과에 포함할 필요가 없는 아이템/유체/제작법만 숨깁니다.
icon-visibility-esir-enable-hiding-standard="최소한" 옵션 + 구현되지 않은 아이템/유체/제작법 및 EIR에서 제거된 아이템을(예: 헬륨-3, 기본 게임 물류 상자) 숨깁니다.
icon-visibility-esir-enable-sorting-facilities-intensive=우주 시대나 엑조틱 우주 산업이 없는 비DLC 게임과 비슷하게, 건설 가능한 대부분의 시설을 물류 또는 생산 제작법 그룹에 지정합니다. 그러나 우주 또는 전투와 관련된 시설은 그대로 유지됩니다.
icon-visibility-esir-enable-sorting-facilities-separated=엑조틱 우주 산업에서 원자력 발전에 필요한 시설과 유사하게, 우주 시대 DLC 건물을 외계 행성 제작법 그룹에 지정합니다.
icon-visibility-esir-enable-sorting-items-full=모든 데이터 및 과학 팩의 제작법 그룹을 수정합니다. 예: 플라즈마 데이터를 가열된 수소 옆으로 이동합니다.
icon-visibility-esir-enable-sorting-items-non-data=모든 데이터 및 과학 팩의 아이템 그룹을 수정되지 않습니다.
icon-visibility-esir-enable-sorting-weapons-by-ammo=탄약 종류별로 정렬합니다. 순서: 탄환(탄창/포탑/총) -> 산탄총(포탄/총) -> 대포(포탄/포탑) -> ... -> 벽 -> 캡슐 -> 방어구 -> 장비
icon-visibility-esir-enable-sorting-weapons-handheld-first=기본 게임 순서와 비슷하게 정렬합니다. 휴대용 무기 -> 탄약 -> 캡슐 -> 방어구 -> 장비 -> 벽 -> 포탑
icon-visibility-esir-enable-sorting-weapons-turret-first=건설 가능한 구조물을 먼저 표시합니다. 포탑 -> 탄약 -> 벽 -> 휴대용 무기 -> 캡슐 -> 갑옷 -> 장비
icon-visibility-esir-replace-facilities-icons-minimum=다른 아이콘과 동일하거나 매우 비슷한 아이콘에 오버레이 표기를 추가해 더 쉽게 식별할 수 있도록 합니다.
icon-visibility-esir-replace-facilities-icons-standard=오버레이를 '최소'보다 많이 추가하여 더 쉽게 식별할 수 있도록 합니다.
icon-visibility-esir-replace-items-icons-full=일관성을 위해 '표준' 옵션보다 더 많은 아이콘을 교체하지만 더 보기 까다로울 수 있습니다.
icon-visibility-esir-replace-items-icons-minimum=다른 아이콘과 비슷해 보이는 아이콘만 교체하여 더 쉽게 식별할 수 있도록 합니다.
icon-visibility-esir-replace-items-icons-standard=아이콘을 다른 아이콘과 동일하거나 유사하게 해 더 쉽게 식별할 수 있도록 하고, 일부 아이콘을 일관성을 위해 대체합니다.

