[technology-description]
hephaestus-advanced-manufacturing=자동화의 한계를 뛰어넘어보세요.
hephaestus-advanced-purchasing=남는 자원을 다른 용도로 사용할 수 있도록 안정적인 토큰 형태로 변환해보세요.
hephaestus-basic-processing=회수한 미로 토큰을 분석한 뒤 핵심 건물 해금에 사용할 수 있도록 합니다.
hephaestus-efficiency-assembler-regulation=에너지 흐름을 최적화하고 전력 소비량과 환경적 영향을 대폭 줄일 수 있도록 합니다.
hephaestus-planetary-storage=행성 전역에 걸쳐 아이템을 전송할 수 있는 양자 연결 상자를 제작할 수 있습니다.
hephaestus-production-assembler-processing=조립 기계 내부에 통합된 회수 루프 시스템을 구축하여 전체적인 생산 효율을 최적화합니다.
hephaestus-quality-assembler-alignment=나노 단위의 정밀한 내부 최적화를 통해 아이템 품질 개선을 실현합니다.
hephaestus-requisition=보급기를 통해 아이템의 자동 교환을 가능하게 합니다.
hephaestus-speed-assembler-overclocking=극한의 기계 속도 구현을 위한 맞춤형 조립 기계 프레임 구성을 연구합니다.
hephaestus-warp-aperture-shortcut=항법 컴퓨터를 보정해 워프 지점을 활용하게 하여, 헤파이스토스까지의 고속 직항 경로를 사용할 수 있도록 합니다.
hephaestus-warp-drive=우주 플랫폼이 주변 시공간을 뚫고 지나가게 하여, 헤파이스토스에서 나우비스로 거의 즉각적으로 이동할 수 있도록 합니다.
planet-discovery-hephaestus=심우주 측정 데이터를 분석하여 헤파이스토스의 좌표를 정확히 파악한 뒤, 우주 플랫폼의 비행 경로를 계획하세요.

[mod-setting-name]
hephaestus-inverse-surcharge=토큰 변환 추가 비용 (%)

[mod-setting-description]
hephaestus-inverse-surcharge=원재료 아이템을 헤파이스토스 토큰으로 다시 변환하는 데 필요한 추가 재료 비용 비율을 조정할 수 있습니다. (기본값: 20%)