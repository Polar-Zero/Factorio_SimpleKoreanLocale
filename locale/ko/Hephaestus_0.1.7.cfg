[space-location-description]
hephaestus=버려진 고대 인공위성, 표면에는 많은 소행성 크레이터가 남아있으며, 곳곳의 미로 같은 통로에 고대의 보물들이 숨겨져 있습니다. 많은 고에너지 이상 현상이 관찰되었습니다.
hephaestus-warp-aperture=우주 플랫폼이 일반적인 우주를 우회하여 워프 이동할 수 있게 해주는 고정된 워프 지점입니다.

