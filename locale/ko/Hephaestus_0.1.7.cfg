[entity-description]
bruiser-hornet=단단한, 중장갑 무장을 갖춘 말벌입니다.
bruiser-hornet-asteroid=충격으로 파괴될 수 있는 파편으로 둘러싸인 말벌 포탄입니다.
efficiency-assembling-machine=친환경 전력 구성을 통해 에너지 소비와 공해 발생량을 20% 줄인 조립 기계입니다.
hephaestus-converter=원자재를 대규모로 분해하여, 헤파이스토스 토큰을 안정적으로 합성할 수 있는 첨단 시설입니다.
hephaestus-lubricant-leak=고대 고효율 윤활유가 대규모로 유출된 형태입니다.
hephaestus-planetary-chest=양자 연결된 금고 저장소. 표면(행성)마다 2개만 배치할 수 있습니다.
hephaestus-processor=다중우주 기술과 데이터 코어를 융합할 수 있는 고성능 어셈블리 매트릭스입니다.
hephaestus-requisitioner=토큰을 사용하여 상품을 대규모로 실체화할 수 있는 거대 모노리스.
hornet-nest=[color=cyan]건드리지 마시오.[/color]
production-assembling-machine=조립 기계에 복제 루프 구조를 통합하여, 이 기계에서의 아이템 생산이, 기본적으로 +20%의 추가 생산성 보너스를 받도록 허용합니다.
quality-assembling-machine=부착된 고급 정렬 시스템은, 이 기계에서의 아이템 제작이 기본적으로 +2%의 품질 보너스를 받도록 돕습니다.
speed-assembling-machine=오버클럭된 조립 기계, 기본 조립 속도가 +20% 향상되었습니다.
stinger-hornet=강한 부식성 원거리 공격을 할 수 있는 말벌입니다.

