[mod-name]
Hephaestus=헤파이스토스(Hephaestus)

[mod-description]
Hephaestus=이 버려진 거대 구조물의 표면에는 고대 소행성들이 흩어져 있습니다. 고대 기계들을 재가동하고 아이템 토큰 상호 교환을 활용하여, 헤파이스토스를 다시 가동시키고, 아이템을 운송하는 고급 방법 등의 강력한 기능을 해금하세요. 하지만 말벌들을 조심해야 할 것입니다.\n\n번역: SimpleKoreanLocale(PolarZero)

