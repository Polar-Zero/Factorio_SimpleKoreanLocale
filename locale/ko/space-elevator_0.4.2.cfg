space-elevator-material-cost-multiplier=모든 건설 재료 필요량에 이 설정값 배율을 곱합니다. 0.5 = 저렴하게, 2.0 = 비싸게__ITEM__skl-txtra0__1.0__ITEM__skl-txtre__
space-elevator-power-consumption=우주 엘리베이터의 기본 전력 소모량을 조정합니다. (MW 단위)__ITEM__skl-txtra0__10MW__ITEM__skl-txtre__
