[entity-description]
space-elevator=우주 플랫폼으로 화물을 빠르고 효율적으로 운송할 수 있도록 하는, 거대한 궤도 밧줄. 여러 건설 과정과 상당한 전력이 필요합니다.
space-elevator-chest=우주 엘리베이터 건축 자재의 내부 보관소입니다.
space-elevator-dock=행성 우주 엘리베이터에 연결할 수 있는 플랫폼 측면 도킹 스테이션입니다. 양방향 화물 운송 가능.
space-elevator-dock-fluid-tank=플랫폼 도킹 스테이션의 유체 저장 탱크. 우주 엘리베이터를 통해 유체 운송을 진행하려면 파이프에 연결하세요.
space-elevator-fluid-tank=우주 엘리베이터용 유체 저장소입니다. 엘리베이터 북쪽에 있으며 - 파이프를 연결하여 플랫폼으로 유체를 운송할 수 있습니다.

