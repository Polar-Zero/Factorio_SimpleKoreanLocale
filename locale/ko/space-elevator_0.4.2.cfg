[mod-name]
space-elevator=우주 엘리베이터(Space Elevator)

[mod-description]
space-elevator=행성에 우주 엘리베이터를 건설해, 우주 플랫폼으로 빠르고 효율적으로 아이템을 운반할 수 있도록 합니다. 로켓 발사를 대체할 수 있는 게임 후반 대안으로 사용 가능.\n\n번역: SimpleKoreanLocale(PolarZero)


