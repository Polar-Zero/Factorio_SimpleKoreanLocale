[mod-name]
Transport_Drones_Continued=운송 드론 - Continued(Transport drones (Continued))

[mod-description]
Transport_Drones_Continued=게임에 운송 드론과 운송 창고를 추가하는, Klonan의 Transport drones 모드 2.0 업데이트 버전입니다.


