dispatcher-depots-tab=파견 창고
dispatcher-desc=파란 슬롯에 드론을 넣으세요. 파견 창고에서 필요한 운송창고에 드론을 보내고 남은 경우 회수합니다. 빨간 슬롯은 귀환한 드론용이며 우선 배송됩니다.
