surface-dropdown-tooltip=표시할 행성 또는 표면을 선택
threshold-override-tooltip=회로 신호 [virtual-signal=signal-T]에 의해 재정의됨

[entity-description]
active-depot=인벤토리 내 아이템을 도로 네트워크의 요청 운송창고에 능동적으로 배송합니다. 제작법이 필요하지 않으며, 벨트나 투입기로 아이템을 넣기만 하면 됩니다.\n[font=default-bold]품질 보너스:[/font] 인벤토리: 80/100/125/175/250칸 / 드론 슬롯: 5/6/7/8/10
buffer-depot=요청 운송창고와 보급 운송창고의 역할을 겸합니다.\n[font=default-bold]품질 보너스:[/font] 드론 드론: 5/6/7/8/10
depot-drone-chest=이 창고에 운송 드론을 보관할 수 있습니다. 슬롯은 창고 품질에 따라 증가합니다. 물류 로봇 배송을 지원합니다.
fluid-depot=유체 내용물을 도로 네트워크에 공급합니다.
fuel-depot=도로 네트워크의 다른 창고에 연료를 배달합니다.\n[font=default-bold]품질 보너스:[/font] 드론 슬롯: 5/6/7/8/10
request-depot=도로 네트워크의 보급 운송창고에서 아이템을 수거하기 위해 드론을 파견합니다.\n[font=default-bold]품질 보너스:[/font] 드론 슬롯: 5/6/7/8/10
road-network-reader=도로 네트워크의 모든 보급 운송창고 내부에서 선택한 아이템 총 수량을 읽습니다. 여러 신호를 동시에 지원합니다.
road-network-reader-filtered=연결된 저장소 인벤토리를 제외한, 도로 네트워크의 총 공급량을 읽습니다. 공급 운송창고 또는 완충 운송창고 옆에 배치하세요. 회로 피드백 루프를 방지할 수 있습니다.
drone-dispatcher=Accepts 운송 드론s via inserters or bots. Connects to the road network for future drone distribution.\n[font=default-bold]품질 보너스:[/font] 인벤토리: 10/12/14/16/20칸
supply-depot=자신의 인벤토리를 도로 네트워크에 제공합니다.\n[font=default-bold]품질 보너스:[/font] 인벤토리: 80/100/125/175/250칸
supply-depot-chest=자신의 인벤토리를 도로 네트워크에 제공합니다. 선택적으로 물류 로봇이 아이템을 가져갈 수 있습니다 (수동 공급자).\n[font=default-bold]품질 보너스:[/font] 인벤토리: 80/100/125/175/250칸
transport-depot-writer=회로 또는 물류 조건을 이용해 연결된 창고를 제어합니다. 요청/완충 운송창고의 요청량을 재정의할 수도 있습니다. [virtual-signal=signal-P] 신호: 창고 우선순위를 재정의합니다. [virtual-signal=signal-T]: 공급 임계값을 재정의합니다.
transport-depot-reader=Outputs 운송창고 content or network supply as circuit signals. Use the GUI to switch between 운송창고 content, full network supply, or network supply excluding this 운송창고.
drone-dispatcher-chest=Accepts 운송 드론s via inserters or bots. Connects to the road network for future drone distribution.\n[font=default-bold]품질 보너스:[/font] 인벤토리: 10/12/14/16/20칸
storage-depot=Passive warehouse for the road network. Request 운송창고s pull items from it like a supply 운송창고. Active 운송창고s push overflow items into it.\n[font=default-bold]품질 보너스:[/font] 인벤토리: 80/100/125/175/250칸
storage-depot-chest=Passive warehouse for the road network. Request 운송창고s pull items from it like a supply 운송창고. Active 운송창고s push overflow items into it.\n[font=default-bold]품질 보너스:[/font] 인벤토리: 80/100/125/175/250칸

[item-description]
transport-drone=도로 네트워크에서 운송창고 간 아이템을 운송합니다.\n[font=default-bold]품질 보너스:[/font]\n 속도: +15% 고급, +30% 희귀, +50% 특급, +80% 전설.\n연료 소비량 감소: 10% 고급, 20% 희귀, 30% 특급, 45% 전설

[virtual-signal-name]
fuel-signal=연료

[mod-setting-name]
drone-fluid-capacity=운송 드론 유체 운송량
drone-pollution-per-second=초당 오염 생성량
enable-drone-dispatcher=드론 파견창고 활성화
fluid-depot-capacity=유체 운송창고 저장량
fuel-amount-per-drone=드론당 연료 소비량
fuel-consumption-per-meter=m당 연료 소비량
request-depot-fluid-capacity=요청 창고 유체 출력량

[mod-setting-description]
drone-pollution-per-second=각 활동 중인 드론이 초당 배출하는 오염량. 0으로 설정하면 드론 오염을 비활성화합니다.
enable-active-depot=활성화 시, 능동 운송창고 건물을 사용할 수 있습니다 (능동적 운송 연구로 해제). 비활성화하면 게임에서 능동 운송창고를 사용할 수 없게 됩니다. [재시작 필요]
enable-drone-dispatcher=활성화 시, 드론 파견창고 건물을 사용할 수 있습니다 (운송 시스템 연구로 해제). 비활성화하면 게임에서 파견창고를 사용할 수 없게 됩니다. [재시작 필요]
enable-multi-pipe=활성화 시, 다중 파이프 연결 기술이 사용 가능해지며, 유체 창고에 동/서 추가 파이프 연결이 해제됩니다. [재시작 필요]
enable-storage-depot=활성화 시, 저장 운송창고 건물을 사용할 수 있습니다 (능동 수송 연구로 해제). 비활성화하면 게임에서 저장 운송창고를 사용할 수 없게 됩니다. [재시작 필요]
fluid-depot-capacity=유체 운송창고의 최대 유체 저장량. 용량이 클수록 창고가 가득 차기 전에 더 많은 드론을 파견할 수 있습니다. 기본 게임 유체 탱크 저장량: 25,000. [재시작 필요]
fuel-amount-per-drone=드론 파견당 소비되는 연료량. 높은 값으로 설정할수록 드론의 운송당 연료 소비량이 증가합니다.
fuel-consumption-per-meter=운송 드론이 m당 소비하는 연료량. 0: 연료 소비 비활성화
fuel-fluid=운송 드론의 연료로 사용될 유체 유형. 모든 연료 운송창고에 이 유체를 공급해야 합니다.
request-depot-fluid-capacity=요청 창고의 유체 출력 버퍼 용량. 값이 클수록 연결된 파이프로의 유체 처리량이 증가합니다. 기본 게임 유체 탱크 저장량: 25,000. [재시작 필요]
transport-depot-update-interval=각 창고가 업데이트 로직을 실행하는 빈도(틱). 낮은 값 = 더 빠른 반응, UPS 성능 비용 증가. 기본값: 60틱 (1초).
transport-drone-load-balance-threshold=최고점와의 차이가 이 임계값 이내인 보급 운송창고는 동등하게 취급되며, 무작위로 선택됩니다. 인근 창고 간 부하를 분산할 수 있으며, 항상 최적의 창고를 선택하려면 0으로 설정하세요.
transport-drone-max-dispatches-per-tick=단일 창고가 한 업데이트 주기에 파견할 수 있는 최대 드론 수. 극단적인 상황에서 과도한 파견을 방지하는 안전 상한선입니다. 일반적인 게임 상황일 경우 자연적인 제한(드론 인벤토리, 연료)이 상한선보다 훨씬 먼저 파견이 중지될 것입니다. 창고당 수백 대의 드론이 있는 대규모 기지를 운영할 경우 값을 높이세요.
transport-drone-sound-volume=운송 드론 엔진 작동음 크기 (0 = 무음, 100 = 기본값).
transport-drones-diagonal-check=활성화하면 드론이 비도로 타일 사이의 대각선 모서리를 통과할 수 없습니다. 이를 통해 틈새로 통과하는 것을 방지할 수 있습니다. [재시작 필요]
transport-drones-space-platform-roads=우주 플랫폼 토대 위에 도로 타일을 배치할 수 있도록 허용합니다. 플랫폼 토대 위에 도로 배치가 필요하지 않을 경우 비활성화하세요. [재시작 필요]