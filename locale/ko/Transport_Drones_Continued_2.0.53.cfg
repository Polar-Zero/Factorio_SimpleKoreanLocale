storage-filter-tooltip=이 창고에서 사용할 아이템 또는 유체를 선택합니다. 선택한 유형만 저장할 수 있습니다. 능동 운송창고는 일치하는 아이템을 이 창고에 보냅니다.
storage-limit-label=최대 저장량:
