fluid-mode-confirm-message=창고에 아이템 또는 유체가 아직 남아 있으며, 모드 전환을 진행하면 전부 소실됩니다. 계속하시겠습니까?
full-stack-only-label=전체 묶음만
full-stack-only-tooltip=활성화하면, 드론은 보급 창고에서 꽉 찬 묶음 아이템만 수거하게 하여, 소량 배송이 많아지는 것을 방지할 수 있습니다.
