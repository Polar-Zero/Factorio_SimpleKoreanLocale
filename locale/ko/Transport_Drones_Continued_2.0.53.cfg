reader-mode-network-excl=네트워크 공급 (운송창고 제외)
reader-mode-tooltip=출력할 신호 내용을 선택하세요:\n- 운송창고 내용물: 이 운송창고에 보관된 아이템\n- 네트워크 공급: 모든 운송창고에서 사용 가능한 총량\n- 네트워크 공급 (운송창고 제외): 위와 동일하지만, 이 운송창고는 계산되지 않습니다.
reader-not-attached=운송창고와 연결된 상태가 아닙니다.\n화살표가 운송창고를 향하도록 배치해보세요.
