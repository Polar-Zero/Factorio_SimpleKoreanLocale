[mod-description]
NewGirlCharacter-port=이 모드는 여러분의 캐릭터를 여성 버전의 엔지니어, 기어 걸로 바꿔줍니다! 3단계의 갑옷과 사용자 정의 컬러 마스크를 모두 갖춘 완전한 애니메이션의 캐릭터를 포함합니다.\n\n이 모드는 캐릭터를 변경하는 다른 모드(도달 거리,손전등 등) 및 miniMAXIme과 같은 캐릭터 선택 모드와의 호환성을 높이기 위해 이전 Gear Girl 캐릭터 모드를 업데이트한 버전입니다.\n\n번역: SimpleKoreanLocale(PolarZero)
NewGirlCharacterHR='New Gear Girl Character' 모드에 고해상도 그래픽을 추가합니다. 이 모드는 그래픽 이외의 다른 요소를 추가하지 않습니다.
NewGirlCharacterHR-fork='New Gear Girl Character' 모드에 고해상도 그래픽을 추가합니다. 이 모드는 그래픽 이외의 다른 요소를 추가하지 않습니다.

