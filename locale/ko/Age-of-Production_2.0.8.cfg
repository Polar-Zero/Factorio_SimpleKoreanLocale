[recipe-description]
aop-paracelsian-air-scrubbing=바테라이트를 사용하여 파라켈신 대기 중 공해를 포착하세요.
aop-ammoniacal-copper-synthesis=아퀼로 암모니아 바다의 구리 입자를 탄소 조각에 포집하는 과정을 반복하면, 구리 광석을 합성할 수 있습니다.
aop-ammoniacal-iron-synthesis=아퀼로 암모니아 바다의 구리 입자를 탄소 조각에 포집하는 과정을 반복하면, 철 광석을 합성할 수 있습니다.
aop-aquiloan-air-scrubbing=부패 물질을 이용해 아퀼로 대기 중의 공해를 포집해보세요.
aop-carbon-liquefaction=석탄 액화를 대체할 수 있는 기술.
aop-charcoal=[item=wood]를 태워 [item=carbon]를 만들어보세요.
aop-core-mining=행성 표면 아래 깊은 곳을 파서 순수한 자원을 얻어보세요.
aop-direct-molten-copper=방해석을 사용하지 않고 구리 광석을 녹여보세요.
aop-direct-molten-copper-from-lava=방해석을 사용하지 않고 용암에서 녹은 구리를 뽑아보세요.
aop-direct-molten-iron=방해석을 사용하지 않고 철 광석을 녹여보세요.
aop-direct-molten-iron-from-lava=방해석을 사용하지 않고 용암에서 녹은 철을 뽑아보세요.
aop-fulgoran-air-scrubbing=방해석을 사용해 풀고라 대기 중 공해를 포집해보세요.
aop-gleban-air-scrubbing=황산을 사용하여 글레바 대기 중 포자를 포집해보세요.
aop-lava-demineralization=용암에서 불순물을 제거합니다.
aop-nauvitian-air-scrubbing=방해석을 사용하여 나우비스 대기 중 공해를 포집해보세요.
aop-nutrients-from-biomass=[item=aop-biomass]를 75% 부패한 [item=nutrients]로 바꿔보세요.
aop-mineral-slurry=심층 광석을 가공할 수 있는 [item=aop-deep-mineral] 형태로 만듭니다.
aop-mineral-slurry-processing=혼합물에서 불순물을 제거하여 [item=aop-refined-mineral]을 만듭니다.
aop-petroleum-gas-dehydrogenation=[fluid=petroleum-gas]에서 수소 원자 4개를 제거하고 [item=carbon]만 남길 수 있습니다.
aop-solid-fuel-melting=[item=solid-fuel]를 다시 [fluid=crude-oil]로 녹일 수 있습니다.
aop-uranium-sifting=[item=stone]을 선별하여 우라늄을 찾아내세요.
aop-vulcanusian-air-scrubbing=돌을 사용하여 불카누스 대기의 공해를 포집합니다.
aop-wood-rotting=[item=wood]를 부패시키는 과정. 소량의 [item=spoilage]을 촉매로 사용합니다.
aop-ammoniacal-solution-sifting=[fluid=ammoniacal-solution]에 녹아있는 약간의 [item=aop-metallic-traces]을 분리합니다.
aop-explosives-from-quicklime=[item=explosives]를 얻을 수 있는 다른 방법입니다.
