[entity-description]
aop-arc-furnace=엄청난 양의 아이템을 제련할 수 있는 거대한 용광로로, 엄청난 에너지를 사용하며 평소보다 훨씬 더 많은 공해도 배출합니다.
aop-atomic-enricher=생산성이 높은 원심분리 공정을 가능하게 하는 고방사능 기계.
aop-biochemical-facility=영양소나 바이오매스를 사용하지 않고도 대부분의 생물학적 제작법을 생산할 수 있는, 펜타포드와 바이터의 복합 결정체.
aop-biomass-reactor=생체 물질로부터 전력을 생산할 수 있는 발전기입니다.
aop-core-miner=마지막 채광 개척지. 행성 표면 아래 깊은 곳을 파고 들어가 무수한 자원을 획득하세요. 심층 채광 작업을 진행할 수 있을 만큼 단단하고 밀도가 높은 표면 지각을 가진 행성에만 배치할 수 있습니다.
aop-electromechanic-facility=에너지 소비가 높은 전기 기계. 고품질 제작이 가능합니다.
aop-hydraulic-plant=유체 관련 대규모 제작이 가능한 유압 기반 기계.
aop-lumber-mill=목재 및 관련 자원으로 많은 양의 제품을 생산할 수 있는 에너지를 적게 사용하는 건물.
aop-petrochemical-facility=석유화학 제작에 특화된 조립 기계, 작동 중 많은 공해가 발생합니다.
aop-quantum-assembler=양자 컴퓨팅을 이용하여 이전에는 불가능했던 양의 과학을 구축할 수 있는 매우 강력한 조립 기계 업그레이드.
aop-quantum-computer=연구의 마지막 개척지. 양자역학을 이용해 과학 팩을 1/10만큼만 사용합니다. 다만 중력이 있는 장소에서 사용하기에는 너무 위험합니다. (행성 등)
aop-quantum-stabilizer=양자 조작을 통해 기계를 강화하는 업그레이드된 [entity=beacon]입니다.
aop-scrubber=실수를 바로잡는 데 도움을 주는 작은 기계.
aop-smeltery=상상할 수 없는 온도에 도달할 수 있는 더 강력한 주조소로, 고급 제작법을 제작할 수 있습니다.
aop-mineral-synthesizer=이 기계는 첨단 화학 공정을 사용하여 기본 자원으로부터 가치있는 광물을 합성할 수 있습니다.
aop-transmitter=좋은 것을 주변에 작은 형태로 제공합니다.
aop-advanced-assembling-machine=모듈 효과를 받을 수 있는 고급 조립 기계입니다.
aop-greenhouse=간단한 작물 재배가 가능한 시설입니다.
aop-armory=빠른 탄약 제작이 가능합니다.
aop-salvager=[entity=recycler]의 개선된 버전으로, 투입된 아이템의 높은 품질 버전을 훨씬 쉽게 얻을 수 있도록 합니다.
aop-synthesizer=첨단 화학 공정을 사용하여 기본 자원만으로 고급 광물을 합성할 수 있는 기계입니다.

