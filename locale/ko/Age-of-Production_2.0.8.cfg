[technology-description]
aop-additional-air-scrubbing=다른 행성에서도 공기 정화가 가능하도록 합니다.
aop-agriculture-productivity=[entity=aop-greenhouse] 내부의 식물 수확량이 증가됩니다.
aop-air-scrubbing=촉매를 사용해 공기 중 공해를 잡아내는 작은 기계.
aop-arc-furnace=Massive furnace capable of fast and efficient smelting.
aop-armory=새로운 군사 기술을 이용하면 탄약 생산 속도를 눈에 보이지 않을 정도로 빠르게 만들 수 있습니다.
aop-automation=속도, 생산성 및 모듈 슬롯이 추가되어 유체 성분을 처리할 수 있는 조립 기계입니다.
aop-core-mining-productivity=[entity=aop-core-miner]의 생산량이 증가합니다.
aop-deep-mineral-refining-productivity=심층 광석 처리에 더 나은 기술을 사용하여 더 많은 광석을 추출할 수 있게 합니다.
aop-electromechanics=새로운 양자 컴퓨팅 과정을 사용한 기계로 고품질의 장치를 쉽게 생산할 수 있습니다.
aop-hybridation=방사선과 첨단 생명 공학을 이용하면 바이터와 펜타포드를 끔찍하지만 유용한 무언가로 융합할 수 있습니다.
aop-hydraulics=수력학적 혁신 덕분에 유체 기반 제작법이 간단해졌으며 더 적은 자원을 소비합니다.
aop-petrochemistry=풀고라의 원유 바다의 성질을 연구함으로써 새로운 석유화학 제품을 만들 수 있습니다.
aop-smeltery=새로운 제련 기술 덕에, 극한의 온도에 더 쉽게 도달하고 고급 제작법을 주조할 수 있게 되었습니다.
aop-woodworking=이제 나무를 심을 수 있게 되었으므로, 새로운 응용 분야 제작도 가능합니다.
aop-mineral-synthesis=기본 금속 자원이 부족한 아퀼로 행성 환경을 극복하기 위한 새로운 기술을 연구해보세요.
aop-asphalt=[fluid=aop-bitumen] based pavimentation that allows for faster vehicle movement.
aop-atomic-enricher=더 정교한 원자력 관련 처리를 진행할 수 있는 고급 [entity=centrifuge]입니다.
aop-biocircuits=박테리아와 [item=bioflux]를 이용한, 완전히 생물학적인 전자 부품을 제작할 수 있습니다.
aop-biomass-reactor=[item=nutrients]의 효율적인 대체 물질과, 이를 기반으로 한 에너지원 사용이 가능합니다.
aop-bitumen-processing=[fluid=heavy-oil]과 [item=stone]을 가공해 고밀도 절연체를 제작해보세.
aop-core-mining=마지막 채광 개척지, 안정적인 표면을 가진 넓은 행성에서 기본적으로 무한한 자원을 채굴해보세요.
aop-fission-science-pack=원자력과 관련된 기술 연구를 진행할 수 있도록 합니다.
aop-forestry-science-pack=고급 산림학 기술 연구를 진행할 수 있도록 합니다.
aop-greenhouse=나무와 작물을 더 간단하고 저렴하게 재배할 수 있는 인공 농장입니다.
aop-hydraulic-plant=유압 관련 공정을 효율적으로 수행할 수 있는 기계입니다.
aop-lumber-mill=[item=wood] 관련 처리를 빠르게 진행할 수 있는 저전력 설비입니다.
aop-petrochemical-facility=더 많은 석유화학 공정을 수행할 수 있는 개선된 [entity=oil-refinery]입니다.
aop-petrochemical-science-pack=개선된 석유화학 연구를 진행할 수 있도록 합니다.
aop-quantistic-science-pack=양자 입자의 비밀을 연구할 수 있도록 합니다.
aop-quantum-machinery=연구, 제작, 효과 전송의 궁극적인 집합체입니다.
aop-quicklime-explosives=[item=aop-quicklime]을 소재로 한 [item=explosives]을 제작할 수 있도록 합니다.
aop-radiation-cladding=강력한 방사선으로부터 보호해주는 두꺼운 방호 재료입니다.
aop-smaller-beacons=더 작고 뛰어난 공간 효율을 지닌 [entity=beacon]입니다. 모듈을 하나만 장착할 수 있지만, 두 개를 서로 가까이 배치하면 추가적인 인접 보너스를 통해 전송 효율이 증폭됩니다.
aop-synthesis=[planet=aquilo]의 [tile=ammoniacal-ocean]을 체로 거르며 얻은 [아이템=aop-metallic-traces]를 사용하여 황량하고 얼어붙은 세계에서 광석을 합성합니다.
aop-thermal-science-pack=더 진보된 열 제련 연구가 가능해집니다.
aop-tritium-synthesis=통제된 핵융합을 사용하여 [fluid=aop-tritium]를 합성합니다.
aop-uranium-233-breeding=[item=uranium-ore]의 더 불안정한 동위원소를 생산할 수 있게 해줍니다.
aop-water-rectification=[fluid=water]에서 중수를 분리하고, [fluid=aop-deuterium]와, 드물게 [fluid=aop-tritium]를 추출합니다.

