[space-location-name]
crucible=크루시블
crucible-orbit=크루시블 고궤도

[space-location-description]
crucible=강한 중력과 대기압 환경으로 구성된 크고 빽빽한 산과 암석으로 이루어진 세계입니다. 강한 중력은 [space-location=crucible]에서의 로켓 제작을 더 까다롭게 하며, 현지 자원을 필요로 할 것입니다. 하지만, 압력을 버텨낼 수만 있다면 무궁무진한 기회가 될 것입니다.
crucible-orbit=[space-location=crucible] 상공에 위치한 안전 지역입니다. [img=utility/warning_icon]경고[img=utility/warning_icon] [space-location=crucible]의 막대한 중력은 행성에서 이 고궤도로의 귀환를 어렵게 합니다. [space-location=crucible]의 자원을 활용하지 않으면 돌아오는 것은 불가능할 수도 있습니다.

[string-mod-setting-description]
planet-crucible-vanilla-change-amount-all=아퀼로에서 잠금 해제할 수 있는 대부분의 제작법에 크루시블의 생산 공정의 아이템이 필요하도록 수정합니다. 이 모드 행성만 별도로 추가하는 경우 이 방식을 권장하지만, Enable All Planets와 같은, 여러 행성을 추가하는 모드팩 등 상황에 적합하지 않을 수 있습니다.
planet-crucible-vanilla-change-amount-no-recipes=다른 내부 행성 과학 팩이 필요한 대부분의 기술에 고압 과학 팩이 필요하도록 수정합니다.
planet-crucible-vanilla-change-amount-no-technologies=프로메튬 과학 팩과 연구 생산성 기술에만 고압 과학 팩이 필요하도록 수정합니다.
planet-crucible-vanilla-change-amount-none=기존 제작법나 기술을 변경하지 않습니다.

