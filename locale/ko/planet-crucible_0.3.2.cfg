[technology-description]
planet-crucible-emulsion-processing=[fluid=planet-crucible-emulsion]을 유용한 유체로 처리할 수 있으며, 가끔씩 거친 상태의 [item=planet-crucible-diamond]를 획득하는 것도 가능합니다.
planet-crucible-gem-synthesis=[item=planet-crucible-ruby], [item=planet-crucible-diamond]의 더 효율적인 제작이 가능합니다.
planet-crucible-hydrogen-metallization=고압 과학의 핵심, 금속 수소를 소개합니다.
planet-crucible-hydrogen-processing=고압 수소는 많은 유용한 특성을 가지고 있지만, 불안정해질 수 있으므로 취급에 주의해야 합니다.
planet-crucible-kiln=열에너지를 직접 이용하는 대형 용광로입니다. 일반적인 제련 외에도 [item=planet-crucible-skarn] 가공에 필수적인 유체 투입이 가능합니다.
planet-crucible-lithium-hydride=수소를 금속화하는 더 효율적인 방법을 알아보세요.
planet-crucible-military=금속 수소를 이용하여 우주에서 개선된 탄약 공급이 가능합니다.
planet-crucible-night-vision-mk2=더 작아진 [item=night-vision-equipment].
planet-crucible-offshore-pump=[space-location=crucible]의 강력한 중력에서도 작동 가능한 개선된 [entity=offshore-pump]입니다.
planet-crucible-personal-laser-mk2=더 강력한 [item=personal-laser-defense-equipment].
planet-crucible-pressure-forge=고압 공정을 위한 제작 시설.
planet-crucible-rocket-part=[space-location=crucible] 궤도에 도달할 수 있는 로켓을 제작할 수 있게 됩니다.
planet-crucible-science-pack=많은 압력 관련된 연구를 진행할 수 있습니다.
planet-crucible-skarn-processing-adv=[item=planet-crucible-skarn]의 모든 잠재력을 이끌어보세요.
planet-crucible-thruster=금속 수소를 사용하면 [space-location=crucible]의 거대한 중력 감옥에서 더 쉽게 탈출할 수 있습니다.
crucible=강한 중력과 대기압 환경으로 구성된 크고 빽빽한 산과 암석으로 이루어진 세계입니다. 강한 중력은 [space-location=crucible]에서의 로켓 제작을 더 까다롭게 하며, 현지 자원을 필요로 할 것입니다. 하지만, 압력을 버텨낼 수만 있다면 무궁무진한 기회가 될 것입니다.

