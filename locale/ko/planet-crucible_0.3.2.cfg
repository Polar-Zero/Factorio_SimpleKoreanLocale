[tips-and-tricks-item-description]
planet-crucible-briefing=[planet=crucible]은 [entity=iron-ore], [entity=copper-ore], [entity=uranium-ore], [entity=stone], [fluid=water], [entity=crude-oil]이 없는 암석 행성이지만, 필요한 모든 아이템은 [entity=planet-crucible-skarn]와  [entity=planet-crucible-emulsion]를 이요해 제작할 수 있습니다.\n[entity=solar-panel]이 더 효율적으로 작동하며. 비록 열악한 환경이지만 자연적인 위험요소는 없습니다.\n[tile=planet-crucible-lava]는 추후 연구로 펌프로 끌어올릴 수 있으며, 매립할 수 없지만 고가 철도로 건널 수 있습니다. 
planet-crucible-gravity=[img=utility/warning_icon]경고[img=utility/warning_icon] [planet=crucible]의 극심한 중력과 대기압으로 인해, 일반적인 [item=rocket-fuel]만으로는 우주에 도달할 수 없습니다. is insufficient for reaching space.\nAfter landing on [planet=crucible], [item=planet-crucible-science-pack]을 이용해 행성을 벗어날 방법을 모색해야만 합니다.
planet-crucible-metallic-hydrogen=[tooltip=금속 수소,__1__]는 높은 에너지 밀도와 낮은 안정성이 특징인 위험한 물질이며, 취급에 각별한 주의가 필요합니다.\n[tooltip=금속 수소,__1__]의 모든 형태는 파괴되는 대신 폭발하며, 재활용할 수도 없지만 [entity=planet-crucible-pressure-forge]에서 안전하게 재처리할 수 있습니다. 또한 우주 공간에 안전하게 폐기할 수 있으며, [item=planet-crucible-hydrogen-plate]을 제외한 모든 형태의 [tooltip=금속 수소,__1__]는 제대로 재처리하거나 폐기하지 않으면 결국 폭발하므로, 장기 저장이 불가능합니다.
planet-crucible-metallic-hydrogen-enum=금속 수소:\n[item=planet-crucible-denatured-hydrogen] 변성 수소\n[item=planet-crucible-denatured-hydrogen-critical] 변성 수소 (임계)\n[item=planet-crucible-hydrogen-plate] 수소 판 (안정)\n[item=planet-crucible-hydrogen-plate-activated] 수소 판 (활성)\n[item=planet-crucible-hydrogen-plate-unstable] 수소 판 (불안정)\n[item=planet-crucible-hydrogen-plate-critical] 수소 판 (임계)\n[item=planet-crucible-lithium-hydride] 수소화 리튬\n[item=planet-crucible-hydrogen-cable] 수소 필라멘트
planet-crucible-metallic-hydrogen-enum-no-recipes=금속 수소:\n[item=planet-crucible-denatured-hydrogen] 변성 수소\n[item=planet-crucible-denatured-hydrogen-critical] 변성 수소 (임계)\n[item=planet-crucible-hydrogen-plate] 수소 판 (안정)\n[item=planet-crucible-hydrogen-plate-activated] 수소 판 (활성)\n[item=planet-crucible-hydrogen-plate-unstable] 수소 판 (불안정)\n[item=planet-crucible-hydrogen-plate-critical] 수소 판 (임계)\n[item=planet-crucible-lithium-hydride] 수소화 리튬
planet-crucible-space-platform=[img=utility/warning_icon]경고[img=utility/warning_icon] [planet=crucible]의 극심한 중력은, 우주 플랫폼이 [space-location=crucible-orbit]로 탈출하기 위해 상당한 추진력이 필요하도록 합니다. 우주 플랫폼이 __1__km/s 이상의 속도를 유지할 수 있는 경우에만 탈출을 시도하는 것을 권장합니다.\n[planet=crucible] 주변에는 소행성이 거의 없으므로 [item=planet-crucible-science-pack]을 이용하여 우주에서 필요한 자원을 얻을 수 있는 다른 방법을 연구해야 할 수도 있습니다.


[mod-setting-name]
planet-crucible-allow-flare-stack=크루시블에서 배출탑 허용
planet-crucible-vanilla-change-amount=고압 연구 팩을 추가할 기술/제작법
planet-crucible-difficulty=크루시블 행성 난이도

[mod-setting-description]
planet-crucible-allow-flare-stack=크루시블 행성 표면에 연소탑이나 배출탑을 배치할 수 있는지 여부를 조정합니다. 표면 제한으로 인해 모드 호환성 문제가 발생하는 경우 활성화하세요.
planet-crucible-vanilla-change-amount=아퀼로의 일부 기술이나 제작법에 크루시블 과학 팩이 필요하도록 할지 여부를 수정할 수 있습니다.
planet-crucible-difficulty=도가니의 중력 강도, 잘못 취급된 금속 수소가 얼마나 위험해질지 여부에 영향을 줍니다.