[mod-name]
loader-utils=적재기 도구(Loader Utilities)

[mod-description]
loader-utils=적재기의 작동 방식을 변경할 수 있는 설정을 추가합니다. 가능한 경우 적재기에 묶음 기능을 지원합니다.\n\n번역: SimpleKoreanLocale(PolarZero)


[loader-utils-ui]
checkbox-fs=묶음 단위로 적재
checkbox-lf=레인별 선별
checkbox-rl=적재량 제한 존중
frame=적재기 설정

[mod-setting-name]
lu-enable-snapping=적재기 목표 연결 활성화
lu-fs-default=적재기가 기본적으로 묶음 단위로 적재
lu-lf-default=적재기에 기본적으로 레인별 선별 기능 활성화
lu-rl-default=적재기가 기본적으로 적재량 제한을 존중
lu-show-all-loaders=선택창에 모든 적재기 유형 표시

[mod-setting-description]
lu-enable-snapping=적재기를 유효한 대상에 자동으로 연결합니다
lu-show-all-loaders=해체 및 업그레이드 계획기와 같은 선택창에 모든 적재기 객체가 표시되도록 합니다. 일반적인 업그레이드 계획기를 적재기에 사용하려면 활성화하세요.