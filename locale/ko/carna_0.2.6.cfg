[mod-setting-description]
carna-atmosphere=간단하게: 카르나의 대기가 기계에 단순한 영향만 미칩니다. 탑에 의해 가열되지 않은 기계는 제작 속도만 감소됩니다.\n복잡하게: 카르나의 대기가 기계에 더 많은 영향을 미칩니다. 열공해 값이 낮은 지역의 기계 제작 속도가 -40%까지 감소합니다, 높을수록 감소 수치가 -20%, 감소되지 않음 까지 점차 낮아지며, 열공해 값이 충분히 높을 경우 청크당 10%씩 제작 속도가 빨라집니다.\nOFF: 기계가 있는 지역의 열공해가 충분히 높지 않은 경우 제작 속도가 20% 감소됩니다.\n복잡하게 + 최적화: 복잡함과 동일하지만 청크를 1x1 단위가 아닌 2x2 그룹으로 묶어서 검사하며, 이는 전체적인 정밀도는 낮추지만 거대한 공장에 대한 잔렉 발생 가능성을 줄입니다.\n\n복잡하게 옵션은 UPS 성능에 영향을 미칠 수 있지만, 이는 확실하게 검증되지 않았습니다. 이미 카르나 세계를 생성했거나 시작했을 경우, 이 설정값을 전환하는 것을 매우 권장하지 않습니다.
carna-atmosphere-check=How many seconds until Carna checks the local chunks on its surface to update temperature effects on entities or machines.  This check will be run once every determined amount of seconds.  Higher values mean that machine status on Carna will be updated less often, lower values mean more often.
carna-complex-atmosphere=활성화하면, 카르나의 대기가 기계에 더 많은 영향을 미칩니다. 열공해 값이 낮은 지역의 기계 제작 속도가 -40%까지 감소합니다, 높을수록 감소 수치가 -20%, 감소되지 않음 까지 점차 낮아지며, 열공해 값이 충분히 높을 경우 청크당 10%씩 제작 속도가 빨라집니다.\nOFF: 기계가 있는 지역의 열공해가 충분히 높지 않은 경우 제작 속도가 20% 감소됩니다.\n복잡하게 + 최적화: 복잡함과 동일하지만 청크를 1x1 단위가 아닌 2x2 그룹으로 묶어서 검사하며, 이는 전체적인 정밀도는 낮추지만 거대한 공장에 대한 잔렉 발생 가능성을 줄입니다.\n\n복잡하게 옵션은 UPS 성능에 영향을 미칠 수 있지만, 이는 확실하게 검증되지 않았습니다. 이미 카르나 세계를 생성했거나 시작했을 경우, 이 설정값을 전환하는 것을 매우 권장하지 않습니다.
carna-itemtemp=몇몇 아이템에 '부패'가 발생하고, 이를 통해 뜨거운 상태에서 차가운 상태로 냉각되도록 합니다. 많은 제작법이 뜨거운 변종 아이템에 의존하는 카르나의 물류 운송 난이도가 크게 증가합니다. 카르나는 이미 다소 복잡하게 느껴질 수 있는 물류 행성이므로, 카르나의 온도 아이템이 너무 어렵게 느껴질 경우 비활성화할 수 있습니다.__ITEM__skl-txtd1__
carna-sciencesphere-mode=과학 구체를 활용하도록 카르나 행성 진행 방식을 완전히 변경합니다! 이 모드를 활성화하면 카르나의 대부분의 연구가 새로운 과학 구체를 이용하도록 변경됩니다. 경고: 행성의 연구 트리가 3배 이상 길어질 것입니다!