[technology-description]
advanced-materialization=지식을 희생하고, 더 복잡한 자원을 물질화해보세요.
algite-assembler=작동에 카르나 플라즈마가 필요하지만, 매우 빠른 제작이 가능한 조립 기계입니다. 카르나 외부에서의 사용은 거의 불가능하지만, 더 좋은 기계를 찾을 수 있을지도 모릅니다.
algite-bio-dome=이 특별한 돔은 글레바 생태계를 인공적으로 재현할 수 있도록 하여, 유마코와 젤리넛과 같은 과일을 다른 행성에서 재배할 수 있도록 합니다. 돔을 한 번 배치하면 돔이 위치한 지역을 영구적으로 다른 지역 생물군계로 조정할 수 있도록 선택지가 제공됩니다. 환경 조성이 완료되면 이는 영구적이며 되돌릴 수 있는 방법은 없습니다.
algite-processing=알가이트는 카르나의 기계 내부에서 발견할 수 있는 특별한 광물로, 이 희귀 자원은 몰리브덴 코어를 이용하여 제작할 수 있는 몰리브덴 분말 선별기를 사용해야만 잔해 더미에서 분리할 수 있습니다. 이 자원은 우리가 사용할 수 있는 강력한 기계를 만드는 데 필수적으로 필요합니다.
artificial-global-gleba-soil=Our 생존 캡슐s only work on Carna's surface, but these tiles can be placed anywhere, allowing us to grow our 카르나 based breeds of plants on any surface we want.  This effectively grants us the ability to create carbon mines, iron and copper mines, and nutrient water anywhere we want.
automation-feron=Incredibly fast and powerful assembling machines that use 카르나 energy as fuel.
biochamber-mk2=Upgraded version of the Biochamber that uses Richwater as a fuel source instead of raw nutrients.
boompuff-carnabreed=There is no coal on Carna, this plant will yield an equivilant that can be processed into carbon.
breeding-exoticia=Plants that yield exotic matter.
carna-cache-equipment=Enhancing your storage space.
carna-craft-equipment=Increasing your crafting speed.
carna-interm_1=Unlock ways to utilize the 카르나 salvage scattered across the landscape, including rudimentary methods of utilizing and creating plasma chunks.
carna-reach-equipment=Extending your reach by 1 tile.
carnal-energy-crystal=Physical form of 카르나 energy, suitable for mass transport offworld.  Is also growable.
carnal-oil2=Advanced method of obtaining oils using 카르나 energy.
carnal-science-pack=The source of 카르나 knowledge in a bottle.
carnalairprocessing=Carna's atmosphere is filled water, despite having none on its surface.  The molybdenum air isolator is capable of using its 카르나 sourced molybdenum core to isolate particles of our choosing in the air and creating a usable gas in its place.
carnalseiver=This structurue is capable of isolating and reconstructing atomic properties we're more familiar with, essentially converting the salvage on Carna into iron, copper, and even some molybdenum to help us along our way until we can gain a more mass access to its raw resource.
carnan-spire=A large structure that is capable of transmitting energy sourced into it across an entire surface!  This machine is magnificent and efficiently distributes all manner of energy at a large expense of energy being supplied to it and a spire core.  This machine will remove all need to use local wiring, however should the machine stop burning a spire core, the transmission will be stalled.  It is recommended to keep all machines that are needed for running the spire hooked to a local power network should transmission stop.  Large amounts of energy will be needed to power the spire.
chunk-processing=Turning fluids into chunks, useful for a small number of things, such as creating steam.
feron-airpump=A super advanced form of the Molybdenum air isolator.  This brilliant machine can isolate atoms in the air of many worlds in order to materialize the gas we desire.
feron-processing=Processing of 카르나 salvage clusters with special cores yields access to a super rare mineral, feron.  Feron will grant us access to 카르나 energy as well as the ability to create advanced machinery we can use offworld.
forging-exotic-material=A complicated processes to breed and grow Exoticia, an enigmatic plant which will source exotic matter that we can use.  By launching rockets into the high atmosphere, gases from Carna's electromagnetic field can be collected and used to convert seeds into exotic seeds.
geyser-power=There are a number of openings on the surface that are emitting gaseous fumes into the air, we can harness these gases in various ways such as to create steam or burn off into the air using another structure, the Molybdenum heating pillar.  This pillar will allow us to heat the surrounding area and allow our machines to operate at optimal speeds, essentially acting as a form of combatting Carna's harsh environment.
molybdenum-processing=Molybdenum is the only minable natural resource on this planet.  It would appear that most if not all natural resources have somehow been converted or transmuted into this material, making one wonder if this molybdenum is truly natural or not.  Gaining mass access to this resource is very important as we will be able to fully automate the creation of Molybdenum cores necessary for creating more advanced machines.
planet-discovery-carna=A planet with very low temperatures, slowing down the processing speed of all machines.  We will need ways to heat the surrounding area.
slipstack-carnabreed=The 카르나 breed of Gleba's slipstacks.  This plant will specialize in yielding nutrient rich water which we can use to feed more advanced biochambers, a supply of fuel that does not expire.  Is also essential for the breeding of Exoticia.
stingfrond-carnabreed=Stingfronds are necessary for the creation of other 카르나 based plants.  The fruit cultivated by this plant is rich in oils.
stromatolite-carnabreed=Materialization of a special breed of Gleba's iron and copper stromatolites, we can grow these fascinating sacks of metallic bacteria en-masse as a substitute to our usual ore veins.  Agriculture towers will be necessary.  In order for these stromatolites to grow, they will need growable soil to sit on, however Carna is a world practically devoid of life.  카르나 생존 캡슐s are our answer, throwing these grenades will yeild the creation of a cloud that will convert the area around it into a space suitable for specific plants we materialize on Carna.

