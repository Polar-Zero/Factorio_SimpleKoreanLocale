[space-location-description]
carna=A planet with very low temperatures.  The planet is surrounded by a very active electromagnetic field, resulting in occasional lightning and blotting the planet's surface in perpetual darkness.  The cold atmosphere is hazardous to most of our machines, rendering them incapable of operating at max speeds.  The electromagnetic field enshrouding the planet appears to be artificially created, leading to the conclusion that life once existed on this desolate snowy planet.  Scans indicate the surface is littered with dormant machines and that the core of this world appears to have been artificially replaced.

