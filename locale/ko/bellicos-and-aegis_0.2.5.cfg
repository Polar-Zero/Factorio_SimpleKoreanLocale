[string-mod-setting-description]
stargate-solar-power-location-based=우주관문 주변 태양광 효율이 별과의 거리에 따라 결정되도록 합니다. 가장 쉬운 난이도.\n칼리두스 우주관문에서의 태양광 효율: 150%\n벨리코스 우주관문에서의 태양광 효율: 40%
stargate-solar-power-low-power=우주관문 주변 지역 및 주변 우주 경로의 태양광 효율이 10%인, 일반적인 난이도입니다.
stargate-solar-power-very-low-power=우주관문 주변 지역 및 주변 우주 경로의 태양광 효율이 1%에 불과한, 매우 높은 난이도입니다. 태양광 발전만으로는 갇힐 가능성이 매우 높습니다.

