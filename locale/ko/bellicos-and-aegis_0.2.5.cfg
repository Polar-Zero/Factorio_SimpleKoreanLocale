[space-location-description]
aegis-inner-edge=소행성대를 지난 뒤, 아직 형성 중인 원반에 도달하기 전의 지역, 이 곳에 도달하기까지의 험난한 여정에 비하면 비교적 평온한 곳입니다.
aegis-outer-edge=이지스 소행성대의 바깥쪽 가장자리에 위치한 비교적 안전한 지역입니다. 이곳에서는 여러 예상 가능한 것들과 약간의 베릴륨 소행성을 찾을 수 있습니다.
aegis-warden=소행성대 이지스 내부에는 엄청나게 많은 소행성들이 자리잡고 있으며, 이들은 거대 베릴륨 소행성에 의해 벨리코스의 이온화 제트로부터 보호받고 있습니다. 소행성 밀도가 매우 높은데다 태양광 발전 효율도 낮으므로, 이곳에 오래 머무르는 것은 위험합니다.
bellicos-orbit=형성 중인 원반 내부, 거의 도달할 수 없는 극한의 환경입니다.
calidus-bellicos-stargate-bellicos=선구자 기술이 적용된 이 관문을 사용하면 우주 공간의 두 위치 사이를 빠르게 이동할 수 있습니다.\n이지스 너머에 위치한 이 관문을 통해 칼리두스로 돌아갈 수 있습니다.
calidus-bellicos-stargate-calidus=선구자 기술이 적용된 이 관문을 사용하면 우주 공간의 두 위치 사이를 빠르게 이동할 수 있습니다.\n칼리두스 근처에 위치한 이 관문은, 나우비스나 풀고라에서 접근할 수 있으며, 벨리코스 외곽으로 이어집니다.

