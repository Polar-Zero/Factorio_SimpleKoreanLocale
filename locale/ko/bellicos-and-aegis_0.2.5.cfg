[technology-description]
beryllium-processing=철 및 구리 부품에 베릴륨을 도금할 수 있도록 합니다.
beryllium-solar-panel=베릴륨 소재로 제작된 이 태양 전지판은 더 많은 공간을 차지하지만, 그만큼 더 뛰어난 효율을 가졌으며 내구성 역시 증가되었습니다.
circuit-productivity-helium=밀폐된 환경에서의 정밀 조립을 통해 회로를 더 효율적으로 제작할 수 있도록 합니다. 복잡한 회로의 경우 정밀 조립 효율이 추가로 증가됩니다.
discovery-aegis-inner=가장 안전한 항로를 따라 항해하더라도, 이지스 소행성대 내부의 소행성 밀도는 여전히 매우 높습니다. 우주 플랫폼이 소행성대 내부로 진입할수록, 펄서처럼 보이는 천체의 고에너지 펄스에 의해 만들어된 이온화된 얼음 분출로부터 소행성으로부터 받는 보호는 줄어들 것입니다.\n만약 통과하를 원한다면, 이온화된 얼음을 증발시킬 수 있는 강력한 탄약과 레이저로 우주선을 무장시켜야 할 것입니다.
discovery-aegis-outer=글레바 궤도 근처에서 대규모 첨단 포털이 발견되었습니다. 이 포털은 나우비스 항성계와는 다른, 훨씬 먼 곳에 위치한 또 다른 우주 공간으로 이어지는 것으로 보입니다. 포털 건너편에는 작지만 매우 중력이 매우 강한 무언가를 공전하는, 베릴륨 소행성들을 포함한 다량의 소행성으로 구성된 이지스 소행성대가 존재합니다.\n그곳으로 탐사를 원한다면 더 높은 소행성 밀도와 공격에 대비해야 할 것입니다.
discovery-aegis-warden=이지스 소행성대의 탐색 결과, 거대 베릴륨 소행성 뒤편, 대량의 소행성이 위치한 '워든 지점'에 진입할 수 있게 되었습니다. 이 지역은 거대 베릴륨 소행성으로 가득 차 있으면서도, 벨리코스의 영향이 거의 미치지 않아, 이온화 소행성이나 태양 에너지는 부족한 지역입니다.\n이곳으로 수확선을 보낸다면, 베릴륨 소행성을 파괴할 수 있는 무기를 갖추면서도 태양 에너지에 지나치게 의존하지 않도록 해야 합니다.
discovery-bellicos=이 항성계의 중력 우물 위치를 파악하는 데 성공했으며, 해당 지점에 실제로 펄서가 있었습니다. 이제 정확한 위치 식별만 완료하면 더 많은 자원 수집을 목적으로 하는 "안전한" 접근이 가능해집니다. 하지만, 해당 지역은 서서히 형성되는 강세 원반으로 둘러싸여 있으며, 너무 가까이 다가가면 큰 문제가 발생할 수 있습니다. 또한 소행성들이 펄서 궤도 근처에서는 예측 불가능한 움직임을 보이기 시작할 수도 있습니다.\n최고 등급의 무기를 장착한 우주 플랫폼만이 이 여정에 도전하도록 해야 합니다.
helium-production=삼중수소에 에너지를 공급한 다음, 매우 느리게 다른 물질과 융합시키면 약간의 헬륨을 생성할 수 있습니다.
high-grade-fusion-thrust=[entity=steam-thruster-TT]에 능동적인 냉각 시스템과 고온에 견딜 수 있는 소재를 적용하면, 훨씬 더 강력한 연료인 [fluid=helium-thruster-fuel]를 이용해 더 큰 추진력을 발생시킬 수 있게 됩니다. 이 추진기가 정상적으로 작동하려면 공급되는 증기의 온도를 800°C ~ 1000°C 사이로 정밀하게 제어해야 합니다.
lightweight-arsenal=일반적인 탄약보다 가벼우면서도 작은 베릴륨 탄약은, 기존 탄약과 거의 동일한 파괴력을 유지하면서도 더 멀리, 더 빠르게 발사할 수 있습니다.
lightweight-inserters=기계 부품의 열용량이 높을수록 더 빠르게 투입할 수 있지만, 그만큼 대용량 투입은 어려워집니다.
low-grade-fusion=[item=low-grade-fusion-reactor]을 이용한 기본적인 핵융합 사용이 가능해집니다. 일정한 양의 핵융합 연료를 소비하여 일정량의 [fluid=steam]증기를 가열하는 이 반응로는, 낮은 온도의 증기를 가열할수록 더 높은 효율로 작동합니다. (15°C [fluid=steam]증기 + [item=high-temp-steam-turbine]고온 증기 터빈 기준 최대 효율: 80%), 일반적인 증기 터빈도 고온 증기를 사용할 수 있습니다.
low-grade-fusion-thrust=삼중수소의 통제된 핵융합을 이용해 고온 증기를 플라즈마 형태로 가열할 수 있습니다. 이  고에너지 플라즈마를 추진기에서 분사하면 상당한 추진력이 발생합니다. 이 과정을 원활하게 진행하려면 입력되는 증기의  온도를 500°C ~ 1200°C 사이로 유지해야 할 필요가 있습니다.
quantum-processor-helium=헬륨은 양자 과정 중 간섭 발생을 방지하는 데 매우 유용한 매개체로, 이를 활용하면 더 적은 재료로 양자 칩을 제작할 수 있게 됩니다.
space-beryllium-logistic=기존 벨트의 철 부품을 베릴륨 부품으로 교체한 다음, 중력이 낮은 환경에 설치하면 기계 마모 걱정 없이도 매우 빠른 속도로 가동시킬 수 있습니다.
space-beryllium-underground-pipe=우주 플랫폼을 더 효율적으로 관리할 수 있도록, 베릴륨으로 제작된 더 긴 범위의 지하 파이프를 사용할 수 있도록 합니다.
space-logistic-science-pack=베릴륨을 활용한 보다 진보된 기술 연구가 가능합니다.
the-solution=The power of the sun, in the palm of your hand... Or on a [entity=biter-spawner]biter nest.
tritium-extraction=이온화된 얼음을 분리하면 유용하게 쓰일 수 있는 희귀 동위원소를 추출할 수 있습니다.
tritium-fusion-fuel=삼중수소로 기본적인 핵융합 연료를 제작할 수 있게 됩니다. 어떤 핵융합로에서도 작동합니다.
tritium-RTG=삼중수소의 자연적인 방사성 붕괴 현상을 활용해보세요.
tungsten-lightweight-arsenal=베릴륨 탄환, 로켓, 포탄 탄두에 텅스텐강을 사용하면 크기나 무게 장점은 그대로 유지하면서도 위력을 크게 높일 수 있습니다.
beryllium-liquid-tank=no.

