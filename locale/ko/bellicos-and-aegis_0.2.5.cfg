make-railgun-upgrades-require-new-packs=레일건 무한 연구에 이지스&벨리코스 과학 팩 필요
radioactive-ice-fizzle-out-time=방사성 얼음 반감기 (초)
stargate-solar-power=우주관문 주변의 예상 태양광 효율
