[mod-setting-description]
add-value-to-fulgora=RTG 연구에 풀고라의 전자기 과학 팩이 필요하도록 합니다. 또한, RTG 제작이 전자기 공장에서 가능하도록 수정합니다.
ae-alt-pack-sprites=활성화되면, 새로운 과학 팩에 'Quality Glassware' 모드의 다양한 이미지가 사용됩니다.\n현재 스프라이트: [img=item/space-logistic-science-pack][img=item/pulsar-science-pack]
make-promethium-require-new-packs=프로메튬 기술 연구와 무한 기술 생산성 연구가 경량 과학 팩, 펄서 과학 팩을 필요로 하도록 합니다.
make-railgun-upgrades-require-new-packs=레일건 발사 속도 연구에 경량 과학 팩이, 레일건 피해량 연구에 펄서 과학 팩이 필요하도록 합니다.
radioactive-ice-fizzle-out-time=초 단위로 설정되어 있으며, 기본값 역시 설계상 매우 낮은 수치이므로 더 낮추지 않는 것을 권장합니다.
stargate-solar-power=우주관문 근처에 머무르는 우주 플랫폼에 적용되는 태양광 발전 효율을 설정합니다.
take-value-from-gleba=소행성 생산성 기술 연구에 더 이상 글레바의 농업 과학 팩이 필요하지 않게 하는 대신, 경량 과학 팩이 필요하도록 수정합니다.