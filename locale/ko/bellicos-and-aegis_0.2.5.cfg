[mod-description]
bellicos-and-aegis=🌐칼리두스에서 100파섹 넘게 떨어진 곳, 우주 공간을 휘젓고 있는 거대한 별 하나가 있습니다. 방사성 파편과 부서지기 쉬운 소행성들로 둘러싸인 이곳에 공장을 짓는 것은 도전적인 경험이 될 것입니다.\n\n새로운 자원, 기술 연구, 그리고 우주 플랫폼에 사용할 수 있는 업그레이드가 포함된 새로운 항성계를 게임에 추가합니다.\n\n번역: SimpleKoreanLocale(PolarZero)


