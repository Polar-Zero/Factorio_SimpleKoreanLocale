[item-description]
beryllium-solar-panel=베릴륨으로 제작된, 더 거대하지만 효율적인 태양 전지판.
H-bomb=다단계 핵탄두를 장착해 개조된 대포용 핵폭탄. 상당히 넓은 반경 내의 거의 모든 것을 초토화하도록 설계되어 중장갑 적을 제압하는 데 매우 탁월합니다.
high-temp-steam-turbine=고온 [fluid=steam]를 처리할 수 있는 고급 증기 터빈입니다. 이 터빈은 최대 800°C [fluid=steam]증기의 에너지까지 최대 효율로 끌어올 수 있으며, 더 높은 온도의 증기가 투입될 경우 에너지는 온전히 사용되지 못하고 낭비됩니다.
low-grade-fusion-reactor=[fluid=steam]를 초고온(1200°C)까지 과열시킬 수 있는 기본적인 핵융합로입니다. 온도가 너무 높을 경우 최대 효율을 얻지 못할 수 있으며, 이 경우 효율 최대화를 원한다면 온도가 낮은 [fluid=steam]증기와 혼합하는 것을 권장합니다. 인접 보너스를 받지 못할 수 있습니다.
steam-thruster-TH=삼중수소와 헬륨 기반, 작동하려면 800°C ~ 1000°C로 가열된 [fluid=steam] 증기가 필요합니다.
steam-thruster-TT=삼중수소 기반, 작동하려면 500°C 이상으로 가열된 [fluid=steam] 증기가 필요합니다.
tritium-RTG=방사성 동위원소 열전발전기. 환경 조건에 관계없이 소량이지만 안정적인 전력을 생산합니다.
