[tips-and-tricks-item-description]
lignumis-briefing=[planet=lignumis]는 [planet=nauvis]의 위성으로, 더 발전된 기술을 연구하기 위해 탈출하는 것이 중요한 행성입니다. 주요 자원은 [item=wood], [item=gold-ore], [item=peat], [item=stone]으로, 철과 구리가 없으며, 사용 가능한 유일한 금속인 [item=gold-ore]은 그다지 가치가 없어 보이는 등, 매우 제한적인 가능성만을 가졌습니다. 전력 관련 기술 역시 이 행성을 한 번 이상 탈출한 뒤에야 사용할 수 있게 됩니다.\n\n[img=utility/warning_icon] 리그누미스는 기본 게임의 제작법와 기술을 변경하며, 게임의 나머지 부분에도 영향을 미칩니다. 모드 설정을 살펴보고 취향에 맞게 변경해 보세요. 또는 모드 포털에서 감독판 버전을 설치하여 완전한 플레이를 진행하는 것 역시 가능합니다.
lignumis-burner-agriculture=농업용 타워에 씨앗과 연료를 모두 공급하려면 발전된 전력 방식에 비해 더 까다로운 해결책이 필요합니다. 게임 엔진 한계로 인해 투입기가 벨트 반대편에 있는 경우 연료를 무시하고 씨앗만 계속 잡게 되는데, 이런 문제를 완전히 방지하려면 회로 네트워크를 사용하거나 투입기를 여러 개 배치하세요.
lignumis-escaping=[entity=provisional-rocket-silo]은 아이템을 가지고 이 행성을 떠날 수 있도록 해줍니다. 나우비스에서 빠르게 재시작할 수 있도록 기반 시설 위주로 챙겨주세요. 연료, 금, 과학 팩은 리그누미스에 두고 가는 것을 추천합니다.\n\n[img=utility/warning_icon] 떠나기 전에 모든 기술을 연구해야 하는 것은 아니지만, 그렇게 하는 것을 권장합니다. 또는 적어도 떠난 뒤에도 연구 시설을 가동할 수 있는지 확인하세요.\n[img=utility/warning_icon] 여러분이 떠나더라도 기지에선 계속 소음이 발생하고, 적들은 계속 확장할 것입니다. 떠나기 전에 기지가 안전하게 보호되고 있는지 다시 한번 확인하세요.
lignumis-noise=[planet=lignumis]의 토착 생명체는 [img=airborne-pollutant/noise] 소음에 특히 민감합니다. 배치한 모든 기계에서 발생하는 소음은 그들에게 상당히 시끄러울 수 있습니다. 기지를 작게 유지하고 벽을 둘러싸 발생하는 소음을 차단해보세요.\n소음을 줄일 수 있는 몇 가지 방법: [img=item/wooden-wall] 벽, [img=entity/tree-01] 나무, [img=item/efficiency-module] 효율 모듈, [item=active-noise-cancelling-tower].
lignumis-steam=[entity=steam-assembling-machine]과 [entity=steam-inserter]를 사용하면 더 빠르고 작은 생산 체인을 구축할 수 있는 새로운 도구를 사용할 수 있습니다. 발전된 기술 연구가 되어 있지 않은 상황이므로, [entity=desiccation-furnace]에서 [item=moist-stromatolite-remnant]를 태우는 것이 [fluid=steam]의 유일한 공급 방법입니다. 일반적인 용광로에서 넘쳐나는 촉촉한 스트로마톨라이트 잔해를 태워 증기 균형을 맞출 수 있습니다.\n\n[img=utility/warning_icon] [fluid=steam]만으로는 모든 기계에 충분한 연료를 공급할 수 없을 것입니다. 가능하면 오래된 화력 제작 공정을 유지하세요.
lignumis-directors-cut=Thanks for playing the Lignumis Dircetor's Cut!\nThis is how I wanted the mod to be, but most people don't like how it changes the whole game by adding wood to everything. Be prepared to need wood on every planet and even on space ships.\n\n[img=utility/warning_icon] Many mod settings are enforced and therefore hidden. If you can't find a setting, it's because you play the Director's Cut.\n[img=utility/warning_icon] When adding more modded planets, also look for wood mods for those planets like "Wooden Cerys: Lunaponics" and "Wooden Moshine: Solaponics".
리그누미스 - 감독판을 플레이해 주셔서 감사합니다!\n이것은 제가 원했던 방식이지만, 대부분의 플레이어는 모든 제작법에 나무를 추가하고 게임 전체를 바꾸는 방식을 좋아하지 않았습니다. 이제 모든 행성, 심지어 우주선에서도 나무가 필요할 수 있으니 미리 준비하세요.\n\n[img=utility/warning_icon] 많은 모드 설정이 강제 조정 및 숨겨질 것입니다. 설정을 찾을 수 없다면 감독판을 플레이하기 때문일 수 있습니다.\n[img=utility/warning_icon] 다른 모드 행성을 추가하길 원한다면, 다른 행성에서 나무를 제작할 수 있는 관련 모드를 찾아보세요: "Wooden Cerys: Lunaponics", "Wooden Moshine: Solaponics" 등.


