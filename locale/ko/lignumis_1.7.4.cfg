[mod-setting-description]
lignumis-infinite-astroponics-productivity-research=우주재배학 생산성 연구를 레벨 5(생산성 50%)로 제한되지 않고 무한대로 진행할 수 있도록 합니다.
lignumis-ammo-progression=화기용 탄창 제작에 나무 다트 탄창이 필요하도록 합니다.
lignumis-assembler-progression=활성화하면, 조립 기계 1을 제작하는데 화력 조립 기계가 필요하도록 수정합니다.
lignumis-basic-circuit-board=새로운 게임이라면 활성화하는 것을 매우 권장합니다. (추후 필수 옵션으로 변경될 예정)\n\n활성화하면, 제작법이 금 전선과 금 판 대신 기본 회로 기판을 적절하게 사용하도록 합니다. 금과 구리 제작법이 모두 추가될 예정입니다.
lignumis-belt-progression=일반 운송 벨트에 (노란색) 나무 벨트가 필요하도록 합니다.
lignumis-circuit-progression=활성화하면, 전자 회로를 제작하는 데 기본 회로 기판이 필요하도록 수정합니다.
lignumis-double-rocket=임시 로켓이 화물을 40 -> 80슬롯만큼 수용할 수 있도록 합니다.
lignumis-early-robots=개인용 로봇을 조금 더 빠르게, 증기 과학이 아닌 목재 과학 단계에서 사용할 수 있도록 합습니다.
lignumis-fulgora-wood=활성화하면, 고철 재활용을 통해 목재 톱니바퀴를 획득할 수 있도록 하여, 목재 공급원으로 활용할 수 있게 됩니다. 이 옵션을 비활성화하면 다른 목재 공급원을 제공하는 모드를 활성화하거나, 다른 행성으로부터 필요한 목재를 전부 수입해야 할 필요성이 생깁니다.
lignumis-inserter-progression=일반 투입기에 (노란색) 화력 투입기가 필요하도록 합니다.
lignumis-lumber-mill-more-recipes=활성화하면, 제재소에서 기본 포탑, 화력 조립 기계, 화력 투입기를 제작할 수 있도록 합니다. 모든 점진적 제작법 옵션을 활성화하면 목재 사용량 밸런스가 개선되며, 마라톤 설정으로 진행하는 게임에서도 도움이 됩니다.
lignumis-sciences-spoil=나무 과학 팩과 증기 과학 팩 모두의 제작 난이도를 증가시킵니다.
lignumis-technology-progression=대부분의 게임 후반 기술 연구에 나무 & 증기 과학 팩이 필요하도록 합니다. 이 옵션을 비활성화하면 게임 후반 연구에 리그누미스 과학 팩의 필요성이 사라집니다.
lignumis-vanilla-lab=운송 벨트 제작법을 '철 가공' 기술로 이동하여 '물류' 연구를 진행하지 않더라도 원래 제작법의 연구소를 제작할 수 있도록 합니다.
lignumis-electric-lumber-mill=제재소가 화력 연료 대신 전기를 소비하고, 전력 관련 기술을 연구한 뒤 사용할 수 있도록 수정합니다.
lignumis-lab=운송 벨트 제작법을 물류 연구로 이동하고, 연구소 제작에 나무 벨트가 필요하도록 하여, 나우비스에 착륙한 직후에도 제작할 수 있도록 수정합니다.
lignumis-k2so-gold-tech-card=후반 기술 연구에 나무 과학이나 증기 과학 대신, 리그누미스의 금을 이용해 제작할 수 있는, 황금 기술 카드가 필요하도록 합니다. '점진적 기술 연구 활성화' 옵션이 켜져 있어야 합니다.