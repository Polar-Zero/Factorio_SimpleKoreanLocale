[mod-name]
platform-construction-reader=우주 플랫폼 건설에 조합기 필요(Platform Construction Needs Reader)

[mod-description]
platform-construction-reader=건설된 플랫폼과 동기화되어, 1번째 물류 섹션을 업데이트하는 조합기를 게임에 추가합니다.\n\n번역: SimpleKoreanLocale(PolarZero)


[desc]
cr_construction_reader=우주 플랫폼에만 건설할 수 있습니다. 이 조합기는 주기적으로 첫 번째 물류 섹션을 건설 중인 우주 플랫폼의 '아이템 요청 목록'을 확인하고 동기화합니다.
cr_setting_limit=건설 조합기의 총 처리량을 분할할 횟수입니다 (갱신 당 틱). 매 틱 (1/60초)마다 하나의 분할 부분이 처리됩니다. 이 수치를 높이면 건설 조합기의 업데이트 지연 시간이 증가합니다. 기본값일 경우 각 건설 조합기는 최소 8틱마다 한 번씩 업데이트됩니다. 1로 설정되었다면 모든 건설 조합기가 매 틱마다 업데이트됨을 의미합니다.__ITEM__skl-txtra0__8__ITEM__skl-txtre__
cr_tech=우주 플랫폼 내 허브의 "아이템 요청 목록"을 출력하는 새로운 조합기를 사용할 수 있게 됩니다.

[name]
cr_construction_reader=우주 플랫폼 건설에 조합기 필요
cr_ipl_starter_pack=우주 플랫폼 스타터 팩 (IPL 안테나, 건설 조합기 포함)
cr_setting_limit=분할
cr_tech=플랫폼 요청 목록 탈취

[wiki]
cr_construction_reader=우주 플랫폼에만 건설할 수 있습니다. 이 조합기는 주기적으로 첫 번째 물류 섹션을 건설 중인 우주 플랫폼의 '아이템 요청 목록'을 확인하고 동기화합니다. 기본적으로 최소 7.5틱마다 갱신되며, 갱신 간격은 모드 설정에서 변경할 수 있습니다.