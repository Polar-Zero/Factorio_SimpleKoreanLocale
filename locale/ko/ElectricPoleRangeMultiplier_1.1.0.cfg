[mod-name]
ElectricPoleRangeMultiplier=전신주 범위 배율(Electric Pole Range Multiplier)

[mod-description]
ElectricPoleRangeMultiplier=전신주와 변전소의 작동 범위를 간단한 설정값 조정을 통해 조정할 수 있도록 합니다. 다른 모드의 전신주에도 적용됩니다.\n\n번역: SimpleKoreanLocale(PolarZero)


[mod-setting-name]
ElectricPoleRangeMultiplier-maximum-gap=최대 간격
ElectricPoleRangeMultiplier-range-factor=작동 범위 배율

[mod-setting-description]
ElectricPoleRangeMultiplier-maximum-gap=공급 영역 사이에 전원 미공급 지역이 이 값 이상 발생하지 않도록 전선 거리를 제한합니다. 간격 없이 클릭 + 드래그 건설를 허용하려면 0 (또는 약간의 대각선 여유를 두려면 0.5)로 설정하세요.
ElectricPoleRangeMultiplier-range-factor=모든 전신주의 공급 범위와 전선 연결 거리를 이 배율값만큼 곱합니다.