[mod-description]
kj_2a6=레오파르트 2A6을 게임에 추가합니다.\n\n번역: SimpleKoreanLocale(PolarZero)
kj_40kbaneblade=워해머 40,000의 인류 제국 초중형 전차 "베인블레이드"를 게임에 추가합니다.\n\n번역: SimpleKoreanLocale(PolarZero)
kj_40kbunker=워해머 40,000 세계관의 벙커를 게임에 추가합니다.\n\n번역: SimpleKoreanLocale(PolarZero)
kj_40kdreadnought=워해머 40,000 세계관의 드레드노트를 게임에 추가합니다. 대포와 볼터를 가지고 있으며 명령에 따라 말을 할 수 있습니다.\n\n번역: SimpleKoreanLocale(PolarZero)
kj_40klemanruss=워해머 40,000 세계관의 리만 러스 전차를 게임에 추가합니다.\n\n번역: SimpleKoreanLocale(PolarZero)
kj_40kpredator=워해머 40,000의 프레데터 어나힐레이터 탱크를 게임에 추가합니다.\n\n번역: SimpleKoreanLocale(PolarZero)
kj_747=보잉 747를 게임에 추가합니다. AircraftRealism 모드와 함께 사용하면 적군보다 더 높게 날아다닐 수 있습니다. 이륙 속도에 도달하면 비행기는 '대공'을 제외한 다른 데미지 유형에 무적이 됩니다. 이 수송용 비행기는 무기는 없지만 화물 적재 공간이 상대적으로 넓습니다.\n\n번역: SimpleKoreanLocale(PolarZero)
kj_aventador=람보르기니 아벤타도르를 게임에 추가합니다.\n\n번역: SimpleKoreanLocale(PolarZero)
kj_b2=B-2 스피릿 폭격기를 게임에 추가합니다. AircraftRealism 모드와 함께 사용하면 적 위를 날아다니며 폭탄을 투하할 수 있습니다. 이륙 속도에 도달하면 비행기는 '대공'을 제외한 다른 데미지 유형에 무적이 됩니다. 이 비행기는 폭격기이며, 대공 데미지를 주지 않으므로 지상 목표물에만 사용하세요.\n\n번역: SimpleKoreanLocale(PolarZero)
kj_b17=B-17을 게임에 추가합니다. AircraftRealism 모드와 함께 사용하면 적 위를 날아다니며 폭탄을 투하할 수 있습니다. 이륙 속도에 도달하면 비행기는 '대공'을 제외한 다른 데미지 유형에 무적이 됩니다.\n\n번역: SimpleKoreanLocale(PolarZero)
kj_b29=B-29를 게임에 추가합니다. AircraftRealism 모드와 함께 사용하면 적 위를 날아다니며 폭탄을 투하할 수 있습니다. 이륙 속도에 도달하면 비행기는 '대공'을 제외한 다른 데미지 유형에 무적이 됩니다.\n\n번역: SimpleKoreanLocale(PolarZero)
kj_bf109=Bf-109를 게임에 추가합니다. AircraftRealism 모드와 함께 사용하면 적 위를 날아다니며 폭탄을 투하할 수 있습니다. 이륙 속도에 도달하면 비행기는 '대공'을 제외한 다른 데미지 유형에 무적이 됩니다. 이 비행기는 전투기이며, 높은 대공 데미지를 입히므로 다른 비행기를 상대로 사용하기에 적합합니다.\n\n번역: SimpleKoreanLocale(PolarZero)
kj_bulldozer=숲과 바위더미를 평평하게 만들 수 있는 불도저를 게임에 추가합니다. '무기'를 사용하면 엔진 속도를 더 빠르게 할 수 있으며, 나무와 돌에 막히지 않고 나가는 데 이를 적극적으로 활용할 수 있습니다.
kj_countach=색상 옵션 선택 기능을 지원하는, 람보르기니 쿤타치 88을 게임에 추가합니다.\n\n번역: SimpleKoreanLocale(PolarZero)
kj_cybertruck=사이버트럭을 게임에 추가합니다.\n\n번역: SimpleKoreanLocale(PolarZero)
kj_dakka_arty=대포를 위험을 가져오는 지옥의 기관총으로 바꿔버립니다. 새롭게 나온 약한 탄약을 사용한다는 전제 하에요. 결국에는 균형을 좀 맞춰야 합니다 ;D
kj_delorean=들로리언 자동차를 게임에 추가합니다.\n\n번역: SimpleKoreanLocale(PolarZero)
kj_dodge=크라이슬러 머슬카 닷지 차저를 게임에 추가합니다. 색상은 플레이어 색상과 동일하게 적용됩니다.\n\n번역: SimpleKoreanLocale(PolarZero)
kj_firetruck=큰 적재 공간을 갖춘 소방차를 게임에 추가합니다.\n\n번역: SimpleKoreanLocale(PolarZero)
kj_fordmustang=포드 머스탱 자동차를 게임에 추가합니다.\n\n번역: SimpleKoreanLocale(PolarZero)
kj_gigahorse='매드 맥스: 분노의 도로' 영화에 등장하는 기가 호스를 게임에 추가합니다.
kj_ho229=Ho-229를 게임에 추가합니다. AircraftRealism 모드와 함께 사용하면 적 위를 날아다니며 폭탄을 투하할 수 있습니다. 이륙 속도에 도달하면 비행기는 '대공'을 제외한 다른 데미지 유형에 무적이 됩니다. 이 비행기는 전투기이며, 높은 대공 데미지를 입히므로 다른 비행기를 상대로 사용하기에 적합합니다.\n\n번역: SimpleKoreanLocale(PolarZero)
kj_ju52=Ju-52를 게임에 추가합니다. AircraftRealism 모드와 함께 사용하면 적군보다 더 높게 날아다닐 수 있습니다. 이륙 속도에 도달하면 비행기는 '대공'을 제외한 다른 데미지 유형에 무적이 됩니다. 이 수송용 비행기는 무기는 없지만 화물 적재 공간이 상대적으로 넓으며, 더 낮은 속도에서도 이륙할 수 있습니다.\n\n번역: SimpleKoreanLocale(PolarZero)
kj_ju87=Ju-87를 게임에 추가합니다. AircraftRealism 모드와 함께 사용하면 적 위를 날아다니며 폭탄을 투하할 수 있습니다. 이륙 속도에 도달하면 비행기는 '대공'을 제외한 다른 데미지 유형에 무적이 됩니다.\n\n번역: SimpleKoreanLocale(PolarZero)
kj_jug38=Ju G38를 게임에 추가합니다. AircraftRealism 모드와 함께 사용하면 적군보다 더 높게 날아다닐 수 있습니다. 이륙 속도에 도달하면 비행기는 '대공'을 제외한 다른 데미지 유형에 무적이 됩니다. 이 수송용 비행기는 무기는 없지만 화물 적재 공간이 상대적으로 넓으며, 더 낮은 속도에서도 이륙할 수 있습니다.\n\n번역: SimpleKoreanLocale(PolarZero)
kj_king_jos_planes=King Jo의 비행기와 대공포 모드를 종속성으로 추가합니다.\n\n번역: SimpleKoreanLocale(PolarZero)
kj_king_jos_vehicles=King Jo의 모든 비행하지 않는 차량 모드를 종속성으로 추가합니다.\n\n번역: SimpleKoreanLocale(PolarZero)
kj_maustank=8호 전차 마우스를 게임에 추가합니다. (PzKpfW 8 'Maus')\n\n번역: SimpleKoreanLocale(PolarZero)
kj_pak=독일군의 88mm PaK 43 대전차포를 게임에 추가합니다. 차량 및 포탑 형태를 사용할 수 있습니다.\n\n번역: SimpleKoreanLocale(PolarZero)
kj_panzer4=독일군의 4호 전차를 게임에 추가합니다. (Panzer IV)\n\n번역: SimpleKoreanLocale(PolarZero)
kj_phalanx=공중 표적을 효과적으로 파괴할 수 있는 팰렁스 CIWS를 게임에 추가합니다. 그렇습니다, 이 포탑은 trigger_target_mask가 'air-unit'인 개체만 공격할 수 있습니다. 이는, 다른 모드가 공중 유닛 마스크를 지정시켜야 표적이 될 수 있음을 의미하지만, 모드 옵션에서 일반 적도 대상으로 할 수 있는 포탑 버전을 활성화할 수 있습니다! 드르륵 소리 포함!\n\n번역: SimpleKoreanLocale(PolarZero)
kj_plymouth=색상 선택이 가능한, 플리머스 퓨리를 게임에 추가합니다.\n\n번역: SimpleKoreanLocale(PolarZero)
kj_rattetank_graphics=육상순양함 Landkreuzer P.1000 라테를 위한 고해상도 그래픽을 포함합니다.\n\n번역: SimpleKoreanLocale(PolarZero)
kj_rattetank=육상순양함 Landkreuzer P.1000 라테를 게임에 추가합니다. 이제 고해상도 그래픽이 포함됩니다!\n\n번역: SimpleKoreanLocale(PolarZero)
kj_ray=메탈기어 솔리드 세계관에 등장하는 레이를 게임에 추가합니다. 강력한 로켓 발사기, 기관총, 레일건을 사용할 수 있으며, 물 속을 걸을 수 있습니다. 물에 들어가면 물에 잠긴 모습으로 변신합니다.\n\n번역: SimpleKoreanLocale(PolarZero)
kj_rex=메탈기어 솔리드 세계관에 등장하는 렉스를 게임에 추가합니다. 강력한 로켓 발사기, 기관총, 레일건을 사용할 수 있습니다.\n\n번역: SimpleKoreanLocale(PolarZero)
kj_swspeeder=스타워즈의 탈것으로 널리 알려진 스피더 바이크를 게임에 추가합니다. 최대 500km/h까지 속력으을 낼 수 있습니다. 매우 특별한 에너지를 소비하는 블라스터 무기가 함께 제공됩니다.\n\n번역: SimpleKoreanLocale(PolarZero)
kj_tower=기관총으로 무장한 감시탑을 게임에 추가합니다.\n\n번역: SimpleKoreanLocale(PolarZero)
kj_truck=트럭 기관차와, 트레일러 화물차를 게임에 추가합니다. 또한 도로 스킨을 가진 철도 역시 추가합니다. 색상 옵션 선택이 가능하며, 언젠가 비주얼을 개선할 예정입니다.\n\n번역: SimpleKoreanLocale(PolarZero)
kj_utilitarian=큰 적재 공간을 가진 범용 트럭을 추가합니다. AAI Ironclad(아이언클래드 / 박격포) 모드를 지원합니다.\n\n번역: SimpleKoreanLocale(PolarZero)
kj_vierling=공중 표적을 효과적으로 파괴할 수 있는, 2cm-Flak-Vierling (4연장 대공포)를 게임에 추가합니다. 그렇습니다, 이 포탑은 trigger_target_mask가 'air-unit'인 공중 개체만을 표적으로 삼습니다. 즉, 다른 모드에서 공중 유닛 마스크를 지정한, 캐릭터 등 객체만을 의미합니다.\n\n번역: SimpleKoreanLocale(PolarZero)
kj_warrig=매드 맥스: 분노의 도로' 영화에 등장하는 전투 트럭을 자동차와 기관차 버전으로 각각 추가합니다. 기관차와 더불어 화물차, 유체 화물차 버전이 있으며, 아, 그리고 도로도 추가합니다.
kj_wirbelwind=독일군의 Flakpanzer IV 'Wirbelwind'. 대공 탱크 '회오리바람'을 게임에 추가합니다. 대공 공격 장비로 설계되었지만, 지상 객체에도 데미지를 줄 수 있습니다.\n\n번역: SimpleKoreanLocale(PolarZero)
kj_xb35=XB-35 폭격기를 게임에 추가합니다. AircraftRealism 모드와 함께 사용하면 적 위를 날아다니며 폭탄을 투하할 수 있습니다. 이륙 속도에 도달하면 비행기는 '대공'을 제외한 다른 데미지 유형에 무적이 됩니다. 이 비행기는 폭격기이며, 대공 데미지를 주지 않으므로 지상 목표물에만 사용하세요.\n\n번역: SimpleKoreanLocale(PolarZero)

