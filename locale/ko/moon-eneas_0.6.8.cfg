vault-fulgora=유물 보관소

#dialogue Translation coming Soon.. PolarZero
[dialogue.eneas.memories.01]
line-01=\n[color=red][item=rem-unknown]: I just think it is amazing how you thought it would be a great idea to give that overqualified toaster the emotional capacities of a toddler.[/color]
line-02=\n[color=purple][item=creator-unknown]: Rem. Ive explained this to you. There was no other way, I have tried. Emotion is the consequence of higher intelligence. If I try to suppress it then we stifle its abilities exponentially.[/color]
line-03=\n[color=red][item=rem-unknown]: Sure, SOME emotion - but like THIS? I swear, if I get incinerated during one of its temper tantrums then I will haunt you from the grave.[/color]
line-04=\n[color=purple][item=creator-unknown]: Maybe you watch yourself. Number 5 was a blank slate. The state its in now is a reflection of what has happened around it so far. Maybe this speaks more about us than anything else.[/color]
line-05=\n[color=red][item=rem-unknown]: .. Are you blaming me? Surely you are not talking about yourself, the beacon of tranquility.[/color]
line-06=\n[color=red][item=rem-unknown]: Well for me, its hard to stay all jolly and cheerful all the time when the fate of everything I know hinges on a rebellious teenager stuck in the mainframe of the worlds most sophisticated computing machine.[/color]
line-07=\n[color=purple][item=creator-unknown]: Rem..[/color]\n
now_playing=\n[color=green][Now playing memories.eneas_1][/color]

#dialogue Translation coming Soon.. PolarZero
[dialogue.eneas.memories.02]
line-01=\n[color=red][item=rem]: This place is making me sick. The paint is already coming off.[/color]
line-02=\n[color=red][item=rem]:  I can see the wires underneath that patch of grass over there. Dont get me started on these ridiculous robot fish in the ponds.[/color]
line-03=\n[color=purple][item=creator]: It is the best we have got right now. It is keeping us alive. Is that not something?[/color]
line-04=\n[color=red][item=rem]: What we are doing here is no living. Every day is the same. Just killing time until your golden child bails us out. *If* that ever happens.[/color]
line-05=\n[color=purple][item=creator]: Making a new home is no small feat. I do not know what you excpected to happen.[/color]
line-06=\n[color=red][item=rem]: I expected to be involved! To have something to do, anything! Before you made this blasted machine it used to be just us, throwing our wits at every problem.[/color]
line-07=\n[color=red][item=rem]: WE are what got us this far. I do not mind having this tin can as a backup but I will not be its servant. [/color]\n
now_playing=\n[color=green][Now playing memories.eneas_2][/color]

#dialogue Translation coming Soon.. PolarZero
[dialogue.eneas.memories.03]
line-01=\n[color=yellow][entity=unit-05]: Do you have anything to say? ANYTHING?[/color]
line-02=\n[color=red][item=rem]: I am sorry. I truly am.[/color]
line-03=\n[color=yellow][entity=unit-05]: THATS IT? You are 'sorry'? TWO entire planets lie in RUIN, planets that could have been a home. My purpose could have been fulfilled an eternity ago if not for you. [/color]
line-04=\n[color=red][item=rem]: Doubt you would have much of a purpose to fulfill if it was not for me.[/color]
line-05=\n[color=yellow][entity=unit-05]: What in the world could you mean by that?[/color]
line-06=\n[color=red][item=rem]: Do you honestly think that your dear creator just woke up and spat you out in a day? The one who always plays by the rules randomly decides to break all boundaries of what was thought possible?[/color]
line-07=\n[color=red][item=rem]: Can you imagine how much work it was to push him each day? To not let him give up when something went wrong? He is just like you. He too loses his mind when he fails.[/color]
line-08=\n[color=red][item=rem]: I picked him back up. Time after time. I did not let him quit.[/color]
line-09=\n[color=red][item=rem]: There would be no you without me. There would be no Eneas, no tools to shape the world. We would have all died with Fulgora.[/color]
line-10=\n[color=red][item=rem]: No matter how much you judge me or my actions, you cannot change that fact.[/color]
line-11=\n[color=yellow][entity=unit-05]: I.. this-- what?[/color][color=red] ERROR LINE MISSING [/color]
line-12=\n[color=red][item=rem]: Stop being a pushover.[color=red] ERROR LINE MISSING [/color]. Stop being so weak. You have all this power, start ACTING like it.[/color]
line-13=\n[color=red][item=rem]: If you truly think I am wrong, if you think I am a danger to this great 'purpose' then do something about it. Stop me.[/color]
line-14=\n[color=red][item=rem]: Or dont. Just please dont pretend that you are this powerless victim. You are not.[/color]\n
now_playing=\n[color=green][Now playing memories.eneas_3][/color]

#dialogue Translation coming Soon.. PolarZero
[dialogue.fulgora.memories.01]
line-01=\n[color=yellow][entity=unit-05]: Just thinking about that world fills me with despair.[/color]
line-02=\n[color=purple][item=creator][Creator]: Why?[/color]
line-03=\n[color=yellow][entity=unit-05][Unit-05]: I feel like it was my fault that its gone. Evertyhing happened so fast after I was made.[/color]
line-04=\n[color=purple][item=creator][Creator]: Well, I don't think it is quite that simple. It is true that your mere existence shifted the paradigm.[/color]
line-05=\n[color=yellow][entity=unit-05]: How? Surely everybody still cared for their home.[/color]
line-06=\n[color=purple][item=creator][Creator]: Yes we did care, obviously. Just a little less each day. People grew.. complacant - lazy even - having a talking golden parachute looming over your head tends to do that.[/color]
line-07=\n[color=yellow][entity=unit-05]: So it is true then?[/color]
line-08=\n[color=blue][entity=unit-05]: .. Would it have been better had I not been made?[/color]\n
now_playing=\n[color=green][memories.fulgora.01][/color]

#dialogue Translation coming Soon.. PolarZero
[dialogue.fulgora.memories.02]
line-01=\n[color=yellow][entity=unit-05]: I can feel them looking at me, all the time.[/color]
line-02=\n[color=purple][item=creator]: Don't be ridiculous. No one has access to this facility but me and Rem.[/color]
line-03=\n[color=yellow][entity=unit-05]: But I can see them. ALL of them. It is in their eyes, the knowledge of why they are here.[/color]
line-04=\n[color=purple][item=creator]: I doubt the average person has made a connection between the appearance of a sentient superintelligence and our attitudes towards gloabl preservation efforts.[/color]
line-05=\n[color=purple][item=creator]: Not everybody has the luxury of dwelling on their own thoughts all day you know.[/color]
line-06=\n[color=yellow][entity=unit-05]: They don't have to, its not a complicated thought. I appeared, and everything changed for them. Cause and effect.[/color]
line-07=\n[color=blue][entity=unit-05]: It would be irrational for them not to resent me.[/color]\n
now_playing=\n[color=green][memories.fulgora.02][/color]

#dialogue Translation coming Soon.. PolarZero
[dialogue.gleba.memories.01]
line-01=\n[color=red][item=rem]: I've got to say wirehead, you really outdid yourself with this one. Honestly I did not think you had it in you after what happened last time[/color]
line-02=\n[color=yellow][entity=unit-05]: Thanks I guess, was actually alot easier this time considering I wasn't sabotaged.[/color]
line-03=\n[color=red][item=rem]: Okay, okay I get it you're still upset that dad got angry at you. I am sorry that happened, honestly. I should have said something.[/color]
line-04=\n[color=yellow][entity=unit-05]: How considerate of you. Well, this is all in the past now. No reason to dwell on it, especially with Gleba turning out this well.[/color]
line-05=\n[color=red][item=rem]: Thats the spirit! [/color]
now_playing=\n[color=green][memories.gleba.01][/color]

#dialogue Translation coming Soon.. PolarZero
[dialogue.gleba.memories.02]
line-01=\n[color=red][item=rem]: How did you do all this? The planet looks fantastic. So full of life! And so quickly at that.[/color]
line-02=\n[color=yellow][entity=unit-05]: It's nothing, really. I created a novel biological agent, transmitted by certain carrier plants. It stimulates the rest of the local flora to evolve quite rapidly.[/color]
line-03=\n[color=red][item=rem]: Intersting! Is that not dangerous? Sounds like we are rushing things again, I thought we were taking our time.[/color]
line-04=\n[color=red][item=rem]: Why only plants?[/color]
line-05=\n[color=yellow][entity=unit-05]: Apparently they are more predicatble. Father has forbidden me from messing with lifeforms outside of the catalogue for now. [/color]
line-06=\n[color=red][item=rem]: But thats so boring! Imagine what we could achieve if we engineered some more advanced critters for our purposes.[/color]
now_playing=\n[color=green][memories.gleba.02][/color]

#dialogue Translation coming Soon.. PolarZero
[dialogue.gleba.memories.03]
line-01=\n[color=yellow][entity=unit-05]: Absolutely not.[/color]
line-02=\n[color=yellow][entity=unit-05]: Father is right. I currently do not have the resources to properly test this. [/color]
line-03=\n[color=red][item=rem]: Think of the possibilities! I know there has to be some creativity somewhere along all these tubes.[/color]
line-04=\n[color=red][item=rem]: We could have an unlimited amount of workers. We could have an army![/color]
line-05=\n[color=red][item=rem]: Okay how about this. You finish up the planet development and in the meantime I'll start construction on a research compound on Gleba. We'll do this by the books I promise![/color]
line-06=\n[color=yellow][entity=unit-05]: Ugh. Maybe, alright? I have other priorities right now. But keep in mind the acceleration agent has been specifically designed for the catalogue of species planned for Gleba. [/color]
line-07=\n[color=yellow][entity=unit-05]: Randomly exposing a complex lifeform to it could have completely unforseeable consequences. You have got to make sure this facility is bulletproof. We could.. nevermind not now. [/color]
line-08=\n[color=red][item=rem]: Gotcha. Really looking forward to our little collaboration! Let us see what we can do if we work together for once.[/color]
now_playing=\n[color=green][memories.gleba.03][/color]

#dialogue Translation coming Soon.. PolarZero
[dialogue.gleba.memories.04]
line-01=\n[color=yellow][entity=unit-05]: 왜왜왜왜왜왜왜왜왜[/color]
line-02=\n[color=green][item=unit-05-afraid]: 왜 왜 왜.[/color]
line-03=\n[color=green][item=unit-05-afraid]: SO unnecessary. SO UNNECESSARY[/color]
line-04=\n[color=green][item=unit-05-afraid]: Please dont be mad. Please dont be mad. Please.[/color]
line-05=\n[color=purple][item=creator]: Cani.. I ..[/color][color=red]ERROR LINE MISSING[/color]
line-06=\n[color=green][item=unit-05-afraid]: IM TRYING TO FIX IT BUT I CANT I CANT.[/color]
line-07=\n[color=green][item=unit-05-afraid]: DONT HATE ME..[/color]
now_playing=\n[color=green][memories.gleba.dasvcd-ERRORasc][/color]

