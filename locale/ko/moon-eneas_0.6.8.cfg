[entity-description]
auto-deconstruct-radar=훨씬 더 넓은 표시 반경을 가진, 고급 레이더입니다. 회로 네트워크에 연결하면 신호에 따라 자동으로 개체를 해체하도록 명령할 수도 있습니다.\n\n[virtual-signal=signal-mining] 신호를 통해 지면의 아이템을 해체하도록 명령하는 것도 가능합니다.
debris-a=나우비스 위성 중 하나에서 발생한 대형 외계 파편. 고대 기술의 흔적이 담겨 있습니다. 직접 회수하면 더 귀중한 아이템을 얻을 수 있습니다.
debris-b=나우비스 위성 중 하나에서 발생한 중형 외계 파편. 고대 기술의 흔적이 담겨 있습니다. 직접 회수하면 더 귀중한 아이템을 얻을 수 있습니다.
debris-c=나우비스 위성 중 하나에서 발생한 소형 외계 파편. 고대 기술의 흔적이 담겨 있습니다. 직접 회수하면 더 귀중한 아이템을 얻을 수 있습니다.
eneas-generator=고대 기술을 기반으로 한 건물은 스스로 전력을 발전하도록 건설되었기에, 대규모 발전소가 필요하지 않습니다.\n\n[entity=unit-05] 유닛-05는 당신들이 도착할 것을 예상한 뒤 이 기본적인 에너지 인터페이스를 준비했습니다.
eneas-lift=이니스 지하 공장에서 지상으로 자원을 운반합니다. 주기당 생산량은 현재 이니스 공해수준에 따라 달라집니다.\n\n[entity=eneas-lift] 리프트 관련 기술을 연구하면 생산량을 더욱 향상시킬 수 있습니다.
eneas-vent=[planet=eneas] 이니스 표면 깊은 곳에는 거의 끝없을 정도로 많은 오염/공해 물질이 갇혀 있습니다. 이 배출구는 때때로 유닛-05의 주의를 분산시키는 유독 가스를 내뿜습니다.\n\n배출구를 막거나 파괴해도 가스가 다른 경로로 올라오기에 도움이 되지 않을 것입니다.
unit-05=[entity=unit-05] 유닛-05의 주 피질입니다. 잃어버린 메모리 아이템을 복원하려면 [item=ambition-science-pack] 메모리 팩이 필요합니다.\n[item=significant-data-card] 데이터 연료를 공급받아야 합니다.

