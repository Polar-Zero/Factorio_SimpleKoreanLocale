page_data_text_4=T내용이 곧 추가될 예정입니다!
page_debris_text_1=파편 충돌
page_debris_text_2=It seems that the [planet=eneas] moon above Nauvis is unstable and constantly loses material, crashing down on the surface of its [planet=nauvis] neighbor. Both celestial bodies appear to be tidally locked, concentrating the crash events around a consistent region.\n
page_debris_text_3=[color=yellow][entity=unit-05] Debris map tags can be annoying. So do not worry! They will be cleaned up automatically every 15 minutes, granted there are no debris pieces near them. [/color]
page_debris_text_4=\n보물
page_debris_text_5=While the pieces of [item=eneas-artifact] ancient machinery that can be salvaged from the debris already seem valuable, there are even more useful pieces of loot hidden among it.\nUncovering them requires a certain amount of skill and precision, that only the engineer themselves can muster. Mining the debris automatically with [item=construction-robot] robots will only yield the base resources without a chance of a rare drop.\n
page_eneas_text_1=To anyone playing the mod
page_eneas_text_2=Thank you so much for checking out Eneas! If you have any kind of feedback, ideas or criticism feel free to contact me via the mod portal, or on the foundry discord server. While Eneas is now officialy released, I am still actively working and improving the mod. All relevant pieces of content and mechanics are in place, but it is still really rough around the edges.
page_eneas_text_3=면책 사항
page_eneas_text_4=Some things in this mod are still incomplete. There are some buildings without proper animation. There are also incomplete Informatron pages.
page_fulgora_text_1=풀고라
page_fulgora_text_2=내용이 곧 추가될 예정입니다!
page_generator_text_1=발전기
page_generator_text_2=내용이 곧 추가될 예정입니다!
page_generator_text_3=\n발전기
page_generator_text_4=내용이 곧 추가될 예정입니다!
page_gleba_text_1=글레바
page_gleba_text_2=내용이 곧 추가될 예정입니다!
page_lift_text_1=리스트
page_lift_text_2=The [entity=eneas-lift] Lift is one of the last remaining access points to the manufacturing facilities in the underbelly of Eneas. Using this lift, [entity=unit-05] Unit-05 can support you with resources each cycle on Eneas (15 minutes). Per default, it is producing the basic Eneas reources, [item=ancient-circuit] ancient circuits, [item=ancient-frame] ancient frames and [item=ancient-material] ancient material.
page_lift_text_3=\n생산량
page_lift_text_4=You can increase the yield of these deliveries in two ways: First by removing the pollution levels on Eneas. When the surface is clean, then Unit-05 has better focus and can produce more resources for you. Second, you can research new technologies to both increase the total amount of resources generated aswell as add new items to the pool.
page_memories_text_1=기억
page_memories_text_2=내용이 곧 추가될 예정입니다!
page_pollution_text_1=공해
page_pollution_text_2=Every cycle (15 minuntes) a variable amount of pollution will be [entity=eneas-vent] vented from the vast underground of Eneas to its surface. Long ago, Eneas was able to manage itself, but the time has since passed. You can remove pollution on Eneas using some of the new buildings. For example the [entity=clarifier] Clarifier building.\n\n Pollution checks happen before new pollution is added in the next cycle. If pollution is too high, then [entity=unit-05] Unit-05 will be disabled for the remainder of the cycle. Lowering the pollution will enable Unit-05 to work again.
page_pollution_text_3=\n배출구
page_pollution_text_4=배출구 자체는 지하의 오염 물질을 배출하기만 하며, 다른 해는 끼치지 않습니다. 단 어떻게든 배출구를 파괴할 수 있다면 ([color=yellow][entity=unit-05] 어떻게 파괴했는지 알려주세요![/color]), 그 오염은 지도의 무작위 지점으로 대신 배출될 것입니다. 환기구가 있는 청크는 항상 가장 많은 공해를 가질 것이기에, 배출구를 파괴하는 대신 공해를 많이 유발하는 건물을 배출구 근처에 건설하는 것을 추천합니다. 참고: 공해 확인 과정은 특정 청크만이 아닌, 모든 청크의 공해 합계치를 고려합니다.
