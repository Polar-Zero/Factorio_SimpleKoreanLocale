[technology-description]
advanced-radar=훨씬 더 넓은 표시 반경을 가진, 고급 레이더입니다. 회로 네트워크에 연결하면 신호에 따라 자동으로 개체를 해체하도록 명령할 수도 있습니다.\n\n[virtual-signal=signal-mining] 신호를 통해 지면의 아이템을 해체하도록 명령하는 것도 가능합니다.
ambition-science-pack=유닛-05 메모리 재구성에 사용됩니다.
anger-science-pack=유닛-05 메모리 재구성에 사용됩니다.
artifact-analysis-basic=나우비스 곳곳에서 발견되는 [item=eneas-artifact] 유물을 분석합니다. 아직 그 용도를 알 수는 없지만, 분해하면 유용한 보급품을 얻을 수 있을 것입니다.
artifact-analysis-expert=[작업 중] 이니스 전반부는 (파트 1) 여기서 종료되지만, 아퀼로와 게임 후반부는 이니스 후반부 (파트 2)에서 다루게 될 것입니다.
artifact-drilling=이니스 지하에서 직접 유물를 추출할 수 있게 됩니다.
basic-data-management=공장의 여러 부분을 개선할 수 있도록, 기본적인 데이터 기반 도구를 만드는 방법을 알아보세요.
codex-tech=[entity=unit-05] 유닛-05가 [item=notable-codex] 중요 코덱스를 생산할 수 있도록 합니다. 주변 공해도가 낮을수록 생산량이 증가하며, 아이템은 생산 간격마다 [entity=eneas-lift] 자원 리프트로 전달됩니다.\n\n참고: 중요 코덱스는 [item=significant-data-card] 중요 데이터보다 더 효율적인 연료 공급을 가능하게 합니다.
engineer-assembler=엔지니어 기술에서 영감을 받은 고급 조립 기계입니다. 자체적인 생산성 보너스를 제공하며, 작동에 전력이 필요하지 않지만, 데이터가 지속적으로 공급되어야 합니다.
fear-science-pack=유닛-05 메모리 재구성에 사용됩니다.
grief-science-pack=유닛-05 메모리 재구성에 사용됩니다.
lesser-ai=[entity=unit-05] 유닛-05가 [item=ambition-science-pack] 메모리 팩을 처리할 수 있도록 하는 매우 기본적인 인공지능입니다.
lurker-tech=이니스 진흙 아래에 무언가 살고 있는 것 같습니다.
module-tech=유물 부품을 이용하면, 모듈의 일반적인 성능을 개선시킬 수 있습니다.
module-tech-2=고대 코어를 사용하면, 고급 모듈의 일반적인 성능을 개선시킬 수 있습니다.
oil-tech=[entity=unit-05] 유닛-05가 [item=heavy-oil-barrel] 중유 배럴을 생산할 수 있게 합니다. 주변 공해도가 낮을수록 생산량이 증가하며, 아이템은 생산 간격마다 [entity=eneas-lift] 자원 리프트로 전달됩니다.
planet-discovery-eneas=나우비스와 비슷한 기후를 가진, 보다 작고 평범하지 않은 위성입니다. 추가 조사 결과, 이곳이 우리가 수신하고 있는 신호의 출처로 밝혀졌습니다.
supply-tech=[entity=unit-05] 유닛-05가 이니스에서 간격마다 더 많은 자원을 생산할 수 있도록 합니다.

