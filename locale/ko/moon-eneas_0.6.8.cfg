disassemble-artifact-advanced=더 정밀하게 유물을 분해한 뒤, 더 복잡한 생산품을 추출합니다.
purify-water-basic=석탄을 여과 첨가물로 이용하면, 오염된 물을 정화하면서 귀중한 물질도 얻을 수 있습니다.
salvage-artifact=유물에서 유용한 생산품을 추출할 수 있지만, 그 결과물은 매우 무작위적일 것입니다.
stone-chiseling=적절한 도구를 이용한 더 효율적인 벽돌 생산 방법입니다.
