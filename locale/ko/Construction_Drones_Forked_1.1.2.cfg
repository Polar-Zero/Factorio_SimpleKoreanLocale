[mod-setting-description]
construction-drone-search-radius=사용 가능한 작업을 찾을 반경을 조정합니다. (유닛 단위) 
drone_process_other_player_construction=드론이 다른 플레이어의 건설 작업을 완료하도록 허용합니다.
drone_process_other_player_deconstruction=드론이 다른 플레이어의 해체 작업을 완료하도록 허용합니다.
drone_process_other_player_proxies=드론이 다른 플레이어의 대리 작업(모듈, 물류 요청 등)을 완료하도록 허용합니다.
drone_process_other_player_upgrade=드론이 다른 플레이어의 업그레이드 작업을 완료하도록 허용합니다.
force-player-position-search=탐색 영역을 플레이어 캐릭터와 일치하도록 강제 지정하여 플레이어의 탐색 반경 내에 있지 않은 드론이 원격으로 작동하지 않도록 합니다.
remote-view-spawn=드론을 원격 보기에서 사용하도록 허용합니다. (표면에서는 작동하지 않습니다) 경고: 드론이 플레이어에게 되돌아갈 경로를 지정할 때 가끔 멈출 수 있습니다.
throttling=플레이어당 탐색 영역을, 설정값 N에 대한 (N*2)^2개로 나눕니다. 값이 낮으면 반응 속도가 빨라지지만, CPU 성능 영향이 발생할 수 있습니다.