[mod-name]
Construction_Drones_Forked=건설 드론 - 업데이트 포크(Updated Construction Drones - Forked)

[mod-description]
Construction_Drones_Forked=지상 기반 건설 로봇을 추가합니다. Klonan의 원본 모드를 재작업했습니다.\n이제 품질 모드를 지원합니다: 드론이 이제 기본 게임의 품질 값을 사용할 수 있습니다. (품질 이름을 바꾸거나 품질을 추가하는 모드와 호환되지 않음)\n\n번역: SimpleKoreanLocale(PolarZero)


