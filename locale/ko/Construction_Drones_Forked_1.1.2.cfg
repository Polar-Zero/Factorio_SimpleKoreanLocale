spectral-drones=모든 드론을 통과할 수 없는 지형을 제외한 모든 물체를 단계적으로 통과할 수 있는 "분광" 드론 유형으로 업그레이드합니다.

[mod-setting-name]
construction-drone-search-radius=작업 탐색 범위
drone_process_other_player_construction=다른 플레이어 건설 작업 허용
drone_process_other_player_deconstruction=다른 플레이어 해체 작업 허용
drone_process_other_player_proxies=다른 플레이어 대리 작업 허용
drone_process_other_player_upgrade=다른 플레이어 업그레이드 작업 허용
force-player-position-search=지역 탐색 범위 사용
remote-view-spawn=원격 보기 소환 허용
