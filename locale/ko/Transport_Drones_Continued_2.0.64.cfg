[transport_drones_pages]
depot-reader=[font=default-bold]도로 네트워크 신호 출력기[/font]는 연결된 모든 창고에 대한 정보를 읽을 수 있도록 합니다.\n\n출력 모드 :\n- [font=default-bold]창고 내용물[/font]: 창고에 저장된 아이템 또는 유체.\n- [font=default-bold]네트워크 공급량[/font]: 네트워크의 모든 공급 운송창고에서 사용 가능한 수량.\n- [font=default-bold]네트워크 공급 (이 창고 제외)[/font]: 위와 동일하지만 이 창고의 내용물을 제외합니다.\n\n드론 수, 활성 드론, 연료, 용량 및 묶음 정보를 출력하기 위해 추가 신호를 입력하는 것도 가능합니다.

[entity-description]
active-depot=인벤토리 내 아이템을 도로 네트워크의 요청 운송창고에 능동적으로 배송합니다. 제작법이 필요하지 않으며, 벨트나 투입기로 아이템을 넣기만 하면 됩니다.\n[font=default-bold]품질 보너스:[/font] 인벤토리: 80/100/125/175/250칸 / 드론 슬롯: 5/6/7/8/10
buffer-depot=요청 운송창고와 보급 운송창고의 역할을 겸합니다.\n[font=default-bold]품질 보너스:[/font] 드론 드론: 5/6/7/8/10
depot-drone-chest=이 창고에 운송 드론을 보관할 수 있습니다. 슬롯은 창고 품질에 따라 증가합니다. 물류 로봇 배송을 지원합니다.
fluid-depot=유체 내용물을 도로 네트워크에 공급합니다.
fuel-depot=도로 네트워크의 다른 창고에 연료를 배달합니다.\n[font=default-bold]품질 보너스:[/font] 드론 슬롯: 5/6/7/8/10
request-depot=도로 네트워크의 보급 운송창고에서 아이템을 수거하기 위해 드론을 파견합니다.\n[font=default-bold]품질 보너스:[/font] 드론 슬롯: 5/6/7/8/10
road-network-reader=도로 네트워크의 모든 보급 운송창고 내부에서 선택한 아이템 총 수량을 읽습니다. 여러 신호를 동시에 지원합니다.
road-network-reader-filtered=연결된 저장소 인벤토리를 제외한, 도로 네트워크의 총 공급량을 읽습니다. 공급 운송창고 또는 완충 운송창고 옆에 배치하세요. 회로 피드백 루프를 방지할 수 있습니다.
drone-dispatcher=투입기나 로봇을 사용해 운송 드론을 보관한 뒤, 추후 드론 배치에 사용할 수 있도록 대기시킵니다. 도로망에 연결해야 작동합니다.
supply-depot=자신의 인벤토리를 도로 네트워크에 제공합니다.\n[font=default-bold]품질 보너스:[/font] 인벤토리: 80/100/125/175/250칸
supply-depot-chest=자신의 인벤토리를 도로 네트워크에 제공합니다. 선택적으로 물류 로봇이 아이템을 가져갈 수 있습니다 (수동 공급자).\n[font=default-bold]품질 보너스:[/font] 인벤토리: 80/100/125/175/250칸
transport-depot-writer=회로 또는 물류 조건을 이용해 연결된 창고를 제어합니다. 요청/완충 운송창고의 요청량을 재정의할 수도 있습니다. [virtual-signal=signal-P] 신호: 창고 우선순위를 재정의합니다. [virtual-signal=signal-T]: 공급 임계값을 재정의합니다.
transport-depot-reader=출력 운송창고의 내용물이나 네트워크 공급량을 회로 신호로 변환합니다. GUI를 사용하여 운송창고 내용물, 전체 네트워크 공급량 또는 이 운송창고를 제외한 네트워크 공급량 사이로 전환할 수 있습니다.
drone-dispatcher-chest=투입기나 로봇을 사용해 운송 드론을 보관한 뒤, 추후 드론 배치에 사용할 수 있도록 대기시킵니다. 도로망에 연결해야 작동합니다.\n[font=default-bold]품질 보너스:[/font] 인벤토리: 10/12/14/16/20칸
storage-depot=도로망에 사용할 수 있는 수동형 창고. 요청 운송창고는 보급 운송창고처럼 이곳에서 아이템을 가져갈 수 있습니다. 능동형 공급 운송창고는 넘쳐나는 아이템을 이곳으로 보낼 것입니다.\n[font=default-bold]품질 보너스:[/font] 인벤토리: 80/100/125/175/250칸
storage-depot-chest=도로 네트워크를 위한 능동형 창고. 요청 운송창고는 보급 운송창고처럼 이곳에서 아이템을 가져갈 수 있습니다. 능동형 공급 운송창고는 넘쳐나는 아이템을 이곳으로 보낼 것입니다.\n[font=default-bold]품질 보너스:[/font] 인벤토리: 80/100/125/175/250칸

[item-description]
transport-drone=도로 네트워크에서 운송창고 간 아이템을 운송합니다.\n[font=default-bold]품질 보너스:[/font]\n 속도: +15% 고급, +30% 희귀, +50% 특급, +80% 전설.\n연료 소비량 감소: 10% 고급, 20% 희귀, 30% 특급, 45% 전설

[virtual-signal-name]
fuel-signal=연료

