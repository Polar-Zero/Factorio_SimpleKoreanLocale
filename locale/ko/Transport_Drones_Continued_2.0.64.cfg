fluid-depot-capacity=유체 운송창고 저장량
fuel-amount-per-drone=드론당 연료 소비량
fuel-consumption-per-meter=m당 연료 소비량
request-depot-fluid-capacity=요청 창고 유체 출력량
dispatcher-depot-capacity=파견 창고 연료 저장량
transport-drone-stack-size=운송 드론 묶음 크기

[mod-setting-description]
drone-pollution-per-second=각 활동 중인 드론이 초당 배출하는 오염량. 0으로 설정하면 드론 오염을 비활성화합니다.
enable-active-depot=활성화 시, 능동 운송창고 건물을 사용할 수 있습니다 (능동적 운송 연구로 해제). 비활성화하면 게임에서 능동 운송창고를 사용할 수 없게 됩니다. [재시작 필요]
enable-drone-dispatcher=활성화 시, 드론 파견창고 건물을 사용할 수 있습니다 (운송 시스템 연구로 해제). 비활성화하면 게임에서 파견창고를 사용할 수 없게 됩니다. [재시작 필요]
enable-multi-pipe=활성화 시, 다중 파이프 연결 기술이 사용 가능해지며, 유체 창고에 동/서 추가 파이프 연결이 해제됩니다. [재시작 필요]
enable-storage-depot=활성화 시, 저장 운송창고 건물을 사용할 수 있습니다 (능동 수송 연구로 해제). 비활성화하면 게임에서 저장 운송창고를 사용할 수 없게 됩니다. [재시작 필요]
fluid-depot-capacity=유체 운송창고의 최대 유체 저장량. 용량이 클수록 창고가 가득 차기 전에 더 많은 드론을 파견할 수 있습니다. 기본 게임 유체 탱크 저장량: 25,000. [재시작 필요]
fuel-amount-per-drone=드론 파견당 소비되는 연료량. 높은 값으로 설정할수록 드론의 운송당 연료 소비량이 증가합니다.
fuel-consumption-per-meter=운송 드론이 m당 소비하는 연료량. 0: 연료 소비 비활성화
fuel-fluid=운송 드론의 연료로 사용될 유체 유형. 모든 연료 운송창고에 이 유체를 공급해야 합니다.
request-depot-fluid-capacity=요청 창고의 유체 출력 버퍼 용량. 값이 클수록 연결된 파이프로의 유체 처리량이 증가합니다. 기본 게임 유체 탱크 저장량: 25,000. [재시작 필요]
transport-depot-update-interval=각 창고가 업데이트 로직을 실행하는 빈도(틱). 낮은 값 = 더 빠른 반응, UPS 성능 비용 증가. 기본값: 60틱 (1초).
transport-drone-load-balance-threshold=최고점와의 차이가 이 임계값 이내인 보급 운송창고는 동등하게 취급되며, 무작위로 선택됩니다. 인근 창고 간 부하를 분산할 수 있으며, 항상 최적의 창고를 선택하려면 0으로 설정하세요.
transport-drone-max-dispatches-per-tick=단일 창고가 한 업데이트 주기에 파견할 수 있는 최대 드론 수. 극단적인 상황에서 과도한 파견을 방지하는 안전 상한선입니다. 일반적인 게임 상황일 경우 자연적인 제한(드론 인벤토리, 연료)이 상한선보다 훨씬 먼저 파견이 중지될 것입니다. 창고당 수백 대의 드론이 있는 대규모 기지를 운영할 경우 값을 높이세요.
transport-drone-sound-volume=운송 드론 엔진 작동음 크기 (0 = 무음, 100 = 기본값).
transport-drones-diagonal-check=활성화하면 드론이 비도로 타일 사이의 대각선 모서리를 통과할 수 없습니다. 이를 통해 틈새로 통과하는 것을 방지할 수 있습니다. [재시작 필요]
transport-drones-space-platform-roads=우주 플랫폼 토대 위에 도로 타일을 배치할 수 있도록 허용합니다. 플랫폼 토대 위에 도로 배치가 필요하지 않을 경우 비활성화하세요. [재시작 필요]
dispatcher-depot-capacity=파견 창고에 저장할 수 있는 연료량. 적어도 할당될 드론 모두에 보급할 연료를 저장할 만큼 커야 합니다 (드론 수 x 드론당 연료) [재시작 필요]\n기본값: 50,000
transport-drone-stack-size=인벤토리 한 칸에 저장할 수 있는 운송 드론 수. 운송 드론 인벤토리에 얼마나 많은 드론을 넣을 수 있는지에도 영향을 줍니다. [재시작 필요]