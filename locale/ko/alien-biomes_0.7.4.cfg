[mod-description]
alien-biomes=다양한 신규 생물군계들을 게임에 추가합니다: 눈, 화산, 분화구, 다양한 색상의 흙, 모래, 잔디. 새로운 나무와 장식용 변종을 포함합니다. 모드 옵션에서 행성 조정도 가능합니다. 우주 시대 DLC와 함께 사용하면 나우비스만 영향을 받습니다.\n\n번역 보완: SimpleKoreanLocale(PolarZero)
alien-biomes-graphics=Alien Biomes 모드에 사용되는 그래픽 요소를 포함합니다.\n\n번역: SimpleKoreanLocale(PolarZero)

