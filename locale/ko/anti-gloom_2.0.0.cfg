[mod-name]
anti-gloom=안티글룸: 더 밝고, 덜 어두운 밤(AntiGloom: Brighter, Less Dark Nights)

[mod-description]
anti-gloom=밤 시간에 발생하는 시각 효과를 낮과 더 비슷하게, 덜 어둡고 음침하도록 개선합니다(비율 구성 가능). 태양광 발전 효율에 영향을 미치지 않습니다.\n\n번역: SimpleKoreanLocale(PolarZero)


[mod-setting-name]
anti-gloom-goggle-brightness=야간 투시경 밝기
anti-gloom-normal-brightness=일반적 야간 밝기
anti-gloom-zoom-brightness=확대시 세계 야간 밝기

[mod-setting-description]
anti-gloom-goggle-brightness=0%는 일반적인 밤, 100%는 주간처럼 밝음을 의미하며, 원하는 중간값을 선택할 수 있습니다. (기본 게임 야간 투시경에만 적용)
anti-gloom-normal-brightness=0%는 일반적인 밤, 100%는 주간처럼 밝음을 의미하며, 원하는 중간값을 선택할 수 있습니다.
anti-gloom-zoom-brightness=0%는 일반적인 밤, 100%는 주간처럼 밝음을 의미하며, 원하는 중간값을 선택할 수 있습니다.