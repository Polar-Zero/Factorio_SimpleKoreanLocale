drg_mission=임무
drg_mission_aborted=__1__ 플레이어에 의해 임무가 중단되었습니다.
drg_mission_car_power_delivery=수정 에너지 운반선
drg_mission_car_power_delivery_tooltip=수리하고, 운반하여 파워 수정으로 이동한 다음 로켓으로 운송하세요
drg_mission_car_power_delivery_tooltip2=경쟁사가 이 동굴망 깊숙한 곳에 로켓 격납고를 버려두었습니다. 정보 보고서에 따르면 그곳에는 여전히 귀중한 암호화된 데이터가 남아 있는 것으로 보이며, 우리는 이를 훔쳐낼 계획입니다. 그들의 보안 시스템은 주변 [img=entity/drg_crystal_blue]수정에서 추출한 신비한 에너지원으로 구동됩니다. 그 에너지를 운반하기 위해, 그들은 [img=entity/drg_crystal_blue]수정 에너지로 직접 충전할 수 있는 동력 차량을 개발했습니다. 손상된 차량을 찾아 수리한 뒤, [img=entity/drg_crystal_blue]수정까지 이동시켜 코어를 재충전한 다음, 저장된 에너지를 로켓 격납고로 운반하여 데이터 금고를 해제하십시오.
drg_mission_control=임무 관제소
drg_mission_deep_core_mining=심층 채굴
drg_mission_deep_core_mining_tooltip='심층 코어 추출기'를 찾아 수리하고 작동하게 만드세요!
drg_mission_deep_core_mining_tooltip2=동굴 깊숙이 묻혀 있는 버려진 '심층 코어 추출기'를 찾아 복원하세요. [img=item/engine-unit]엔진 유닛, [img=item/advanced-circuit]고급 회로, [img=item/iron-gear-wheel]철 톱니바퀴를 사용하여 기계를 다시 가동시키세요.
drg_mission_drill=굴착
drg_mission_drill_tooltip=단단한 동굴 벽을 뚫고 귀중한 수정 파편을 얻어가세요.
drg_mission_drill_tooltip2=채광 기계를 작동하려면 동굴에서 [item=coal]를 찾아야 합니다. 인벤토리에 석탄을 넣은 채로 채광 기계의 작동 범위 내에 머물러 있으면, 채광 기계이 수정 파편 쪽으로 이동합니다. 목표 지점에 도달하면, 수정이 파괴될 때까지 석탄을 계속 공급하여 드릴로 뚫어내면 임무가 완료됩니다. 참고: 플레이어는 드릴보다 먼저 파낼 수 없습니다. 드릴이 전진하는 동안 가까이 붙어 길을 뚫어주세요.
drg_mission_expired=선택한 임무의 진행 가능 시간이 만료되었습니다!
drg_mission_explore_cave=동굴 탐험하기
drg_mission_explore_cave_tooltip=동굴을 탐험하고 통로를 뚫어보세요
drg_mission_explore_cave_tooltip2=동굴을 탐험하며 통로를 뚫고 넓은 방들을 발견해 보세요. 그리고 계속 파나가세요!
drg_mission_hacking=해킹
drg_mission_hacking_tooltip=적대적인 시스템을 장악하고 보안 조치를 강화하세요.
drg_mission_hacking_tooltip2=경쟁사가 임무 실패 후 드롭 포드를 버리고 떠났습니다. 초록색 회로 전선을 사용하여 배치된 해킹 단말기에 이를 연결한 뒤, 해킹을 완료하고 내부에 있는 귀중한 데이터와 자원을 확보하십시오.
drg_mission_killing=처치
drg_mission_killing_tooltip=위험한 표적을 추적하여 제거하세요.
drg_mission_killing_tooltip2=동굴을 샅샅이 뒤져 목표로 한 적을 찾아내세요. 적을 발견했다면 처치하여 임무를 완료하세요.
drg_mission_log=임무 일지
drg_mission_mine_liquid=광물성 유체
drg_mission_mine_liquid_tooltip=지하에서 귀중한 유체를 채취하세요.
drg_mission_mine_liquid_tooltip2=동굴에 있는 유체 추출기 3개를 찾아 수리하세요. 작동이 시작되면 귀중한 유체를 펌핑하기 시작합니다. 파이프를 설치하여 유체 추출기를 유체 화물 발사기와 연결하고, 유체를 통에 담아 발사기에 장전하세요. [img=item/barrel] 배럴이 필요할 것입니다. 화물를 발사하여 임무를 완료하세요.
drg_mission_mining=채광
drg_mission_mining_tooltip=지하 깊은 곳에 있는 광물 자원을 채굴하세요.
drg_mission_mining_tooltip2=운반기가 수집한 광물만 임무 완료에 반영됩니다. 운반기는 근처 상자에서 광석을 자동으로 수집합니다. 채굴이 성공적으로 완료되면, 수집된 모든 광석은 우주 채광 시설의 내부 저장소로 옮겨집니다.
drg_mission_pest_control=방제
drg_mission_pest_control_tooltip=적의 침투 거점을 파괴하세요.
drg_mission_pest_control_tooltip2=지정된 수의 적 유닛, 포탑 또는 산란장을 처치하세요.
drg_mission_pest_control_turret=포탑을 파괴하세요
drg_mission_pest_control_unit=유닛 파괴
drg_mission_pest_control_unit-spawner=스포너 파괴하기
drg_mission_platform_core=플랫폼 핵심 기능 업그레이드
drg_mission_platform_core_tooltip=우주 채광 시설를 업그레이드할 수 있는 고유한 유물을 획득하세요
drg_mission_platform_core_tooltip2=동굴 시스템 깊숙이 들어가 잃어버린 코어 조립 기계 전초기지를 찾아내십시오. 그 장소를 방어하고 고대 기계에 필요한 자원을 공급하십시오. 그 대가로, 이 기계는 우주 채광 시설의 능력을 확장하고 새로운 기술을 해금할 수 있는 독특한 유물을 만들어 줄 것입니다.
drg_mission_rare_minerals=희귀 광물 채굴
drg_mission_rare_minerals_tooltip=희귀한 고가치 광물을 채광하세요.
drg_mission_rare_minerals_tooltip2=동굴 곳곳에 희귀 광물 매장지가 흩어져 있습니다. 땅을 파서 반짝이는 바위를 찾아내고 곡괭이로 채굴하세요. '운반기'로 수집한 광물만 임무 완료에 반영된다는 점을 기억하고, 운반기가 수거할 수 있도록 근처 상자에 넣어 두세요.
drg_mission_repair_items=이 임무에 필요한 아이템:
