[mod-setting-description]
drg_enable_classes_contracts=4가지의 독특한 캐릭터 직업과 계약을 추가합니다. RPG 스타일의 성장 시스템을 통해 각 클래스에서 경험치를 획득하며 성장해 나가세요.
drg_reduce_bullet_cost=탄약 비용이 50% 감소됩니다.
drg-difficulty-level=1(쉬움) ~ 5(어려움)
drg-enable-ore-delivery=이 기능이 활성화되면, 매 1분마다 광석이 우주 채광 시설로 전달됩니다(채굴 임무).
drg-fast-start=서막 스토리 터미널을 건너뛰고, 발사 준비가 완료된 드롭 포드부터 바로 시작하여 즉시 행동에 나서세요.
drg-less-contracts=계약에 묶여 있는 기술의 수를 줄입니다.
drg-reduce-tech-cost=기술 연구 비용을 50% 감소됩니다. (더 빠른 게임 플레이를 위해 사용 가능)
drg-xp-only-for-players-on-cave=경험치를 동굴 작전에 참여한 플레이어만 획득할 수 있도록 할지 조정합니다. 이 설정을 비활성화하면, 일부 대원이 플랫폼에서 대기 중이라 하더라도 모든 대원이 경험치를 받을 수 있습니다.
drg-cave-events-visible=임무 보정 요소를 터미널에 표시할지 여부를 조정합니다. 이 옵션을 비활성화하더라도 매 미션마다 미지의 영역으로 진입하는 것은 동일하지만, ‘동굴 스캔’ 미션을 통해 획득한 스캔 능력을 이용하면 정보를 확인할 수 있습니다.