[space-location-description]
drg-biome-aquilo=짙은 얼음과 수정 구조물 사이로 뚫린 얼어붙은 터널들. 빛은 수정빛 벽을 통과하며 굴절되지만, 극한의 추위로 인해 그 속도는 느려집니다. 얼어붙은 바이터들이 이 통로를 지키고 있으며, 대상과 기계를 얼려버릴 수 있습니다. 이 얼음 지역에는 대량의 펄라이트 파편이 박혀 있는 경우가 흔합니다.
drg-biome-desert=약한 암석과 깊은 크레바스가 많은, 불안정하고 건조한 동굴입니다. 불안정한 지형으로 인해 굴착 작업 중 먼지 구름이 발생하거나 천장이 무너지는 일이 흔하게 발생하며, 지표면 아래에는 토착 거미류 포식자들이 숨어 있다 기습을 가하기도 합니다. 암석 표면에는 때때로 펄라이트 파편이 노출되어 있으며, 드물지만 앰버리움 블록의 흔적도 발견할 수 있습다.
drg-biome-fulgora=주변에 끊임없이 아크 형태의 에너지 방전을 발생시키는, 전기로 충전된 동굴들로 구성된 지역. 공기 중에는 정전기 소리가 느껴지며, 기계들은 빈번하게 전자기 간섭을 겪게 됩니다. 사라진 문명의 잔재인 자동화된 드로이드들이 이 구역을 순찰하고 있지만, 이들은 매우 강력한데다 정밀하기까지 합니다. 이 구역의 불안정한 에너지장은 스파이크이트 광맥의 형성을 촉진시켰습니다.
drg-biome-gleba=이 동굴들은 빽빽하게 자라난 지하 식물들에 뒤덮여, 두꺼운 뿌리와 미네랄로 가득 찬 유기질 층을 형성했습니다. 무성한 식물들로 인해 시야가 제한되며, 약한 압력에도 지형이 쉽게 변할 수 있습니다. 이 지역은 영토 주장이 강하며 회복력 역시 뛰어난 펜타포드와 스톰퍼들이 지키고 있습니다. 이 생물군계는 유기물-광물 매트릭스 내에서 형성되는 앰버리움 블록의 주요 채광 경로입니다.
drg-biome-nauvis=핵심 채굴 구역이자 주요 운영 거점인 이 곳은, 인프라가 잘 갖춰져 있고 더 깊은 구역으로 이어지는 통로 역시 마련된, 비교적 안정적인 지하 지역입니다. 외곽에는 약간이지만 적대적 생물들이 서식하고 있습니다. 특정한 자원을 주로 발견할 수 있는 것은 아니지만, 모든 희귀 광물을 매우 낮은 확률로 발견할 수 있습니다.
drg-biome-toxic=부식되고 유독한 이 터널 시스템은 밀집된 가스 주머니와 반응성 광물들로 가득 차 있습니다. 시야 범위 역시 좋지 않으며, 장시간 노출되면 위험합니다. 이곳에는 산성 바이터가 서식하며, 전투 중 독성 구름을 뿜어냅니다. 주요 자원인 '라디안타이트'는, 유해한 에너지를 방출하고 주변 지역에 오염을 유발하는 휘발성 광물입니다.
drg-biome-vulcanus=마그마로 가열된 터널들이 뒤얽힌 불안정한 지역, 극심한 열과 압력이 이곳의 환경을 유지하고 있습니다. 녹아내린 암석 마그마로 이루어진 강이 동굴을 훤히 비추며, 지진 활동 역시 빈번하게 일어납니다. 이 지역에 있는 폭발성 바이터들은 침입자들에게 파괴적인 힘으로 돌진해 올 것이며. 가장 뜨거운 지대 깊숙한 곳에는 풍부한 양의 페로녹스 광맥이 묻혀 있습니다.

