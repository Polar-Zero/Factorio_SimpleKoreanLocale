[technology-description]
drg_clanker=동굴 전투의 든든한 동반자! 레벨이 올라갈 때마다 체력, 방어력, 피해량, 공격 속도가 증가합니다.
drg_contract_tasks=은하 광업 회사로부터 계약을 체결할 수 있는 권한을 부여합니다.
drg_drill_cannon=적대적인 지하 환경에 대비할 수 있도록 설계된 휴대용 드릴포입니다. 장착하면 회전하는 드릴 날에 장착된 충격탄 탄약을 발사하여, 암석을 신속하게 파쇄하고 깊은 동굴에 통로를 뚫을 수 있습니다. 압박 속에서 전진하거나 갇히는 상황에 직면하면 안되는 공병들에게 필수적인 장비입니다.
drg_emergency_extraction=비상시 채광 포드를 강제 호출할 수 있도록 합니다. 하지만 이 보험 서비스는 무료가 아니며, 비상 호출 진행 전에 임무 터미널을 통해 의뢰가 완료된 상태여야 합니다.
drg_enemy_evolution_tracker=적의 진화 상황을 추적할 수 있습니다. 이 정보는 작전 통계에 표시되며, 해당 지역에서 적들이 어떻게 진화하고 있는지 계속 지켜볼 수 있습니다.
drg_energy_receiver=우주 채광 시설 플랫폼으로부터 전력을 공급받습니다. 배치 가능한 업링크 최대치는 완료한 기술 연구에 따라 제한됩니다.
drg_energy_receiver_extra_links=동시에 사용할 수 있는 업링크 수량을 증가시킵니다.
drg_flare_gun=신호탄은 동굴을 밝히며, 빛에 비친 적들은 공격을 받을 때 받는 피해가 10% 증가합니다.
drg_fluid_mining=유체를 사용해야 하는 광물을 채굴할 수 있게 해줍니다
drg_freeze_chest=아이템 부패 속도를 늦춰줍니다.
drg_miner_drill_equipment=이 수동형 채광 드릴을 사용하면 광부들이 더 빠른 속도로 동굴을 파낼 수 있게 됩니다. [item=rocket-fuel] 1개 필요
drg_molly_upgrade=운반기을 업그레이드하면 HP, 방어력, 인벤토리 및 장비 슬롯이 증가합니다. 또한 레벨이 올라갈 때마다 광석 수집량이 10%씩 증가합니다.
drg_mule_fluid_collect=운반기가 [entity=drg_mule_fluid_collector]에 저장된 유체를 회수할 수 있게 합니다. 귀환에 성공하면, 유체는 우주 채광 시설 내부에 저장됩니다.
#drg_molly_upgrade=운반기 업그레이드. 레벨이 올라갈 때마다 HP, 인벤토리 및 장비 슬롯이 증가합니다.
drg_orbital_fluid_uplink=이 기계는 업링크를 통해 동굴에서 우주 채광 시설로 유체([fluid=water][fluid=crude-oil][fluid=heavy-oil][fluid=ammoniacal-solution][fluid=lithium-brine][fluid=fluorine])를 펌핑할 수 있게 해줍니다. 지속적인 유체 운송을 진행하려면 동굴에서 원하는 유체를 기계에 미리 투입한 다음, 완전히 채워진 뒤에도 동굴 안에 유지하는 것을 추천합니다. 임무가 성공적으로 완료되고 추출이 이루어지면, 이 기계가 해당 지역(바이오ーム)에 남아 있는 한 우주 채광 시설로 유체를 계속 펌핑할 것입니다. 업링크를 설치하려면 해당 행성 지역에서 "광산 유체 채취" 임무를 미리 완료해야 합니다. 동굴 임무당 이 기계를 하나만 설치할 수 있습니다.
drg_platform_core_upgrade=메인 우주 채광 시설 코어를 업그레이드하여 우주 채광 시설의 기능을 확장하고 새로운 기술을 해금합니다.
drg_platform_linked_chest_2=외부 플랫폼과 우주 채광 시설 내부 사이에 아이템을 이동할 수 있도록, 플랫폼 연결 상자를 추가로 설치할 수 있도록 합니다.
drg_seismic_charge=대규모 범위 피해를 주고 주변 구역에 구멍을 뚫어버리는 강력한 폭탄입니다!
drg_ship_floors_tech=엘리베이터를 통해 접근할 수 있는 새로운 우주선 층을 해금합니다.
drg_ship_fluid_storage=함선이 유체 탱크에 유체를 저장할 수 있도록 합니다. 이 기술 연구 레벨마다 유체 저장량이 50k씩 증가합니다.
drg_ship_pipe=연결된 파이프를 통해 우주 채광 시설의 각 층 사이에 유체를 이송할 수 있도록 있습니다. 더 많은 층을 사용할 수 있게 될수록, 층마다 배치할 수 있는 파이프의 수가 늘어납니다.
drg_ship_platform_camera=우주선 기능: 플랫폼 카메라를 활성화하여 밖에서 무슨 일이 일어나고 있는지 확인할 수 있게 해줍니다.
drg_ship_resource_storage=우주 채광 시설에 저장할 수 있는 인벤토리 공간을 추가합니다. 이 기술 연구를 완료할 때 마다 증가됩니다.
drg_supply_capsule=지하에 있는 승무원이 우주 채광 시설에서 보급품을 투하할 수 있도록, 지원 캡슐을 호출할 수 있게 합니다. 핵심 기술 수준이 증가될 때마다 임무당 호출 횟수가 증가합니다.
drg_tech_beer_market=맥주 거래소를 개방하여 은하계 최고의 에일을 구매할 수 있게 해줍니다.
drg_tech_heat_shield=행성 내부의 극도로 고온인 지역으로의 여행을 가능하게 합니다
drg_tech_license_lightning_rod=피뢰침을 설치할 수 있게 됩니다.
drg_tech_mission_terminal=우주 채광 시설에서 드롭 베이와 임무 터미널을 사용할 수 있게 되며, 이를 통해 임무을 수락하고 동굴로 진입할 수 있게 됩니다.
drg_tech_mule_containment_chamber=운반기를 보관할 수 있는 공간입니다.
drg_tech_toxic_mask=착용자를 유독 가스로부터 보호해 주는 방독면을 제작할 수 있습니다. [img=space-location/drg-biome-toxic]톡스프랙트 광맥과 [img=space-location/drg-biome-gleba]버던트 광맥 군집의 유독 동굴에서 생존하기 위해 필수적인 장비입니다.
