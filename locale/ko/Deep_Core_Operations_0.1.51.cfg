[item-description]
drg_asteroid-collector=[color=#e597f0]배치 제한: [technology=rocket-silo] 연구가 완료되지 않았다면 1개만 배치할 수 있습니다.[/color]
drg_beer_bonus_damage=모든 문제는 화력을 더 강화하면 해결될 수 있다고 믿는 드워프들을 위한 아이템입니다. 적에게 주는 피해를 증가시킵니다.
drg_beer_bonus_damage_no_pain=보스전, 긴급 철수, 성과 평가 전에 복용하는 것을 권장합니다. 피해를 증가시키는 동시에 받는 피해량을 줄여줍니다.
drg_beer_mining_bonus=평범한 광부들을 광석 채굴에 미친 광인으로 만들어 줍니다. 곡괭이를 사용한 광석 채광 효율을 높여줍니다. 덜 노력하고도 더 많이 채광해보세요.
drg_beer_no_pain=통증은 소중한 경고 신호입니다. 하지만 이 맥주는 그 통증을 완전히 없애줍니다. 피해 저항력이 증가합니다.
drg_beer_regen=공식적으로는 치료 용도로 분류되는 음료지만, 비공식적인 산업용 용제로 분류되기도 합니다. 시간이 지남에 따라 체력을 회복시켜줍니다.
drg_beer_speed=드롭 포드를 가동할 만큼의 자극제가 들어 있습니다. 더 빠르게 움직여, 당신이 내린 대부분의 잘못된 결정들을 되돌리세요.
drg_crusher=[color=#e597f0]배치 제한: [technology=rocket-silo] 연구가 완료되지 않았다면 1개만 배치할 수 있습니다.[/color]
drg_flare_gun=조명탄은 동굴을 밝히며, 밝은 지역에 있는 적들에게는 10% 더 많은 피해를 줄 수 있습니다.
drg_mule_fluid_collector=이곳에 저장된 유체는 운반기가 도착하면 수거되어 우주 채광 시설로 운반될 것입니다.
drg_mule_freezer=운반기에 장착하면 화물칸 내부 아이템의 부패 속도를 늦춰줍니다.
drg_platform_linked_chest=외부 플랫폼과 우주 채광 시설 사이에 아이템을 운반합니다. 플랫폼 각 층마다 1개만 배치할 수 있습니다.
drg_platform_linked_chest_2=외부 플랫폼과 우주 채광 시설 사이에 아이템을 운반합니다. 플랫폼 층당 1회로 제한됩니다.
drg_seismic_charge=1,500의 피해를 주는 거대한 폭발을 일으킵니다. 동굴 벽을 파낼 수 있으며, 적이 출현하는 굴을 무너뜨릴 확률 역시 있습니다.
drg_storage_ship_pipe=우주 채광 시설 내 특정 타일 위에만 건설할 수 있습니다.

