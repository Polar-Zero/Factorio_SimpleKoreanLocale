drg_mission_train_fuel_delivery_tooltip2=심층 코어 추출기가 작동하려면 연료가 필요합니다. 철도를 건설하고 위험한 동굴을 따라 [fluid=drg_fluid_gasola]를 운반해야 합니다. 채광 기계를 다시 가동시키세요! 추출기와 기차 사이에는 어떤 신비로운 연관성이 있기에, 기차가 근처에 있어야만 기계가 작동합니다.
