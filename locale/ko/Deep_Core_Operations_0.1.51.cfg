[mod-name]
Deep_Core_Operations=심층 코어 작업(Deep Core Operations)

[mod-description]
Deep_Core_Operations=여러분의 승무원이 산산조각난 행성, 프랙타 맨티스 C 궤도에 진입했지만, 우주 채광 시설이 거대한 파편과 충돌한 뒤 치명적인 손상을 입고 말았습니다. 추진기가 사라졌으며 대부분의 시스템이 정지되었습니다. 화물칸에 갇힌 상태인 여러분은 작은 터미널을 통해서만 외부로 연결된 기계 팔을 조작할 수 있습니다. 궤도상의 자원을 수집하고, 채광 시설을 수리하고, 관제실을 재건하세요.\n\n번역: SimpleKoreanLocale(PolarZero)


