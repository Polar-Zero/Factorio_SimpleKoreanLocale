drg_class_engineer=엔지니어
drg_class_engineer_tooltip=엔지니어는 우주 채광 시설 기술의 달인입니다. 그는 가장 빠른 제작 속도와 가장 효율적인 포탑 배치가 가능합니다. (발사 대기 시간 최소) 그 밖의 일반적인 능력치는 평범하지만, '지진파 폭탄'이나 '테슬라 총'과 같은 첨단 기술을 사용할 수 있는 유일한 캐릭터로서 그 유용성은 매우 높으며, 어떤 위치든 단 몇 초 만에 요새로 바꿔놓을 수 있습니다.
drg_class_heavy=중화기병
drg_class_heavy_tooltip=중화기병은 전선 유지에 필수적인 인력으로, 가장 높은 기본 HP와 탄창 보관에 사용 가능한 추가 공간 사용이 가능합니다. 거대한 갑옷과 미니건, 핸드캐논 같은 중화기는 초반 이동 속도나 채광 속도를 느리게 만들지만, 성장함에 따라 점차 막을 수 없는 방패로 거듭납니다. 여러 개의 에너지 보호막를 동시에 유지할 수 있어, 드레드노트의 직접 공격을 버틸 수 있는 유일한 직업입니다.
drg_class_miner=광부
drg_class_miner_tooltip=광부는 기본 채광 속도에 무려 60%의 보너스를 받는 광석 전문가입니다. 그는 환경 조작에 특화되어 있으며, 더 많은 인벤토리와 고성능 외골격을 장비하고 있습니다. 또한 화염방사기와 독 캡슐 같은 지역 봉쇄 도구를 갖추고 있어, 길을 개척하거나 적을 제거하는 데 모두 뛰어난 효율을 발휘하며, 모든 작전에서 필수적인 역할을 담당합니다.
drg_class_scout=정찰병
drg_class_scout_tooltip=정찰병은 매우 민첩하며, 동굴을 손쉽게 이동할 수 있는 상당한 기본 이동 속도 보너스를 가진 직업입니다. SMG나 조명탄과 같은 가벼운 무기를 활용해 신속하게 이동하고 기동성을 이용한 전투를 펼치는 데 탁월합니다. 하지만 기본 HP 보너스가 없으며, 채광 및 제작 속도 등 능력치는 일반적인, 생존을 위한 내구성보다는 속도에 의존하는 직업입니다.
