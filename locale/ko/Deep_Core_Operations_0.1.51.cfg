drg_mission_rescue_imprisoned_miners_tooltip=동굴에 갇힌 광부들을 구조하세요.
drg_mission_rescue_mule=운반기 구조
drg_mission_rescue_mule_tooltip=잃어버린 운반기들을 되찾으세요.
drg_mission_rescue_mule_tooltip2=동굴을 수색하여 잃어버린 운반기 유닛 4대를 찾아내십시오. 이를 수리한 뒤, 회수 포드까지 호위하여 철수시키십시오.
