[entity-description]
drg_asteroid-collector=[color=#e597f0]배치 제한: [technology=rocket-silo] 연구가 완료되지 않았다면 1개만 배치할 수 있습니다.[/color]
drg_broken_lab=필요한 재료를 투입하여, 이 유물을 수리하고 다시 작동시키세요.
drg_crusher=[color=#e597f0]배치 제한: [technology=rocket-silo] 연구가 완료되지 않았다면 1개만 배치할 수 있습니다.[/color]
drg_driller_machine=이 드릴이 작동하려면 [item=coal]석탄이 필요합니다. 인벤토리에 석탄을 넣은 상태로 이 기계의 작업 범위 내에 머무르세요. 참고: 플레이어는 드릴러보다 먼저 채광할 수 없습니다.
drg_drop_pod_hack_mission=경쟁자의 드롭 포드가 이곳에 불시착한 뒤 버려진 것 같습니다. 해킹을 진행하면 귀중한 데이터와 자원을 확보할 수 있습니다. 초록색 회로 전선을 이용해 [entity=drg_hacking_terminal]에 연결하는 것으로 해킹을 시작할 수 있습니다.
drg_energy_receiver=우주 채광 시설 플랫폼으로부터 전력을 공급받습니다. 배치 가능한 업링크 최대치는 완료한 기술 연구에 따라 결정됩니다.
drg_freeze_chest=아이템 부패 속도를 늦춰줍니다.
drg_hacking_terminal=이 터미널을 사용하면 해킹 임무를 통해 적대적인 시스템에 침투할 수 있습니다. 전력을 충전한 뒤, 이 터미널과 대상 드롭 포드를 초록색 회로 전선으로 연결하세요.
drg_mission_silo=이 로켓은 귀중한 유체를 가득 채운 다음, 우주 채광 시설로 발사될 예정입니다.
drg_mission_terminal=임무 계획 및 드롭 포드 발사 등을 담당합니다. 플랫폼 허브 전력망에 연결되어 있습니다.
drg_mule_broken=귀하의 운반기가 파괴된 것 같습니다. 수리 관련 GUI를 보려면 선택하세요.
drg_mule_chest=지하 채굴 작업 중 운반기로 수집한 자원을 우주 채광 시설에 전달합니다.\n선택: 우주 채광 시설 비축량 확인
drg_mule_fluid_collector=이곳에 저장된 유체는 운반기가 도착하면 수거되어 우주 채광 시설로 운반될 것입니다.
drg_orbital_fluid_uplink=이 기계는 동굴에서 우주 시추 시설로 유체([fluid=water][fluid=crude-oil][fluid=heavy-oil][fluid=ammoniacal-solution][fluid=lithium-brine][fluid=fluorine])를 펌핑할 수 있게 해줍니다. 업링크를 설치하려면 해당 행성 지역에서 "광산 유체 채취" 임무를 미리 완료해야 합니다. 동굴 임무당 이 기계를 하나만 설치할 수 있습니다.
drg_platform_linked_chest=외부 플랫폼과 우주 채광 시설 내부 사이에 아이템을 운반합니다.
drg_platform_linked_chest_2=외부 플랫폼과 우주 채광 시설 내부 사이에 아이템을 운반합니다.
drg_rescue_mule_broken=오래되어 고장난 운반기입니다. 수리 관련 GUI를 보려면 선택하세요.
drg_supply_chest=이곳에 보관된 아이템은 우주 채광 시설에서 원격 조종을 통해 지하 임무 현장으로 운반될 수 있습니다.

