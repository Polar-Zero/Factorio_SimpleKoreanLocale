drg_insufficient_credits=자금 부족
drg_intro_message=당신의 승무원은 부서진 행성 [img=drg_planet]프랙타 맨티스 C에 접근하고 있었습니다. 이 산산조각 난 행성은 심층 코어 운영사(Deep Core Operations)에 의해 우주 채굴에 유용한 귀중한 자원이 풍부한 곳으로 확인된 곳입니다. 하지만, 궤도 진입 도중, 이 우주 채굴선은 거대한 행성 파편 중 하나와 충돌했으며, 이 피해는 치명적이었습니다. [img=item/thruster]추진기가 사라졌으며, 구조물 대부분이 정지되었습니다. 현재 승무원들은 선박의 핵심 시스템과 단절된 채 작은 화물칸 안에 갇혀버렸으며, 채광 시설 대부분은 폐허가 되고 말았니다.\n여전히 작동하는 것은 작은 터미널 하나뿐입니다. 이를 통해 우주선 외부의 기계 팔을 여전히 조정할 수 있다는 사실을 알게 됩니다. 이제 이 기계 팔을 조작하여 궤도상에서 필수 자원을 수집하고, 가장 심각한 피해부터 복구할 수 있을 것입니다. 관제실 기능을 재건하기에 충분한 수준까지 말이죠. 손상되었지만 쓸만한 이송 통로가 여전히 외부와 여러분의 구획을 연결하고 있어, 자재를 안팎으로 이동시키는 것 역시 가능합니다. [img=drg_elevator]로 외부 플랫폼에 접근하고 기계 팔을 제어하세요.
drg_intro_message_2=좋군요! 그 팔들이 정말 큰 도움이 되었습니요! [img=entity/drg_space_rig_terminal]터미널을 수리함으로써 이제 손상되거나 차단된 다른 구역을 원격으로 아이템을 이용해 수리할 수 있게 되었습니다. 해당 구역에 접근하여 수리하는 것을 최우선 과제로 진행하세요!\n또한 터미널이 이제 외부 플랫폼과 전력을 공유합니다.
drg_intro_message_3=우리 [entity=drg_mule_droid_1]운반기가 무사히 그곳에 도착했습니다! 아무래도 채굴 작업은 여전히 진행 중인 것 같군요.\n경영진은 완벽하게 작동하는 운반기가 탑재되지 않은 상태에서는 절대 우주 채광 시설을 심우주로 보내지 않을 것입니다. 모든 채굴 탐사의 중추인 이 기계들은 광물을 운반하고, 보급품을 나르며, 지하의 모든 것이 광부들의 목숨을 노릴 때 그들의 생명을 지켜주기까지 합니다. 단 한 대만 잃어도 전체 작전이 마비될 것이며, 손상된 저장 구역의 전원을 복구한 후, 운반기가 마침내 터미널 핸드세이크에 응답했습니다. 비록 시스템은 낡고, 닳아빠졌으며, 이곳에서 무슨 일이 있었는지 모를 먼지로 뒤덮여 있지만… 여전히 작동합니다. 그게 우리가 필요한 전부입니다. 운반기가 다시 가동됨에 따라 이제 채굴 시설 전역에 걸쳐 자원을 더 효율적으로 수송하고, 대규모 행성 채굴을 준비할 수 있게 되었습니다.
drg_intro_message_4=[entity=drg_mission_terminal]임무 터미널이 다시 가동되었습니다! 훌륭합니다. 통신이 복구됨에 따라, 채광 시설에서 행성 스캐너 및 심층 항법 위성과 다시 연결을 구축하고 동기화할 수 있게 되었습니다. 이미 이 시스템 내에서 새로운 채굴 작업이 나타나고 있으며, 지표면 아래의 동굴들이 실시간으로 지도화되고 있습니다. 더 중요한 점은… [img=entity/drg_drop_pod]드롭 포드 발사대가 다시 가동 중이라는 사실입니다. 이는 마침내 가장 풍부한 광맥이 위치한 지하 동굴 네트워크로 채굴대를 직접 투입할 수 있게 되었다는 뜻입니다.\n 하지만 주의하십시오. 자동 스캔 결과, 지각 깊은 곳에서 비정상적인 생물학적 활동이 감지되었습니다. 동굴들은 너무 오랫동안 방치되어 왔고, 그곳에 서식하는 무엇이든 번식할 충분한 시간을 가졌습니다. 그럼에도 경영진은 그 광물을 원하고 있으며, 이제 우리는 마침내 그곳에 도달할 수단을 확보했습니다.\n임무 네트워크가 가동 중입니다. 드롭 포드에 연료가 채워졌습니다. 동굴들이 기다리고 있습니다. 바위와 돌을 파내라, 광부여!
