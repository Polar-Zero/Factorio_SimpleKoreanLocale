secretas=[planet=secretas] 시크리타스

[tips-and-tricks-item-description]
secretas=시크리타스에서 방어 유닛을 [entity=outer-rim-magnetic-collector] 근처에서 파괴하면 [item=outer-rim-solid-state-battery]와 [item=outer-rim-advanced-processing-unit]를 회수할 수 있습니다. 아이템은 [entity=outer-rim-magnetic-collector] 내부에서 확인할 수 있습니다.\n적들은 공해나, 근처의 건물, 대포를 통해 유도할 수 있습니다.

