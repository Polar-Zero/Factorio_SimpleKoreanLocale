[tips-and-tricks-item-name]
containment=격리장
logic=논리 & 데이터
main=메모리화 저장소
moduling=모듈 & 하위 시스템

[tips-and-tricks-item-description]
containment=[color=orange]격리장[/color]는 초밀집 상태 물건들의 소실 역시 막아줍니다. 따라서 전원을 계속 공급하는 것은 저장소 작동에 매우 중요합니다.\n\n건물이 작동할 만큼 충분한 전력을 공급받지 못하면 [color=red]입/출력 작업이 중단[/color]되고 격리장이 사라지기 시작합니다. 격리 강도가 0%에 도달하기 전에 전원이 다시 연결되면 아이템이 손실되지 않습니다. 그렇지 않으면 저장소에서 [color=red]아이템의 일정 비율을 에너지[/color]로 천천히 변환하여 내용물의 완전 파괴를 방지하는 데 사용합니다.\n\n저장소가 충분한 전원 공급 장치[/color]에 [color=red]연결될 때마다 봉쇄장이 재충전되며, 전력 소모량이 일시적으로 증가합니다.
logic=[item=memory-unit]은 스토리지의 오른쪽 하단에 있는 [color=orange]메모리화 저장소 조합기[/color]를 통해 현재 상태 정보를 출력합니다.\n\n저장된 아이템의 [color=red]종류와 수량[/color]을 일치하는 신호값을 통해 접근할 수 있습니다. 더 간단한 전력 관리를 위해, 조합기에서 [virtual-signal=signal-E] 신호로 [color=red]현재 전력 소모량[/color]을 MW 단위로 출력합니다.
main=[item=memory-unit]은 격리장을 이용해 한 종류의 아이템을 사실상 무한대까지 저장할 수 있도록 합니다.\n\n건물의 전력 소비량은 내부에 저장된 아이템 수량에 따라 [color=red]증가됩니다[/color].
moduling=[item=memory-unit]은 [color=orange]저장 행렬[/color]과 [color=orange]변환 행렬[/color] 하위 시스템으로 구성되며, 두 시스템은 각각 티어가 존재합니다.\n\n [color=orange]저장 행렬[/color]은 격리장이 작동하는 효율을 결정합니다. 저티어일수록 기본 비용이 적은 대신, 아이템당 비용은 증가합니다.\n따라서 [color=red]고티어[/color]를 다량의 아이템[/color]을 저장하는 데 사용하고, [color=red]저티어[color=red]를 적은 양의 아이템[/color]을 저장하는 데 사용하는 것을 권장합니다. [item=effectivity-module]를 이 매트릭스를 업그레이드하는 데에 사용할 수 있습니다.\n\n[color=orange]변환 매트릭스[/color]는 스토리지에 아이템을 투입하거나 추출할 수 있는 속도를 결정합니다. 저장소에는 변환 매트릭스가 [color=red]50%[/color]로 유지하려고 시도하는 입/출력 완충기가 있으며, 필요에 따라 메모리화 저장소에 아이템을 투입하거나 추출합니다. [item=speed-module]를 이 매트릭스를 업그레이드하는 데 사용할 수 있습니다.\n\n저장소 건물 자체에는 모듈 슬롯이 없지만, 다른 기계와 비슷한 방식으로 신호기 분배 효과를 받습니다. 저장소 주변에 [item=beacon]을 무제한으로 배치할 수 있지만, 다른 모드의 신호기일 경우 Space Exploration과 유사한 신호기 제한 규칙을 가질 수 있습니다.

