[technology-description]
fluid-recycler=상자 안에 있는 쓰레기 더미에서 공압 프레스를 발견하고 재빠른 설계 역공학을 진행합니다. 고대 풀고란인들이 이런 식으로 여가를 즐겼는지 궁금하군요.
planet-discovery-ribbonia=날생선을 우주로 보내고, 누가 손을 내미는지 확인하는 오랜 전통을 따라가 보세요. 왠지 딱 맞을 것 같군요.
plasma-foundry=질량 분석법을 이용해 광석 분리 기술을 확장합니다. 이 공정은 모든 불순물을 제거하므로 [item=calcite]이 필요하지 않습니다.
ribbonia-tech-fluid-mastery-copper=녹은 구리 취급법을 마스터하세요.
ribbonia-tech-fluid-mastery-iron=녹은 철 취급법을 마스터하세요.
ribbonia-tech-fluid-mastery-plastic=녹은 플라스틱 취급법을 마스터하세요.
ribbonia-tech-lane-splitter=분배기를 아주 세게 쥐어짜는 것으로, 벨트 하나에 들어갈 정도로 작게 만들어 양 면의 균형을 맞출 수 있게 됩니다.
ribbonia-tech-lds=세 가지 유형의 녹은 금속을 모두 마스터한 주조 장인만이 액체만을 이용한 저밀도 구조물 제작이 가능합니다.
ribbonia-tech-melt-iron=충분한 열원을 찾으면 [item=calcite] 없이도 철광석과 미스터리 상자 등을 녹일 수 있습니다.
ribbonia-tech-open-box=잔해 속에서 미스터리 박스를 발견했습니다. 이 상자는 열쇠 없이 열 수 있습니다.
ribbonia-tech-rocket-control-unit=단순한 처리 유닛은 [planet=ribbonia] 무작위적인 흔들림과 요동 현상을 계산할 만큼 빠르지 않습니다. 우리는 초심으로 돌아가야 합니다.
ribbonia-tech-rocket-part=[planet=ribbonia]에서 배운 지식을 활용하여, 이 링월드와 광기에 사로잡힌 AI로부터 탈출할 수 있는 우주선을 제작해보세요.
ribbonia-pelagos-throwers=디젤 엔진에 '물건을 아주 멀리 투척한다'는 아이디어를 결합해, 그 누구도 던져본 적 없었던 곳에 물건을 던져보세요.

[tile-name]
fulgoran-space-platform=링월드 토대
ribbonia-gap=손상된 링월드 토대
ribbonia-water=얕은 물?

[tile-description]
fulgoran-space-platform=[planet=ribbonia]의 드러난 토대. 마술이나 다름없는 첨단 기술로 구성되었습니다.
ribbonia-gap=운석 폭풍으로 인해 크게 손상된 링월드 토대. C.H.A.R.L.E.S.이더라도 당분간 복구할 수 없을 겁니다.
ribbonia-water=처음에는 물처럼 보였지만, 다시 보면 누군가... 바닥을 파랗게 칠한 것이 보이시나요? 흙을 문지르면 C.H.A.R.L.E.S.가 이곳에 건물을 지을 수 있도록 할 것입니다. 미끄러움

[mod-setting-name]
ribbonia-gap-position=스폰과 틈새 시작점 거리
ribbonia-gap-size=틈새 간격
ribbonia-width=세계 너비
ribbonia-yoink-lane-splitters=레인 분배기에 리보니아 기술 필요
ribbonia-yoink-mini-trains=소형 기관차에 리보니아 기술 필요

[mod-setting-description]
ribbonia-gap-position=리보니아에는 틈새가 존재합니다. 이 설정은 이러한 지형이 0,0에서 어느 방향으로 얼마나 멀리 떨어져 있는지를 결정합니다.
ribbonia-gap-size=리보니아에는 틈새가 존재합니다. 이 설정은 이러한 지형 크기를 조정합니다.
ribbonia-width=몇 가지 주요 값: 기차가 회전하는 데 필요: 28. 로켓 격납고에 필요: 9. 팩토리오 청크 크기: 32. 리보니아르,ㄹ 탈출 가능한 최소 크기: 9.