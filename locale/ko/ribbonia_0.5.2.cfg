[mod-name]
ribbonia=○ 리보니아(Ribbonia)

[mod-description]
ribbonia=공간 활용과 창의력이 생존의 핵심인, 버려진 인공 풀고란 링월드 리보니아. 미치고 외로워하는 인공지능 C.H.A.R.L.E.S.를 상대할 수 있을까요? 리보니아에서 융합 플라즈마, 녹은 플라스틱과 관련된 잊혀진 풀고란 제작 기술을 발견하고 팩토리오의 향수에 빠져보세요. 리보니아는 기본 게임 게임에 최소한의 영향을 미치며 기존 저장 파일에 안전하게 추가할 수 있습니다.\n\n번역: SimpleKoreanLocale(PolarZero)


[asteroid-chunk-name]
satellite-asteroid-chunk=우주 쓰레기 파편

[asteroid-chunk-description]
satellite-asteroid-chunk=유용한 무언가가 들어있지만 부서지기도 쉬운 우주 쓰레기 파편. 수집할 때 산산조각날 가능성이 존재합니다.

