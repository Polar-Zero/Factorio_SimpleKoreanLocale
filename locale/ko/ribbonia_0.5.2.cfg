[item-description]
burned-loser-ticket=미스터리 박스에서 나온 낙첨 티켓, 그을렸지만 어떻게 된 것인지 완전히 타지 않았습니다.
cake=얼은 유마코 흔적에 방부제를 섞어 만든 케이크. 절대 상하지 않습니다.
crumbled-loser-ticket=미스터리 박스에서 나온 낙첨 티켓, 부서졌지만 어떻게 된 것인지 완전히 파괴되지 않았습니다.
loser-ticket=미스터리 박스에서 나온 낙첨 티켓. 누군가의 얼굴이 그려져 있습니다.
ribbonia-alien-science-pack=공간적 추론과 유체 제작법에 초점이 맞춰진, 진정한 외계 연구가 가능합니다.
ribbonia-rocket-control-unit=최첨단 로켓 공학기술 구현에만 사용되는 전용 장비.
ribbonia-satellite=좀 오래된 코드지만, 잘 작동합니다.

[modifier-description]
fluid-recycler=물고기, 건전지, 폭발물 등 다양한 부품에서 유체 구성품을 짜낼 수 있습니다!
ribbonia-tech-rocket-part=여러분의 기술 발전에 만족한 C.H.A.R.L.E.S.가 마침내 여러분이 [planet=ribbonia]에서 떠나도록 허락했습니다.

