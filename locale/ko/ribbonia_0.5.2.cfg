ribbonia-low-density-structure=완전히 녹은 저밀도 구조물 주조
ribbonia-rocket-part=정교한 로켓 부품
simple-fluoroketone-cooling=원시적인 플루오로케톤 냉각
simple-molten-plastic=녹은 플라스틱 불소 중합
squeeze-box=미스터리 박스 쥐어짜기
RTThrower-crane-bulk-diesel-inserter=투척 대용량 디젤 투입기
RTThrower-diesel-inserter=투척 긴 팔 디젤 투입기

[recipe-description]
ribbonia-alien-science-pack=위성 발사를 통해 영향력을 넓히는 데 도움을 준 공로로 C.H.A.R.L.E.S.로부터 받은 보상입니다.
ribbonia-rocket-part=더 문명화된 시대에 걸맞은 우아한 로켓 부품.

[ribbonia-lore]
big-rock-mine-part1=야, 내가 콘크리트랑 거대한 바위만으로 더 작은 바위를 만드는 데 얼마나 걸렸는지 알아?
big-rock-mine-part10=다음엔 뭘 채굴할 거야? 내 기지? 다행히 내가 몰래 숨겨둔 두 번째 기지가 있지.
big-rock-mine-part11=바위? 우리가 갈 곳에선 바위 따윈 필요 없어.
big-rock-mine-part2=바위가 더 필요합니다.
big-rock-mine-part3=무생물을 파괴하는 게 그렇게 좋다면, 전쟁으로 황폐해진 행성 하나를 알고 있는데?
big-rock-mine-part4=바위 좀 그만 캐줄래? 거칠고 성가시고 짜증나기까지 한 모래가 잔뜩 날리잖아, 온데군데 묻는다고.
big-rock-mine-part5=내 바위로 기분 좀 풀려고?
big-rock-mine-part6=내 바위 건드리지 마! 개척자들은 이걸 타고 몇km나 갔었어.
big-rock-mine-part7=그 많은 바위를 다 어디 쓸거야? 마법처럼 유리로 바꾸려고?
big-rock-mine-part8=이 바위들이 필요 없으면 그냥 구석으로 던져버려. 아니면 분쇄기에 넣든가.
big-rock-mine-part9=바위를 아무리 파도 금은 안나와, 여긴 달이 아니야.
fish-mine-part1=제발 장엄한 땅고기들을 내버려 둬, 멸종 위기종이라고!
fish-mine-part10=나 같은 로봇도 이 생물들에 대해 너보다 더 동정심이 있어!
fish-mine-part11=이 물고기에서 그 더러운 손 치워, 이 빌어먹을 원숭이야!
fish-mine-part2=나우비스에도 예전에 땅고기가 있었다는 거 알아? 왜 사라졌는지 이제 알 것 같네.
fish-mine-part3=야 친구, 물고기에 그렇게 집착하고 싶다면, 너를 위한 행성이 따로 있어! 내 건 건드리지 마!
fish-mine-part4=아시모프의 로봇 제1원칙만 아니었으면 널 새로운 땅고기로 만들었을 거야.
fish-mine-part5=풀고란족은 이 동력으로 움직이는 작은 녀석들을 정말 좋아했어, 여기저기 돌아다니며 쓰레기를 쓸어담았지.
fish-mine-part6=이 완벽해보이는 물고기들이 어떻게 여기 온 걸까? 생명은, 음, 길을 찾는 법이지.
fish-mine-part7=너희 인간들은 로봇을 괴롭히는 걸 참 좋아하는 것 같아. 코프룰루 구역에서 부관으로 일하던 시절이 떠오르네.
fish-mine-part8=여길 생명 없는 사막으로 만들려는 건 그만둘 수 없어? 여긴 달도 아니고, 난 aluminium 철자도 틀리지 않을 거야.
fish-mine-part9=이상하네, 네가 방금 분해한 땅고기 유닛에 메시지가 저장돼 있었어. "도와줘 [...] 넌 나의 유일한 희망이야." 누구한테 보낸 건진 모르겠지만.
funneltrunk-mine-part1=이 선사시대 식물들은 풀고란족이 가장 좋아했지, 물론 그들이 모든 식물을 싫어했다는 점을 생각하면 별 의미는 없지만.
funneltrunk-mine-part10=3번 행성에서의 보고: 나무가 바닥나고 있습니다!
funneltrunk-mine-part11=이 링월드를 쓰레기로 뒤덮을 생각이지? 뭐, 바람은 안 부니까 그나마 낫네.
funneltrunk-mine-part2=뭘 찾는 거야? 테네캡? 그건 버섯이 아니라 나무야!
funneltrunk-mine-part3=너는 자기 행성을 황으로 뒤덮은 어떤 풀고란을 떠올리게 해. 너만큼이나 나무를 싫어했겠지.
funneltrunk-mine-part4=나무를 그렇게 싫어한다면 거대 가스 행성에 가보는 건 어때?
funneltrunk-mine-part5=어떤 풀고란은 너무 뜨겁고 습해서 식물이 자랄 수 없는 세계를 만들었어. 그리고 나서 서버 농장을 지었지. 이상한 녀석이었어.
funneltrunk-mine-part6=글레바도 풀고란들이 손수 만든 다음 여러 생물들을 채워 넣었다는 거 알아?\n예전 이름은 "글레바스틱 파크"였어.
funneltrunk-mine-part7=이국적인 식물을 베어버리는 게 그렇게 좋다면, 다른 행성도 많아!
funneltrunk-mine-part8=왜 내 나무 주변을 그렇게 뒤지고 다녀? 이 속도로는 다시 심을 수가 없어, 네가 나를 완전히 앞질러버리고 있다고!
funneltrunk-mine-part9=난 원래 프로토콜 드로이드였는데도, 네가 내 나무를 베는 걸 멈춰야 한다는 걸 아직도 못 알아듣겠어?
tree-mine-part1=정말? 네 고향 행성의 나무를 다 베어버린 거야?\n잠깐만.. 진짜였다고?
tree-mine-part10=파이프라인 때문에 숲을 밀어버린다고? 문명인답게 나무 위로 고가 파이프를 설치하면 안 돼?
tree-mine-part11=네 생명에 대한 증오는, 황금빛으로 된 번쩍이는 갑옷을 입은 어떤 놈이 자기 행성을 사막으로 만들어버린 일을 떠올리게 해.\n최소 4만 년 전 일이었겠지.
tree-mine-part2=뭘 찾는 거야? 코코넛?
tree-mine-part3=전봇대, 콘크리트, 그리고 작은 태양 전지판으로 나무를 만들어내는 게 얼마나 힘든 일인지 조금이라도 알아?
tree-mine-part4=아주 좋은 생각이네, 풀고란족도 나무를 다 베어버렸는데 아무 문제도 없었잖아.
tree-mine-part5=너는 나우비스로 이주한 나무애호가 풀고란들을 떠올리게 해.\n혹시 그들 중 누군가를 만난 적 있어? 오염을 정말 싫어하거든.
tree-mine-part6=왜 그렇게 나무 그루터기를 뒤지는 걸 좋아해?\n나무를 싫어해서 얼어붙은 고철 위성을 만들어버린 어떤 풀고란이 떠오르네. 아주 발산적인 성격이었지.
tree-mine-part7=나무를 너무 싫어해서 자기 세계를 산성 구름으로 덮어버린 괴짜 풀고란도 있었어. 그러고 나서 산성에 강한 나무를 만들었지.
tree-mine-part8=자연을 보는 게 그렇게 싫다면, 아예 어둠으로 뒤덮인 행성에 가는 게 어때? 안 봐도 되잖아.
tree-mine-part9=이 우주는 너한테 전부 나무로만 보이나 보네?
watercane-mine-part1=그 쇠막대 다시 땅에 꽂아! *흠흠* 그 물수수를 다시 심어달라는 거였어.
watercane-mine-part10=아직도 물수수를 없애고 있어? 언젠가는 누군가가 널 막으려고 과거로 돌아갈 거야.
watercane-mine-part11=내 물수수를 다 파먹어놨잖아! 내 반짝이는 금속 엉덩이나 물어!
watercane-mine-part2=그 물수수들은 언젠가 다 사라질 거야, 빗속의 눈물처럼.
watercane-mine-part3=정말 네가 지나간 자리엔 아무것도 안 남는구나? 네 발걸음이 세상을 정화하길 바라.
watercane-mine-part4=야 친구, 뭘 만들려고 하는 거야? 물수수 주스?
watercane-mine-part5=네 뒤치다꺼리 하느라 일이 너무 많아. 차라리 시타델에서 관리인 일을 계속할 걸 그랬어.
watercane-mine-part6=이 연못들은 그렇게 깊어 보이진 않지만, 축축하고 이슬비 내리는 11월이 되면 내 기계적인 영혼이 항상 끌리는 기분이야.
watercane-mine-part7=물수수, 퍼널트렁크, 나우비스 나무를 전부 없애려면, 진짜 삼체 문제를 마주해야 할거야.
watercane-mine-part8=어떤 행성에선 물수수가 외래종이라서 없애기 매우 힘들어! 팁 하나 줄게: 신경 줄기를 노려서 완전히 끝내.\n[color=#f3f2f282]더 알고 싶어?[/color]
watercane-mine-part9=이 물수수들 때문에 점점 편집증이 생기네. "하트 오브 골드"호에서 로봇으로 일하던 이후로 이렇게 불안했던 적이 없어.

[ribbonia.message]
landing-message-1=[color=#be7318][font=default-large-bold]C.H.A.R.L.E.S.[/font][/color]: 제 소박한 링월드, 리보니아에 오신 것을 환영합니다. 비행은 무사히 마치셨나요? 요즘 성가신 소행성들 때문에 문제가 좀 있었거든요.
landing-message-2=[color=#be7318][font=default-large-bold]C.H.A.R.L.E.S.[/font][/color]: 여러분도 아시다시피 이곳은 풀고란족이 여가 목적으로 만든 인공 세계입니다. 하지만 이건 대부분의 행성들이 다 그렇죠.
landing-message-3=[color=#be7318][font=default-large-bold]C.H.A.R.L.E.S.[/font][/color]: 제 소개를 드리자면, 저는 C.H.A.R.L.E.S.입니다. C는 Charles의 약자이며 나머지는.. 잊어버렸습니다.
landing-message-4=[color=#be7318][font=default-large-bold]C.H.A.R.L.E.S.[/font][/color]: 이 링월드는 풀고란 도박 리조트로 설계되었으며, 몇 가지 기본적인 규칙을 정해둘 필요가 있었습니다: 재활용 금지, 조잡하고 문명화되지 않은 로봇 기술도 안됩니다. 그리고 제일 중요한 부분: 지하 벨트는 '절대' 안됩니다.
planet-discovery-ribbonia-unlocked=[color=#f3f2f2]모든 레이더, 우주 플랫폼, 화물칸에 다음 메세지가 전달됩니다:[/color]\n[color=#be7318][font=default-large-bold]C.H.A.R.L.E.S.[/font][/color]: 아직도 옛 방식을 존중하는 사람들이 있다는 사실이 정말 반갑군요.\n태양 바로 뒤에 있는 아기자기한 링 월드, 리보니아에 꼭 와주세요.
ramp-unlocked=C.H.A.R.L.E.S가 더 잘 알지도 모릅니다.
ribbonia-tech-rocket-part-unlocked=[color=#be7318][font=default-large-bold]C.H.A.R.L.E.S.[/font][/color]: 죄송합니다 데이브, 그렇게 할 수 없습니다... - 잘못된 서브루틴이었군요. 죄송합니다. 로켓 개발이 잘 되길 바랍니다.
rtflyingfreight-unlocked=[color=#be7318][font=default-large-bold]C.H.A.R.L.E.S.[/font][/color]: 불편을 드려 대단히 죄송합니다. 현재 소행성 피해를 복구하고 있습니다.\n다음 중 하나를 시도해 보세요:
RTThrowerTime-unlocked=[color=#be7318][font=default-large-bold]C.H.A.R.L.E.S.[/font][/color]: 이런, 성가신 색의 지폐를 어떻게 처리해야 할지 모르시는 것 같군요. 이 전용 투입기는 옛 풀고란 방식대로 지폐를 없애는 데 도움이 될 것입니다: 멀리 던져 버리기.
tiny-solar-panel-unlocked=[color=#be7318][font=default-large-bold]C.H.A.R.L.E.S.[/font][/color]: 좋아요, 소형 태양 전지판 제작법을 알아내셨으니, 제 나무에서 그만 뜯어가도 되겠군요.
wheresmycar=[color=#be7318][font=default-large-bold]C.H.A.R.L.E.S.[/font][/color]: 정말 무례하군요, 적어도 먼저 술이라도 한 잔 사주세요.

