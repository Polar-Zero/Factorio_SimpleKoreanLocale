[entity-description]
exposed-machinery=수천 년에 걸쳐 융합된 미스터리 박스 더미. [fluid=fusion-plasma]로만 채굴할 수 있습니다.
fulgoran-fusion-generator=대충 엮어 만든 이 기계는 변환하는 에너지가 적으며, 많은 에너지를 방출하지만, 당분간은 이걸 써야 할 것입니다.
ribbonia-charles=풀고란족으로부터 [planet=ribbonia] 건설 및 관리 임무를 맡은 C.H.A.R.L.E.S.는 지금까지 만난 것 중 가장 오래된 존재입니다.
ribbonia-land-fish=이것은 분명히 기계 청소기로, [planet=ribbonia]를 깨끗하게 유지하고 있었습니다. 하지만 C.H.A.R.L.E.S.는 이를 "육지 물고기"라고 불러달라 강조합니다.
big-satellite-asteroid=오래전에 사라진 문명이 남긴 우주 쓰레기. 크기는 꽤 크지만, 단순한 공격이나 레이저만으로도 쉽게 파괴시킬 수 있습니다.
huge-satellite-asteroid=오래전에 사라진 문명이 남긴 우주 쓰레기. 크기는 꽤 크지만, 단순한 공격이나 레이저만으로도 쉽게 파괴시킬 수 있습니다.
medium-satellite-asteroid=오래전에 사라진 문명이 남긴 우주 쓰레기. 크기는 꽤 크지만, 단순한 공격이나 레이저만으로도 쉽게 파괴시킬 수 있습니다.
small-satellite-asteroid=오래전에 사라진 문명이 남긴 우주 쓰레기. 크기는 꽤 크지만, 단순한 공격이나 레이저만으로도 쉽게 파괴시킬 수 있습니다.

