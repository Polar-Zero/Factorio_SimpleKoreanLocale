[tips-and-tricks-item-description]
wooden-platform=[item=wooden-platform]은 일부 경량 기계나 인프라를 물 위에 배치할 수 있도록는 모듈형 바닥재입니다. 플랫폼을 이용하면 공장을 호수, 강 또는 바다로 확장하면서도 가볍고 안정적인 구조물을 통한 더 간단한 배치가 가능합니다.\n설치할 수 있는 객체 유형은 다음과 같습니다: \n- [entity=pipe] 파이프\n- 배럴링 기계\n- [entity=radar]\n- 투입기\n- 운송 벨트\n- 물류/보관 상자\n- 조합기, 조명 등과 같은 회로 기계\n- 기관 포탑\n- [entity=heavy-gun-turret] 중기관 포탑 (설치된 경우)\n- [entity=flamethrower-turret] 화염 방사 포탑\n- 로켓 포탑\n- [entity=pump] 펌프 (디젤 펌프는 해당 없음)