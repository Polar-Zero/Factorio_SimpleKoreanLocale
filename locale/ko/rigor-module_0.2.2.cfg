rigor-module-list=[item=rigor-module] 엄격 모듈 \n[item=rigor-module-2] 엄격 모듈 2 \n[item=rigor-module-3] 엄격 모듈 3
rigor-module-mod-tip-1=엄격도는 [tooltip=엄격 모듈,tips-and-tricks-item-description.rigor-module-list]에서 제공하는 새로운 모듈 효과입니다. 엄격도는 제작법이 가장 가치 있는 산출물을 생산할 확률을 증가시킵니다. 엄격도는 확률적 산출물을 가진 제작법에만 영향을 미칠 수 있으며, 제작법마다 하나의 출력물에만 적용됩니다. 또한 [recipe=scrap-recycling]을 제외한 재활용 제작법에 영향을 미치지 않습니다.\n엄격도는 제작법이 지정된 산출물을 생산할 확률을 다음과 같이 증가시킵니다. 확률 ‘p'일 때: 확률 = 'p/(1-p)'. 확률 'p'와 엄격성 'r'일 때, 확률은 다음 공식으로 조정됩니다: 'rp/(rp - p + 1)’.

[mod-setting-name]
rigor-module-compatibility-mode=호환성 모드 활성화
rigor-module-compatibility-mode-include-vanilla=[호환성 모드] 기본 게임 제작법 허용
rigor-module-multiplayer-wait-ticks=(멀티플레이어) 동기화 틱

[mod-setting-description]
rigor-module-compatibility-mode=호환성 모드를 활성화하면, 엄격 모듈을 사용할 제작법이 명시적으로 허용 목록에 등록되어야 합니다. 이 모드가 다른 모드와의 호환성 문제를 일으키는 경우에만 활성화하는 것을 추천합니다.
rigor-module-compatibility-mode-include-vanilla=호환성 모드에서 기본 게임의 (우주 시대 포함) 모든 사용 가능한 제작법을 허용 목록에 추가해야 할지 설정합니다? 호환성 모드가 활성화된 경우에만 적용됩니다.
rigor-module-multiplayer-wait-ticks=멀티플레이어에서 제작 기계 엄격도를 업데이트할 간격. (틱 단위) 엄격 모듈을 추가/제거한 뒤 제작 기계 엄격도는 최소 N 틱, 최대 2N+1 틱 이내에 업데이트됩니다. 이는 비동기화를 방지하기 위해 필요합니다. 값을 크게 설정할수록 엄격 모듈 반응성이 떨어지지만 비동기화 발생 가능성 역시 감소됩니다. 멀티플레이어에만 적용됩니다.