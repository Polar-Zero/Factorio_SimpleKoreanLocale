[mod-setting-description]
space-industry-space-boiler=우스꽝스럽게 들리지만 우주에선 연료를 태울 수 없습니다. 하지만 이는 원자력을 사용하지 않는다면 유일한 증기 공급원이라는 것을 명심하세요. 전기 보일러 모드가 있다면 대신 사용하는 것도 물론 가능합니다.