[mod-setting-description]
debug-cactus-recipe=이전 저장 파일에서 선인장을 얻을 수 있도록 하는 디버그 제작법을 추가합니다.
enable-arig-cargo-drops=아리그에서 화물 포드 투하를 가능하도록 허용합니다.
ignore-arig-tech-price-exponent=활성화하면, 연구 비용이 매우 증폭될 가능성이 있습니다.