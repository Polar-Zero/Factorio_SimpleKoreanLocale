[item-description]
halo-computer=엄청난 양의 전력을 소비하고 50%를 열 형태로 방출합니다. 작동하려면 200°C 미만이어야 합니다.
halo-gmo=멸균 환경에서 바이오플럭스를 성장시키는 데 사용됩니다. 
