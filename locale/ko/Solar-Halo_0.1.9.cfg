[mod-name]
Solar-Halo=태양 궤도(Solar Halo)

[mod-description]
Solar-Halo=태양 궤도와 슈퍼컴퓨터를 게임에 추가합니다. 태양의 엄청난 열기를 이겨내고, 고에너지 슈퍼 컴퓨터를 작동하는 데 필요한 엄청난 양의 태양 에너지를 수집해보세요.\n\n번역: SimpleKoreanLocale(PolarZero)


