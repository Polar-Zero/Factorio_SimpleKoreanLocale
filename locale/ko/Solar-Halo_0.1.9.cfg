[entity-description]
halo-computer=엄청난 양의 전력을 소비하고 50%를 열로 방출합니다. 작동하려면 200°C 미만이어야 합니다. 신호기는 효과가 없습니다.
halo-flare=거대한 플라즈마 폭발. 일반적인 공격은 전혀 효과가 없습니다.
halo-gmo=유마코와 젤리넛 유전자를 혼합해 접목시킨 나무. 바이오플럭스를 생산합니다.
halo-heatpump=더 높은 온도 달성을 위해 열을 이동시킵니다. 입력되는 열은 40°C 이상이어야 합니다.
halo-heatsink=열을 배출하거나 전달하는 데 사용됩니다. 열 입력부 하나는 저온 제작법, 다른 열 입력부는 고온 제작법에 사용됩니다.
halo-nav-computer=성도를 활용해 소행성 충돌을 방지합니다.
halo-terminal=전해질 충전 및 방전이 가능합니다.
halo-thermostat=온도 측정

[fluid-name]
halo-charged-electrolyte=충전된 전해질
halo-compute=연산
halo-energy-proxy=에너지(MJ)
halo-heat-energy=열 에너지(MJ)

[fluid-description]
halo-charged-electrolyte=충전에 상당한 양의 전기가 필요합니다.
halo-compute=케이블, 라우터, 스위치의 저지연 통신에 사용할 수 있습니다. 각 포트는 초당 약 4,000 단위의 연산을 전송할 수 있습니다.
halo-energy-proxy=방출된 에너지의 내부 측정에 사용됩니다.
halo-heat-energy=열 측정에 사용됩니다.

