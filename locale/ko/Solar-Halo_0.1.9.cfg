halo-nav-pack=항법 컴퓨터에 투입해 플랫폼 이동을 지원합니다. 소행성은 지속적으로 이동하므로 유효시간이 짧습니다.
halo-science-pack=연구실에서 연구하는 데 사용됩니다.
