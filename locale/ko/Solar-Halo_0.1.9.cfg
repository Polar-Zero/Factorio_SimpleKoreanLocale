[technology-description]
halo-compute=고급 연산을 활용한 연구를 진행할 수 있습니다.
halo-discovery-solar=태양 폭풍이 대규모로 발생하는 태양 궤도로의 우주 경로를 계획해보세요. 소행성은 없지만 일반적인 재래식 무기에 내성을 가진 플라즈마 폭발을 조심해야 합니다. 중력이 높은 데다 자원도 부족하므로 다소 위험할 수 있습니다.
halo-gmo=접목을 통해 신종 식물을 만들어보세요.
halo-heatsink-high=고급 열 관리를 가능하게 하는 객체 제작이 가능합니다.
halo-module=고급 시뮬레이션을 이용하면, 특정 조건에 맞게 모듈을 특화하는 것으로 잠시 동안 효과를 두 배로 높일 수 있게 됩니다.
halo-nav-computer=소행성과의 충돌을 최대한 줄이면서 항해할 수 있도록 하는 최적화된 경로를 계산합니다.
halo-rocket=정밀한 기상 및 물리 시뮬레이션을 이용하여 비행 중 미세 조정 필요성을 줄여보세요.
halo-sim=고급 시뮬레이션을 이용하여 과학 기술을 연구해보세요.
halo-solar=태양 광선을 집중시켜 태양 전지판에서 수집할 수 있는 태양 에너지량을 증폭시켜보세요. 참고: 이 연구는 모든 진영에 영향을 끼치며, 게임에서 사용 가능한 모든 진영 중 가장 높은 연구 수준이 적용됩니다.
halo-speed=슈퍼컴퓨터의 제작 속도를 증가시킵니다.
halo-terminal=전해질을 주의 깊게 관리해 상당한 양의 에너지를 주입시켜보세요. 충전된 전해질은 부식성이 훨씬 적으며 배럴로 운반할 수 있습니다.

[tips-and-tricks-item-name]
halo-compute=과열
halo-solar-halo-briefing=태양 궤도

[tips-and-tricks-item-description]
halo-compute=[entity=halo-computer]과 같은 일부 객체는 너무 뜨거워지면 작동이 중지됩니다. [entity=heat-pipe]는 [entity=halo-heatsink]로 열을 전달하여 온도를 낮추는 데 사용할 수 있습니다. [entity=halo-heatpump]가 사용되면, 이를 통해 열을 집중시켜 [entity=heat-exchanger] 등을 더 높은 온도로 작동시킬 수도 있습니다.
halo-solar-halo-briefing=태양에 더 가까이 접근할수록 훨씬 더 효율적으로 태양 에너지를 수집할 수 있지만, 그만큼 큰 위험이 따릅니다. 태양 근처에는 소행성이 존재하지 않지만, 일반적인 재래식 무기에 저항력을 가지는 [entity=halo-flare]가 존재합니다. 레이저나 전기 무기만이 효과가 있으며, 이를 사용하는 것을 권장합니다. 또한 접근할수록 태양의 인력이 강해지므로, 연료가 충분하지 않다면 너무 가까지 이동하지 않는 것이 현명할 수 있습니다. 우주 연결은 비행 조건을 사용하므로 우주 플랫폼이 도중에 되돌아갈 수 있습니다.

