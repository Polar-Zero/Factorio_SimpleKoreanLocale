[space-location-description]
apia=점성이 높은 고밀도 대기를 가진 쌍성계 행성 중 하나입니다. 표면은 현지 꿀벌이 생산하는 고영양 로열젤리 바다와 수많은 작은 섬으로 이루어져 있습니다. 생태계는 꿀을 생산하는 곤충과 무척추동물인 애벌레가 대표적입니다.
apia-carnova-orbit=쌍성계의 중심부입니다
carnova=풍부한 산소 대기를 가진 쌍성계의 거대한 행성 부분입니다. 이 행성은 피와 비슷한 성분으로 이루어진 바다로 덮여 있습니다. 표면에는 많은 살로 이루어진 섬들이 흩어져 있으며, 이 섬에서 뼈 퇴적물을 얻을 수 있습니다. 생태계는 바다에 서식하는 포식성 물고기가 대표적입니다.

