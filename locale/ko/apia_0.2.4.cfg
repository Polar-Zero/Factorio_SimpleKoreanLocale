[tips-and-tricks-item-description]
apia-briefing=[planet=apia]는 [planet=apia]-[planet=carnova] 쌍성계 행성 중 대기 밀도가 높은 행성이며, [entity=logistic-robot]과 [entity=construction-robot] 작동에 더 많은 에너지가 필요합니다. 고밀도의 구름이 [entity=solar-panel] 효율을 낮춥니다.\n표면 전체는 [fluid=royal-jelly] 바다로 덮여 있으며, 그 안에는 [entity=larvae]가 살고 있습니다. 이 생물들의 딱딱한 외피는 기본 자원으로 변환할 수 있습니다: [item=iron-ore], [item=copper-ore], [item=stone].\n이 행성의 다른 생명체는 [entity=wild-hive]을 만드는 꿀을 생산하는 곤충입니다. 그들이 생산하는 [item=honeycombs]은 [item=honey]과 [item=wax]로 가공할 수 있습니다.\n행성의 다른 중요한 자원은 [item=phosphorus]와 [fluid=phosphoric-acid]입니다.
carnova-briefing=[planet=carnova]는 [planet=apia]-[planet=carnova] 쌍성계 행성 중 하나입니다. 표면은 [fluid=blood]의 바다로 덮여 있으며, 지역 동물의 [entity=piranha] 산란장이 종종 발견됩니다.\n기본 자원은 주로 광물과 칼슘으로 구성된 [item=bones]에서 추출할 수 있습니다: [item=iron-ore], [item=copper-ore], [item=stone], [item=phosphorus], [item=calcite].\n표면은 수많은 [item=flesh] 섬으로 이루어져 있으며, 이를 가공하여 [item=proteins]과 [item=lipids]을 얻을 수 있습니다. 대체 산업에 필요한 산은 [fluid=phosphoric-acid]를 사용할 수 있습니다.

