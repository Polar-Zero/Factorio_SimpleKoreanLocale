[mod-setting-description]
nulls-k2so-crushing-industry-ratios=분쇄 산업(Crushing Industry) 모드에서 K2 광석-판 비율 기준을 사용하도록 강제하고, 분쇄된 광석을 농축하는 제작법을 추가합니다. 이는 화학 과학 팩 이전 단계에서 너프로 적용되지만, 불카누스/글레바 이후 버프가 되며, Crushing Industry이 설치된 대부분의 게임 광석 농축에 이를 사용할 수 있게 됩니다.
nulls-k2so-expanded-alternate-recipes=중간 생산품에 대한 더 많은 대체 제작법을 추가하여 Krastorio 2와 모드 행성을 동시에 활성화할 경우. 이를 더 잘 사용할 수 있도록 변경합습니다.
nulls-k2so-expanded-matter-recipes=생존이 불가능한 행성에서 핵심 K2SO 자원을 확보하는 데 도움을 주는, 더 많은 물질 변환 제작법을 추가합니다.
nulls-k2so-maraxsis-quantum-revert=Maraxsis의 양자 컴퓨터 건물 요구사항 및 이름 변경점을 되돌립니다.
nulls-k2so-modify-recycling-results=다른 모드와 플레이할 때 발생하는 다양한 재활용 불일치에 대한 수정을 시도합니다.
nulls-k2so-standardize-stack-sizes=K2 모드에서 사용하는 묶음 크기 철학을 다른 모드 아이템에도 적용합니다. 이는, 대부분의 아이템은 이제 200개, 대부분의 기계 내부에는 50개까지만 쌓을 수 있게 된다는 것을 의미합니다. 로켓 수용량은 변경되지 않습니다.
nulls-k2so-standardize-electrolysis=전기분해 제작법을 크라스토리오 2 전기 분해기(또는 전자기 공장)으로 이동시킵니다. 현재 마락시스 행성 제작법에만 적용됩니다. 이 설정을 비활성화하더라도 기계가 비활성화되는 것은 아니며, 필요성만 감소됩니다.