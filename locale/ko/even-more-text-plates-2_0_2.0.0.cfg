[mod-name]
even-more-text-plates-2_0=더 많은 문자판 2.0(Even More Text Plates 2.0)

[mod-description]
even-more-text-plates-2_0=Earendel의 Text Plates 모드에 더 많은 문자판 유형을 추가합니다. 기본 문자판 글꼴에 플라스틱 판 (하얀색 + 플레이어 색상 유형) 등을 추가합니다.\n\nDeadlock의 더 많은 More Text Plates을 기반으로 하였으며, Factorio 2.0에서 사용할 수 있도록 수정하였습니다.\n\n번역: SimpleKoreanLocale(PolarZero)


