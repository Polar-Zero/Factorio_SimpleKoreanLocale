[mod-setting-description]
even-more-text-plates-2_0-even-more=가능할 경우 새로운 문자판 유형을 사용할 수 있도록 활성화합니다. 비활성화된 상태라면, 두 가지 플라스틱 유형만 사용할 수 있게 됩니다.
even-more-text-plates-2_0-legacy-plastic=Deadlock989이 제공한 두 플라스틱이 이전 버전에서 사용하던 그래픽을 대신 사용합니다.