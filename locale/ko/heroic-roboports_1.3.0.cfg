[mod-setting-description]
buffer-capacity-modifier=로보포트 내부에 저장할 수 있는 에너지 버퍼 최대치를 조정합니다.
charging-energy-modifier=로보포트가 로봇을 충전하는 속도를 조정합니다.
construction-area-limit=건설 범위 연구의 최대값을 조정합니다.
energy-efficiency-limit=에너지 효율 연구에 대한 최대 허용치 (다른 모드에서 업그레이드를 추가하는 것을 제한합니다)
energy-productivity-limit=에너지 생산성 연구에 대한 최대 허용치 (다른 모드에서 업그레이드를 추가하는 것을 제한합니다)
energy-research-limit=최대 업그레이드/연구 수량 (다른 모드에서 업그레이드를 추가하는 것을 제한합니다)
energy-speed-limit=충전 속도 연구에 대한 최대 허용치 (다른 모드에서 업그레이드를 추가하는 것을 제한합니다)
energy-usage-modifier=로보포트가 대기 상태에서 사용하는 에너지량을 조정합니다.
input-flow-limit-modifier=로보포트의 자체 충전속도를 조정합니다.
logistic-area-limit=물류 범위 연구의 최대값을 조정합니다.
material-storage-limit=도구 보관소 연구의 최대값을 조정합니다.
recharge-minimum-modifier=로보포트가 켜지기 전에 저장해야하는 버퍼 전력량을 조정합니다.
research-maximum=게임에서 사용할 수 있는 최대 업그레이드/연구 수량을 조정합니다.
research-minimum=게임에서 사용할 수 있는 최소 업그레이드/연구 수량을 조정합니다.
research-upgrade-cost=각 업그레이드에 필요한 연구 팩 수량을 조정합니다.
research-upgrade-time=각 업그레이드 단위마다 필요한 연구 시간을 설정합니다.
show-items=게임에 여러 아이템을 추가합니다 (디버깅 목적 또는 특정 문제 해결에 사용할 수 있음)
upgrade-timer=모드가 추적한 로보포트를 업그레이드할 빈도를 조정합니다. (틱 단위)