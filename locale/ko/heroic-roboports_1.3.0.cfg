[mod-name]
heroic-roboports=영웅 로보포트(Heroic Roboports)

[mod-description]
heroic-roboports=새로운 로보포트 티어 2종, 로보포트 업그레이드와 관련된 연구를 추가합니다!\n모든 '티어' 또는 업그레이드는 동일한 값을 추가합니다 (기본: 100%, MK2: 200%, MK3: 300%, MK4: 400%)\n모드는 모듈 연구를 중심으로 밸런스가 맞춰져 있으며, 우주 시대 DLC에서 작동합니다.\n\n번역: SimpleKoreanLocale(PolarZero)


