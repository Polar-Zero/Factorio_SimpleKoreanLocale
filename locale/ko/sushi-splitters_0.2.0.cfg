[mod-name]
sushi-splitters=스시 분배기(Sushi Splitters)

[mod-description]
sushi-splitters=단일 객체만 사용해서 여러 회로 신호를 받아 초밥 벨트에서 필요한 모든 재료를 추출하도록 할 수 있습니다. 출력이 가득 차면 막히지 않고 선별된 아이템은 선별되지 않은 출력 벨트로 전달됩니다.\n\n번역: SimpleKoreanLocale(PolarZero)


