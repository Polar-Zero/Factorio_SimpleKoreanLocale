[item-description]
crane-bulk-diesel-inserter=대용량 화물 취급을 위해 더 큰 크기로 설계된 연료 구동식 크레인입니다. 한 번의 잡기 동작으로 아이템 전체 묶음을 손쉽게 이동시킬 수 있습니다.\n선박/기차 하역이나 대형 창고간 아이템 이송에 적합합니다.
diesel-assembling-machine=디젤 엔진으로 구동되는 다목적 조립 기계입니다. 전력망에 연결하지 않아도 작동하지만 작동에 연료가 필요합니다.
diesel-mining-drill=디젤 엔진으로 구동되는 채광 드릴입니다. 전력망에 연결하지 않아도 작동하지만 작동에 많은 연료가 필요합니다.
diesel-pump=유체 연료로 구동되는 견고한 펌프입니다. 전력망에 연결하지 않아도 작동하므로, 외부 지역에서의 유체 처리에 적합합니다.
fast-diesel-inserter=디젤 엔진으로 구동되는 투입기. 전기 유형보다 훨씬 빠릅니다.
long-handed-diesel-inserter=연료 구동식 긴 팔 투입기. 독립적으로 작동하지만 연료가 필요합니다.
portable-diesel-generator=혹독한 환경에서도 작동되도록 설계된, 휴대 가능한 강화형 디젤 엔진입니다. 디젤 연료 배럴을 공급하면 핵분열로의 출력조차 압도합니다.

[technology-name]
portable-diesel-generator=휴대용 디젤 발전기
diesel-automation=디젤 자동화

[technology-description]
diesel-automation=전기 대신 유체 연료로 작동하는 연료 기반 기계를 사용할 수 있습니다. 전력망에서 벗어난 지역에서도 자동화 작업이 가능하지만, 지속적인 연료 공급이 필요합니다.
portable-diesel-generator=혹독한 환경에서도 작동되도록 설계된, 휴대 가능한 강화형 디젤 엔진입니다. 디젤 연료 배럴을 공급하면 핵분열로의 출력조차 압도합니다.