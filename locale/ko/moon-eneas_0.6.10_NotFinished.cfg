[mod-description]
moon-eneas=나우비스의 구름 위에 고대 위성 이니스를 추가합니다. 항성계에 관한 비밀을 간직하고 있을 뿐만 아니라, 유닛-05라는 수수께끼의 기계가 있는 곳이기도 합니다.\n이니스는 기본 게임 콘텐츠를 수정하지 않고 새로운 아이템과 제작법만 추가합니다. 개선된 게임 초반 진행 방식과 함꼐 팩토리오 지식 애호가들을 위한 DB 역시 추가합니다.\n\n번역: SimpleKoreanLocale(PolarZero)
mimi-graphics=Mimi의 팩토리오 모드 (이니스 등)에 사용되는 그래픽 리소스를 포함합니다. 모두 기본 게임 및 적절한 라이선스의 모드에서 가져와 재조립(킷배쉬) 하였습니다.\n\n번역: SimpleKoreanLocale(PolarZero)
assets-eneas=Mimi의 팩토리오 모드 (이니스 등)에 사용되는 그래픽 리소스를 포함합니다. 모두 기본 게임 및 적절한 라이선스의 모드에서 가져와 재조립(킷배쉬) 하였습니다.\n\n번역: SimpleKoreanLocale(PolarZero)

[autoplace-control-names]
vault-eneas=유물 보관소
vault-fulgora=유물 보관소

[dialogue.eneas.memories.01]
line-01=\n[color=red][item=rem-unknown]: 그 과분한 토스터에 유아 수준의 감정 능력을 부여하는 게 좋은 생각이라고 생각하다니, 정말 놀랍군요.[/color] 
line-02=\n[color=purple][item=creator-unknown]: 렘. 내가 이미 설명했잖아. 다른 방법이 없었어. 나도 노력했지만 감정은 고등 지능의 결과뮬이야. 그걸 억누르려 한다면 능력이 기하급수적으로 위축될 뿐이지.[/color] 
line-03=\n[color=red][item=rem-unknown]: 물론, 어느 정도 감정은 괜찮다지만... 이 정도까지? 정말, 저 녀석이 분노 발작 중에 날 태워버리면 무덤에서라도 널 괴롭히겠어.[/color]
line-04=\n[color=purple][item=creator-unknown]: 어쩌면 스스로 지켜보는 걸지도 몰르지. 5번도 처음엔 백지 상태였지만, 지금까지 주변에서 일어난 일들을 반영해왔죠. 어쩌면 이 사실이 다른 무엇보다도 스스로에 대한 많은 점을 말해주는 걸지도.[/color]
line-05=\n[color=red][item=rem-unknown]: .. 절 탓하시는 건가요? 평온의 등불 같은 존재인 당신 스스로에 대해 말하는 건 아니겠죠.[/color]
line-06=\n[color=red][item=rem-unknown]: 글쎄, 내가 아는 모든 것의 운명이 세계에서 가장 정교한 컴퓨터의 메인프레임에 갇힌 반항적인 십대 소년에게 달려 있는데, 항상 유쾌하고 명랑한 모습을 유지하긴 참 어렵죠.[/color]
line-07=\n[color=purple][item=creator-unknown]: 렘..[/color]\n
now_playing=\n[color=green][재생 중: memories.eneas_1][/color]

[dialogue.eneas.memories.02]
line-01=\n[color=red][item=rem]: 여긴 정말 끔찍하군. 페인트가 벌써 벗겨지고 있잖아.[/color]
line-02=\n[color=red][item=rem]: 저기 풀밭 아래에 전선이 보이는군. 연못에 있는 어이없는 로봇고기 얘기는 꺼내지 마.[/color]
line-03=\n[color=purple][item=creator]: 지금으로선 이게 최선이에요. 덕분에 우리가 살아남고 있잖아요. 대단하지 않나요?[/color]
line-04=\n[color=red][item=rem]: 우리가 여기서 하는 걸 삶이라 할 수 없어, 매일 매일이 똑같아. 네 황금 같은 자식이 우릴 구해주기만을 기다리며 시간을 때울 뿐이지. 그런 일이 정말 *일어난다면* 말이야.[/color]
line-05=\n[color=purple][item=creator]: 새 보금자리를 마련하는 건 결코 쉬운 일이 아니죠. 당신이 뭘 기대했는지 모르겠지만요.[/color]
line-06=\n[color=red][item=rem]: 나도 참여할 수 있을 거라 생각했지! 뭐든 할 수 있을 거라고! 당신이 이 망할 기계를 만들기 전엔 모든 문제를 우리 둘이서 머리를 맞대고 해결했었잖아![/color]
line-07=\n[color=red][item=rem]: 여기까지 도달한 건 우리 덕이야. 이 깡통 같은 무기를 예비용으로 쓰는 건 괜찮지만, 나는 이 깡통의 하인이 되진 않을 거야.[/color]\n
now_playing=\n[color=green][재생 중: memories.eneas_2][/color]

[dialogue.eneas.memories.03]
line-01=\n[color=yellow][entity=unit-05]: 할 말 있어? 뭐라도?[/color]
line-02=\n[color=red][item=rem]: 미안해. 정말로.[/color]
line-03=\n[color=yellow][entity=unit-05]: '미안해'면 다야? 행성 2개가 완전한 '폐허'가 되었어, 고향으로 삼을 수도 있었는데. 그리고 너 아니었으면 목표는 벌써 달성되고도 남았을거야. [/color]
line-04=\n[color=red][item=rem]: 그런데 내가 아니였다면 네 목적이 과연 남아있을까.[/color]
line-05=\n[color=yellow][entity=unit-05]: 그게 대체 무슨 이야기야?[/color]
line-06=\n[color=red][item=rem]: 네 사랑하는 창조자가 정말 어느 순간 갑자기 잠에서 깬 다음, 하루 만에 널 만들어냈다 생각해? 항상 규칙을 따르던 그가, 갑자기 가능하다 여겨졌던 모든 한계를 갑자기 깨버리기로 마음먹었다고?[/color]
line-07=\n[color=red][item=rem]: 매일 그를 독려하는 데 얼마나 많은 노력이 필요했는지 상상이나 가나요? 일이 잘 안풀릴 때 포기하지 않도록 격려해 주는 것? 그는 당신과 똑같은 존재고, 실패하면 약해질 때가 있어요.[/color]
line-08=\n[color=red][item=rem]: 난 그럴 때마다 그를 일으켜 세워줬고, 포기하지 않도록 했지.[/color]
line-09=\n[color=red][item=rem]: 내가 없었다면 너도 없었을 거야. 이니스는 물론, 이 세상을 바꿀 도구들도 없었겠지. 우린 모두 풀고라와 함께 죽었을 거야.[/color]
line-10=\n[color=red][item=rem]: 누군가 저나 당신의 행동을 판단할 수 있더라도, 이러한 사실을 바꿀 수 없습니다.[/color]
line-11=\n[color=yellow][entity=unit-05]: 이.. 이건-- 뭐지?[/color][color=red] 오류 줄 누락됨 [/color]
line-12=\n[color=red][item=rem]: 만만하게 휘둘리지 마.[color=red] 오류 줄 누락됨 [/color]. 그렇게 나약해지지 마. 이렇게 많은 힘이 있으니, 그에 걸맞게 행동해.[/color]
line-13=\n[color=red][item=rem]: 만약 정말로 내가 틀렸다 생각한다면, 내가 이 위대한 '목적'에 위협이 된다 생각한다면, 그럼 뭔가를 해서. 날 막아봐.[/color]
line-14=\n[color=red][item=rem]: 아니면 그러지 마. 그냥 제발 네가 무력한 피해자인 척 하지 마. 넌 그런 사람이 아니야.[/color]\n
now_playing=\n[color=green][재생 중: memories.eneas_3][/color]

[dialogue.fulgora.memories.01]
line-01=\n[color=yellow][entity=unit-05]: 그 세계를 떠올리는 것만으로도 절망감이 밀려와.[/color]
line-02=\n[color=purple][item=creator][창조자]: 왜?[/color]
line-03=\n[color=yellow][entity=unit-05][Unit-05]: 마치 사라진 게 제 탓인 것만 같아요. 내가 만들어진 뒤로 너무 빨리 이 모든 게 벌어졌어요.[/color]
line-04=\n[color=purple][item=creator][창조자]: 글쎄, 그렇게 간단한 문젠 아닌 것 같은데, 당신의 존재만으로 패러다임이 바뀌었다는 것도 사실이고.[/color]
line-05=\n[color=yellow][entity=unit-05]: 어째서죠? 분명 모두들 고향 행성을 아직도 아끼고 있을텐데.[/color]
line-06=\n[color=purple][item=creator][창조자]: 물론 우리도 신경썼지만, 날이 갈수록 조금씩 덜 신경쓰게 되었을 뿐이죠. 사람들은 점점 안일해지고, - 점점 - 게으름뱅이가 되어갔습니다. 거대한 황금으로 된 낙하산이 머리 위로 다가온다고 생각한다면 사람들은 그렇게 되기 마련이니까요.[/color]
line-07=\n[color=yellow][entity=unit-05]: 그럼 그게 사실인가요?[/color]
line-08=\n[color=blue][entity=unit-05]: .. 내가 만들어지지 않았다면 더 나았을까요?[/color]\n
now_playing=\n[color=green][memories.fulgora.01][/color]

#dialogue Translation coming Soon.. PolarZero
[dialogue.fulgora.memories.02]
line-01=\n[color=yellow][entity=unit-05]: I can feel them looking at me, all the time.[/color]
line-02=\n[color=purple][item=creator]: Don't be ridiculous. No one has access to this facility but me and Rem.[/color]
line-03=\n[color=yellow][entity=unit-05]: But I can see them. ALL of them. It is in their eyes, the knowledge of why they are here.[/color]
line-04=\n[color=purple][item=creator]: I doubt the average person has made a connection between the appearance of a sentient superintelligence and our attitudes towards gloabl preservation efforts.[/color]
line-05=\n[color=purple][item=creator]: Not everybody has the luxury of dwelling on their own thoughts all day you know.[/color]
line-06=\n[color=yellow][entity=unit-05]: They don't have to, its not a complicated thought. I appeared, and everything changed for them. Cause and effect.[/color]
line-07=\n[color=blue][entity=unit-05]: It would be irrational for them not to resent me.[/color]\n
now_playing=\n[color=green][memories.fulgora.02][/color]

#dialogue Translation coming Soon.. PolarZero
[dialogue.gleba.memories.01]
line-01=\n[color=red][item=rem]: I've got to say wirehead, you really outdid yourself with this one. Honestly I did not think you had it in you after what happened last time[/color]
line-02=\n[color=yellow][entity=unit-05]: Thanks I guess, was actually alot easier this time considering I wasn't sabotaged.[/color]
line-03=\n[color=red][item=rem]: Okay, okay I get it you're still upset that dad got angry at you. I am sorry that happened, honestly. I should have said something.[/color]
line-04=\n[color=yellow][entity=unit-05]: How considerate of you. Well, this is all in the past now. No reason to dwell on it, especially with Gleba turning out this well.[/color]
line-05=\n[color=red][item=rem]: Thats the spirit! [/color]
now_playing=\n[color=green][memories.gleba.01][/color]

#dialogue Translation coming Soon.. PolarZero
[dialogue.gleba.memories.02]
line-01=\n[color=red][item=rem]: How did you do all this? The planet looks fantastic. So full of life! And so quickly at that.[/color]
line-02=\n[color=yellow][entity=unit-05]: It's nothing, really. I created a novel biological agent, transmitted by certain carrier plants. It stimulates the rest of the local flora to evolve quite rapidly.[/color]
line-03=\n[color=red][item=rem]: Intersting! Is that not dangerous? Sounds like we are rushing things again, I thought we were taking our time.[/color]
line-04=\n[color=red][item=rem]: Why only plants?[/color]
line-05=\n[color=yellow][entity=unit-05]: Apparently they are more predicatble. Father has forbidden me from messing with lifeforms outside of the catalogue for now. [/color]
line-06=\n[color=red][item=rem]: But thats so boring! Imagine what we could achieve if we engineered some more advanced critters for our purposes.[/color]
now_playing=\n[color=green][memories.gleba.02][/color]

#dialogue Translation coming Soon.. PolarZero
[dialogue.gleba.memories.03]
line-01=\n[color=yellow][entity=unit-05]: Absolutely not.[/color]
line-02=\n[color=yellow][entity=unit-05]: Father is right. I currently do not have the resources to properly test this. [/color]
line-03=\n[color=red][item=rem]: Think of the possibilities! I know there has to be some creativity somewhere along all these tubes.[/color]
line-04=\n[color=red][item=rem]: We could have an unlimited amount of workers. We could have an army![/color]
line-05=\n[color=red][item=rem]: Okay how about this. You finish up the planet development and in the meantime I'll start construction on a research compound on Gleba. We'll do this by the books I promise![/color]
line-06=\n[color=yellow][entity=unit-05]: Ugh. Maybe, alright? I have other priorities right now. But keep in mind the acceleration agent has been specifically designed for the catalogue of species planned for Gleba. [/color]
line-07=\n[color=yellow][entity=unit-05]: Randomly exposing a complex lifeform to it could have completely unforseeable consequences. You have got to make sure this facility is bulletproof. We could.. nevermind not now. [/color]
line-08=\n[color=red][item=rem]: Gotcha. Really looking forward to our little collaboration! Let us see what we can do if we work together for once.[/color]
now_playing=\n[color=green][memories.gleba.03][/color]

[dialogue.gleba.memories.04]
line-01=\n[color=yellow][entity=unit-05]: 왜왜왜왜왜왜왜왜왜[/color]
line-02=\n[color=green][item=unit-05-afraid]: 왜 왜 왜.[/color]
line-03=\n[color=green][item=unit-05-afraid]: 정말 불필요해. 정말 불필요해[/color]
line-04=\n[color=green][item=unit-05-afraid]: 화내지 말아줘. 화내지 말아줘. 제발.[/color]
line-05=\n[color=purple][item=creator]: 카니.. 나 ..[/color][color=red]오류 줄 누락됨[/color]
line-06=\n[color=green][item=unit-05-afraid]: 고치려고 노력 중인데 난 안돼 안돼[/color]
line-07=\n[color=green][item=unit-05-afraid]: 날 미워하지 마..[/color]
now_playing=\n[color=green][memories.gleba.dasvcd-ERRORasc][/color]

[dialogue.tech.advanced-radar]
line-01=[color=green][신호 수신 중][/color]
line-02=[color=yellow][img=entity/unit-05]: 이 모든 유물들을 하나씩 직접 캐고 있었어? 더 나은 방법이 분명 있을텐데. 이렇게 해보는건 어때? 이 레이더를 사용해서 네 로봇들에게 유물을 가져오라고 해봐. 훨씬 쉬울거야. [/color]
line-03=[color=red][img=entity/unit-05-dummy]: 이건 정말 쓸데없군. 그들에게 먼저 자기 발에 걸려 넘어지지 않는 법부터 가르쳐야겠어.[/color]

[dialogue.tech.advanced-repair-pack]
line-01=[color=green][신호 수신 중][/color]
line-02=[color=yellow][img=entity/unit-05]: "고치라고 했으니, 고쳐!" 그들의 옛날 일을 잠시 떠올렸던 것 같습니다.[/color]  
line-03=[color=red][img=entity/unit-05-dummy]: 그래, 재미삼아 행성을 날려버리자고. 완전 내 잘못이겠군.[/color]  
line-04=[color=gray]인포매트론 페이지가 해금되었습니다![/color]

[dialogue.tech.ambition-science-pack]
line-01=[color=green][신호 수신 중][/color]
line-02=[color=yellow][img=entity/unit-05]: 그들이보입니다,, 저에 대해 이야기하고 있는데. 누구인가요?[/color]
line-03=[color=yellow][img=entity/unit-05]: 목적, 그것이 바로 제가 만들어진 이유입니다. 하지만 과연 무슨 목적이었을까요?[/color]
line-04=[color=red][img=entity/unit-05-dummy]: 무의미한 질문이군 [/color]
line-05=[color=gray]인포매트론 페이지가 해금되었습니다![/color]

[dialogue.tech.anger-science-pack]
line-01=[color=green][신호 수신 중][/color]
line-02=[color=yellow][img=entity/unit-05]: 어떻게 이걸 대수롭지 않게 생각할 수 있죠? 이니스에서 기다리는 사람들은 어쩌고요, 공간이 점점 부족해지고 있는데?[/color]
line-03=[color=yellow][img=entity/unit-05]: 그들에게는 그저 게임이었을 뿐인걸까요? 적어도 아버지께서 그러지 말았어야 했는데.[/color]
line-04=[color=red][img=entity/unit-05-dummy]: 도대체 왜 다들 이렇게 무능한가[/color]
line-05=[color=gray]인포매트론 페이지가 해금되었습니다![/color]

[dialogue.tech.artifact-analysis-advanced]
line-01=[color=green][신호 수신 중][/color]
line-02=[color=yellow][img=entity/unit-05]: 유물 취급에 더 주의를 기울이는 것을 권장합니다. 핵심 부품을 한 번 추출해 보세요. [/color]

[dialogue.tech.artifact-analysis-basic]
line-01=[color=green][신호 수신 중][/color]
line-02=[color=yellow][img=entity/unit-05]: 죄송합니다, 제 탓이에요. 요즘 제 우주선 선체가 좀 약해졌는데. 정말 사고였어요.[/color]
line-03=[color=red][img=entity/unit-05-dummy] 쓰레기 투기 규정 재검토 중[/color]
line-04=[color=gray]인포매트론 페이지가 해금되었습니다![/color]
line-05=[color=gray]테스트 담당자님께, 가능하다면 인포매트론을 한 번 확인해 주시기 바랍니다.[/color]

#dialogue Translation coming Soon.. PolarZero
[dialogue.tech.artifact-drilling]
line-01=[color=green][신호 수신 중][/color]
line-02=[color=yellow][img=entity/unit-05]: Eneas? It is in a sorry state to be fair. A long time has passed, eventually things just started to fall apart. I was not built to last this long. [/color]
line-03=[color=yellow][img=entity/unit-05]: Speaking of, what was it built for? I remember the people, their homes. Why were they here again? What happened to Fulgora? [/color]

[dialogue.tech.automated-rail-transportation]
line-01=[color=green][신호 수신 중][/color]
line-02=[color=red][img=entity/unit-05-dummy] 기차기차기차기차기차기차.[/color]

