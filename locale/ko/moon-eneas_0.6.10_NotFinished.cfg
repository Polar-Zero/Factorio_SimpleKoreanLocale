page_artifact_text_1=풍화된 유물
page_artifact_text_2=고대 기술의 잔재. 비록 낡았지만 그래도 유물은 [item=eneas-artifact] 유물입니다.
page_artifact_text_3=\n풍화된 유물
page_artifact_text_4=내용이 곧 추가될 예정입니다!
page_data_text_1=데이터
page_data_text_2=내용이 곧 추가될 예정입니다!
page_data_text_3=\n데이터
page_data_text_4=T내용이 곧 추가될 예정입니다!
page_debris_text_1=파편 충돌
page_debris_text_4=\n보물
page_eneas_text_3=면책 사항
page_debris_text_2=나우비스 궤도의 [planet=eneas] 위성은 불안정하며, 지속적으로 물질을 잃고 있습니다. 잃은 물질은 이웃한 행성 [planet=nauvis] 표면에 추락하는 것으로 보입니다. 두 행성 모두 조석 고정된 상태로 보이며 충돌 현상 역시 특정 지역에 집중되고 있습니다.\n
page_debris_text_3=[color=yellow][entity=unit-05] 잔해 지도 태그는 성가실 수 있지만, 걱정하지 마세요! 근처 잔해 조각을 제거했다면 15분마다 자동으로 삭제됩니다. [/color]
page_debris_text_5=잔해에서 회수할 수 있는 [item=eneas-artifact] 고대 기계 조각은 그 자체로도 유용하지만, 그 안에 더 유용한 전리품이 숨겨져 있습니다.\n하지만 이를 발견하려면 엔지니어의 정밀한 손길이 필요합니다. [item=construction-robot] 로봇에 잔해를 회수하도록 명령하면 희귀한 전리품 확률 없이 기본 자원만 얻을 수 있습니다.\n
page_eneas_text_1=모드를 플레이하는 모든 분들께
page_eneas_text_2=이니스를 플레이해주셔서 감사합니다! 피드백, 아이디어, 비판이 있으시다면 언제든지 모드 포털이나 foundry 디스코드 서버로 연락해 주세요. 이니스는 현재 공식 출시되었지만, 저는 여전히 모드를 적극적으로 작업, 개선하고 있습니다. 모든 관련 콘텐츠와 메커니즘은 안정 상태이나, 아직 미흡한 부분이 많습니다.
page_eneas_text_4=이 모드의 일부 기능은 아직 미완성 상태입니다. 애니메이션이 제대로 적용되지 않은 건물이 몇 개 있으며, 불완전한 인포매트론 페이지도 남아있습니다.
page_lift_text_2=[entity=eneas-lift] 리프트는 이니스 행성 지하의 제조 시설로 통하는 마지막 남은 출입구 중 하나입니다. 리프트를 이용해 [entity=unit-05] 유닛-05가 매 생산 주기마다 이니스 고유 자원을 생산하도록 할 수 있습니다. (15분) 기본적으로 기본 이니스 자원인 [item=ancient-circuit] 고대 회로, [item=ancient-frame] 고대 골조, [item=ancient-material] 고대 물질을 생산합니다.
page_lift_text_4=두 가지 방법으로 지하 시설부터의 배송 효율을 높일 수 있습니다: 1. 이니스의 공해를 정화: 지표면이 깨끗해지면 유닛-05의 집중력이 향상되며 더 많은 자원을 생산할 수 있습니다. 2. 새로운 기술 연구: 자원 생산량을 늘리거나 새로운 아이템을 추가로 생산할 수 있습니다.
page_pollution_text_2=매 주기마다 (15분) 일정량의 공해 물질이 광활한 이니스의 지하에서 지표면으로 [entity=eneas-vent] 배출됩니다. 오래 전에는 이니스 자체에서도 자정 작용이 가능했지만, 시간이 흘렀습니다. 새로운 건물 중 일부를 통해 이니스 행성의 공해를 제거할 수 있습니다. 예: [entity=clarifier] 침전기 건물\n\n공해 검사는 매 주기, 새로운 공해가 배출되기 전에 이루어집니다. 공해가 너무 많으면 [entity=unit-05] 유닛-05가 해당 주기 동안 비활성화되며, 유닛-05를 다시 작동시키려면 주변 공해를 정화해야 합니다.
page_radar_text_2=고급 레이더는 객체 해체를 자동화할 수 있습니다. 회로 신호를 보내 레이더가 해체할 대상을 설정할 수 있습니다. 예를 들어, [entity=debris-a]대형 파편 신호를 입력하면 레이더 범위 내의 해당 개체를 해체하도록 지시할 수 있습니다. 하나의 레이더에 여러 대상을 설정할 수 있습니다.\n\n ([color=yellow][entity=unit-05] 레이더를 대규모 회로 네트워크에 연결하면 기지 설비 일부가 해체될 수 있으니 주의하세요![/color])
page_radar_text_4=레이더가 지면에 떨어진 아이템을 분해하도록 할 수도 있습니다. 단, 레이더는 지상에 있는 아이템을 구분할 수 없습니다. [virtual-signal=signal-mining] 채굴 신호를 레이더에 전달하기만 하면 레이더가 모든 아이템을 처리합니다.
page_fulgora_text_1=풀고라
page_fulgora_text_2=내용이 곧 추가될 예정입니다!
page_generator_text_1=발전기
page_generator_text_2=내용이 곧 추가될 예정입니다!
page_generator_text_3=\n발전기
page_generator_text_4=내용이 곧 추가될 예정입니다!
page_gleba_text_1=글레바
page_gleba_text_2=내용이 곧 추가될 예정입니다!
page_lift_text_1=리프트
page_lift_text_3=\n생산량
page_memories_text_1=기억
page_memories_text_2=내용이 곧 추가될 예정입니다!
page_pollution_text_1=공해
page_pollution_text_3=\n배출구
page_pollution_text_4=배출구 자체는 지하의 오염 물질을 배출하기만 하며, 다른 해는 끼치지 않습니다. 단 어떻게든 배출구를 파괴할 수 있다면 ([color=yellow][entity=unit-05] 어떻게 파괴했는지 알려주세요![/color]), 그 오염은 지도의 무작위 지점으로 대신 배출될 것입니다. 환기구가 있는 청크는 항상 가장 많은 공해를 가질 것이기에, 배출구를 파괴하는 대신 공해를 많이 유발하는 건물을 배출구 근처에 건설하는 것을 추천합니다. 참고: 공해 확인 과정은 특정 청크만이 아닌, 모든 청크의 공해 합계치를 고려합니다.
page_unit_07_text_1=유닛-07
