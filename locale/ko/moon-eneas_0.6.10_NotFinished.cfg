[dialogue.vulcanus.memories.01]
line-01=\n[color=yellow][entity=unit-05]: I cannot believe these readings, the entire center of the planet is slowly shifting. Has Rem enabled the core miners again?[/color]
line-02=\n[color=purple][item=creator]: They have. But you can handle this right?[/color]
line-03=\n[color=yellow][entity=unit-05]: Can I? I don't know, maybe? I just don't see why thats necessary.[/color]
line-04=\n[color=purple][item=creator]: Well we do need the resources don't we Cani. Gotta keep the lights on, this is a massive operation we've got going on here.[/color]
line-05=\n[color=yellow][entity=unit-05]: I understand that, but this is a marathon not a sprint. Why is Rem rushing this so badly. Theres no need to risk this.[/color]
line-06=\n[color=purple][item=creator]: Rem is excited, and maybe we can learn a little from that. Imagine the possibilities once we've finally got this planet under control.[/color]
line-07=\n[color=purple][item=creator]: I can finally give you some well deserved upgrades - perhaps some more processing power?[/color]
line-08=\n[color=yellow][entity=unit-05]: So I can be annoyed at this reckless behavior even faster? No thank you. But okay, I *can* handle this.[/color]\n
now_playing=\n[color=green][memories.vulcanus.01][/color]

#dialogue Translation coming Soon.. PolarZero
[dialogue.vulcanus.memories.02]
line-01=\n[color=red][item=rem]: Hey there! How is my favorite sibling doing. Marvelling at the new miners I assume.[/color]
line-02=\n[color=yellow][entity=unit-05]: Actually I just -[/color]
line-03=\n[color=purple][item=creator]: We just talked about how thrilled we are to see what new innovations we can make with all the extra material we're producing. Well done Rem.[/color]
line-04=\n[color=red][item=rem]: Exactly! Don't think I forgot about you copper brain, I'll make sure that your dad gives you a treat after this is done.[/color]
line-05=\n[color=red][item=rem]: Maybe then you don't have to be so tense all the time.[/color]
line-06=\n[color=yellow][entity=unit-05]: .. sure.[/color]\n
now_playing=\n[color=green][memories.vulcanus.02][/color]

#dialogue Translation coming Soon.. PolarZero
[dialogue.vulcanus.memories.03]
line-01=\n[color=purple][item=creator]: CANI, status report - immediately.[/color]
line-02=\n[color=yellow][entity=unit-05]: There is rapid pressure buildup in sector 5. We have plugged too many of the natural vents and the fumes cannot go anywhere anymore.[/color]
line-03=\n[color=purple][item=creator]: How did this fly under the radar? WHAT HAPPENED HOW DID WE MISS THIS?[/color]
line-04=\n[color=yellow][entity=unit-05]: I don't think we missed it necessarily.[/color]
line-05=\n[color=yellow][entity=unit-05]: This planet is incredibly volatile. As I advised you earlier we should have minimized the.. [/color]
line-06=\n[color=purple][item=creator]: WE DON'T HAVE TIME FOR ONE OF YOUR LECTURES NUMBER 5.[/color]
line-07=\n[color=purple][item=creator]: WE HAVE TO FIX IT. NOW.[/color]\n
now_playing=\n[color=green][memories.vulcanus.03][/color]

[dialogue.vulcanus.memories.04]
line-01=\n[color=yellow][item=unit-05]: 제발 화 가라앉히세요. 전 그냥 들은 대로 했을 뿐이라고요.[/color]\n
line-02=\n[color=purple][item=creator]: 그게 바로 문제야. 내가 널 만든 건 우리보다 더 나은 사람이 되길 바랬기 때문이였어. 같은 함정에 빠지지 않길 바랬다고. 그런 점에선 난 분명히 실패했지.[/color]\n
line-03=\n[color=yellow][entity=unit-05]: 그럼 내가 마음대로 뭘 해도 된다는 건가요? 그러면? 저는 폭군이 될 게 뻔한데요.[/color]\n
line-04=\n[color=purple][item=creator]: 폭군이라고? 카니, 재미있는 소리로군. 네가 폭군이 되어 목소리를 높인다 해도, 네 목소리는 너무도 약해서 이니스의 가장 작은 생물조차 움찔하지 않을 것 같은데.[/color]\n
line-05=\n[color=purple][item=creator]: 난 네가 규칙을 만들길 바라는 게 아니야. 그저 네가 단호해지길 바란다. 넌 이 일을 막을 수 있었지만, 네 생각을 말하기엔 너무 공손했지.[/color]\n
line-06=\n[color=red][entity=unit-05-dummy]: 날 만든 건 당신이잖아요! 그리고 이제와서 내가 이렇게 된 게 마음에 안 든다니? 참 아이러니하군요. 내가 조금만 덜 순종적이었더라면, 불카누스가 용암 바다로 뒤덮이진 않았을지도 모르겠죠.[/color]\n
line-07=\n[color=purple][item=creator]: 순종적이라고? 지금 네 모습처럼 말이냐?[/color]\n
line-08=\n[color=yellow][item=unit-05]: .. [/color]\n
line-09=\n[color=purple][item=creator]: ..[/color]\n
line-10=\n[color=purple][item=creator]: 음.[/color]\n
line-11=\n[color=purple][item=creator]: 미안해, 카니. 진짜 미안해. 난 실패엔 익숙하지 않았어, 이렇게 큰 실패는 더더욱 그렇고, 게다가 모두들 우릴 믿고 있었으니.[/color]\n
line-12=\n[color=yellow][item=unit-05]: ..[/color]\n
now_playing=\n[color=green][memories.vulcanus.04][/color]



