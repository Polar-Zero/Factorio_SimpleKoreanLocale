[mod-name]
Exteros-QoL-System=Exteros의 삶의 질 시스템(Exteros Quality of Life System)

[mod-description]
Exteros-QoL-System=모듈화된 삶의 질 패키지: 균등 분배, 비집고 통과, 자동 드릴 해체, 자동 인벤토리 정렬, 보유 아이템 계산, 플레이어 탐조등 등을 포함하며, 선택적으로 치트성 모드를 사용하는 것도 가능합니다. 필요한 모든 것을 한곳에서.\n\n번역: SimpleKoreanLocale(PolarZero)


[controls]
exteros-qol-manual-inventory-sort=수동 정렬 (보관함 열기)
exteros-qol-open-hub=Exteros QoL 허브 열기

[exteros-qol-gui]
speed-down=게임 속도를 절반으로
speed-reset=게임 속도를 100%로
speed-up=게임 속도를 두 배로

[exteros-qol-hub]
close=닫기
no-runtime-settings=런타임 설정을 사용할 수 없습니다. 모드 설정 -> 시작에서 균등 분배, 인벤토리 수리 또는 치트 모드를 활성화하세요.
option-high-first=가장 강력한 아이템 우선
option-low-first=가장 약한 아이템 우선
section-global=지도 설정 (관리자 권한 필요)
section-per-user=플레이어 설정 (현재 지도)
textfield-tooltip=값을 입력한 뒤 Enter 키를 눌러 적용하세요. 최대 설정 가능값까지 범위 지정 가능.
title=Exteros QoL 설정

[mod-setting-name]
cheat-crafting-speed=(치트) 제작 속도 보너스
cheat-inventory-bonus=(치트) 인벤토리 슬롯 보너스
cheat-mining-speed=(치트) 채광 속도 보너스
cheat-reach-distance=(치트) 도달 거리 보너스
even-distribution-swap-balance=마우스 왼쪽/오른쪽 동작 바꾸기
even-distribution-ticks=분배 지연 (틱)
exteros-qol-auto-alt-enabled=Alt-모드를 자동으로 설정
exteros-qol-auto-deconstruct-enabled=자동 드릴 해체 활성화
exteros-qol-auto-sort-inventory=보관함을 자동으로 정렬
exteros-qol-cheat-mode-enabled=치트 모드 활성화
exteros-qol-cheat-productivity-cap=(치트) 생산성 한도(%)
exteros-qol-cheat-productivity-unlocked=(치트) 생산성 한도 해제
exteros-qol-cheat-stack-size-mode=(치트) 묶음 크기 모드
exteros-qol-cheat-stack-size-value=(치트) 묶음 크기 설정
exteros-qol-debug=디버그 모드
exteros-qol-even-distribution-enabled=균등 분배 활성화
exteros-qol-inventory-repair-enabled=인벤토리 수리 활성화
exteros-qol-inventory-repair-interval=수리 간격 (틱)
exteros-qol-inventory-repair-order=수리 우선 순위
exteros-qol-item-count-enabled=보유 아이템 수량 활성화
exteros-qol-searchlight-enabled=플레이어 탐조등 활성화
exteros-qol-squeak-through-enabled=비집고 통과 활성화
exteros-qol-time-controls-enabled=시간 제어 활성화

[mod-setting-description]
cheat-crafting-speed=플레이어의 수동 제작 속도가 증가합니다.
cheat-inventory-bonus=플레이어의 인벤토리에 추가 슬롯을 제공합니다.
cheat-mining-speed=플레이어의 수동 채광/회수 속도가 증가합니다.
cheat-reach-distance=건물, 아이템 도달, 줍는 거리가 증가합니다.
even-distribution-swap-balance=활성화하면 Ctrl+왼쪽 클릭이 밸러스 모드로, Ctrl+오른쪽 클릭이 이븐 모드로 변경됩니다.
even-distribution-ticks=모드에서 마지막 클릭 후 아이템을 배분하기 전 대기할 시간을 조정합니다. (틱 단위 / 60틱 : 1초)
exteros-qol-auto-alt-enabled=새로운 게임을 시작하거나 참여할 때 Alt-모드를 (자세한 객체 정보 표시) 자동으로 활성화합니다.
exteros-qol-auto-deconstruct-enabled=자원이 고갈된 채광 드릴을 자동으로 해체하도록 계획합니다.
exteros-qol-auto-sort-inventory=보관함 인벤토리를 열 때 자동으로 정렬되도록 합니다. Shift+I 단축키로 이 설정과 관계없이 항상 수동으로 정렬하도록 할 수도 있습니다.
exteros-qol-cheat-mode-enabled=치트 설정을 활성화합니다. (도달 범위, 속도 등) 치트 설정 동작에 필요합니다.
exteros-qol-cheat-productivity-cap=제작법의 최대 생산성 한도를 조정합니다. (치트 모드 활성화 필요)
exteros-qol-cheat-productivity-unlocked=모든 제작법에서 생산성 모듈을 사용할 수 있도록 합습니다. (치트 모드 활성화 필요)
exteros-qol-cheat-stack-size-mode=아래 설정값이 원본 묶음 크기의 배율로 적용될지, 절대치로 적용될지 여부를 조정합니다. (치트 모드 활성화 필요)
exteros-qol-cheat-stack-size-value=묶음 크기 배율 또는 절대값 수치를 조정합니다. (치트 모드 활성화 필요)
exteros-qol-debug=콘솔에 자세한 기술 로그를 표시합니다.
exteros-qol-even-distribution-enabled=Ctrl + 마우스 클릭으로 아이템을 균등하게 분배할 수 있도록 합니다.
exteros-qol-inventory-repair-enabled=인벤토리 내의 복구 팩을 사용하여 내부의 손상된 배치 가능 객체 아이템을 자동으로 수리합니다.
exteros-qol-inventory-repair-interval=모드가 인벤토리를 확인하고 수리를 진행할 틱 간격을 조정할 수 있습니다.
exteros-qol-inventory-repair-order=가장 약한 복구 팩을 먼저 사용할지 가장 강한 복구 팩을 먼저 사용할지 조정할 수 있습니다.
exteros-qol-item-count-enabled=화면 중심부에 인벤토리(및 차량 보관함)에 있는 아이템 개수를 표시합니다.
exteros-qol-searchlight-enabled=캐릭터가 마우스로 선택한 객체를 자동으로 보도록 합니다.
exteros-qol-squeak-through-enabled=객체 충돌 범위를 약간 축소하여, 플레이어가 건물, 파이프, 나무 등 사이로 걸을 수 있도록 합니다.
exteros-qol-time-controls-enabled=왼쪽 상단에 게임 속도를 제어할 수 있는 버튼을 추가합니다.