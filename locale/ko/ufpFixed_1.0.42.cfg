[mod-name]
ufpFixed=UFP: 궁극의 핵융합 발전 수정판(UFP: Ultimate Fusion Power Fixed)

[mod-description]
ufpFixed=게임 후반에 사용할 수 있는 현실적인 핵융합 발전소 구성을 게임에 추가합니다, 48GW부터 417.6TW에 이르는 확장 가능한 전력 생산 공정을 추가하며, 더 많은 열/과학/연료/무기/개인용 장비 등도 추가합니다. 기본 게임 및 우주시대 DLC에 맞춰 SPM(분당 과학 팩) 생산은 조정됩니다. 이 모드는 Romner_set의 Realistic Fusion Power의 리메이크로, 기술 연구, 유체, 제작법, 기계, 사운드, 그래픽을 완전히 개편하고 UPS 성능 효율을 개선했습니다.\n\n번역: SimpleKoreanLocale(PolarZero)


