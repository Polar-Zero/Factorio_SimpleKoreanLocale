[entity-description]
ufp_16way_generator_entity=플라즈마 플럭스 [fluid=ufp_plasma-flux]를 사용해 전력을 생산하는 UFP 발전기입니다. 플라즈마 플럭스 유도 역시 가능합니다. 최대 효율: [recipe=ufp_d-he3-fusion_1].
ufp_4way_generator_entity=플라즈마 플럭스 [fluid=ufp_plasma-flux]를 사용해 전력을 생산하는 UFP 발전기입니다. 플라즈마 플럭스 유도 역시 가능합니다. 최대 효율: [recipe=ufp_d-t-fusion_1].
ufp_8way_generator_entity=플라즈마 플럭스 [fluid=ufp_plasma-flux]를 사용해 전력을 생산하는 UFP 발전기입니다. 플라즈마 플럭스 유도 역시 가능합니다. 최대 효율: [recipe=ufp_d-t-fusion_1].
ufp_a_gen_entity=플라즈마 플럭스 [fluid=ufp_plasma-flux]를 사용해 전력을 생산하는 UFP 발전기입니다. 플라즈마 플럭스 유도 역시 가능합니다. 최대 효율: [recipe=ufp_d-t-fusion_1].
ufp_aneutronic_reactor_entity=UFP 6단계 입력: HE3-HE3[recipe=ufp_he3-he3-fusion_1] 또는 D-HE3[recipe=ufp_d-he3-fusion_1] 핵융합 반응을 이용해, 플라즈마 관련 기계 작동에 필요한 플라즈마 플럭스 [fluid=ufp_plasma-flux]를 생산합니다.
ufp_b_gen_entity=플라즈마 플럭스 [fluid=ufp_plasma-flux]를 사용해 전력을 생산하는 UFP 발전기입니다. 플라즈마 플럭스 유도 역시 가능합니다. 최대 효율: [recipe=ufp_d-t-fusion_1].
ufp_black_hole_entity=불안정한 블랙홀 주변의 혼란스럽고 고에너지를 가진 운동으로부터 발생하는 충돌로부터 양자 복사와 입자-반입자 [fluid=ufp_antiproton][fluid=ufp_positron] 쌍을 포착하기 위해 엄청난 양의 에너지를 사용합니다. D-HE3  [recipe=ufp_d-he3-fusion_1]의 가장 뜨거운 플라즈마 플럭스 [fluid=ufp_plasma-flux]만을 허용됩니다.
ufp_c_gen_entity=플라즈마 플럭스 [fluid=ufp_plasma-flux]를 사용해 전력을 생산하는 UFP 발전기입니다. 플라즈마 플럭스 유도 역시 가능합니다. 최대 효율: [recipe=ufp_d-he3-fusion_1].
ufp_core-vent_entity=모든 플라즈마 플럭스 [fluid=ufp_plasma-flux] 관련 설비에 필수적으로 사용되는 이 장치는 서로 다른 온도의 플라즈마 플럭스를 외부 환경으로 유도할 수 있습니다.
ufp_deuterium_extractor_entity=UFP 공정 1단계 / 물과 뜨거운 증기를을 뜨거운 중수 [fluid=ufp_heavy-water]와 감소수[fluid=ufp_depleted-water] 로 변환합니다.
ufp_duct-cross=전자석을 이용해 수십억°C에 달하는 초고온 가스나 플라즈마 상태의 유체를 운반하는 데 사용할 수 있는 투박한 배관입니다. UFP 기계에 연결할 수 있습니다.
ufp_duct-curve=전자석을 이용해 수십억°C에 달하는 초고온 가스나 플라즈마 상태의 유체를 운반하는 데 사용할 수 있는 투박한 배관입니다. UFP 기계에 연결할 수 있습니다.
ufp_duct-small=전자석을 이용해 수십억°C에 달하는 초고온 가스나 플라즈마 상태의 유체를 운반하는 데 사용할 수 있는 투박한 배관입니다. UFP 기계에 연결할 수 있습니다.
ufp_duct-t-junction=전자석을 이용해 수십억°C에 달하는 초고온 가스나 플라즈마 상태의 유체를 운반하는 데 사용할 수 있는 투박한 배관입니다. UFP 기계에 연결할 수 있습니다.
ufp_duct-underground=전자석을 이용해 수십억°C에 달하는 초고온 가스나 플라즈마 상태의 유체를 운반하는 데 사용할 수 있는 투박한 배관입니다. UFP 기계에 연결할 수 있습니다.
ufp_electric_boiler_entity=UFP 1단계 입력: 물을 뜨거운 중수 [fluid=ufp_heavy-water]와 증기로 변환합니다.
ufp_electrolyser_entity=UFP 공정 2단계 / 중수 [fluid=ufp_heavy-water]를 전기분해하여 순수한 중수소 가스 [fluid=ufp_deuterium]를 생성하거나, 감소수 [fluid=ufp_depleted-water]를 중수 [fluid=ufp_heavy-water]로 변환합니다.
ufp_gas_mixer_entity=UFP 5단계 입력, 중성자 반응으로 생성된 가스를 혼합합니다. [fluid=ufp_deuterium][fluid=ufp_tritium][fluid=ufp_helium-3]
ufp_heat_divertor_entity=UFP 분산기는 갇혀있는 플라즈마와 주요 시설 격벽의 직접적인 접촉을 차단함으로써 플라즈마 플럭스 [fluid=ufp_plasma-flux]의 열을 추출합니다. 최대 소비 전력: 11.76GW
ufp_neutronic_reactor_entity=UFP 4단계 입력. D-D [recipe=ufp_d-d-fusion_1] 또는 D-T [recipe=ufp_d-t-fusion_1] 핵융합 반응을 이용해, 플라즈마 관련 기계 작동에 필요한 플라즈마 플럭스 [fluid=ufp_plasma-flux]를 생산합니다.
ufp_plasma_heater_entity=UFP 3단계 입력, 가스를 [fluid=ufp_deuterium][fluid=ufp_d-t-mix][fluid=ufp_d-he3-mix] 수십억°C까지 가열하여 핵융합 반응을 유도하는 [fluid=ufp_d-d-plasma][fluid=ufp_d-t-plasma][fluid=ufp_he3-he3-plasma][fluid=ufp_d-he3-plasma] 불안정한 소형 플라즈마 반응로입니다. 오버클럭[recipe=ufp_overclock]을 활성화할 경우 더 무거운 수소 동위원소[fluid=ufp_tritium][fluid=ufp_helium-3]를 연소시키는 것도 가능하지만, 연료 누출로 인한 노심용융 발생 확률이 생기게 됩니다 [img=technology/atomic-bomb]!
ufp_white_hole_entity=이 UFP 기계는 화이트홀을 이용해 엄청난 양의 입자-반입자 [fluid=ufp_antiproton][fluid=ufp_positron] 에너지를 과학적 성과로 전환합니다.

