ufp_tech="빛나는 태양과 별을 바라봐라, 난 이제 막 그 진리를 깨닫기 시작했다. 뜨거운 플라즈마 속에 갇힌 이온들로부터, 충분한 에너지가 그 과정을 거치면, 그 어떤 반발력도 이겨내고 E=MC²의 법칙을 실현해 냅니다."
ufp_tech_cosmic-void_1="공허는 언뜻 보기엔 텅 비어 보입니다. 하지만 대부분의 은하들은 서로 묶여 있습니다. 공허의 형태는 팽창의 결과이며, 이 팽창은 암흑 에너지에 의해 발생합니다."
