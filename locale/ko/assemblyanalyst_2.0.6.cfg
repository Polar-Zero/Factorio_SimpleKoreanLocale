[mod-name]
assemblyanalyst=공장 분석기(Assembly Analyst)

[mod-description]
assemblyanalyst=이 모드로 공장의 특정 지역을 분석해보세요. 이제 기계가 어디에 시간을 소비하고 있는지 확인하고, 병목 지점을 더 쉽게 찾아낼 수 있게 됩니다.\n\n번역: SimpleKoreanLocale(PolarZero)


[aa-gui]
disabled_name=비활성화됨
disabled_tooltip=이 기계는 비활성화된 상태입니다.
entities_tracked=[font=default-bold]__1__[/font] 객체 추적 중
input_shortage_name=입력 부족
input_shortage_tooltip=기계에 일부 재료가 누락되었습니다.
insufficient_power_name=전력 부족
insufficient_power_tooltip=기계에 전력이 충분하지 않습니다.
legend=범례
output_overload_name=생산품 가득 참
output_overload_tooltip=기계에 생산한 아이템이 가득 찼습니다.
working_name=작동 중
working_tooltip=기계가 정상적으로 작동 중입니다.

[command-help]
aa_clear_zones=손쉬운 정리가 가능하도록, 현재 선택되어 있는 구역을 전부 제거합니다.

[controls]
aa-clear-zones=구역 전부 제거
aa-select-zone=분석 구역 선택

[item-name]
aa-zone-selector=구역 선택 도구

[shortcut-name]
aa-select-zone=분석 구역 선택

[tips-and-tricks-item-name]
aa-entity-status=객체 상태
aa-how-to-get-started=공장 분석기 사용법
aa-introduction=공장 분석기
aa-mod-settings=모드 설정
aa-selection-tool=선택 도구

[tips-and-tricks-item-description]
aa-entity-status=모든 객체에는 5가지 상태가 있을 수 있으며, 각 상태는 특정 색상으로 표시됩니다.\n- [color=0,135,0]작동 중[/color]: 기계가 올바르게 작동하고 있으며 활성화됨\n- [color=102,224,0]생산품 가득 참[/color]: 이 기계의 출력 또는 투입기의 놓는 위치가 가득 찼습니다\n- [color=255,165,0]입력 부족[/color]: 이 기계의 입력이나 이 투입기의 잡는 위치가 비어 있습니다\n- [color=204,0,0]전력 부족[/color]: 이 객체가 최적으로 작동할 만큼의 전력이 충분하지 않습니다.\n- [color=204,0,204]비활성화됨[/color]: 이 개체에서 작업할 제작법 또는 기술이 없거나 회로 네트워크에 의해 비활성화된 상태입니다.
aa-how-to-get-started=시작하려면 공장 분석기 [font=default-bold]구역 선택 도구[/font]를 사용해야 합니다. 단축 바 바로가기를 사용할 수 있습니다.\n- 키보드 단축키 __CONTROL__aa-select-zone__\n을 사용할 수도 있습니다.\n- 이 도구는 커서에만 존재할 수 있으며, 인벤토리에 넣을 수 없다는 점에 유의하세요.
aa-introduction=[font=default-semibold]Assembly Analyst 모드에 오신 것을 환영합니다![/font]\n\n이 모드는 공장의 특정 부분을 선택하여 분석할 수 있는 도구를 제공하여 조립 기계, 채광 드릴, 연구소, 투입기가 어디에 시간을 소비하는지 분석할 수 있도록 해줍니다. 새 구역을 생성하는 순간부터 이 데이터를 수집하기 시작하므로 현재 상태뿐만 아니라 [font=default-bold]시간 경과[/font]에 따른 활동도 표시합니다. 이를 통해 병목 현상을 쉽게 발견하고 공장의 흐름을 최적화할 수 있습니다.\n\n이 작동하는 방식에 대한 자세한 내용은 다음 팁과 도움말을 확인해주세요.
aa-mod-settings=이 모드에는 필요에 따라 자유롭게 조정할 수 있는 다양한 설정이 있습니다. 설정→모드 설정→지도→공장 분석기 에서 찾을 수 있습니다.\n\n[font=default-bold]자기 선택 활성화[/font] 분석 구역을 선택한 기계의 외부 경계와 스냅합니다..\n[font=default-bold]변경시 다시 스냅[/font] 특정 구역에 관련 객체가 추가되거나 제거될 경우, 자기 선택 알고리즘을 다시 적용합니다.\n[font=default-bold]변경시 데이터 재설정[/font] 특정 구역에 관련 객체가 추가되거나 제거될 경우, 해당 구역에 이미 수집된 데이터를 초기화하고 다시 수집합니다.\n[font=default-bold]투입기 제외[/font] 선택한 구역에서 투입기를 선택하지 않도록 하여, 추적되는 객체량을 줄이는 것으로 성능을 개선할 수 있습니다.\n\n만약 구분이 어려운 경우 모든 상태 유형의 색상을 조정하는 것도 가능합니다.
aa-selection-tool=선택 도구를 이용하면 맵에서 분석할 객체에 대한 구역을 만들 수 있습니다.\n\n해체 계획기와 매우 유사하게 작동합니다: 왼쪽 클릭으로 선택 도구를 드래그하여 분석할 구역을 선택하면, 생성 구역의 경계를 나타내는 파란색 사각형이 만들어집니다. 구역을 제거하려면 [font=default-semibold][color=#84CDEC]shift[/color][/font]-드래그하면 선택 상자가 빨간색으로 표시되고 선택 상자로 선택된 모든 구역을 제거할 수 있습니다.\n\n이 구역은 모든 플레이어가 공유하므로 불필요한 성능 저하를 피하려면 사용하지 않는 구역을 그때그때 제거해야 합니다.

[mod-setting-name]
aa-exclude-inserters=투입기 제외
aa-magnetic-selection=자기 선택 활성화
aa-reset-data-on-change=변경시 데이터 재설정
aa-resnap-zone-on-change=변경시 다시 스냅
aa-status-color-disabled=[font=default-bold]색상 설정:[/font] 비활성화됨
aa-status-color-input_shortage=[font=default-bold]색상 설정:[/font] 입력 부족
aa-status-color-insufficient_power=[font=default-bold]색상 설정:[/font] 전력 부족
aa-status-color-output_overload=[font=default-bold]색상 설정:[/font] 생산품 가득 참
aa-status-color-working=[font=default-bold]색상 설정:[/font] 작동 중
aa-window-size=상태 판독창 크기

[mod-setting-description]
aa-exclude-inserters=선택한 구역에서 투입기를 선택하지 않도록 하여, 추적되는 객체량을 줄이는 것으로 성능을 개선할 수 있습니다.
aa-magnetic-selection=활성화하면, 분석 구역을 선택한 기계의 외부 경계와 스냅합니다.
aa-reset-data-on-change=특정 구역에 관련 객체가 추가되거나 제거될 경우, 해당 구역에 이미 수집된 데이터를 초기화하고 다시 수집합니다.
aa-resnap-zone-on-change=특정 구역에 관련 객체가 추가되거나 제거될 경우, 자기 선택 알고리즘을 다시 적용합니다.
aa-window-size=컴퓨터 상태 판독값을 몇 초 동안 유지할지 결정합니다. 이 설정은 성능에 영향을 미치지 않으며, 설정값이 변동되면 현재 활성화되어있던 구역이 모두 초기화됩니다.