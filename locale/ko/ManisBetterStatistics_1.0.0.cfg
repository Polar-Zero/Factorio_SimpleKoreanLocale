[mod-description]
ManisBetterStatistics=통계를 표시하려면 'Y' 키를 누르세요. 이 모드는 외계 생명체 처치 수를 시각화하는 데 중점을 두었습니다. 특히 품질 기능의 도입 이후, 얼마나 많은 적을 처치했는지 추적하기 조금 더 까다로워졌기에 더 도움이 될 것입니다.\n\n번역: SimpleKoreanLocale(PolarZero)


