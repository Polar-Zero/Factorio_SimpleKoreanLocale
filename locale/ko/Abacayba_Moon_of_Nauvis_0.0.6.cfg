[technology-description]
abacayba_advanced_oozing_white_goo_processing_tech=광석, 우유, 플라스틱, 유황 및 연료 제작에 사용할 수 있는, 하얀색 점액을 정제할 수 있게 됩니다. 또한 개선된 유체 처리법도 사용할 수 있습니다.
abacayba_calcite_flotation_tech=표면 간 화학 성질 차이를 이용해, 폐맥석에서 텅스텐 광석을 분리합니다.
abacayba_crystal_kiln=물질을 고열로 가열하여 분해, 산화, 환원 반응을 유도합니다. 산화를 통해 물질을 정화/강화하거나 촉매 표면을 준비하고, 재료의 화학적 정체성을 변경합니다.
abacayba_crystal_sedimentation=오염된 물이 탱크 내부로 천천히 흐르는 과정에서 무거운 입자가 가라앉을 수 있도록 합니다. 탱크 바닥에 축적된 광석층이 형성될 수 있습니다.
abacayba_crystal_washing=수정 광석을 세척할 수 있게 됩니다. 다량의 물을 함유한 광석은 세척 과정에서 이를 방출합니다.
abacayba_dirty_water_sed_productivity=오염된 물 생산량이 증가합니다.
abacayba_itaverax_alloy_tech=원자 수준에서 결합된 강화 금속으로 이루어진 고체 용액인 이타베락스 합금 제작이 가능합니다.
abacayba_itaverax_coil_tech=엄청나게 높은 전압을 견뎌낼 수 있는 이타베락스 코일 제작이 가능합니다.
abacayba_itaverax_composite_tech=여러 겹으로 구성된 초경량 내열판인, 이타베락스 복합재 제작이 가능합니다.
abacayba_itaverax_cpu_tech=일정한 주기로 명령을 실행하는 초고속 계산기인, 이타베락스 중앙 처리 장치 제작이 가능합니다: 불러오기, 해독, 실행, 반복.
abacayba_itaverax_electromagnet_tech=전류 공급을 통해 자기장을 생성할 수 있는 자석의 일종인, 이터랙스 전자석 제작이 가능합니다.
abacayba_itaverax_polymer_tech=매우 큰 분자들이 3차원 가교 결합 상태로 유지된, 이타베락스 폴리머 제작이 가능합니다.
abacayba_itaverax_productivity=이타베락스 생산량이 증가합니다.
abacayba_itaverax_superconductor_tech=상온 초전도체 제작이 가능합니다. 어떤 온도에서도 전기 저항이 없으며 자기장을 밀어내는 매우 이색적인 물질입니다.
abacayba_itaverax_ultracapacitor_tech=나중에 사용할 수 있도록 방대한 전기 에너지를 저장하는 건물 사용이 가능합니다. 이타베락스는 증폭할 수 있는 원시적인 원자력 에너지를 가진 초고에너지 결정체입니다.
abacayba_look_for_technologies=외계 유적을 찾아보세요. 오랫동안 잊혀졌던 광석 가공 기술을 사용할 수 있게 됩니다.
abacayba_ominous_science_pack_tech=이타베락스 수정의 이색적인 증폭력을 계속 연구하세요.
abacayba_oozing_white_goo_tech=흘러내리는 하얀색 점액은 석탄을 이용해 태울 수 있습니다.
abacayba_pure_water_calcination_tech=광천수를 열분해시켜 증발시킵니다. 이 과정에서 방해석이 생성될 수 있습니다.
abacayba_research_productivity=소모된 과학 팩당 연구 진행량을 증가시킵니다.
abacayba_torbernite_productivity=토버나이트 생산량이 증가됩니다.
