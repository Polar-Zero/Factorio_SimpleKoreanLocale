[mod-name]
Abacayba_Moon_of_Nauvis=○ 아바카이바 - 나우비스 옆 죽음으로 감염된 세계(Abacayba: Infested Death Twin of Nauvis)

[mod-description]
Abacayba_Moon_of_Nauvis=적대적인 토착 생명체로 이루어진 바다와 강력한 자원으로 차있는 행성입니다. 덩굴줄기 중 하나에 착륙한 다음 행성 중심부로 이동해야 합니다. 이곳을 개척하려면 고대 문명 유적의 탐색이 중요하며, 수분을 머금은 광물을 다양한 원소로 가공하는 이국적인 기술과 거대한 기계를 활용할 필요가 있습니다.\n\n번역: SimpleKoreanLocale(PolarZero)

