[entity-description]
abacayba_huge_mining_drill_entity=광활한 채굴 구역을 갖춘 이국적인 도시 블록 크기의 드릴입니다. 더 단단한 광석과 광물을 채굴할 수 있습니다.
abacayba_itaverax_ultracapacitor_entity=이색적인 초대용량 축전지.
abacayba_rotary_calciner_entity=원료를 고온으로 지속적으로 가열하여 화학적 분해, 사용 후 촉매 활성화 또는 회수, 상 변화 또는 수분 제거를 유도하는 이색적인 회전식 경사 실린더.
abacayba_rotary_trommel_entity=회전하는 이색적인 비스듬한 원통형 기계. 물 분사 및 연마제 텀블링을 사용하여 광석의 부드러운 공해 물질을 분해합니다. 물이 풍부한 미네랄이 더러운 물을 생성합니다.
abacayba_thickener_sedimentation_entity=유체에서 부유 물질을 분리하여 고밀도 슬러지와 맑은 유체를 생성하는 연속 중력 구동 공정을 갖춘 이색적인 수직 침전조입니다.

