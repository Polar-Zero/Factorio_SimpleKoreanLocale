[string-mod-setting-description]
propertyrandomizer-logistic-default=로보포트 범위 감소와 같은, 더 어려운 상황에 직면하게 될 수 있습니다.
propertyrandomizer-logistic-less=벨트 속도와 같은 기본적인 물류 속성만 무작위화합니다.
propertyrandomizer-logistic-more=로보포트의 로봇 충전슬롯과 같은 다양한 속성을 추가로 무작위화합니다.
propertyrandomizer-logistic-none=물류 속성에 대한 무작위화를 진행하지 않습니다.
propertyrandomizer-military-default=공해과 같은 것을 포함한, 바이터 난이도에 영향을 미치는 대부분의 요소를 무작위화합니다.
propertyrandomizer-military-less=몇 가지 기본적인 군사 속성만 무작위로 생성합니다.
propertyrandomizer-military-more=바이터 공격 범위와 같은 다양한 속성을 추가로 무작위화합니다.
propertyrandomizer-military-none=군사 속성에 대한 무작위화를 진행하지 않습니다.
propertyrandomizer-misc-default=차량 회전 속도와 같은 몇 가지 요소에 대한 무작위화를 추가로 진행합니다.
propertyrandomizer-misc-less=차량 속도와 같은 한정된 요소에 대해서만 무작위화를 진행합니다.
propertyrandomizer-misc-more=극단적인 무작위화. "재미"와 마주하세요!
propertyrandomizer-misc-none=추가적인 속성에 대한 무작위화를 진행하지 않습니다.
propertyrandomizer-numerical-algorithm-exfret-random-walk=고전적인 무작위 Walk 알고리즘. 밸런스는 조금 더 안정적이지만 무작위성이 감소됩니다.
propertyrandomizer-numerical-algorithm-fleishman=제한 없는 정규 분포를 사용하는 새로운 알고리즘. 무작위성이 증가되지만, 밸런스가 조금 더 불안정합니다.
propertyrandomizer-production-default=신호기 범위와 같은 속성도 무작위화합니다.
propertyrandomizer-production-less=조립 기계 제작 속도와 같은 기본 생산 속성만 무작위화합니다.
propertyrandomizer-production-more=매우 많은 요소에 무작위화를 진행합니다. 이에는 해양 펌프 속도와 같이 처음에는 눈치 채지 못할만한 요소가 포함됩니다.
propertyrandomizer-production-none=생산 속성에 대한 무작위화를 진행하지 않습니다.
propertyrandomizer-softlock-prevention-all=이전에 연결할 수 있었던 게임 아이템에 더 이상 연결할 수 없는 경우 오류를 띄웁니다.
propertyrandomizer-softlock-prevention-control-only=애플리케이션 시작 시 오류가 발생하더라도 보고하지 않습니다. 새로운 세계를 시작할 때 발생하는 소프트락(멈춤현상)은 여전히 보고될 수 있습니다.
propertyrandomizer-softlock-prevention-critical=이전에 연결할 수 있었던 기술에 연결할 수 없는 치명적인 경우에만 오류가 발생합니다.

