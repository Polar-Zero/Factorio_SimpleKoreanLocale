[mod-setting-description]
propertyrandomizer-preset=먼저 엄선된 사전 설정 중에서 선택하세요. 이후 게임을 시작한 뒤 __CONTROL__randomizer-panel__ 키로 무작위화 커스터마이저에 접근하면, 세부적인 사항을 조정할 수 있습니다.