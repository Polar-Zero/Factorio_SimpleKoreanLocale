[mod-setting-description]
repair_turret_charging_enabled=복구 포탑에 로봇 충전기를 탑재합니다. [재시작 필요]
repair_turret_charging_ports=각 복구 포탑이 동시에 충전할 수 있는 로봇 수량을 조정합니다.
repair_turret_charging_rate=복구 포탑의 로봇 충전 속도를 정의합니다. (초당)
repair_turret_construct_effect=고스트 배치 (재건) 효과를 정의합니다. "default": 광선 효과 활성화, "none": 효과 비활성화\n효과를 비활성화하면 GPU 성능 개선에 도움이 될 수 있습니다.
repair_turret_deconstruct_effect=객체 해체시 효과를 정의합니다. "default": 광선과 탄환 표시, "beam": 광선만 표시, "none": 효과 비활성화\n효과를 비활성화하면 GPU 성능 개선에 도움이 될 수 있습니다.
repair_turret_multi_build=활성화하면, 각 복구 포탑이 매 갱신 주기마다 동시에 5개 객체 까지 건설/수리/해체할 수 있게 됩니다. UPS 성능이 감소된다면 비활성화하세요.