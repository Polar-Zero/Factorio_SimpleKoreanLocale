[technology-description]
coal-recompilation=석탄의 고유한 속성을 문자로부터 컴파일할 수 있도록 합니다.
existential-quantification=연구용 물고기를 우주로 보내 새로운 문자나 숫자를 생성하는 데 필요한 과학 데이터를 얻어보세요. 발사되는 중 물고기가 상하지 않도록 조심하세요!
letter-decompiling=문자를 직접 디컴파일하여 잉여 문자를 더 효율적으로 제거해보세요. 항상 새로운 문자가 반환되며, 이 방법으로 특정 문자를 더 희귀한 문자로 변환할 수도 있습니다.
letter-nuclear-fuel-reprocessing=사용된 연료 전지는 우라늄-235와 우라늄-238로 재처리할 수 있습니다.
letter-uranium-processing=우라늄 아이템은 원심분리기에서 처리됩니다.
literacy="전에는 읽을 수 없었다니 무슨 소리야?"
number-addition=두 숫자를 합친 뒤 1의 자리만 남깁니다. 항상 새로운 숫자가 반환됩니다.
number-decompiling=숫자를 직접 디컴파일하여 초과된 부분을 보다 효율적으로 제거할 수 있도록 합니다. 항상 새로운 숫자가 반환되며, 일부 희귀한 문자를 이 방법으로 얻을 수 있습니다.
ve-rocket-silo=숫자를 사용하여 우주로 로켓을 발사할 수 있습니다.

[mod-setting-name]
letter-spoiling-scalar=문자 부패 속도
