use-letter-uranium-rebalance=원자력 발전 밸런싱

[mod-setting-description]
letter-spoiling-scalar=문자 부패(손상) 속도에 대한 스케일링 배율을 조정합니다.
use-letter-spoiling=문자가 시간에 따라 부패(손상)될 수 있도록 합니다. 흔한 문자일수록 손상 저항력이 강합니다.
use-letter-uranium-rebalance=문자를 통한 핵연료 전지 제작을 더 어렵게 하여, 우라늄 처리와 원자력 밸런스를 재조정합니다.