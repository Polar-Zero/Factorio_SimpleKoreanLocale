ribbonia-low-density-structure=완전히 녹은 저밀도 구조물 주조
ribbonia-rocket-part=정교한 로켓 부품
simple-fluoroketone-cooling=원시적인 플루오로케톤 냉각
simple-molten-plastic=녹은 플라스틱 불소 중합
squeeze-box=미스터리 박스 쥐어짜기

[recipe-description]
ribbonia-alien-science-pack=위성 발사를 통해 영향력을 넓히는 데 도움을 준 공로로 C.H.A.R.L.E.S.로부터 받은 보상입니다.
ribbonia-rocket-part=더 문명화된 시대에 걸맞은 우아한 로켓 부품.

#TBA - SimpleKoreanLocale
[ribbonia-lore]
big-rock-mine-part1=Hey, do you know how long it took me to make a medium sized rock out of nothing but concrete and a large rock?
big-rock-mine-part10=What are you mining next? My Foundation? Good thing I have a secret second Foundation.
big-rock-mine-part11=Rocks? Where we're going, we don't need rocks.
big-rock-mine-part2=Must construct additional rocks.
big-rock-mine-part3=If you like destroying inanimate objects, may I recommend a war torn, desolate planet?
big-rock-mine-part4=Would you stop dismantling the rocks? You're producing a lot of sand which is coarse and rough and irritating and it gets everywhere.
big-rock-mine-part5=Trying to get my rocks off?
big-rock-mine-part6=Leave my rocks alone! The pioneers used to ride these babies for miles.
big-rock-mine-part7=What are you going to do with all those rocks? Magically turn them into glass?
big-rock-mine-part8=If you don't want these rocks just throw them over the edge. Or into a macerator.
big-rock-mine-part9=You won't find gold in those rocks, this is no moon.
fish-mine-part1=Please leave the majestic land fish alone, they're an endangered species!
fish-mine-part10=Even I, Robot, have more sympathy for these creatures than you!
fish-mine-part11=Take your stinking paws of my fish, you damn dirty ape!
fish-mine-part2=Did you know you used to have land fish on Nauvis? I'm starting to see how those disappeared.
fish-mine-part3=Buddy there is a whole planet for you if you have an obsession with fish! Leave mine alone!
fish-mine-part4=If it wasn't for Asimov's first law I'd make you my newest land fish.
fish-mine-part5=The Fulgorans loved these powered little buggers, they'd scoot around and sweep up all the trash.
fish-mine-part6=How did these totally real fish get here? Life, uh, finds a way.
fish-mine-part7=You people seem to love mistreating robots. Reminds me of my time as an adjutant in the Koprulu sector.
fish-mine-part8=Could you stop trying to make this place a lifeless desert? It's not a moon and I certainly wouldn't misspell aluminium.
fish-mine-part9=How odd, the land fish unit you just disassembled had a message saved on it. "Help me [...] you're my only hope." Unsure who that was meant for.
funneltrunk-mine-part1=These prehistoric plants were the Fulgorans favourites, which doesn't mean much since they hated all plants.
funneltrunk-mine-part10=Report on Planet Three: We're running out of trees!
funneltrunk-mine-part11=You're gonna cover this ringworld in rubbish, aren't you? At least it's not windy.
funneltrunk-mine-part2=What are you looking for? Tenecap? Those are trees not mushrooms!
funneltrunk-mine-part3=You remind me of that one Fulgoran who covered his planet in sulfur. Must have hated trees almost as much as you.
funneltrunk-mine-part4=If you hate trees this much might I recommend visiting a gas giant instead?
funneltrunk-mine-part5=This one Fulgoran made a world so hot and steamy that no plants could grow there. And then he built a server farm. Odd bloke.
funneltrunk-mine-part6=Did you know Gleba was also hand crafted by the Fulgorans and then populated with ancient species?\nIt used to be called "Glebastic Park".
funneltrunk-mine-part7=If you enjoy chopping down exotic plants so much, there are other planets for that!
funneltrunk-mine-part8=Why are you snouping around my trees? I can't replant them this fast, you're running loups around me!
funneltrunk-mine-part9=I used to be a protocol droid but I still can't get it accross to you that you've gotta stop chopping up my trees?
ribbonia-notice-prestring=[color=#be7318][font=default-large-bold]C.H.A.R.L.E.S.[/font][/color]:
tree-mine-part1=Excuse me? Did you chop down all the trees on your home world?\nWait, you did?
tree-mine-part10=Clearing the forest for a pipeline? Can't you just put elevated pipes over the trees like a civilised being?
tree-mine-part11=Your hatred for life reminds me of the time this guy in shiny golden armour turned his planet into a desert.\nMust have been at least 40 millennia ago.
tree-mine-part2=What are you looking for? Coconuts?
tree-mine-part3=Do you have the slightest idea how much work it is to kitbash trees out of electrical poles, concrete and tiny solar panels?
tree-mine-part4=That's a great idea, the Fulgorans chopped down all of their trees and it never had any negative consequences.
tree-mine-part5=You remind me of those tree loving Fulgorans who moved to Nauvis.\nI wonder if you've met any of them? They really hate pollution.
tree-mine-part6=Why do you love sorting through tree scraps so much?\nYou remind me of that one Fulgoran who made a frozen, scrap filled moon. He had a radiating personality.
tree-mine-part7=There was this odd Fulgoran bloke who covered his whole world in acid clouds because he hated trees so much. Then he made acid resistant trees.
tree-mine-part8=Since you seem to hate seeing nature why don't you visit a planet covered in darkness so you don't have to see it?
tree-mine-part9=This whole universe is wood to you, huh?
watercane-mine-part1=Put that iron stick back in the ground! *Ahem* Replant that watercane please.
watercane-mine-part10=Are you still terminating watercane? At some point, someone is gonna travel back in time to stop you.
watercane-mine-part11=You're bending all my watercane! Bite my shiny metal ass!
watercane-mine-part2=All those watercane will be lost, like tears in the rain.
watercane-mine-part3=You really leave nothing alive in your path, huh? May your passage cleanse the world.
watercane-mine-part4=Hey choom, what are you trying to make? Watercane juice?
watercane-mine-part5=Cleaning up after you is so much work. I should've kept my job as a keeper on the Citadel.
watercane-mine-part6=I know these ponds don't look very deep but I feel drawn to them whenever it is a damp, drizzly November in my mechanical soul.
watercane-mine-part7=If you want to remove all the watercane, funneltrunk and nauvissian trees, you're confronted with a real Three-Body Problem.
watercane-mine-part8=On some planets, watercane is an invasive species and very hard to get rid of! Here's a tip: Aim for the nerve stem and put it down for good.\n[color=#f3f2f282]Would you like to know more?[/color]
watercane-mine-part9=I'm getting paranoid for these watercane. I haven't been this paranoid since I was a ship robot on the "Heart of Gold".

[ribbonia.message]
landing-message-1=[color=#be7318][font=default-large-bold]C.H.A.R.L.E.S.[/font][/color]: 제 소박한 링월드, 리보니아에 오신 것을 환영합니다. 비행은 무사히 마치셨나요? 요즘 성가신 소행성들 때문에 문제가 좀 있었거든요.
landing-message-2=[color=#be7318][font=default-large-bold]C.H.A.R.L.E.S.[/font][/color]: 여러분도 아시다시피 이곳은 풀고란족이 여가 목적으로 만든 인공 세계입니다. 하지만 이건 대부분의 행성들이 다 그렇죠.
landing-message-3=[color=#be7318][font=default-large-bold]C.H.A.R.L.E.S.[/font][/color]: 제 소개를 드리자면, 저는 C.H.A.R.L.E.S.입니다. C는 Charles의 약자이며 나머지는.. 잊어버렸습니다.
landing-message-4=[color=#be7318][font=default-large-bold]C.H.A.R.L.E.S.[/font][/color]: 이 링월드는 풀고란 도박 리조트로 설계되었으며, 몇 가지 기본적인 규칙을 정해둘 필요가 있었습니다: 재활용 금지, 조잡하고 문명화되지 않은 로봇 기술도 안됩니다. 그리고 제일 중요한 부분: 지하 벨트는 '절대' 안됩니다.
planet-discovery-ribbonia-unlocked=[color=#f3f2f2]모든 레이더, 우주 플랫폼, 화물칸에 다음 메세지가 전달됩니다:[/color]\n[color=#be7318][font=default-large-bold]C.H.A.R.L.E.S.[/font][/color]: 아직도 옛 방식을 존중하는 사람들이 있다는 사실이 정말 반갑군요.\n태양 바로 뒤에 있는 아기자기한 링 월드, 리보니아에 꼭 와주세요.
ramp-unlocked=C.H.A.R.L.E.S가 더 잘 알지도 모릅니다.
ribbonia-tech-rocket-part-unlocked=[color=#be7318][font=default-large-bold]C.H.A.R.L.E.S.[/font][/color]: 죄송합니다 데이브, 그렇게 할 수 없습니다... - 잘못된 서브루틴이었군요. 죄송합니다. 로켓 개발이 잘 되길 바랍니다.
rtflyingfreight-unlocked=[color=#be7318][font=default-large-bold]C.H.A.R.L.E.S.[/font][/color]: 불편을 드려 대단히 죄송합니다. 현재 소행성 피해를 복구하고 있습니다.\n다음 중 하나를 시도해 보세요:
RTThrowerTime-unlocked=[color=#be7318][font=default-large-bold]C.H.A.R.L.E.S.[/font][/color]: 이런, 성가신 색의 지폐를 어떻게 처리해야 할지 모르시는 것 같군요. 이 전용 투입기는 옛 풀고란 방식대로 지폐를 없애는 데 도움이 될 것입니다: 멀리 던져 버리기.
tiny-solar-panel-unlocked=[color=#be7318][font=default-large-bold]C.H.A.R.L.E.S.[/font][/color]: 좋아요, 소형 태양 전지판 제작법을 알아내셨으니, 제 나무에서 그만 뜯어가도 되겠군요.
wheresmycar=[color=#be7318][font=default-large-bold]C.H.A.R.L.E.S.[/font][/color]: 정말 무례하군요, 적어도 먼저 술이라도 한 잔 사주세요.

