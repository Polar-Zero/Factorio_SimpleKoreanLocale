[technology-description]
plasma-carbon-fiber=합성 섬유에 플라즈마 방전 적용을 통해, 밀착력을 증가시켜 [item=carbon-fiber] 생산성을 높일 수 있습니다.
plasma-foundry=질량 분석법을 이용해 광석을 분리하면 모든 불순물이 분리되며, [item=calcite]이 필요하지 않습니다.
plasma-nuclear-fuel=차량이 [item=nuclear-fuel]만큼 빨리 연소할 수 있을 때까지 [item=rocket-fuel]의 내부 밀도를 높이세요.
plasma-processing-unit=플라즈마 식각 과정을 [item=processing-unit] 생산 공정에 도입하면 대량 제작을 가능하게 하고 [fluid=sulfuric-acid]의 필요성도 제거됩니다.
plasma-rocket-fuel-enrichment=차량이 [item=nuclear-fuel]만큼 빨리 연소할 수 있을 때까지 [item=rocket-fuel]의 내부 밀도를 높이세요.
plasma-weaponry=태양의 힘을 손 안에 담아보세요. [item=plasma-railgun-ammo]은 레일건에서 발사되는 즉시 증발하여, 훨씬 넓은 영역에 적은 피해를 입힙니다. [item=plasma-artillery-shell]은 플라즈마 추진으로 텅스텐 판을 발사하여 단일 대상에게 엄청난 피해를 입힙니다.