irradiated-steel-scrap=오염 요소를 제때 제거하지 않으면 질량이 손실됩니다.
irradiated-tungsten-scrap=오염 요소를 제때 제거하지 않으면 질량이 손실됩니다.
plasma-artillery-shell=아주 작은 영역에 파괴적인 피해를 줍니다.
plasma-railgun-ammo=일반적인 레일건 포탄보다 훨씬 더 넓은 범위에 피해를 줍니다.

[plasma-crafter]
hd-mod=Plasma Industries 모드에서 곧 hd-plasma-duct 모드를 사용할 예정입니다! 원한다면 미리 설치하여 더 저렴하고 미관상 좋은 플라즈마 배관을 만나보세요: https://mods.factorio.com/mod/hd-plasma-duct

