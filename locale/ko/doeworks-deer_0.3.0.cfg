[item-description]
dw-deer-ammo-basic=광역 폭발 탄두를 장착해, 기본적인 로켓 포탑에 사용할 수 있는 로켓
dw-deer-ammo-basic-crate=효율적으로 포장된 형태의 로켓 포탑용 로켓 상자. 포장을 풀지 않은 상태에서 사용하려 할 경우 보증이 무효화됩니다. doeWorks는 D.E.E.R을 사용하여 포장된 로켓 상자를 발사하려다 발생하는 모든 손해(정신적, 신체적, 영적)에 대한 책임을 지지 않습니다.
