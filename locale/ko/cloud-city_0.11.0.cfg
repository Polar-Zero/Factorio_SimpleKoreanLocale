[tips-and-tricks-item-description]
flying-platforms=일부 행성은 표면이 단단하지 않은 표면을 가지며, 대기권에 떠 있는 건물을 짓는 것이 유일한 선택지인 경우가 있습니다. 플랫폼의 무게를 지탱할 수 있는 강한 상승기류가 있는 지역에 건설하는 것은 안정성을 확보할 수 있는 유일한 방법입니다.
gas-surface=일부 행성은 표면이 단단하지 않은 표면을 가지며, 대기권에 떠 있는 건물을 짓는 것이 유일한 선택지인 경우가 있습니다. 플랫폼의 무게를 지탱할 수 있는 강한 상승기류가 있는 지역에 건설하는 것은 안정성을 확보할 수 있는 유일한 방법입니다.
integration-hint=일부 기계는 천공 플랫폼에서 전력을 끌어오거나 더 많은 기능을 부여하는 방식으로 천공 플랫폼과 직접 상호작용할 수 있습니다. 단 이러한 기계들을 바로 옆에 배치할 수 없으며, 주황색 테두리로 표시된 거리만큼 떨어져 있어야 합니다.\n또한 천공 플랫폼 밖에서는 작동하지 않습니다.