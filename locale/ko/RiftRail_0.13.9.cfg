[mod-name]
RiftRail=철도 리프트(Rift Rail)

[mod-description]
RiftRail=우주 공간 너머로 기차를 순간이동할 수 있도록 리프트 인터페이스를 배치해보세요.\nLTN, Cybersyn2 모드 등을 지원합니다.\n\n[문제 해결]\n충돌 후 기차가 순간이동하지 않거나 충돌 범위 문제가 발생한다면 [설정 -> 모드 설정 -> 지도]에서 "모든 충돌 초기화"을 클릭해보세요.\n\n번역: SimpleKoreanLocale(PolarZero)


