[entity-description]
rift-rail-core=Rift Rail 물류망의 핵심 구성 요소. 내부 작동 및 연결을 처리합니다.
rift-rail-entity=Rift Rail 물류망의 주요 구조물. 기차 순간이동을 활성화하려면 다른 포털과 연결해야 합니다. 순간 이동이 실패하거나 문제가 발생하면 모드 설정에서 "충돌 재설정" 옵션을 사용해 보세요.
rift-rail-placer-entity=우주를 가로질러 기차를 순간이동시킬 수 있는 리프트 인터페이스를 배치합니다.\n우주 탐사 및 사이버신을 지원합니다.\n\n[문제 해결]\n기차가 범위에 겹쳤음에도 기차가 순간이동하지 않거나 충돌 범위 문제가 발생했다면 [설정 -> 모드 설정 -> 지도]에서 "모든 충돌 초기화"을 클릭하여 수정하세요.\n\n[LTN]\nLTN에서 인터럽트 메커니즘을 사용하는 경우, 순간이동 중 화물이 부족하여 엔진에서 잘못된 인터럽트를 발동하는 것을 방지하려면 모드 설정에서 “LTN: 순간이동 후 정차 추가” 옵션을 활성화하세요.

