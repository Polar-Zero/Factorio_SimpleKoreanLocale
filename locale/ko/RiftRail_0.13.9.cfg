exit-id-3=[출구 - ID: 3]
internal-signal-switched=내부 신호 전환 -> __1__
item-description-advanced=v0.10부터 철도 리프트에서 복잡한 [font=default-bold][color=green]다대다(N-to-M)[/color][/font] 네트워크를 지원합니다! 하나의 엔트리를 최대 5개의 출구에 동시에 연결하거나 여러 입구를 하나의 출구에 연결할 수 있습니다.\n\n하나의 입구가 여러 출구에 연결되면 포털은 다음 [color=orange]우선순위[/color]에 따라 목적지를 결정합니다: [font=default-bold]1. 기차 일정표 신호(가장 높음):[/font] 열차 일정표 대기 조건에 [virtual-signal=riftrail-go-to-id] = [대상 ID]가 추가된 상태에서 (조합기는 경로에 영향을 주지 않으며 숫자 값만 읽음) 해당 ID가 유효한 상태로 연결된 출구를 나타낸다면, 기차가 해당 출구로 순간이동합니다.\n\n[font=default-bold]2. 진입 회로 신호:[/font] 1단계에서 유효한 출구로 확인되지 않으면 RiftRail은 입구 측 회로망에서 [virtual-signal=riftrail-go-to-id]을 읽고 일치하는 출구로 경로를 변경합니다.\n\n[font=default-bold]3. 기본값(실패시):[/font] 두 신호 확인 후에도 유효한 출구를 확인하는 데 실패하면 Rift Rail 모드 설정의 기본 출구를 사용하며, 사용할 수 없는 경우 사용 가능한 첫 번째 연결된 출구로 이동합니다.\n\n최대 성능을 추구하는 대규모 기지 건설자를 위해 Rift Rail은 다음과 같은 강력한 최적화 잠재력을 제공합니다.\n\n[font=default-bold][color=orange]동일 축 배치[/color][/font] 쌍을 이루는 입구와 출구가 [color=green]둘 다 동일한 세로축이나 가로출에 배치될 경우[/color], 포털에서 복잡한 표준 스폰 로직을 우회하고, 픽셀 단위의 완벽 복제를 위해 네이티브 클론 API를 직접 호출합니다. 이 방법은 UPS를 거의 소비하지 않으며 메가베이스에 가장 적합한 방법입니다![font=default-bold]결론:[/font] 최적의 텔레포트 성능을 위해 90도 '수평 1개, 수직 1개' (ㄱ자 연결) 설정은 피하세요. 가능하면 포털을 [color=orange]평행[/color]하게 유지하세요.
item-description-pairing=철도 리프트의 핵심 메커니즘은 [font=default-bold][color=green]연결[/color][/font]입니다: 각 입구는 하나의 출구에 연결되어 있어야 제대로 작동합니다. 연결이 완료되면, 입구로 진입한 열차가 연결된 출구로 순간이동하게 됩니다.\n\n페어링하려면: [font=default-bold][color=green]철도 리프트 코어[/color][/font]을 선택한 뒤 연결하려는 출구를 클릭하세요. 각 입구는 여러 출구에 연결할 수 있으며 각 출구도 여러 입구에 연결할 수 있습니다.\n\n연결된 후에는 해당 ID가 입구와 출구에 표시됩니다(연결을 식별하는 데 도움이 됩니다).
rift-rail-advanced-routing=철도 리프트 고급 연결
rift-rail-pairing-tutorial=[item=rift-rail-placer] 철도 리프트 튜토리얼
tips-and-tricks-category=[item=rift-rail-placer] 철도 리프트

[virtual-signal-name]
riftrail-go-to-id=RiftRail: [ID]로 이동

[virtual-signal-description]
riftrail-go-to-id=텔레포트하도록 할 대상 포털 ID를 지정합니다.\n사용법: 열차 스케줄의 순환 조건에서 이 신호값을 대상 포털의 ID로 설정하세요.\n예: riftrail-go-to-id = 5 = ID가 5인 포털로 순간이동한다는 의미입니다.

[mod-setting-name]
rift-rail-debug-mode=디버그 로깅 활성화
rift-rail-ltn-teleported-name=LTN: 순간이동한 뒤 정류장 이름
rift-rail-ltn-use-teleported=LTN: 순간이동 후 정류장 추가
rift-rail-mod-integration=철도 리프트 모드 통합
rift-rail-placement-interval=캐리지 배치 확인 간격
rift-rail-reset-colliders=모든 충돌 감지기 초기화(긴급 수정)
rift-rail-show-cybersyn-global=사이버싱 글로벌 메시지 표시
rift-rail-show-cybersyn-notifications=Cybersyn 상태 알림 표시
rift-rail-show-logistics-notifications=교차 물류 알림 표시
rift-rail-teleport-speed=순간이동 속도 배율
rift-rail-uninstall-cleanup=[철도 리프트] 제거 준비 / 데이터 정리
rift-rail-train-gui-track=기차 GUI 따라가기 활성화

[mod-setting-description]
rift-rail-ltn-teleported-name=텔레포트된 정거장으로 사용할 역의 이름입니다. 기본값: 모드 아이콘
rift-rail-ltn-use-teleported=이 기능을 활성화하면 철도 리프트 포털을 통과한 뒤, 일정에 임시 정거장을 추가합니다. 이렇게 하면 열차가 포털 지역을 벗어나게 되어 막힘 발생 가능성을 방지할 수 있습니다. 작동하려면 출구 근처에 일치하는 이름의 역을 건설해야 합니다.
rift-rail-mod-integration=철도 리프트과 통합할 모드를 선택합니다. 이 설정을 사용하면 선택한 모드에 맞게 제작법와 기술을 설정할 수 있습니다. 한 번에 하나의 옵션만 활성화할 수 있음에 유의하세요.\n\n옵션:\n- none: 통합하지 않습니다. Rift Rail이 자체 제작법와 진행도를 사용합니다.\n- easy-mode: 단순화된 제작법와 진행을 사용하여 Rift Rail을 더 쉽게 사용할 수 있도록 합니다. \n- space-age: 우주 시대 모드의 재료와 진행을 사용하도록 Rift Rail 모드를 조정합니다.\n- krastorio2: Rift Rail에서 크라스토리오 2 아이템과 밸런스를 사용하도록 조정합니다.\n- space-exploration: 균열 레일이 우주 탐사 모드의 아이템과 우주 진행도를 사용하도록 조정합니다.\n- se-k2: 우주 탐사와 크라스토리오 2를 결합한 설정에 맞게 Rift Rail 모드를 조정합니다.
rift-rail-placement-interval=스크립트에서 다음 화물차를 배치할 수 있는지 확인할 빈도(틱 단위, 60틱 = 1초)를 조정합니다.\n값이 낮을수록 안정적이지만 약간 더 많은 CPU 자원을 사용합니다.\n값이 높을수록 CPU가 절약되지만 고속에서 열차 연결이 끊어질 위험이 증가합니다.\n이 값을 높인 뒤 안정적으로 작동하려면 열차 속도를 줄여야 할 수도 있습니다.\n권장: 1. 최대: 10
rift-rail-reset-colliders=[고위험 작업] 맵의 모든 철도 리프트 충돌 감지기를 강제로 제거하고 다시 생성합니다. 모드 업그레이드 후 충돌 실패 또는  배치가 잘못된 경우에만 사용하세요. 체크할 시 스크립트가 자동으로 복구 로직을 실행하며, 이 옵션을 자동으로 비활성화합니다.
rift-rail-show-cybersyn-global=채팅 메세지로 Cybersyn 연결/연결 해제 알림을 표시합니다. 플레이어별 설정이며; 보고 싶지 않으면 비활성화하세요.
rift-rail-show-logistics-notifications=Cybersyn/LTN 교차 표면 연결이 설정되거나 연결이 끊어질 때 알림 메시지를 표시할지 여부를 제어합니다. 기본값: 활성화
rift-rail-teleport-speed=출구 포털에서의 열차의 초기 속도를 제어합니다.\n권장: 1.0(약 216km/h). 값이 높으면 열차 연결이 끊어질 수 있으며,\n값이 낮으면 처리량이 감소합니다.\n이 값을 높이려면 배치 확인 간격을 낮춰야 할 수 있습니다.\n사용 가능한 값: 0.1 ~ 8.0
rift-rail-uninstall-cleanup=경고: 이 모드를 제거하거나 표면 간 연결 데이터를 정리하려는 경우에만 이 옵션을 활성화하세요.\n오류를 방지하기 위해 모든 철도 리프트 포털을 LTN 네트워크에서 강제 분리하고 외부 데이터를 정리합니다.\n활성화하기 전에 현재 순간이동 중인 열차가 없는지 다시 한번 확인하세요!
rift-rail-train-gui-track=플레이어가 순간이동 전에 기차 GUI를 보고 있는 경우, 순간이동 후 인터페이스가 원활하게 복원됩니다. 성능을 개선하려면 비활성화하세요. (대규모 서버 등)