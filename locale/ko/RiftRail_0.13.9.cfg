menu_rr_cs2=Cybersyn 2 연동
page_cs2_text_1=v0.12부터 리프트 레일은 경로 플러그인 API를 통해 [font=default-bold][color=cyan]Cybersyn 2(사이버신 2)[/color][/font]에 대한 기본적인 지원을 다시 도입했습니다. 표면 A과 B 사이에 유효한 CS2 경로를 설정하려면 다음 규칙을 따르세요:\n\n[font=default-bold]1. 양방향 왕복(까다로운 요구 사항):[/font]\nCS2에서 기차 경로를 지정하려면 유효한 복귀 경로가 필요합니다. [color=green]입구 A -> 출구 B[/color](예: 나우비스 -> 불카누스)와 반대 방향의 [color=orange]입구 C -> 출구 D[/color](예: 불카누스 -> 나우비스)를 동시에 구축해야 합니다.\n\n[font=default-bold]2. 수동 스위치 활성화:[/font]\n스위치는 선택한 건물에만 영향을 줍니다. 모든 [color=red]4개의 포털[/color]에 대한 GUI를 열고 입구와 출구 양쪽에서 "CS2" 스위치를 수동으로 활성화[/color]하세요.\n\n[font=default-bold]3. 전역 최적 경로 자동 지정:[/font]\n여러 개의 포털을 사용할 수 있는 경우 RiftRail에서 열차가 진입 포털에 접근하는 거리와 출구 포털이 목적지 정거장에 근접하는 거리를 합산 계산하여 최적의 경로를 자동으로 선택하도록 할 수 있습니다. 수동 구성이 필요하지 않습니다.\n\n[font=default-bold]4. 일방통행 경고:[/font]\n포털에서 CS2를 활성화했지만, 반대쪽으로 이동할 수 없는 경우가 발생하면(예: A→B는 존재하지만 B→A는 존재하지 않음) [color=orange]Rift Rail에서 채팅[/color]으로 경고 메세지를 표시합니다. 반대로 이동하는 경로를 구축하여 이 문제를 해결하세요.
page_ltn_text_2=[font=default-bold][color=orange]⚠ 열차 인터럽트 호환성 참고[/color][/font]\nLTN 열차가 일정에 [font=default-bold]인터럽트[/font] 조건을 사용하는 경우(예: "철광석이 1000 미만일 때 X역으로 이동"), RiftRail에서 기차를 객차 단위로 순간이동하므로 주의하시기 바랍니다. 불완전한 순간이동 중에 게임 엔진이 열차의 적재량이 부족하다고 잘못 판단하여 인터럽트를 활성화할 수 있습니다. 이로 인해 배송이 중단되지는 않지만 [color=red]LTN에서 표면 교차 경유지를 올바르게 선택하지 못할 수 있습니다[/color].\n\n[font=default-bold]권장 해결 방법:[/font]\nRift Rail 포털 설정에서 [color=green][font=default-bold]"순간이동 후 정류장 추가"[/font][/color] 옵션을 활성화하세요. 이 옵션을 활성화하면 포털에서 [color=cyan]temporary[/color] 플래그가 없는 전용 정류장 기록을 제공하여 잘못된 인터럽트 활성을 제거하고 LTN 경유지가 올바르게 추가되도록 합니다.
page_routing_text_2=[font=default-bold]1. 기차 일정표 신호(가장 높음):[/font] 열차 일정표 대기 조건에 [virtual-signal=riftrail-go-to-id] = [대상 ID]가 추가된 상태에서 (조합기는 경로에 영향을 주지 않으며 숫자 값만 읽음) 해당 ID가 유효한 상태로 연결된 출구를 나타낸다면, 기차가 해당 출구로 순간이동합니다.\n\n[font=default-bold]2. 진입 회로 신호:[/font] 1단계에서 유효한 출구로 확인되지 않으면 RiftRail은 입구 측 회로망에서 [virtual-signal=riftrail-go-to-id]을 읽고 일치하는 출구로 경로를 변경합니다.\n\n[font=default-bold]3. 기본값(실패시):[/font] 두 신호 확인 후에도 유효한 출구를 확인하는 데 실패하면 Rift Rail 모드 설정의 기본 출구를 사용하며, 사용할 수 없는 경우 사용 가능한 첫 번째 연결된 출구로 이동합니다.
page_ups_text_1=최고의 성능을 추구하는 메가베이스 건설자를 위해 Rift Rail은 궁극의 최적화 잠재력을 제공합니다.\n\n[font=default-bold][color=orange]통합 네이티브 클론[/color][/font] 이제 Rift Rail에서 복잡한 표준 스폰 로직을 완전히 우회합니다. 포털이 평행이든 90도 수직이든 상관없이, 비저장 방식의 초고속 수학적 예측을 활용하여 픽셀 완벽 복제를 위해 네이티브 C++ 클론 API를 이용합니다. 이 방법은 기본적으로 UPS를 거의 소비하지 않기에, 메가베이스를 위한 궁극적이고 무조건적인 선택입니다!
#page_routing_text_2=[font=default-bold]1. 회로 제어(매우 높음):[/font] 열차 스케줄에 대기 조건이 `[virtual-signal=riftrail-go-to-id] > [대상 ID]`인 경우, 열차는 해당 특정 ID의 출구로 정확하게 순간이동합니다.\n\n[font=default-bold]2. LTN 자동 경로 설정:[/font] LTN 열차인 경우, 시스템이 자동으로 거리를 계산하여 목적지 표면에서 가장 가깝게 연결된 출구로 순간이동합니다.\n\n[font=default-bold]3. 기본값(대체):[/font] 지시가 없으면 연결 목록에서 가장 먼저 이용 가능한 출구로 텔레포트합니다.
