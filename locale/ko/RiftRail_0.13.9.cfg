page_faq_text_1=[font=default-bold]Q: Cybersyn과 사용할 수 있나요?[/font]\nA: [font=default-bold][color=green]Cybersyn 2 (CS2)[/color][/font]을 v0.12 이후 기본적으로 지원합니다! [color=cyan]Cybersyn 2 연동[/color] 페이지에서 자세한 정보를 확인하세요.\n[color=default]기존 Cybersyn (v1)[/color]은 모드 구조 충돌로 인해 v0.10 이후 지원이 [color=red]영구적으로 제거되었습니다[/color]. 꼭 필요한 경우 v0.10.1(N-to-M) 또는 v0.8.2(1대1)로 다운그레이드하세요.\n\n[font=default-bold]Q: 열차가 충돌하여 순간 이동이 되지 않거나 충돌 감지기가 고장납니다.[/font]\nA: [설정 -> 모드 설정 -> 지도]로 이동하여 [color=orange]"모든 충돌 감지기 초기화"[/color]를 클릭하여 긴급 수정을 진행하세요.\n\n[font=default-bold]Q: 이 모드를 제거하면 내 세이브 파일이 손상되나요?[/font]\nA: 제거하기 전에 모드 설정에서 [color=red]"제거 사전작업 진행"[/color]를 반드시 선택해야 합니다. 이렇게 하면 모든 포털의 연결이 강제로 해제되고 남은 데이터를 정리해 세이브 파일 손상을 방지할 수 있습니다!
page_ltn_text_1=v0.10부터 교차 표면 LTN 설정 로직이 업데이트되었습니다. 표면 A와 표면 B 사이에 유효한 LTN 경로를 설정하려면 다음 규칙을 엄격하게 따라야 합니다.\n\n[font=default-bold]1. 양방향 왕복(까다로운 요구 사항):[/font]\nLTN 배치기에서 열차를 성공적으로 배차하려면 돌아올 경로를 계산해야 합니다. [font=default-bold]입구 A -> 출구 B[/color]를 구축하고, (예: 나우비스에서 불카누스까지) 돌아오는 경로 [color=orange]입구 C -> 출구 D[/color]를 추가로 구축해야 합니다. (예: 불카누스에서 나우비스까지)\n\n[font=default-bold]2. 수동 LTN 활성화:[/font]\n이전 버전과 달리, 이제 스위치는 클릭한 건물에만 영향을 줍니다. LTN을 올바르게 활성화하려면 관련된 모든 [color=red]4개의 포털[/color]에 대해 GUI를 열고 [color=green]입구 및 출구 양쪽에서 "LTN" 스위치를 수동으로 활성화[/color]해야 합니다.\n\n[font=default-bold]3. 범용 네트워크(ID -1):[/font]\n구성을 간소화하기 위해 사용자 지정 포털 네트워크 ID 기능이 제거되었습니다. 이제 모든 철도 리프트 포털이 영구적으로 [color=purple]네트워크 ID -1[/color]를 사용하며, 모든 LTN 네트워크에 대한 범용 브리지 역할을 합니다.
page_main_text_1=[font=default-bold][color=193,128,255]철도 리프트[/color][/font]에 오신 것을 환영합니다! 이 모드는 간단한 첨단 물류 솔루션을 제공하여 기차를 광활한 거리, 다양한 표면, 심지어 우주선으로 원활하게 순간이동할 수 있게 해줍니다.
page_main_text_2=기존의 양방향 연결과 달리 철도 리프트는 [font=default-bold][color=orange]비대칭 단방향 텔레포트 시스템[/color][/font]을 사용합니다. 기관차, 화물차, 유체 화물차, 대포 화물차를 완벽하게 지원합니다. 기차 안에 있는 플레이어도 즉시 순간이동할 수 있습니다! 자세한 조작 가이드는 왼쪽 메뉴에서 확인하세요.
page_pairing_text_1=[item=rift-rail-placer] (철도 리프트 배치기)를 설치하세요. GUI를 열고 [color=green]입구[/color] 또는 [color=orange]출구[/color]로 구성합니다.\n\n[font=default-bold]연결 방법:[/font]\n1. 입구와 출구를 모두 설치했는지 확인합니다.\n2. 한 포털의 GUI를 열고 "대상 선택" 메뉴에서 다른 포털을 선택한 다음 [color=green]연결[/color] 버튼을 클릭하세요.\n3. 연결에 성공했다면 입구로 들어온 열차가 연결된 출구에서 즉시 나타납니다.
page_routing_text_1=v0.10부터 철도 리프트에서 복잡한 [font=default-bold][color=green]다대다(N-to-M)[/color][/font] 네트워크를 지원합니다! 하나의 엔트리를 최대 5개의 출구에 동시에 연결하거나 여러 입구를 하나의 출구에 연결할 수 있습니다.\n\n하나의 입구가 여러 출구에 연결되면 포털은 다음 [color=orange]우선순위[/color]에 따라 목적지를 결정합니다:
#page_ups_text_1=최대 성능을 추구하는 대규모 기지 건설자를 위해 Rift Rail은 다음과 같은 강력한 최적화 잠재력을 제공합니다.\n\n[font=default-bold][color=orange]동일 축 배치[/color][/font] 쌍을 이루는 입구와 출구가 [color=green]둘 다 동일한 세로축이나 가로출에 배치될 경우[/color], 포털에서 복잡한 표준 스폰 로직을 우회하고, 픽셀 단위의 완벽 복제를 위해 네이티브 클론 API를 직접 호출합니다. 이 방법은 UPS를 거의 소비하지 않으며 메가베이스에 가장 적합한 방법입니다![font=default-bold]결론:[/font] 최적의 텔레포트 성능을 위해 90도 '수평 1개, 수직 1개' (ㄱ자 연결) 설정은 피하세요. 가능하면 포털을 [color=orange]평행[/color]하게 유지하세요.
page_ups_text_2=[font=default-bold][color=orange]팁 2: "텔레포트 속도"와 "배치 간격" 균형 맞추기[/color][/font]\n모드 설정에서 이 핵심 파라미터를 조정할 수 있습니다:\n[font=default-bold]- 배치 간격:[/font] 이 값을 높이면(예: 2 또는 3으로) 스크립트 CPU 사용량이 크게 감소하지만, 캐리지 연결이 지연됩니다.\n[font=default-bold]- 텔레포트 속도:[/font] 값이 높을수록 처리량이 증가하지만, 높은 속도는 반드시 낮은 간격(예: 1)과 짝을 이루어야 하며, 그렇지 않으면 열차가 분리됩니다.\n\n[font=default-bold]🏆 권장 프리셋:[/font]\n[color=green]고처리량 모드:[/color] 간격 1, 속도 1.0~2.4(대부분의 플레이어에게 최적).\n[color=purple]최고 UPS-절약 모드:[/color] 간격 3, 속도 0.5~1.0(1k+ SPM 메가베이스, 매우 낮은 CPU 사용량에 가장 적합).
